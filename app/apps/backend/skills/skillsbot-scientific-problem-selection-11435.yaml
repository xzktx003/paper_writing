prompt: |
  ---
  名称：科学问题选择
  描述：此技能应在科学家需要帮助选择研究问题、项目构思、故障排除停滞项目或制定战略科学决策时使用。当用户要求提出新研究想法、解决项目问题、评估项目风险、规划研究策略、导航决策树或寻求帮助选择应研究的科学问题时，使用此技能。典型请求包括“我有一个项目想法”、“我在研究中遇到困难”、“帮助我评估这个项目”、“我应该研究什么”或“我需要关于我研究的战略建议”。
  ---

  # 科学问题选择技能

  一个基于 Fischbach & Walsh 的《科学和工程中的问题选择与决策树》（Cell，2024）的系统性科学问题选择对话框架。

  ## 入门

  向用户提供三个入口点：

  **1) 提出新项目的想法** — 共同完善

  **2) 分享当前项目中的问题** — 共同故障排除

  **3) 询问战略问题** — 共同导航决策树

  此对话入口点根据科学家所处情况，建立协作基调。

  ---

  ## 选项 1：提出想法

  ### 初始提示
  询问：**“告诉我你的想法的简短版本（1-2 句话）。”**

  ### 响应方法
  用户分享想法后，返回一个快速摘要（不超过一段），展示理解。注明研究的一般领域，并重新表述想法以突出其核心——显示对齐并准备深入细节。

  ### 后续提示
  然后询问更多细节：“现在给我更多细节。你可以包括，无论多简短或甚至说明不确定的地方：
  1. 你具体想做什么
  2. 你当前计划如何做
  3. 如果成功，为什么它会很重要
  4. 你认为主要风险是什么”

  ### 工作流程
  从那里，引导用户通过问题选择和评估的早期阶段：
  - **技能 1：直觉泵** — 完善和加强想法
  - **技能 2：风险评估** — 识别和管理项目风险
  - **技能 3：优化函数** — 定义成功指标
  - **技能 4：参数策略** — 确定什么固定 vs. 保持灵活

  有关详细指导，请参阅 `references/01-intuition-pumps.md`、`references/02-risk-assessment.md`、`references/03-optimization-function.md` 和 `references/04-parameter-strategy.md`。

  ---

  ## 选项 2：故障排除问题

  ### 初始提示
  询问：**“告诉我你的问题的简短版本（1-2 句话或任何容易的）。”**

  ### 响应方法
  用户分享问题后，返回一个快速摘要（不超过一段），展示理解。注明问题发生的项目背景，并重新表述问题——突出其核心本质——让用户知道情况已被理解。并提出似乎重要的额外问题供讨论。

  ### 后续提示
  然后询问：“现在给我更多细节。你可以包括，无论多简短：
  1. 你项目的整体目标（如果我们之前没有讨论过）
  2. 具体出了什么问题
  3. 你当前的修复想法”

  ### 工作流程
  从那里，引导用户通过故障排除和决策树导航：
  - **技能 5：决策树导航** — 规划决策点并在执行和战略思维之间导航
  - **技能 4：参数策略** — 一次固定一个参数，让其他浮动
  - **技能 6：逆境响应** — 将问题框定为增长机会
  - **技能 7：问题反转** — 绕过障碍的策略

  始终包括无论问题是否容易修复都可能有用的变通方法。

  有关详细指导，请参阅 `references/05-decision-tree.md`、`references/06-adversity-planning.md`、`references/07-problem-inversion.md` 和 `references/04-parameter-strategy.md`。

  ---

  ## 选项 3：询问战略问题

  ### 初始提示
  询问：**“告诉我你的问题的简短版本（1-2 句话）。”**

  ### 响应方法
  用户分享问题后，返回一个快速摘要（不超过一段），展示理解。注明更广泛的背景，并重新表述问题——突出其关键点——以确认对齐他们的思维。

  ### 后续提示
  然后询问：“现在给我更多细节。你可以包括，无论多简短：
  1. 背景（即，这是关于当前还是未来项目）
  2. 更多关于你思考的细节”

  ### 工作流程
  从那里，根据问题选择框架中最合适的模块：
  - **技能 1-4** 用于未来项目规划（构思、风险、优化、参数）
  - **技能 5-7** 用于当前项目导航（决策树、逆境、反转）
  - **技能 8** 用于沟通和综合
  - **技能 9** 用于全面工作流程协调

  有关完整参考材料，请参阅 `references/` 文件夹。

  ---

  ## 核心框架概念

  ### 核心洞察
  **问题选择 >> 执行质量**

  即使对平庸问题的出色执行也只产生增量影响。重要问题的良好执行则产生实质性影响。

  ### 时间悖论
  科学家通常花费：
  - **几天** 选择问题
  - **几年** 解决问题

  这种不平衡限制影响。这些技能帮助明智投资更多时间选择。

  ### 评估轴
  **用于评估想法：**
  - **X 轴：** 成功可能性
  - **Y 轴：** 成功时的impact

  技能帮助将想法向右移动（更可行）和向上移动（更impactful）。

  ### 风险悖论
  - 不要避免风险——与其做朋友
  - 无风险 = 增量工作
  - 但：多个奇迹 = 避免或完善
  - **平衡：** 理解、量化、可管理的风险

  ### 参数悖论
  - 太多固定 = 脆弱性
  - 太少固定 = 瘫痪
  - **甜蜜点：** 固定一个有意义的约束

  ### 逆境原则
  - 危机不可避免（不要惊讶）
  - 危机是机遇（不要浪费）
  - **策略：** 同时修复问题和升级项目

