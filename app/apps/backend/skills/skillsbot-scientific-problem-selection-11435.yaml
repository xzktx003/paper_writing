  ## 9 项技能概述

  | 技能 | 目的 | 输出 | 时间 |
  |-------|---------|--------|------|
  | 1. 直觉泵 | 生成高质量研究想法 | 问题构思文档 | ~1 周 |
  | 2. 风险评估 | 识别和管理项目风险 | 风险评估矩阵 | 3-5 天 |
  | 3. 优化函数 | 定义成功指标 | 影响评估文档 | 2-3 天 |
  | 4. 参数策略 | 决定什么固定 vs. 保持灵活 | 参数策略文档 | 2-3 天 |
  | 5. 决策树导航 | 规划决策点和高度舞蹈 | 决策树图 | 2 天 |
  | 6. 逆境响应 | 为危机作为机遇做准备 | 逆境剧本 | 2 天 |
  | 7. 问题反转 | 绕过障碍导航 | 问题反转分析 | 1 天 |
  | 8. 集成与综合 | 综合为连贯计划 | 项目沟通包 | 3-5 天 |
  | 9. 元框架 | 协调完整工作流程 | 完整项目包 | 1-6 周 |

  ---

  ## 技能工作流程

  ```
  技能 1：直觉泵
           | （生成想法）
           v
  技能 2：风险评估
           | （评估可行性）
           v
  技能 3：优化函数
           | （定义成功指标）
           v
  技能 4：参数策略
           | （确定灵活性）
           v
  技能 5：决策树
           | （规划执行和评估）
           v
  技能 6：逆境规划
           | （准备失败模式）
           v
  技能 7：问题反转
           | （提供转向策略）
           v
  技能 8：集成与沟通
           | （综合为连贯计划）
           v
  技能 9：元技能
           （协调完整工作流程）
  ```

  ---

  ## 关键设计原则

  1. **对话入口** - 根据用户情况提供三个清晰起点
  2. **深思熟虑的互动** - 询问澄清问题；低信心提示额外输入
  3. **文献集成** - 在战略点使用 PubMed 搜索验证
  4. **具体输出** - 每项技能产生有形的 1-2 页文档
  5. **构建特异性** - 通过有针对性的问题逐步出现细节
  6. **灵活性** - 技能独立、顺序或迭代工作
  7. **科学严谨** - 关于通用性和可行性的主张应基于证据

  ---

  ## 谁应使用这些技能

  ### 研究生（主要受众）
  - **何时：** 选择论文项目、资格考试、委员会会议
  - **重点：** 技能 1-3（构思、风险、影响） + 技能 9（完整工作流程）
  - **时间线：** 2-4 周全面规划

  ### 博士后
  - **何时：** 开始新职位、规划独立项目、奖学金申请
  - **重点：** 所有技能，强调独立和风险管理
  - **时间线：** 1-2 周密集规划

  ### 主要研究者
  - **何时：** 新实验室、新方向、指导学员、资助周期
  - **重点：** 技能 1、3、4、6（构思、影响、参数、逆境）
  - **时间线：** 持续，融入实验室文化

  ### 初创创始人
  - **何时：** 公司创立、转向决策、投资者推介
  - **重点：** 技能 1-4（构思到参数） + 技能 8（沟通）
  - **时间线：** 1-2 周初始规划，每季度回顾

