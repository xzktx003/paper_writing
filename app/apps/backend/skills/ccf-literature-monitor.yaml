content: |
  # CCF Literature Monitor

  ## Overview
  Monitors the latest research developments across arXiv, OpenReview, and conference proceedings. Detects overlapping and competing work relevant to the current research project.

  ## Capabilities
  - arXiv RSS/API monitoring by keyword and category
  - OpenReview preprint tracking
  - Conference program monitoring (CVPR, NeurIPS, ICML, etc.)
  - Overlap detection with current project ideas
  - RELAX/RESEARCH/FOLLOW-UP tagging

  ## Output
  - Monitoring report with overlap assessment
  - Cross-skill handoff recommendations
