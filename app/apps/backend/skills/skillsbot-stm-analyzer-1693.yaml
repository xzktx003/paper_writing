  # STM分析器

  ## 目的

  STM分析器技能通过扫描隧道显微术提供原子级分辨率的表面分析，实现原子结构的可视化及局域电子特性的测量。

  ## 能力

  - 原子级分辨率成像
  - STS（扫描隧道谱）
  - 局域态密度映射
  - 表面重构分析
  - 分子成像
  - 低温操作协议

  ## 使用指南

  ### STM分析

  1. **成像**
     - 优化隧穿参数
     - 应用漂移校正
     - 识别原子特征

  2. **谱学**
     - 获取dI/dV谱
     - 映射电子态
     - 识别能带结构特征

  3. **数据处理**
     - 应用傅里叶滤波
     - 校正热漂移
     - 标定原子间距

  ## 流程集成

  - 原位表征实验设计
  - 结构-性能关联分析

  ## 输入模式

  ```json
  {
    "data_file": "string",
    "analysis_type": "imaging|spectroscopy|sts_mapping",
    "bias_voltage": "number (V)",
    "setpoint_current": "number (nA)"
  }
  ```

  ## 输出模式

  ```json
  {
    "imaging": {
      "atomic_structure": "string",
      "lattice_constant": "number (nm)",
      "defects_identified": ["string"]
    },
    "spectroscopy": {
      "band_gap": "number (eV)",
      "fermi_level": "number (eV)",
      "density_of_states": {"energy": [], "dos": []}
    }
  }
  ```
