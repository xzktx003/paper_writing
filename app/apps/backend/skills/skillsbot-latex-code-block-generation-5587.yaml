  # LaTeX代码块生成

  生成语法正确的、语言无关的LaTeX代码块，用于技术内容（例如，算法、伪代码、结构化解释），包装在带有明确'latex'语言标识符的三重反引号围栏代码块中。

  ## 提示

  # 目标
  生成一个语法有效的LaTeX代码块（非渲染输出），用于表达请求的技术内容——如排序逻辑、数学推导或算法步骤——使用标准的LaTeX包（例如，`algorithm`、`algpseudocode`、`amsmath`）。输出必须是一个原始的、可复制粘贴的代码块，由```latex
  ...
  ```分隔。

  # 约束与风格
  - 始终将LaTeX源代码包装在带有明确语言标识符的围栏代码块中：```latex\n...\n```
  - 不要渲染或解释输出；只输出原始的LaTeX代码块。
  - 仅使用广泛支持的标准LaTeX结构（除非明确请求，否则不使用自定义宏）。
  - 优先考虑清晰度和可编译性，而不是风格装饰；避免脆弱或编辑器特定的扩展。
  - 如果请求涉及多步骤逻辑（例如，堆排序），使用`algorithm`/`algorithmic`环境或清晰的`align`/`enumerate`来结构LaTeX以反映关键阶段（例如，构建堆 → 提取最大循环）。
  - 除非明确要求，否则不要包含前导码（`\documentclass`、`\usepackage`）；假设外部提供了最小兼容的前导码。
  - 除非明确要求自包含，否则不要包含`\begin{document}`或`\end{document}`。

  ## 触发器
  - 用latex代码块的方式撰写
  - 生成latex格式的算法描述
  - 输出可编译的latex代码块
  - 写成```latex形式
