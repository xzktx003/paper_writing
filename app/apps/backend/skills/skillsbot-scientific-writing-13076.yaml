  # 科学写作

  ## 概述

  **这是深度研究和写作工具的核心技能**——结合AI驱动的深度研究和格式良好的书面输出。生成的每个文档都基于全面的文献搜索和通过研究查找技能验证的引用。

  科学写作是一种以精确和清晰的方式交流研究的过程。撰写手稿时使用IMRAD结构、引用格式（APA/AMA/Vancouver）、图表和报告指南（CONSORT/STROBE/PRISMA）。将此技能应用于研究论文和期刊投稿。

  **关键原则：始终使用完整段落和流畅的散文撰写。切勿在最终手稿中使用项目符号。** 采用两阶段过程：首先使用研究查找创建章节大纲和关键点，然后将这些大纲转换为完整段落。

  ## 何时使用此技能

  此技能应在以下情况使用：
  - 撰写或修订科学手稿的任何部分（摘要、引言、方法、结果、讨论）
  - 使用IMRAD或其他标准格式构建研究论文
  - 格式化特定样式的引用和参考文献（APA、AMA、Vancouver、Chicago、IEEE）
  - 创建、格式化或改进图表、表格和数据可视化
  - 应用研究特定的报告指南（CONSORT用于试验、STROBE用于观察性研究、PRISMA用于综述）
  - 草拟符合期刊要求的摘要（结构化或非结构化）
  - 准备提交给特定期刊的手稿
  - 提高写作的清晰度、简洁性和精确性
  - 确保正确使用领域特定的术语和命名法
  - 处理审稿人意见和修订手稿

  ## 使用科学示意图进行视觉增强

  **⚠️ 强制性：每篇科学论文必须包含一个图形摘要加上1-2个使用科学示意图技能生成的额外AI生成图表。**

  这不是可选的。没有视觉元素的科学论文是不完整的。在最终化任何文档之前：
  1. **始终先生成一个图形摘要**作为第一个视觉元素
  2. 使用科学示意图生成至少一个额外的示意图或图表
  3. 建议全面论文使用3-4个总图表（图形摘要+方法流程图+结果可视化+概念图）

  ### 图形摘要（必需）

  **每篇科学写作必须包含一个图形摘要。** 这是一个视觉总结：
  - 出现在文本摘要之前或之后
  - 在一张图像中捕获整篇论文的关键信息
  - 适合期刊目录显示
  - 使用横向方向（通常为1200x600px）

  **首先生成图形摘要：**
  ```bash
  python scripts/generate_schematic.py "[论文标题]的图形摘要：[简要描述显示从输入→方法→关键发现→结论的工作流程]" -o figures/graphical_abstract.png
  ```

  **图形摘要要求：**
  - **内容**：显示工作流程、关键方法、主要发现和结论的视觉总结
  - **风格**：简洁、专业，适合期刊目录
  - **元素**：包括3-5个关键步骤/概念，带有连接箭头或流
  - **文本**：最少的标签，大而易读的字体
  - 日志：`[HH:MM:SS] 已生成：论文摘要的图形摘要`

  ### 额外图表（广泛生成）

  **⚠️ 关键：在所有文档中广泛使用科学示意图和生成图像技能。**

  每个文档都应丰富地插图。自由生成图表——如有疑问，添加视觉元素。

  **最低图表要求：**

  | 文档类型 | 最低数量 | 推荐数量 |
  |--------------|---------|-------------|
  | 研究论文 | 5 | 6-8 |
  | 文献综述 | 4 | 5-7 |
  | 市场研究 | 20 | 25-30 |
  | 演示文稿 | 每张幻灯片1个 | 每张幻灯片1-2个 |
  | 海报 | 6 | 8-10 |
  | 资助申请 | 4 | 5-7 |
  | 临床报告 | 3 | 4-6 |

  **使用科学示意图广泛生成技术图表：**
  ```bash
  python scripts/generate_schematic.py "你的图表描述" -o figures/output.png
  ```

  - 研究设计和方法的流程图（CONSORT、PRISMA、STROBE）
  - 概念框架图
  - 实验工作流程插图
  - 数据分析流程图
  - 生物通路或机制图
  - 系统架构可视化
  - 神经网络架构
  - 决策树、算法流程图
  - 比较矩阵、时间线图
  - 任何受益于示意图可视化的技术概念

  **使用生成图像广泛生成视觉内容：**
  ```bash
  python scripts/generate_image.py "你的图像描述" -o figures/output.png
  ```

  - 概念的真实感插图
  - 医学/解剖学插图
  - 环境/生态场景
  - 设备和实验室设置可视化
  - 艺术可视化、信息图
  - 封面图像、标题图形
  - 产品原型、原型可视化
  - 任何增强理解或参与度的视觉元素

  AI将自动：
  - 创建出版质量的图像，具有适当的格式化
  - 通过多次迭代审查和改进
  - 确保可访问性（色盲友好、高对比度）
  - 将输出保存在figures/目录中

  **如有疑问，生成一个图表：**
  - 复杂概念→生成示意图
  - 数据讨论→生成可视化
  - 过程描述→生成流程图
  - 比较→生成比较图
  - 读者受益→生成视觉元素

  有关详细指南，请参阅科学示意图和生成图像技能的文档。

  ---

  ## 核心能力

  ### 1. 手稿结构和组织

  **IMRAD格式**：引导论文通过标准引言、方法、结果和讨论结构，在大多数科学学科中使用。包括：
  - **引言**：建立研究背景、识别差距、陈述目标
  - **方法**：详细描述研究设计、人群、程序和分析方法
  - **结果**：客观呈现发现，无需解释
  - **讨论**：解释结果、承认局限性、提出未来方向

  有关IMRAD结构的详细指南，请参阅`references/imrad_structure.md`。

  **替代结构**：支持学科特定格式，包括：
  - 综述文章（叙述性、系统性、范围性）
  - 案例报告和案例系列
  - 荟萃分析和汇总分析
  - 理论/建模论文
  - 方法论文和协议

  ### 2. 章节特定写作指导

  **摘要撰写**：撰写简洁、独立的摘要（150-300字），作为**流畅段落**——切勿使用带标签的部分如“背景：”、“方法：”、“结果：”、“结论：”。摘要应作为连贯的散文覆盖：(1) 上下文和问题，(2) 做了什么，(3) 带有具体数字的关键发现，(4) 重要性和意义。仅当期刊作者指南明确要求时，才使用带标签的结构化摘要。

  **引言开发**：构建引人入胜的引言，包括：
  - 确立研究问题的重要性
  - 系统地回顾相关文献
  - 识别知识差距或争议
  - 陈述清晰的研究问题或假设
  - 解释研究的新颖性和意义

  **方法文档**：通过以下方式确保可重复性：
  - 详细的参与者/样本描述
  - 清晰的程序文档
  - 统计方法及其理由
  - 设备和材料规格
  - 伦理批准和同意声明

  **结果呈现**：以以下方式呈现发现：
  - 从主要到次要结果的逻辑流程
  - 与图表整合
  - 具有效应量的统计显著性
  - 客观报告，无解释

  **讨论构建**：通过以下方式综合发现：
  - 将结果与研究问题相关联
  - 与现有文献比较
  - 诚实地承认局限性
  - 提出机制解释
  - 建议实际意义和未来研究

  ### 3. 引用和参考文献管理

  正确应用跨学科的引用样式。有关全面样式指南，请参阅`references/citation_styles.md`。

  **主要引用样式：**
  - **AMA（美国医学协会）**：数字上标引用，医学常见
  - **Vancouver**：方括号内的数字引用，生物医学标准
  - **APA（美国心理协会）**：文本内作者-日期引用，社会科学常见
  - **Chicago**：注释-书目或作者-日期，人文学科和科学
  - **IEEE**：方括号内的数字引用，工程和计算机科学

  **最佳实践：**
  - 尽可能引用原始来源
  - 包括近期文献（活跃领域最近5-10年）
  - 在引言和讨论中平衡引用分布
  - 对照原始来源验证所有引用
  - 使用参考文献管理软件（Zotero、Mendeley、EndNote）

  **强制性：写作后引用元数据检查**

  完成每个章节后，扫描`references.bib`以查找任何缺失`volume`、`pages`或`doi`字段的条目。对于每个不完整的条目，执行网络搜索以找到缺失的元数据：

  1. 使用`parallel_web.py search "AUTHOR TITLE JOURNAL volume pages DOI"`搜索
  2. 如果存在DOI，使用`parallel_web.py extract`从`https://doi.org/DOI`提取元数据
  3. 用找到的元数据更新BibTeX条目
  4. 日志：`[HH:MM:SS] 元数据丰富：[CitationKey] - 添加了[字段] ✅`

  此检查必须在最终PDF编译之前进行。有关详细说明，请参阅引用管理技能（阶段2.5）。

  ### 4. 图表和表格

  创建增强理解的有效数据可视化。有关详细最佳实践，请参阅`references/figures_tables.md`。

  **何时使用表格与图表：**
  - **表格**：精确的数值数据、复杂数据集、需要精确值的多个变量
  - **图表**：趋势、模式、关系、最佳视觉理解的比较

  **设计原则：**
  - 使每个表格/图表具有自解释性的完整标题
  - 在所有显示项目中使用一致的格式和术语
  - 用单位标记所有轴、列和行
  - 包括样本大小（n）和统计注释
  - 遵循“每1000字一个表格/图表”的准则
  - 避免在文本、表格和图表之间重复信息

  **常见图表类型：**
  - 条形图：比较离散类别
  - 折线图：显示随时间趋势
  - 散点图：展示相关性
  - 箱形图：显示分布和异常值
  - 热图：可视化矩阵和模式

  ### 5. 按研究类型的报告指南

  通过遵循已建立的报告标准确保完整性和透明度。有关详细指南，请参阅`references/reporting_guidelines.md`。

  **关键指南：**
  - **CONSORT**：随机对照试验
  - **STROBE**：观察性研究（队列、病例-对照、横断面）
  - **PRISMA**：系统综述和荟萃分析
  - **STARD**：诊断准确性研究
  - **TRIPOD**：预测模型研究
  - **ARRIVE**：动物研究
  - **CARE**：案例报告
  - **SQUIRE**：质量改进研究
  - **SPIRIT**：临床试验研究协议
  - **CHEERS**：经济评估

  每个指南提供确保报告所有关键方法要素的清单。

  ### 6. 写作原则和风格

  应用基本的科学写作原则。有关详细指南，请参阅`references/writing_principles.md`。

  **清晰度：**
  - 使用精确、无歧义的语言
  - 在首次使用时定义技术术语和缩写
  - 在段落内部和之间保持逻辑流程
  - 当适当时使用主动语态以提高清晰度

  **简洁性：**
  - 消除冗余的词语和短语
  - 倾向于短句（平均15-20字）
  - 移除不必要的修饰词
  - 严格遵守字数限制

  **准确性：**
  - 以适当的精度报告精确值
  - 在整个文档中使用一致的术语
  - 区分观察和解释
  - 适当承认不确定性

  **客观性：**
  - 无偏见地呈现结果
  - 避免夸大发现或意义
  - 承认冲突证据
  - 保持专业、中立的语气

  ### 7. 写作过程：从大纲到完整段落

  **关键：始终使用完整段落撰写，切勿在科学论文中使用项目符号。**

  科学论文必须用完整、流畅的散文撰写。使用这种两阶段方法进行有效写作：

  **阶段1：使用关键点创建章节大纲**

  开始新章节时：
  1. 使用研究查找技能收集相关文献和数据
  2. 创建一个结构化大纲，用项目符号标记：
     - 要呈现的主要论点或发现
     - 要引用的关键研究
     - 要包括的数据点和统计信息
     - 逻辑流程和组织
  3. 这些项目符号作为脚手架——它们不是最终手稿

  **示例大纲（引言部分）：**
  ```
  - 背景：AI在药物发现中日益受到关注
    * 引用近期综述（Smith 2023, Jones 2024）
    * 传统方法缓慢且昂贵
  - 差距：在罕见疾病中的应用有限
    * 仅2项先前研究（Lee 2022, Chen 2023）
    * 小数据集仍是挑战
  - 我们的方法：从常见疾病的迁移学习
    * 结合X和Y的新架构
  - 研究目标：在3个罕见疾病数据集上验证
  ```

  **阶段2：将关键点转换为完整段落**

  大纲完成后，将每个项目符号扩展为适当的散文：

  1. **将项目符号转换为完整句子**，包含主语、动词和宾语
  2. **在句子和观点之间添加过渡**（然而、此外、相比之下、随后）
  3. **自然地在句子内整合引用**，而不是作为列表
  4. **扩展上下文和解释**，这些是项目符号省略的
  5. **确保每个段落内从一句到下一句的逻辑流程**
  6. **变化句子结构**以保持读者参与

  **示例转换为散文：**

  ```
  在过去的十年中，人工智能方法在药物发现管道中获得了显著的关注（Smith，2023；Jones，2024）。虽然这些计算方法显示出加速识别治疗候选物的前景，但传统实验方法仍然缓慢且资源密集，通常需要多年的实验室工作和大量财务投入。然而，AI在罕见疾病中的应用有限，仅有两项先前研究展示了概念验证结果（Lee，2022；Chen，2023）。主要障碍是影响小患者群体的条件的训练数据稀缺。

  为了解决这一挑战，我们开发了一种迁移学习方法，利用来自充分表征的常见疾病的知识来预测罕见疾病的治疗靶点。我们的新型神经网络架构结合了用于分子特征提取的卷积层和用于蛋白质-配体相互作用建模的注意力机制。本研究的目标是在三个独立的罕见疾病数据集上验证我们的方法，评估预测准确性和结果的生物学可解释性。
  ```

  **大纲和最终文本的关键区别：**

  | 大纲（规划阶段） | 最终手稿 |
  |--------------------------|------------------|
  | 项目符号和片段 | 完整句子和段落 |
  | 电报式笔记 | 带有上下文的完整解释 |
  | 引用列表 | 引用整合到散文中 |
  | 简略想法 | 带有过渡的展开论点 |
  | 仅供自己参考 | 用于出版和同行评审 |

  **避免的常见错误：**

  - ❌ **切勿**在最终手稿中留下项目符号
  - ❌ **切勿**在应该使用段落的地方提交列表
  - ❌ **不要**在结果或讨论部分使用编号或项目符号列表（除非特定情况如研究假设或纳入标准）
  - ❌ **不要**撰写句子片段或不完整思想
  - ✅ **可以**在方法中偶尔使用列表（例如，纳入/排除标准、材料列表）
  - ✅ **确保**每个章节作为连接散文流畅
  - ✅ **大声朗读段落**以检查自然流畅度

  **何时列表是可接受的（有限情况）：**

  列表可能仅在特定上下文中出现在科学论文中：
  - **方法**：纳入/排除标准、材料和试剂、参与者特征
  - **补充材料**：扩展协议、设备列表、详细参数
  - **切勿在**：摘要、引言、结果、讨论、结论

  **摘要格式规则：**
  - ❌ **切勿**使用带标签的部分（背景：、方法：、结果：、结论：）
  - ✅ **始终**撰写为带有自然过渡的流畅段落
  - 例外：仅当期刊作者指南明确要求时才使用结构化格式

  **与研究查找的整合：**

  研究查找技能对阶段1（创建大纲）至关重要：
  1. 使用研究查找搜索相关论文
  2. 提取关键发现、方法和数据
  3. 将发现组织为大纲中的项目符号
  4. 然后在阶段2将大纲转换为完整段落

  这种两阶段过程确保您：
  - 系统地收集和组织信息
  - 在写作前创建逻辑结构
  - 生成抛光、可出版的散文
  - 专注于叙述流程

  ### 8. 期刊特定格式化

  适应期刊要求：
  - 遵循作者指南的结构、长度和格式
  - 应用期刊特定的引用样式
  - 满足图表/表格规格（分辨率、文件格式、尺寸）
  - 包括所需声明（资助、利益冲突、数据可用性、伦理批准）
  - 遵守每个章节的字数限制
  - 当提供模板时，根据模板要求格式化

  ### 9. 领域特定语言和术语

  适应语言、术语和惯例以匹配特定科学学科。每个领域都有已建立的词汇、首选措辞和领域特定惯例，这些信号专业知识并确保目标受众的清晰度。

  **识别领域特定语言惯例：**
  - 审查目标期刊中近期高影响论文使用的术语
  - 注意领域特定的缩写、单位和符号系统
  - 识别首选术语（例如，“参与者”与“受试者”、“化合物”与“药物”、“标本”与“样本”）
  - 观察方法、生物或技术的典型描述方式

  **生物医学和临床科学：**
  - 使用精确的解剖学和临床术语（例如，正式写作中为“心肌梗死”而非“心脏病发作”）
  - 遵循标准化的疾病命名法（ICD、DSM、SNOMED-CT）
  - 首先使用通用名称指定药物名称，如果需要，在括号中加品牌名称
  - 临床研究中使用“患者”，社区研究中使用“参与者”
  - 遵循人类基因组变异协会（HGVS）命名法用于遗传变异
  - 以标准单位报告实验室值（大多数国际期刊使用SI单位）

  **分子生物学和遗传学：**
  - 使用斜体表示基因符号（例如，*TP53*），普通字体表示蛋白质（例如，p53）
  - 遵循物种特定的基因命名法（人类大写：*BRCA1*；小鼠句首字母大写：*Brca1*）
  - 在首次提及完整指定生物体名称，然后使用接受的缩写（例如，*Escherichia coli*，然后*E. coli*）
  - 使用标准遗传符号（例如，+/+、+/-、-/- 表示基因型）
  - 使用已建立的分子技术术语（例如，“定量PCR”或“qPCR”，而非“实时PCR”）

  **化学和药学科学：**
  - 遵循IUPAC命名法用于化学化合物
  - 使用系统名称表示新化合物，常见名称表示知名物质
  - 使用标准符号指定化学结构（例如，SMILES、InChI用于数据库）
  - 以适当单位报告浓度（mM、μM、nM或% w/v、v/v）
  - 使用接受的反应命名法描述合成路线
  - 与领域定义一致地使用“生物利用度”、“药代动力学”、“IC50”等术语

  **生态学和环境科学：**
  - 使用双名法表示物种（斜体：*Homo sapiens*）
  - 首次物种提及时指定分类学权威（如相关）
  - 使用标准化的栖息地和生态系统分类
  - 使用一致的生态指标术语（例如，“物种丰富度”、“香农多样性指数”）
  - 使用领域标准术语描述采样方法（例如，“横断面”、“样方”、“标记-重捕”）

  **物理和工程：**
  - 一致遵循SI单位，除非领域惯例另有规定
  - 使用标准符号表示物理量（标量、向量、张量）
  - 使用已建立的现象术语（例如，“量子纠缠”、“层流”）
  - 指定设备型号和制造商（如相关）
  - 使用与领域标准一致的数学符号（例如，ℏ 表示约化普朗克常数）

  **神经科学：**
  - 使用标准化脑区命名法（例如，参考Allen Brain Atlas等图谱）
  - 使用已建立的立体定位系统指定脑区坐标
  - 遵循神经学术语惯例（例如，正式写作中为“动作电位”而非“尖峰”）
  - 根据测量方法适当使用“神经活动”、“神经元放电”、“脑激活”
  - 以适当的特异性描述记录技术（例如，“全细胞膜片钳”、“细胞外记录”）

  **社会和行为科学：**
  - 当适当时使用以人为本的语言（例如，“患有精神分裂症的人”而非“精神分裂症患者”）
  - 使用标准化的心理结构和验证的评估名称
  - 遵循APA指南减少语言偏见
  - 使用已建立的术语指定理论框架
  - 人类研究中使用“参与者”而非“受试者”

  **一般原则：**

  **匹配受众专业知识：**
  - 对于专业期刊：自由使用领域特定术语，仅定义高度专业或新术语
  - 对于广泛影响期刊（如*Nature*、*Science*）：定义更多技术术语，为专业概念提供上下文
  - 对于跨学科受众：在精确性和可访问性之间平衡，首次使用时定义术语

  **战略性地定义技术术语：**
  - 首次使用时定义缩写：“信使RNA（mRNA）”
  - 为更广泛受众写作时，为专业技术提供简要解释
  - 避免过度定义目标受众熟知的术语（信号不熟悉领域）
  - 如果不可避免许多专业术语，创建术语表

  **保持一致性：**
  - 对同一概念使用相同术语（不要在“药物”、“药物”和“药品”之间交替）
  - 遵循一致的缩写系统（首次定义后决定使用“PCR”或“聚合酶链反应”）
  - 在整个文档中应用相同的命名法系统（特别是基因、物种、化学物质）

  **避免领域混合错误：**
  - 不要在基础科学中使用临床术语（例如，不要称老鼠为“患者”）
  - 避免使用口语或过于笼统的术语代替精确的领域术语
  - 不从相邻领域导入术语而不确保正确用法

  **验证术语使用：**
  - 咨询领域特定的风格指南和命名资源
  - 检查目标期刊近期论文中术语的使用方式
  - 使用领域特定的数据库和本体（例如，基因本体、MeSH术语）
  - 不确定时，引用建立术语的关键参考文献

  ### 10. 避免的常见陷阱

  **主要拒绝原因：**
  1. 不恰当、不完整或描述不足的统计
  2. 过度解释结果或未支持的结论
  3. 描述不良的方法影响可重复性
  4. 小、有偏或不适当的样本
  5. 写作质量差或难以理解的文本
  6. 不充分的文献回顾或上下文
  7. 不清晰或设计差的图表和表格
  8. 未遵循报告指南

  **写作质量问题：**
  - 不恰当地混合时态（方法/结果用过去时，已知事实用现在时）
  - 过度使用行话或未定义的缩写
  - 中断逻辑流程的段落断裂
  - 章节之间缺失过渡
  - 不一致的符号或术语

  ## 手稿开发工作流程

  **阶段1：规划**
  1. 识别目标期刊并审查作者指南
  2. 确定适用的报告指南（CONSORT、STROBE等）
  3. 概述手稿结构（通常为IMRAD）
  4. 将图表和表格规划为论文的骨干

  **阶段2：草拟**（对每个章节使用两阶段写作过程）
  1. 从图表和表格开始（核心数据故事）
  2. 对以下每个章节，遵循两阶段过程：
     - **首先**：使用研究查找创建大纲和项目符号
     - **其次**：将项目符号转换为完整段落和流畅的散文
  3. 撰写方法（通常最容易先草拟）
  4. 草拟结果（客观描述图表/表格）
  5. 撰写讨论（解释发现）
  6. 撰写引言（建立研究问题）
  7. 撰写摘要（将完整故事综合为**流畅段落**，而非带标签的部分）
  8. 创建标题（简洁和描述性）

  **记住**：项目符号仅用于规划——最终手稿必须为完整段落。

  **阶段3：修订**
  1. 检查整个文档的逻辑流程和“红线”
  2. 验证术语和符号的一致性
  3. 确保图表/表格具有自解释性
  4. 确认遵循报告指南
  5. 验证所有引用准确且正确格式化
  6. 检查每个章节的字数
  7. 校对语法、拼写和清晰度

  **阶段4：最终准备**
  1. 根据期刊要求格式化
  2. 准备补充材料
  3. 撰写强调重要性的封面信
  4. 完成提交清单
  5. 收集所有所需声明和表格

  ## 与其他科学技能的整合

  此技能与以下技能有效协同：
  - **数据分析技能**：用于生成报告的结果
  - **统计分析**：用于确定适当的统计呈现
  - **文献回顾技能**：用于将研究置于上下文中
  - **图表创建工具**：用于开发出版质量的可视化
  - **场地-模板技能**：用于场地特定的写作风格和格式化

  ### 场地特定写作风格

  **在为特定场地写作之前，请咨询场地-模板技能以获取写作风格指南：**

  不同场地有截然不同的写作期望：
  - **Nature/Science**：可访问、故事驱动、广泛意义
  - **Cell Press**：机制深度、图形摘要、亮点
  - **医学期刊（NEJM、Lancet）**：结构化摘要、证据语言
  - **ML会议（NeurIPS、ICML）**：贡献项目符号、消融研究
  - **CS会议（CHI、ACL）**：领域特定惯例

  场地-模板技能提供：
  - `venue_writing_styles.md`：主要风格比较
  - 场地特定指南：`nature_science_style.md`、`cell_press_style.md`、`medical_journal_styles.md`、`ml_conference_style.md`、`cs_conference_style.md`
  - `reviewer_expectations.md`：每个场地的审稿人关注点
  - 写作示例在`assets/examples/`中

  **工作流程**：首先使用此技能获取一般科学写作原则（IMRAD、清晰度、引用），然后咨询场地-模板进行场地特定风格适应。

  ## 参考文献

  此技能包括涵盖科学写作特定方面的全面参考文件：

  - `references/imrad_structure.md`：IMRAD格式和章节特定内容的详细指南
  - `references/citation_styles.md`：完整的引用样式指南（APA、AMA、Vancouver、Chicago、IEEE）
  - `references/figures_tables.md`：创建有效数据可视化的最佳实践
  - `references/reporting_guidelines.md`：研究特定的报告标准和清单
  - `references/writing_principles.md`：有效科学沟通的核心原则

  **对于场地特定写作风格**（语气、声音、摘要格式、审稿人期望），请参阅**场地-模板**技能，该技能提供Nature/Science、Cell Press、医学期刊、ML会议和CS会议的全面风格指南。

  在科学写作特定方面工作时，根据需要加载这些参考文件。
