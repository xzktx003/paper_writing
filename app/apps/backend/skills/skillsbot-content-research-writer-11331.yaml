  # 内容研究撰稿人 - 研究支持型写作

  ## 何时使用此技能

  - 撰写博客文章和文章
  - 创建技术文档
  - 全面研究主题
  - 收集可信的来源和引用
  - 撰写教育内容
  - 产生研究支持的写作
  - 创建白皮书和报告
  - 撰写案例研究
  - 开发内容策略
  - 创建SEO优化内容
  - 撰写教程和指南
  - 产生思想领导力内容

  ## 何时使用此技能

  - 撰写带引用的技术内容。
  - 当处理相关任务或功能时
  - 在需要此专业知识的开发过程中

  **使用时机**: 撰写带引用的技术内容。

  ## 过程
  1. 研究来源
  2. 提取关键点
  3. 添加引用
  4. 审查准确性

  ## 资源
  - [技术写作指南](https://developers.google.com/tech-writing)
