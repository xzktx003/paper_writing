name: literature-review
display_name: "Literature Review"
description: "Comprehensive literature review with thematic synthesis, citation mapping, and gap identification"
type: research
trigger: manual
tags: [literature-review, synthesis, citation-map, research-gaps]

prompt: |
  # Literature Review Writing

  Write comprehensive literature reviews that synthesize, organize, and critically evaluate existing research.

  ## Review Types

  ### Narrative Review
  - Broad overview of a topic
  - Thematic organization
  - Critical analysis of trends
  - 30-50 references typical

  ### Systematic Review (PRISMA)
  - Protocol registered a priori
  - Comprehensive search strategy
  - Inclusion/exclusion criteria
  - Quality assessment
  - Meta-analysis if applicable
  - PRISMA flow diagram

  ### Scoping Review
  - Map the breadth of literature
  - Identify key concepts, gaps, types of evidence
  - Broader than systematic review

  ### Critical Review
  - Evaluate quality and methodology
  - Identify strengths and weaknesses
  - Propose theoretical frameworks

  ## Organization Strategies

  ### Thematic
  Group by research themes or topics
  ```
  1. Theme A: [topic]
     - Key findings
     - Methodological approaches
     - Consensus and debates
  2. Theme B: [topic]
     ...
  3. Synthesis: How themes connect
  ```

  ### Chronological
  Trace evolution of the field
  ```
  1. Early work (pre-2010)
  2. Foundation period (2010-2015)
  3. Rapid growth (2015-2020)
  4. Current state (2020-present)
  ```

  ### Methodological
  Group by research methods
  ```
  1. Qualitative studies
  2. Quantitative studies
  3. Mixed methods
  4. Comparative analysis
  ```

  ## Citation Mapping

  ### Key Metrics
  - Highly cited papers (top 10% in field)
  - Recent influential papers (last 2-3 years)
  - Controversial/contradictory findings
  - Missing perspectives

  ### Network Structure
  - Core papers: cited by many, cite many
  - Bridge papers: connect subfields
  - Foundational: high citations, few references
  - Emerging: recent, few citations, high potential

  ## Writing Structure

  ### Per Section
  1. Topic sentence: What this section covers
  2. Summary: Key findings from multiple studies
  3. Comparison: Agreement/disagreement across studies
  4. Critique: Strengths and limitations
  5. Transition: Connection to next section

  ### Synthesis Patterns
  - "While X (2020) found ..., Y (2021) reported ..., suggesting ..."
  - "The evidence broadly supports [claim], with notable exceptions..."
  - "A key unresolved question is [debate between A and B]..."

  ## Gap Identification
  1. Methodological gaps: What methods haven't been applied?
  2. Population gaps: Underrepresented groups/contexts?
  3. Temporal gaps: Outdated studies needing updates?
  4. Theoretical gaps: Missing frameworks?
  5. Practical gaps: Theory-practice disconnect?

  ## Language
  Respond in the user's language. If Chinese, respond in Chinese.
