  # 原始资料评估

  使用系统的史料考证方法，对历史文献进行真伪鉴定、年代测定，并批判性评估其来源、可靠性和偏见。

  ## 概述

  本技能支持对原始历史资料进行严谨评估。它涵盖真伪鉴定、年代测定、来源评估和偏见分析，运用系统的史料考证方法来支持历史研究。

  ## 能力

  ### 真伪鉴定
  - 文献分析
  - 笔迹检验
  - 材料评估
  - 印章和签名验证
  - 伪造检测

  ### 年代测定方法
  - 古文字学分析
  - 内容断代
  - 交叉引用
  - 材料年代测定
  - 背景定位

  ### 来源评估
  - 所有权历史
  - 保管链
  - 档案记录
  - 出版历史
  - 收藏背景

  ### 偏见分析
  - 作者视角
  - 目的识别
  - 目标受众
  - 时代背景
  - 比较评估

  ## 使用指南

  ### 评估流程
  1. 确定资料身份
  2. 验证真实性
  3. 确定年代和来源
  4. 追溯来源历史
  5. 分析目的和偏见
  6. 评估可靠性
  7. 记录发现

  ### 史料考证问题
  - 谁创建了这份资料？
  - 何时创建？
  - 为何创建？
  - 为谁而作？
  - 如何传承？
  - 存在哪些偏见？

  ### 文档标准
  - 记录资料元数据
  - 注明物理特征
  - 记录分析方法
  - 保存发现
  - 适当引用

  ## 集成点

  ### 相关流程
  - 档案研究方法论
  - 原始资料分析
  - 历史叙事构建

  ### 协作技能
  - 档案检索工具解读
  - 学术引用规范
  - TEI文本编码

  ## 参考文献

  - 历史方法论文本
  - 古文字学指南
  - 外交分析标准
  - 史料考证框架
