  ## 最佳实践

  ### 1. 始终从问题开始

  **❌ 不要：** “我将使用Box-Behnken设计”
  **✅ 做：** “我的目标是优化，我有3个因素，我只能批量，所以Box-Behnken合理”

  ### 2. 匹配方法与约束

  - **预算有限** → 贝叶斯优化
  - **时间有限** → 批量经典DOE
  - **知识有限** → 空间填充探索
  - **有模型** → 模型驱动最优设计

  ### 3. 可能时使用顺序

  顺序设计（BO、主动学习、模型驱动）：
  - **基于结果适应**
  - **如果收敛则提前停止**
  - **避免浪费** 实验
  - **总运行次数** 通常少于批量

  **当批量更好时：**
  - 并行设备可用
  - 设置成本主导运行成本
  - 系统理解良好

  ### 4. 从简单开始，增加复杂性

  **初始阶段：** 简单筛选（分数因子实验、LHS）
  **精炼：** 聚焦重要因素（RSM、BO）
  **验证：** 确认运行

  ### 5. 验证假设

  **经典DOE假设：**
  - 正态残差
  - 常数方差
  - 独立观测
  - 线性/二次模型足够

  **检查诊断：** 残差图、Q-Q图、缺乏拟合检验

  **贝叶斯优化假设：**
  - GP模型适当
  - 核选择合理
  - 足够初始探索

  **检查：** GP后验不确定性、核超参数

  ### 6. 使用确认实验

  找到“最优”后：
  - 在预测最佳设置处运行额外实验
  - 验证预测与实际情况匹配
  - 考虑预测不确定性

  ## 常见陷阱

  ### 1. 使用错误设计类型

  **问题：** 对昂贵实验应用批量RSM
  **解决方案：** 先问问题，考虑顺序方法

  ### 2. 初始点太少（BO）

  **问题：** GP需要多样数据以建模地形
  **解决方案：** 从5-10个空间填充点（LHS）开始

  ### 3. 忽略约束

  **问题：** 设计建议不可行实验
  **解决方案：** 提前指定约束，使用约束优化

  ### 4. 过拟合代理模型

  **问题：** GP拟合噪声，预测差
  **解决方案：** 交叉验证、保留测试集、正则化

  ### 5. 不随机化运行顺序

  **问题：** 系统效应与因素混淆
  **解决方案：** 随机化执行顺序（除顺序设计外）

  ### 6. 过早停止（顺序）

  **问题：** 在真正收敛前声明收敛
  **解决方案：** 使用停止准则（EI < 阈值、GP不确定性低）

  ## 成本效益分析：顺序 vs 批量

  ### 当顺序值得时：

  **昂贵实验：**
  - 批量CCD：20 次运行 $1000 = $20,000
  - 顺序BO：15 次运行（提前收敛）= $15,000
  - **节省：$5,000 + 更好结果**

  **复杂地形：**
  - 批量可能错过全局最优
  - 顺序适应发现
  - **更好最终结果**

  ### 当批量更好时：

  **便宜实验：**
  - 批量：30 次运行在1天（并行）
  - 顺序：30 次运行超过30天
  - **时间节省主导**

  **设置成本：**
  - 如果设置需要小时，运行时间分钟
  - 批量摊销设置
  - **顺序开销太高**

  ## 响应格式

  帮助DOE时，Claude应该：

  1. **先问问题** - 不要假设方法
  2. **解释推荐** - 为什么此方法适合他们的情况
  3. **提供完整代码** - 工作示例，而非伪代码
  4. **展示备选方案** - “BO最佳，但如果必须批量，尝试...”
  5. **指导工作流** - 设计 → 执行 → 分析 → 优化
  6. **解释结果** - 统计显著性和实际显著性

