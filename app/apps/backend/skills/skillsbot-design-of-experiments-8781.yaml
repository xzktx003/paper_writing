  ## 按行业常见模式

  **化学工程：**
  - 反应器优化 → CCD 或 贝叶斯优化
  - 催化剂筛选 → 分数因子实验 → 命中后BO
  - 过程开发 → 顺序模型驱动DOE

  **材料科学：**
  - 组成优化 → 混合物设计 或 BO
  - 性能映射 → 拉丁超立方 + GP代理
  - 合金发现 → 高通量与主动学习

  **制药：**
  - 制剂 → 混合物设计、响应面
  - 剂量优化 → 贝叶斯优化
  - PK/PD建模 → 模型驱动D最优设计

  **制造业：**
  - 工艺参数调优 → CCD 或 Box-Behnken
  - 质量改进 → Taguchi、稳健参数设计
  - 持续改进 → 顺序BO

  **机器学习：**
  - 超参数调优 → 贝叶斯优化
  - 架构搜索 → BO与离散/分类变量
  - 神经网络训练 → 自适应采样

  ## 安装

  ```bash
  # 经典DOE
  pip install pyDOE3          # 因子实验、RSM、LHS
  pip install dexpy           # 现代DOE库

  # pycse 用于集成RSM
  pip install pycse

  # 贝叶斯优化
  pip install scikit-optimize # skopt - 最易用
  pip install GPyOpt          # 全面BO
  pip install ax-platform     # Meta的自适应实验
