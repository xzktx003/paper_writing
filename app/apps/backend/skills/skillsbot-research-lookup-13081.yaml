  ## 总结

  此技能作为主要研究接口，具有智能双后端路由：

  - **Parallel Chat API**（默认，`core` 模型）：任何主题的全面、多源研究
  - **Perplexity sonar-pro-search**：仅学术特定论文搜索
  - **自动路由**：检测学术查询并适当路由
  - **手动覆盖**：需要时强制任何后端
  - **补充性**：与 `parallel-web` 技能一起用于网络搜索和 URL 提取
