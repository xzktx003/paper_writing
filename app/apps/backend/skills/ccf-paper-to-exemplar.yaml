content: |
  # CCF Paper To Exemplar

  ## Overview
  Analyzes published papers in PDF format and extracts reusable writing exemplars. Identifies structural patterns, rhetorical moves, and venue-specific writing conventions.

  ## Output
  - Exemplar card with key patterns
  - Writing pattern summary
  - Venue-tagged reusable snippets
  - Writer-usable index entries
