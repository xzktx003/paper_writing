  ### 9. 期刊特定格式化

  使手稿适应期刊要求：

  - 遵循作者指南以结构、长度和格式
  - 应用期刊特定引用风格
  - 满足图表规格（分辨率、文件格式、尺寸）
  - 包括必需声明（资助、利益冲突、数据可用性、伦理批准）
  - 遵守每个部分的字数限制
  - 格式化根据模板要求（当提供时）

  ### 10. 领域特定语言和术语

  使语言、术语和约定适应特定的科学学科。每个领域都有已建立的词汇、首选措辞和领域特定约定，以向目标受众发出专业信号并确保清晰度。

  **识别领域特定语言约定：**

  - 审查目标期刊中近期高影响力论文使用的术语
  - 注意领域特定缩写、单位和符号系统
  - 识别首选术语（例如，“参与者” vs. “受试者”，“化合物” vs. “药物”，“标本” vs. “样本”）
  - 观察方法、生物体或技术通常如何描述

  **生物医学和临床科学：**

  - 使用精确解剖和临床术语（例如，在正式写作中使用“心肌梗死”，而不是“心脏病发作”）
  - 遵循标准化疾病命名法（ICD、DSM、SNOMED-CT）
  - 使用通用名指定药物名，品牌名在括号中（如果需要）
  - 临床研究使用“患者”，社区为基础的研究使用“参与者”
  - 遵循人类基因组变异协会（HGVS）命名法用于遗传变异
  - 用标准单位（大多数国际期刊使用SI单位）报告实验室值

  **分子生物学和遗传学：**

  - 基因符号使用斜体（例如，_TP53_），蛋白质使用常规字体（例如，p53）
  - 遵循物种特定基因命名法（人类大写：_BRCA1_；鼠类句首大写：_Brca1_）
  - 首次提及指定生物全名，然后使用接受缩写（例如，_Escherichia coli_，然后_E. coli_）
  - 使用标准遗传符号（例如，+/+, +/-, -/-用于基因型）
  - 为分子技术使用已建立术语（例如，“定量PCR”或“qPCR”，而不是“实时PCR”）

  **化学和药物科学：**

  - 遵循IUPAC命名法用于化学化合物
  - 新颖化合物使用系统名，著名物质使用通用名
  - 使用标准符号指定化学结构（例如，数据库的SMILES、InChI）
  - 用适当单位报告浓度（mM、μM、nM，或% w/v、v/v）
  - 使用接受反应命名法描述合成路线
  - 一致使用术语如“生物利用度”、“药代动力学”、“IC50”与领域定义

  **生态学和环境科学：**

  - 物种使用二项命名法（斜体：_Homo sapiens_）
  - 首次物种提及时指定分类学权威（当相关）
  - 使用标准化栖息地和生态系统分类
  - 一致使用生态学指标术语（例如，“物种丰富度”、“香农多样性指数”）
  - 用领域标准术语描述采样方法（例如，“样线”、“样方”、“标记-重捕获”）

  **物理学和工程学：**

  - 一致遵循SI单位，除非领域约定另有规定
  - 使用物理量的标准符号（标量 vs. 向量、张量）
  - 为现象使用已建立术语（例如，“量子纠缠”、“层流”）
  - 当相关时用型号和制造商指定设备
  - 使用与领域标准一致的数学符号（例如，ℏ用于约化普朗克常数）

  **神经科学：**

  - 使用标准化脑区命名法（例如，参考Allen Brain Atlas等图集）
  - 使用已建立立体定向系统指定脑区坐标
  - 遵循神经术语约定（例如，在正式写作中使用“动作电位”，而不是“脉冲”）
  - 基于测量方法适当使用“神经活动”、“神经元放电”、“脑激活”
  - 用适当特异性描述记录技术（例如，“全细胞膜片钳”、“细胞外记录”）

  **社会和行文科学：**

  - 在适当时使用以人为本的语言（例如，“精神分裂症患者”，而不是“精神分裂症患者”）
  - 使用标准化心理结构和验证评估名称
  - 遵循APA指南减少语言偏见
  - 使用已建立术语指定理论框架
  - 人类研究使用“参与者”而不是“受试者”

  **一般原则：**

  **匹配受众专业知识：**

  - 对于专业期刊：自由使用领域特定术语，仅定义高度专业化或新颖术语
  - 对于广泛影响期刊（例如，《自然》、《科学》）：定义更多技术术语，为专业概念提供上下文
  - 对于跨学科受众：平衡精确性和可访问性，首次使用时定义术语

  **战略性定义技术术语：**

  - 首次使用时定义缩写：“信使RNA（mRNA）”
  - 当为更广泛受众写作时，为专业技术提供简要解释
  - 避免过度定义目标受众熟知的术语（表明不熟悉领域）
  - 如果不可避免多个专业术语，创建词汇表

  **保持一致性：**

  - 整个过程中对相同概念使用相同术语（不要交替使用“药物”、“药物”和“药品”）
  - 遵循一致的缩写系统（首次定义后决定使用“PCR”或“聚合酶链反应”）
  - 整个过程中应用相同的命名法系统（特别是基因、物种、化学品）

  **避免领域混合错误：**

  - 不要为基础科学使用临床术语（例如，不要称小鼠为“患者”）
  - 避免使用口语或过于通用术语代替精确领域术语
  - 不要在不确定适当用法时从相邻领域借用术语

  **验证术语使用：**

  - 咨询领域特定风格指南和命名法资源
  - 检查目标期刊中近期论文如何使用的术语
  - 使用领域特定数据库和本体（例如，Gene Ontology、MeSH术语）
  - 当不确定时，引用一个建立术语的关键参考文献

  ### 11. 要避免的常见陷阱

  **主要拒绝原因：**

  1. 不适当、不完整或描述不足的统计
  2. 对结果的过度解释或未支持结论
  3. 描述不佳的方法影响可重复性
  4. 小、偏见或不适当样本
  5. 写作质量差或难跟文本
  6. 不足的文献回顾或上下文
  7. 不清晰或设计差的图表
  8. 未遵循报告指南

  **写作质量问题：**

  - 不适当混合时态（方法/结果使用过去时，已知事实使用现在时）
  - 过多行话或未定义缩写
  - 破坏逻辑流的段落中断
  - 部分之间缺少过渡
  - 不一致符号或术语

  ## 手稿开发工作流

  **阶段1：规划**

  1. 识别目标期刊并审查作者指南
  2. 确定适用报告指南（CONSORT、STROBE等）
  3. 勾勒手稿结构（通常IMRAD）
  4. 将图表规划为论文的支柱

  **阶段2：草拟**（对每个部分使用两阶段写作过程）

  1. 从图表开始（核心数据故事）
  2. 对于以下每个部分，遵循两阶段过程：
     - **首先：** 使用研究查找创建带项目符号的大纲
     - **其次：** 将项目符号转换为带流畅散文的完整段落
  3. 撰写方法（通常最容易首起草）
  4. 草拟结果（客观描述图表）
  5. 撰写讨论（解释发现）
  6. 撰写引言（设置研究问题）
  7. 撰写摘要（综合完整故事）
  8. 创建标题（简洁和描述性）

  **记住：** 项目符号仅用于规划——最终手稿必须是完整段落。

  **阶段3：修订**

  1. 检查整个过程中的逻辑流和“红线”
  2. 验证术语和符号的一致性
  3. 确保图表自解释
  4. 确认遵循报告指南
  5. 验证所有引用准确并正确格式化
  6. 检查每个部分的字数
  7. 校对语法、拼写和清晰度

  **阶段4：最终准备**

  1. 根据期刊要求格式化
  2. 准备补充材料
  3. 撰写强调意义的封面信
  4. 完成提交清单
  5. 收集所有必需声明和表格

  ## 与其他科学技能集成

  此技能有效配合：

  - **数据分析技能：** 用于生成报告的结果
  - **统计分析：** 用于确定适当的统计呈现
  - **文献回顾技能：** 用于背景研究
  - **图表创建工具：** 用于开发出版质量可视化
  - **场地模板技能：** 用于场地特定写作风格和格式化（期刊手稿）
  - **scientific_report.sty：** 用于专业报告、白皮书和技术文档

  ### 专业报告 vs. 期刊手稿

  **选择正确的格式化方法：**

  | 文档类型         | 格式化方法                       |
  | ---------------- | -------------------------------- |
  | 期刊手稿         | 使用`venue-templates`技能        |
  | 会议论文         | 使用`venue-templates`技能        |
  | 研究报告         | 使用`scientific_report.sty`（此技能） |
  | 白皮书           | 使用`scientific_report.sty`（此技能） |
  | 技术报告         | 使用`scientific_report.sty`（此技能） |
  | 资助报告         | 使用`scientific_report.sty`（此技能） |

  ### 场地特定写作风格

  **在特定场地写作前，咨询场地模板技能以获取写作风格指南：**

  不同场地有显著不同的写作期望：

  - **《自然》/《科学》：** 可访问、故事驱动、广泛意义
  - **Cell Press：** 机制深度、图形摘要、亮点
  - **医学期刊（NEJM、《柳叶刀》）：** 结构化摘要、证据语言
  - **ML会议（NeurIPS、ICML）：** 贡献项目符号、消融研究
  - **CS会议（CHI、ACL）：** 领域特定约定

  场地模板技能提供：

  - `venue_writing_styles.md`：主要风格比较
  - 场地特定指南：`nature_science_style.md`、`cell_press_style.md`、`medical_journal_styles.md`、`ml_conference_style.md`、`cs_conference_style.md`
  - `reviewer_expectations.md`：每个场地审稿人期待什么
  - `assets/examples/`中的写作示例

  **工作流：** 首先使用此技能用于一般科学写作原则（IMRAD、清晰度、引用），然后咨询场地模板以进行场地特定风格适应。

