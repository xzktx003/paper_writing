  # 科学写作

  ## 概述

  **这是深度研究和写作工具的核心技能**——结合AI驱动的深度研究和格式良好的书面输出。每个生成的文档都基于全面的文献搜索和通过研究查找技能验证的引用。

  科学写作是一种以精确和清晰度交流研究的过程。使用IMRAD结构、引用格式（APA/AMA/Vancouver）、图表和报告指南（CONSORT/STROBE/PRISMA）撰写手稿。将此技能应用于研究论文和期刊提交。

  **关键原则：始终使用完整的段落和流畅的散文撰写。切勿在最终手稿中提交项目符号。** 使用两阶段过程：首先通过研究查找创建带关键点的部分大纲，然后将这些大纲转换为完整的段落。

  ## 何时使用此技能

  此技能应在以下情况使用：

  - 撰写或修订科学手稿的任何部分（摘要、引言、方法、结果、讨论）
  - 使用IMRAD或其他标准格式构建研究论文
  - 格式化特定风格的引用和参考文献（APA、AMA、Vancouver、Chicago、IEEE）
  - 创建、格式化或改进图表和数据可视化
  - 应用研究特定报告指南（CONSORT用于试验、STROBE用于观察性研究、PRISMA用于综述）
  - 草拟满足期刊要求的摘要（结构化或非结构化）
  - 为特定期刊准备提交手稿
  - 提高写作清晰度、简洁性和精确性
  - 确保正确使用领域特定术语和命名法
  - 处理审稿人意见和修订手稿

  ## 使用科学示意图进行视觉增强

  **⚠️ 强制要求：每篇科学论文必须包括一个图形摘要，外加1-2个使用科学示意图技能生成的额外AI生成图。**

  这不是可选的。没有视觉元素的科学论文是不完整的。在最终确定任何文档前：

  1. **始终首先生成一个图形摘要** 作为第一个视觉元素
  2. 至少生成一个额外的示意图或图表，使用科学示意图技能
  3. 建议全面论文使用3-4个总图（图形摘要 + 方法流程图 + 结果可视化 + 概念图）

  ### 图形摘要（必需）

  **每篇科学撰写必须包括一个图形摘要。** 这是一个可视化总结您的论文的图像：

  - 出现在文本摘要之前或之后
  - 在一个图像中捕捉整个论文的关键信息
  - 适合期刊目录显示
  - 使用横向方向（通常为1200x600像素）

  **首先生成图形摘要：**

  ```bash
  python scripts/generate_schematic.py "[论文标题]的图形摘要：[简要描述显示从输入 → 方法 → 关键发现 → 结论的工作流]" -o figures/graphical_abstract.png
  ```

  **图形摘要要求：**

  - **内容：** 可视化总结显示工作流、关键方法、主要发现和结论
  - **风格：** 干净、专业，适合期刊目录
  - **元素：** 包括3-5个关键步骤/概念，带有连接箭头或流程
  - **文本：** 最小标签，大号可读字体
  - 日志：`[HH:MM:SS] 生成：论文摘要的图形摘要`

  ### 额外图表（广泛生成）

  **⚠️ 关键：在所有文档中广泛使用科学示意图和生成图像技能。**

  每个文档都应丰富地插图。广泛生成图表——如有疑问，添加一个视觉元素。

  **最低图表要求：**

  | 文档类型         | 最低 | 推荐 |
  | ---------------- | ---- | ---- |
  | 研究论文         | 5    | 6-8  |
  | 文献综述         | 4    | 5-7  |
  | 市场研究         | 20   | 25-30 |
  | 演示文稿         | 1/幻灯片 | 1-2/幻灯片 |
  | 海报             | 6    | 8-10 |
  | 资助申请         | 4    | 5-7  |
  | 临床报告         | 3    | 4-6  |

  **广泛使用科学示意图用于技术图表：**

  ```bash
  python scripts/generate_schematic.py "您的图表描述" -o figures/output.png
  ```

  - 研究设计和方法流程图（CONSORT、PRISMA、STROBE）
  - 概念框架图
  - 实验工作流图示
  - 数据分析管道图
  - 生物通路或机制图
  - 系统架构可视化
  - 神经网络架构
  - 决策树、算法流程图
  - 比较矩阵、时间线图
  - 任何受益于示意图可视化的技术概念

  **广泛使用生成图像用于视觉内容：**

  ```bash
  python scripts/generate_image.py "您的图像描述" -o figures/output.png
  ```

  - 概念的真实感插图
  - 医学/解剖学插图
  - 环境/生态场景
  - 设备和实验室设置可视化
  - 艺术可视化、信息图
  - 封面图像、标题图形
  - 产品原型可视化
  - 任何增强理解或参与度的视觉元素

  AI将自动：

  - 创建出版质量的图像，带有正确格式化
  - 通过多次迭代审查和改进
  - 确保可访问性（色盲友好、高对比度）
  - 将输出保存在figures/目录中

  **如有疑问，生成一个图表：**

  - 复杂概念 → 生成示意图
  - 数据讨论 → 生成可视化
  - 过程描述 → 生成流程图
  - 比较 → 生成比较图
  - 读者受益 → 生成视觉元素

  有关详细指导，请参考科学示意图和生成图像技能文档。

  ---

  ## 核心能力

  ### 1. 手稿结构和组织

  **IMRAD格式：** 指导论文通过标准的引言、方法、结果和讨论结构，用于大多数科学学科。包括：

  - **引言：** 建立研究背景，识别差距，陈述目标
  - **方法：** 详细描述研究设计、人群、程序和分析方法
  - **结果：** 客观呈现发现，无解释
  - **讨论：** 解释结果，承认局限性，提出未来方向

  有关IMRAD结构的详细指导，请参考`references/imrad_structure.md`。

  **替代结构：** 支持学科特定格式，包括：

  - 综述文章（叙述性、系统性、范围性）
  - 病例报告和病例系列
  - 荟萃分析和合并分析
  - 理论/建模论文
  - 方法论文和协议

  ### 2. 部分特定写作指导

  **摘要撰写：** 撰写简洁、独立的摘要（100-250词），捕捉论文的目的、方法、结果和结论。支持结构化摘要（带标签部分）和非结构化单段落格式。

  **引言开发：** 构建引人入胜的引言：

  - 建立研究问题的重要性
  - 系统回顾相关文献
  - 识别知识差距或争议
  - 陈述清晰的研究问题或假设
  - 解释研究的新颖性和意义

  **方法文档：** 确保可重复性：

  - 详细参与者/样本描述
  - 清晰程序文档
  - 统计方法带论证
  - 设备和材料规格
  - 伦理批准和同意声明

  **结果呈现：** 呈现发现：

  - 从主要到次要结果的逻辑流
  - 与图表集成
  - 统计显著性带效应大小
  - 客观报告无解释

  **讨论构建：** 综合发现：

  - 将结果与研究问题关联
  - 与现有文献比较
  - 诚实承认局限性
  - 提出机制解释
  - 建议实际含义和未来研究

  ### 3. 引用和参考文献管理

  跨学科正确应用引用风格。有关全面风格指南，请参考`references/citation_styles.md`。

  **主要引用风格：**

  - **AMA（美国医学协会）：** 上标编号引用，常见于医学
  - **Vancouver：** 方括号内编号引用，生物医学标准
  - **APA（美国心理学会）：** 作者-日期文本内引用，常见于社会科学
  - **Chicago：** 注释-参考书目或作者-日期，人文和科学
  - **IEEE：** 方括号编号，工程和计算机科学

  **最佳实践：**

  - 尽可能引用主要来源
  - 包括近期文献（活跃领域最近5-10年）
  - 平衡引言和讨论中的引用分布
  - 验证所有引用与原始来源
  - 使用参考文献管理软件（Zotero、Mendeley、EndNote）

  ### 4. 图表

  创建增强理解的有效数据可视化。有关详细最佳实践，请参考`references/figures_tables.md`。

  **何时使用表格 vs. 图表：**

  - **表格：** 精确数值数据、复杂数据集、需要精确值的多个变量
  - **图表：** 趋势、模式、关系、最佳视觉理解的比较

  **设计原则：**

  - 使每个表格/图自解释，带有完整标题
  - 在所有显示项目中使用一致的格式和术语
  - 用单位标记所有轴、列和行
  - 包括样本大小（n）和统计标注
  - 遵循“每1000词一个表格/图”准则
  - 避免在文本、表格和图表之间重复信息

  **常见图表类型：**

  - 柱状图：比较离散类别
  - 线图：显示随时间趋势
  - 散点图：显示相关性
  - 箱线图：显示分布和异常值
  - 热图：可视化矩阵和模式

  ### 5. 按研究类型的报告指南

  通过遵循已建立报告标准确保完整性和透明度。有关详细指南详情，请参考`references/reporting_guidelines.md`。

  **关键指南：**

  - **CONSORT：** 随机对照试验
  - **STROBE：** 观察性研究（队列、病例对照、横断面）
  - **PRISMA：** 系统性综述和荟萃分析
  - **STARD：** 诊断准确性研究
  - **TRIPOD：** 预测模型研究
  - **ARRIVE：** 动物研究
  - **CARE：** 病例报告
  - **SQUIRE：** 质量改进研究
  - **SPIRIT：** 临床试验研究协议
  - **CHEERS：** 经济评估

  每个指南提供清单，确保所有关键方法元素被报告。

  ### 6. 写作原则和风格

  应用基本科学写作原则。有关详细指导，请参考`references/writing_principles.md`。

  **清晰度：**

  - 使用精确、无歧义语言
  - 在首次使用时定义技术术语和缩写
  - 保持段落内和段落间的逻辑流
  - 在适当情况下使用主动语态以提高清晰度

  **简洁性：**

  - 消除冗余词和短语
  - 偏好较短句子（平均15-20词）
  - 移除不必要的修饰语
  - 严格遵守字数限制

  **准确性：**

  - 以适当精度报告精确值
  - 在整个过程中使用一致的术语
  - 区分观察和解释
  - 适当承认不确定性

  **客观性：**

  - 无偏见呈现结果
  - 避免夸大发现或含义
  - 承认冲突证据
  - 保持专业、中立语气

  ### 7. 写作过程：从大纲到完整段落

  **关键：始终使用完整段落撰写，切勿在科学论文中提交项目符号。**

  科学论文必须用完整、流畅的散文撰写。使用这种两阶段方法进行有效写作：

  **阶段1：用关键点创建部分大纲**

  当开始新部分时：

  1. 使用研究查找技能收集相关文献和数据
  2. 创建一个结构化大纲，带项目符号标记：
     - 要呈现的主要论点或发现
     - 要引用的关键研究
     - 要包括的数据点和统计
     - 逻辑流和组织
  3. 这些项目符号作为脚手架——它们不是最终手稿

  **示例大纲（引言部分）：**

  ```
  - 背景：AI在药物发现中受到关注
    * 引用近期综述（Smith 2023, Jones 2024）
    * 传统方法缓慢且昂贵
  - 差距：在罕见疾病中的应用有限
    * 仅2项先前研究（Lee 2022, Chen 2023）
    * 小数据集仍然是一个挑战
  - 我们的方法：从常见疾病中迁移学习
    * 新颖架构结合X和Y
  - 研究目标：在3个罕见疾病数据集上验证
  ```

  **阶段2：将关键点转换为完整段落**

  大纲完成后，将每个项目符号扩展为适当的散文：

  1. **将项目符号转换为完整句子** 带主语、动词和宾语
  2. **添加句子和想法之间的过渡**（然而、此外、相比之下、随后）
  3. **自然地整合引用**在句子内，而不是列表
  4. **用上下文和解释扩展**省略的项目符号
  5. **确保逻辑流**在每段内从一个句子到下一个
  6. **变化句子结构**以保持读者参与

  **示例转换为散文：**

  ```
  在过去的十年中，人工智能方法在药物发现管道中获得了显著关注（Smith，2023；Jones，2024）。虽然这些计算方法显示出加速治疗候选物识别的潜力，但传统实验方法仍然缓慢且资源密集，通常需要多年的实验室工作和大量财务投资。然而，AI在罕见疾病中的应用有限，仅有两项先前研究展示了概念验证结果（Lee，2022；Chen，2023）。主要障碍是影响小患者群体的条件的训练数据稀缺。

  为解决这一挑战，我们开发了一种迁移学习方法，利用来自充分表征的常见疾病的知识来预测罕见条件的治疗靶点。我们的新颖神经网络架构结合了卷积层用于分子特征提取和注意力机制用于蛋白质-配体相互作用建模。本研究的目标是在三个独立的罕见疾病数据集上验证我们的方法，评估预测准确性和结果的生物可解释性。
  ```

  **大纲和最终文本之间的关键差异：**

  | 大纲（规划阶段）      | 最终手稿                     |
  | --------------------- | ---------------------------- |
  | 项目符号和片段        | 完整句子和段落               |
  | 电报式笔记            | 带上下文的完整解释           |
  | 引用列表              | 引用整合到散文中             |
  | 缩写想法              | 带过渡的发展论点             |
  | 仅供您使用            | 用于出版和同行评审           |

  **要避免的常见错误：**

  - ❌ **切勿**在最终手稿中留下项目符号
  - ❌ **切勿**提交列表代替段落
  - ❌ **不要**在结果或讨论部分使用编号或项目符号列表（除非特定情况，如研究假设或纳入标准）
  - ❌ **不要**撰写句子片段或不完整想法
  - ✅ **要**仅在方法中使用偶尔列表（例如，纳入/排除标准、材料列表）
  - ✅ **要**确保每个部分作为连接的散文流动
  - ✅ **要**大声朗读段落以检查自然流

  **当列表可接受时（有限情况）：**

  列表仅出现在科学论文的特定上下文中：

  - **方法：** 纳入/排除标准、材料和试剂、参与者特征
  - **补充材料：** 扩展协议、设备列表、详细参数
  - **切勿在：** 摘要、引言、结果、讨论、结论

  **摘要格式规则：**

  - ❌ **切勿**使用带标签部分（背景：、方法：、结果：、结论：）
  - ✅ **始终**撰写为带自然过渡的流畅段落
  - 例外：仅在期刊作者指南明确要求时使用结构化格式

  **与研究查找集成：**

  研究查找技能对于阶段1（创建大纲）至关重要：

  1. 使用研究查找搜索相关论文
  2. 提取关键发现、方法和数据
  3. 将发现组织为大纲中的项目符号
  4. 然后在阶段2将大纲转换为完整段落

  这种两阶段过程确保您：

  - 系统地收集和组织信息
  - 在写作前创建逻辑结构
  - 生成经过润色、准备出版的散文
  - 专注于叙事流

  ### 8. 专业报告格式化（非期刊文档）

  对于非期刊手稿的研究报告、技术报告、白皮书和其他专业文档，使用`scientific_report.sty` LaTeX样式包，以获得润色、专业外观。

  **何时使用专业报告格式化：**

  - 研究报告和技术报告
  - 白皮书和政策简报
  - 资助报告和进展报告
  - 行业报告和技术文档
  - 内部研究摘要
  - 可行性研究和项目可交付成果

  **何时不使用（使用场地特定格式化替代）：**

  - 期刊手稿 → 使用`venue-templates`技能
  - 会议论文 → 使用`venue-templates`技能
  - 学术论文 → 使用机构模板

  **`scientific_report.sty`样式包提供：**

  | 功能               | 描述                                                         |
  | ------------------ | ------------------------------------------------------------ |
  | 字体               | Helvetica字体家族，现代、专业外观                           |
  | 配色方案           | 专业蓝色、绿色和强调色                                       |
  | 框环境             | 带颜色框用于关键发现、方法、建议、局限性                     |
  | 表格               | 交替行颜色、专业标题                                         |
  | 图表               | 一致标题格式化                                               |
  | 科学命令           | p值、效应大小、置信区间的快捷方式                           |

  **用于内容组织的框环境：**

  ```latex
  % 关键发现（蓝色）- 用于主要发现
  \begin{keyfindings}[标题]
  带关键发现和统计的内容。
  \end{keyfindings}

  % 方法学（绿色）- 用于方法亮点
  \begin{methodology}[研究设计]
  方法和程序描述。
  \end{methodology}

  % 建议（紫色）- 用于行动项
  \begin{recommendations}[临床含义]
  \begin{enumerate}
      \item 特定建议1
      \item 特定建议2
  \end{enumerate}
  \end{recommendations}

  % 局限性（橙色）- 用于警告和注意事项
  \begin{limitations}[研究局限性]
  局限性描述及其含义。
  \end{limitations}
  ```

  **专业表格格式化：**

  ```latex
  \begin{table}[htbp]
  \centering
  \caption{结果摘要}
  \begin{tabular}{@{}lccc@{}}
  \toprule
  \textbf{变量} & \textbf{处理} & \textbf{控制} & \textbf{p} \\
  \midrule
  结果1 & \meansd{42.5}{8.3} & \meansd{35.2}{7.9} & <.001\sigthree \\
  \rowcolor{tablealt} 结果2 & \meansd{3.8}{1.2} & \meansd{3.1}{1.1} & .012\sigone \\
  结果3 & \meansd{18.2}{4.5} & \meansd{17.8}{4.2} & .58\signs \\
  \bottomrule
  \end{tabular}

  {\small \siglegend}
  \end{table}
  ```

  **科学符号命令：**

  | 命令                       | 输出               | 目的                       |
  | -------------------------- | ------------------ | -------------------------- |
  | `\pvalue{0.023}`           | _p_ = 0.023        | P值                       |
  | `\psig{< 0.001}`           | **_p_ = < 0.001**  | 显著p值（粗体）           |
  | `\CI{0.45}{0.72}`          | 95% CI [0.45, 0.72] | 置信区间                   |
  | `\effectsize{d}{0.75}`     | d = 0.75           | 效应大小                   |
  | `\samplesize{250}`         | _n_ = 250          | 样本大小                   |
  | `\meansd{42.5}{8.3}`       | 42.5 ± 8.3         | 带SD的均值                 |
  | `\sigone`, `\sigtwo`, `\sigthree` | \*, **, \***      | 显著性星号                 |

  **开始：**

  ```latex
  \documentclass[11pt,letterpaper]{report}
  \usepackage{scientific_report}

  \begin{document}
  \makereporttitle
      {报告标题}
      {副标题}
      {作者姓名}
      {机构}
      {日期}

  % 您的带专业格式的内容
  \end{document}
  ```

  **编译：** 使用XeLaTeX或LuaLaTeX以获得正确的Helvetica字体渲染：

  ```bash
  xelatex report.tex
  ```

