  # 研究伦理与IRB技能

  导航IRB流程，确保社会科学各学科人类受试者研究的伦理实践。

  ## 概述

  研究伦理与IRB技能能够导航机构审查委员会流程，制定知情同意程序，维护保密性，并在社会科学各学科的人类受试者研究中遵循伦理实践。

  ## 能力

  ### IRB导航
  - 协议准备
  - 豁免判定
  - 快速审查
  - 全体委员会审查
  - 修正程序

  ### 知情同意
  - 同意文件制定
  - 理解度验证
  - 持续同意
  - 豁免条件
  - 特殊人群

  ### 保密性
  - 数据去标识化
  - 安全存储
  - 访问控制
  - 保密证书
  - 数据共享协议

  ### 风险评估
  - 风险识别
  - 风险最小化
  - 效益评估
  - 弱势群体
  - 监测程序

  ### 伦理实践
  - 研究诚信
  - 利益冲突
  - 数据管理
  - 发表伦理
  - 社区参与

  ## 使用指南

  ### 何时使用
  - 规划人类受试者研究时
  - 准备IRB提交材料时
  - 制定同意程序时
  - 以伦理方式管理数据时
  - 处理伦理问题时

  ### 最佳实践
  - 尽早规划伦理问题
  - 详尽记录
  - 保护参与者
  - 保持透明度
  - 不确定时寻求指导

  ### 集成点
  - 调查设计与实施技能
  - 访谈与引导技能
  - 民族志研究技能
  - 定性分析技能

  ## 参考文献

  - 所有研究流程
  - 研究伦理协调员智能体
