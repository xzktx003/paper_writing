  # 研究基金撰写

  ## 概述

  研究基金撰写是为联邦机构和基金会开发竞争性资金提案的过程。掌握NSF（国家科学基金会）、NIH（国家卫生研究院）、DOE（能源部）、DARPA（国防高级研究计划局）和台湾NSTC（国家科学技术委员会）提交的机构特定要求、评审标准、叙述结构、预算准备和合规性。

  **关键原则：基金提案是具有说服力的文档，必须同时展示科学严谨性、创新性、可行性和更广泛影响。** 每个机构都有不同的优先事项、评审标准、格式要求和战略目标，必须加以解决。

  ## 何时使用此技能

  此技能应在以下情况下使用：

  - 为NSF、NIH、DOE、DARPA或NSTC项目撰写研究提案
  - 准备项目描述、具体目标或技术叙述
  - 开发更广泛影响或重要性陈述
  - 创建研究时间线和里程碑计划
  - 准备预算论证和人员分配计划
  - 回应项目征集或资金公告
  - 在重新提交时处理评审意见
  - 规划多机构合作提案
  - 撰写初步数据或可行性部分
  - 准备个人简历、履历或设施描述

  ## 使用科学示意图进行视觉增强

  **⚠️ 强制要求：每个研究基金提案必须包含至少1-2个使用科学示意图技能生成的AI生成图。**

  这不是可选的。没有视觉元素的基金提案不完整且竞争力较低。在最终确定任何文档之前：

  1. 至少生成一个示意图或图表（例如，项目时间线、方法流程图或概念框架）
  2. 对于综合性提案，推荐2-3个图（研究工作流程、甘特图、初步数据可视化）

  **如何生成图：**

  - 使用**科学示意图**技能生成AI驱动的出版物质量图
  - 简单地用自然语言描述您想要的图
  - Nano Banana Pro将自动生成、审查和优化示意图

  **如何生成示意图：**

  ```bash
  python scripts/generate_schematic.py "您的图描述" -o figures/output.png
  ```

  AI将自动：

  - 使用适当格式创建出版物质量的图像
  - 通过多次迭代进行审查和优化
  - 确保可访问性（色盲友好、高对比度）
  - 将输出保存在figures/目录中

  **何时添加示意图：**

  - 研究方法和工作流程图
  - 项目时间线甘特图
  - 概念框架插图
  - 系统架构图（用于技术提案）
  - 实验设计流程图
  - 更广泛影响活动图
  - 合作网络图
  - 任何受益于可视化的复杂概念

  有关创建示意图的详细指导，请参阅科学示意图技能文档。

