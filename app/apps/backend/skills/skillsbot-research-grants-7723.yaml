  ## 机构特定概述

  ### NSF（国家科学基金会）

  **使命**：促进科学进步，增强国家健康、繁荣和福利

  **关键特征**：

  - 智力价值 + 更广泛影响（同等权重）
  - 15页项目描述限制（大多数项目）
  - 强调教育、多样性和社会效益
  - 鼓励合作研究
  - 强调开放数据和开放科学
  - 由小组和临时评审员进行的优点评审过程

  ### NIH（国家卫生研究院）

  **使命**：增强健康、延长寿命、减少疾病和残疾

  **关键特征**：

  - 具体目标（1页） + 研究策略（R01为12页）
  - 重要性、创新性、方法作为核心评审标准
  - 通常需要R01的初步数据
  - 强调严谨性、可重复性和临床相关性
  - 大多数R01使用模块化预算（25万美元增量）
  - 多次重新提交机会

  ### DOE（能源部）

  **使命**：通过能源、环境和核挑战确保美国的安全和繁荣

  **关键特征**：

  - 专注于能源、气候、计算科学、基础能源科学
  - 通常需要成本分担或行业合作
  - 强调国家实验室合作
  - 强大的计算和实验整合
  - 能源创新和商业化路径
  - 因办公室而异（ARPA-E、科学办公室、EERE等）

  ### DARPA（国防高级研究计划局）

  **使命**：为国家安全投资突破性技术

  **关键特征**：

  - 高风险、高回报的变革性研究
  - 专注于“DARPA-hard”问题（如果正确，谁在乎）
  - 强调原型、演示和过渡路径
  - 通常需要多个阶段（可行性、开发、演示）
  - 强大的项目管理和里程碑跟踪
  - 通常需要团队合作和协作
  - 因项目管理员和BAA（广泛机构公告）而异

  ### NSTC（国家科学技术委员会 - 台湾）

  **使命**：在台湾推进科学突破、工业应用和社会影响。

  **关键特征**：

  - **CM03表格**：核心技术提案格式。
  - **双语**：摘要需要中英文。
  - **创新与可行性**：主要评审焦点。
  - **初步数据**：对可信度非常关键。
  - **研究架构图**：为清晰度所需的强制性视觉元素。

  ## 研究提案的核心组件

  ### 1. 执行摘要 / 项目摘要 / 摘要

  每个提案都需要一个简洁的概述，向技术评审员和项目官员传达研究的基本要素。

  **目的**：提供一个独立的总结，捕捉研究愿景、重要性和方法

  **长度**：

  - NSF：1页（项目摘要，包括单独的概述、智力价值、更广泛影响）
  - NIH：30行（项目摘要/摘要）
  - DOE：因项目而异（通常1页）
  - DARPA：因项目而异（通常1-2页）

  **基本元素**：

  - 问题或研究问题的清晰陈述
  - 为何此问题重要（重要性、紧迫性、影响）
  - 新颖方法或创新
  - 预期成果和可交付成果
  - 团队资格
  - 更广泛影响或转化路径

  **写作策略**：

  - 以建立重要性的引人入胜的钩子开头
  - 使用可访问的语言（避免在开头句子中使用术语）
  - 陈述具体、可衡量的目标
  - 传达热情和信心
  - 确保每个句子都增加价值（无填充内容）
  - 以变革性愿景或影响陈述结束

  **避免的常见错误**：

  - 过于技术性或详细（保存给项目描述）
  - 未能阐明“为何现在”或“为何此团队”
  - 模糊的目标或成果
  - 忽视更广泛影响或重要性
  - 可适用于任何提案的通用陈述

  ### 2. 项目描述 / 研究策略

  核心技术叙述，详细展示研究计划。

  **结构因机构而异**：

  **NSF项目描述**（通常15页）：

  - 引言和背景
  - 研究目标和问题
  - 初步结果（如果适用）
  - 研究计划和方法
  - 时间线和里程碑
  - 更广泛影响（整合在整个或单独部分）
  - 先前NSF支持（如果适用）

  **NIH研究策略**（R01为12页）：

  - 重要性（为何问题重要）
  - 创新性（新颖和变革性内容）
  - 方法（详细研究计划）
    - 初步数据
    - 研究设计和方法
    - 预期成果
    - 潜在问题和替代方法

  **DOE项目叙述**（因项目而异）：

  - 背景和重要性
  - 技术方法和创新
  - 资格和经验
  - 设施和资源
  - 项目管理和时间线

  **DARPA技术卷**（因项目而异）：

  - 技术挑战和创新
  - 方法和方法论
  - 时间表和里程碑
  - 可交付成果和指标
  - 团队资格
  - 风险评估和缓解

  有关机构特定指导的详细信息，请参阅：

  - `references/nsf_guidelines.md`
  - `references/nih_guidelines.md`
  - `references/doe_guidelines.md`
  - `references/darpa_guidelines.md`
  - `references/nstc_guidelines.md`

  ### 3. 具体目标（NIH）或目标（NSF/DOE/DARPA）

  清晰、可测试的目标，构建研究计划。

  **NIH具体目标页**（1页）：

  - 开场段落：知识缺口和重要性
  - 长期目标和即时目标
  - 中心假设或研究问题
  - 2-4个带有子目标的具体目标
  - 预期成果和影响
  - 回报段落：为何这重要

  **每个目标的结构**：

  - 目标陈述（1-2句，以行动动词开头）
  - 理由（为何此目标，初步数据支持）
  - 工作假设（可测试的预测）
  - 方法摘要（简要方法概述）
  - 预期成果和解释

  **写作策略**：

  - 使目标独立但互补
  - 确保每个目标在时间线和预算内可实现
  - 提供足够细节以判断可行性
  - 包括应急计划或替代方法
  - 跨目标使用平行结构
  - 明确说明从每个目标中学到什么

  有关详细指导，请参阅`references/specific_aims_guide.md`。

  ### 4. 更广泛影响（NSF） / 重要性（NIH）

  阐明研究的社会、教育或转化价值。

  **NSF更广泛影响**（关键组件，与智力价值同等权重）：

  NSF明确评估更广泛影响。至少解决以下一个领域：

  1. **在促进教学、培训和学习的同时推进发现和理解**
     - 研究和教育的整合
     - 学生和博士后的培训
     - 课程开发
     - 教育材料和资源

  2. **扩大 underrepresented groups 的参与**
     - 招聘和保留策略
     - 与 minority-serving institutions 的合作
     - 对 underrepresented communities 的外展
     - 导师计划

  3. **增强研究和教育的基础设施**
     - 共享设施或仪器
     - 网络基础设施和数据资源
     - 社区范围的工具或数据库
     - 开源软件或方法

  4. **广泛传播以增强科学和技术理解**
     - 公众外展和科学传播
     - K-12教育计划
     - 博物馆展览或媒体参与
     - 政策简报或利益相关者参与

  5. **对社会的好处**
     - 经济影响或商业化
     - 健康、环境或国家安全好处
     - 知情决策
     - 劳动力发展

  **NSF更广泛影响的写作策略**：

  - 具体说明具体活动，而非模糊陈述
  - 提供更广泛影响活动的时间线和里程碑
  - 解释如何测量和评估影响
  - 连接到机构资源和现有计划
  - 通过初步努力或合作展示承诺
  - 与研究计划整合（而非附加）

  **NIH重要性**：

  - 解决重要问题或关键进展障碍
  - 改进科学知识、技术能力或临床实践
  - 潜在导致更好结果、干预或理解
  - 先前研究的严谨性
  - 与NIH使命和研究所优先事项对齐

  有关详细指导，请参阅`references/broader_impacts.md`。

  ### 5. 创新性和变革潜力

  阐明研究的创新、创造性和范式转变方面。

  **要突出的创新元素**：

  - **概念创新**：新框架、模型或理论
  - **方法创新**：新技术、方法或技术
  - **整合创新**：以新方式结合学科或方法
  - **转化创新**：从发现到应用的新路径
  - **规模创新**：前所未有的范围或分辨率

  **写作策略**：

  - 明确陈述创新内容（不要假设显而易见）
  - 解释为何当前方法不足
  - 描述您的创新如何克服限制
  - 提供创新可行的证据（初步数据、概念验证）
  - 区分渐进和变革性进展
  - 平衡创新与可行性（不要太冒险）

  **常见错误**：

  - 声称新颖性而未展示对先前工作的了解
  - 混淆“对我新”与“对领域新”
  - 过度承诺而无支持证据
  - 过于渐进（现有工作的微小变化）
  - 过于推测性（无成功路径）

  ### 6. 研究方法和手段

  详细描述如何进行研究。

  **基本组件**：

  - 整体研究设计和框架
  - 每个目标/任务的详细方法
  - 样本大小、统计功效和分析计划
  - 时间线和活动顺序
  - 数据收集、管理和分析
  - 质量控制和验证方法
  - 潜在问题和替代策略
  - 严谨性和可重复性措施

  **写作策略**：

  - 提供足够细节以实现可重复性和可行性评估
  - 使用副标题和图表改进组织
  - 证明方法和选择方法的合理性
  - 主动解决潜在限制
  - 包括展示可行性的初步数据
  - 展示您已思考研究过程
  - 平衡细节与可读性（使用补充材料处理广泛细节）

  **对于实验研究**：

  - 描述实验设计（控制、重复、盲法）
  - 指定材料、试剂和设备
  - 详细数据收集协议
  - 解释统计分析计划
  - 解决严谨性和可重复性

  **对于计算研究**：

  - 描述算法、模型和软件
  - 指定数据集和验证方法
  - 解释所需计算资源
  - 解决代码可用性和文档
  - 描述基准测试和性能指标

  **对于临床或转化研究**：

  - 描述研究人群和招募
  - 详细干预或治疗方案
  - 解释结果测量和评估
  - 解决监管批准（IRB、IND、IDE）
  - 描述临床试验设计和监控

  有关按学科的方法指导的详细信息，请参阅`references/research_methods.md`。

  ### 7. 初步数据和可行性

  证明研究可实现的，团队有能力的。

  **目的**：

  - 证明拟议方法可行
  - 展示团队具备必要专业知识
  - 展示获得所需资源
  - 减少评审员感知风险
  - 为拟议工作提供基础

  **包括的内容**：

  - 试点研究或概念验证结果
  - 方法开发或优化
  - 获得独特资源（样本、数据、合作者）
  - 团队相关出版物
  - 初步模型或模拟
  - 可行性评估或功效计算

  **NIH要求**：

  - R01申请通常需要大量初步数据
  - R21申请可能要求较低
  - 新研究者可能有较少的初步数据
  - 初步数据应直接支持拟议目标

  **NSF方法**：

  - 初步数据通常不如NIH常用
  - 对高风险或新颖方法可能重要
  - 可以加强竞争性项目的提案

  **写作策略**：

  - 展示支持您方法的最具说服力数据
  - 清晰连接初步数据与拟议目标
  - 承认限制以及拟议工作如何解决
  - 有效使用图表和数据可视化
  - 避免过度解释或夸大初步发现
  - 展示研究计划轨迹

  ### 8. 时间线、里程碑和管理计划

  证明项目规划良好，在拟议时间内可实现。

  **基本元素**：

  - 带有清晰里程碑的分阶段时间线
  - 逻辑顺序和依赖性
  - 每个活动的现实时间框架
  - 决策点和go/no-go标准
  - 风险缓解策略
  - 跨时间的资源分配
  - 多机构团队的协调计划

  **呈现格式**：

  - 显示重叠活动的甘特图
  - 按年分解活动
  - 季度里程碑和可交付成果
  - 带时间线和人员的任务表

  **写作策略**：

  - 现实地看待可完成的内容
  - 为意外延迟或挫折留出时间
  - 展示时间线与预算和人员对齐
  - 展示对监管时间线的理解（IRB、IACUC）
  - 包括传播和更广泛影响的时间
  - 解决如何监控和评估进展

  **DARPA强调**：

  - 对DARPA提案特别重要
  - 带有可衡量指标的技术里程碑
  - 季度可交付成果和报告
  - 基于阶段的结构，带有退出标准
  - 演示和过渡规划

  有关详细指导，请参阅`references/timeline_planning.md`。

  ### 9. 团队资格和合作

  证明团队具备成功所需的专业知识、经验和资源。

  **基本元素**：

  - PI资格和相关专业知识
  - Co-I和合作者角色和贡献
  - 研究领域跟踪记录
  - 团队互补专业知识
  - 机构支持和资源
  - 先前合作历史（如果适用）
  - 学生/博士后的导师和培训计划

  **写作策略**：

  - 突出最相关出版物和成就
  - 清晰定义角色和责任
  - 展示团队组成是必要的（而非仅方便）
  - 展示成功的先前合作
  - 解决团队将如何管理和协调
  - 解释机构承诺和支持

  **个人简历 / CVs**：

  - 遵循机构特定格式（NSF、NIH、DOE、DARPA不同）
  - 突出最相关出版物和成就
  - 包括协同活动和合作
  - 展示轨迹和生产力
  - 解决任何职业差距或中断

  **合作信函**：

  - 具体承诺和贡献
  - 展示真正的合作
  - 包括资源共享或访问协议
  - 签名并使用信头

  有关详细指导，请参阅`references/team_building.md`。

  ### 10. 预算和预算论证

  开发符合拟议工作和机构指南的现实预算。

  **预算类别**（典型）：

  - **人员**：PI、co-Is、博士后、学生、员工的工资和福利
  - **设备**：项目 > $5,000（因机构而异）
  - **旅行**：会议、合作、实地考察
  - **材料和供应品**：消耗品、试剂、软件
  - **其他直接成本**：出版费用、参与者激励、咨询
  - **间接成本（F&A）**：机构间接费用（费率不同）
  - **子奖励**：合作机构成本

  **机构特定考虑**：

  **NSF**：

  - 需要完整预算论证
  - 通常不需要成本分担（但可能加强提案）
  - 教员最多2个月夏季工资
  - 鼓励研究生支持

  **NIH**：

  - 每年直接成本≤25万美元的模块化预算（R01）
  - 大于25万美元或复杂奖的详细预算
  - 适用工资上限（2024年约221,900美元）
  - 大多数PI限制为1个月（8.33% FTE）

  **DOE**：

  - 通常需要成本分担（尤其是ARPA-E）
  - 带季度分解的详细预算
  - 需要机构承诺信函
  - 国家实验室合作预算单独

  **DARPA**：

  - 按阶段和任务的详细预算
  - 需要大型采购的支持成本数据
  - 通常需要成本加或固定价格结构
  - 项目会议旅行预算

  **预算论证写作**：

  - 根据研究计划证明每个项目
  - 解释人员努力百分比
  - 描述特定设备及为何必要
  - 证明旅行（会议、合作）
  - 解释咨询角色和费率
  - 展示预算如何对齐时间线

  有关详细预算指导，请参阅`references/budget_preparation.md`。

  ## 机构评审标准

  了解提案如何评估对于撰写竞争性申请至关重要。

  ### NSF评审标准

  **智力价值**（主要）：

  - 拟议活动推进知识的潜力是什么？
  - 拟议活动的构思和组织如何？
  - 是否有足够的资源访问？
  - 个人、团队或机构进行拟议活动的资格如何？

  **更广泛影响**（同等重要）：

  - 拟议活动造福社会的潜力是什么？
  - 提案在多大程度上以有意义的方式解决更广泛影响？

  **额外考虑**：

  - 研究和教育的整合
  - 多样性和包容性
  - 先前NSF支持的结果（如果适用）

  ### NIH评审标准

  **评分标准**（1-9分，1=优秀，9=差）：

  1. **重要性**
     - 解决重要问题或关键障碍
     - 改进科学知识、技术能力或临床实践
     - 与NIH使命对齐

  2. **研究者**
     - 适合项目
     - 成就跟踪记录
     - 足够培训和专业知识

  3. **创新性**
     - 新颖概念、方法、方法论或干预
     - 挑战现有范式
     - 以创造性方式解决重要问题

  4. **方法**
     - 合理且适当
     - 严谨且可重复
     - 充分处理潜在问题
     - 在时间线内可行

  5. **环境**
     - 机构支持和资源
     - 科学环境有助于成功概率

  **额外评审考虑**（不评分但讨论）：

  - 人类受试者保护
  - 包括女性、少数族裔和儿童
  - 脊椎动物动物福利
  - 生物危害
  - 重新提交响应（如果适用）
  - 预算和时间线适当性

  ### DOE评审标准

  因项目办公室而异，但通常包括：

  - 科学和/或技术优点
  - 拟议方法或方法的适当性
  - 人员能力和设施充足性
  - 预算合理性和适当性
  - 与DOE使命和项目目标相关性

  ### DARPA评审标准

  **DARPA特定考虑**：

  - 整体科学和技术优点
  - 对DARPA使命的潜在贡献
  - 拟议成本真实性和资金可用性

  ### NSTC评审标准

  **核心评估维度**：

  1. **创新性**：概念和方法的创新性。
  2. **可行性**：方法论严谨性和初步数据。
  3. **PI能力**：跟踪记录和专业知识。
  4. **价值**：学术贡献和社会/工业影响。

  有关机构详细评审标准，请参阅`references/review_criteria.md`和`references/nstc_guidelines.md`。

  - **如果您成功会怎样？**（如果研究有效的影响）
  - **如果您正确会怎样？**（您的假设的含意）
  - **谁在乎？**（为何对国家安全重要）

  有关机构详细评审标准，请参阅`references/review_criteria.md`。

  ## 竞争性提案的写作原则

  ### 清晰性和可访问性

  **为多个受众写作**：

  - 您领域的评审员（将仔细审查方法）
  - 相关但非同一领域的评审员（需要上下文）
  - 项目官员（寻找与机构目标对齐）
  - 阅读15+以上提案的小组成员（需要清晰组织）

  **策略**：

  - 使用清晰的部分标题和副标题
  - 以概述段落开始部分
  - 定义技术术语和缩写
  - 使用图表、示意图和表格澄清复杂概念
  - 尽可能避免术语；必要时解释
  - 使用主题句引导读者

  ### 说服性论证

  **构建引人入胜的叙述**：

  - 建立问题及其重要性
  - 展示当前知识或方法的空白
  - 展示您的解决方案创新且可行
  - 证明您是正确的团队
  - 展示成功将具有重大影响

  **说服结构**：

  1. **钩子**：以重要性捕获注意
  2. **问题**：建立未知或不工作内容
  3. **解决方案**：呈现您的创新方法
  4. **证据**：用初步数据支持
  5. **影响**：展示变革潜力
  6. **团队**：证明交付能力

  **语言选择**：

  - 使用主动语态提高清晰度和信心
  - 选择强动词（调查、阐明、发现 vs. 查看、研究）
  - 自信但不傲慢（避免“显然”、“清晰地”）
  - 适当承认不确定性
  - 使用精确语言（避免模糊术语如“几个”、“各种”）

  ### 视觉沟通

  **有效使用图表**：

  - 展示研究框架的概念图
  - 展示可行性的初步数据
  - 时间线和甘特图
  - 展示方法论的工作流程图
  - 预期结果或预测

  **设计原则**：

  - 使图表自解释，使用完整标题
  - 使用一致的颜色方案和字体
  - 确保可读性（足够大的字体、清晰标签）
  - 整合图表与文本（引用特定图表）
  - 遵循机构特定格式要求

  ### 解决风险和可行性

  **平衡创新和风险**：

  - 承认潜在挑战
  - 提供替代方法
  - 展示减少风险的初步数据
  - 证明处理挑战的专业知识
  - 包括应急计划

  **常见担忧**：

  - 对时间线/预算过于雄心勃勃
  - 技术不可行
  - 团队缺乏必要专业知识
  - 初步数据不足
  - 方法未充分描述
  - 缺乏创新性或重要性

  ### 整合和连贯性

  **确保所有部分对齐**：

  - 预算支持项目描述中的活动
  - 时间线匹配目标和里程碑
  - 团队组成匹配所需专业知识
  - 更广泛影响连接到研究计划
  - 支持信函确认所述合作

  **避免矛盾**：

  - 初步数据与所述空白
  - 声称的专业知识与出版物记录
  - 所述目标与实际方法
  - 预算与所述活动

  ## 常见提案类型

  ### NSF提案类型

  - **标准研究提案**：最常见，最高50万美元和5年
  - **CAREER奖**：早期职业教员，整合研究/教育，40-50万美元超过5年
  - **合作研究**：多机构，单独提交，共享研究计划
  - **RAPID**：紧急研究机会，最高20万美元，无需初步数据
  - **EAGER**：高风险、高回报探索性研究，最高30万美元
  - **早期概念探索性研究补助金**：早期探索性工作

  ### NIH奖机制

  - **R01**：研究项目补助金，每年25万美元+，3-5年，最常见
  - **R21**：探索性/开发研究，最高27.5万美元超过2年，无需初步数据
  - **R03**：小补助金计划，最高10万美元超过2年
  - **R15**：学术研究增强奖（AREA），为主要本科院校
  - **R35**：MIRA（最大化研究者研究奖），计划特定
  - **P01**：项目计划补助金，多项目整合研究
  - **U01**：研究项目合作协议，NIH参与实施

  **奖学金机制**：

  - **F30**：预博士MD/PhD奖学金
  - **F31**：预博士奖学金
  - **F32**：博士后奖学金
  - **K99/R00**：独立性路径奖
  - **K08**：导师临床科学家研究职业发展奖

  ### DOE计划

  - **科学办公室**：物理科学、生物科学、计算基础研究
  - **ARPA-E**：变革性能源技术，需要成本分担
  - **EERE**：可再生能源和能源效率的应用研究
  - **国家实验室**：与DOE实验室合作研究

  ### DARPA计划

  - **因办公室而异**：BTO、DSO、I2O、MTO、STO、TTO
  - **计划特定BAAs**：特定主题的广泛机构公告
  - **年轻教职员奖**：早期职业研究者，最高50万美元
  - **主任奖学金**：高风险、范式转变研究

  有关详细计划指导，请参阅`references/funding_mechanisms.md`。

  ## 重新提交策略

  ### NIH重新提交（A1）

  **重新提交介绍**（1页）：

  - 总结先前评审的主要批评
  - 描述在响应中所做的具体更改
  - 使用要点清晰
  - 尊重评审员意见
  - 突出实质性改进

  **策略**：

  - 处理每个主要批评
  - 使更改可见（但不要在最终中使用跟踪更改）
  - 加强薄弱领域（初步数据、方法、重要性）
  - 如果根本有缺陷，考虑更改目标
  - 在重新提交前获得外部反馈
  - 如需新数据，使用完整37个月窗口

  **何时不重新提交**：

  - 基本概念缺陷
  - 缺乏创新性或重要性
  - 缺少关键专业知识或资源
  - 需要广泛修订（考虑新提交）

  ### NSF重新提交

  **NSF允许修订后重新提交**：

  - 在修订提案中处理评审员担忧
  - 无正式“重新提交介绍”部分
  - 可能由相同或不同小组评审
  - 考虑项目官员反馈
  - 可能需要等待下一个提交周期

  有关详细重新提交指导，请参阅`references/resubmission_strategies.md`。

  ## 避免的常见错误

  ### 概念错误

  1. **未能解决评审标准**：未明确讨论重要性、创新性、方法等。
  2. **与机构使命不匹配**：提出与机构目标不符的研究
  3. **重要性不明确**：未能阐明研究为何重要
  4. **创新性不足**：渐进工作呈现为变革性
  5. **目标模糊**：目标不具体或不可衡量

  ### 写作错误

  1. **组织差**：缺乏清晰结构和流程
  2. **术语过多**：对更广泛的评审小组不可访问
  3. **冗长**：不必要复杂或冗长写作
  4. **缺少上下文**：假设评审员深入了解您的领域
  5. **术语不一致**：同一概念使用不同术语

  ### 技术错误

  1. **方法不足**：不足以判断可行性的细节
  2. **过于雄心勃勃**：对时间线/预算提议过多
  3. **无初步数据**：对于需要展示可行性的机制
  4. **时间线差**：不现实或不合理时间表
  5. **预算不匹配**：预算不支持拟议活动

  ### 格式错误

  1. **超过页限制**：自动拒绝
  2. **错误字体或边距**：非合规格式
  3. **缺少必要部分**：不完整申请
  4. **图表质量差**：难以辨认或不专业图表
  5. **引用不一致**：参考格式错误

  ### 战略错误

  1. **错误计划或机制**：提出到不适当机会
  2. **弱团队**：专业知识不足或缺少关键合作者
  3. **无更广泛影响**：对NSF，未充分解决
  4. **忽视计划优先事项**：未与当前重点领域对齐
  5. **晚期提交**：技术问题或匆忙准备

  ## 基金开发工作流程

  ### 阶段1：规划和准备（截止日期前2-6个月）

  **活动**：

  - 确定适当的资金机会
  - 审查计划公告和要求
  - 咨询项目官员（如适当）
  - 组建团队并确认合作
  - 开发初步数据（如需要）
  - 概述研究计划和具体目标
  - 审查成功提案（如可用）

  **输出**：

  - 选择的资金机会
  - 组建的团队和定义角色
  - 具体目标的初步概述
  - 所需初步数据的空白分析

  ### 阶段2：起草（截止日期前2-3个月）

  **活动**：

  - 撰写具体目标或目标（从这里开始！）
  - 开发项目描述/研究策略
  - 创建图表和数据可视化
  - 起草时间线和里程碑
  - 准备初步预算
  - 撰写更广泛影响或重要性部分
  - 请求支持信函/合作信函

  **输出**：

  - 叙述部分的完整初稿
  - 带论证的初步预算
  - 时间线和管理计划
  - 合作者请求信函

  ### 阶段3：内部评审（截止日期前1-2个月）

  **活动**：

  - 将草案分发给共同研究者
  - 寻求同事和导师的反馈
  - 请求机构评审（如需要）
  - 模拟评审会议（如可能）
  - 基于反馈修订
  - 优化预算和预算论证

  **输出**：

  - 结合反馈的修订草案
  - 与修订计划对齐的优化预算
  - 识别弱点和缓解策略

  ### 阶段4：最终化（截止日期前2-4周）

  **活动**：

  - 对叙述的最终修订
  - 准备所有必需表格和文档
  - 最终化预算和预算论证
  - 编译个人简历、CVs和当前及待定
  - 收集支持信函
  - 准备数据管理计划（如需要）
  - 撰写项目摘要/摘要
  - 校对所有材料

  **输出**：

  - 完整、抛光的提案
  - 所有必需补充文档
  - 根据机构要求格式化

  ### 阶段5：提交（截止日期前1周）

  **活动**：

  - 机构评审和批准
  - 上传到提交门户
  - 验证所有文档和格式
  - 截止日期前24-48小时提交
  - 确认成功提交
  - 接收确认和提案编号

  **输出**：

  - 提交的提案
  - 提交确认
  - 所有材料的存档副本

  **关键提示**：永远不要等到截止日期。门户崩溃、文件损坏，紧急情况发生。目标是提前48小时。

