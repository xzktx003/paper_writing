  # Delphes 快速模拟器

  ## 目的

  为Delphes快速探测器模拟提供专家指导，用于现象学研究，包括探测器卡配置和对象重建。

  ## 能力

  - 探测器卡配置（ATLAS、CMS、自定义）
  - 喷注重建算法
  - 对象效率参数化
  - 堆积模拟
  - 触发器仿真
  - ROOT/Delphes树输出

  ## 使用指南

  1. **探测器卡**：配置或自定义探测器响应卡
  2. **喷注算法**：选择合适的喷注重建算法
  n3. **效率**：建模对象重建效率
  4. **堆积**：在需要时添加堆积模拟
  5. **输出**：生成用于分析的ROOT树

  ## 工具/库

  - Delphes
  - FastJet
  - ROOT
