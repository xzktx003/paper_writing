  ## 科学示意图集成

  有关创建示意图的详细指导，请参考**科学示意图**技能文档。

  **关键能力：**
  - Nano Banana Pro自动生成、审查和精炼图表
  - 创建具有适当格式的出版质量图像
  - 确保可访问性（色盲友好、高对比度）
  - 支持复杂图表的迭代精炼

  ---

  ## 核心能力

  ### 1. LaTeX海报包

  支持三个主要LaTeX海报包，每个有独特优势。有关详细比较和包特定指导，请参考`references/latex_poster_packages.md`。

  **beamerposter：**
  - Beamer演示类的扩展
  - Beamer用户熟悉语法
  - 优秀主题支持和自定义
  - 最佳用于：传统学术海报、机构品牌

  **tikzposter：**
  - 现代、灵活设计，集成TikZ
  - 内置颜色主题和布局模板
  - 通过TikZ命令广泛自定义
  - 最佳用于：多彩、现代设计、自定义图形

  **baposter：**
  - 基于框的布局系统
  - 自动间距和定位
  - 专业外观默认样式
  - 最佳用于：多列布局、一致间距

  ### 2. 海报布局和结构

  遵循视觉传达原则创建有效海报布局。有关全面布局指导，请参考`references/poster_layout_design.md`。

  **常见海报部分：**
  - **页眉/标题：** 标题、作者、隶属机构、徽标
  - **引言/背景：** 研究背景和动机
  - **方法/方法：** 方法论和实验设计
  - **结果：** 带图和数据可视化的关键发现
  - **结论：** 主要要点和意义
  - **参考文献：** 关键引用（通常缩写）
  - **致谢：** 资金、合作者、机构

  **布局策略：**
  - **基于列的布局：** 2列、3列或4列网格
  - **基于块的布局：** 内容块的灵活排列
  - **Z模式流：** 逻辑引导读者通过内容
  - **视觉层次：** 使用大小、颜色和间距强调关键点

  ### 3. 研究海报设计原则

  应用基于证据的设计原则以实现最大影响。有关详细设计指导，请参考`references/poster_design_principles.md`。

  **排版：**
  - 标题：72-120pt，便于远距离可见性
  - 部分标题：48-72pt
  - 正文文本：最小24-36pt，从4-6英尺外可读
  - 使用无衬线字体（Arial、Helvetica、Calibri）以提高清晰度
  - 最多限制2-3种字体家族

  **颜色和对比度：**
  - 使用高对比度颜色方案以提高可读性
  - 机构颜色调色板用于品牌
  - 色盲友好调色板（避免红绿组合）
  - 白色空间是活跃空间—不要过度拥挤

  **视觉元素：**
  - 高分辨率图形（打印最小300 DPI）
  - 所有图形上的大、清晰标签
  - 整个过程中一致的图形样式
  - 图标和图形的战略使用
  - 平衡文本与视觉内容（推荐40-50%视觉）

  **内容指南：**
  - **少即是多：** 推荐总共300-800单词
  - 可扫描性用要点而非段落
  - 清晰、简洁的信息传递
  - 带最小文本解释的自解释图形
  - 用于补充材料或在线资源的二维码

  ### 4. 标准海报尺寸

  支持国际和会议特定海报尺寸：

  **国际标准：**
  - A0（841 × 1189毫米 / 33.1 × 46.8英寸） - 最常见欧洲标准
  - A1（594 × 841毫米 / 23.4 × 33.1英寸） - 较小格式
  - A2（420 × 594毫米 / 16.5 × 23.4英寸） - 紧凑海报

  **北美标准：**
  - 36 × 48英寸（914 × 1219毫米） - 常见美国会议尺寸
  - 42 × 56英寸（1067 × 1422毫米） - 大格式
  - 48 × 72英寸（1219 × 1829毫米） - 超大

  **方向：**
  - 纵向（垂直） - 最常见，传统
  - 横向（水平） - 更适合宽内容、时间线

  ### 5. 包特定模板

  为每个主要包提供即用模板。模板在`assets/`目录中可用。

  **beamerposter模板：**
  - `beamerposter_classic.tex` - 传统学术风格
  - `beamerposter_modern.tex` - 清洁、最小设计
  - `beamerposter_colorful.tex` - 多彩主题带块

  **tikzposter模板：**
  - `tikzposter_default.tex` - 标准tikzposter布局
  - `tikzposter_rays.tex` - 现代设计带射线主题
  - `tikzposter_wave.tex` - 专业波浪风格主题

  **baposter模板：**
  - `baposter_portrait.tex` - 经典纵向布局
  - `baposter_landscape.tex` - 横向多列
  - `baposter_minimal.tex` - 极简主义设计

  ### 6. 图形和图像集成

  优化海报演示的视觉内容：

  **最佳实践：**
  - 尽可能使用矢量图形（PDF、SVG）以实现可扩展性
  - 栅格图像：最终打印尺寸最小300 DPI
  - 一致的图像样式（边框、标题、大小）
  - 分组相关图形
  - 用于对比的子图形

  **LaTeX图形命令：**
  ```latex
  % 包含图形包
  \usepackage{graphicx}

  % 简单图形
  \includegraphics[width=0.8\linewidth]{figure.pdf}

  % tikzposter中带标题的图形
  \block{结果}{
    \begin{tikzfigure}
      \includegraphics[width=0.9\linewidth]{results.png}
    \end{tikzfigure}
  }

  % 多个子图形
  \usepackage{subcaption}
  \begin{figure}
    \begin{subfigure}{0.48\linewidth}
      \includegraphics[width=\linewidth]{fig1.pdf}
      \caption{条件A}
    \end{subfigure}
    \begin{subfigure}{0.48\linewidth}
      \includegraphics[width=\linewidth]{fig2.pdf}
      \caption{条件B}
    \end{subfigure}
  \end{figure}
  ```

  ### 7. 颜色方案和主题

  为各种上下文提供专业颜色调色板：

  **学术机构颜色：**
  - 匹配大学或部门品牌
  - 使用官方颜色代码（RGB、CMYK或LaTeX颜色定义）

  **科学颜色调色板**（色盲友好）：
  - Viridis：从紫色到黄色的专业渐变
  - ColorBrewer：用于数据可视化的研究测试调色板
  - IBM色盲安全：可访问企业调色板

  **包特定主题选择：**

  **beamerposter：**
  ```latex
  \usetheme{Berlin}
  \usecolortheme{beaver}
  ```

  **tikzposter：**
  ```latex
  \usetheme{Rays}
  \usecolorstyle{Denmark}
  ```

  **baposter：**
  ```latex
  \begin{poster}{
    background=plain,
    bgColorOne=white,
    headerColorOne=blue!70,
    textborder=rounded
  }
  ```

  ### 8. 排版和文本格式化

  确保可读性和视觉吸引力：

  **字体选择：**
  ```latex
  % 海报推荐无衬线字体
  \usepackage{helvet}      % Helvetica
  \usepackage{avant}       % Avant Garde
  \usepackage{sfmath}      % 无衬线数学字体

  % 设置默认为无衬线
  \renewcommand{\familydefault}{\sfdefault}
  ```

  **文本大小：**
  ```latex
  % 调整文本大小以提高可见性
  \setbeamerfont{title}{size=\VeryHuge}
  \setbeamerfont{author}{size=\Large}
  \setbeamerfont{institute}{size=\normalsize}
  ```

  **强调和高亮：**
  - 使用加粗表示关键术语：`\textbf{重要}`
  - 谨慎使用颜色高亮：`\textcolor{blue}{高亮}`
  - 用于关键信息的框
  - 避免斜体（远距离更难阅读）

  ### 9. 二维码和交互元素

  增强现代会议的互动性：

  **二维码集成：**
  ```latex
  \usepackage{qrcode}

  % 链接到论文、代码仓库或补充材料
  \qrcode[height=2cm]{https://github.com/username/project}

  % 带标题的二维码
  \begin{center}
    \qrcode[height=3cm]{https://doi.org/10.1234/paper}\\
    \small 扫描获取全文
  \end{center}
  ```

  **数字增强：**
  - 链接到GitHub仓库用于代码
  - 链接到视频演示或演示
  - 链接到交互式Web可视化
  - 链接到补充数据或附录

  ### 10. 编译和输出

  生成高质量PDF输出用于打印或数字显示：

  **编译命令：**
  ```bash
  # 基本编译
  pdflatex poster.tex

  # 带参考文献
  pdflatex poster.tex
  bibtex poster
  pdflatex poster.tex
  pdflatex poster.tex

  # 对于基于beamer的海报
  lualatex poster.tex  # 更好字体支持
  xelatex poster.tex   # Unicode和现代字体
  ```

  **确保全页面覆盖：**

  海报应使用整个页面而无过多边距。正确配置包：

  **beamerposter - 全页面设置：**
  ```latex
  \documentclass[final,t]{beamer}
  \usepackage[size=a0,scale=1.4,orientation=portrait]{beamerposter}

  % 移除默认beamer边距
  \setbeamersize{text margin left=0mm, text margin right=0mm}

  % 使用geometry进行精确控制
  \usepackage[margin=10mm]{geometry}  % 所有边10mm边距

  % 移除导航符号
  \setbeamertemplate{navigation symbols}{}

  % 移除脚线和头线如果不需要
  \setbeamertemplate{footline}{}
  \setbeamertemplate{headline}{}
  ```

  **tikzposter - 全页面设置：**
  ```latex
  \documentclass[
    25pt,                      % 字体缩放
    a0paper,                   % 纸张尺寸
    portrait,                  % 方向
    margin=10mm,               % 外边距（最小）
    innermargin=15mm,          % 块内空间
    blockverticalspace=15mm,   % 块间空间
    colspace=15mm,             % 列间空间
    subcolspace=8mm            % 子列间空间
  ]{tikzposter}

  % 这确保内容填充页面
  ```

  **baposter - 全页面设置：**
  ```latex
  \documentclass[a0paper,portrait,fontscale=0.285]{baposter}

  \begin{poster}{
    grid=false,
    columns=3,
    colspacing=1.5em,          % 列间空间
    eyecatcher=true,
    background=plain,
    bgColorOne=white,
    borderColor=blue!50,
    headerheight=0.12\textheight,  % 页眉12%
    textborder=roundedleft,
    headerborder=closed,
    boxheaderheight=2em        % 一致框页眉高度
  }
  % 内容在此
  \end{poster}
  ```

  **常见问题和修复：**

  **问题：** 海报周围大白色边距
  ```latex
  % beamerposter修复
  \setbeamersize{text margin left=5mm, text margin right=5mm}

  % tikzposter修复
  \documentclass[..., margin=5mm, innermargin=10mm]{tikzposter}

  % baposter修复 - 在文档类中调整
  \documentclass[a0paper, margin=5mm]{baposter}
  ```

  **问题：** 内容不填充垂直空间
  ```latex
  % 使用\vfill在各部分间分配空间
  \block{引言}{...}
  \vfill
  \block{方法}{...}
  \vfill
  \block{结果}{...}

  % 或手动调整块间距
  \vspace{1cm}  % 在特定块间添加空间
  ```

  **问题：** 海报超出页面边界
  ```latex
  % 检查总宽度计算
  % 对于带间距的3列：
  % 总宽度 = 3×列宽 + 2×列间距 + 2×边距
  % 确保等于\paperwidth

  % 通过添加可见页面边界调试
  \usepackage{eso-pic}
  \AddToShipoutPictureBG{
    \AtPageLowerLeft{
      \put(0,0){\framebox(\LenToUnit{\paperwidth},\LenToUnit{\paperheight}){}}
    }
  }
  ```

  **打印准备：**
  - 为专业打印生成PDF/X-1a
  - 嵌入所有字体
  - 如果需要，将颜色转换为CMYK
  - 检查所有图像的分辨率（最小300 DPI）
  - 如果需要，添加出血区域（通常3-5毫米）
  - 精确验证页面尺寸匹配要求

  **数字显示：**
  - 屏幕显示的RGB颜色空间
  - 为电子邮件/Web优化文件大小
  - 在不同屏幕上测试可读性

  ### 11. PDF审查和质量控制

  **关键：** 在打印或演示前始终审查生成的PDF。使用此系统检查清单：

  **步骤1：页面尺寸验证**
  ```bash
  # 检查PDF尺寸（应精确匹配海报尺寸）
  pdfinfo poster.pdf | grep "Page size"

  # 预期输出：
  # A0: 2384 x 3370点（841 x 1189毫米）
  # 36x48英寸: 2592 x 3456点
  # A1: 1684 x 2384点（594 x 841毫米）
  ```

  **步骤2：视觉检查清单**

  以100%缩放打开PDF并检查：

  **布局和间距：**
  - [ ] 内容填充整个页面（无大白色边距）
  - [ ] 列间一致间距
  - [ ] 块/部分间一致间距
  - [ ] 所有元素正确对齐（使用标尺工具）
  - [ ] 无重叠文本或图形
  - [ ] 白色空间均匀分布

  **排版：**
  - [ ] 标题清晰可见且大（72pt+）
  - [ ] 部分标题可读（48-72pt）
  - [ ] 正文文本在100%缩放时可读（最小24-36pt）
  - [ ] 无文本截断或溢出边缘
  - [ ] 整个过程中一致的字体使用
  - [ ] 所有特殊字符正确渲染（符号、希腊字母）

  **视觉元素：**
  - [ ] 所有图形正确显示
  - [ ] 无像素化或模糊图像
  - [ ] 图形标题存在且可读
  - [ ] 颜色按预期渲染（不褪色或太暗）
  - [ ] 徽标清晰显示
  - [ ] 二维码可见且可扫描

  **内容完整性：**
  - [ ] 标题和作者完整
  - [ ] 所有部分存在（引言、方法、结果、结论）
  - [ ] 参考文献包括
  - [ ] 联系信息可见
  - [ ] 致谢（如果适用）
  - [ ] 无占位符文本剩余（Lorem ipsum、TODO等）

  **技术质量：**
  - [ ] 重要区域无LaTeX编译警告
  - [ ] 所有引用解决（无[?]标记）
  - [ ] 所有交叉引用工作
  - [ ] 页面边界正确（无内容截断）

  **步骤3：缩小打印测试**

  **关键预打印测试：**
  ```bash
  # 创建缩小尺寸测试打印（最终尺寸的25%）
  # 这模拟从~8-10英尺外观看完整海报

  # 对于A0海报，在A4纸上打印（24.7%比例）
  # 对于36x48英寸海报，在信纸上打印（约25%比例）
  ```

  **打印测试清单：**
  - [ ] 标题从6英尺外可读
  - [ ] 部分标题从4英尺外可读
  - [ ] 正文文本从2英尺外可读
  - [ ] 图形清晰且可理解
  - [ ] 颜色准确打印
  - [ ] 无明显设计缺陷

  **步骤4：数字质量检查**

  **字体嵌入验证：**
  ```bash
  # 检查所有字体是否嵌入（打印必需）
  pdffonts poster.pdf

  # 所有字体应在"emb"列显示"是"
  # 如果任何显示"否"，重新编译：
  pdflatex -dEmbedAllFonts=true poster.tex
  ```

  **图像分辨率检查：**
  ```bash
  # 提取图像信息
  pdfimages -list poster.pdf

  # 检查所有图像至少300 DPI
  # 公式：DPI = 像素 /（海报英寸数）
  # 对于A0宽度（33.1英寸）：300 DPI = 最小9930像素
  ```

  **文件大小优化：**
  ```bash
  # 对于电子邮件/Web，如果需要压缩（>50MB）
  gs -sDEVICE=pdfwrite -dCompatibilityLevel=1.4 \
     -dPDFSETTINGS=/printer -dNOPAUSE -dQUIET -dBATCH \
     -sOutputFile=poster_compressed.pdf poster.pdf

  # 对于打印，保留原始（无压缩）
  ```

  **步骤5：可访问性检查**

  **颜色对比度验证：**
  - [ ] 文本-背景对比度比 ≥ 4.5:1（WCAG AA）
  - [ ] 重要元素对比度比 ≥ 7:1（WCAG AAA）
  - 在线测试：https://webaim.org/resources/contrastchecker/

  **色盲模拟：**
  - [ ] 通过色盲模拟器查看PDF
  - [ ] 信息不丢失于红绿模拟
  - [ ] 使用Coblis（color-blindness.com）或类似工具

  **步骤6：内容校对**

  **系统审查：**
  - [ ] 拼写检查所有文本
  - [ ] 验证所有作者姓名和隶属机构
  - [ ] 检查所有数字和统计准确性
  - [ ] 确认所有引用正确
  - [ ] 审查图形标签和标题
  - [ ] 检查标题和标题中的拼写错误

  **同行评审：**
  - [ ] 请同事审查海报
  - [ ] 30秒测试：他们能识别主要信息吗？
  - [ ] 5分钟审查：他们理解结论吗？
  - [ ] 记录任何混淆元素

  **步骤7：技术验证**

  **LaTeX编译日志审查：**
  ```bash
  # 检查.log文件中的警告
  grep -i "warning\|error\|overfull\|underfull" poster.log

  # 要修复的常见问题：
  # - Overfull hbox: 文本超出边距
  # - Underfull hbox: 过度间距
  # - 缺失引用：引用未解决
  # - 缺失图形：图像文件未找到
  ```

  **修复常见警告：**
  ```latex
  % Overfull hbox（文本太宽）
  \usepackage{microtype}  % 更好间距
  \sloppy  % 允许稍松间距
  \hyphenation{long-word}  % 手动断字

  % 缺失字体
  \usepackage[T1]{fontenc}  % 更好字体编码

  % 图像未找到
  % 确保路径正确且文件存在
  \graphicspath{{./figures/}{./images/}}
  ```

  **步骤8：最终预打印清单**

  **发送到打印机前：**
  - [ ] PDF尺寸精确匹配要求（用pdfinfo检查）
  - [ ] 所有字体嵌入（用pdffonts检查）
  - [ ] 颜色模式正确（屏幕用RGB，如果需要打印用CMYK）
  - [ ] 如果需要，添加出血区域（通常3-5毫米）
  - [ ] 如果需要，裁剪标记可见
  - [ ] 测试打印完成并审查
  - [ ] 文件命名清晰：[LastName]_[Conference]_Poster.pdf
  - [ ] 备份副本保存

  **要确认的打印规格：**
  - [ ] 纸张类型（哑光 vs 光泽）
  - [ ] 打印方法（喷墨、大格式、织物）
  - [ ] 颜色配置文件（如果需要，提供给打印机）
  - [ ] 交付截止日期和送货地址
  - [ ] 管状或平包装偏好

  **数字演示清单：**
  - [ ] PDF大小优化（电子邮件<10MB）
  - [ ] 在多个PDF查看器上测试（Adobe、Preview等）
  - [ ] 在不同屏幕上正确显示
  - [ ] 二维码测试且功能正常
  - [ ] 准备替代格式（社交媒体用PNG）

  **审查脚本**（在`scripts/review_poster.sh`中可用）：
  ```bash
  #!/bin/bash
  # 自动化海报PDF审查脚本

  echo "海报PDF质量检查"
  echo "======================="

  # 检查文件存在
  if [ ! -f "$1" ]; then
      echo "错误：文件未找到"
      exit 1
  fi

  echo "文件: $1"
  echo ""

  # 检查页面尺寸
  echo "1. 页面维度："
  pdfinfo "$1" | grep "Page size"
  echo ""

  # 检查字体
  echo "2. 字体嵌入："
  pdffonts "$1" | head -20
  echo ""

  # 检查文件大小
  echo "3. 文件大小："
  ls -lh "$1" | awk '{print $5}'
  echo ""

  # 计数页面（海报应为1页）
  echo "4. 页面计数："
  pdfinfo "$1" | grep "Pages"
  echo ""

  echo "需要手动检查："
  echo "- 100%缩放视觉检查"
  echo "- 缩小打印测试（25%）"
  echo "- 颜色对比度验证"
  echo "- 校对拼写错误"
  ```

  **常见PDF问题和解决方案：**

  | 问题 | 原因 | 解决方案 |
  |-------|-------|----------|
  | 大白色边距 | 不正确边距设置 | 在文档类中减少边距 |
  | 内容截断 | 超出页面边界 | 检查总宽度/高度计算 |
  | 模糊图像 | 低分辨率（<300 DPI） | 用更高分辨率图像替换 |
  | 缺失字体 | 字体未嵌入 | 用-dEmbedAllFonts=true编译 |
  | 错误页面尺寸 | 不正确纸张尺寸设置 | 验证文档类纸张尺寸 |
  | 颜色看起来错误 | RGB vs CMYK不匹配 | 为打印转换颜色空间 |
  | 文件太大（>50MB） | 未压缩图像 | 优化图像或压缩PDF |
  | 二维码不工作 | 太小或低分辨率 | 最小2×2厘米，高对比度 |

  ### 11. 常见海报内容模式

  不同研究类型的有效内容组织：

  **实验研究海报：**
  1. 标题和作者
  2. 引言：问题和假设
  3. 方法：实验设计（带图表）
  4. 结果：关键发现（2-4个主要图形）
  5. 结论：主要要点（3-5个要点）
  6. 未来工作（可选）
  7. 参考文献和致谢

  **计算/建模海报：**
  1. 标题和作者
  2. 动机：问题陈述
  3. 方法：算法或模型（带流程图）
  4. 实现：技术细节
  5. 结果：性能指标和对比
  6. 应用：用例
  7. 代码可用性（GitHub二维码）
  8. 参考文献

  **综述/调查海报：**
  1. 标题和作者
  2. 范围：主题概述
  3. 方法：文献搜索策略
  4. 关键发现：主要主题（按类别组织）
  5. 趋势：发表模式可视化
  6. 差距：识别的研究需求
  7. 结论：摘要和意义
  8. 参考文献

  ### 12. 可访问性和包容性设计

  设计对多样化受众可访问的海报：

  **色盲考虑：**
  - 避免红绿组合（最常见色盲）
  - 除颜色外，使用模式或形状
  - 用色盲模拟器测试
  - 提供高对比度（WCAG AA标准：最小4.5:1）

  **视觉障碍适应：**
  - 大、清晰字体（最小24pt正文文本）
  - 高对比度文本和背景
  - 清晰视觉层次
  - 避免背景中复杂纹理或模式

  **语言和内容：**
  - 清晰、简洁语言
  - 定义缩写和行话
  - 国际受众考虑
  - 考虑全球会议的多语言二维码选项

  ### 13. 海报演示最佳实践

  超越LaTeX的有效海报会话指导：

  **内容策略：**
  - 讲述故事，而非仅列出事实
  - 专注于1-3个主要信息
  - 使用视觉摘要或图形摘要
  - 留出对话空间（不要过度解释）

  **物理演示技巧：**
  - 带打印讲义或带二维码的业务卡
  - 准备30秒、2分钟和5分钟口头摘要
  - 站在侧面，不遮挡海报
  - 用开放式问题吸引观众

  **数字备份：**
  - 在移动设备上保存海报为PDF
  - 准备电子邮件共享的数字版本
  - 创建社交媒体友好图像版本
  - 有备份打印副本或数字显示选项

  ## 海报创建工作流

  ### 阶段1：规划和内容开发

  1. **确定海报要求：**
     - 会议尺寸规格（A0、36×48英寸等）
     - 方向（纵向 vs 横向）
     - 提交截止日期和格式要求

  2. **开发内容大纲：**
     - 识别1-3个核心信息
     - 选择关键图形（通常3-6个主要视觉）
     - 为每个部分起草简洁文本（推荐要点）
     - 目标总共300-800单词

  3. **选择LaTeX包：**
     - beamerposter：如果熟悉Beamer，需要机构主题
     - tikzposter：用于现代、多彩设计，灵活性
     - baposter：用于结构化、专业多列布局

  ### 阶段2：生成视觉元素（AI驱动）

  **关键：生成内容极简的简单图形。每个图形 = 一个信息。**

  **内容限制：**
  - 每个图形最多4-5个元素
  - 每个图形最多15个单词总数
  - 最少50%白色空间
  - 超大字体（标签80pt+，关键数字120pt+）

  1. **创建图形目录：**
     ```bash
     mkdir -p figures
     ```

  2. **生成简单视觉元素：**
     ```bash
     # 引言 - 仅3个图标/元素
     python scripts/generate_schematic.py "A0海报格式。简单视觉，仅3个元素：[图标1] [图标2] [图标3]。一个单词标签（80pt+）。50%白色空间。从8英尺外可读。" -o figures/intro.png
     
     # 方法 - 最多4步
     python scripts/generate_schematic.py "A0海报格式。简单流程图，仅4个框：步骤1 → 步骤2 → 步骤3 → 步骤4。超大标签（100pt+）。50%白色空间。无子步骤。" -o figures/methods.png
     
     # 结果 - 最多3个条/对比
     python scripts/generate_schematic.py "A0海报格式。简单图表，仅3个条。条上超大百分比（120pt+）。无轴、无图例。50%白色空间。" -o figures/results.png
     
     # 结论 - 恰好3个项目，巨大数字
     python scripts/generate_schematic.py "A0海报格式。恰好3个关键发现：'[数字]'（150pt）'[标签]'（60pt）每个。50%白色空间。无其他文本。" -o figures/conclusions.png
     ```

  3. **审查生成图形 - 检查溢出：**
     - **以25%缩放查看：** 所有文本仍可读？
     - **计数元素：** 超过5个？ → 重新生成更简单
     - **检查白色空间：** 少于40%？ → 在提示中添加"60%白色空间"
     - **字体太小？**：添加"更大"或增加pt大小
     - **仍溢出？**：减少到3个元素而非4-5个

  ### 阶段3：设计和布局

  1. **选择或创建模板：**
     - 从`assets/`中的提供模板开始
     - 自定义颜色方案以匹配品牌
     - 配置页面尺寸和方向

  2. **设计布局结构：**
     - 计划列结构（2、3或4列）
     - 映射内容流（通常左到右，上到下）
     - 分配空间用于标题（10-15%）、内容（70-80%）、页脚（5-10%）

  3. **设置排版：**
     - 为不同层次级别配置字体大小
     - 确保最小24pt正文文本
     - 测试从4-6英尺外可读性

  ### 阶段4：内容集成

  1. **创建海报页眉：**
     - 标题（简洁、描述性，10-15单词）
     - 作者和隶属机构
     - 机构徽标（高分辨率）
     - 如果需要，会议徽标

  2. **集成AI生成图形：**
     - 从阶段2添加所有图形到适当部分
     - 使用`\includegraphics`带适当大小
     - 确保图形主导每个部分（视觉第一，文本第二）
     - 为视觉影响，在块内居中图形

  3. **添加极简支持文本：**
     - 保持文本极简且可扫描（总共300-800单词）
     - 使用要点，而非段落
     - 用主动语态写作
     - 文本应补充图形，而非复制它们

  4. **添加补充元素：**
     - 用于补充材料的二维码
     - 参考文献（仅引用关键论文，通常5-10个）
     - 联系信息和致谢

  ### 阶段5：精炼和测试

  1. **审查和迭代：**
     - 检查拼写错误和错误
     - 验证所有图形高分辨率
     - 确保一致格式化
     - 确认颜色方案良好协作

  2. **测试可读性：**
     - 以25%比例打印并从2-3英尺阅读（模拟从8-12英尺外海报）
     - 在不同监视器上检查颜色
     - 验证二维码功能正确
     - 请同事审查

  3. **优化打印：**
     - 在PDF中嵌入所有字体
     - 验证图像分辨率
     - 检查PDF尺寸要求
     - 如果需要，包括出血区域

  ### 阶段6：编译和交付

  1. **编译最终PDF：**
     ```bash
     pdflatex poster.tex
     # 或更好字体支持：
     lualatex poster.tex
     ```

  2. **验证输出质量：**
     - 检查所有元素可见且正确定位
     - 缩放到100%并检查图形质量
     - 验证颜色匹配预期
     - 确认PDF在不同查看器上正确打开

  3. **准备打印：**
     - 如果需要，导出为PDF/X-1a
     - 保存备份副本
     - 首先在常规纸上获取测试打印
     - 在截止日期前2-3天订购专业打印

  4. **创建补充材料：**
     - 保存PNG/JPG版本用于社交媒体
     - 创建讲义版本（8.5×11英寸摘要）
     - 准备电子邮件共享的数字版本

  ## 与其他技能集成

  此技能有效协作：
  - **科学示意图：** 关键 - 用于生成所有海报图表和流程图
  - **生成图像 / Nano Banana Pro：** 用于风格化图形、概念插图和摘要视觉
  - **科学写作：** 用于从论文开发海报内容
  - **文献综述：** 用于背景研究
  - **数据分析：** 用于创建结果图和图表

  **推荐工作流：** 始终在创建LaTeX海报之前使用科学示意图和生成图像技能以生成所有视觉元素。

  ## 常见陷阱避免

  **AI生成图形错误（最常见）：**
  - ❌ 一个图形中元素太多（10+项目） → 保持最多3-5个
  - ❌ AI图形中文本太小 → 指定"超大（100pt+）"或"巨大（150pt+）"
  - ❌ 提示中细节太多 → 使用"简单"和"仅X个元素"
  - ❌ 无白色空间规范 → 在每个提示中添加"50%白色空间"
  - ❌ 复杂流程图带8+步 → 限制到最多4-5步
  - ❌ 对比图表带6+项目 → 限制到最多3个项目
  - ❌ 关键发现带5+指标 → 仅显示前3个

  **修复AI图形中的溢出：**
  如果您的AI生成图形溢出或有小文本：
  1. 在提示中添加"更简单"或"仅3个元素"
  2. 增加字体大小："150pt+"而非"80pt+"
  3. 添加"60%白色空间"而非"50%"
  4. 移除子细节："无子步骤"、"无轴标签"、"无图例"
  5. 用更少元素重新生成

  **设计错误：**
  - ❌ 文本太多（超过1000单词）
  - ❌ 字体大小太小（正文文本小于24pt）
  - ❌ 低对比度颜色组合
  - ❌ 杂乱布局，无白色空间
  - ❌ 各部分间不一致样式
  - ❌ 质量差或像素化图像

  **内容错误：**
  - ❌ 无清晰叙述或信息
  - ❌ 研究问题或目标太多
  - ❌ 过度使用行话无定义
  - ❌ 结果无上下文或解释
  - ❌ 缺失作者联系信息

  **技术错误：**
  - ❌ 错误海报尺寸用于会议要求
  - ❌ RGB颜色发送到CMYK打印机（颜色偏移）
  - ❌ PDF中字体未嵌入
  - ❌ 文件大小太大用于提交门户
  - ❌ 二维码太小或未测试

  **最佳实践：**
  - ✅ 生成简单AI图形，最多3-5个元素
  - ✅ 在图形中对关键数字使用巨大字体（100pt+）
  - ✅ 在每个AI提示中指定"50%白色空间"
  - ✅ 精确遵循会议尺寸规范
  - ✅ 在最终打印前进行缩小测试打印
  - ✅ 使用高对比度、可访问颜色方案
  - ✅ 保持文本极简且高度可扫描
  - ✅ 包括清晰联系信息和二维码
  - ✅ 仔细校对（海报上错误被放大！）

  ## 包安装

  确保安装所需LaTeX包：

  ```bash
  # 对于TeX Live（Linux/Mac）
  tlmgr install beamerposter tikzposter baposter

  # 对于MiKTeX（Windows）
  # 包通常在首次使用时自动安装

  # 额外推荐包
  tlmgr install qrcode graphics xcolor tcolorbox subcaption
  ```

  ## 脚本和自动化

  在`scripts/`目录中可用的助手脚本：

  - `compile_poster.sh`：带错误处理的自动化编译
  - `generate_template.py`：交互式模板生成器
  - `resize_images.py`：海报的批处理图像优化
  - `poster_checklist.py`：预提交验证工具

  ## 参考文献

  详细指导的全面参考文件：

  - `references/latex_poster_packages.md`：beamerposter、tikzposter和baposter的详细比较与示例
  - `references/poster_layout_design.md`：布局原则、网格系统和视觉流
  - `references/poster_design_principles.md`：排版、颜色理论、视觉层次和可访问性
  - `references/poster_content_guide.md`：内容组织、写作风格和部分特定指导

  ## 模板

  在`assets/`目录中的即用海报模板：

  - beamerposter模板（经典、现代、多彩）
  - tikzposter模板（默认、射线、波浪、信封）
  - baposter模板（纵向、横向、极简）
  - 来自各种科学学科的示例海报
  - 颜色方案定义和机构模板

  加载这些模板并为您的具体研究和会议要求自定义。
