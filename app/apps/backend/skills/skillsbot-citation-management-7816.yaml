  ## 最佳实践

  ### 搜索策略

  1. **从广泛开始，然后收窄：**
     - 从一般术语开始以了解领域
     - 用特定关键词和过滤器细化
     - 使用同义词和相关术语

  2. **使用多个来源：**
     - Google Scholar用于全面覆盖
     - PubMed用于生物医学焦点
     - arXiv用于预印本
     - 结合结果以实现完整性

  3. **利用引文：**
     - 检查“被引用”以查找开创性论文
     - 审查关键论文的参考文献
     - 使用引文网络发现相关工作

  4. **记录您的搜索：**
     - 保存搜索查询和日期
     - 记录结果数量
     - 注意任何应用的过滤器或限制

  ### 元数据提取

  1. **始终使用可用的DOI：**
     - 最可靠的标识符
     - 到出版物的永久链接
     - 通过CrossRef的最佳元数据来源

  2. **验证提取的元数据：**
     - 检查作者姓名是否正确
     - 验证期刊/会议名称
     - 确认出版年份
     - 验证页码和卷号

  3. **处理边缘情况：**
     - 预印本：包括存储库和ID
     - 后发表的预印本：使用出版版本
     - 会议论文：包括会议名称和地点
     - 书籍章节：包括书籍标题和编辑

  4. **保持一致性：**
     - 使用一致的作者姓名格式
     - 标准化期刊缩写
     - 使用相同的DOI格式（首选URL）

  ### BibTeX质量

  1. **遵循约定：**
     - 使用有意义的引文键（FirstAuthor2024keyword）
     - 用{}保护标题中的大小写
     - 使用--表示页码范围（非单破折号）
     - 为所有现代出版物包括DOI字段

  2. **保持清洁：**
     - 移除不必要的字段
     - 无冗余信息
     - 一致的格式化
     - 定期验证语法

  3. **系统组织：**
     - 按年份或主题排序
     - 分组相关论文
     - 为不同项目使用单独文件
     - 谨慎合并以避免重复

  ### 验证

  1. **早期并经常验证：**
     - 添加引文时检查
     - 提交前验证完整参考文献
     - 任何手动编辑后重新验证

  2. **及时修复问题：**
     - 损坏DOI：查找正确标识符
     - 缺失字段：从原始来源提取
     - 重复：选择最佳版本，移除其他
     - 格式错误：安全时使用自动修复

  3. **手动审查关键引文：**
     - 验证关键论文的引文正确性
     - 检查作者姓名与出版物匹配
     - 确认页码和卷号
     - 确保URL是最新的

  ## 常见陷阱及避免方法

  1. **单来源偏见：** 仅使用Google Scholar或PubMed
     - **解决方案：** 搜索多个数据库以实现全面覆盖

  2. **盲目接受元数据：** 不验证提取的信息
     - **解决方案：** 对照原始来源抽查提取的元数据

  3. **忽略DOI错误：** 参考文献中的损坏或错误DOI
     - **解决方案：** 最终提交前运行验证

  4. **不一致的格式化：** 混合引文键样式、格式化
     - **解决方案：** 使用format_bibtex.py标准化

  5. **重复条目：** 同一论文以不同键多次引用
     - **解决方案：** 验证中使用重复检测

  6. **缺失必填字段：** 不完整的BibTeX条目
     - **解决方案：** 验证并确保所有必填字段存在

  7. **过时的预印本：** 预印本存在时引用预印本
     - **解决方案：** 检查预印本是否已发表，更新为期刊版本

  8. **特殊字符问题：** 因字符导致的LaTeX编译失败
     - **解决方案：** 在BibTeX中使用正确转义或Unicode

  9. **提交前无验证：** 提交时有引文错误
     - **解决方案：** 始终运行验证作为最终检查

  10. **手动BibTeX条目：** 手动键入条目
      - **解决方案：** 始终使用脚本从元数据来源提取

  ## 示例工作流程

  ### 示例1：为论文构建参考文献

  ```bash
  # 步骤1：查找主题的关键论文
  python scripts/search_google_scholar.py "transformer神经网络" \
    --year-start 2017 \
    --limit 50 \
    --output transformers_gs.json

  python scripts/search_pubmed.py "深度学习医学成像" \
    --date-start 2020 \
    --limit 50 \
    --output medical_dl_pm.json

  # 步骤2：从搜索结果提取元数据
  python scripts/extract_metadata.py \
    --input transformers_gs.json \
    --output transformers.bib

  python scripts/extract_metadata.py \
    --input medical_dl_pm.json \
    --output medical.bib

  # 步骤3：添加您已知道的特定论文
  python scripts/doi_to_bibtex.py 10.1038/s41586-021-03819-2 >> specific.bib
  python scripts/doi_to_bibtex.py 10.1126/science.aam9317 >> specific.bib

  # 步骤4：合并所有BibTeX文件
  cat transformers.bib medical.bib specific.bib > combined.bib

  # 步骤5：格式化和去重
  python scripts/format_bibtex.py combined.bib \
    --deduplicate \
    --sort year \
    --descending \
    --output formatted.bib

  # 步骤6：验证
  python scripts/validate_citations.py formatted.bib \
    --auto-fix \
    --report validation.json \
    --output final_references.bib

  # 步骤7：审查任何问题
  cat validation.json | grep -A 3 '"errors"'

  # 步骤8：在LaTeX中使用
  # \bibliography{final_references}
  ```

  ### 示例2：转换DOI列表

  ```bash
  # 您有一个文本文件包含DOI（每行一个）
  # dois.txt内容：
  # 10.1038/s41586-021-03819-2
  # 10.1126/science.aam9317
  # 10.1016/j.cell.2023.01.001

  # 将所有转换为BibTeX
  python scripts/doi_to_bibtex.py --input dois.txt --output references.bib

  # 验证结果
  python scripts/validate_citations.py references.bib --verbose
  ```

  ### 示例3：清理现有的BibTeX文件

  ```bash
  # 您有一个来自各种来源的混乱BibTeX文件
  # 系统清理

  # 步骤1：格式化和标准化
  python scripts/format_bibtex.py messy_references.bib \
    --output step1_formatted.bib

  # 步骤2：移除重复项
  python scripts/format_bibtex.py step1_formatted.bib \
    --deduplicate \
    --output step2_deduplicated.bib

  # 步骤3：验证和自动修复
  python scripts/validate_citations.py step2_deduplicated.bib \
    --auto-fix \
    --output step3_validated.bib

  # 步骤4：按年份排序
  python scripts/format_bibtex.py step3_validated.bib \
    --sort year \
    --descending \
    --output clean_references.bib

  # 步骤5：最终验证报告
  python scripts/validate_citations.py clean_references.bib \
    --report final_validation.json \
    --verbose

  # 审查报告
  cat final_validation.json
  ```

  ### 示例4：查找和引用开创性论文

  ```bash
  # 查找主题的高度被引论文
  python scripts/search_google_scholar.py "AlphaFold蛋白质结构" \
    --year-start 2020 \
    --year-end 2024 \
    --sort-by citations \
    --limit 20 \
    --output alphafold_seminal.json

  # 提取按被引次数排序的前10
  #（脚本将在JSON中包含被引次数）

  # 转换为BibTeX
  python scripts/extract_metadata.py \
    --input alphafold_seminal.json \
    --output alphafold_refs.bib

  # BibTeX文件现在包含最具影响力的论文
  ```

