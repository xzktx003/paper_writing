  ### validate_citations.py

  验证BibTeX条目的准确性和完整性。

  **功能：**

  - 通过doi.org和CrossRef进行DOI验证
  - 必填字段检查
  - 重复检测
  - 格式验证
  - 自动修复常见问题
  - 详细报告

  **用法：**

  ```bash
  # 基本验证
  python scripts/validate_citations.py references.bib

  # 带自动修复
  python scripts/validate_citations.py references.bib \
    --auto-fix \
    --output fixed_references.bib

  # 详细验证报告
  python scripts/validate_citations.py references.bib \
    --report validation_report.json \
    --verbose

  # 仅检查DOI
  python scripts/validate_citations.py references.bib \
    --check-dois-only
  ```

  ### format_bibtex.py

  格式化和清理BibTeX文件。

  **功能：**

  - 标准化格式化
  - 排序条目（按键、年份、作者）
  - 移除重复项
  - 验证语法
  - 修复常见错误
  - 强制引文键约定

  **用法：**

  ```bash
  # 基本格式化
  python scripts/format_bibtex.py references.bib

  # 按年份排序（最新优先）
  python scripts/format_bibtex.py references.bib \
    --sort year \
    --descending \
    --output sorted_refs.bib

  # 移除重复项
  python scripts/format_bibtex.py references.bib \
    --deduplicate \
    --output clean_refs.bib

  # 完全清理
  python scripts/format_bibtex.py references.bib \
    --deduplicate \
    --sort year \
    --validate \
    --auto-fix \
    --output final_refs.bib
  ```

