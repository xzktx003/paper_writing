  # 引文管理

  ## 概述

  系统管理研究和写作过程中的引文。此技能提供工具和策略，用于搜索学术数据库（Google Scholar、PubMed），从多个来源（CrossRef、PubMed、arXiv）提取准确元数据，验证引文信息，并生成正确格式的BibTeX条目。

  对于维护引文准确性、避免参考文献错误和确保可重复研究至关重要。与文献综述技能无缝集成，实现综合研究流程。

  ## 何时使用此技能

  在以下情况下使用此技能：

  - 在Google Scholar或PubMed上搜索特定论文
  - 将DOI、PMID或arXiv ID转换为正确格式的BibTeX
  - 提取引文的完整元数据（作者、标题、期刊、年份等）
  - 验证现有引文的准确性
  - 清理和格式化BibTeX文件
  - 在特定领域查找高被引论文
  - 验证引文信息是否与实际出版物匹配
  - 为稿件或论文构建参考文献
  - 检查重复引文
  - 确保一致的引文格式

  ## 使用科学示意图增强视觉效果

  **使用此技能创建文档时，始终考虑添加科学图表和示意图以增强视觉传达。**

  如果文档尚未包含示意图或图表：

  - 使用**科学示意图**技能生成AI驱动的出版质量图表
  - 只需用自然语言描述所需的图表
  - Nano Banana Pro将自动生成、审查和精炼示意图

  **对于新文档：** 默认应生成科学示意图，以可视化表示文本中描述的关键概念、工作流程、架构或关系。

  **如何生成示意图：**

  ```bash
  python scripts/generate_schematic.py "您的图表描述" -o figures/output.png
  ```

  AI将自动：

  - 创建出版质量的图像并正确格式化
  - 通过多次迭代审查和精炼
  - 确保可访问性（色盲友好、高对比度）
  - 将输出保存到figures/目录中

  **何时添加示意图：**

  - 引文工作流程图表
  - 文献搜索方法论流程图
  - 参考文献管理系统架构
  - 引文样式决策树
  - 数据库集成图
  - 任何从可视化中受益的复杂概念

  有关创建示意图的详细指导，请参考科学示意图技能文档。

