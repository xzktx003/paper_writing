  # 科学批判性思维

  ## 概述

  批判性思维是评估科学严谨性的系统过程。使用GRADE和Cochrane ROB框架评估方法论、实验设计、统计有效性、偏差、混杂因素和证据质量。应用此技能对科学主张进行批判性分析。

  ## 何时使用此技能

  此技能应在以下情况使用：
  - 评估研究方法和实验设计
  - 评估统计有效性和证据质量
  - 识别研究中的偏差和混杂因素
  - 评审科学主张和结论
  - 进行系统综述或元分析
  - 应用GRADE或Cochrane风险偏倚评估
  - 提供研究论文的批判性分析

  ## 通过科学示意图增强视觉表达

  **在使用此技能创建文档时，始终考虑添加科学图表和示意图以增强视觉沟通。**

  如果文档中尚未包含示意图或图表：
