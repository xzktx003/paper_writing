  # AFLOW材料发现

  ## 目的

  提供关于AFLOW在高通量材料发现方面的专家指导，包括数据库查询、工作流生成和机器学习集成。

  ## 能力

  - AFLOW数据库API查询
  - 自动工作流生成
  - 热力学稳定性分析
  - 原型结构生成
  - 描述符计算
  - 机器学习集成

  ## 使用指南

  1. **数据库查询**：搜索AFLOW数据库中的材料
  2. **工作流生成**：创建自动DFT工作流
  3. **稳定性分析**：分析热力学稳定性
  4. **原型结构**：生成晶体结构原型
  5. **机器学习集成**：为机器学习模型计算描述符

  ## 工具/库

  - AFLOW
  - aflow.py
  - Materials Project API
