  ## 机构特定概述

  ### NSF（国家科学基金会）
  **使命**: 促进科学进步，提升国家健康、繁荣和福利

  **关键特征**:
  - 智力价值和更广泛影响（同等权重）
  - 15页项目描述限制（大多数项目）
  - 强调教育、多样性和社会效益
  - 鼓励合作研究
  - 开放数据和开放科学强调
  - 带有小组和特别评审员的评审过程

  ### NIH（国家卫生研究院）
  **使命**: 增强健康、延长寿命、减少疾病和残疾

  **关键特征**:
  - 具体目标（1页）+ 研究策略（R01为12页）
  - 意义、创新、方法作为核心评审标准
  - R01通常需要初步数据
  - 强调严谨性、可重复性和临床相关性
  - 大多数R01的模块化预算（$250K增量）
  - 多次重新提交机会

  ### DOE（能源部）
  **使命**: 通过能源、环境和核挑战确保美国的安全和繁荣

  **关键特征**:
  - 专注于能源、气候、计算科学、基础能源科学
  - 通常需要成本分担或行业合作
  - 强调国家实验室合作
  - 计算和实验的强整合
  - 能源创新和商业化路径
  - 根据办公室不同（ARPA-E、科学办公室、EERE等）

  ### DARPA（国防高级研究计划局）
  **使命**: 为国家安全对突破性技术进行关键投资

  **关键特征**:
  - 高风险、高回报的变革性研究
  - 专注于“DARPA-hard”问题（如果正确，谁在乎）
  - 强调原型、演示和过渡路径
  - 通常需要多个阶段（可行性、开发、演示）
  - 强大的项目管理和里程碑跟踪
  - 通常需要团队和协作
  - 根据项目经理和BAA（广泛机构公告）差异很大

  ## 研究提案的核心组成部分

  ### 1. 执行摘要 / 项目摘要 / 摘要

  每个提案都需要一个简洁的概述，将研究的基本元素传达给技术评审员和项目官员。

  **目的**: 提供一个独立的摘要，捕捉研究愿景、意义和方法

  **长度**: 
  - NSF: 1页（项目摘要，包括单独的概述、智力价值、更广泛影响）
  - NIH: 30行（项目摘要/摘要）
  - DOE: 不同（通常1页）
  - DARPA: 不同（通常1-2页）

  **基本元素**:
  - 问题或研究问题的清晰陈述
  - 为什么这个问题重要（意义、紧迫性、影响）
  - 新颖方法或创新
  - 预期成果和可交付成果
  - 团队的资格
  - 更广泛影响或转化路径

  **写作策略**:
  - 以建立重要性的引人入胜的开头开始
  - 使用可访问的语言（开头句子避免行话）
  - 陈述具体、可衡量的目标
  - 传达热情和信心
  - 确保每个句子都增加价值（无填充）
  - 以变革性愿景或影响陈述结束

  **常见错误避免**:
  - 过于技术性或详细（留待项目描述）
  - 未能阐述“为什么现在”或“为什么这个团队”
  - 模糊的目标或成果
  - 忽视更广泛影响或意义
  - 可应用于任何提案的通用陈述

  ### 2. 项目描述 / 研究策略

  核心技术叙事，详细呈现研究计划。

  **结构因机构而异:**

  **NSF项目描述**（通常15页）:
  - 引言和背景
  - 研究目标和问题
  - 初步结果（如果适用）
  - 研究计划和方法
  - 时间线和里程碑
  - 更广泛影响（整合在整个或单独部分）
  - 先前的NSF支持（如果适用）

  **NIH研究策略**（R01为12页）:
  - 意义（为什么问题重要）
  - 创新（什么是新颖和变革性的）
  - 方法（详细研究计划）
    - 初步数据
    - 研究设计和方法
    - 预期成果
    - 潜在问题和替代方法

  **DOE项目叙事**（不同）:
  - 背景和意义
  - 技术方法和创新
  - 资格和经验
  - 设施和资源
  - 项目管理和时间线

  **DARPA技术卷**（不同）:
  - 技术挑战和创新
  - 方法和方法
  - 时间表和里程碑
  - 可交付成果和指标
  - 团队资格
  - 风险评估和缓解

  有关详细机构特定指南，请参阅:
  - `references/nsf_guidelines.md`
  - `references/nih_guidelines.md`
  - `references/doe_guidelines.md`
  - `references/darpa_guidelines.md`

  ### 3. 具体目标（NIH）或目标（NSF/DOE/DARPA）

  清晰、可测试的目标，结构化研究计划。

  **NIH具体目标页**（1页）:
  - 开场段落: 知识缺口和意义
  - 长期目标和即时目标
  - 中心假设或研究问题
  - 2-4个具体目标，带有子目标
  - 预期成果和影响
  - 收益段落: 为什么这重要

  **每个目标的结构:**
  - 目标陈述（1-2句子，以动作动词开始）
  - 理由（为什么这个目标，初步数据支持）
  - 工作假设（可测试的预测）
  - 方法摘要（简要方法概述）
  - 预期成果和解释

  **写作策略**:
  - 使目标独立但互补
  - 确保每个目标在时间线和预算内可实现
  - 提供足够的细节来判断可行性
  - 包括应急计划或替代方法
  - 使用平行结构跨目标
  - 明确说明从每个目标中学到什么

  有关详细指南，请参阅 `references/specific_aims_guide.md`。

  ### 4. 更广泛影响（NSF） / 意义（NIH）

  阐述研究的社会、教育或转化价值。

  **NSF更广泛影响**（关键组成部分，与智力价值同等权重）:

  NSF明确评估更广泛影响。至少解决以下一个领域:
  1. **促进发现和理解，同时促进教学、培训和学**
     - 研究和教育的整合
     - 学生和博士后的培训
     - 课程开发
     - 教育材料和资源

  2. **扩大代表性不足群体的参与**
     - 招聘和保留策略
     - 与少数族裔服务机构的合作
     - 向代表性不足社区的推广
     - 指导计划

  3. **增强研究和教育基础设施**
     - 共享设施或仪器
     - 网络基础设施和数据资源
     - 社区范围工具或数据库
     - 开源软件或方法

  4. **广泛传播以增强科学和技术理解**
     - 公共推广和科学传播
     - K-12教育计划
     - 博物馆展览或媒体参与
     - 政策简报或利益相关者参与

  5. **社会效益**
     - 经济影响或商业化
     - 健康、环境或国家安全效益
     - 知情决策
     - 劳动力发展

  **NSF更广泛影响的写作策略**:
  - 具体，有具体活动，非模糊陈述
  - 提供更广泛影响活动的时间线和里程碑
  - 解释如何衡量和评估影响
  - 连接到机构资源和现有计划
  - 通过初步努力或合作展示承诺
  - 与研究计划整合（非附加）

  **NIH意义**:
  - 解决重要问题或关键进展障碍
  - 改善科学知识、技术能力或临床实践
  - 可能导致更好的结果、干预或理解
  - 该领域先前研究的严谨性
  - 与NIH使命和研究所优先事项对齐

  有关详细指南，请参阅 `references/broader_impacts.md`。

  ### 5. 创新和变革潜力

  阐述研究的什么是新颖、创造性和范式转变的。

  **创新元素强调**:
  - **概念创新**: 新框架、模型或理论
  - **方法创新**: 新技术、方法或技术
  - **整合创新**: 新方式结合学科或方法
  - **转化创新**: 从发现到应用的新路径
  - **规模创新**: 前所未有的范围或分辨率

  **写作策略**:
  - 明确陈述什么是创新的（不要假设显而易见）
  - 解释为什么当前方法不足
  - 描述您的创新如何克服限制
  - 提供证据证明创新可行（初步数据、概念验证）
  - 区分增量与变革性进展
  - 平衡创新与可行性（不太风险）

  **常见错误**:
  - 声称新颖性而不展示先前工作的知识
  - 混淆“对我新”与“对领域新”
  - 过度承诺而无支持证据
  - 太增量（现有工作的微小变化）
  - 太推测性（无成功路径）

  ### 6. 研究方法和途径

  详细描述研究将如何进行。

  **基本组成部分**:
  - 整体研究设计和框架
  - 每个目标/目的的详细方法
  - 样本大小、统计功效和分析计划
  - 时间线和活动序列
  - 数据收集、管理和分析
  - 质量控制和验证方法
  - 潜在问题和替代策略
  - 严谨性和可重复性措施

  **写作策略**:
  - 提供足够细节用于可重复性和可行性评估
  - 使用副标题和图改进组织
  - 证明方法和途径的选择
  - 主动解决潜在限制
  - 包括展示可行性的初步数据
  - 显示您已经考虑过研究过程
  - 平衡细节与可读性（使用补充材料进行广泛细节）

  **用于实验研究**:
  - 描述实验设计（控制、重复、盲法）
  - 指定材料、试剂和设备
  - 详细数据收集协议
  - 解释统计分析计划
  - 解决严谨性和可重复性

  **用于计算研究**:
  - 描述算法、模型和软件
  - 指定数据集和验证方法
  - 解释所需计算资源
  - 解决代码可用性和文档
  - 描述基准测试和性能指标

  **用于临床或转化研究**:
  - 描述研究人群和招聘
  - 详细干预或治疗方案
  - 解释结果测量和评估
  - 解决监管批准（IRB、IND、IDE）
  - 描述临床试验设计和监控

  有关详细方法指南，请参阅 `references/research_methods.md`。

  ### 7. 初步数据和可行性

  展示研究可实现，团队有能力。

  **目的**:
  - 证明提议的方法可行
  - 显示团队具有必要专业知识
  - 演示访问所需资源
  - 减少评审员感知风险
  - 为提议工作提供基础

  **包括什么**:
  - 试点研究或概念验证结果
  - 方法开发或优化
  - 访问独特资源（样本、数据、合作者）
  - 您团队的相关出版物
  - 初步模型或模拟
  - 可行性评估或功效计算

  **NIH要求**:
  - R01申请通常需要大量初步数据
  - R21申请可能要求较低
  - 新调查员可能有较少初步数据
  - 初步数据应直接支持提议目标

  **NSF方法**:
  - 初步数据通常不如NIH常见
  - 对高风险或新方法可能重要
  - 可以加强竞争性项目的提案

  **写作策略**:
  - 呈现最引人注目的支持您方法的数据
  - 清楚连接初步数据与提议目标
  - 承认限制以及提议工作将如何解决
  - 有效使用图和数据可视化
  - 避免过度解释或夸大初步发现
  - 展示研究轨迹

  ### 8. 时间线、里程碑和管理计划

  展示项目规划良好，在提议时间范围内可实现。

  **基本元素**:
  - 分阶段时间线，有清晰里程碑
  - 逻辑序列和依赖关系
  - 每个活动的实际时间框架
  - 决策点和通过/不通过标准
  - 风险缓解策略
  - 跨时间资源分配
  - 多机构团队的协调计划

  **呈现格式**:
  - 甘特图显示重叠活动
  - 逐年活动细分
  - 季度里程碑和可交付成果
  - 目标/任务表，有时间线和人员

  **写作策略**:
  - 对可完成的内容实际
  - 为意外延迟或挫折留出时间
  - 显示时间线与预算和人员对齐
  - 演示对监管时间线的理解（IRB、IACUC）
  - 包括传播和更广泛影响的时间
  - 解决如何监控和评估进展

  **DARPA强调**:
  - 对DARPA提案特别重要
  - 清晰技术里程碑，有可测量指标
  - 季度可交付成果和报告
  - 基于阶段结构，有退出标准
  - 演示和过渡规划

  有关详细指南，请参阅 `references/timeline_planning.md`。

  ### 9. 团队资格和协作

  展示团队具有成功所需的专业知识、经验和资源。

  **基本元素**:
  - PI资格和相关专业知识
  - 共同调查员和合作者角色和贡献
  - 研究领域的记录
  - 团队的补充专业知识
  - 机构支持和资源
  - 先前合作历史（如果适用）
  - 指导学生/博士后的指导计划

  **写作策略**:
  - 强调最相关的出版物和成就
  - 明确定义角色和责任
  - 显示团队组成必要（不仅仅是方便）
  - 演示成功的先前合作
  - 解决如何管理团队
  - 解释机构承诺和支持

  **简历 / 履历**:
  - 遵循机构特定格式（NSF、NIH、DOE、DARPA不同）
  - 强调最相关的出版物和成就
  - 包括协同活动和合作
  - 展示轨迹和生产力
  - 解决任何职业差距或中断

  **合作信**:
  - 具体承诺和贡献
  - 演示真实合作关系
  - 包括资源共享或访问协议
  - 签名和信头

  有关详细指南，请参阅 `references/team_building.md`。

  ### 10. 预算和预算理由

  开发符合提议工作和机构指南的实际预算。

  **预算类别**（典型）:
  - **人员**: 工资和福利，用于PI、共同调查员、博士后、学生、员工
  - **设备**: 超过$5,000的物品（因机构而异）
  - **差旅**: 会议、合作、实地考察
  - **材料和供应**: 消耗品、试剂、软件
  - **其他直接成本**: 出版成本、参与者激励、咨询
  - **间接成本（F&A）**: 机构间接费用（费率不同）
  - **子奖**: 合作机构的成本

  **机构特定考虑**:

  **NSF**:
  - 需要完整的预算理由
  - 通常不需要成本分担（但可能加强提案）
  - 教师最多2个月暑期工资
  - 鼓励研究生支持

  **NIH**:
  - 模块化预算，每年直接成本≤$250K（R01）
  - 详细预算用于>$250K或复杂奖项
  - 工资上限适用（2024年约$221,900）
  - 大多数PI限制为1个月（8.33% FTE）

  **DOE**:
  - 通常需要成本分担（特别是ARPA-E）
  - 详细预算，有季度细分
  - 需要机构承诺信
  - 国家实验室合作预算单独

  **DARPA**:
  - 详细预算，按阶段和任务
  - 需要大采购的支持成本数据
  - 通常需要成本加成或固定价格结构
  - 项目会议的差旅预算

  **预算理由写作**:
  - 根据研究计划证明每个项目
  - 解释人员的努力百分比
  - 描述具体设备及为什么必要
  - 证明差旅（会议、合作）
  - 解释咨询角色和费率
  - 显示预算如何对齐时间线

  有关详细预算指南，请参阅 `references/budget_preparation.md`。

  ## 机构评审标准

  了解提案如何评估对撰写竞争性申请至关重要。

  ### NSF评审标准

  **智力价值**（主要）:
  - 提议活动有潜力推进知识？
  - 提议活动的构思和组织有多好？
  - 是否有足够的资源访问？
  - 个体、团队或机构进行提议活动的资格有多好？

  **更广泛影响**（同等重要）:
  - 提议活动有潜力造福社会？
  - 提案在多大程度上以有意义的方式解决更广泛影响？

  **额外考虑**:
  - 研究和教育的整合
  - 多样性和包容性
  - 先前的NSF支持结果（如果适用）

  ### NIH评审标准

  **评分标准**（1-9级，1=优秀，9=差）:

  1. **意义**
     - 解决重要问题或关键障碍
     - 改善科学知识、技术能力或临床实践
     - 对齐NIH使命

  2. **调查员(s)**
     - 适合项目
     - 成就记录
     - 足够的培训和专业知识

  3. **创新**
     - 新颖概念、方法、方法或干预
     - 挑战现有范式
     - 以创造性方式解决重要问题

  4. **方法**
     - 合情合理且适当
     - 严谨且可重复
     - 充分说明潜在问题
     - 在时间线内可行

  5. **环境**
     - 机构支持和资源
     - 科学环境有助于成功概率

  **额外评审考虑**（不评分但讨论）:
  - 人类受试者保护
  - 包括女性、少数族裔和儿童
  - 脊椎动物动物福利
  - 生物危害
  - 重新提交响应（如果适用）
  - 预算和时间线适当性

  ### DOE评审标准

  因项目办公室而异，但通常包括:
  - 科学和/或技术价值
  - 提议方法或途径的适当性
  - 人员的能力和设施的充足性
  - 预算的合理性和适当性
  - 与DOE使命和项目目标的相关性

  ### DARPA评审标准

  **DARPA特定考虑**:
  - 整体科学和技术价值
  - 对DARPA使命的潜在贡献
  - 与所述项目目标的相关性
  - 实现技术过渡的计划和能力
  - 提议团队的资格和经验
  - 提议成本的实际性和资金可用性

  **DARPA关键问题**:
  - **如果您成功？**（如果研究有效的影响）
  - **如果您正确？**（您的假设的含义）
  - **谁在乎？**（为什么对国家安桠重要）

  有关详细评审标准，请参阅 `references/review_criteria.md`。

  ## 竞争性提案的写作原则

  ### 清晰和可访问性

  **为多个受众写作**:
  - 您领域的技术评审员（将仔细审查方法）
  - 相关但非相同领域的评审员（需要背景）
  - 项目官员（寻找与机构目标对齐）
  - 阅读15+提案的小组成员（需要清晰组织）

  **策略**:
  - 使用清晰部分标题和副标题
  - 以概述段落开始部分
  - 定义技术术语和缩写
  - 使用图、图表和表澄清复杂想法
  - 尽可能避免行话；必要时解释
  - 使用主题句子指导读者

  ### 说服性论证

  **构建引人入胜的叙事**:
  - 建立问题及其重要性
  - 显示当前知识或方法的缺口
  - 呈现您的解决方案为创新和可行
  - 演示您是合适的团队
  - 显示成功将有重大影响

  **说服结构**:
  1. **钩子**: 用意义捕获注意力
  2. **问题**: 建立未知或无效
  3. **解决方案**: 呈现您的创新方法
  4. **证据**: 支持以初步数据
  5. **影响**: 展示变革潜力
  6. **团队**: 演示能力交付

  **语言选择**:
  - 使用主动语态清晰和信心
  - 选择强动词（调查、阐明、发现vs.看、研究）
  - 自信但不傲慢（避免“显然”、“清楚地”）
  - 适当承认不确定性
  - 使用精确语言（避免模糊术语如“几个”、“各种”）

  ### 视觉传达

  **有效使用图**:
  - 显示研究框架的概念图
  - 展示可行性的初步数据
  - 时间线和甘特图
  - 显示方法的工作流程图
  - 预期结果或预测

  **设计原则**:
  - 使图自解释，有完整标题
  - 使用一致配色方案和字体
  - 确保可读性（足够大的字体、清晰标签）
  - 整合图与文本（参考特定图）
  - 遵循机构特定格式要求

  ### 解决风险和可行性

  **平衡创新和风险**:
  - 承认潜在挑战
  - 提供替代方法
  - 显示减少风险的初步数据
  - 演示处理挑战的专业知识
  - 包括应急计划

  **常见顾虑**:
  - 时间线/预算太雄心勃勃
  - 技术上不可行
  - 团队缺乏必要专业知识
  - 初步数据不足
  - 方法未充分描述
  - 缺乏创新或意义

  ### 整合和连贯性

  **确保所有部分对齐**:
  - 预算支持项目描述中的活动
  - 时间线与目标和里程碑匹配
  - 团队组成匹配所需专业知识
  - 更广泛影响连接到研究计划
  - 支持信确认所述合作

  **避免矛盾**:
  - 初步数据vs.所述缺口
  - 声称专业知识vs.出版记录
  - 所述目标vs.实际方法
  - 预算vs.所述活动

  ## 常见提案类型

  ### NSF提案类型

  - **标准研究提案**: 最常见，高达$500K和5年
  - **CAREER奖项**: 早期职业教师，整合研究/教育，5年$400-500K
  - **协作研究**: 多个机构，分别提交，共享研究计划
  - **RAPID**: 紧急研究机会，高达$200K，不需要初步数据
  - **EAGER**: 高风险、高回报探索研究，高达$300K
  - **EArly-concept Grants for Exploratory Research (EAGER)**: 早期探索工作

  ### NIH奖项机制

  - **R01**: 研究项目资助，每年$250K+，3-5年，最常见
  - **R21**: 探索/开发研究，2年高达$275K，无初步数据
  - **R03**: 小额资助计划，2年高达$100K
  - **R15**: 学术研究增强奖（AREA），用于主要本科生机构
  - **R35**: MIRA（最大化调查员研究奖），项目特定
  - **P01**: 项目项目资助，多项目整合研究
  - **U01**: 研究项目合作协议，NIH参与执行

  **奖学金机制**:
  - **F30**: 博士前MD/PhD奖学金
  - **F31**: 博士前奖学金
  - **F32**: 博士后奖学金
  - **K99/R00**: 独立路径奖
  - **K08**: 指导临床科学家研究职业发展奖

  ### DOE项目

  - **科学办公室**: 物理科学、生物科学、计算的基础研究
  - **ARPA-E**: 变革性能源技术，需要成本分担
  - **EERE**: 可再生能源和能源效率的应用研究
  - **国家实验室**: 与DOE实验室的合作研究

  ### DARPA项目

  - **因办公室而异**: BTO、DSO、I2O、MTO、STO、TTO
  - **项目特定BAA**: 针对特定主题的广泛机构公告
  - **年轻教师奖（YFA）**: 早期职业研究人员，高达$500K
  - **主任奖学金**: 高风险、范式转变研究

  有关详细项目指南，请参阅 `references/funding_mechanisms.md`。

  ## 重新提交策略

  ### NIH重新提交（A1）

  **重新提交介绍**（1页）:
  - 总结先前评审的主要批评
  - 描述响应所做的具体更改
  - 使用要点清晰
  - 尊重评审员意见
  - 突出实质改进

  **策略**:
  - 解决每个主要批评
  - 使更改可见（但在最终中不使用跟踪更改）
  - 加强薄弱区域（初步数据、方法、意义）
  - 如果根本上缺陷，考虑更改目标
  - 在重新提交前获取外部反馈
  - 如果需要新数据，使用完整的37个月窗口

  **当不重新提交**:
  - 根本概念缺陷
  - 缺乏创新或意义
  - 缺少关键专业知识或资源
  - 需要广泛修订（考虑新提交）

  ### NSF重新提交

  **NSF允许修订后重新提交**:
  - 在修订提案中解决评审员关切
  - 无正式的“重新提交介绍”部分
  - 可能由相同或不同小组评审
  - 考虑项目官员反馈
  - 可能需要等待下一个提交周期

  有关详细重新提交指南，请参阅 `references/resubmission_strategies.md`。

  ## 常见错误避免

  ### 概念错误

  1. **未能解决评审标准**: 未明确讨论意义、创新、方法等
  2. **与机构使命不匹配**: 提议研究不与机构目标对齐
  3. **不清晰的意义**: 未能阐述为什么研究重要
  4. **创新不足**: 增量工作呈现为变革性
  5. **模糊目标**: 不具体或可衡量的目标

  ### 写作错误

  1. **组织差**: 缺乏清晰结构和流程
  2. **过多行话**: 对更广泛的评审小组不可访问
  3. **冗长**: 不必要复杂或冗长的写作
  4. **缺少上下文**: 假设评审员深入了解您的领域
  5. **不一致术语**: 对相同概念使用不同术语

  ### 技术错误

  1. **方法不足**: 不足以判断可行性的细节
  2. **过度雄心勃勃**: 为时间线/预算提议太多
  3. **无初步数据**: 对于需要展示可行性的机制
  4. **时间线差**: 不实际或理由不足的时间表
  5. **预算不对齐**: 预算不支持提议活动

  ### 格式错误

  1. **超过页限制**: 自动拒绝
  2. **错误字体或边距**: 不符合格式
  3. **缺少必要部分**: 不完整申请
  4. **图质量差**: 不可读或不专业的图
  5. **不一致引用**: 参考文献中的格式化错误

  ### 战略错误

  1. **错误项目或机制**: 提议到不适当的机会
  2. **弱团队**: 不足专业知识或缺少关键合作者
  3. **无更广泛影响**: 对于NSF，未充分解决
  4. **忽视项目优先事项**: 不与当前重点领域对齐
  5. **提交迟到**: 技术问题或匆忙准备

  ## 资助开发的工作流程

  ### 阶段1: 规划和准备（截止日期前2-6个月）

  **活动**:
  - 确定适当的资助机会
  - 评审项目公告和要求
  - 咨询项目官员（如果适当）
  - 组装团队并确认合作
  - 开发初步数据（如果需要）
  - 概述研究计划和具体目标
  - 评审成功提案（如果可用）

  **输出**:
  - 选定的资助机会
  - 组装的团队，有定义角色
  - 具体目标的初步大纲
  - 所需初步数据的缺口分析

  ### 阶段2: 起草（截止日期前2-3个月）

  **活动**:
  - 撰写具体目标或目标（从此开始！）
  - 开发项目描述/研究策略
  - 创建图和数据可视化
  - 起草时间线和里程碑
  - 准备初步预算
  - 撰写更广泛影响或意义部分
  - 请求支持信/合作

  **输出**:
  - 叙述部分的完整初稿
  - 预算理由的初步预算
  - 时间线和管理计划
  - 从合作者请求的信

  ### 阶段3: 内部评审（截止日期前1-2个月）

  **活动**:
  - 向共同调查员分发草稿
  - 寻求同事和导师的反馈
  - 请求机构评审（如果需要）
  - 模拟评审会议（如果可能）
  - 基于反馈修订
  - 精炼预算和预算理由

  **输出**:
  - 修订草案，融入反馈
  - 精炼预算，对齐修订计划
  - 识别弱点缓解策略

  ### 阶段4: 最终确定（截止日期前2-4周）

  **活动**:
  - 对叙述的最终修订
  - 准备所有必要表格和文档
  - 最终化预算和预算理由
  - 编译简历、履历和当前及待处理
  - 收集支持信
  - 准备数据管理计划（如果需要）
  - 撰写项目摘要/摘要
  - 校对所有材料

  **输出**:
  - 完整、打磨的提案
  - 所有必要补充文档
  - 根据机构要求格式化

  ### 阶段5: 提交（截止日期前1周）

  **活动**:
  - 机构评审和批准
  - 上传到提交门户
  - 验证所有文档和格式
  - 提交截止日期前24-48小时
  - 确认成功提交
  - 接收确认和提案编号

  **输出**:
  - 提交的提案
  - 提交确认
  - 所有材料的存档副本

  **关键提示**: 切勿等到截止日期。门户崩溃、文件损坏、紧急情况发生。目标提前48小时。

  ## 与其他技能的整合

  此技能与以下有效工作:
  - **科学写作**: 用于清晰、引人入胜的散文
  - **文献综述**: 用于全面背景部分
  - **同行评审**: 用于提交前的自我评估
  - **场地模板**: 用于与出版相关的写作风格指南

  **出版上下文**: 当资助工作导致出版物时，咨询**场地模板**技能，用于场地特定写作风格（`nature_science_style.md`、`ml_conference_style.md`等）和评审员期望，为目标期刊或会议定制手稿。
  - **研究查找**: 用于查找相关引用和先前工作
  - **数据可视化**: 用于创建有效图

