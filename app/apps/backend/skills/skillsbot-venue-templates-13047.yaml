  ## 示例用法

  ### 示例1：Nature文章提交

  ```markdown
  用户："我需要准备一个Nature的手稿"

  响应：
  1. 加载Nature格式化要求（references/journals_formatting.md）
  2. 检索Nature模板（assets/journals/nature_article.tex）
  3. 关键要求：
     - 长度：~3000词，~5页
     - 格式：单列，12pt字体
     - 引用：编号上标（Nature风格）
     - 图表：300+ dpi，RGB颜色
  4. 用您的标题、作者、隶属机构自定义模板
  5. 编译并验证是否符合要求
  ```

  ### 示例2：NeurIPS会议论文

  ```markdown
  用户："NeurIPS的格式化要求是什么？"

  响应：
  来自 references/conferences_formatting.md：
  - 页面限制：8页主文本 + 无限引用/附录
  - 格式：两列，10pt字体
  - 模板：neurips_2024.sty（官方风格文件）
  - 匿名化：初始提交时需要
  - 引用：编号（括号）
  - 图表：高分辨率，推荐色盲安全
  ```

  ### 示例3：NSF提案

  ```markdown
  用户："帮助我格式化NSF提案"

  响应：
  NSF要求（来自 references/grants_requirements.md）：
  - 项目描述：最多15页
  - 项目摘要：1页（概述、知识价值、更广泛影响）
  - 预算理由：3-5页
  - 个人简历：每位高级人员3页
  - 字体：最小10pt，Times Roman或类似
  - 边距：所有边1英寸
  模板：assets/grants/nsf_proposal_template.tex
  ```

  ### 示例4：会议海报

  ```markdown
  用户："我需要为ISMB创建海报"

  响应：
  ISMB海报规格：
  - 尺寸：通常A0纵向（33.1 × 46.8英寸）
  - 推荐模板：beamerposter或tikzposter
  - 字体大小：标题60-85pt，标题36-48pt，正文24-32pt
  - 包括：论文/补充材料的QR码
  可用模板：
  - assets/posters/beamerposter_academic.tex
  - assets/posters/tikzposter_research.tex
  ```

