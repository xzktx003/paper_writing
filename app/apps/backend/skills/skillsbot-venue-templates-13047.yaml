  # 场所模板

  ## 概述

  访问全面的LaTeX模板、格式化要求和提交指南，适用于主要科学出版物、学术会议、研究海报和资助提案。此技能提供即用型模板和详细规范，用于跨学科的成功学术提交。

  当准备期刊投稿、会议论文、研究海报或资助提案，并需要场所特定的格式化要求和模板时，使用此技能。

  ## 何时使用此技能

  此技能应在以下情况下使用：
  - 准备提交到特定期刊的手稿（Nature、Science、PLOS、IEEE等）
  - 撰写具有特定格式化要求的会议论文（NeurIPS、ICML、CHI等）
  - 为会议创建学术研究海报
  - 起草联邦机构（NSF、NIH、DOE、DARPA）或私人基金会的资助提案
  - 检查目标场所的格式化要求和页面限制
  - 用作者信息和项目详情自定义模板
  - 验证文档是否符合场所规范

  ## 使用科学示意图增强视觉效果

  **当使用此技能创建文档时，始终考虑添加科学图表和示意图以增强视觉传达。**

  如果您的文档尚未包含示意图或图表：
  - 使用 **scientific-schematics** 技能生成AI驱动的出版物质量图表
  - 只需用自然语言描述您所需的图表
  - Nano Banana Pro 将自动生成、审查并优化示意图

  **对于新文档：** 科学示意图应默认生成，以可视化表示文本中描述的关键概念、工作流程、架构或关系。

  **如何生成示意图：**
  ```bash
  python scripts/generate_schematic.py "您的图表描述" -o figures/output.png
  ```

  AI将自动：
  - 创建具有适当格式的出版物质量图像
  - 通过多次迭代审查和优化
  - 确保可访问性（色盲友好、高对比度）
  - 将输出保存在 figures/ 目录中

  **何时添加示意图：**
  - 论文的方法流程图
  - 概念框架图
  - 系统架构图
  - 数据流图
  - 实验设计可视化
  - 研究工作流程图
  - 任何受益于可视化的复杂概念

  有关创建示意图的详细指南，请参阅 scientific-schematics 技能文档。

  ---

  ## 核心能力

  ### 1. 期刊文章模板

  访问50多种主要科学期刊的LaTeX模板和格式化指南，涵盖各学科：

  **Nature 系列：**
  - Nature、Nature Methods、Nature Biotechnology、Nature Machine Intelligence
  - Nature Communications、Nature Protocols
  - Scientific Reports

  **Science 系列：**
  - Science、Science Advances、Science Translational Medicine
  - Science Immunology、Science Robotics

  **PLOS（公共科学图书馆）：**
  - PLOS ONE、PLOS Biology、PLOS Computational Biology
  - PLOS Medicine、PLOS Genetics

  **Cell Press：**
  - Cell、Neuron、Immunity、Cell Reports
  - Molecular Cell、Developmental Cell

  **IEEE 出版物：**
  - IEEE Transactions（各种学科）
  - IEEE Access、IEEE Journal模板

  **ACM 出版物：**
  - ACM Transactions、Communications of the ACM
  - ACM会议论文集

  **其他主要出版商：**
  - Springer期刊（各种学科）
  - Elsevier期刊（自定义模板）
  - Wiley期刊
  - BMC期刊
  - Frontiers期刊

  ### 2. 会议论文模板

  会议特定的模板，适用于主要学术会议的适当格式化：

  **机器学习与人工智能：**
  - NeurIPS（神经信息处理系统）
  - ICML（国际机器学习会议）
  - ICLR（国际学习表示会议）
  - CVPR（计算机视觉与模式识别）
  - AAAI（人工智能促进协会）

  **计算机科学：**
  - ACM CHI（人机交互）
  - SIGKDD（知识发现与数据挖掘）
  - EMNLP（自然语言处理经验方法）
  - SIGIR（信息检索）
  - USENIX会议

  **生物与生物信息学：**
  - ISMB（智能分子生物系统）
  - RECOMB（计算分子生物学研究）
  - PSB（太平洋生物计算研讨会）

  **工程：**
  - IEEE会议模板（各种学科）
  - ASME、AIAA会议

  ### 3. 研究海报模板

  学术海报模板，适用于会议演示：

  **标准格式：**
  - A0（841 × 1189 mm / 33.1 × 46.8 英寸）
  - A1（594 × 841 mm / 23.4 × 33.1 英寸）
  - 36" × 48"（914 × 1219 mm） - 常见美国尺寸
  - 42" × 56"（1067 × 1422 mm）
  - 48" × 36"（横向方向）

  **模板包：**
  - **beamerposter：** 经典学术海报模板
  - **tikzposter：** 现代、多彩海报设计
  - **baposter：** 结构化多列布局

  **设计特点：**
  - 远距离可读的最佳字体大小
  - 配色方案（色盲安全调色板）
  - 网格布局和列结构
  - 补充材料的QR码集成

  ### 4. 资助提案模板

  主要资助机构的模板和格式化要求：

  **NSF（国家科学基金会）：**
  - 完整提案模板（15页项目描述）
  - 项目摘要（1页：概述、知识价值、更广泛影响）
  - 预算和预算理由
  - 个人简历（3页限制）
  - 设施、设备和其他资源
  - 数据管理计划

  **NIH（国立卫生研究院）：**
  - R01研究资助（多年期）
  - R21探索性/发展性资助
  - K奖项（职业发展）
  - 特定目标页面（1页，最关键部分）
  - 研究策略（重要性、创新性、方法）
  - 个人简历（5页限制）

  **DOE（能源部）：**
  - 科学办公室提案
  - ARPA-E模板
  - 技术成熟度等级（TRL）描述
  - 商业化和影响部分

  **DARPA（国防高级研究计划局）：**
  - BAA（广泛机构公告）响应
  - Heilmeier问答框架
  - 技术方法和里程碑
  - 过渡计划

  **私人基金会：**
  - Gates基金会
  - Wellcome Trust
  - Howard Hughes医学研究所（HHMI）
  - Chan Zuckerberg Initiative（CZI）

  ## 工作流程：查找和使用模板

  ### 步骤1：确定目标场所

  确定特定的出版物场所、会议或资助机构：

  ```
  示例查询：
  - "我需要提交到 Nature"
  - "NeurIPS 2025的要求是什么？"
  - "展示NSF提案的格式化要求"
  - "我正在为ISMB创建海报"
  ```

  ### 步骤2：查询模板和要求

  访问场所特定的模板和格式化指南：

  **对于期刊：**
  ```bash
  # 加载期刊格式化要求
  参考：references/journals_formatting.md
  搜索："Nature"或特定期刊名称

  # 检索模板
  模板：assets/journals/nature_article.tex
  ```

  **对于会议：**
  ```bash
  # 加载会议格式化
  参考：references/conferences_formatting.md
  搜索："NeurIPS"或特定会议

  # 检索模板
  模板：assets/journals/neurips_article.tex
  ```

  **对于海报：**
  ```bash
  # 加载海报指南
  参考：references/posters_guidelines.md

  # 检索模板
  模板：assets/posters/beamerposter_academic.tex
  ```

  **对于资助：**
  ```bash
  # 加载资助要求
  参考：references/grants_requirements.md
  搜索："NSF"或特定机构

  # 检索模板
  模板：assets/grants/nsf_proposal_template.tex
  ```

  ### 步骤3：审查格式化要求

  自定义前检查关键规范：

  **需验证的关键要求：**
  - 页面限制（因场所而异）
  - 字体大小和家族
  - 边距规范
  - 行距
  - 引用风格（APA、Vancouver、Nature等）
  - 图表要求
  - 文件格式（PDF、Word、LaTeX源）
  - 匿名化（用于双盲评审）
  - 补充材料限制

  ### 步骤4：自定义模板

  使用帮助脚本或手动自定义：

  **选项1：帮助脚本（推荐）：**
  ```bash
  python scripts/customize_template.py \
    --template assets/journals/nature_article.tex \
    --title "您的论文标题" \
    --authors "第一作者，第二作者" \
    --affiliations "大学名称" \
    --output my_nature_paper.tex
  ```

  **选项2：手动编辑：**
  - 打开模板文件
  - 替换占位符文本（用注释标记）
  - 填写标题、作者、隶属机构、摘要
  - 向每个部分添加您的内容

  ### 步骤5：验证格式

  检查是否符合场所要求：

  ```bash
  python scripts/validate_format.py \
    --file my_paper.pdf \
    --venue "Nature" \
    --check-all
  ```

  **验证检查：**
  - 页面数在限制内
  - 字体大小正确
  - 边距满足规范
  - 参考文献格式化正确
  - 图表满足分辨率要求

  ### 步骤6：编译和审查

  编译LaTeX并审查输出：

  ```bash
  # 编译LaTeX
  pdflatex my_paper.tex
  bibtex my_paper
  pdflatex my_paper.tex
  pdflatex my_paper.tex

  # 或使用latexmk进行自动编译
  latexmk -pdf my_paper.tex
  ```

  审查清单：
  - [ ] 所有部分存在且格式化正确
  - [ ] 引用正确呈现
  - [ ] 图表带有适当标题出现
  - [ ] 页面数在限制内
  - [ ] 作者指南已遵循
  - [ ] 补充材料已准备（如需）

  ## 与其他技能的集成

  此技能与其他科学技能无缝协作：

  ### 科学写作
