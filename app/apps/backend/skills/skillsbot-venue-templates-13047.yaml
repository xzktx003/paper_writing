  ### 研究资助
  - 与 **research-grants** 技能交叉参考以获取内容策略
  - 使用此技能获取机构特定的模板和格式化
  - 结合进行全面资助提案准备

  ### LaTeX海报
  - 此技能提供场所无关的海报模板
  - 用于会议特定的海报要求
  - 与可视化技能集成以创建图表

  ## 模板类别

  ### 按文档类型

  | 类别 | 模板数量 | 常见场所 |
  |----------|---------------|---------------|
  | **期刊文章** | 30+ | Nature、Science、PLOS、IEEE、ACM、Cell Press |
  | **会议论文** | 20+ | NeurIPS、ICML、CVPR、CHI、ISMB |
  | **研究海报** | 10+ | A0、A1、36×48、各种包 |
  | **资助提案** | 15+ | NSF、NIH、DOE、DARPA、基金会 |

  ### 按学科

  | 学科 | 支持的场所 |
  |------------|------------------|
  | **生命科学** | Nature、Cell Press、PLOS、ISMB、RECOMB |
  | **物理科学** | Science、Physical Review、ACS、APS |
  | **工程** | IEEE、ASME、AIAA、ACM |
  | **计算机科学** | ACM、IEEE、NeurIPS、ICML、ICLR |
  | **医学** | NEJM、Lancet、JAMA、BMJ |
  | **跨学科** | PNAS、Nature Communications、Science Advances |

  ## 帮助脚本

  ### query_template.py

  按场所名称、类型或关键词搜索和检索模板：

  ```bash
  # 查找特定期刊的模板
  python scripts/query_template.py --venue "Nature" --type "article"

  # 按关键词搜索
  python scripts/query_template.py --keyword "machine learning"

  # 列出所有可用模板
  python scripts/query_template.py --list-all

  # 获取场所的要求
  python scripts/query_template.py --venue "NeurIPS" --requirements
  ```

  ### customize_template.py

  用作者和项目信息自定义模板：

  ```bash
  # 基本自定义
  python scripts/customize_template.py \
    --template assets/journals/nature_article.tex \
    --output my_paper.tex

  # 带作者信息
  python scripts/customize_template.py \
    --template assets/journals/nature_article.tex \
    --title "蛋白质折叠的新方法" \
    --authors "Jane Doe, John Smith, Alice Johnson" \
    --affiliations "MIT, Stanford, Harvard" \
    --email "[email protected]" \
    --output my_paper.tex

  # 交互模式
  python scripts/customize_template.py --interactive
  ```

  ### validate_format.py

  检查文档是否符合场所要求：

  ```bash
  # 验证编译的PDF
  python scripts/validate_format.py \
    --file my_paper.pdf \
    --venue "Nature" \
    --check-all

  # 检查特定方面
  python scripts/validate_format.py \
    --file my_paper.pdf \
    --venue "NeurIPS" \
    --check page-count,margins,fonts

  # 生成验证报告
  python scripts/validate_format.py \
    --file my_paper.pdf \
    --venue "Science" \
    --report validation_report.txt
  ```

  ## 最佳实践

  ### 模板选择
  1. **验证时效性：** 检查模板日期并与最新作者指南比较
  2. **检查官方来源：** 许多期刊提供官方LaTeX类
  3. **测试编译：** 编译模板后再添加内容
  4. **阅读注释：** 模板包含有用的行内注释

  ### 自定义
  1. **保留结构：** 不要移除必需的部分或包
  2. **遵循占位符：** 系统地替换标记的占位符文本
  3. **保持格式化：** 不要覆盖场所特定的格式化
  4. **保留备份：** 自定义前保存原始模板

  ### 合规性
  1. **检查页面限制：** 最终提交前验证
  2. **验证引用：** 使用场所的正确引用风格
  3. **测试图表：** 确保图表满足分辨率要求
  4. **审查匿名化：** 如需，移除识别信息

  ### 提交
  1. **遵循说明：** 阅读完整的作者指南
  2. **包括所有文件：** LaTeX源、图表、参考文献
  3. **正确生成：** 使用推荐的编译方法
  4. **检查输出：** 验证PDF符合预期

  ## 常见格式化要求

  ### 页面限制（典型）

  | 场所类型 | 典型限制 | 备注 |
  |------------|---------------|-------|
  | **Nature 文章** | 5 页 | ~3000词，不包括引用 |
  | **Science 报告** | 5 页 | 图表计入限制 |
  | **PLOS ONE** | 无限制 | 无限长度 |
  | **NeurIPS** | 8 页 | + 无限引用/附录 |
  | **ICML** | 8 页 | + 无限引用/附录 |
  | **NSF 提案** | 15 页 | 仅项目描述 |
  | **NIH R01** | 12 页 | 研究策略 |

  ### 按场所的引用风格

  | 场所 | 引用风格 | 格式 |
  |-------|---------------|--------|
  | **Nature** | 编号（上标） | Nature风格 |
  | **Science** | 编号（上标） | Science风格 |
  | **PLOS** | 编号（括号） | Vancouver |
  | **Cell Press** | 作者-年份 | Cell风格 |
  | **ACM** | 编号 | ACM风格 |
  | **IEEE** | 编号（括号） | IEEE风格 |
  | **APA 期刊** | 作者-年份 | APA第7版 |

  ### 图表要求

  | 场所 | 分辨率 | 格式 | 颜色 |
  |-------|-----------|--------|-------|
  | **Nature** | 300+ dpi | TIFF、EPS、PDF | RGB或CMYK |
  | **Science** | 300+ dpi | TIFF、PDF | RGB |
  | **PLOS** | 300-600 dpi | TIFF、EPS | RGB |
  | **IEEE** | 300+ dpi | EPS、PDF | RGB或灰度 |

  ## 写作风格指南

  除了格式化，此技能提供全面的**写作风格指南**，捕捉不同场所论文应如何*阅读*——不仅仅是外观。

  ### 为什么风格重要

  相同的研究，为Nature撰写时与为NeurIPS撰写时阅读方式非常不同：
  - **Nature/Science：** 非专家可访问，故事驱动，广泛意义
  - **Cell Press：** 机制深度，全面数据，需要图形摘要
  - **医学期刊：** 以患者为中心，证据分级，结构化摘要
  - **ML会议：** 贡献要点、消融研究、可重复性重点
  - **CS会议：** 领域特定约定、不同评估标准

  ### 可用风格指南

  | 指南 | 涵盖 | 关键主题 |
  |-------|--------|------------|
  | `venue_writing_styles.md` | 主概述 | 风格谱系、快速参考 |
  | `nature_science_style.md` | Nature、Science、PNAS | 可访问性、故事讲述、广泛影响 |
  | `cell_press_style.md` | Cell、Neuron、Immunity | 图形摘要、eTOC、亮点 |
  | `medical_journal_styles.md` | NEJM、Lancet、JAMA、BMJ | 结构化摘要、证据语言 |
  | `ml_conference_style.md` | NeurIPS、ICML、ICLR、CVPR | 贡献要点、消融 |
  | `cs_conference_style.md` | ACL、EMNLP、CHI、SIGKDD | 领域特定约定 |
  | `reviewer_expectations.md` | 所有场所 | 评审者关注点、反驳技巧 |

  ### 写作示例

  具体示例可在 `assets/examples/` 中找到：
  - `nature_abstract_examples.md`：高影响力期刊的流畅段落摘要
  - `neurips_introduction_example.md`：ML会议引言，带贡献要点
  - `cell_summary_example.md`：Cell Press摘要、亮点、eTOC格式
  - `medical_structured_abstract.md`：NEJM、Lancet、JAMA结构化格式

  ### 工作流程：适应场所

  1. **确定目标场所**并加载适当的风格指南
  2. **审查写作约定：** 语气、声音、摘要格式、结构
  3. **检查示例**获取特定部分的指导
  4. **审查期望：** 此场所的评审者优先关注什么？
  5. **应用格式化：** 使用 `assets/` 中的LaTeX模板

