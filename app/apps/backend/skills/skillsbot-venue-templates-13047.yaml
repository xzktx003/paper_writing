  - 使用 **literature-review** 技能进行系统文献搜索和综合
  - 从场所要求应用适当引用风格
  - 根据模板规范格式化参考文献

  ### 同行评审
  - 使用 **peer-review** 技能评估手稿质量
  - 使用此技能验证格式化合规性
