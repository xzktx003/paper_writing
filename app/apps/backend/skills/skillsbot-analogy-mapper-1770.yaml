  # 类比映射技能

  ## 目的

  识别和映射跨科学领域的结构类比，以促进跨领域见解转移和创造性假设生成。

  ## 能力

  - 识别结构相似性
  - 跨领域映射关系
  - 在领域间转移见解
  - 生成类比假设
  - 评估类比强度
  - 记录映射关系

  ## 使用指南

  1. 定义源领域
  2. 识别目标领域
  3. 映射结构元素
  4. 识别对应关系
  5. 生成见解
  6. 评估有效性

  ## 流程集成

  在科学发现工作流程中用于：
  - 跨领域发现
  - 创造性假设生成
  - 知识转移
  - 模式识别

  ## 配置

  - 领域本体
  - 映射算法
  - 相似性度量
  - 输出格式

  ## 输出成果

  - 类比映射
  - 结构对应关系
  - 见解报告
  - 有效性评估
