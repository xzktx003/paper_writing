  ### format_bibtex.py

  格式化和清理BibTeX文件。

  **功能**：
  - 标准化格式化
  - 排序条目（按键、年份、作者）
  - 移除重复
  - 验证语法
  - 修复常见错误
  - 强制执行引文键约定

  **用法**：
