  2. **自动化元数据提取** 从DOI、PMID、arXiv ID、URLs
  3. **引文验证** 带有DOI验证和完整性检查
  4. **BibTeX格式化** 带有标准化和清理工具
  5. **质量保证** 通过验证和报告
  6. **集成** 与科学写作工作流程
  7. **可重复性** 通过记录的搜索和提取方法

  使用此技能在您的研究过程中维护准确、完整的引文，并确保出版就绪的参考文献。
