  ## 核心工作流程

  引文管理遵循系统过程：

  ### 阶段1：论文发现与搜索

  **目标**：使用学术搜索引擎查找相关论文。

  #### Google Scholar搜索

  Google Scholar提供跨学科的最全面覆盖。

  **基本搜索**：
  ```bash
  # 搜索主题论文
  python scripts/search_google_scholar.py "CRISPR基因编辑" \
    --limit 50 \
    --output results.json

  # 使用年份过滤器搜索
  python scripts/search_google_scholar.py "机器学习蛋白质折叠" \
    --year-start 2020 \
    --year-end 2024 \
    --limit 100 \
    --output ml_proteins.json
  ```

  **高级搜索策略**（见`references/google_scholar_search.md`）：
  - 使用引号进行精确短语搜索：`"深度学习"`
  - 按作者搜索：`author:LeCun`
  - 在标题中搜索：`intitle:"神经网络"`
  - 排除术语：`机器学习 -survey`
  - 使用排序选项查找高被引论文
  - 按日期范围过滤以获取近期工作

  **最佳实践**：
  - 使用特定、有针对性的搜索术语
  - 包括关键技术术语和缩写
  - 对快速发展的领域按近期年份过滤
  - 检查“被引次数”以查找开创性论文
  - 导出顶级结果以供进一步分析

  #### PubMed搜索

  PubMed专门用于生物医学和生命科学文献（3500万+引文）。

  **基本搜索**：
  ```bash
  # 搜索PubMed
  python scripts/search_pubmed.py "阿尔茨海默病治疗" \
    --limit 100 \
    --output alzheimers.json

  # 使用MeSH术语和过滤器搜索
  python scripts/search_pubmed.py \
    --query '"阿尔茨海默病"[MeSH] AND "药物治疗"[MeSH]' \
    --date-start 2020 \
    --date-end 2024 \
    --publication-types "临床试验,综述" \
    --output alzheimers_trials.json
  ```

  **高级PubMed查询**（见`references/pubmed_search.md`）：
  - 使用MeSH术语：`"糖尿病"[MeSH]`
  - 字段标签：`"癌症"[标题]`, `"Smith J"[作者]`
  - 布尔运算符：`AND`, `OR`, `NOT`
  - 日期过滤器：`2020:2024[出版日期]`
  - 出版物类型：`"综述"[出版物类型]`
  - 与E-utilities API结合以进行自动化

  **最佳实践**：
  - 使用MeSH浏览器查找正确的受控词汇
  - 首先在PubMed高级搜索构建器中构建复杂查询
  - 使用OR包括多个同义词
  - 检索PMIDs以便于元数据提取
  - 导出到JSON或直接到BibTeX

  ### 阶段2：元数据提取

  **目标**：将论文标识符（DOI、PMID、arXiv ID）转换为完整、准确的元数据。

  #### 快速DOI到BibTeX转换

  对于单个DOIs，使用快速转换工具：

  ```bash
  # 转换单个DOI
  python scripts/doi_to_bibtex.py 10.1038/s41586-021-03819-2

  # 从文件转换多个DOIs
  python scripts/doi_to_bibtex.py --input dois.txt --output references.bib

  # 不同输出格式
  python scripts/doi_to_bibtex.py 10.1038/nature12345 --format json
  ```

  #### 全面元数据提取

  对于DOIs、PMIDs、arXiv IDs或URLs：

  ```bash
  # 从DOI提取
  python scripts/extract_metadata.py --doi 10.1038/s41586-021-03819-2

  # 从PMID提取
  python scripts/extract_metadata.py --pmid 34265844

  # 从arXiv ID提取
  python scripts/extract_metadata.py --arxiv 2103.14030

  # 从URL提取
  python scripts/extract_metadata.py --url "https://www.nature.com/articles/s41586-021-03819-2"

  # 从文件批量提取（混合标识符）
  python scripts/extract_metadata.py --input identifiers.txt --output citations.bib
  ```

  **元数据来源**（见`references/metadata_extraction.md`）：

  1. **CrossRef API**：DOIs的主要来源
     - 期刊文章的全面元数据
     - 出版商提供的信息
     - 包括作者、标题、期刊、卷、页、日期
     - 免费，无需API密钥

  2. **PubMed E-utilities**：生物医学文献
     - 官方NCBI元数据
     - 包括MeSH术语、摘要
     - PMID和PMCID标识符
     - 免费，建议高容量使用API密钥

  3. **arXiv API**：物理学、数学、计算机科学、q-bio领域的预印本
     - 预印本的完整元数据
     - 版本跟踪
     - 作者单位
     - 免费，开放获取

  4. **DataCite API**：研究数据集、软件、其他资源
     - 非传统学术输出的元数据
     - 数据集和代码的DOIs
     - 免费访问

  **提取内容**：
  - **必填字段**：作者、标题、年份
  - **期刊文章**：期刊、卷、期、页、DOI
  - **书籍**：出版商、ISBN、版本
  - **会议论文**：书名、会议地点、页
  - **预印本**：存储库（arXiv、bioRxiv）、预印本ID
  - **附加**：摘要、关键词、URL

  ### 阶段2.5：通过网络搜索进行元数据增强（强制性）

  **目标**：使用网络搜索检测并填补任何缺失的元数据字段。此阶段在提取之后、格式化之前运行，以确保每个BibTeX条目完整。

  **为什么这至关重要**：从API（CrossRef、PubMed、arXiv）提取元数据有时返回不完整的记录——缺少卷、页、期号或DOI。在参考文献被认为准备好之前，必须填补这些空白。

  #### 步骤1：扫描不完整条目

  提取元数据后，扫描BibTeX文件以查找缺少关键字段的条目：

  **每个条目类型要检查的字段**：

  | 条目类型 | 必须有 | 应该有 |
  |------------|-----------|-------------|
  | @article | 作者、标题、期刊、年份 | 卷、页、期号、doi |
  | @inproceedings | 作者、标题、书名、年份 | 页、doi |
  | @book | 作者/编辑、标题、出版商、年份 | isbn、doi |
  | @misc | 作者、标题、年份 | doi 或 url |

  任何缺少`卷`、`页`或`doi`的`@article`条目被视为**不完整**，必须增强。

  #### 步骤2：搜索缺失元数据

  对于每个不完整条目，搜索缺失信息：

  **选项A — 按标题和作者搜索**（最适合查找DOI）：
  ```bash
  python scripts/parallel_web.py search \
    "第一作者 标题 期刊名称 卷 页 DOI" \
    -o sources/search_YYYYMMDD_HHMMSS_citation_引文键.md
  ```

  **选项B — 从DOI页面提取**（当DOI已知但缺少卷/页时最佳）：
  ```bash
  python scripts/parallel_web.py extract \
    "https://doi.org/10.XXXX/YYYY" \
    --objective "提取完整引文元数据：卷、期、页、出版日期" \
    -o sources/extract_YYYYMMDD_HHMMSS_doi_引文键.md
  ```

  **选项C — 直接搜索CrossRef API**（编程化，快速）：
  ```bash
  python scripts/parallel_web.py search \
    "crossref DOI 元数据 第一作者 标题" \
    -o sources/search_YYYYMMDD_HHMMSS_crossref_引文键.md
  ```

  **选项D — 搜索Google Scholar**（对于难以找到的论文备用）：
  ```bash
  python scripts/parallel_web.py search \
    "google scholar 第一作者 标题 年份 完整引文" \
    -o sources/search_YYYYMMDD_HHMMSS_scholar_引文键.md
  ```

  #### 步骤3：更新BibTeX条目

  找到缺失元数据后：

  1. 打开`references.bib`
  2. 将缺失字段添加到不完整条目
  3. 验证找到的元数据与现有字段一致（相同作者、标题、年份）
  4. 记录每个修复：
     ```
     [HH:MM:SS] 元数据增强：[引文键] - 添加 volume={X}, pages={Y--Z}, doi={10.XXX/YYY} ✅
     ```

  #### 步骤4：处理找不到的元数据

  如果元数据在Web搜索后确实无法找到（非常旧的论文、模糊会议等）：

  1. 在BibTeX条目中添加`note`字段解释空白：
     ```bibtex
     note = {卷和页不可用 — 仅在线出版}
     ```
  2. 记录例外：
     ```
     [HH:MM:SS] 元数据不完整：[引文键] - 页不可用（仅在线出版）⚠️
     ```
  3. 这些例外应很少见 — 大多数现代论文具有可通过Web搜索找到的完整元数据。

  #### 快速参考：常见缺失字段及查找位置

  | 缺失字段 | 最佳搜索策略 |
  |---------------|---------------------|
  | DOI | 通过parallel_web.py搜索“作者 标题 DOI” |
  | 卷 | 从DOI页面提取或搜索“期刊 年份 标题 卷” |
  | 页 | 从DOI页面提取或搜索出版商网站 |
  | 期/号 | 从DOI页面提取或CrossRef |
  | 出版商 | 搜索“期刊 出版商”或检查期刊网站 |

  ---

  ### 阶段3：BibTeX格式化

  **目标**：生成干净、正确格式化的BibTeX条目。

  #### 理解BibTeX条目类型

  见`references/bibtex_formatting.md`获取完整指南。

  **常见条目类型**：
  - `@article`：期刊文章（最常见）
  - `@book`：书籍
  - `@inproceedings`：会议论文
  - `@incollection`：书籍章节
  - `@phdthesis`：学位论文
  - `@misc`：预印本、软件、数据集

  **按类型必填字段**：

  ```bibtex
  @article{引文键,
    author  = {姓1, 名1 and 姓2, 名2},
    title   = {文章标题},
    journal = {期刊名称},
    year    = {2024},
    volume  = {10},
    number  = {3},
    pages   = {123--145},
    doi     = {10.1234/示例}
  }

  @inproceedings{引文键,
    author    = {姓, 名},
    title     = {论文标题},
    booktitle = {会议名称},
    year      = {2024},
    pages     = {1--10}
  }

  @book{引文键,
    author    = {姓, 名},
    title     = {书籍标题},
    publisher = {出版商名称},
    year      = {2024}
  }
  ```

  #### 格式化和清理

  使用格式化器标准化BibTeX文件：

  ```bash
  # 格式化和清理BibTeX文件
  python scripts/format_bibtex.py references.bib \
    --output formatted_references.bib

  # 按引文键排序条目
  python scripts/format_bibtex.py references.bib \
    --sort key \
    --output sorted_references.bib

  # 按年份排序（最新优先）
  python scripts/format_bibtex.py references.bib \
    --sort year \
    --descending \
    --output sorted_references.bib

  # 移除重复
  python scripts/format_bibtex.py references.bib \
    --deduplicate \
    --output clean_references.bib

  # 验证和报告问题
  python scripts/format_bibtex.py references.bib \
    --validate \
    --report validation_report.txt
  ```

  **格式化操作**：
  - 标准化字段顺序
  - 一致的缩进和间距
  - 标题中的适当大写（用{}保护）
  - 标准化作者姓名格式
  - 一致的引文键格式
  - 移除不必要字段
  - 修复常见错误（缺少逗号、大括号）

  ### 阶段4：引文验证

  **目标**：验证所有引文准确且完整。

  #### 全面验证

  ```bash
  # 验证BibTeX文件
  python scripts/validate_citations.py references.bib

  # 验证并修复常见问题
  python scripts/validate_citations.py references.bib \
    --auto-fix \
    --output validated_references.bib

  # 生成详细验证报告
  python scripts/validate_citations.py references.bib \
    --report validation_report.json \
    --verbose
  ```

  **验证检查**（见`references/citation_validation.md`）：

  1. **DOI验证**：
     - DOI通过doi.org正确解析
     - BibTeX和CrossRef之间的元数据匹配
     - 没有损坏或无效的DOIs

  2. **必填字段**：
     - 所有必填字段存在用于条目类型
     - 没有空或缺少关键信息
     - 作者姓名正确格式化

  3. **数据一致性**：
     - 年份有效（4位数字，合理范围）
     - 卷/期是数字
     - 页正确格式化（例如，123--145）
     - URL可访问

  4. **重复检测**：
     - 相同的DOI多次使用
     - 相似标题（可能重复）
     - 相同作者/年份/标题组合

  5. **格式合规性**：
     - 有效的BibTeX语法
     - 适当的大括号和引号
     - 引文键唯一
     - 特殊字符正确处理

  **验证输出**：
  ```json
  {
    "total_entries": 150,
    "valid_entries": 145,
    "errors": [
      {
        "citation_key": "Smith2023",
        "error_type": "missing_field",
        "field": "journal",
        "severity": "high"
      },
      {
        "citation_key": "Jones2022",
        "error_type": "invalid_doi",
        "doi": "10.1234/broken",
        "severity": "high"
      }
    ],
    "warnings": [
      {
        "citation_key": "Brown2021",
        "warning_type": "possible_duplicate",
        "duplicate_of": "Brown2021a",
        "severity": "medium"
      }
    ]
  }
  ```

  ### 阶段5：与写作工作流程集成

  #### 为手稿构建参考文献

  创建参考文献的完整工作流程：

  ```bash
  # 1. 搜索主题论文
  python scripts/search_pubmed.py \
    '"CRISPR-Cas系统"[MeSH] AND "基因编辑"[MeSH]' \
    --date-start 2020 \
    --limit 200 \
    --output crispr_papers.json

  # 2. 从搜索结果中提取DOIs并转换为BibTeX
  python scripts/extract_metadata.py \
    --input crispr_papers.json \
    --output crispr_refs.bib

  # 3. 按DOI添加特定论文
  python scripts/doi_to_bibtex.py 10.1038/nature12345 >> crispr_refs.bib
  python scripts/doi_to_bibtex.py 10.1126/science.abcd1234 >> crispr_refs.bib

  # 4. 格式化和清理BibTeX文件
  python scripts/format_bibtex.py crispr_refs.bib \
    --deduplicate \
    --sort year \
    --descending \
    --output references.bib

  # 5. 验证所有引文
  python scripts/validate_citations.py references.bib \
    --auto-fix \
    --report validation.json \
    --output final_references.bib

  # 6. 审查验证报告并修复任何剩余问题
  cat validation.json

  # 7. 在LaTeX文档中使用
  # \bibliography{final_references}
  ```

  #### 与文献综述技能集成

  此技能补充`literature-review`技能：

  **文献综述技能** → 系统搜索和综合
  **引文管理技能** → 技术引文处理

  **组合工作流程**：
  1. 使用`literature-review`进行全面的多数据库搜索
  2. 使用`citation-management`提取和验证所有引文
  3. 使用`literature-review`综合主题发现
  4. 使用`citation-management`验证最终参考文献准确性

  ```bash
  # 完成文献综述后
  # 验证综述文档中的所有引文
  python scripts/validate_citations.py my_review_references.bib --report review_validation.json

  # 如果需要，格式化特定引文样式
  python scripts/format_bibtex.py my_review_references.bib \
    --style nature \
    --output formatted_refs.bib
  ```

  ## 搜索策略

  ### Google Scholar最佳实践

  **查找开创性和高影响论文**（关键）：

  始终根据被引次数、场地质量和作者声誉优先考虑论文：

  **被引次数阈值**：
  | 论文年龄 | 被引次数 | 分类 |
  |-----------|-----------|----------------|
  | 0-3年 | 20+ | 值得注意 |
  | 0-3年 | 100+ | 高影响力 |
  | 3-7年 | 100+ | 重要 |
  | 3-7年 | 500+ | 里程碑论文 |
  | 7+年 | 500+ | 开创性工作 |
  | 7+年 | 1000+ | 基础性 |

  **场地质量层级**：
  - **层级1（首选）**：Nature、Science、Cell、NEJM、Lancet、JAMA、PNAS
  - **层级2（高优先级）**：影响因子>10，顶级会议（NeurIPS、ICML、ICLR）
  - **层级3（好）**：专业期刊（IF 5-10）
  - **层级4（谨慎使用）**：低影响同行评审场地

  **作者声誉指标**：
  - h指数>40的高级研究人员
  - 在层级1场地发表多篇论文
  - 认可机构的领导职位
  - 奖项和编辑职位

  **高影响论文搜索策略**：
  - 按被引次数排序（最多被引优先）
  - 从层级1期刊查找综述文章以获取概览
  - 检查“被引次数”以评估影响和近期后续工作
  - 使用引文警报跟踪关键论文的新引文
  - 使用`source:Nature`或`source:Science`按顶级场地过滤
  - 使用`author:LastName`搜索已知领域领导者的论文

  **高级运算符**（完整列表见`references/google_scholar_search.md`）：
  ```
  "精确短语"           # 精确短语匹配
  author:姓氏          # 按作者搜索
  intitle:关键词          # 仅在标题中搜索
  source:期刊           # 搜索特定期刊
  -exclude                 # 排除术语
  OR                       # 替代术语
  2020..2024              # 年份范围
  ```

  **示例搜索**：
  ```
  # 查找主题的近期综述
  "CRISPR" intitle:review 2023..2024

  # 查找特定作者的主题论文
  author:Church "合成生物学"

  # 查找高被引基础工作
  "深度学习" 2012..2015 sort:citations

  # 排除综述并专注于方法
  "蛋白质折叠" -survey -review intitle:method
  ```

  ### PubMed最佳实践

  **使用MeSH术语**：
  MeSH（医学主题词表）提供受控词汇以进行精确搜索。

  1. **查找MeSH术语** 在 https://meshb.nlm.nih.gov/search
  2. **在查询中使用**：`"2型糖尿病"[MeSH]`
  3. **与关键词结合** 以进行全面覆盖

  **字段标签**：
  ```
  [标题]              # 仅在标题中搜索
  [标题/摘要]     # 在标题或摘要中搜索
  [作者]             # 按作者姓名搜索
  [期刊]            # 搜索特定期刊
  [出版日期]   # 日期范围
  [出版物类型]   # 文章类型
  [MeSH]              # MeSH术语
  ```

  **构建复杂查询**：
  ```bash
  # 最近发表的糖尿病治疗临床试验
  "2型糖尿病"[MeSH] AND "药物治疗"[MeSH] 
  AND "临床试验"[出版物类型] AND 2020:2024[出版日期]

  # 特定期刊中关于CRISPR的综述
  "CRISPR-Cas系统"[MeSH] AND "自然"[期刊] AND "综述"[出版物类型]

  # 特定作者的近期工作
  "Smith AB"[作者] AND 癌症[标题/摘要] AND 2022:2024[出版日期]
  ```

  **用于自动化的E-utilities**：
  脚本使用NCBI E-utilities API进行编程访问：
  - **ESearch**：搜索和检索PMIDs
  - **EFetch**：检索完整元数据
  - **ESummary**：获取摘要信息
  - **ELink**：查找相关文章

  见`references/pubmed_search.md`获取完整的API文档。

  ## 工具和脚本

  ### search_google_scholar.py

  搜索Google Scholar并导出结果。

  **功能**：
  - 带有速率限制的自动化搜索
  - 分页支持
  - 年份范围过滤
  - 导出到JSON或BibTeX
  - 被引次数信息

  **用法**：
  ```bash
  # 基本搜索
  python scripts/search_google_scholar.py "量子计算"

  # 带有过滤器的高级搜索
  python scripts/search_google_scholar.py "量子计算" \
    --year-start 2020 \
    --year-end 2024 \
    --limit 100 \
    --sort-by citations \
    --output quantum_papers.json

  # 直接导出到BibTeX
  python scripts/search_google_scholar.py "机器学习" \
    --limit 50 \
    --format bibtex \
    --output ml_papers.bib
  ```

