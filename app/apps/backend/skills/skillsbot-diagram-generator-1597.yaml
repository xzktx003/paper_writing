  # 图表生成器

  ## 目的

  为清晰传达数学概念，提供数学图表和可视化生成功能。

  ## 能力

  - 交换图（tikz-cd）
  - 函数绘图（pgfplots）
  - 图形绘制（tikz）
  - 3D曲面图
  - 相图
  - 几何构造

  ## 使用指南

  1.  **图表类型**：选择合适的可视化类型
  2.  **风格一致性**：保持一致的样式
  3.  **标签**：清晰且信息丰富的标注
  4.  **导出格式**：尽可能生成矢量图形

  ## 工具/库

  - TikZ
  - PGFPlots
  - Asymptote
  - matplotlib
