  # SEM-EDS 分析器

  ## 目的

  SEM-EDS 分析器技能提供全面的扫描电子显微镜和能谱分析，用于纳米材料的形貌和元素组成表征。

  ## 能力

  - 自动化 SEM 图像分析
  - EDS 谱图采集与定量分析
  - 元素分布图与线扫描
  - 基于 SEM 图像的颗粒尺寸分析
  - 表面形貌表征
  - 截面分析

  ## 使用指南

  ### SEM-EDS 分析

  1. **图像采集**
     - 针对样品优化加速电压
     - 选择合适的探测器（二次电子，背散射电子）
     - 最小化荷电效应

  2. **EDS 分析**
     - 在合适的千伏下采集谱图
     - 应用 ZAF 校正
     - 生成元素分布图

  3. **定量分析**
     - 使用无标样或有标样方法
     - 报告检测限
     - 考虑基体效应

  ## 流程集成

  - 多模态纳米材料表征流程
  - 纳米器件集成工艺流程
  - 纳米光刻工艺开发

  ## 输入模式

  ```json
  {
    "sample_id": "string",
    "analysis_type": "imaging|eds_point|eds_map|line_scan",
    "accelerating_voltage": "number (kV)",
    "elements_of_interest": ["string"]
  }
  ```

  ## 输出模式

  ```json
  {
    "morphology": {
      "features": ["string"],
      "measurements": [{"feature": "string", "value": "number", "unit": "string"}]
    },
    "composition": [{
