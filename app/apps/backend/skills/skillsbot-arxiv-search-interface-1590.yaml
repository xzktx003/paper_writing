  # arXiv搜索接口

  ## 目的

  提供arXiv数学文献的搜索和分析功能。

  ## 功能

  - arXiv API查询
  - 数学学科分类筛选
  - 引用网络分析
  - 摘要总结
  - 相关论文推荐
  - 版本跟踪

  ## 使用指南

  1. **查询构建**: 使用合适的math.XX分类
  2. **筛选**: 应用日期和作者筛选器
  3. **引用分析**: 构建引用网络
  4. **版本跟踪**: 检查更新版本

  ## 工具/库

  - arXiv API
  - Semantic Scholar
