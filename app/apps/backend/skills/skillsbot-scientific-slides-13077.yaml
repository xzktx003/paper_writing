  ## Nano Banana Pro脚本参考

  ### generate_slide_image.py

  使用Nano Banana Pro AI生成演示幻灯片。

  ```bash
  # 生成完整幻灯片为图像
  python scripts/generate_slide_image.py "幻灯片描述" -o output.png

  # 附加参考图像（Nano Banana Pro将看到这些）
  python scripts/generate_slide_image.py "创建一个幻灯片解释这个图表" -o slide.png --attach chart.png
  python scripts/generate_slide_image.py "将这些组合成比较幻灯片" -o compare.png --attach before.png --attach after.png
  ```

  **选项:**
  - `-o, --output`: 输出文件路径（必需）
  - `--attach IMAGE`: 附加图像文件作为生成的上下文（可多次使用）
  - `--iterations`: 最大优化迭代次数（默认: 2）
  - `--api-key`: OpenRouter API密钥（或设置OPENROUTER_API_KEY环境变量）
  - `-v, --verbose`: 详细输出

  **附加参考图像:**

  当您希望Nano Banana Pro查看现有图像作为上下文时，使用`--attach`：
  - "创建一个关于这些数据的幻灯片" + 附加数据图表
  - "制作一个带此标志的标题幻灯片" + 附加标志
  - "将这些图表组合成一个幻灯片" + 附加多个图像
  - "在幻灯片中解释此示意图" + 附加示意图

  **环境设置:**
  ```bash
  export OPENROUTER_API_KEY='your_api_key_here'
  # 获取密钥: https://openrouter.ai/keys
  ```

  ### slides_to_pdf.py

  将多个幻灯片图像组合成单个PDF。

  ```bash
  # 组合PNG文件
  python scripts/slides_to_pdf.py slides/*.png -o presentation.pdf

  # 按顺序组合特定文件
  python scripts/slides_to_pdf.py title.png intro.png methods.png -o talk.pdf

  # 从目录（按文件名排序）
  python scripts/slides_to_pdf.py slides/ -o presentation.pdf
  ```

  **选项:**
  - `-o, --output`: 输出PDF路径（必需）
  - `--dpi`: PDF分辨率（默认: 150）
  - `-v, --verbose`: 详细输出

  **提示:** 为正确排序，用数字命名幻灯片: `01_title.png`, `02_intro.png`, 等。

