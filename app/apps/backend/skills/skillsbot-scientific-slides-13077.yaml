  ## 使用科学示意图进行视觉增强

  除了幻灯片生成，使用**科学示意图**技能处理技术示意图：

  **何时使用科学示意图代替:**
  - 复杂技术示意图（电路图、化学结构）
  - 论文的出版质量图表（更高质量阈值）
  - 需要科学准确性审核的示意图

  **如何生成示意图:**
  ```bash
  python scripts/generate_schematic.py "您的示意图描述" -o figures/output.png
  ```

  有关创建示意图的详细指导，请参阅科学示意图技能文档。

