  # 科学演示幻灯片

  ## 概述

  科学演示是沟通研究、分享发现和与学术及专业受众互动的关键媒介。本技能提供全面的指导，帮助创建有效的科学演示，从结构和内容开发到视觉设计和交付准备。

  **关键焦点**: 会议、研讨会、答辩和专业演讲的口头演示。

  **关键设计哲学**: 科学演示应视觉吸引人且基于研究支持。避免枯燥、文本密集的幻灯片。出色的科学演示结合：
  - **引人入胜的视觉效果**: 高质量的图表、图像、示意图（不仅是项目符号）
  - **研究背景**: 通过研究查找建立可信度的适当引用
  - **最少文本**: 项目符号作为提示，口头提供解释
  - **专业设计**: 现代色彩方案、强大的视觉层次、充足空白
  - **故事驱动**: 清晰的叙事弧线，不仅仅是数据堆砌

  **记住**: 无聊的演示 = 被遗忘的科学。在通过适当引用保持科学严谨性的同时，让幻灯片视觉上令人难忘。

  ## 何时使用本技能

  本技能应在以下情况使用：
  - 准备会议演示（5-20分钟）
  - 开发学术研讨会（45-60分钟）
  - 创建论文或学位答辩演示
  - 设计资助提案演示
  - 准备期刊俱乐部演示
  - 在机构或公司进行研究演讲
  - 教授或教程演示科学主题

  ## 使用Nano Banana Pro生成幻灯片

  **本技能使用Nano Banana Pro AI自动生成出色的演示幻灯片。**

  ### 工作流程: PDF幻灯片

  使用Nano Banana Pro将每张幻灯片生成为完整图像，然后组合成PDF。这产生最视觉惊艳的结果。

  **工作原理:**
  1. **规划幻灯片组**: 为每张幻灯片创建详细计划（标题、关键点、视觉元素）
  2. **生成幻灯片**: 为每张幻灯片调用Nano Banana Pro创建完整幻灯片图像
  3. **组合为PDF**: 将幻灯片图像组装成单个PDF演示文稿

  **步骤1: 规划每张幻灯片**

  生成前，为演示创建详细计划：

  ```markdown
  # 演示计划: 机器学习简介

  ## 幻灯片1: 标题幻灯片
  - 标题: "机器学习: 从理论到实践"
  - 副标题: "AI会议2025"
  - 演讲者: Jane Smith博士, XYZ大学
  - 视觉: 现代抽象神经网络背景

  ## 幻灯片2: 简介
  - 标题: "为什么机器学习重要"
  - 关键点: 行业采用、突破应用、未来潜力
  - 视觉: 显示不同ML应用的图标（医疗保健、金融、机器人）

  ## 幻灯片3: 核心概念
  - 标题: "三种学习类型"
  - 内容: 监督学习、无监督学习、强化学习
  - 视觉: 三部分图显示每种类型及示例

  ... （继续所有幻灯片）
  ```

  **步骤2: 生成每张幻灯片**

  使用`generate_slide_image.py`脚本创建每张幻灯片。

  **关键: 格式一致性协议**

  为确保演示中所有幻灯片的统一格式：

  1. **定义格式目标**在演示开始时，并在每个提示中包括：
     - 色彩方案（例如，"深蓝色背景、白色文字、金色点缀"）
     - 字体风格（例如，"粗体无衬线标题、简洁正文"）
     - 视觉风格（例如，"简约、专业、企业美学"）
     - 布局方法（例如，"充足空白、左对齐内容"）

  2. **生成后续幻灯片时始终附加前一张幻灯片**使用`--attach`：
     - 这允许Nano Banana Pro查看并匹配现有风格
     - 创建整个幻灯片组的视觉连续性
     - 确保一致的颜色、字体和设计语言

  3. **默认作者为"K-Dense"**除非指定其他名称

  4. **在提示中直接包括引用**对于引用研究的幻灯片：
     - 在提示文本中添加引用，使其出现在生成的幻灯片上
     - 使用格式: "包括引用: (作者等, 年份)" 或 "显示参考文献: 作者等, 年份"
     - 对于多个引用，在提示中列出所有
     - 引用应出现在幻灯片底部的小文字中或相关内容附近

  5. **为结果幻灯片附加现有图表/数据**（数据驱动演示的关键）：
     - 创建关于结果的幻灯片时，始终检查工作目录中的现有图表：
       - 工作目录（例如，`figures/`、`results/`、`plots/`、`images/`）
       - 用户提供的输入文件或目录
       - 任何与演示相关的数据可视化、图表或图形
     - 使用`--attach`来包括这些图表，以便Nano Banana Pro可以整合它们：
       - 为结果幻灯片附加实际数据图表
       - 为方法幻灯片附加相关示意图
       - 为标题幻灯片附加标志或机构图像
     - 附加数据图表时，在提示中描述您想要什么：
       - "创建一个幻灯片展示附加的结果图表，突出关键发现"
       - "围绕这个附加图表构建幻灯片，添加标题和项目符号解释数据"
       - "将附加图表整合到结果幻灯片中，并提供解释"
     - **生成结果幻灯片前**: 列出工作目录中的文件以找到相关图表
     - 可以附加多个图表: `--attach fig1.png --attach fig2.png`

  **示例包括格式一致性、引用和图表附加:**

  ```bash
  # 标题幻灯片（第一张幻灯片 - 确立风格）
  python scripts/generate_slide_image.py "演示标题幻灯片: '机器学习: 从理论到实践'. 副标题: 'AI会议2025'. 演讲者: K-Dense. 格式目标: 深蓝色背景(#1a237e)、白色文字、金色点缀(#ffc107)、简约设计、无衬线字体、充足边距、无装饰元素。" -o slides/01_title.png

  # 带引用的内容幻灯片（附加前一张幻灯片以确保一致性）
  python scripts/generate_slide_image.py "演示幻灯片标题'为什么机器学习重要'. 三个关键点带简单图标: 1) 行业采用, 2) 突破应用, 3) 未来潜力. 引用: 在底部以小文字包括: (LeCun等, 2015; Goodfellow等, 2016). 格式目标: 匹配附加幻灯片风格 - 深蓝色背景、白色文字、金色点缀、简约专业设计、无视觉杂乱。" -o slides/02_intro.png --attach slides/01_title.png

  # 带多个引用的背景幻灯片
  python scripts/generate_slide_image.py "演示幻灯片标题'深度学习革命'. 关键里程碑: ImageNet突破(2012)、变换器架构(2017)、GPT模型(2018至今). 引用: 在底部显示参考文献: (Krizhevsky等, 2012; Vaswani等, 2017; Brown等, 2020). 格式目标: 精确匹配附加幻灯片风格 - 相同颜色、字体、简约设计。" -o slides/03_background.png --attach slides/02_intro.png

  # 结果幻灯片 - 从工作目录附加实际数据图表
  # 首先，检查存在哪些图表: ls figures/ 或 ls results/
  python scripts/generate_slide_image.py "演示幻灯片标题'模型性能结果'. 创建一个幻灯片展示附加的准确性图表. 要突出的关键发现: 1) 达到95%准确性, 2) 比基线高出12%, 3) 在测试集上一致. 引用: 在底部包括: (我们的结果, 2025). 格式目标: 精确匹配附加幻灯片风格。" -o slides/04_results.png --attach slides/03_background.png --attach figures/accuracy_chart.png

  # 结果幻灯片 - 多个图表比较
  python scripts/generate_slide_image.py "演示幻灯片标题'前后对比'. 使用两个附加图表构建并排比较幻灯片. 左侧: 基线结果, 右侧: 我们的改进结果. 添加简要标签解释改进. 格式目标: 精确匹配附加幻灯片风格。" -o slides/05_comparison.png --attach slides/04_results.png --attach figures/baseline.png --attach figures/improved.png

  # 方法幻灯片 - 附加现有示意图
  python scripts/generate_slide_image.py "演示幻灯片标题'系统架构'. 展示附加的架构示意图，并附简要解释项目符号: 1) 输入处理, 2) 模型推理, 3) 输出生成. 格式目标: 精确匹配附加幻灯片风格。" -o slides/06_architecture.png --attach slides/05_comparison.png --attach diagrams/system_architecture.png
  ```

  **重要: 创建结果幻灯片前，始终:**
  1. 列出工作目录中的文件: `ls -la figures/` 或 `ls -la results/`
  2. 检查用户提供的目录中的相关图表
  3. 附加应出现在幻灯片上的所有相关图表
  4. 描述Nano Banana Pro应如何整合附加图表

  **提示模板:**

  在每个提示中包括这些元素（根据需要自定义）：
  ```
  [幻灯片内容描述]
  引用: 在底部包括: (作者1等, 年份; 作者2等, 年份)
  格式目标: [背景颜色], [文字颜色], [点缀颜色], 简约专业设计, 无装饰元素, 与附加幻灯片风格一致。
  ```

  **步骤3: 组合为PDF**

  ```bash
  # 将所有幻灯片组合成PDF演示文稿
  python scripts/slides_to_pdf.py slides/*.png -o presentation.pdf
  ```

