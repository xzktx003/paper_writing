  ## 幻灯片生成提示写作

  ### 幻灯片提示

  对于完整幻灯片，包括：
  1. **幻灯片类型**: 标题幻灯片、内容幻灯片、示意图幻灯片等
  2. **标题**: 幻灯片标题文字
  3. **内容**: 关键点、项目项或描述
  4. **视觉元素**: 要包括的影像、图标或图形
  5. **设计风格**: 色彩方案、氛围、美学

  **示例提示:**

  ```
  标题幻灯片:
  "医学研究演示的标题幻灯片. 标题: '癌症免疫治疗进展'. 副标题: '2024年临床试验结果'. 专业医学主题，背景带有微妙DNA螺旋. 海军蓝和白色色彩方案。"

  内容幻灯片:
  "演示幻灯片标题'关键发现'. 三个项目符号: 1) 反应率提高40%, 2) 减少副作用, 3) 延长生存结果. 包括相关医学图标. 清洁、专业设计，绿色和白色颜色。"

  示意图幻灯片:
  "演示幻灯片显示研究方法. 标题: '研究设计'. 流程图显示: 患者筛选 → 随机化 → 治疗组(A, B, 对照组) → 随访 → 分析. CONSORT风格流程图. 专业学术风格。"
  ```

