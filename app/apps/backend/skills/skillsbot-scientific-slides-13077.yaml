  ## 核心能力

  ### 1. 演示结构和组织

  为不同上下文构建具有清晰叙事流和适当结构的演示。详细指导，请参阅`references/presentation_structure.md`。

  **通用故事弧线:**
  1. **钩子**: 抓住注意力（30-60秒）
  2. **上下文**: 建立重要性（5-10%的演讲）
  3. **问题/差距**: 识别未知内容（5-10%的演讲）
  4. **方法**: 解释您的解决方案（15-25%的演讲）
  5. **结果**: 呈现关键发现（40-50%的演讲）
  6. **含义**: 讨论意义（15-20%的演讲）
  7. **结尾**: 难忘结论（1-2分钟）

  **演讲特定结构:**
  - **会议演讲（15分钟）**: 专注于1-2个关键发现，最少方法
  - **学术研讨会（45分钟）**: 全面覆盖，详细方法，多项研究
  - **论文答辩（60分钟）**: 完整学位论文概述，覆盖所有研究
  - **资助提案（15分钟）**: 强调意义、可行性和影响
  - **期刊俱乐部（30分钟）**: 发表作品的批判性分析

  ### 2. 幻灯片设计原则

  创建专业、可读且易于访问的幻灯片，增强理解力。完整设计指南，请参阅`references/slide_design_principles.md`。

  **反模式: 避免枯燥、文本密集的演示**

  ❌ **使演示枯燥且易被遗忘的内容:**
  - 大量文本（每张幻灯片超过6个项目符号）
  - 小字体（<24pt正文）
  - 仅黑色文字在白色背景上（无视觉兴趣）
  - 无图像或图形（仅项目符号）
  - 通用模板，无自定义
  - 密集、段落式项目符号
  - 缺少研究背景（无引用）
  - 所有幻灯片看起来相同（重复）

  ✅ **使演示引人入胜且难忘的内容:**
  - 高质量视觉效果占主导（图表、照片、示意图、图标）
  - 作为点缀的大而清晰的文字（非主要内容）
  - 现代、有目的的色彩方案（非默认主题）
  - 充足空白（幻灯片呼吸）
  - 基于研究的背景（通过研究查找的适当引用）
  - 幻灯片布局多样（非全是项目列表）
  - 故事驱动流带视觉锚点
  - 专业、抛光外观

  **核心设计原则:**

  **视觉优先方法**（关键）：
  - 从视觉效果开始（图表、图像、示意图），添加文字作为支持
  - 每张幻灯片应有强大视觉元素（图表、照片、示意图）
  - 文字解释或补充视觉效果，而非替代
  - 思考: "如何展示，而不仅仅是讲述？"
  - 目标: 60-70%视觉内容, 30-40%文字

  **简约与影响:**
  - 每张幻灯片一个主要想法
  - 最少文本（3-4个项目符号，每个4-6词为佳）
  - 充足空白（幻灯片的40-50%）
  - 清晰的视觉焦点
  - 大胆、自信的设计选择

  **字体排版以增强参与度:**
  - 无衬线字体（Arial, Calibri, Helvetica）
  - 大字体: 24-28pt为正文（非最小18pt）
  - 36-44pt为幻灯片标题（加粗）
  - 高对比度（最小4.5:1，偏好7:1）
  - 使用大小建立层次，不仅仅是重量

  **颜色以增强影响:**
  - 现代色彩调色板（非默认蓝/灰）
  - 考虑您的主题: 生物技术？鲜艳颜色. 物理？光滑深色. 健康？温暖色调.
  - 有限调色板（总共3-5种颜色）
  - 高对比度组合
  - 色盲安全（避免红绿组合）
  - 有目的地使用颜色（非装饰）

  **布局以增强视觉兴趣:**
  - 变化布局（非全是项目列表）
  - 使用两列布局（文字+图表）
  - 全幻灯片图表以呈现关键结果
  - 不对称构图（比居中更有趣）
  - 焦点点的三分法则
  - 一致但不重复

  ### 3. 幻灯片数据可视化

  为演示上下文调整科学图表。详细指导，请参阅`references/data_visualization_slides.md`。

  **与期刊图表的关键差异:**
  - 简化，而非复制
  - 更大字体（最小18-24pt）
  - 较少面板（跨幻灯片分割）
  - 直接标签（非图例）
  - 通过颜色和大小强调
  - 复杂数据的渐进披露

  **可视化最佳实践:**
  - **柱状图**: 比较离散类别
  - **折线图**: 趋势和轨迹
  - **散点图**: 关系和相关性
  - **热图**: 矩阵数据和模式
  - **网络图**: 关系和连接

  **要避免的常见错误:**
  - 小字体（<18pt）
  - 一张幻灯片上过多面板
  - 复杂图例
  - 不足对比度
  - 杂乱布局

  ### 4. 演讲特定指导

  不同的演示上下文需要不同方法。每种类型的全面指导，请参阅`references/talk_types_guide.md`。

  **会议演讲**（10-20分钟）：
  - 结构: 简短简介 → 最少方法 → 关键结果 → 快速结论
  - 焦点: 仅1-2个主要发现
  - 风格: 引人入胜、快节奏、难忘
  - 目标: 产生兴趣、建立网络、获得邀请

  **学术研讨会**（45-60分钟）：
  - 结构: 全面覆盖，详细方法
  - 焦点: 多项发现，分析深度
  - 风格: 学术、互动、讨论导向
  - 目标: 展示专业知识、获得反馈、合作

  **论文答辩**（45-60分钟）：
  - 结构: 完整学位论文概述，所有研究
  - 焦点: 展示掌握和独立思考
  - 风格: 正式、全面、准备接受质询
  - 目标: 通过考试，辩护研究决策

  **资助提案**（10-20分钟）：
  - 结构: 问题 → 意义 → 方法 → 可行性 → 影响
  - 焦点: 创新、初步数据、团队资质
  - 风格: 有说服力、专注于结果和影响
  - 目标: 确保资金，展示可行性

  **期刊俱乐部**（20-45分钟）：
  - 结构: 上下文 → 方法 → 结果 → 批判性分析
  - 焦点: 理解和批判发表作品
  - 风格: 教育性、批判性、促进讨论
  - 目标: 学习、批判、讨论含义

  ### 5. 视觉审核和迭代

  通过视觉检查实施迭代改进。完整工作流程，请参阅`references/visual_review_workflow.md`。

  **视觉验证工作流程:**

  **步骤1: 转换PDF为图像**
  ```bash
  # 使用pdf_to_images脚本
  python scripts/pdf_to_images.py presentation.pdf review/slide --dpi 150
  ```

  **步骤2: 系统检查**

  检查每张幻灯片：
  - **文本溢出**: 文本在边缘被切断
  - **元素重叠**: 文本与图像或其他文本重叠
  - **字体大小**: 文字太小（<18pt）
  - **对比度**: 文字和背景之间对比度不足
  - **布局问题**: 错位、间距不当
  - **视觉质量**: 像素化图像、渲染差

  **步骤3: 记录问题**

  创建问题日志：
  ```
  幻灯片编号 | 问题类型 | 描述 | 优先级
  --------|-----------|-------------|----------
  3       | 文本溢出 | 项目符号4超出框边界 | 高
  7       | 重叠 | 图表与标题重叠 | 高
  12      | 字体大小 | 轴标签太小 | 中
  ```

  **步骤4: 重新生成问题幻灯片**

  用改进的提示重新生成任何有问题的幻灯片，然后重新组合为PDF。

  **步骤5: 重新验证**

  重复步骤1-4，直到无关键问题。

  **停止标准:**
  - 无文本溢出
  - 无不适当重叠
  - 所有文本可读（≥18pt等效）
  - 足够对比度（≥4.5:1）
  - 专业外观

  ### 6. 时间和节奏

  确保演示适应分配时间。全面时间指导，请参阅`assets/timing_guidelines.md`。

  **每分钟一张幻灯片规则:**
  - 通用指南: 约1张幻灯片每分钟
  - 复杂幻灯片调整（2-3分钟）
  - 简单幻灯片调整（15-30秒）

  **时间分配:**
  - 简介: 15-20%
  - 方法: 15-20%
  - 结果: 40-50%（最多时间）
  - 讨论: 15-20%
  - 结论: 5%

  **练习要求:**
  - 5分钟演讲: 练习5-7次
  - 15分钟演讲: 练习3-5次
  - 45分钟演讲: 练习3-4次
  - 答辩: 练习4-6次

  **时间检查点:**

  对于15分钟演讲：
  - 3-4分钟: 完成简介
  - 7-8分钟: 结果完成一半
  - 12-13分钟: 开始结论

  **紧急策略:**
  - 时间落后: 跳过备份幻灯片（提前准备）
  - 时间提前: 扩展示例，稍慢
  - 永不跳过结论

  ### 7. 验证和质量保证

  **自动验证:**
  ```bash
  # 验证幻灯片计数、时间、文件大小
  python scripts/validate_presentation.py presentation.pdf --duration 15

  # 生成报告:
  # - 幻灯片计数与建议范围
  # - 文件大小警告
  # - 幻灯片尺寸
  ```

  **手动验证清单:**
  - [ ] 幻灯片计数适合持续时间
  - [ ] 标题幻灯片完整（姓名、机构、日期）
  - [ ] 清晰叙事流
  - [ ] 每张幻灯片一个主要想法
  - [ ] 字体大小≥18pt（偏好24pt+）
  - [ ] 高对比度颜色
  - [ ] 图表大且可读
  - [ ] 无文本溢出或元素重叠
  - [ ] 整个设计一致
  - [ ] 幻灯片编号存在
  - [ ] 最终幻灯片有联系信息
  - [ ] 准备备份幻灯片
  - [ ] 在投影仪上测试（如可能）

  ## 演示开发工作流程

  ### 阶段1: 规划（创建幻灯片前）

  **定义上下文:**
  1. 什么类型的演讲？（会议、研讨会、答辩等）
  2. 多长？（分钟数）
  3. 谁是受众？（专家、普通、混合）
  4. 什么场所？（房间大小、A/V设置、虚拟/现场）
  5. 之后发生什么？（问答、讨论、网络）

  **研究和文献回顾**（使用研究查找技能）：
  1. **搜索背景文献**: 查找5-10篇建立上下文的关键论文
  2. **识别知识差距**: 使用研究查找查找未知内容
  3. **定位比较研究**: 查找具有类似方法或结果的论文
  4. **收集支持引用**: 收集支持您解释的论文
  5. **构建参考文献列表**: 创建.bib文件或幻灯片引用列表
  6. **记录要引用的关键发现**: 记录要引用的特定结果

  **开发内容大纲:**
  1. 识别1-3个核心信息
  2. 选择要呈现的关键发现
  3. 选择基本图表（通常3-6个用于15分钟演讲）
  4. 用适当引用规划叙事弧线
  5. 按部分分配时间

  **15分钟演讲示例大纲:**
  ```
  1. 标题（30秒）
  2. 钩子: 引人入胜的问题（60秒）[通过研究查找引用1-2篇论文]
  3. 背景（90秒）[引用3-4篇建立上下文的关键论文]
  4. 研究问题（45秒）[引用显示差距的论文]
  5. 方法概述（2分钟）
  6-8. 主要结果1（3分钟，3张幻灯片）
  9-10. 主要结果2（2分钟，2张幻灯片）
  11-12. 结果3或验证（2分钟，2张幻灯片）
  13-14. 讨论和含义（2分钟）[与2-3个先前研究比较]
  15. 结论（45秒）
  16. 致谢（15秒）

  注意: 创建幻灯片前，使用研究查找查找背景（幻灯片2-4）和讨论（幻灯片13-14）的论文。
  ```

  ### 阶段2: 设计和创建

  **设计考虑**（使其视觉吸引人）：
  - **选择现代色彩调色板**: 匹配您的主题（生物技术=鲜艳，物理=光滑，健康=温暖）
    - 非默认蓝/灰主题
    - 3-5种颜色，高对比度
  - **选择清洁字体**: 无衬线、大尺寸（24pt+正文）
  - **规划视觉元素**: 每张幻灯片使用什么图像、示意图、图标？
  - **创建变化布局**: 混合全图表、两列、文字覆盖（非全是项目符号）
  - **设计部分分隔器**: 带醒目图形的视觉中断
  - **添加视觉兴趣**: 背景图像、色块、形状、图标
  - **定义格式目标**: 在每个提示中包括一致样式（颜色、字体、风格）

  ### 阶段3: 内容开发

  **填充幻灯片**（视觉优先策略）：
  1. **从视觉效果开始**: 规划每个关键点使用哪个图表、图像、示意图
  2. **广泛使用研究查找**: 查找8-15篇论文以进行适当引用
  3. **首先创建视觉骨干**: 添加所有图表、图像、示意图
  4. **添加最少文字作为支持**: 项目符号补充视觉效果，不替代
  5. **设计部分分隔器**: 带图像或图形的视觉中断（非仅是文字）
  6. **优化标题/结尾**: 视觉醒目，包括联系信息
  7. **添加过渡/构建**: 控制信息流

  **视觉内容要求**（使幻灯片引人入胜）：
  - **图像**: 使用高质量照片、插图、概念图形
  - **图标**: 概念的视觉表示（非装饰）
  - **示意图**: 流程图、示意图、过程图
  - **图表**: 带大标签（18-24pt）的简化研究图表
  - **图表**: 带清晰信息的清洁数据可视化
  - **图形**: 视觉隐喻、概念插图
  - **色块**: 使用彩色形状视觉组织内容
  - 目标: 每张幻灯片至少1-2个强大视觉元素

  **科学内容**（基于研究支持）：
  - **引用**: 广泛使用研究查找查找相关论文
    - 简介: 引用3-5篇建立上下文和差距的论文
    - 背景: 视觉显示关键先前工作（非仅引用）
    - 讨论: 引用3-5篇与您结果比较的论文
    - 使用作者-年份格式（Smith等, 2023）以增强可读性
    - 引用建立可信度和科学严谨性
  - **图表**: 从论文简化，大标签（最小18-24pt）
  - **方程**: 大、清晰，解释每个术语（谨慎使用）
  - **表格**: 最少，突出关键比较（非数据堆砌）
  - **代码/算法**: 使用语法高亮，保持简短

  **文字指南**（少即是多）：
  - 项目符号，非段落
  - 每张幻灯片3-4个项目符号（最多6个，仅当必要）
  - 每个项目符号4-6词（比6×6规则短）
  - 关键术语加粗
  - 文字是支持角色，视觉效果是明星
  - 使用构建控制节奏

  ### 阶段4: 视觉验证

  **生成图像:**
  ```bash
  # 转换PDF为图像
  python scripts/pdf_to_images.py presentation.pdf review/slides
  ```

  **系统审核:**
  1. 查看每张幻灯片图像
  2. 根据问题清单检查
  3. 用幻灯片编号记录问题
  4. 从远处测试可读性（以50%大小查看）

  **要修复的常见问题:**
  - 文本超出边界
  - 图表与文字重叠
  - 字体大小太小
  - 差对比度
  - 错位

  **迭代:**
  1. 识别生成幻灯片中的问题
  2. 用改进提示重新生成问题幻灯片
  3. 重新组合为PDF
  4. 重新检查
  5. 重复直到清洁

  ### 阶段5: 练习和优化

  **练习计划:**
  - 运行1: 粗糙草稿（会超时）
  - 运行2: 平滑过渡
  - 运行3: 精确时间
  - 运行4: 最终抛光
  - 运行5+: 维护（前一天，当天上午）

  **要练习的内容:**
  - 完整演讲带计时器
  - 困难解释
  - 部分间过渡
  - 开头和结尾（直到完美）
  - 预期问题

  **基于练习的优化:**
  - 如果超时，剪切幻灯片
  - 如果不清晰，扩展解释
  - 为清晰调整措辞
  - 标记时间检查点
  - 准备备份幻灯片

  ### 阶段6: 最终准备

  **技术检查:**
  - [ ] 保存多个副本（笔记本电脑、云、USB）
  - [ ] 在演示计算机上工作
  - [ ] 适配器/电缆可用
  - [ ] 备份PDF版本
  - [ ] 用投影仪测试（如可能）

  **内容最终:**
  - [ ] 无打字错误或错误
  - [ ] 所有图表高质量
  - [ ] 幻灯片编号正确
  - [ ] 最终幻灯片有联系信息
  - [ ] 备份幻灯片就绪

  **交付准备:**
  - [ ] 准备笔记（如使用）
  - [ ] 计时器/手机就绪
  - [ ] 水可用
  - [ ] 名片/讲义
  - [ ] 熟悉材料（3+次练习）

  ## 与其他技能的集成

  **研究查找**（科学演示的关键）：
  - **背景开发**: 搜索文献以构建简介上下文
  - **引用收集**: 查找在演讲中要引用的关键论文
  - **差距识别**: 识别未知内容以激发研究
  - **先前工作比较**: 查找与您结果比较的论文
  - **支持证据**: 定位支持您解释的文献
  - **问题准备**: 查找可能告知问答响应的论文
  - **开发任何科学演示时始终使用研究查找**以确保适当上下文和引用

  **科学写作:**
  - 将论文内容转换为演示格式
  - 提取关键发现并简化
  - 使用相同图表（但重新设计用于幻灯片）
  - 维护一致术语

  **数据可视化:**
  - 创建适合演示的图表
  - 简化复杂可视化
  - 确保从远处可读
  - 使用渐进披露

  ## 要避免的常见陷阱

  ### 内容错误

  **枯燥、无聊的演示**（关键避免）：
  - 问题: 文本密集幻灯片，无视觉兴趣，缺少研究背景
  - 迹象: 全是项目符号，无图像，默认模板，无引用
  - 解决方案: 
    - 使用研究查找查找8-15篇论文以获取可信上下文
    - 为每张幻灯片添加高质量视觉效果（图表、照片、示意图、图标）
    - 选择反映您主题的现代色彩调色板
    - 变化幻灯片布局（非全是项目列表）
    - 用视觉效果讲故事，谨慎使用文字

  **内容过多:**
  - 问题: 尝试包括论文中的所有内容
  - 解决方案: 简短演讲专注于1-2个关键发现，视觉展示

  **文字过多:**
  - 问题: 幻灯片上完整段落，密集项目符号，逐字阅读
  - 解决方案: 3-4个项目符号，每个4-6词，让视觉效果传达信息

  **缺少研究背景:**
  - 问题: 无引用，无支持的主张，定位不清晰
  - 解决方案: 使用研究查找查找论文，简介中引用3-5篇，讨论中引用3-5篇

  **叙事差:**
  - 问题: 主题间跳跃，无清晰故事，无流
  - 解决方案: 遵循故事弧线，使用视觉过渡，维护线索

  **匆忙通过结果:**
  - 问题: 方法简短，结果简短，讨论长
  - 解决方案: 花40-50%时间在结果上，视觉展示数据

  ### 设计错误

  **通用、默认外观:**
  - 问题: 使用通用样式，无自定义，看起来过时
  - 解决方案: 在提示中选择现代色彩调色板，指定字体/布局，添加视觉个性

  **文本密集、视觉贫乏:**
  - 问题: 全是项目符号幻灯片，无图像或图形，看起来无聊
  - 解决方案: 为每张幻灯片添加图表、照片、示意图、图标，使其视觉有趣

  **小字体:**
  - 问题: 正文<18pt，从后面不可读，看起来不专业
  - 解决方案: 24-28pt为正文（非仅18pt最小），36-44pt为标题

  **低对比度:**
  - 问题: 浅色文字在浅色背景上，可见性差，难以阅读
  - 解决方案: 高对比度（偏好7:1，非仅4.5:1最小），用对比检查器测试

  **杂乱幻灯片:**
  - 问题: 元素过多，无空白，压倒性
  - 解决方案: 每张幻灯片一个想法，40-50%空白，充足间距

  **不一致格式:**
  - 问题: 幻灯片间不同字体、颜色、布局，看起来业余
  - 解决方案: 使用主幻灯片，维护设计系统，专业一致

  **缺少视觉层次:**
  - 问题: 所有内容相同大小和颜色，无强调，焦点不清晰
  - 解决方案: 大小差异（标题大，正文中），颜色强调，清晰焦点

  ### 时间错误

  **不练习:**
  - 问题: 第一次在演示期间进行
  - 解决方案: 用计时器练习最小3次

  **无时间检查点:**
  - 问题: 直到太晚才意识到时间落后
  - 解决方案: 设置3-4个检查点，全程监控

  **超时:**
  - 问题: 极不专业，切入问答时间
  - 解决方案: 练习到精确时间，准备计划B（跳过幻灯片）

  **跳过结论:**
  - 问题: 时间耗尽，匆忙或跳过结尾
  - 解决方案: 永不跳过结论，剪切早期内容

  ## 工具和脚本

  ### Nano Banana Pro脚本

  **generate_slide_image.py** - 使用AI生成幻灯片：
  ```bash
  # 生成完整幻灯片
  python scripts/generate_slide_image.py "标题: 简介\n内容: 关键点" -o slide.png

  # 选项:
  # -o, --output       输出文件路径（必需）
  # --attach IMAGE     附加参考图像作为上下文
  # --iterations N     最大优化迭代次数（默认: 2）
  # -v, --verbose      详细输出
  ```

  **slides_to_pdf.py** - 将幻灯片图像组合成PDF：
  ```bash
  # 使用通配符模式
  python scripts/slides_to_pdf.py slides/*.png -o presentation.pdf

  # 从目录（按文件名排序）
  python scripts/slides_to_pdf.py slides/ -o presentation.pdf

  # 选项:
  # -o, --output    输出PDF路径（必需）
  # --dpi N         PDF分辨率（默认: 150）
  # -v, --verbose   详细输出
  ```

  ### 验证脚本

  **validate_presentation.py:**
  ```bash
  python scripts/validate_presentation.py presentation.pdf --duration 15

  # 检查:
  # - 幻灯片计数与建议范围
  # - 文件大小警告
  # - 幻灯片尺寸
  ```

  **pdf_to_images.py:**
  ```bash
  python scripts/pdf_to_images.py presentation.pdf output/slide --dpi 150

  # 转换PDF为图像以进行视觉检查
  # 支持: JPG, PNG
  # 可调DPI
  # 页面范围选择
  ```

