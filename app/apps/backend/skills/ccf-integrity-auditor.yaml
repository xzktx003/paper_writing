content: |
  # CCF Integrity Auditor

  ## Overview
  Academic integrity audit for CCF-A papers. Verifies that every claim is supported, every number is consistent, every citation is accurate, and every BibTeX entry is correct.

  ## Audit Dimensions
  - **Claim-Support Mapping**: Every major claim → supporting evidence
  - **Numerical Consistency**: Numbers in text vs. tables vs. figures
  - **Citation Audit**: Each citation actually supports the claim it's attached to
  - **BibTeX Verification**: Entry correctness and completeness

  ## Output
  - Claim-support table
  - Numerical consistency report
  - Citation audit results
  - Integrity score with issues flagged
