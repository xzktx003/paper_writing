  ## 模板

  即用海报模板在`assets/`目录中：

  - beamerposter模板（经典、现代、色彩鲜艳）
  - tikzposter模板（默认、射线、波浪、信封）
  - baposter模板（肖像、横向、极简）
  - 来自各种科学学科的示例海报
  - 颜色方案定义和机构模板

  加载这些模板并为您的特定研究和会议要求自定义。
