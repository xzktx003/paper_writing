  # LaTeX 研究海报

  ## 概述

  研究海报是科学沟通的重要媒介，用于会议、研讨会和学术活动。此技能提供全面的指导，使用LaTeX包创建专业、视觉吸引力的研究海报。生成出版质量的、具有适当布局、排版、颜色方案和视觉层次的海报。

  ## 何时使用此技能

  此技能应在以下情况下使用：
  - 为会议、研讨会或海报会议创建研究海报
  - 设计大学活动或论文答辩的学术海报
  - 准备研究视觉摘要用于公众参与
  - 将科学论文转换为海报格式
  - 为研究小组或部门创建模板海报
  - 设计符合特定会议尺寸要求的海报（A0、A1、36×48英寸等）
  - 构建具有复杂多列布局的海报
  - 在海报格式中集成图形、表格、方程和引用

  ## 使用科学示意图进行视觉增强

  **⚠️ 强制性要求：每个研究海报必须至少包含2-3个使用scientific-schematics技能生成的AI生成图形。**

  这不是可选的。海报主要是视觉媒体——文字过多的海报无法有效沟通。在最终确定任何海报之前：
  1. 至少生成两个示意图或图表
  2. 目标3-4个图形用于全面海报（方法流程图、关键结果可视化、概念框架）
  3. 图形应占据海报面积的40-50%

  **如何生成图形：**
  - 使用**scientific-schematics**技能生成AI驱动的出版质量图表
  - 只需用自然语言描述您想要的图表
  - Nano Banana Pro将自动生成、审查和精炼示意图

  **如何生成示意图：**
  ```bash
  python scripts/generate_schematic.py "您的图表描述" -o figures/output.png
  ```

  AI将自动：
  - 创建具有适当格式化的出版质量图像
  - 通过多次迭代审查和精炼
  - 确保可访问性（色盲友好、高对比度）
  - 将输出保存到figures/目录

  **何时添加示意图：**
  - 海报内容的研究方法流程图
  - 概念框架图表
  - 实验设计可视化
  - 数据分析管道图表
  - 系统架构图表
  - 生物路径图
  - 任何受益于可视化的复杂概念

  有关创建示意图的详细指导，请参阅scientific-schematics技能文档。

  ---

  ## 核心能力

  ### 1. LaTeX海报包

  支持三个主要的LaTeX海报包，每个都有独特优势。有关详细比较和包特定指导，请参阅`references/latex_poster_packages.md`。

  **beamerposter：**
  - Beamer演示类的扩展
  - Beamer用户的熟悉语法
  - 优秀的主题支持和自定义
  - 最佳用于：传统学术海报、机构品牌

  **tikzposter：**
  - 现代、灵活的设计，集成TikZ
  - 内置颜色主题和布局模板
  - 通过TikZ命令的广泛自定义
  - 最佳用于：色彩鲜艳、现代设计、自定义图形

  **baposter：**
  - 基于盒子的布局系统
  - 自动间距和定位
  - 专业外观的默认样式
  - 最佳用于：多列布局、一致的间距

  ### 2. 海报布局和结构

  遵循视觉沟通原则创建有效海报布局。有关全面的布局指导，请参阅`references/poster_layout_design.md`。

  **常见海报部分：**
  - **标题/标题：** 标题、作者、机构、标志
  - **引言/背景：** 研究背景和动机
  - **方法/方法：** 方法和实验设计
  - **结果：** 关键发现，带有图形和数据可视化
  - **结论：** 主要收获和影响
  - **参考文献：** 关键引用（通常缩写）
  - **致谢：** 资金、合作者、机构

  **布局策略：**
  - **基于列的布局：** 2列、3列或4列网格
  - **基于块的布局：** 内容块的灵活排列
  - **Z型流程：** 逻辑指导读者通过内容
  - **视觉层次：** 使用大小、颜色和间距强调关键点

  ### 3. 研究海报的设计原则

  应用基于证据的设计原则以获得最大影响。有关详细设计指导，请参阅`references/poster_design_principles.md`。

  **排版：**
  - 标题：72-120pt以从远处可见
  - 部分标题：48-72pt
  - 正文文本：最小24-36pt以从4-6英尺可读
  - 使用无衬线字体（Arial、Helvetica、Calibri）以提高清晰度
  - 最多限制到2-3种字体系列

  **颜色和对比度：**
  - 使用高对比度颜色方案以提高可读性
  - 机构调色板用于品牌
  - 色盲友好调色板（避免红绿组合）
  - 空白是活动空间——不要拥挤

  **视觉元素：**
  - 高分辨率图形（打印时最小300 DPI）
  - 所有图形上大而清晰的标签
  - 整个过程中一致的图形样式
  - 战略使用图标和图形
  - 平衡文本与视觉内容（推荐40-50%视觉）

  **内容指南：**
  - **少即是多：** 推荐总共300-800字
  - 可扫描性的要点而非段落
  - 清晰、简洁的信息传递
  - 自解释的图形，具有最小文本解释
  - QR码用于补充材料或在线资源

  ### 4. 标准海报尺寸

  支持国际和会议特定海报尺寸：

  **国际标准：**
  - A0（841 × 1189 mm / 33.1 × 46.8英寸）- 最常见欧洲标准
  - A1（594 × 841 mm / 23.4 × 33.1英寸）- 较小格式
  - A2（420 × 594 mm / 16.5 × 23.4英寸）- 紧凑海报

  **北美标准：**
  - 36 × 48英寸（914 × 1219 mm）- 常见美国会议尺寸
  - 42 × 56英寸（1067 × 1422 mm）- 大格式
  - 48 × 72英寸（1219 × 1829 mm）- 超大

  **方向：**
  - 肖像（垂直）- 最常见，传统
  - 横向（水平）- 更适用于宽内容、时间线

  ### 5. 包特定模板

  为每个主要包提供即用模板。模板在`assets/`目录中可用。

  **beamerposter模板：**
  - `beamerposter_classic.tex` - 传统学术风格
  - `beamerposter_modern.tex` - 干净、最小设计
  - `beamerposter_colorful.tex` - 色彩鲜艳的主题，带有块

  **tikzposter模板：**
  - `tikzposter_default.tex` - 标准tikzposter布局
  - `tikzposter_rays.tex` - 现代设计，带有射线主题
  - `tikzposter_wave.tex` - 专业波浪风格主题

  **baposter模板：**
  - `baposter_portrait.tex` - 经典肖像布局
  - `baposter_landscape.tex` - 横向多列
  - `baposter_minimal.tex` - 极简设计

  ### 6. 图形和图像集成

  优化视觉内容用于海报展示：

  **最佳实践：**
  - 尽可能使用矢量图形（PDF、SVG）以提高可扩展性
  - 栅格图像：在最终打印尺寸下最小300 DPI
  - 一致的图像样式（边框、标题、大小）
  - 将相关图形分组
  - 使用子图形进行比较

  **LaTeX图形命令：**
  ```latex
  % 包括图形包
  \usepackage{graphicx}

  % 简单图形
  \includegraphics[width=0.8\linewidth]{figure.pdf}

  % tikzposter中带有标题的图形
  \block{结果}{
    \begin{tikzfigure}
      \includegraphics[width=0.9\linewidth]{results.png}
    \end{tikzfigure}
  }

  % 多个子图形
  \usepackage{subcaption}
  \begin{figure}
    \begin{subfigure}{0.48\linewidth}
      \includegraphics[width=\linewidth]{fig1.pdf}
      \caption{条件A}
    \end{subfigure}
    \begin{subfigure}{0.48\linewidth}
      \includegraphics[width=\linewidth]{fig2.pdf}
      \caption{条件B}
    \end{subfigure}
  \end{figure}
  ```

  ### 7. 颜色方案和主题

  为各种上下文提供专业调色板：

  **学术机构颜色：**
  - 匹配大学或部门品牌
  - 使用官方颜色代码（RGB、CMYK或LaTeX颜色定义）

  **科学调色板**（色盲友好）：
  - Viridis：从紫色到黄色的专业渐变
  - ColorBrewer：数据可视化的研究测试调色板
  - IBM Color Blind Safe：可访问的企业调色板

  **包特定主题选择：**

  **beamerposter：**
  ```latex
  \usetheme{Berlin}
  \usecolortheme{beaver}
  ```

  **tikzposter：**
  ```latex
  \usetheme{Rays}
  \usecolorstyle{Denmark}
  ```

  **baposter：**
  ```latex
  \begin{poster}{
    background=plain,
    bgColorOne=white,
    headerColorOne=blue!70,
    textborder=rounded
  }
  ```

  ### 8. 排版和文本格式化

  确保可读性和视觉吸引力：

  **字体选择：**
  ```latex
  % 推荐海报使用无衬线字体
  \usepackage{helvet}      % Helvetica
  \usepackage{avant}       % Avant Garde
  \usepackage{sfmath}      % 无衬线数学字体

  % 设置默认为无衬线
  \renewcommand{\familydefault}{\sfdefault}
  ```

  **文本大小调整：**
  ```latex
  % 调整文本大小以提高可见性
  \setbeamerfont{title}{size=\VeryHuge}
  \setbeamerfont{author}{size=\Large}
  \setbeamerfont{institute}{size=\normalsize}
  ```

  **强调和突出：**
  - 使用粗体关键词：`\textbf{重要}`
  - 谨慎使用颜色突出：`\textcolor{blue}{突出}`
  - 关键信息的框
  - 避免斜体（从远处更难阅读）

  ### 9. QR码和互动元素

  增强现代会议的互动性：

  **QR码集成：**
  ```latex
  \usepackage{qrcode}

  % 链接到论文、代码仓库或补充材料
  \qrcode[height=2cm]{https://github.com/username/project}

  % 带有标题的QR码
  \begin{center}
    \qrcode[height=3cm]{https://doi.org/10.1234/paper}\\
    \small 扫描获取完整论文
  \end{center}
  ```

  **数字增强：**
  - 链接到GitHub仓库用于代码
  - 链接到视频演示或演示
  - 链接到互动Web可视化
  - 链接到补充数据或附录

  ### 10. 编译和输出

  生成高质量的PDF输出用于打印或数字显示：

  **编译命令：**
  ```bash
  # 基本编译
  pdflatex poster.tex

  # 带有参考书目
  pdflatex poster.tex
  bibtex poster
  pdflatex poster.tex
  pdflatex poster.tex

  # 对于beamer基础的海报
  lualatex poster.tex  # 更好的字体支持
  xelatex poster.tex   # Unicode和现代字体
  ```

  **确保全页面覆盖：**

  海报应使用整个页面，无过多边距。正确配置包：

  **beamerposter - 全页面设置：**
  ```latex
  \documentclass[final,t]{beamer}
  \usepackage[size=a0,scale=1.4,orientation=portrait]{beamerposter}

  % 移除默认beamer边距
  \setbeamersize{text margin left=0mm, text margin right=0mm}

  % 使用geometry进行精确控制
  \usepackage[margin=10mm]{geometry}  % 所有边10mm边距

  % 移除导航符号
  \setbeamertemplate{navigation symbols}{}

  % 移除页脚和页眉（如果不需要）
  \setbeamertemplate{footline}{}
  \setbeamertemplate{headline}{}
  ```

  **tikzposter - 全页面设置：**
  ```latex
  \documentclass[
    25pt,                      % 字体缩放
    a0paper,                   % 纸张尺寸
    portrait,                  % 方向
    margin=10mm,               % 外边距（最小）
    innermargin=15mm,          % 块内空间
    blockverticalspace=15mm,   % 块间空间
    colspace=15mm,             % 列间空间
    subcolspace=8mm            % 子列间空间
  ]{tikzposter}

  % 这确保内容填充页面
  ```

  **baposter - 全页面设置：**
  ```latex
  \documentclass[a0paper,portrait,fontscale=0.285]{baposter}

  \begin{poster}{
    grid=false,
    columns=3,
    colspacing=1.5em,          % 列间空间
    eyecatcher=true,
    background=plain,
    bgColorOne=white,
    borderColor=blue!50,
    headerheight=0.12\textheight,  % 12%用于页眉
    textborder=roundedleft,
    headerborder=closed,
    boxheaderheight=2em        % 一致的盒子页眉高度
  }
  % 内容在这里
  \end{poster}
  ```

  **常见问题和修复：**

  **问题：** 海报周围有大白色边距
  ```latex
  % beamerposter的修复
  \setbeamersize{text margin left=5mm, text margin right=5mm}

  % tikzposter的修复
  \documentclass[..., margin=5mm, innermargin=10mm]{tikzposter}

  % baposter的修复 - 在文档类中调整
  \documentclass[a0paper, margin=5mm]{baposter}
  ```

  **问题：** 内容不填充垂直空间
  ```latex
  % 使用\vfill在部分之间分配空间
  \block{引言}{...}
  \vfill
  \block{方法}{...}
  \vfill
  \block{结果}{...}

  % 或手动调整块间距
  \vspace{1cm}  % 添加特定块之间的空间
  ```

  **问题：** 海报超出页面边界
  ```latex
  % 检查总宽度计算
  % 对于带间距的3列：
  % 总计 = 3×列宽度 + 2×列空间 + 2×边距
  % 确保这等于\paperwidth

  % 通过添加可见页面边界进行调试
  \usepackage{eso-pic}
  \AddToShipoutPictureBG{
    \AtPageLowerLeft{
      \put(0,0){\framebox(\LenToUnit{\paperwidth},\LenToUnit{\paperheight}){}}
    }
  }
  ```

  **打印准备：**
  - 为专业打印生成PDF/X-1a
  - 嵌入所有字体
  - 如果需要，将颜色转换为CMYK
  - 检查所有图像的分辨率（最小300 DPI）
  - 添加出血区域（如果需要）（通常3-5mm）
  - 验证页面尺寸完全符合要求

  **数字显示：**
  - 屏幕显示的RGB颜色空间
  - 优化文件大小以用于电子邮件/Web
  - 在不同屏幕上测试可读性

  ### 11. PDF审查和质量控制

  **关键：** 在打印或展示之前，始终审查生成的PDF。使用此系统检查清单：

  **步骤1：页面尺寸验证**
  ```bash
  # 检查PDF尺寸（应完全匹配海报尺寸）
  pdfinfo poster.pdf | grep "页面尺寸"

  # 预期输出：
  # A0: 2384 x 3370 points (841 x 1189 mm)
  # 36x48": 2592 x 3456 points
  # A1: 1684 x 2384 points (594 x 841 mm)
  ```

  **步骤2：视觉检查清单**

  打开PDF到100%缩放并检查：

  **布局和间距：**
  - [ ] 内容填充整个页面（无大白色边距）
  - [ ] 列之间一致的间距
  - [ ] 块/部分之间一致的间距
  - [ ] 所有元素正确对齐（使用标尺工具）
  - [ ] 无重叠文本或图形
  - [ ] 空白均匀分布

  **排版：**
  - [ ] 标题清晰可见且大（72pt+）
  - [ ] 部分标题可读（48-72pt）
  - [ ] 正文文本在100%缩放下可读（最小24-36pt）
  - [ ] 无文本截断或边缘跑出
  - [ ] 整个过程中一致的字体使用
  - [ ] 所有特殊字符正确渲染（符号、希腊字母）

  **视觉元素：**
  - [ ] 所有图形正确显示
  - [ ] 无像素化或模糊图像
  - [ ] 图形标题存在且可读
  - [ ] 颜色按预期渲染（不洗出或太暗）
  - [ ] 标志显示清晰
  - [ ] QR码可见且可扫描

  **内容完整性：**
  - [ ] 标题和作者完整
  - [ ] 所有部分存在（引言、方法、结果、结论）
  - [ ] 包括参考文献
  - [ ] 联系信息可见
  - [ ] 致谢（如果适用）
  - [ ] 无占位符文本剩余（Lorem ipsum、TODO等）

  **技术质量：**
  - [ ] 重要区域无LaTeX编译警告
  - [ ] 所有引用解决（无[?]标记）
  - [ ] 所有交叉引用工作
  - [ ] 页面边界正确（无内容切断）

  **步骤3：缩小打印测试**

  **必要的预打印测试：**
  ```bash
  # 创建缩小尺寸测试打印（最终尺寸的25%）
  # 这模拟从~8-10英尺观看完整海报

  # 对于A0海报，在A4纸上打印（24.7%缩放）
  # 对于36x48"海报，在letter纸上打印（~25%缩放）
  ```

  **打印测试清单：**
  - [ ] 标题从6英尺外可读
  - [ ] 部分标题从4英尺外可读
  - [ ] 正文文本从2英尺外可读
  - [ ] 图形清晰且可理解
  - [ ] 颜色打印准确
  - [ ] 无明显的设计缺陷

  **步骤4：数字质量检查**

  **字体嵌入验证：**
  ```bash
  # 检查所有字体是否嵌入（打印需要）
  pdffonts poster.pdf

  # 所有字体应在"emb"列显示"yes"
  # 如果有显示"no"，使用以下命令重新编译：
  pdflatex -dEmbedAllFonts=true poster.tex
  ```

  **图像分辨率检查：**
  ```bash
  # 提取图像信息
  pdfimages -list poster.pdf

  # 检查所有图像至少300 DPI
  # 公式：DPI = 像素 / (海报中的英寸)
  # 对于A0宽度（33.1"）：300 DPI = 9930像素最小
  ```

  **文件大小优化：**
  ```bash
  # 对于电子邮件/Web，如果需要，压缩（>50MB）
  gs -sDEVICE=pdfwrite -dCompatibilityLevel=1.4 \
     -dPDFSETTINGS=/printer -dNOPAUSE -dQUIET -dBATCH \
     -sOutputFile=poster_compressed.pdf poster.pdf

  # 对于打印，保持原始（无压缩）
  ```

  **步骤5：可访问性检查**

  **颜色对比度验证：**
  - [ ] 文本-背景对比度比率 ≥ 4.5:1 (WCAG AA)
  - [ ] 重要元素对比度比率 ≥ 7:1 (WCAG AAA)
  - 在线测试：https://webaim.org/resources/contrastchecker/

  **色盲模拟：**
  - [ ] 通过色盲模拟器查看PDF
  - [ ] 红绿模拟时不丢失信息
  - [ ] 使用Coblis（color-blindness.com）或类似工具

  **步骤6：内容校对**

  **系统审查：**
  - [ ] 拼写检查所有文本
  - [ ] 验证所有作者姓名和机构
  - [ ] 检查所有数字和统计的准确性
  - [ ] 确认所有引用正确
  - [ ] 审查图形标签和标题
  - [ ] 检查标题和标题中的拼写错误

  **同行评审：**
  - [ ] 请同事审查海报
  - [ ] 30秒测试：他们能识别主要信息吗？
  - [ ] 5分钟审查：他们理解结论吗？
  - [ ] 注意任何混淆元素

  **步骤7：技术验证**

  **LaTeX编译日志审查：**
  ```bash
  # 检查.log文件中的警告
  grep -i "warning\|error\|overfull\|underfull" poster.log

  # 要修复的常见问题：
  # - Overfull hbox：文本超出边距
  # - Underfull hbox：过多间距
  # - 缺失引用：引用未解决
  # - 缺失图形：图像文件未找到
  ```

  **修复常见警告：**
  ```latex
  % Overfull hbox（文本太宽）
  \usepackage{microtype}  % 更好的间距
  \sloppy  % 允许略松散的间距
  \hyphenation{long-word}  % 手动连字符

  % 缺失字体
  \usepackage[T1]{fontenc}  % 更好的字体编码

  % 图像未找到
  % 确保路径正确且文件存在
  \graphicspath{{./figures/}{./images/}}
  ```

  **步骤8：最终预打印检查清单**

  **发送到打印机之前：**
  - [ ] PDF尺寸完全符合要求（用pdfinfo检查）
  - [ ] 所有字体嵌入（用pdffonts检查）
  - [ ] 颜色模式正确（屏幕用RGB，如果需要打印用CMYK）
  - [ ] 添加出血区域（如果需要）（通常3-5mm）
  - [ ] 裁切线可见（如果需要）
  - [ ] 测试打印完成并审查
  - [ ] 文件命名清晰：[LastName]_[Conference]_Poster.pdf
  - [ ] 保存备份副本

  **要确认的打印规格：**
  - [ ] 纸张类型（哑光vs光泽）
  - [ ] 打印方法（喷墨、大幅面、布料）
  - [ ] 颜色配置文件（如果需要，提供给打印机）
  - [ ] 交付截止日期和邮寄地址
  - [ ] 管状或扁平包装偏好

  **数字展示检查清单：**
  - [ ] PDF大小优化（<10MB用于电子邮件）
  - [ ] 在多个PDF查看器上测试（Adobe、Preview等）
  - [ ] 在不同屏幕上正确显示
  - [ ] QR码测试且功能正常
  - [ ] 准备替代格式（PNG用于社交媒体）

  **审查脚本**（在`scripts/review_poster.sh`中可用）：
  ```bash
  #!/bin/bash
  # 自动海报PDF审查脚本

  echo "海报PDF质量检查"
  echo "======================="

  # 检查文件是否存在
  if [ ! -f "$1" ]; then
      echo "错误：文件未找到"
      exit 1
  fi

  echo "文件：$1"
  echo ""

  # 检查页面尺寸
  echo "1. 页面尺寸："
  pdfinfo "$1" | grep "页面尺寸"
  echo ""

  # 检查字体
  echo "2. 字体嵌入："
  pdffonts "$1" | head -20
  echo ""

  # 检查文件大小
  echo "3. 文件大小："
  ls -lh "$1" | awk '{print $5}'
  echo ""

  # 计数页面（海报应为1）
  echo "4. 页面计数："
  pdfinfo "$1" | grep "页面"
  echo ""

  echo "需要手动检查："
  echo "- 100%缩放的视觉检查"
  echo "- 缩小打印测试（25%）"
  echo "- 颜色对比度验证"
  echo "- 拼写错误校对"
  ```

  **常见PDF问题和解决方案：**

  | 问题 | 原因 | 解决方案 |
  |-------|-------|----------|
  | 大白色边距 | 不正确边距设置 | 在文档类中减少边距 |
  | 内容切断 | 超出页面边界 | 检查总宽度/高度计算 |
  | 模糊图像 | 低分辨率（<300 DPI） | 用更高分辨率图像替换 |
  | 缺失字体 | 字体未嵌入 | 使用-dEmbedAllFonts=true编译 |
  | 错误页面尺寸 | 不正确纸张尺寸设置 | 验证文档类纸张尺寸 |
  | 颜色看起来错误 | RGB与CMYK不匹配 | 为打印转换颜色空间 |
  | 文件太大（>50MB） | 未压缩图像 | 优化图像或压缩PDF |
  | QR码不工作 | 太小或分辨率低 | 最小2×2cm，高对比度 |

  ### 11. 常见海报内容模式

  不同研究类型的有效内容组织：

  **实验研究海报：**
  1. 标题和作者
  2. 引言：问题和假设
  3. 方法：实验设计（带图表）
  4. 结果：关键发现（2-4个主要图形）
  5. 结论：主要收获（3-5个要点）
  6. 未来工作（可选）
  7. 参考文献和致谢

  **计算/建模海报：**
  1. 标题和作者
  2. 动机：问题陈述
  3. 方法：算法或模型（带流程图）
  4. 实现：技术细节
  5. 结果：性能指标和比较
  6. 应用：使用案例
  7. 代码可用性（QR码到GitHub）
  8. 参考文献

  **综述/调查海报：**
  1. 标题和作者
  2. 范围：主题概述
  3. 方法：文献搜索策略
  4. 关键发现：主要主题（按类别组织）
  5. 趋势：发布模式的可视化
  6. 缺口：识别的研究需求
  7. 结论：总结和影响
  8. 参考文献

  ### 12. 可访问性和包容性设计

  设计适用于不同受众的海报：

  **色盲注意事项：**
  - 避免红绿组合（最常见的色盲）
  - 使用图案或形状以及颜色
  - 用色盲模拟器测试
  - 提供高对比度（WCAG AA标准：最小4.5:1）

  **视觉障碍适应：**
  - 大、清晰的字体（正文文本最小24pt）
  - 高对比度文本和背景
  - 清晰的视觉层次
  - 避免背景中的复杂纹理或图案

  **语言和内容：**
  - 清晰、简洁的语言
  - 定义缩略语和行话
  - 国际受众考虑
  - 考虑全球会议的多语言QR码选项

  ### 13. 海报展示最佳实践

  超越LaTeX的有效海报会议指导：

  **内容策略：**
  - 讲述故事，而不仅仅是列出事实
  - 关注1-3个主要信息
  - 使用视觉摘要或图形总结
  - 留下对话空间（不要过度解释）

  **物理展示技巧：**
  - 携带打印的传单或带有QR码的名片
  - 准备30秒、2分钟和5分钟的口头总结
  - 站在一侧，不遮挡海报
  - 用开放式问题吸引观众

  **数字备份：**
  - 将海报作为PDF保存在移动设备上
  - 准备电子邮件分享的数字版本
  - 创建社交媒体友好的图像版本
  - 有备份打印副本或数字显示选项

  ## 海报创建工作流程

  ### 阶段1：规划和内容开发

  1. **确定海报要求：**
     - 会议尺寸规格（A0、36×48英寸等）
     - 方向（肖像vs横向）
     - 提交截止日期和格式要求

  2. **开发内容大纲：**
     - 识别1-3个核心信息
     - 选择关键图形（通常3-6个主要视觉）
     - 为每个部分起草简洁文本（优先要点）
     - 目标总共300-800字

  3. **选择LaTeX包：**
     - beamerposter：如果熟悉Beamer，需要机构主题
     - tikzposter：用于现代、色彩鲜艳的设计，灵活性
     - baposter：用于结构化、专业的多列布局

  ### 阶段2：设计和布局

  1. **选择或创建模板：**
     - 从`assets/`中的提供模板开始
     - 自定义颜色方案以匹配品牌
     - 配置页面尺寸和方向

  2. **设计布局结构：**
     - 计划列结构（2、3或4列）
     - 映射内容流（通常从左到右，从上到下）
     - 分配空间用于标题（10-15%）、内容（70-80%）、页脚（5-10%）

  3. **设置排版：**
     - 配置不同层次级别的字体大小
     - 确保最小24pt正文文本
     - 测试从4-6英尺距离的可读性

  ### 阶段3：内容集成

  1. **创建海报标题：**
     - 标题（简洁、描述性，10-15字）
     - 作者和机构
     - 机构标志（高分辨率）
     - 如果需要，会议标志

  2. **填充内容部分：**
     - 保持文本最小且可扫描
     - 使用要点，而非段落
     - 用主动语态写作
     - 集成带有清晰标题的图形

  3. **添加视觉元素：**
     - 高分辨率图形（最小300 DPI）
     - 所有图形中一致的样式
     - 强调的颜色编码元素
     - QR码用于补充材料

  4. **包括参考文献：**
     - 仅引用关键论文（通常5-10个引用）
     - 使用缩写引用风格
     - 考虑完整参考书目的QR码

  ### 阶段4：精炼和测试

  1. **审查和迭代：**
     - 检查拼写错误和错误
     - 验证所有图形是高分辨率
     - 确保一致的格式化
     - 确认颜色方案良好配合

  2. **测试可读性：**
     - 在25%缩放打印并从2-3英尺阅读（模拟从8-12英尺的海报）
     - 在不同监视器上检查颜色
     - 验证QR码功能正确
     - 请同事审查

  3. **优化打印：**
     - 在PDF中嵌入所有字体
     - 验证图像分辨率
     - 检查PDF尺寸要求
     - 如果需要，添加出血区域

  ### 阶段5：编译和交付

  1. **编译最终PDF：**
     ```bash
     pdflatex poster.tex
     # 或用于更好的字体支持：
     lualatex poster.tex
     ```

  2. **验证输出质量：**
     - 检查所有元素可见且正确放置
     - 缩放到100%并检查图形质量
     - 验证颜色符合期望
     - 确认PDF在不同查看器上正确打开

  3. **准备打印：**
     - 如果需要，导出为PDF/X-1a
     - 保存备份副本
     - 首先在常规纸上进行测试打印
     - 在截止日期前2-3天订购专业打印

  4. **创建补充材料：**
     - 为社交媒体保存PNG/JPG版本
     - 创建传单版本（8.5×11英寸总结）
     - 准备电子邮件分享的数字版本

  ## 与其他技能的集成

  此技能有效与以下技能合作：
  - **科学写作：** 用于从论文开发海报内容
  - **图形创建：** 用于生成高质量的可视化
  - **文献综述：** 用于将研究置于上下文中
  - **数据分析：** 用于创建结果图形和图表

  ## 常见陷阱以避免

  **设计错误：**
  - ❌ 太多文本（超过1000字）
  - ❌ 字体大小太小（正文文本低于24pt）
  - ❌ 低对比度颜色组合
  - ❌ 混乱布局，无空白
  - ❌ 各部分中不一致的样式
  - ❌ 质量差或像素化的图像

  **内容错误：**
  - ❌ 无清晰叙述或信息
  - ❌ 太多研究问题或目标
  - ❌ 过度使用行话无定义
  - ❌ 无上下文或解释的结果
  - ❌ 缺少作者联系信息

  **技术错误：**
  - ❌ 会议要求的海报尺寸错误
  - ❌ 发送RGB颜色到CMYK打印机（颜色偏移）
  - ❌ PDF中字体未嵌入
  - ❌ 文件太大用于提交门户
  - ❌ QR码太小或未测试

  **最佳实践：**
  - ✅ 精确遵循会议尺寸规格
  - ✅ 最终打印前在缩小比例进行测试打印
  - ✅ 使用高对比度、可访问的颜色方案
  - ✅ 保持文本最小且高度可扫描
  - ✅ 包括清晰的联系信息和QR码
  - ✅ 平衡文本和视觉内容（40-50%视觉内容）
  - ✅ 仔细校对（错误在海报上会被放大！）

  ## 包安装

  确保安装所需的LaTeX包：

  ```bash
  # 对于TeX Live（Linux/Mac）
  tlmgr install beamerposter tikzposter baposter

  # 对于MiKTeX（Windows）
  # 包通常在首次使用时自动安装

  # 额外推荐的包
  tlmgr install qrcode graphics xcolor tcolorbox subcaption
  ```

  ## 脚本和自动化

  辅助脚本在`scripts/`目录中可用：

  - `compile_poster.sh`：带错误处理的自动编译
  - `generate_template.py`：互动模板生成器
  - `resize_images.py`：海报的批量图像优化
  - `poster_checklist.py`：提交前验证工具

  ## 参考文献

  详细指导的综合参考文件：

  - `references/latex_poster_packages.md`：beamerposter、tikzposter和baposter的详细比较和示例
  - `references/poster_layout_design.md`：布局原则、网格系统和视觉流
  - `references/poster_design_principles.md`：排版、颜色理论、视觉层次和可访问性
