  # Zotero 参考文献管理器

  ## 目的

  提供参考文献管理功能，用于文献目录组织、注释同步和引文格式化。

  ## 功能

  - 从多个来源导入参考文献
  - 注释和笔记管理
  - 引文样式格式化（CSL）
  - 群组库协作
  - PDF附件管理
  - BibTeX/RIS导出

  ## 使用指南

  1. **组织**：使用集合和标签进行组织
  2. **注释**：将高亮和笔记与参考文献同步
  3. **引文样式**：应用适当的CSL样式
  4. **协作**：与研究小组共享库

  ## 工具/库

  - Pyzotero
  - Zotero API
