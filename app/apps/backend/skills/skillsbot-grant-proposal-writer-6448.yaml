  # 资助提案撰写者

  通过引人注目的提案确保资金。

  ## 资助格局

  ### 资助者类型

  | 类型 | 例子 | 特点 |
  |------|----------|-----------------|
  | 联邦 | NSF、NIH、NEA、NEH | 大额奖励、严格流程、公共利益 |
  | 基金会 | 福特、梅隆、麦克阿瑟 | 使命对齐、基于关系 |
  | 企业 | 谷歌、Adobe、微软 | 产品/品牌对齐、较短时间线 |
  | 机构 | 内部资助、启动基金 | 较低金额、较快决策 |
  | 众筹 | Kickstarter、Experiment | 面向公众、基于动量 |

  ### 匹配评估

  撰写前评估对齐：

  | 因素 | 问题 | 权重 |
  |--------|----------|--------|
  | 使命 | 您的工作是否服务其目标？ | 关键 |
  | 范围 | 您的预算是否在其范围内？ | 关键 |
  | 资格 | 您是否符合要求？ | 关键 |
  | 跟踪记录 | 他们是否资助过类似工作？ | 重要 |
  | 时间安排 | 您的时间线是否匹配？ | 重要 |
  | 竞争 | 资助率是多少？ | 考虑 |

  ---

  ## 提案结构（标准）

  ### 1. 项目摘要/摘要

  ```
  一页最大。必须独立成立。

  结构：
  - 问题/机会（2-3句话）
  - 建议方法（2-3句话）
  - 预期成果（2-3句话）
  - 更广泛影响（1-2句话）
  ```

  ### 2. 需求声明

  建立问题：

  ```
  问题是什么？
  ↓
  谁受影响？
  ↓
  当前方法是什么？
  ↓
  存在什么差距？
  ↓
  为什么现在？
  ```

  **有效模式**：
  - 量化规模的统计数据
  - 说明的具体例子
  - 验证的专家声音
  - 引人信服的逻辑论点

  ### 3. 目标和目的

  | 元素 | 定义 | 例子 |
  |---------|------------|---------|
  | **目标** | 广泛的预期影响 | “提高老年人数字素养” |
  | **目的** | 具体、可衡量的结果 | “到2025年12月培训200名老年人基本计算机技能” |
  | **活动** | 您将做什么 | “在社区中心进行20次研讨会” |

  **SMART目的**：
  - **S**pecific：清晰和定义
  - **M**easurable：可量化
  - **A**chievable：可实现
  - **R**elevant：与目标对齐
  - **T**ime-bound：有截止日期

  ### 4. 方法/途径

  描述您将如何实现目的：

  ```
  对于每个目的：
  1. 计划的活动
  2. 时间线/顺序
  3. 负责人
  4. 所需资源
  5. 途径的理由
  ```

  **方法论可信度**：
  - 引用先例或文献
  - 解释为何这种方法
  - 解决潜在挑战
  - 显示对替代方法的了解

  ### 5. 评估计划

  | 类型 | 问题 | 方法 |
  |------|----------|---------|
  | **过程** | 我们是否按计划执行？ | 活动日志、出席率 |
  | **结果** | 是否有效？ | 前/后测试、调查 |
  | **影响** | 发生了什么变化？ | 长期跟踪、指标 |

  **评估组件**：
  - 将测量什么
  - 如何收集数据
  - 何时测量发生
  - 谁将分析
  - 如何使用结果

  ### 6. 时间线

  ```
  第一年
  Q1: [活动]
  Q2: [活动]
  Q3: [活动]
  Q4: [活动]

  第二年
  Q1: [活动]
  ...

  里程碑：
  - 第6个月: [里程碑]
  - 第12个月: [里程碑]
  - 第18个月: [里程碑]
  ```

  ### 7. 预算和论证

  见下方预算部分。

  ### 8. 人员/资格

  对于每个关键人员：
  ```
  [姓名], [标题]
  角色: [具体职责]
  资格: [为何合适]
  时间承诺: [% FTE或小时]
  ```

  ### 9. 组织能力

  展示执行能力：
  - 相关过往项目
  - 基础设施/设施
  - 合作关系
  - 财务稳定性

  ### 10. 可持续性/未来计划

  ```
  资助后如何继续这项工作？
  - 收入来源
  - 制度化
  - 合作关系
  - 扩展方法
  ```

  ---

  ## 预算开发

  ### 预算类别

  | 类别 | 包括 |
  |----------|----------|
  | **人员** | 工资、福利、顾问 |
  | **设备** | >$5K 物品通常 |
  | **用品** | 消耗品、材料 |
  | **旅行** | 会议、实地考察 |
  | **合同** | 分包合同、服务 |
  | **其他直接成本** | 参与者支持、出版物 |
  | **间接成本** | 间接费用（按机构不同） |

  ### 预算模板

  ```
  人员
  首席研究员姓名，2个月夏季工资         $XX,XXX
  研究生，12个月                     $XX,XXX
  附加福利（XX%）                     $X,XXX
                              小计：   $XX,XXX

  设备
  [物品描述]                          $X,XXX
                              小计：   $X,XXX

  用品
  研究用品                           $X,XXX
  计算                               $X,XXX
                              小计：   $X,XXX

  旅行
  国内（X次旅行）                     $X,XXX
  国际（X次旅行）                     $X,XXX
                              小计：   $X,XXX

  其他直接成本
  参与者津贴                         $X,XXX
  出版成本                           $X,XXX
                              小计：   $X,XXX

  总直接成本                         $XXX,XXX
  间接成本（XX%）                     $XX,XXX
  总项目成本                         $XXX,XXX
  ```

  ### 预算论证

  对于每个行项：
  ```
  [项目]: $X,XXX
  [为何需要]: 此[项目]对[特定项目活动]是必要的，因为[理由]。金额基于[计算/报价/费率]。
  ```

  ---

  ## 写作策略

  ### 面向评审人

  记住：
  - 评审人很忙
  - 他们可能不是您领域的专家
  - 他们在寻找资助和拒绝的理由
  - 清晰的写作反映清晰的思考

  ### 结构信号

  使用标题、空白、粗体：
  ```
  **问题**: 清晰的问题陈述。

  **途径**: 我们如何解决。

  **成果**: 将产生什么。
  ```

  ### 强与弱写作

  | 弱 | 强 |
  |------|--------|
  | “我们希望...” | “我们将...” |
  | “这可能导致...” | “这将产生...” |
  | “据信...” | “研究表明...” |
  | “各种方法...” | “三种具体方法：A、B、C...” |
  | “重大影响...” | “减少40%...” |

  ### “那又如何”测试

  每个声明应回答：
  - 为什么这很重要？
  - 这对谁重要？
  - 如果成功，什么会改变？

  ---

  ## 评审标准（典型）

  ### NSF 价值评审

  1. **智力价值**
     - 提议活动的重要性
     - 合格的团队
     - 合理的方法论
     - 充足的资源
     
  2. **更广泛影响**
     - 对社会的益处
     - STEM 劳动力发展
     - 扩大参与
     - 公众参与

  ### NEH 标准

  1. **重要性**: 项目的重要性
  2. **质量**: 设计的合理性
  3. **影响**: 潜在效应
  4. **可行性**: 完成的可能性

  ### 基金会标准（变化）

  共同主题：
  - 使命对齐
  - 影响潜力
  - 组织能力
  - 可持续性
  - 创新

  ---

  ## 特定资助类型

  ### 研究资助

  关键元素：
  - 展示差距的文献回顾
  - 研究问题/假设
  - 严格的方法论
  - 如果可用，初步数据
  - 传播计划

  ### 创意/艺术资助

  关键元素：
  - 艺术声明/愿景
  - 作品样本（关键）
  - 项目描述
  - 社区影响
  - 艺术家传记

  ### 奖学金申请

  关键元素：
  - 个人声明
  - 研究/项目提案
  - 推荐信
  - 简历/履历
  - 写作样本（通常）

  ---

  ## 常见错误

  | 错误 | 修复 |
  |---------|-----|
  | 不遵循指南 | 阅读指南3+次 |
  | 模糊的目标 | 使SMART |
  | 与资助者不匹配 | 彻底研究 |
  | 预算与叙述不匹配 | 交叉检查 |
  | 缺失必要元素 | 使用清单 |
  | 术语过载 | 定义术语、简化 |
  | 没有初步工作 | 显示可行性 |
  | 弱评估 | 具体和现实 |
  | 最后时刻提交 | 内置缓冲 |

  ---

  ## 撰写时间线

  ### 8周时间线

  | 周 | 活动 |
  |------|------------|
  | 1 | 阅读指南、评估匹配、大纲 |
  | 2 | 草稿需求声明、目标 |
  | 3 | 草稿方法、时间线 |
  | 4 | 草稿评估、可持续性 |
  | 5 | 开发预算和论证 |
  | 6 | 完成初稿 |
  | 7 | 内部评审、修订 |
  | 8 | 最终润色、提前提交 |

