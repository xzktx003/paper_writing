  # 审稿回复

  一个系统性审稿回复工作流程，帮助研究人员高效、专业地回复审稿评论。

  ## 核心功能

  1. **评论分析** - 解析和分类审稿评论（重大/次要/拼写错误/误解）
  2. **响应策略** - 为不同评论类型制定响应策略（接受/辩护/澄清/实验）
  3. **反驳写作** - 撰写结构化、专业的反驳文档
  4. **语调管理** - 优化语调以保持专业性、尊重和基于证据的论证

  ## 工作流程

  ```
  接收审稿评论 -> 解析和分类 -> 制定策略 -> 撰写回复 -> 语调检查 -> 最终反驳
  ```

  ## 何时使用

  在需要时使用此技能：
  - “帮我写反驳”
  - “如何回复审稿评论”
  - “分析这些审稿评论”
  - “制定审稿回复策略”

  ## 使用步骤

  1. **提供审稿评论** - 与Claude分享审稿评论文本或文件
  2. **分析和分类** - Claude自动解析和分类评论
  3. **策略建议** - 接收针对每个评论的响应策略建议
  4. **撰写反驳** - 基于策略生成结构化反驳文档
  5. **优化语调** - 审查和优化回复的专业性和礼貌性

  ## 核心原则

  - **专业性** - 保持学术专业语调和表达
  - **尊重性** - 尊重审稿人的意见和时间
  - **基于证据** - 用充分的推理和证据支持每个回复
  - **完整性** - 确保所有审稿评论都得到回复

  ## 成功因素（基于ICLR焦点论文分析）

  从成功反驳案例中提取的关键教训：

  ### 1. 承认优点，积极回应批评
  - 审稿人首先会承认论文的优点（新颖性、影响力、实际适用性）
  - 即使是焦点论文也会收到建设性批评
  - **策略**：首先感谢审稿人承认的优点，然后具体解决批评

  ### 2. 提供清晰和直观的理解
  - 即使高质量论文也可能有清晰度问题
  - 需要为不同背景的读者提供直观和详细解释
  - **策略**：扩展关键部分，将技术细节移到附录，添加逐步演练

  ### 3. 全面证明实验设置
  - 需要证明实验设置选择
  - 考虑并讨论替代指标
  - 提供全面实验以支持主张
  - **策略**：添加消融研究，解释为什么选择特定实验设置

  ### 4. 强调伦理考虑
  - 对于涉及隐私、安全和其他敏感主题的研究，伦理考虑至关重要
  - 审稿人特别关注伦理影响
  - **策略**：主动讨论伦理考虑，即使审稿人未明确要求

  ### 5. 突出实际应用价值
  - 审稿人重视方法的实际适用性和可扩展性
  - “易于应用”和“可扩展”是重要优点
  - **策略**：在反驳中强调实际好处和可扩展性

  ## 参考文档

  有关详细指南，请参考：
  - `references/review-classification.md` - 审稿评论分类标准
  - `references/response-strategies.md` - 响应策略库
  - `references/rebuttal-templates.md` - 反驳模板和示例
  - `references/tone-guidelines.md` - 语调和表达指南

  ## 相关工具

  - **代理**：`rebuttal-writer` - 用于反驳写作和优化的专用代理
  - **命令**：`/rebuttal <review_file>` - 快速启动反驳工作流程
