  # 科学邮件润色

  ## 目录
  - [目的](#目的)
  - [何时使用](#何时使用)
  - [核心原则](#核心原则)
  - [工作流程](#工作流程)
  - [邮件类型](#邮件类型)
  - [语气指南](#语气指南)
  - [限制](#限制)
  - [快速参考](#快速参考)

  ## 目的

  此技能帮助撰写和润色专业科学通信，包括与协作者邮件、期刊编辑投稿信和同行审稿回复。它确保学术背景下的清晰沟通、适当语气、明确请求和专业格式。

  ## 何时使用

  在以下情况使用此技能：

  - **专业邮件**：给协作者、部门主管、资助官员
  - **期刊投稿信**：向期刊提交稿件
  - **审稿回复**：处理同行审稿意见
  - **编辑通信**：查询、申诉、再投稿信
  - **冷启动联系**：潜在协作者、演讲者、顾问
  - **行政邮件**：给项目官员、委员会成员

  触发短语："写邮件"、"给期刊投稿信"、"审稿回复"、"给协作者邮件"、"专业邮件"、"润色此邮件"

  **请勿用于：**
  - 推荐信（使用`academic-letter-architect`）
  - 研究陈述（使用`career-document-architect`）
  - 资助提案（使用`grant-proposal-assistant`）

  ## 核心原则

  **1. 一封邮件，一个目的**：每封邮件应有明确、单一的目标

  **2. 明确请求**：准确说明您需要收件人做什么以及何时完成

  **3. 上下文优先**：以足够上下文开头，让读者立即理解

  **4. 专业但温暖**：正式并不意味着冷漠；同事间的亲切感是合适的

  **5. 可扫描格式**：忙碌的收件人会略读；使用结构帮助快速阅读

  ## 工作流程

  复制此清单并跟踪进度：

  ```
  邮件润色进度：
  - [ ] 步骤1：识别目的和期望结果
  - [ ] 步骤2：草拟主题行（清晰、具体）
  - [ ] 步骤3：写开头（第一句提供上下文）
  - [ ] 步骤4：撰写正文（有条理、可扫描）
  - [ ] 步骤5：陈述明确请求（什么、何时）
  - [ ] 步骤6：专业结尾（下一步、签名）
  - [ ] 步骤7：审查语气（礼貌、适当）
  ```

  **步骤1：识别目的和结果**

  您希望收件人采取什么行动？您需要什么决定？何时完成？如果您无法清晰陈述，邮件就不应发送。

  **步骤2：草拟主题行**

  主题应预览内容并信号紧急程度/类型。具体化：如"会议请求：关于X项目合作"而非"快速问题"。参见[resources/template.md](resources/template.md#subject-lines)获取示例。

  **步骤3：写开头**

  第一句应建立上下文。您是谁（如果未知）、为什么写信、关于什么？无需过多寒暄。参见[resources/template.md](resources/template.md#openings)获取开头示例。

  **步骤4：撰写正文**

  逻辑组织信息。使用短段落。考虑用项目符号处理多点。必要时加粗关键信息。大多数邮件保持3-4段以内。

  **步骤5：陈述明确请求**

  清晰说明您需要什么。包含时间线（如相关）。让它容易说"是"。不要埋没请求。

  **步骤6：专业结尾**

  感谢他们，指出下一步，提供更多信息。根据关系级别使用适当签名。参见[resources/template.md](resources/template.md#closings)获取签名示例。

  **步骤7：审查语气**

  大声读出。是否礼貌但高效？不太随意，不太僵硬？与收件人关系是否适当？使用[resources/evaluators/rubric_email.json](resources/evaluators/rubric_email.json)验证。

  ## 邮件类型

  ### 期刊投稿信

  **目的：** 介绍稿件、解释意义、建议审稿人

  **结构：**
  ```
  主题：投稿：[稿件标题] - [类型：原创研究/综述等]

  亲爱的[编辑]博士 / 亲爱的编辑们，

  [段落1：什么和为什么]
  请查收我们题为"[标题]"的稿件，考虑作为[期刊名称]的[文章类型]。本工作[简短意义陈述]。

  [段落2：新内容]
  我们的研究[关键发现/贡献]。这通过[影响]推进了领域。
  我们相信本工作将引起[期刊]读者的兴趣，因为[与期刊范围契合]。

  [段落3：实际事项]
  稿件有[X]字和[Y]图。所有作者已批准投稿，并无可声明利益冲突。此
  工作未在其他地方发表，也未在其他期刊考虑。

  [可选：审稿人建议]
  我们建议以下潜在审稿人：[姓名、机构和邮箱]。

  [结尾]
  感谢您的考虑。我们期待您的回复。

  诚挚地，
  [通讯作者]
  ```

  ### 审稿回复

  **目的：** 专业而彻底地处理每一点

  **结构：**
  ```
  主题：修订稿件[ID]：[标题]

  亲爱的[编辑]博士，

  感谢您给我们机会修订稿件"[标题]"。我们
  赞赏审稿人的深思熟虑意见，这已显著
  改进我们的工作。以下我们提供对每条意见的点对点
  回应。审稿人意见以斜体显示，我们的
  回应为纯文本，稿件更改已注明。

  ---

  审稿人1

  *意见1：[引用审稿人意见]*

  回应：[您的回应]。我们已[采取行动]。此更改出现在
  第X页，Y-Z行。

  *意见2：[引用审稿人意见]*

  回应：[您的回应]。

  [对所有意见继续]

  ---

  审稿人2
  [相同格式]

  ---

  我们希望这些修订处理了审稿人的关切，并且
  稿件现在适合在[期刊]发表。如有需要额外修订，请
  随时联系我们。

  诚挚地，
  [通讯作者]
  ```

  ### 合作请求

  **目的：** 与新联系人提议合作

  **结构：**
  ```
  主题：合作机会：[简要主题描述]

  亲爱的[姓名]博士，

  我是[您的姓名]，[机构]的[职位]，从事[研究领域]工作。
  我联系您是因为[为什么特别联系他们 - 真诚且具体]。

  [简要背景介绍您的工作以及为什么合作有意义]

  我有兴趣[具体合作提议]。这可能涉及
  [您提议的内容 - 具体化]。

  您是否有时间简短通话讨论？我时间灵活
  并乐意配合您的日程安排。

  感谢考虑此提议。[可选：提及任何共同联系人]

  诚挚问候，
  [您的姓名]
  ```

  ## 语气指南

  ### 正式程度谱系

  | 收件人 | 语气 | 示例签名 |
  |-----------|------|-----------------|
  | 未知编辑/高级人员 | 正式 | "诚挚地，" "尊敬的，" |
  | 已知同事（距离较远） | 专业温暖 | "诚挚问候，" "最好的，" |
  | 已知同事（亲近） | 温暖专业 | "最好的，" "谢谢，" |
  | 密切协作者 | 友好专业 | "谢谢，" "祝好，" |

  ### 专业但不僵硬

  **太僵硬：**
  > "我写信询问您是否可能提供关于...的指导"

  **太随意：**
  > "嘿！快速问 - 你有空聊聊那事吗？"

  **正好：**
  > "我联系您看看您是否有时间讨论[主题]。下周简短通话可以吗？"

  ### 外交语言

  **当拒绝时：**
  - "不幸的是，我将无法..."
  - "虽然我感谢这个机会，但当前承诺阻止..."
  - "我建议联系[替代人选]，他们可能更适合..."

  **当不同意时（审稿回复）：**
  - "我们尊重地不同意此解释，因为..."
  - "虽然我们理解审稿人的关切，但我们的数据表明..."
  - "我们已添加澄清处理此点，尽管我们坚持..."

  **当跟进时：**
  - "我想跟进之前的邮件..."
  - "我回头确认[主题]..."
  - "抱歉再发邮件，但我想检查..."

  ## 限制

  **关键要求：**

  1. **清晰目的**：每封邮件需有可识别目标
  2. **明确请求**：不要让收件人猜测您需要什么
  3. **专业语气**：适合学术/科学背景
  4. **校对**：错误削弱可信度
  5. **适当长度**：尊重收件人时间
  6. **完整信息**：包含回应所需一切

  **常见陷阱：**
  - ❌ **埋没请求**：请求藏在第4段
  - ❌ **无截止日期**："当您有机会" = 从不
  - ❌ **长篇大论**：长而无断段落
  - ❌ **太随意**：对期刊编辑说"嘿"
  - ❌ **太正式**：对亲密同事使用生硬语言
  - ❌ **缺少上下文**：假设他们记住之前交流
  - ❌ **多主题**：应分开邮件

  ## 快速参考

  **关键资源：**
  - **[resources/template.md](resources/template.md)**：主题行、开头、结尾、完整模板
  - **[resources/evaluators/rubric_email.json](resources/evaluators/rubric_email.json)**：质量评分

  **主题行公式：**
  - 请求："会议请求：[主题]"
  - 跟进："跟进：[原主题]"
  - 投稿："投稿：[标题]"
  - 回应："回复：[主题] - [您的行动]"
  - 问题："关于[具体主题]的问题"

  **时间估计：**
  - 快速邮件：5-10分钟
  - 投稿信：15-30分钟
  - 审稿回复：1-4小时（取决于修订）

  **发送前清单：**
  - [ ] 目的清晰？
  - [ ] 请求明确？
  - [ ] 上下文提供？
  - [ ] 语气适当？
  - [ ] 校对？
  - [ ] 附件已附加？

  **所需输入：**
  - 目的/期望结果
  - 收件人关系
  - 关键信息传达
  - 任何约束（截止日期、政治因素）

  **产生输出：**
  - 润色邮件草稿
  - （可选）语气/结构评论
