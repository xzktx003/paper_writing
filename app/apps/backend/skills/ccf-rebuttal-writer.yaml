content: |
  # CCF Rebuttal Writer

  ## Overview
  Professional rebuttal writing for CCF-A conference reviews. Drafts point-by-point responses, maintains a revision ledger, and creates resubmission plans.

  ## Capabilities
  - Point-by-point reviewer response
  - Revision ledger tracking (comment → action → resolved)
  - Resubmission strategy planning
  - Tone and strategy optimization

  ## Output
  - Rebuttal letter with structured responses
  - Revision ledger (reviewer comments → author actions)
  - Resubmission plan for next venue
