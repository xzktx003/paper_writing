  # 混合方法整合技能

  设计和执行混合方法研究，有效整合定量和定性研究方法。

  ## 概述

  混合方法整合技能能够设计和执行收敛式、解释性顺序式、探索性顺序式以及其他混合方法研究设计，通过整合定量和定性方法实现全面理解。

  ## 能力

  ### 设计选择
  - 收敛式设计
  - 解释性顺序式设计
  - 探索性顺序式设计
  - 嵌入式设计
  - 变革性设计

  ### 整合策略
  - 数据合并
  - 方法连接
  - 方法构建
  - 联合展示
  - 混合方法矩阵

  ### 时序与优先级
  - 并行收集
  - 顺序阶段
  - 优先级确定
  - 阶段整合
  - 时间线管理

  ### 质量标准
  - 合法性标准
  - 整合严谨性
  - 推论质量
  - 设计保真度
  - 透明度

  ### 报告标准
  - 联合报告
  - 并行报告
  - 分阶段报告
  - 整合证据
  - 混合方法符号

  ## 使用指南

  ### 使用时机
  - 解决复杂问题
  - 结果三角验证
  - 开发研究工具
  - 解释研究结果
  - 建立全面理解

  ### 最佳实践
  - 论证设计选择
  - 明确规划整合
  - 记录操作流程
  - 报告整合过程
  - 保持方法完整性

  ### 整合关联点
  - 定量方法技能
  - 定性分析技能
  - 项目评估技能
  - 调查设计与实施技能

