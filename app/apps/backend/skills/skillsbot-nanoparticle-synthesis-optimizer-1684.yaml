  # 纳米颗粒合成优化器

  ## 目的

  纳米颗粒合成优化器技能为金属、半导体和氧化物纳米颗粒生产提供系统化的合成参数优化，实现具有可控尺寸、形态和表面化学性质的可重复合成协议。

  ## 能力

  - 前驱体化学计量计算
  - 反应温度/时间优化
  - 表面活性剂和封端剂选择
  - 成核和生长动力学建模
  - 尺寸分布目标设定
  - 批次可重复性评估

  ## 使用指南

  ### 合成参数优化

  1. **前驱体选择**
     - 将前驱体反应性与所需动力学匹配
     - 考虑热分解温度
     - 评估纯度要求

  2. **温度程序控制**
     - 优化成核温度以实现爆发成核
     - 控制生长温度以实现尺寸聚焦
     - 管理加热速率

  3. **表面活性剂系统**
     - 平衡空间稳定与静电稳定
     - 考虑与特定晶面的结合亲和力
     - 优化表面活性剂与前驱体比例

  ## 流程集成

  - 纳米颗粒合成协议开发
  - 纳米材料放大与工艺转移
  - 绿色合成路线开发

  ## 输入模式

  ```json
  {
    "目标材料": "字符串",
    "目标尺寸": "数字 (nm)",
    "目标形态": "球形|棒状|立方体|片状",
    "尺寸公差": "数字 (%)",
    "合成方法": "热分解|热注射|共沉淀"
  }
  ```

  ## 输出模式

  ```json
  {
    "优化协议": {
      "前驱体": [{"名称": "字符串", "浓度": "数字"}],
      "温度曲线": [{"温度": "数字", "持续时间": "数字"}],
      "表面活性剂": [{"名称": "字符串", "比例": "数字"}]
    },
    "预测结果": {
      "尺寸": "数字 (nm)",
      "尺寸分布": "数字 (%)",
      "产率": "数字 (%)"
    }
  }
  ```
