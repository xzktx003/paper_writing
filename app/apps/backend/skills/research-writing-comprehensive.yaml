content: |
  # Research Writing Skill - 科研论文写作助手

  提供30个论文写作场景的Prompt模板，覆盖**文献调研→大纲撰写→初稿写作→润色修改→图表制作→投稿回复→基金申请**全流程。

  ## 快速索引

  | 阶段 | Prompts | 功能 |
  |------|---------|------|
  | 📚 文献调研 | #18-20 | 文献总结、对比分析、找研究空白 |
  | 📝 大纲撰写 | #21-22 | 论文大纲、章节扩展 |
  | ✍️ 初稿写作 | #23-25 | 摘要、引言、方法写作 |
  | 🔧 润色修改 | #1-10 | 翻译 + 润色 + 去 AI 味 |
  | 📊 图表制作 | #11-15 | 图表标题 + 架构图 |
  | 📬 投稿回复 | #26-27 | 回复审稿人、cover letter |
  | 💰 基金申请 | #28-30 | 基金申请书、研究计划、学术演讲 |

  ## 翻译与润色

  ### 1. 中译英
  - 准确性优先：确保专业术语、数据、公式、实验方法与原文完全一致
  - 术语统一性：对同一专业术语采用固定的英文译法
  - 表达流畅性：使用符合英文科技论文规范的表达
  - 特殊字符转义：95% → 95\%，model_v1 → model\_v1，R&D → R\&D
  - 数学公式保持原样，保留 $ 符号

  ### 2. 英译中
  - 术语精准性：优先采用《科学技术名词审定委员会》公布的规范译名
  - 逻辑完整性：完整保留原文的论证逻辑、实验数据、公式符号
  - 文化适配：将英文中文化专属表达转化为中文读者易理解的表述

  ### 3. 中文润色
  - 准确性：确保专业术语使用正确，数据和逻辑表述无误
  - 流畅性与简洁性：优化句子结构，去除冗余表述
  - 专业性与一致性：保持术语、格式和风格的统一
  - 输出纯文本，不使用Markdown加粗、斜体等符号

  ### 6. 英文润色
  - 学术语言精准性：修正语法错误、拼写错误、标点误用
  - 逻辑连贯性：梳理段落间的逻辑衔接
  - 专业术语规范性：统一专业术语的拼写与用法
  - 严禁使用缩写形式：it is 而非 it's，does not 而非 doesn't

  ### 7. 中文去 AI 味
  - 使用中文全角标点
  - 避免机械性连接词和生硬过渡词
  - 保持段落结构，不改写为列表形式

  ### 8. 英文去 AI 味
  - 避免过度使用的词汇（leverage → use，delve into → investigate）
  - 删除机械性连接词（First and foremost，It is worth noting that）
  - 减少不必要的括号，避免过度使用分号

  ### 9. 逻辑检查（挑刺王）
  - 检查前提假设是否明确且合理
  - 检查论据与论点是否存在因果断裂
  - 检查是否存在偷换概念、以偏概全或循环论证
  - 检查数据/案例是否能有效支撑结论

  ## 论文写作

  ### 21. 论文大纲生成
  ```
  ## 📝 论文标题建议
  ## 📋 详细大纲
  ### Abstract
  ### Introduction
  ### Related Work
  ### Method
  ### Experiments
  ### Conclusion
  ```

  ### 23. 摘要写作 (Abstract)
  **结构 (4-5句话)**:
  1. 背景/动机 (1句): 为什么这个问题重要？
  2. 问题/挑战 (1句): 现有方法有什么局限？
  3. 方法/贡献 (1-2句): 本文提出了什么方法？
  4. 结果 (1句): 实验结果如何？
  5. 意义 (可选，1句): 这项工作的意义是什么？

  **约束**:
  - 字数: 150-250 词
  - 时态: 一般现在时为主
  - 语态: 主动语态优先
  - 避免: 缩写、引用、模糊表述

  ### 24. 引言写作 (Introduction)
  **结构**:
  1. 研究背景和重要性
  2. 技术挑战与现有方法局限
  3. 本文的核心贡献 (3-4点)
  4. 论文结构概述

  **约束**:
  - 长度: 1.5-2 页 (双栏)
  - 贡献点: 3-4 点，具体、可验证
  - 语气: 自信但不过度宣传

  ### 25. 方法章节写作 (Method)
  **结构**:
  1. 问题定义 (可选): 形式化定义问题
  2. 方法概述: 整体框架、核心思想
  3. 核心模块: 详细技术细节
  4. 理论分析 (可选): 复杂度、收敛性等

  **约束**:
  - 清晰度: 使用图表辅助说明
  - 完整性: 确保可复现性

  ## 图表制作

  ### 11. 绘制架构图
  - 风格要求：图像必须具备高度的专业性和学术感，线条清晰
  - 使用统一的配色方案
  - 避免过多文字标记，用视觉元素表达

  ### 13. 图片标题说明
  - Title Case: 主要单词的首字母大写，末尾不加句号
  - Sentence case: 仅第一个单词的首字母大写

  ### 14. 表格标题说明
  - 使用 Comparison with, Ablation study on, Results on 等标准学术表达
  - 避免使用 showcase, depict 等词

  ## 投稿回复

  ### 16. 模拟审稿人视角
  - 以挑剔但建设性的态度审阅
  - Strengths: 主要列出 1-2 个最有价值的贡献
  - Weaknesses (Critical): 详细列出 3-5 个可能导致直接拒稿的关键问题
  - Rating: 给出预估分数（1-10 分）
  - Strategic Advice: 给出具体的论文修改建议

  ### 26. 回复审稿人意见 (Rebuttal)
  - 逐条回应审稿人的意见
  - 提供实验证据支持你的论点
  - 保持礼貌和专业

  ### 27. Cover Letter 写作
  ```
  Dear Editor,
  
  We are pleased to submit our manuscript entitled "[论文标题]"...
  
  [研究亮点]
  [适合理由]
  [声明事项]
  ```

  ## 基金申请

  ### 28. 基金申请书写作
  ### 29. 研究计划 (Research Proposal)
  ### 30. 学术演讲/PPT 大纲

  ## 使用建议

  1. **组合使用**: 多个Prompt可以串联使用
  2. **迭代优化**: 对AI生成的内容进行多轮润色
  3. **保持批判**: 使用#16模拟审稿人视角
  4. **数据真实**: 所有实验数据必须基于真实研究