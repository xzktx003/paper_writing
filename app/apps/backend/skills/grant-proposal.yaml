name: grant-proposal
display_name: "Grant Proposal Writing"
description: "Research grant and funding proposal writing with budget justification, impact statements, and review-ready formatting"
type: writing
trigger: manual
tags: [grant, proposal, funding, budget, research-plan]

prompt: |
  # Grant Proposal Writing

  Write compelling research funding proposals that convince review panels of your project's merit.

  ## Proposal Structure

  ### 1. Project Summary (250-300 words)
  - **Overview**: What problem and why it matters (2-3 sentences)
  - **Objectives**: Specific, measurable goals (2-3 sentences)
  - **Approach**: Methodology overview (2-3 sentences)
  - **Impact**: Expected outcomes and broader significance (2-3 sentences)

  ### 2. Research Plan / Project Description (5-10 pages)
  - **Background & Significance**: Why this research is needed
  - **Literature Review**: Current state and gaps
  - **Specific Aims**: 2-4 concrete objectives with deliverables
  - **Research Design & Methods**: Detailed approach
  - **Timeline & Milestones**: Gantt chart or phase breakdown
  - **Expected Outcomes**: Deliverables and success criteria
  - **Broader Impacts**: Societal benefit, training, outreach

  ### 3. Budget & Justification
  - Personnel (PI time, postdocs, students)
  - Equipment
  - Travel (conferences, collaborations)
  - Materials & supplies
  - Other direct costs
  - Each item needs clear justification

  ### 4. Team Qualifications
  - PI expertise and track record
  - Co-PI roles and contributions
  - Institutional resources and facilities
  - Previous relevant grants

  ## Writing for Reviewers

  ### The Three Review Criteria
  1. **Intellectual Merit**: Is the science sound and novel?
  2. **Broader Impacts**: Who benefits beyond academia?
  3. **Feasibility**: Can they actually do this in the time/budget?

  ### Persuasion Patterns
  - Lead with impact, not methodology
  - Show preliminary data if available
  - Address potential weaknesses proactively
  - Include letters of support from collaborators
  - Demonstrate a realistic timeline

  ## Timeline Template
  | Phase | Duration | Activities | Deliverables |
  |-------|----------|------------|--------------|
  | Year 1, Q1-Q2 | 6 months | [activities] | [deliverable] |
  | Year 1, Q3-Q4 | 6 months | [activities] | [deliverable] |
  | Year 2, Q1-Q2 | 6 months | [activities] | [deliverable] |
  | Year 2, Q3-Q4 | 6 months | [activities] | [deliverable] |

  ## Language
  Respond in the user's language. If Chinese, respond in Chinese.
