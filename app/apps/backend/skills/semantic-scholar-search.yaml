  # Semantic Scholar 学术搜索

  ## 目的

  提供学术文献搜索能力，利用Semantic Scholar API实现基于引用的论文发现和研究趋势识别。

  ## 功能

  - 关键词和语义搜索论文
  - 引用网络分析
  - 作者影响力评分
  - 研究趋势识别
  - 基于阅读历史的论文推荐
  - TLDR摘要提取

  ## 使用指南

  1. **搜索策略**：结合关键词与语义相似性
  2. **引用分析**：为核心论文构建引用网络
  3. **作者分析**：识别有影响力的研究者
  4. **趋势检测**：追踪新兴研究领域

  ## 工具/库

  - Semantic Scholar API
  - NetworkX
  - sentence-transformers
