  # 科学假设生成

  ## 概述

  假设生成是开发可测试解释的系统过程。从观察中制定基于证据的假设，设计实验，探索竞争性解释，并开发预测。将这一技能应用于跨领域的科学探究。

  ## 何时使用此技能

  此技能应在以下情况使用：
  - 从观察或初步数据中开发假设
  - 设计实验以测试科学问题
  - 探索现象的解释竞争
  - 为研究制定可测试的预测
  - 进行基于文献的假设生成
  - 规划跨科学领域的机制研究

  ## 使用科学图表的视觉增强

  **⚠️ 强制要求：每个假设生成报告必须包括至少1-2个使用科学图表技能生成的AI生成图。**

  这不是可选的。没有视觉元素的假设报告是不完整的。在最终确定任何文档之前：
  1. 生成至少一个示意图或图表（例如，显示解释竞争的假设框架）
  2. 对于全面报告，建议2-3个图（机制通路图、实验设计流程图、预测决策树）

  **如何生成图：**
  - 使用 **科学图表** 技能生成AI驱动的出版物质量图
  - 只需用自然语言描述您所需的图表
  - Nano Banana Pro 将自动生成、审查并优化示意图

  **如何生成示意图：**
  ```bash
  python scripts/generate_schematic.py "您的图表描述" -o figures/output.png
  ```

  AI将自动：
  - 创建具有适当格式的出版物质量图像
  - 通过多次迭代进行审查和优化
  - 确保可访问性（色盲友好、高对比度）
  - 将输出保存在 figures/ 目录中

  **何时添加示意图：**
  - 显示解释竞争的假设框架图
  - 实验设计流程图
  - 机制通路图
  - 预测决策树
  - 因果关系图
  - 理论模型可视化
  - 任何受益于可视化的复杂概念

  有关创建示意图的详细指导，请参考科学图表技能文档。

  ---

  ## 工作流程

  遵循此系统过程以生成稳健的科学假设：

  ### 1. 理解现象

  首先澄清需要解释的观察、问题或现象：

  - 识别需要解释的核心观察或模式
  - 定义现象的范围和边界
  - 注意任何约束或特定上下文
  - 澄清已知与不确定的内容
  - 识别相关科学领域

  ### 2. 进行全面的文献搜索

  搜索现有科学文献，以使假设基于当前证据。使用PubMed（针对生物医学主题）和一般网络搜索（针对更广泛的科学领域）：

  **针对生物医学主题：**
  - 使用WebFetch与PubMed URL访问相关文献
  - 搜索最近的综述、元分析和原始研究
  - 寻找类似现象、相关机制或类比系统

  **针对所有科学领域：**
  - 使用WebSearch查找最近的论文、预印本和综述
  - 搜索已建立的理论、机制或框架
  - 识别当前理解的差距

  **搜索策略：**
  - 从广泛搜索开始，以了解全局
  - 缩小到特定机制、通路或理论
  - 寻找矛盾发现或未解决的争论
  - 参考 `references/literature_search_strategies.md` 获取详细搜索技术

  ### 3. 综合现有证据

  分析和整合文献搜索的结果：

  - 总结对现象的当前理解
  - 识别可能适用的已建立机制或理论
  - 注意矛盾证据或替代观点
  - 识别差距、限制或未回答问题
  - 识别来自相关系统或领域的类比

  ### 4. 生成竞争性假设

  开发3-5个不同的假设，这些假设可以解释该现象。每个假设应：

  - 提供机制性解释（不仅仅是描述）
  - 与其他假设可区分
  - 基于文献综合中的证据
  - 考虑不同解释级别（分子、细胞、系统、群体等）

  **生成假设的策略：**
  - 应用来自类比系统的已知机制
  - 考虑多个因果通路
  - 探索不同尺度的解释
  - 质疑现有解释中的假设
  - 以新颖方式组合机制

  ### 5. 评估假设质量

  根据 `references/hypothesis_quality_criteria.md` 中的质量标准评估每个假设：

  **可测试性：** 假设能否通过经验测试？
  **可证伪性：** 什么观察会证伪它？
  **简洁性：** 它是否是最符合证据的最简单解释？
  **解释力：** 它能解释多少现象？
  **范围：** 它覆盖多少观察？
  **一致性：** 它是否与已建立原则一致？
  **新颖性：** 它是否提供超越现有解释的新见解？

  明确记录每个假设的优点和缺点。

  ### 6. 设计实验测试

  对于每个可行假设，提出具体的实验或研究来测试它。参考 `references/experimental_design_patterns.md` 获取常见方法：

  **实验设计要素：**
  - 将测量或观察什么？
  - 需要什么比较或控制？
  - 将使用什么方法或技术？
  - 什么样本大小或统计方法合适？
  - 潜在混杂因素是什么以及如何解决？

  **考虑多种方法：**
  - 实验室实验（体外、体内、计算）
  - 观察性研究（横断面、纵向、病例对照）
  - 临床试验（如适用）
  - 自然实验或准实验设计

  ### 7. 制定可测试预测

  对于每个假设，生成具体、量化的预测：

  - 陈述如果假设正确，应观察什么
  - 如可能，指定预期效应的方向和大小
  - 识别预测应成立的条件
  - 区分竞争性假设之间的预测
  - 注意证伪假设的预测

  ### 8. 呈现结构化输出

  使用 `assets/hypothesis_report_template.tex` 中的模板生成专业LaTeX文档。报告应格式良好，使用彩色框进行视觉组织，并分为简洁的主要文本和全面的附录。

  **文档结构：**

  **主要文本（最多4页）：**
  1. **执行摘要** - 摘要框中的简要概述（0.5-1页）
  2. **竞争性假设** - 每个假设在自己的彩色框中，包含简要机制解释和关键证据（3-5个假设，2-2.5页）
     - **重要：** 在每个假设框之前使用 `\newpage`，以防止内容溢出
     - 每个框应最多0.6页
  3. **可测试预测** - 关键预测在琥珀色框中（0.5-1页）
  4. **关键比较** - 优先比较框（0.5-1页）

  保持主要文本高度简洁 - 仅包含最关键信息。所有细节放入附录。

  **分页策略：**
  - 始终在假设框之前使用 `\newpage`，以确保它们从新页面开始
  - 这防止内容溢出页面边界
  - LaTeX框（tcolorbox）不会自动跨页断行

  **附录（全面、详细）：**
  - **附录A：** 全面文献综述，包含广泛引用
  - **附录B：** 详细实验设计，包含完整协议
  - **附录C：** 质量评估表和详细评估
  - **附录D：** 补充证据和类比系统

  **彩色框使用：**

  使用 `hypothesis_generation.sty` 中的自定义框环境：

  - `hypothesisbox1` 至 `hypothesisbox5` - 用于每个竞争性假设（蓝色、绿色、紫色、青色、橙色）
  - `predictionbox` - 用于可测试预测（琥珀色）
  - `comparisonbox` - 用于关键比较（钢灰色）
  - `evidencebox` - 用于支持证据亮点（浅蓝色）
  - `summarybox` - 用于执行摘要（蓝色）

  **每个假设框应包含（为4页限制保持简洁）：**
  - **机制解释：** 1-2个简短段落（最多6-10句），解释如何和为什么
  - **关键支持证据：** 2-3个带引用的要点（仅最重要证据）
  - **核心假设：** 1-2个关键假设

  所有详细解释、额外证据和全面讨论属于附录。

  **关键溢出预防：**
  - 在每个假设框之前插入 `\newpage`，以从新页面开始
  - 将每个完整假设框保持最多0.6页（约15-20行内容）
  - 如果内容超出，将额外细节移至附录A
  - 绝不让框溢出页面边界 - 这会产生不可读的PDF

  **引用要求：**

  目标是广泛引用以支持所有声明：
  - **主要文本：** 10-15个关键引用，仅针对最重要证据（为4页限制保持简洁）
  - **附录A：** 40-70+个全面引用，覆盖所有相关文献
  - **总目标：** 参考文献中50+条引用

  主要文本引用应具有选择性 - 仅引用最关键论文。所有全面引用和详细文献讨论属于附录。使用 `\citep{author2023}` 进行括号引用。

  **LaTeX编译：**

  模板需要XeLaTeX或LuaLaTeX以正确渲染：

  ```bash
  xelatex hypothesis_report.tex
  bibtex hypothesis_report
  xelatex hypothesis_report.tex
  xelatex hypothesis_report.tex
  ```

  **所需包：** `hypothesis_generation.sty` 样式包必须在同一目录或LaTeX路径中。它需要：tcolorbox, xcolor, fontspec, fancyhdr, titlesec, enumitem, booktabs, natbib。

  **页面溢出预防：**

  为防止内容在页面上溢出，遵循以下关键指南：

  1. **监控框内容长度：** 每个假设框应舒适地适合单个页面。如果内容超过约0.7页，可能会溢出。

  2. **使用策略性分页：** 在包含大量内容的框之前插入 `\newpage`：
     ```latex
     \newpage
     \begin{hypothesisbox1}[假设1：标题]
     % 长内容在此
     \end{hypothesisbox1}
     ```

  3. **保持主要文本框简洁：** 为4页主要文本限制：
     - 每个假设框：最多0.5-0.6页
     - 机制解释：仅1-2个简短段落（最多6-10句）
     - 关键证据：仅2-3个要点
     - 核心假设：仅1-2项
     - 如果内容更长，将细节移至附录

  4. **拆分长内容：** 如果假设需要广泛解释，跨主要文本和附录拆分：
     - 主要文本框：简要机制概述 + 2-3个关键证据点
     - 附录A：详细机制解释、全面证据、扩展讨论

  5. **测试页面边界：** 在每个新框之前，考虑剩余页面空间是否足够。如果少于0.6页，使用 `\newpage` 从新页面开始框。

  6. **附录页面管理：** 在附录中，使用 `\newpage` 在主要部分之间，以避免详细内容区域溢出。

  **快速参考：** 参见 `assets/FORMATTING_GUIDE.md` 获取所有框类型、颜色方案和常见格式模式的详细示例。

  ## 质量标准

  确保所有生成假设符合以下标准：

  - **基于证据：** 基于现有文献，有引用
  - **可测试：** 包含具体、可测量的预测
  - **机制性：** 解释如何/为什么，不仅仅是什么
  - **全面：** 考虑替代解释
  - **严谨：** 包括测试预测的实验设计

  ## 资源

  ### references/

  - `hypothesis_quality_criteria.md` - 评估假设质量的框架（可测试性、可证伪性、简洁性、解释力、范围、一致性）
  - `experimental_design_patterns.md` - 跨领域的常见实验方法（RCTs、观察性研究、实验室实验、计算模型）
  - `literature_search_strategies.md` - PubMed和一般科学来源的有效搜索技术

  ### assets/

  - `hypothesis_generation.sty` - LaTeX样式包，提供彩色框、专业格式和假设报告的自定义环境
  - `hypothesis_report_template.tex` - 完整LaTeX模板，包含主要文本结构和全面附录部分
  - `FORMATTING_GUIDE.md` - 快速参考指南，包含所有框类型、颜色方案、引用实践和故障排除提示的示例

