  # 后接受会议准备

  一个后接受会议准备工作流程，帮助研究人员高效完成演讲、海报和推广内容。

  ## 核心功能

  ### 1. 演讲幻灯片创建

  创建会议演讲幻灯片的指导：

  **时间控制**
  - 15分钟演讲：10-15张幻灯片
  - 20分钟演讲：15-20张幻灯片
  - 30分钟演讲：20-30张幻灯片
  - 平均每张幻灯片1-1.5分钟

  **内容结构**
  - 标题幻灯片 (1)
  - 动机/问题 (2-3)
  - 方法概述 (3-5)
  - 关键结果 (3-5)
  - 结论 (1-2)
  - Q&A/谢谢 (1)

  **视觉设计原则**
  - 每张幻灯片一个关键信息
  - 使用图形和图表而非文字
  - 一致的配色方案和字体
  - 最小字体大小：正文24pt，标题32pt
  - 高对比度颜色以提高可读性

  **演讲技巧**
  - 使用秒表练习时间控制
  - 准备备份幻灯片以应对预期问题
  - 谨慎并有目的地使用动画
  - 包含幻灯片编号以便Q&A参考

  ### 2. 学术海报设计

  创建会议海报的指导：

  **标准尺寸**
  - 纵向：24x36英寸或A0 (841x1189mm)
  - 横向：36x24英寸或A0横向
  - 检查会议具体要求尺寸

  **布局结构**
  - 标题栏（顶部）：标题、作者、隶属机构、徽标
  - 介绍（左侧）：问题陈述、动机
  - 方法（中心）：关键方法、架构图
  - 结果（右侧）：主要发现、表格、图形
  - 结论（底部）：总结、未来工作、二维码

  **设计指南**
  - 从4-6英尺距离可读
  - 标题字体：72-96pt
  - 节标题：36-48pt
  - 正文文本：24-32pt
  - 使用项目符号，而非段落
  - 包含链接到论文/代码的二维码

  ### 3. 推广内容创建

  论文接受后创建推广内容的指导：

  **Twitter/X线程**
  - 线程结构：钩子 -> 问题 -> 方法 -> 关键结果 -> 链接
  - 第一条推文：带有表情符号的引人注目的摘要
  - 包含1-2个关键图形
  - 以论文链接和相关标签结束
  - 标记合著者和相关账户

  **LinkedIn帖子**
  - 专业语气，3-5段
  - 突出实际影响
  - 包含关键图形或图表
  - 添加相关标签

  **博客帖子**
  - 800-1500字
  - 面向更广泛受众的非技术性摘要
  - 包含带有解释的图形
  - 链接到论文、代码和演示

  ## 使用时机

  在以下场景中使用此技能：

  - **论文接受后** - 准备会议演示材料
  - **海报会话准备** - 设计和创建学术海报
  - **研究推广** - 创建社交媒体和博客内容
  - **会议演讲准备** - 结构化和练习演讲

  ## 工作流程

  ### 演示工作流程
  ```
  论文接受 -> 识别关键信息 -> 创建幻灯片大纲 -> 设计幻灯片 -> 练习时间控制 -> 准备Q&A备份幻灯片
  ```

  ### 海报工作流程
  ```
  论文接受 -> 选择布局模板 -> 提取关键内容 -> 设计海报 -> 打印测试缩减尺寸 -> 最终打印
  ```

  ### 推广工作流程
  ```
  论文接受 -> 编写Twitter线程 -> 创建LinkedIn帖子 -> 起草博客帖子 -> 围绕会议日期安排帖子
  ```

  ## 最佳实践

  ### 演示
  - 以“所以什么”开始 - 为什么观众应该关心
  - 讲述一个故事：问题 -> 洞察 -> 解决方案 -> 影响
  - 尽可能使用具体示例和演示
  - 预测问题并准备答案
  - 提前到达测试设备

  ### 海报
  - 设计用于扫描，而非阅读
  - 使用视觉层次引导眼睛
  - 包括“电梯演讲”摘要
  - 携带名片或二维码
  - 练习2分钟和5分钟的解释

  ### 推广
  - 在收到接受通知后1-2周内发布
  - 与合著者协调时间
  - 参与评论和问题
  - 跨多个平台分享
  - 为图形包含可访问的描述

  ## 总结

  此技能提供一个全面的后接受工作流程，涵盖三个关键领域：演示幻灯片、学术海报和推广内容。遵循这些指南有助于研究人员在会议和更广泛的社区中有效沟通他们的工作。
