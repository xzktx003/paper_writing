  # 科学图表生成技能

  ## 目的

  遵循期刊标准和数据可视化最佳实践，生成符合发表质量的科学图表。

  ## 能力

  - 创建统计图表
  - 生成多面板图表
  - 应用期刊格式
  - 导出多种格式
  - 确保可访问性
  - 添加注释

  ## 使用指南

  1. 准备数据
  2. 选择可视化类型
  3. 应用样式
  4. 添加注释
  5. 检查可访问性
  6. 导出图表

  ## 流程集成

  在科学发现工作流程中用于：
  - 稿件准备
  - 演示文稿制作
  - 数据交流
  - 结果可视化

  ## 配置

  - 期刊样式指南
  - 配色方案
  - 分辨率设置
  - 导出格式

  ## 输出成果

  - 发表图表
  - 多面板布局
  - 矢量图形
  - 图例说明
