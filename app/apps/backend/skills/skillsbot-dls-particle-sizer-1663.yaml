  # DLS 粒度分析仪

  ## 目的

  DLS粒度分析仪技能提供动态光散射分析，用于测定纳米颗粒的流体动力学尺寸，能够快速、无损地测量尺寸分布并进行稳定性评估。

  ## 能力

  - 流体动力学直径测量
  - 多分散性指数计算
  - 尺寸分布分析
  - 温度依赖性测量
  - 多角度DLS分析
  - 颗粒浓度估算

  ## 使用指南

  ### DLS测量

  1. **样品制备**
     - 稀释至适当浓度
     - 过滤去除灰尘
     - 温度平衡

  2. **数据分析**
     - 单峰样品使用累积量法
     - 多峰样品应用CONTIN算法
     - 报告强度加权Z平均值

  3. **质量指标**
     - PDI < 0.1: 单分散
     - PDI 0.1-0.3: 窄分布
     - PDI > 0.3: 宽分布

  ## 流程集成

  - 统计粒度分布分析
  - 纳米颗粒合成方案开发
  - 纳米颗粒药物递送系统开发

  ## 输入模式

  ```json
  {
    "样品编号": "字符串",
    "溶剂": "字符串",
    "温度": "数字 (℃)",
    "折射率": "数字",
    "粘度": "数字 (cP)"
  }
  ```

  ## 输出模式

  ```json
  {
    "Z平均值": "数字 (nm)",
    "多分散性指数": "数字",
    "分布": {
      "强度": {"峰值": [{"尺寸": "数字", "百分比": "数字"}]},
      "体积": {"峰值": [{"尺寸": "数字", "百分比": "数字"}]},
      "数量": {"峰值": [{"尺寸": "数字", "百分比": "数字"}]}
    },
    "质量指标": {
      "截距": "数字",
      "基线": "数字"
    }
  }
  ```
