  # 研究项目协调

  协调需要随时间进行系统性发现、文献收集和综合的多阶段研究项目。

  ## 使用的工具

  此技能使用多个类别的工具：

  **发现阶段**:
  - `create_research_question` - 创建搜索查询
  - `run_discovery_for_question` - 执行搜索
  - `list_available_sources` - 选择来源

  **收集阶段**:
  - `list_articles` - 浏览论文
  - `search_articles` - 筛选集合
  - `collection_stats` - 跟踪进度

  **分析阶段** (委托给研究分析师):
  - `compare_articles` - 跨论文分析
  - `answer_research_question` - 带引用的综合总结
  - `explore_citation_network` - 引用关系映射

  **管理**:
  - `list_skills` - 根据需要加载其他技能
  - `load_skill` - 获取专业指导

  ## 项目类型

  ### 综述论文
  覆盖整个领域的多主题综合性文献综述。

  ### 学位论文章节
  针对特定研究问题及其背景的深入探讨。

  ### 基金申请背景
  为支持研究方向主张而进行的证据收集。

  ### 竞争性分析
  对某个领域内方法/途径的系统性比较。

  ## 项目阶段

  ### 阶段 1: 范围界定与规划

  ```
  1. 定义项目范围
     - 主要研究问题
     - 需要涵盖的子主题
     - 预期产出（综述、论文等）
     - 时间限制

  2. 创建项目结构
     项目: [名称]
     ├── 主题 1: [子主题]
     │   └── 查询: [列表]
     ├── 主题 2: [子主题]
     │   └── 查询: [列表]
     └── 主题 N: [子主题]
         └── 查询: [列表]

  3. 设定收集目标
     - 每个主题的论文数: [数量]
     - 质量阈值: [值]
     - 时间范围: [年份]
  ```

  ### 阶段 2: 系统性发现

  对于每个子主题：

  ```
  1. 创建针对性查询
     create_research_question(
       title="[项目名称]的[主题]",
       keywords=["具体", "术语"],
       sources=["合适的", "来源"],
       max_papers=50
     )

  2. 执行发现
     run_discovery_for_question(question_id="...")

  3. 跟踪进度
     collection_stats()

  4. 根据需要调整
     - 结果太少 → 拓宽关键词
     - 焦点错误 → 精炼术语
  ```

  ### 阶段 3: 文献收集与整理

  ```
  1. 审阅发现的论文
     list_articles(limit=100, sort_by="relevance")

  2. 识别每个主题的关键论文
     search_articles(query="[主题关键词]", limit=20)

  3. 检查覆盖缺口
     - 是否遗漏了开创性论文？
     - 是否包含了近期工作？
     - 所有方法是否都有代表？

  4. 通过针对性搜索填补缺口
  ```

  ### 阶段 4: 分析与综合

  委托给研究分析师：

  ```
  send_message_to_agent(
    agent_name="Research Analyst",
    message="对于[项目名称]项目，请：

    1. 分析[主题]类别中的论文
    2. 为[章节名称]生成综合总结
    3. 识别关键主题和研究缺口

    待分析论文: [ID列表]
    输出格式: [结构化摘要 / 比较表格 / 叙述性总结]"
  )
  ```

  ### 阶段 5: 整合

  将分析结果整合为最终产出：

  ```
  1. 从研究分析师处收集章节摘要
  2. 识别跨领域主题
  3. 突出研究缺口
  4. 提出未来方向建议
  ```

  ## 进度跟踪

  在对话中维护项目状态：

  ```
  ## 项目: [名称]
  状态: [第 X 阶段 / 共 5 阶段]
  开始时间: [日期]

  ### 主题进度:
  | 主题 | 查询数 | 论文数 | 已分析 | 状态 |
  |-------|---------|--------|----------|--------|
  | 主题 1 | 2 | 45 | 20 | ✓ 完成 |
  | 主题 2 | 3 | 62 | 0 | 进行中 |
  | 主题 3 | 1 | 0 | 0 | 待处理 |

  ### 下一步行动:
  1. [立即行动]
  2. [即将进行的行动]
  ```

  ## 工作流程示例

  ### 示例 1: 关于大语言模型效率的综述论文

  **用户**: "我正在撰写一篇关于高效大语言模型的综述论文"

  ```
  阶段 1: 范围界定
  "让我们规划您的综述。我将此分解为以下子主题：

  1. **架构效率**
     - 稀疏注意力机制
     - 状态空间模型
     - 专家混合

  2. **训练效率**
     - 参数高效微调
     - 蒸馏方法
     - 课程学习

  3. **推理优化**
     - 量化
     - 剪枝
     - 推测解码

  4. **硬件感知设计**
     - 内存优化
     - 硬件协同设计

  对于每个主题，我将创建针对约30-50篇论文的发现查询。
  总目标：跨主题约150-200篇论文。

  是否按此结构继续？"

  阶段 2: 发现（针对每个主题）
  create_research_question(
    title="大语言模型效率综述：稀疏注意力",
    keywords=["稀疏注意力", "高效Transformer", "线性注意力"],
    sources=["arxiv", "semantic_scholar"],
    max_papers=50
  )
  run_discovery_for_question(...)

  阶段 3: 跟踪进度
  "发现进度更新：

  | 主题 | 发现论文数 | 状态 |
  |-------|--------------|--------|
  | 稀疏注意力 | 47 | ✓ |
  | 状态空间模型 | 38 | ✓ |
  | 专家混合 | 52 | ✓ |
  | 参数高效微调 | 61 | 进行中 |
  | ... | ... | ... |

  总计：198篇论文。可以开始分析了吗？"

  阶段 4: 分析（委托）
  send_message_to_agent(
    agent_name="Research Analyst",
    message="大语言模型效率综述分析请求：

    章节：稀疏注意力机制
    论文：[47篇论文ID列表]

    请提供：
    1. 方法分类体系
    2. 比较分析表格
    3. 演进时间线（2020-2024）
    4. 关键研究缺口
    5. 章节摘要（约500字）"
  )
  ```

  ### 示例 2: 学位论文背景章节

  **用户**: "帮助我为关于多模态学习的学位论文构建背景章节"

  ```
  阶段 1: 范围界定
  "对于学位论文背景，我们需要：

  1. **基础性工作**（2020年前）
     - 早期多模态方法
     - 关键理论框架

  2. **核心方法**（2020-2023）
     - 视觉-语言模型
     - 音频-视觉学习
     - 跨模态注意力

  3. **最新进展**（2023至今）
     - 统一架构
     - 规模化研究
     - 涌现能力

  4. **您的具体聚焦领域**
     - [用户的论文主题]

  我将优先考虑开创性论文和高引用工作。
  目标：总计约80-100篇论文。"

  阶段 2-4: [系统性地执行]

  阶段 5: 整合
  "背景章节结构已准备就绪：

  ## 2. 背景与相关工作

  ### 2.1 多模态学习基础
  [基于基础性论文的综合总结]

  ### 2.2 视觉-语言模型
  [基于VLM论文的综合总结]

  ### 2.3 跨模态注意力机制
  [基于注意力论文的综合总结]

  ### 2.4 最新进展与开放挑战
  [基于近期论文的综合总结]

  ### 2.5 总结与研究缺口
  [引出您的贡献]

  每个章节都已草拟并附有适当引用。
  您希望我细化任何章节吗？"
  ```

  ## 项目模板

  ### 综述论文模板
  ```
  章节：6-8个主题领域
  每个章节论文数：20-40
  总论文数：150-300
  时间线：4-8周
  分析深度：全面的分类体系 + 比较
  ```

  ### 学位论文背景模板
  ```
  章节：4-5个领域
  每个章节论文数：15-25
  总论文数：60-100
  时间线：2-4周
  分析深度：历史背景 + 最新技术
  ```

  ### 基金申请模板
  ```
  章节：2-3个关键领域
  每个章节论文数：10-15
  总论文数：30-50
  时间线：1-2周
  分析深度：支持主张的证据 + 缺口识别
  ```

  ## 协调说明

  - **检查点**：每个阶段后与用户一起审阅
  - **迭代**：预计进行2-3轮细化
  - **委托**：使用研究分析师进行深度分析
  - **文档记录**：保持项目状态更新
  - **灵活性**：根据发现调整结构
