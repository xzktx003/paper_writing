  # 调查设计与实施技能

  为基于人群的研究开发调查工具，实施抽样策略并管理数据收集。

  ## 概述

  调查设计与实施技能能够为严谨的基于人群的社会科学研究开发调查工具，实施抽样策略，优化应答率，并管理多模式数据收集。

  ## 能力

  ### 问卷设计
  - 问题构建
  - 应答量表设计
  - 问题排序
  - 跳转逻辑实施
  - 认知测试

  ### 抽样方法
  - 概率抽样
  - 分层抽样
  - 整群抽样
  - 多阶段抽样
  - 非概率替代方案

  ### 应答优化
  - 联系策略
  - 激励设计
  - 跟进程序
  - 无应答分析
  - 加权调整

  ### 多模式实施
  - 网络调查设计
  - 电话调查协议
  - 邮件调查程序
  - 混合模式策略
  - 模式效应评估

  ### 质量控制
  - 数据清洗
  - 应答验证
  - 项目无应答处理
  - 偏倚评估
  - 文档标准

  ## 使用指南

  ### 何时使用
  - 收集人群数据
  - 测量态度/行为
  - 进行需求评估
  - 评估项目
  - 检验假设

  ### 最佳实践
  - 试点测试工具
  - 记录程序
  - 监控应答率
  - 处理无应答
  - 妥善归档数据

  ### 集成点
  - 心理测量评估技能
  - 定量方法技能
  - 研究伦理与IRB技能
  - 混合方法集成技能

  ## 参考文献

  - 调查研究设计流程
  - 调查实施流程
  - 量表开发与验证流程
  - 调查研究主管智能体
