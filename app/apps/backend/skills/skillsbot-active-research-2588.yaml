  如果用户明确要求双语输出，可以使用i18n对象（见i18n部分）。

  ### 论文报告模板（针对arXiv论文）

  当分析学术论文时，使用更丰富的模板，包括：
  - `PaperHeader`（标题、arxivId、日期、类别）
  - `AuthorList`（带有隶属关系的作者）
  - `Abstract`（关键词高亮）
  - `ContributionList`（关键贡献）
  - `MethodOverview`（逐步方法）
  - `ResultsTable`（实验结果）
  - `Formula`（关键方程，LaTeX）
  - `Figure`（来自ar5iv的论文图表）

  ### 可用的json-ui组件

  | 组件 | 用途 | 关键属性 |
  |-----------|---------|-----------|
  | `BrandHeader` | 报告标题 | `badge`, `poweredBy` |
  | `PaperHeader` | 论文元数据 | `title`, `arxivId`, `date`, `categories` |
  | `AuthorList` | 作者 | `authors: [{name, affiliation}]`, `maxVisible` |
  | `Section` | 主要章节 | `title`, `icon`（paper/star/bulb/chart/code/link/info/warning） |
  | `Prose` | 富文本 | `content`（支持**粗体**、*斜体*、`代码`、列表） |
  | `Abstract` | 摘要文本 | `text`, `highlights: ["keyword"]` |
  | `ContributionList` | 编号发现 | `items: [{badge, title, description}]` |
  | `MethodOverview` | 逐步 | `steps: [{step, title, description}]` |
  | `MetricsGrid` | 关键统计 | `metrics: [{label, value, trend, suffix}]`, `cols` |
  | `ResultsTable` | 数据表 | `columns`, `rows`, `highlights: [{row, col}]` |
  | `Table` | 通用表 | `columns: [{key, label}]`, `rows`, `striped`, `compact` |
  | `Callout` | 信息/提示/警告 | `type`（info/tip/warning/important/note）、`title`, `content` |
  | `Highlight` | 引用 | `type`（quote/important/warning/code）、`text`, `source` |
  | `KeyPoint` | 关键发现卡片 | `icon`, `title`, `description`, `variant` |
  | `CodeBlock` | 代码片段 | `code`, `language`, `title`, `showLineNumbers` |
  | `Formula` | LaTeX方程 | `latex`, `block`, `label` |
  | `Figure` | 图片 | `images: [{src, alt, width}]`, `label`, `caption` |
  | `Image` | 单张图片 | `src`, `alt`, `caption`, `width` |
  | `DefinitionList` | 术语/定义 | `items: [{term, definition}]` |
  | `LinkGroup` | 源链接 | `links: [{href, label, icon}]` |
  | `Grid` | 网格布局 | `cols`, children |
  | `Card` | 卡片容器 | `padding`（sm/md/lg）、`shadow` |
  | `TagList` | 标签 | `tags: [{label, color, href}]` |
  | `BrandFooter` | 页脚 | `timestamp`, `attribution`, `disclaimer` |

  ### json-ui已知陷阱

  | 陷阱 | 症状 | 修复 |
  |---------|---------|-----|
  | `MetricsGrid.suffix`作为i18n对象 | `text.replace`不是函数 | `suffix`必须是**纯字符串**，而不是`{ "en": ..., "zh": ... }` |
  | `MetricsGrid.value`作为数字 | 渲染错误 | `value`必须是**字符串**（例如，"58.5"而不是58.5） |
  | 缺少`BrandHeader`/`BrandFooter` | 报告看起来破损 | 始终包括两者 |
  | `Table`行值作为i18n对象 | 单元格中的`[object Object]` | 行单元格值必须是**纯字符串**。列`label`支持i18n，但行数据不支持。使用"Runtimes / 中文标签"而不是`{ "en": "Runtimes", "zh": "中文标签" }` |
  | 非常长的Prose内容 | 截断渲染 | 分割成多个Prose块或使用子节 |

  ### i18n支持

  默认情况下（`--lang en`），写纯字符串：
  ```json
  "英文文本"
  ```

  如果用户或代理明确选择双语输出（`--lang both`），请使用i18n对象：
  ```json
  { "en": "英文文本", "zh": "中文文本" }
  ```

  对于`--lang zh`，使用纯中文字符串。

  **例外：**
  - `MetricsGrid`属性`value`和`suffix`必须始终是纯字符串。
  - `Table`行单元格值必须是纯字符串（列`label`支持i18n，但行数据不支持）。对于双语行，使用组合字符串如"Runtimes / 中文标签"。

  ## 学术论文支持

  ### arXiv论文

  **ar5iv.org HTML**（阅读首选，但对3个月以内的论文经常不完整）：

  | 元素 | 选择器（Actionbook验证） | 可靠性 | 回退 |
  |---------|-------------------------------|-------------|----------|
  | 标题 | `h1.ltx_title_document` | 高 | `div.ltx_abstract`包括标题上下文 |
  | 作者 | `div.ltx_authors` | 高 | — |
  | 摘要 | `div.ltx_abstract` | 高 | — |
  | 全文 | `article` | 中 | 使用当章节选择器失败 |
  | 章节 | `section.ltx_section` | **新论文上低** | `article`获取所有内容 |
  | 章节标题 | `h2.ltx_title_section` | **新论文上低** | 从`article`文本解析 |
  | 图表 | `figure.ltx_figure` | 中 | — |
  | 表格 | `table.ltx_tabular` | 中 | — |
  | 参考文献 | `.ltx_bibliography` | 中 | — |

  **注意：**对于最近提交的大约3个月以内的论文，ar5iv经常呈现不完整的内容。始终检查`actionbook browser text 2>&1 | wc -c` — 如果<5KB，页面没有完全呈现。回退到其他来源。

  **arXiv API**（通过actionbook browser获取元数据）：
  ```
  actionbook browser open "http://export.arxiv.org/api/query?id_list={arxiv_id}"
  actionbook browser text
  ```

  ### 推荐论文来源优先级

  根据测试，使用此优先级顺序以获得最大覆盖范围：

  | 优先级 | 来源 | 您将获得什么 | 可靠性 |
  |----------|--------|-------------|-------------|
  | 1 | `arxiv.org/abs/<id>` | 摘要、元数据、提交历史 | 非常高 |
  | 2 | `huggingface.co/papers/<id>` | 摘要、社区评论、相关模型/数据集 | 非常高 |
  | 3 | GitHub仓库（从搜索结果） | 包含方法细节的README、模型库、代码 | 高 |
  | 4 | HuggingFace模型卡 | 训练配方、基准结果、快速开始 | 高 |
  | 5 | `ar5iv.org/html/<id>` | 完整的论文HTML，结构化选择器 | 中（新论文失败） |
  | 6 | Google Scholar / Semantic Scholar | 引用、相关工作 | 中 |

  **关键见解：**不要依赖单一来源。arxiv摘要+HuggingFace+GitHub的组合通常可以提供90%+所需的内容，即使ar5iv失败。

  ### 其他学术来源

  使用`actionbook browser`访问并提取内容：
  - Google Scholar（`scholar.google.com`）— Actionbook索引，使用`#gs_hdr_tsi`进行搜索
  - Semantic Scholar（`semanticscholar.org`）
  - Papers With Code（`paperswithcode.com`）
  - 会议论文集网站

  ## 错误处理

  | 错误 | 动作 |
  |-------|--------|
  | 浏览器无法打开 | 运行`actionbook browser status`，重试 |
  | 页面加载超时（30秒） | 跳过来源，尝试下一个。常见于papers.cool、慢速学术站点 |
  | ar5iv内容被截断（<5KB） | 论文对ar5iv来说太新了。回退到arxiv摘要+HuggingFace+GitHub |
  | `section.ltx_section`未找到 | ar5iv呈现不完整。使用`actionbook browser text "article"`或`"main"`代替 |
  | Actionbook选择器未找到 | 使用`actionbook browser snapshot`发现实际页面结构 |
  | `actionbook search`返回无结果 | 网站未索引。使用`actionbook browser snapshot`手动查找选择器 |
  | json-ui渲染崩溃（`text.replace`） | 检查MetricsGrid`suffix`/`value` — 必须是纯字符串，而不是i18n对象 |
  | `npx @actionbookdev/json-ui`失败 | 运行`npm install -g @actionbookdev/json-ui`，然后使用`json-ui render`重试。如果仍然失败，尝试monorepo本地路径 |
  | 无搜索结果 | 扩大搜索词，尝试不同角度 |
  | 渲染失败 | 保存JSON，告诉用户路径，并建议：`npm install -g @actionbookdev/json-ui` |

  **重要提示：**始终在结束之前运行`actionbook browser close`，即使出现错误。

  ## 质量指南

  1. **广度**：从至少3-5个不同的来源进行研究
  2. **深度**：阅读全文，不仅仅是片段
  3. **准确性**：在不同来源之间交叉引用事实
  4. **结构**：使用适当的json-ui组件为每种内容类型
  5. **归属**：始终在报告中包含源链接
  6. **新鲜度**：在相关性相等时优先选择最近的来源

  ## 双语内容注意事项（可选）

  当使用`--lang both`时，`zh`字段应该自然书写（不是逐字翻译）。

  实用规则：
  1. 保持不同语言中的事实相同（数字、日期、源链接）。
  2. 保持表格文本简短易读。
  3. 在没有稳定的中文术语时，保留英文中的技术术语。
  4. 优先考虑清晰度而不是逐字翻译。
