  # 文献综述

  ## 概述

  遵循严格的学术方法进行系统性、全面的文献综述。搜索多个文献数据库，按主题综合发现，验证所有引用的准确性，并生成专业的markdown和PDF格式输出文档。

  此技能与多个科学技能集成，用于数据库访问（gget、bioservices、datacommons-client），并提供了专门的工具用于引用验证、结果聚合和文档生成。

  ## 何时使用此技能

  在以下情况下使用此技能：
  - 为研究或出版物进行系统性文献综述
  - 跨多个来源综合特定主题的当前知识
  - 进行荟萃分析或范围性综述
  - 撰写研究论文或论文的文献综述部分
  - 调查研究领域的最新技术
  - 识别研究差距和未来方向
  - 需要验证的引用和专业格式化

  ## 使用科学示意图进行视觉增强

  **⚠️ 强制要求：每篇文献综述必须至少包括1-2个使用scientific-schematics技能生成的AI生成图表。**

  这不是可选的。没有视觉元素的文献综述是不完整的。在完成任何文档之前：
  1. 生成至少一个示意图或图表（例如，系统性综述的PRISMA流程图）
  2. 对于全面综述，建议使用2-3个图表（搜索策略流程图、主题综合图、概念框架图）

  **如何生成图表：**
  - 使用**scientific-schematics**技能生成AI驱动的出版质量图表
  - 只需用自然语言描述你想要的图表
  - Nano Banana Pro将自动生成、审查和优化示意图

  **如何生成示意图：**
  ```bash
  python scripts/generate_schematic.py "你的图表描述" -o figures/output.png
  ```

  AI将自动：
  - 创建具有适当格式的出版质量图像
  - 通过多次迭代进行审查和优化
  - 确保可访问性（色盲友好、高对比度）
  - 在figures/目录中保存输出

  **何时添加示意图：**
  - 系统性综述的PRISMA流程图
  - 文献搜索策略流程图
  - 主题综合图
  - 研究差距可视化图
  - 引用网络图
  - 概念框架插图
  - 任何受益于可视化的复杂概念

  有关创建示意图的详细指导，请参阅scientific-schematics技能文档。

  ---

  ## 核心工作流程

  文献综述遵循结构化的多阶段工作流程：

  ### 阶段1：规划和范围界定

  1. **定义研究问题**：对于临床/生物医学综述，使用PICO框架（人群、干预、比较、结果）
     - 示例：“与标准护理（C）相比，CRISPR-Cas9（I）治疗镰状细胞病（P）的疗效如何？”

  2. **确立范围和目标**：
     - 定义清晰、具体的研究问题
     - 确定综述类型（叙事性、系统性、范围性、荟萃分析）
     - 设定边界（时间范围、地理范围、研究类型）

  3. **制定搜索策略**：
     - 从研究问题中识别2-4个主要概念
     - 列出每个概念的同义词、缩写和相关术语
     - 计划布尔运算符（AND、OR、NOT）以组合术语
     - 选择至少3个互补数据库

  4. **设定纳入/排除标准**：
     - 日期范围（例如，最近10年：2015-2024）
     - 语言（通常为英语，或指定多语言）
     - 出版物类型（同行评审、预印本、综述）
     - 研究设计（RCTs、观察性、体外等）
     - 清晰记录所有标准

  ### 阶段2：系统性文献搜索

  1. **多数据库搜索**：

     选择适合领域的数据库：

     **生物医学与生命科学：**
     - 使用`gget`技能：`gget search pubmed "搜索术语"`用于PubMed/PMC
     - 使用`gget`技能：`gget search biorxiv "搜索术语"`用于预印本
     - 使用`bioservices`技能用于ChEMBL、KEGG、UniProt等

     **通用科学文献：**
     - 通过直接API搜索arXiv（物理学、数学、CS、q-bio领域的预印本）
     - 通过API搜索Semantic Scholar（2亿+论文，跨学科）
     - 使用Google Scholar进行全面覆盖（手动或小心爬取）

     **专业数据库：**
     - 使用`gget alphafold`用于蛋白质结构
     - 使用`gget cosmic`用于癌症基因组学
     - 使用`datacommons-client`用于人口统计/统计数据
     - 根据领域使用专业数据库

  2. **记录搜索参数**：
     ```markdown
     ## 搜索策略

     ### 数据库：PubMed
     - **搜索日期**：2024-10-25
     - **日期范围**：2015-01-01至2024-10-25
     - **搜索字符串**：
       ```
       ("CRISPR"[Title] OR "Cas9"[Title])
       AND ("sickle cell"[MeSH] OR "SCD"[Title/Abstract])
       AND 2015:2024[Publication Date]
       ```
     - **结果**：247篇文章
     ```

     为每个搜索的数据库重复。

  3. **导出和聚合结果**：
     - 从每个数据库以JSON格式导出结果
     - 将所有结果合并到单个文件中
     - 使用`scripts/search_databases.py`进行后处理：
       ```bash
       python search_databases.py combined_results.json \
         --deduplicate \
         --format markdown \
         --output aggregated_results.md
       ```

  ### 阶段3：筛选和选择

  1. **去重**：
     ```bash
     python search_databases.py results.json --deduplicate --output unique_results.json
     ```
     - 通过DOI（主要）或标题（备用）移除重复
     - 记录移除的重复数

  2. **标题筛选**：
     - 根据纳入/排除标准审查所有标题
     - 排除明显不相关的研究
     - 记录此阶段排除的数量

  3. **摘要筛选**：
     - 阅读剩余研究的摘要
     - 严格应用纳入/排除标准
     - 记录排除原因

  4. **全文筛选**：
     - 获取剩余研究的全文
     - 根据所有标准进行详细审查
     - 记录具体的排除原因
     - 记录最终纳入的研究数量

  5. **创建PRISMA流程图**：
     ```
     初始搜索：n = X
     ├─ 去重后：n = Y
     ├─ 标题筛选后：n = Z
     ├─ 摘要筛选后：n = A
     └─ 纳入综述：n = B
     ```

  ### 阶段4：数据提取和质量评估

  1. **从每个纳入研究中提取关键数据**：
     - 研究元数据（作者、年份、期刊、DOI）
     - 研究设计和方法
     - 样本量和人群特征
     - 主要发现和结果
     - 作者指出的局限性
     - 资金来源和利益冲突

  2. **评估研究质量**：
     - **对于RCTs**：使用Cochrane偏倚风险工具
     - **对于观察性研究**：使用Newcastle-Ottawa量表
     - **对于系统性综述**：使用AMSTAR 2
     - 为每项研究评级：高、中、低或极低质量
     - 考虑排除极低质量的研究

  3. **按主题组织**：
     - 识别研究中的3-5个主要主题
     - 按主题分组研究（研究可能出现在多个主题中）
     - 注意模式、共识和争议

  ### 阶段5：综合和分析

  1. **从模板创建综述文档**：
     ```bash
     cp assets/review_template.md my_literature_review.md
     ```

  2. **撰写主题综合**（NOT 逐个研究总结）：
     - 按主题或研究问题组织结果部分
     - 在每个主题内综合多个研究的发现
     - 比较和对比不同的方法和结果
     - 识别共识领域和争议点
     - 突出最强证据

     示例结构：
     ```markdown
     #### 3.3.1 主题：CRISPR递送方法

     研究了多种递送方法用于治疗性基因编辑。病毒载体（AAV）在15项研究^1-15^中使用，显示高转导效率（65-85%），但引发免疫原性担忧^3,7,12^。相比之下，脂质纳米颗粒展示较低效率（40-60%），但安全性更好^16-23^。
     ```

  3. **批判性分析**：
     - 评估研究的方法优点和局限性
     - 评估证据的质量和一致性
     - 识别知识差距和方法差距
     - 注意需要未来研究的领域

  4. **撰写讨论**：
     - 在更广泛背景下解释发现
     - 讨论临床、实践或研究意义
     - 承认综述本身的局限性
     - 如果适用，与先前综述比较
     - 提出具体的未来研究方向

  ### 阶段6：引用验证

  **关键**：所有引用必须在最终提交前验证准确性。

  1. **验证所有DOIs**：
     ```bash
     python scripts/verify_citations.py my_literature_review.md
     ```

     此脚本：
     - 从文档中提取所有DOIs
     - 验证每个DOI是否正确解析
     - 从CrossRef检索元数据
     - 生成验证报告
     - 输出正确格式的引用

  2. **审查验证报告**：
     - 检查任何失败的DOIs
     - 验证作者姓名、标题和出版物细节匹配
     - 纠正原始文档中的任何错误
     - 重新运行验证，直到所有引用通过

  3. **一致格式化引用**：
     - 选择一种引用样式并全程使用（参见`references/citation_styles.md`）
     - 常见样式：APA、Nature、Vancouver、Chicago、IEEE
     - 使用验证脚本输出正确格式化引用
     - 确保文内引用与参考文献列表格式匹配

  ### 阶段7：文档生成

  1. **生成PDF**：
     ```bash
     python scripts/generate_pdf.py my_literature_review.md \
       --citation-style apa \
       --output my_review.pdf
     ```

     选项：
     - `--citation-style`：apa、nature、chicago、vancouver、ieee
     - `--no-toc`：禁用目录
     - `--no-numbers`：禁用章节编号
     - `--check-deps`：检查pandoc/xelatex是否安装

  2. **审查最终输出**：
     - 检查PDF格式和布局
     - 验证所有部分存在
     - 确保引用正确渲染
     - 检查图表/表格正确出现
     - 验证目录准确

  3. **质量检查清单**：
     - [ ] 所有DOIs已通过verify_citations.py验证
     - [ ] 引用一致格式化
     - [ ] 包括PRISMA流程图（用于系统性综述）
     - [ ] 搜索方法完全记录
     - [ ] 纳入/排除标准清晰说明
     - [ ] 结果按主题组织（非逐个研究）
     - [ ] 质量评估完成
     - [ ] 局限性得到承认
     - [ ] 参考文献完整准确
     - [ ] PDF生成无错误

  ## 数据库特定搜索指导

  ### PubMed / PubMed Central

  通过`gget`技能访问：
  ```bash
  # 搜索PubMed
  gget search pubmed "CRISPR gene editing" -l 100

  # 使用过滤器搜索
  # 使用PubMed高级搜索构建器构造复杂查询
  # 然后通过gget或直接Entrez API执行
  ```

  **搜索提示**：
  - 使用MeSH术语：`"sickle cell disease"[MeSH]`
  - 字段标签：`[Title]`、`[Title/Abstract]`、`[Author]`
  - 日期过滤器：`2020:2024[Publication Date]`
  - 布尔运算符：AND、OR、NOT
  - 参见MeSH浏览器：https://meshb.nlm.nih.gov/search

  ### bioRxiv / medRxiv

  通过`gget`技能访问：
  ```bash
  gget search biorxiv "CRISPR sickle cell" -l 50
  ```

  **重要考虑**：
  - 预印本未经同行评审
  - 谨慎验证发现
  - 检查预印本是否已发表（CrossRef）
  - 注意预印本版本和日期

  ### arXiv

  通过直接API或WebFetch访问：
  ```python
  # 示例搜索类别：
  # q-bio.QM（定量方法）
  # q-bio.GN（基因组学）
  # q-bio.MN（分子网络）
  # cs.LG（机器学习）
  # stat.ML（机器学习统计）

  # 搜索格式：类别 AND 术语
  search_query = "cat:q-bio.QM AND ti:\"single cell sequencing\""
  ```

  ### Semantic Scholar

  通过直接API访问（需要API密钥，或使用免费层）：
  - 2亿+论文，跨所有领域
  - 适用于跨学科搜索
  - 提供引用图和论文推荐
  - 用于查找高影响力论文

  ### 专业生物医学数据库

  使用适当技能：
  - **ChEMBL**：`bioservices`技能用于化学生物活性
  - **UniProt**：`gget`或`bioservices`技能用于蛋白质信息
  - **KEGG**：`bioservices`技能用于通路和基因
  - **COSMIC**：`gget`技能用于癌症突变
  - **AlphaFold**：`gget alphafold`用于蛋白质结构
  - **PDB**：`gget`或直接API用于实验结构

  ### 引用链

  通过引用网络扩展搜索：

  1. **正向引用**（引用关键论文的论文）：
     - 使用Google Scholar“引用”
     - 使用Semantic Scholar或OpenAlex APIs
     - 识别基于开创性工作的较新研究

  2. **反向引用**（来自关键论文的参考文献）：
     - 从纳入论文中提取参考文献
     - 识别高被引的基础工作
     - 查找被多个纳入研究引用的论文

  ## 引用样式指南

  详细格式指南在`references/citation_styles.md`中。快速参考：

  ### APA（第7版）
  - 文内：(Smith et al., 2023)
  - 参考文献：Smith, J. D., Johnson, M. L., & Williams, K. R. (2023). Title. *Journal*, *22*(4), 301-318. https://doi.org/10.xxx/yyy

  ### Nature
  - 文内：上标数字^1,2^
  - 参考文献：Smith, J. D., Johnson, M. L. & Williams, K. R. Title. *Nat. Rev. Drug Discov.* **22**, 301-318 (2023).

  ### Vancouver
  - 文内：上标数字^1,2^
  - 参考文献：Smith JD, Johnson ML, Williams KR. Title. Nat Rev Drug Discov. 2023;22(4):301-18.

  **始终验证引用**，在最终确定前使用verify_citations.py。

  ## 最佳实践

  ### 优先处理高影响力论文（关键）

  **始终优先处理来自知名作者和顶级出版物的有影响力、高被引论文。** 在文献综述中，质量比数量更重要。

  #### 被引数阈值

  使用被引数识别最具影响力的论文：

  | 论文年龄 | 被引阈值 | 分类 |
  |-----------|-------------------|----------------|
  | 0-3年 | 20+ 被引 | 值得注意 |
  | 0-3年 | 100+ 被引 | 高度有影响力 |
  | 3-7年 | 100+ 被引 | 重要 |
  | 3-7年 | 500+ 被引 | 开创性论文 |
  | 7+年 | 500+ 被引 | 基础工作 |
  | 7+年 | 1000+ 被引 | 奠基性 |

  #### 期刊和出版物层级

  优先处理来自高层级出版物的论文：

  - **层级1（始终首选）**：Nature、Science、Cell、NEJM、Lancet、JAMA、PNAS、Nature Medicine、Nature Biotechnology
  - **层级2（强偏好）**：高影响力专业期刊（IF>10）、顶级会议（NeurIPS、ICML用于ML/AI）
  - **层级3（相关时包括）**：受尊敬的专业期刊（IF 5-10）
  - **层级4（谨慎使用）**：低影响力同行评审出版物

  #### 作者声誉评估

  优先处理以下作者的论文：
  - **资深研究人员**，h指数高（>40，在已建立领域）
  - **领先研究团队**在认可机构（哈佛、斯坦福、MIT、牛津等）
  - **作者有多篇层级1出版物**在相关领域
  - **研究人员有公认专业知识**（奖项、编辑职位、学会会士）

  #### 识别开创性论文

  对于任何主题，通过以下方式识别基础工作：
  1. **高被引数**（通常5+年论文500+）
  2. **经常被其他纳入研究引用**（出现在许多参考文献列表中）
  3. **发表在层级1出版物**（Nature、Science、Cell系列）
  4. **由领域先驱撰写**（通常被引为建立概念）

  ### 搜索策略
  1. **使用多个数据库**（至少3个）：确保全面覆盖
  2. **包括预印本服务器**：捕获最新未发表发现
  3. **记录一切**：搜索字符串、日期、结果数以供再现性
  4. **测试和优化**：运行试点搜索，审查结果，调整搜索术语
  5. **按被引数排序**：当可用时，按被引数排序搜索结果以首先显示有影响力工作

  ### 筛选和选择
  1. **使用清晰标准**：在筛选前记录纳入/排除标准
  2. **系统筛选**：标题 → 摘要 → 全文
  3. **记录排除**：记录排除研究的原因
  4. **考虑双重筛选**：对于系统性综述，让两个评审员独立筛选
  5. **优先处理层级1出版物**：在考虑低层级来源前，包括所有来自顶级出版物的相关论文

  ### 综合
  1. **按主题组织**：按主题分组，NOT 逐个研究
  2. **跨研究综合**：比较、对比、识别模式
  3. **批判性**：评估证据的质量和一致性
  4. **识别差距**：注意缺失或研究不足的领域
  5. **以高影响力工作开头**：以每个主题中最具影响力/被引的论文开始

  ### 质量和再现性
  1. **评估研究质量**：使用适当的质量评估工具
  2. **验证所有引用**：运行verify_citations.py脚本
  3. **记录方法**：提供足够细节供他人再现
  4. **遵循指南**：使用PRISMA进行系统性综述

  ### 写作
  1. **客观**：公平呈现证据，承认局限性
  2. **系统性**：遵循结构化模板
  3. **具体**：包括数字、统计、效应大小（如果可用）
  4. **清晰**：使用清晰标题、逻辑流程、主题组织
  5. **引用影响指标**：当相关时，提及被引数和出版物声望

  ## 常见陷阱避免

  1. **单数据库搜索**：错失相关论文；始终搜索多个数据库
  2. **无搜索文档**：使综述不可再现；记录所有搜索
  3. **逐个研究总结**：缺乏综合；改为按主题组织
  4. **未验证引用**：导致错误；始终运行verify_citations.py
  5. **搜索太宽泛**：产生数千个不相关结果；使用特定术语优化
  6. **搜索太狭窄**：错失相关论文；包括同义词和相关术语
  7. **忽略预印本**：错失最新发现；包括bioRxiv、medRxiv、arXiv
  8. **无质量评估**：平等对待所有证据；评估和报告质量
  9. **发表偏倚**：仅发表阳性结果；注意潜在偏倚
  10. **搜索过时**：领域发展迅速；明确说明搜索日期

  ## 示例工作流程

  用于生物医学文献综述的完整工作流程：

  ```bash
  # 1. 从模板创建综述文档
  cp assets/review_template.md crispr_sickle_cell_review.md

  # 2. 使用适当技能搜索多个数据库
  # - 使用gget技能用于PubMed、bioRxiv
  # - 使用直接API访问用于arXiv、Semantic Scholar
  # - 以JSON格式导出结果

  # 3. 聚合和处理结果
  python scripts/search_databases.py combined_results.json \
    --deduplicate \
    --rank citations \
    --year-start 2015 \
    --year-end 2024 \
    --format markdown \
    --output search_results.md \
    --summary

  # 4. 筛选结果并提取数据
  # - 手动筛选标题、摘要、全文
  # - 将关键数据提取到综述文档中
  # - 按主题组织

  # 5. 按照模板结构撰写综述
  # - 引言具有清晰目标
  # - 详细方法部分
  # - 按主题组织的结果
  # - 批判性讨论
  # - 明确结论

  # 6. 验证所有引用
  python scripts/verify_citations.py crispr_sickle_cell_review.md

  # 审查引用报告
  cat crispr_sickle_cell_review_citation_report.json

  # 修复任何失败引用并重新验证
  python scripts/verify_citations.py crispr_sickle_cell_review.md

  # 7. 生成专业PDF
  python scripts/generate_pdf.py crispr_sickle_cell_review.md \
    --citation-style nature \
    --output crispr_sickle_cell_review.pdf

  # 8. 审查最终PDF和markdown输出
  ```

  ## 与其他技能集成

  此技能与其他科学技能无缝协作：

  ### 数据库访问技能
  - **gget**：PubMed、bioRxiv、COSMIC、AlphaFold、Ensembl、UniProt
  - **bioservices**：ChEMBL、KEGG、Reactome、UniProt、PubChem
  - **datacommons-client**：人口统计、经济学、健康统计

  ### 分析技能
  - **pydeseq2**：RNA-seq差异表达（用于方法部分）
  - **scanpy**：单细胞分析（用于方法部分）
  - **anndata**：单细胞数据（用于方法部分）
  - **biopython**：序列分析（用于背景部分）

  ### 可视化技能
  - **matplotlib**：为综述生成图表和绘图
  - **seaborn**：统计可视化

  ### 写作技能
  - **brand-guidelines**：将机构品牌应用于PDF
  - **internal-comms**：为不同受众调整综述
  - **venue-templates**：访问出版物特定写作风格指南，当准备综述供发表时

  ### 出版物特定写作风格

  当为特定期刊准备文献综述时，查阅**venue-templates**技能获取写作风格指导：
  - `venue_writing_styles.md`：跨出版物的主风格比较
  - `nature_science_style.md`：Nature/Science流动摘要风格，故事驱动结构
  - `cell_press_style.md`：Cell Press图形摘要，亮点格式
  - `medical_journal_styles.md`：NEJM/Lancet/JAMA结构化摘要，PRISMA合规性

  这些指南帮助调整综述的语气、摘要格式和结构，以匹配目标出版物的期望。

