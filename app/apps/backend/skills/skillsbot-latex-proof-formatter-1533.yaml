  # LaTeX证明编排器

  ## 目的

  提供关于使用出版级LaTeX格式编排理论计算机科学证明与算法的专家指导。

  ## 功能

  - 算法伪代码编排（algorithmicx）
  - 推理规则排版
  - 证明环境格式化
  - 定理编号与交叉引用
  - BibTeX集成
  - 会议风格合规性

  ## 使用指南

  1. **结构**: 清晰组织证明结构
  2. **算法**: 使用algorithmicx编排算法
  3. **规则**: 使用mathpartir排版推理规则
  4. **引用**: 妥善管理交叉引用
  5. **风格**: 符合会议/期刊风格要求

  ## 工具/库

  - LaTeX
  - algorithmicx
  - mathpartir
  - amsthm
  - Overleaf
