  ## 核心能力

  ### 1. 手稿结构和组织

  **IMRAD格式**：引导论文通过标准的引言、方法、结果和讨论结构，适用于大多数科学学科。这包括：
  - **引言**：建立研究背景、识别空白、陈述目标
  - **方法**：详细描述研究设计、人群、程序和分析方法
  - **结果**：客观呈现发现，不带解释
  - **讨论**：解释结果、承认限制、提出未来方向

  有关IMRAD结构的详细指导，请参阅`references/imrad_structure.md`。

  **替代结构**：支持学科特定的格式，包括：
  - 综述文章（叙述性、系统性、范围性）
  - 病例报告和病例系列
  - 荟萃分析和汇总分析
  - 理论/建模论文
  - 方法论文和协议

  ### 2. 部分特定写作指导

  **摘要撰写**：草拟简洁、独立的摘要（150-300词），写作**流畅的段落**——永远不要带标签部分如“背景：”、“方法：”、“结果：”、“结论：”。摘要应作为连贯的散文覆盖：（1）背景和问题，（2）所做的工作，（3）带具体数字的关键发现，和（4）意义和影响。仅当期刊在作者指南中明确要求时才使用带标签的结构化摘要。

  **引言开发**：构建引人入胜的引言，：
  - 建立研究问题的重要性
  - 系统回顾相关文献
  - 识别知识空白或争议
  - 陈述清晰的研究问题或假设
  - 解释研究的新颖性和意义

  **方法文档**：通过以下方式确保可重复性：
  - 详细的参与者/样本描述
  - 清晰的程序文档
  - 统计方法带理由
  - 设备和材料规格
  - 伦理批准和同意声明

  **结果呈现**：呈现发现，带有：
  - 从主要结果到次要结果的逻辑流程
  - 与图表整合
  - 带效应大小的统计显著性
  - 客观报告，不带解释

  **讨论构建**：综合发现，通过：
  - 将结果与问题关联
  - 与现有文献比较
  - 诚实承认限制
  - 提出机制解释
  - 建议实际影响和未来研究

  ### 3. 引用和参考文献管理

  跨学科正确应用引用样式。有关综合样式指南，请参阅`references/citation_styles.md`。

  **主要引用样式：**
  - **AMA（美国医学协会）**：数字上标引用，医学中常见
  - **Vancouver**：方括号中的数字引用，生物医学标准
  - **APA（美国心理学会）**：作者-日期文内引用，社会科学中常见
  - **Chicago**：注释-书目或作者-日期，人文和科学
  - **IEEE**：方括号数字，工程和计算机科学

  **最佳实践：**
  - 尽可能引用主要来源
  - 包括近期文献（活跃领域为最近5-10年）
  - 平衡引言和讨论中的引用分布
  - 验证所有引用与原始来源
  - 使用参考文献管理软件（Zotero、Mendeley、EndNote）

  **强制：写作后引用元数据检查**

  完成每个部分后，扫描`references.bib`中任何缺少`volume`、`pages`或`doi`字段的条目。对于每个不完整的条目，执行网络搜索以查找缺失的元数据：

  1. 使用`parallel_web.py search "作者 标题 期刊 volume pages DOI"`搜索
  2. 如果DOI存在，使用`parallel_web.py extract`从`https://doi.org/DOI`提取元数据
  3. 更新BibTeX条目与找到的元数据
  4. 日志：`[HH:MM:SS] 元数据丰富：[CitationKey] - 添加[字段] ✅`

  此检查必须在最终PDF编译之前进行。有关详细说明，请参阅引用管理技能（第2.5阶段）。

  ### 4. 图和表

  创建增强理解的有效数据可视化。有关最佳实践，请参阅`references/figures_tables.md`。

  **何时使用表与图：**
  - **表**：精确数值数据、复杂数据集、需要精确值的多个变量
  - **图**：趋势、模式、关系、比较，最适合视觉理解

  **设计原则：**
  - 使每个表/图自解释，带完整标题
  - 在所有展示项中使用一致的格式和术语
  - 用单位标注所有轴、列和行
  - 包括样本大小（n）和统计注释
  - 遵循“每1000词一个表/图”的指南
  - 避免在文本、表和图之间重复信息

  **常见图表类型：**
  - 条形图：比较离散类别
  - 线图：显示随时间趋势
  - 散点图：显示相关性
  - 箱形图：显示分布和异常值
  - 热图：可视化矩阵和模式

  ### 5. 按研究类型的报告指南

  通过遵循既定的报告标准确保完整性和透明度。有关指南详情，请参阅`references/reporting_guidelines.md`。

  **关键指南：**
  - **CONSORT**：随机对照试验
  - **STROBE**：观察性研究（队列、病例-对照、横断面）
  - **PRISMA**：系统综述和荟萃分析
  - **STARD**：诊断准确性研究
  - **TRIPOD**：预测模型研究
  - **ARRIVE**：动物研究
  - **CARE**：病例报告
  - **SQUIRE**：质量改进研究
  - **SPIRIT**：临床试验研究协议
  - **CHEERS**：经济评估

  每个指南提供清单，确保报告所有关键方法学元素。

  ### 6. 写作原则和风格

  应用基本的科学写作原则。有关指导，请参阅`references/writing_principles.md`。

  **清晰性：**
  - 使用精确、明确的语言
  - 首次使用定义技术术语和缩写
  - 保持段内和段间的逻辑流程
  - 适当时使用主动语态以增强清晰度

  **简洁性：**
  - 消除冗余词和短语
  - 偏好短句（平均15-20词）
  - 移除不必要的限定词
  - 严格尊重字数限制

  **准确性：**
  - 报告具有适当精度的确切值
  - 在整个使用一致的术语
  - 区分观察和解释
  - 适当承认不确定性

  **客观性：**
  - 不带偏见地呈现结果
  - 避免过度陈述发现或影响
  - 承认冲突的证据
  - 保持专业、中性的语气

  ### 7. 写作过程：从大纲到完整段落

  **关键：始终使用完整段落写作，永远不要在科学论文中提交要点。**

  科学论文必须用完整、流畅的散文写作。使用此两阶段方法进行有效写作：

  **阶段1：使用关键点创建部分大纲**

  开始新部分时：
  1. 使用研究查找技能收集相关文献和数据
  2. 创建带要点标记的结构化大纲：
     - 要呈现的主要论点或发现
     - 要引用的关键研究
     - 要包含的数据点和统计
     - 逻辑流程和组织
  3. 这些要点作为脚手架——它们不是最终手稿

  **示例大纲（引言部分）：**
  ```
  - 背景：AI在药物发现中日益受关注
    * 引用近期综述（Smith 2023, Jones 2024）
    * 传统方法慢且昂贵
  - 空白：在罕见疾病中应用有限
    * 仅2项先前研究（Lee 2022, Chen 2023）
    * 小数据集仍是挑战
  - 我们的方法：从常见疾病转移学习
    * 新颖架构结合X和Y
  - 研究目标：在3个罕见疾病数据集上验证
  ```

  **阶段2：将关键点转换为完整段落**

  大纲完成后，将每个要点扩展为适当的散文：

  1. **将要点转换为完整句子**，带主语、动词和宾语
  2. **添加句子和观点之间的过渡**（然而、此外、相反、随后）
  3. **自然地在句子中整合引用**，不是作为列表
  4. **扩展上下文和解释**，弥补要点省略
  5. **确保每个段落的逻辑流程**
  6. **变化句子结构**以保持读者参与

  **示例转换为散文：**

  ```
  在过去十年中，人工智能方法在药物发现管道中获得了显著关注（Smith，2023；Jones，2024）。虽然这些计算方法显示加速治疗候选物识别的潜力，但传统的实验方法仍然缓慢且资源密集，通常需要多年的实验室工作和大量财务投资。然而，AI在罕见疾病中的应用一直有限，仅有两项先前研究证明概念验证结果（Lee，2022；Chen，2023）。主要障碍是影响小患者群体的条件缺乏训练数据。

  为了解决这一挑战，我们开发了一种转移学习方法，利用来自充分表征的常见疾病的知识来预测罕见条件的治疗靶点。我们的新颖神经架构结合了卷积层用于分子特征提取和注意力机制用于蛋白质-配体相互作用建模。本研究的目标是在三个独立罕见疾病数据集上验证我们的方法，评估预测准确性和结果的生物学可解释性。
  ```

  **大纲和最终文本之间的关键差异：**

  | 大纲（规划阶段） | 最终手稿 |
  |--------------------------|------------------|
  | 要点和片段 | 完整句子和段落 |
  | 电报式笔记 | 带上下文的完整解释 |
  | 引用列表 | 引用整合到散文中 |
  | 缩写想法 | 带过渡的发展论点 |
  | 仅供您查看 | 用于出版和同行评审 |

  **避免的常见错误：**

  - ❌ **永远**不要在最终手稿中留下要点
  - ❌ **永远**不要提交列表，其中应是段落
  - ❌ **不要**在结果或讨论部分中使用编号或要点列表（除非特定情况如研究假设或纳入标准）
  - ❌ **不要**写句子片段或不完整想法
  - ✅ **做**仅在方法中使用偶尔列表（如纳入/排除标准、材料列表）
  - ✅ **做**确保每个部分作为连贯散文流动
  - ✅ **做**大声阅读段落以检查自然流程

  **何时列表可接受（有限案例）：**

  列表仅可在特定上下文中出现在科学论文中：
  - **方法**：纳入/排除标准、材料和试剂、参与者特征
  - **补充材料**：扩展协议、设备列表、详细参数
  - **永远不要出现在**：摘要、引言、结果、讨论、结论

  **摘要格式规则：**
  - ❌ **永远**不要使用标签部分（背景：、方法：、结果：、结论：）
  - ✅ **始终**写作带自然过渡的流畅段落
  - 例外：仅当期刊在作者指南中明确要求时才使用结构化格式

  **与研究查找的整合：**

  研究查找技能对阶段1（创建大纲）至关重要：
  1. 使用研究查找搜索相关论文
  2. 提取关键发现、方法和数据
  3. 将发现组织为大纲中的要点
  4. 然后在阶段2将大纲转换为完整段落

  此两阶段过程确保您：
  - 系统收集和组织信息
  - 在写作前创建逻辑结构
  - 产生抛光、出版就绪的散文
  - 保持叙述流程的重点

  ### 8. 期刊特定格式化

  使手稿适应期刊要求：
  - 遵循作者指南的结构、长度和格式
  - 应用期刊特定的引用样式
  - 满足图表规格（分辨率、文件格式、尺寸）
  - 包括必需声明（资助、利益冲突、数据可用性、伦理批准）
  - 遵守每个部分的字数限制
  - 当提供模板时，按要求格式化

  ### 9. 领域特定语言和术语

  适应语言、术语和惯例以匹配特定科学学科。每个领域都有既定的词汇、偏好措辞和领域特定惯例，以信号专业知识和确保目标受众清晰度。

  **识别领域特定语言惯例：**
  - 审查目标期刊中近期高影响力论文使用的术语
  - 注意领域特定的缩写、单位和符号系统
  - 识别偏好术语（如“参与者”与“受试者”、“化合物”与“药物”、“标本”与“样本”）
  - 观察方法、生物或技术的典型描述方式

  **生物医学和临床科学：**
  - 使用精确的解剖和临床术语（在正式写作中使用“心肌梗死”而不是“心脏病发作”）
  - 遵循标准化的疾病命名法（ICD、DSM、SNOMED-CT）
  - 指定药物名称，先使用通用名，如果需要再使用品牌名
  - 使用“患者”用于临床研究，“参与者”用于基于社区的研究
  - 遵循人类基因组变异协会（HGVS）命名法用于遗传变异
  - 使用标准单位报告实验室值（大多数国际期刊使用SI单位）

  **分子生物学和遗传学：**
  - 使用斜体用于基因符号（如*TP53*），普通字体用于蛋白质（如p53）
  - 遵循物种特定的基因命名法（人类用大写：*BRCA1*；小鼠用句子大小写：*Brca1*）
  - 首次提及指定生物体全名，然后使用接受的缩写（如*Escherichia coli*，然后*E. coli*）
  - 使用标准遗传符号（如+/+, +/-, -/-用于基因型）
  - 使用既定的分子技术术语（如“定量PCR”或“qPCR”，而不是“实时PCR”）

  **化学和药物科学：**
  - 遵循IUPAC命名法用于化合物
  - 使用系统名称用于新化合物，通用名用于熟知物质
  - 使用标准符号指定化学结构（如SMILES、InChI用于数据库）
  - 用适当单位报告浓度（mM、μM、nM，或% w/v、v/v）
  - 使用接受的反应命名法描述合成路线
  - 使用术语如“生物利用度”、“药代动力学”、“IC50”，与字段定义一致

  **生态学和环境科学：**
  - 使用二项式命名法用于物种（斜体：*Homo sapiens*）
  - 首次提及物种时指定分类权威，如果相关
  - 使用标准化的栖息地和生态系统分类
  - 使用一致的生态指标术语（如“物种丰富度”、“香农多样性指数”）
  - 用领域标准术语描述采样方法（如“横断面”、“样方”、“标记-重捕”）

  **物理和工程：**
  - 遵循SI单位一致，除非领域惯例另有规定
  - 使用标准符号用于物理量（标量与向量、张量）
  - 使用既定的现象术语（如“量子纠缠”、“层流”）
  - 指定设备型号和制造商，如果相关
  - 使用与字段标准一致的数学符号（如ℏ用于约化普朗克常数）

  **神经科学：**
  - 使用标准化的脑区命名法（如参考Allen Brain Atlas等图谱）
  - 使用既定的立体定向系统指定脑区坐标
  - 遵循神经术语惯例（在正式写作中使用“动作电位”而不是“脉冲”）
  - 基于测量方法适当使用“神经活动”、“神经元发放”、“脑激活”
  - 用适当的特异性描述记录技术（如“全细胞膜片钳”、“细胞外记录”）

  **社会和行为科学：**
  - 适当时使用人先语言（如“精神分裂症患者”而不是“精神分裂症患者”）
  - 使用标准化的心理结构和已验证的评估名称
  - 遵循APA指南减少语言偏见
  - 使用既定的术语指定理论框架
  - 使用“参与者”而不是“受试者”用于人类研究

  **一般原则：**

  **匹配受众专业知识：**
  - 针对专业期刊：自由使用领域特定术语，仅定义高度专业或新颖的术语
  - 针对广泛影响期刊（如*Nature*、*Science*）：定义更多技术术语，为专业概念提供上下文
  - 针对跨学科受众：平衡精确度与可访问性，首次使用定义术语

  **策略性地定义技术术语：**
  - 首次使用定义缩写：“信使RNA（mRNA）”
  - 为更广泛的受众写作时，为专门技术提供简要解释
  - 避免过度定义目标受众熟知的术语（信号不熟悉该领域）
  - 如果不可避免有大量专业术语，创建词汇表

  **保持一致性：**
  - 同一概念使用相同的术语（不要在“药物”、“药品”和“药剂”之间交替）
  - 遵循一致的缩写系统（首次定义后决定使用“PCR”或“聚合酶链反应”）
  - 应用相同的命名法系统（尤其是基因、物种、化学品）

  **避免领域混合错误：**
  - 不要为基本科学使用临床术语（如不要称小鼠为“患者”）
  - 避免使用口语或过于通用的术语代替精确的领域术语
  - 不要导入相邻领域的术语，而不确保正确使用

  **验证术语使用：**
  - 咨询领域特定的风格指南和命名法资源
  - 检查目标期刊中近期论文如何使用术语
  - 使用领域特定的数据库和本体（如基因本体、MeSH术语）
  - 不确定时，引用建立术语的关键参考文献

  ### 10. 避免的常见陷阱

  **主要拒稿原因：**
  1. 不适当、不完整或描述不足的统计
  2. 结果过度解释或结论无支持
  3. 方法描述差，影响可重复性
  4. 样本小、有偏或不适当
  5. 写作质量差或文本难以跟随
  6. 文献综述不充分或上下文不足
  7. 图表不清晰或设计差
  8. 未遵循报告指南

  **写作质量问题：**
  - 不当混合时态（方法/结果用过去时，既定事实用现在时）
  - 过多行话或未定义的缩写
  - 段落中断破坏逻辑流程
  - 部分之间缺失过渡
  - 不一致的符号或术语

  ## 手稿开发工作流程

  **阶段1：规划**
  1. 确定目标期刊并审查作者指南
  2. 确定适用的报告指南（CONSORT、STROBE等）
  3. 概述手稿结构（通常为IMRAD）
  4. 计划图表作为论文的骨干

  **阶段2：草拟**（对每个部分使用两阶段写作过程）
  1. 从图表开始（核心数据故事）
  2. 对下面每个部分，遵循两阶段过程：
     - **首先**：使用研究查找创建带要点的部分大纲
     - **其次**：将要点转换为带流畅散文的完整段落
  3. 写方法（通常最容易首先草拟）
  4. 草拟结果（客观描述图表）
  5. 编写讨论（解释发现）
  6. 写引言（设置研究问题）
  7. 撰写摘要（综合完整故事为**流畅段落**，不是标签部分）
  8. 创建标题（简洁和描述性）

  **记住**：要点仅用于规划——最终手稿必须在完整段落中。

  **阶段3：修订**
  1. 检查整个逻辑流程和“红色线索”
  2. 验证术语和符号的一致性
  3. 确保图表自解释
  4. 确认遵守报告指南
  5. 验证所有引用准确且正确格式化
  6. 检查每个部分的字数
  7. 校对语法、拼写和清晰度

  **阶段4：最终准备**
  1. 根据期刊要求格式化
  2. 准备补充材料
  3. 撰写突出意义的封面信
  4. 完成提交清单
  5. 收集所有必需声明和表格

  ## 与其他科学技能的整合

  此技能与以下技能有效协作：
  - **数据分析技能**：用于生成要报告的结果
  - **统计分析**：用于确定适当的统计展示
  - **文献综述技能**：用于将研究置于上下文中
  - **图表创建工具**：用于开发出版质量的图表
  - **场馆模板技能**：用于场馆特定的写作风格和格式化

  ### 场馆特定写作风格

  **在为特定场馆写作前，咨询场馆模板技能以获取写作风格指南：**

  不同场馆有显著不同的写作期望：
  - **Nature/Science**：可访问、故事驱动、广泛意义
  - **Cell Press**：机制深度、图形摘要、亮点
  - **医学期刊（NEJM、Lancet）**：结构化摘要、证据语言
  - **ML会议（NeurIPS、ICML）**：贡献要点、消融研究
  - **CS会议（CHI、ACL）**：领域特定惯例

  场馆模板技能提供：
  - `venue_writing_styles.md`：主要风格比较
  - 场馆特定指南：`nature_science_style.md`、`cell_press_style.md`、`medical_journal_styles.md`、`ml_conference_style.md`、`cs_conference_style.md`
  - `reviewer_expectations.md`：每个场馆审稿人的期望
  - 写作示例在`assets/examples/`中

  **工作流程**：首先使用此技能获取一般科学写作原则（IMRAD、清晰度、引用），然后咨询场馆模板以进行场馆特定风格适应。

  ## 参考文献

  此技能包括涵盖科学写作特定方面的综合参考文献文件：

  - `references/imrad_structure.md`：IMRAD格式和部分特定内容的详细指南
  - `references/citation_styles.md`：完整引用样式指南（APA、AMA、Vancouver、Chicago、IEEE）
  - `references/figures_tables.md`：创建有效数据可视化的最佳实践
  - `references/reporting_guidelines.md`：研究特定的报告标准和清单
  - `references/writing_principles.md`：有效科学沟通的核心原则

  **对于场馆特定写作风格**（语气、声音、摘要格式、审稿人期望），请参阅**场馆模板**技能，它提供Nature/Science、Cell Press、医学期刊、ML会议和CS会议的综合风格指南。

  在处理科学写作特定方面时，根据需要加载这些参考文献。
