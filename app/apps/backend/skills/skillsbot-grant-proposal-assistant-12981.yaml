  # 资助提案助理

  ## 目录
  - [目的](#目的)
  - [何时使用](#何时使用)
  - [核心问题](#核心问题)
  - [工作流程](#工作流程)
  - [部分框架](#部分框架)
  - [评审者心态](#评审者心态)
  - [护栏](#护栏)
  - [快速参考](#快速参考)

  ## 目的

  此技能指导创建和审查有竞争力的资助提案（NIH R01/R21/K、NSF、基金会），通过确保清晰的假设、有说服力的意义、真正的创新和可行的研究方法。它应用评审者视角的思维来结构化提案，在提交前解决常见的批评点。

  ## 何时使用

  在以下情况使用此技能：

  - **撰写新提案**: NIH R01、R21、R03、K系列；NSF资助；基金会申请
  - **特定目标开发**: 制作关键的1页目标文档
  - **部分起草**: 意义、创新、方法部分
  - **提案审查**: 提交前批判，模拟研究部分准备
  - **重新提交**: 解决评审者批判，加强薄弱区域
  - **预算论证**: 将资源与提议工作对齐

  触发短语: "资助提案", "特定目标", "R01", "R21", "NIH资助", "NSF提案", "意义部分", "创新", "方法", "研究部分", "评审者", "可资助"

  **不要用于:**
  - 手稿（使用 `scientific-manuscript-review`）
  - 奖学金个人陈述（使用 `career-document-architect`）
  - 推荐信（使用 `academic-letter-architect`）

  ## 核心问题

  每个资助提案必须令人信服地回答这四个问题：

  **1. 什么是中心假设？**
  - 可测试、具体、可证伪
  - 不只是“我们将研究X”，而是“我们假设X通过机制Z导致Y”

  **2. 为什么这个问题现在重要？**
  - 当前知识中存在什么差距？
  - 为什么这个差距对领域/患者/社会有意义？
  - 为什么这是正确的时间（新工具、初步数据、范式转变）？

  **3. 什么使方法创新？**
  - 什么是真正新的（概念、方法、应用）？
  - 这如何超越增量改进？
  - 方法创新和/或将学到的内容创新

  **4. 计划是否可行和逻辑？**
  - 这个团队能否在这个时间范围内用这些资源完成这项工作？
  - 目标是否逻辑构建而没有致命依赖？
  - 是否预期了陷阱并准备了替代方案？

  ## 工作流程

  复制此清单并跟踪进度：

  ```
  资助提案进度：
  - [ ] 步骤1: 识别资助机制和约束
  - [ ] 步骤2: 核心问题审计
  - [ ] 步骤3: 特定目标审查（1页）
  - [ ] 步骤4: 意义部分审查
  - [ ] 步骤5: 创新部分审查
  - [ ] 步骤6: 方法部分审查（每个目标）
  - [ ] 步骤7: 评审者对齐检查
  - [ ] 步骤8: 合规性验证
  ```

  **步骤1: 识别资助机制和约束**

  确定机制（R01、R21、K、NSF、基金会）。注意页限制、必需部分和评审标准。R01 = 12页；R21 = 6页；K = 12页 + 职业发展。见[资源/方法论.md](资源/方法论.md#资助机制)获取机制特定指导。

  **步骤2: 核心问题审计**

  阅读整个提案，仅寻找四个核心问题的答案。标记每个被解决（或缺失）的地方。标记不清楚的假设、弱的意义或缺失的创新。见[资源/方法论.md](资源/方法论.md#核心问题审计)获取审计清单。

  **步骤3: 特定目标审查**

  评估1页目标与黄金标准：开篇钩子 → 差距 → 假设 → 目标（可测试、独立、连贯） → 影响。这是最重要的页面。见[资源/模板.md](资源/模板.md#特定目标模板)获取结构。

  **步骤4: 意义部分审查**

  检查：问题是什么？为什么重要？如果成功，什么会改变？寻找明确的差距陈述和影响预测。见[资源/方法论.md](资源/方法论.md#意义检查清单)获取评估标准。

  **步骤5: 创新部分审查**

  检查：什么是真正新的？具体（不是“创新方法”，而是“X首次应用于Y”）。创新可以是概念、方法或预期结果。见[资源/方法论.md](资源/方法论.md#创新检查清单)获取评估标准。

  **步骤6: 方法部分审查**

  对于每个目标：理由（为什么这个目标？） → 策略（如何？） → 预期结果 → 陷阱 → 替代方案。检查足够的控制、统计功效、时间线现实性。见[资源/模板.md](资源/模板.md#方法每个目标)获取每个目标结构。

  **步骤7: 评审者对齐检查**

  作为非专家评审者阅读。他们能否理解意义而无需深层领域知识？影响陈述是否突出？写作是否可访问？见[资源/方法论.md](资源/方法论.md#评审者视角)获取评审者模拟。

  **步骤8: 合规性验证**

  检查页限制、必需部分、简历格式、参考文献格式。验证所有必需组件存在。使用[资源/评估者/rubric_grant_proposal.json](资源/评估者/rubric_grant_proposal.json)验证。**最低标准**: 平均分数 ≥ 3.5。

  ## 部分框架

  ### 特定目标页面（1页）

  **你资助中最重要的页面。**

  **结构:**
  ```
  开篇段落（4-6句）
  - 钩子: 为什么这个问题重要（意义）
  - 差距: 当前理解中缺少什么
  - 长期目标: 你的研究项目
  - 中心假设: 可测试、具体
  - 理由: 为什么这个假设合理（初步数据）

  目标1: [动词短语描述目标]
  - 简要描述（2-3句）
  - 预期结果和解释
  - 必须可测试和可实现

  目标2: [动词短语描述目标]
  - 简要描述（2-3句）
  - 预期结果和解释
  - 独立于目标1（如果目标1失败，可以继续）

  目标3（可选）: [动词短语描述目标]
  - 简要描述（2-3句）
  - 可能整合目标1-2的发现

  结束段落（2-3句）
  - 项目预期结果
  - 影响: 这如何推进领域
  - 这将启发的未来方向
  ```

  ### 意义部分

  **目标:** 说服评审者问题重要

  **关键元素:**
  1. **问题**: 存在什么临床/科学问题？
  2. **当前状态**: 已知什么，尝试过什么？
  3. **差距**: 什么关键问题仍未回答？
  4. **差距影响**: 不知道的成本是什么？
  5. **如果成功**: 什么会改变？具体。

  **红旗:**
  - ❌ 通用陈述（“癌症是坏的”）
  - ❌ 没有明确差距陈述
  - ❌ 影响陈述太模糊（“将推进领域”）
  - ✅ 具体差距、具体影响、尽可能量化

  ### 创新部分

  **目标:** 显示这不是增量

  **创新类型:**
  1. **概念**: 新框架、范式或理解
  2. **方法**: 新技术、方法或模型
  3. **应用**: 已知方法应用于新问题
  4. **预期结果**: 将生成新颖见解

  **格式:**
  - 使用项目符号以提高可扫描性
  - 每个以“这个项目创新因为...”开头
  - 具体，不模糊

  ### 方法部分（每个目标）

  **每个目标的结构:**

  ```
  目标X: [标题]

  理由（1段）
  为什么这个目标必要？它如何解决假设？

  初步数据（如适用）
  你已经显示什么支持可行性？

  策略（2-4段）
  - 实验设计
  - 方法和程序
  - 控制（阳性和阴性）
  - 统计分析计划

  预期结果
  你期望什么结果？如何解释它们？

  潜在陷阱和替代方案
  什么可能出错？你的备份计划是什么？

  时间线/里程碑
  何时完成？对其他目标的依赖？
  ```

  ## 评审者心态

  ### 研究部分如何工作

  - 评审者基于专业分配（但可能不是你确切的领域）
  - 主要评审者仔细阅读；次要浏览
  - 3个评审者评分；其他人可能不深入阅读
  - 评分标准：意义、调查者、创新、方法、环境
  - 总体影响 = “这项研究有多重要？”

  ### 评审者寻找什么

  **好的提案让评审者工作容易:**
  - 第1页清晰假设
  - 明确意义陈述
  - 明显创新点（项目符号）
  - 逻辑目标流
  - 承认陷阱并有替代方案

  **提案被批评为:**
  - 模糊假设（“我们将探索...”）
  - 缺少控制
  - 范围过于雄心勃勃
  - 目标依赖（如果目标1失败，整个项目失败）
  - 没有初步数据用于高风险方法
  - 不清楚统计计划

  ## 护栏

  **关键要求:**

  1. **可测试假设**: 必须可证伪，不只是目标
  2. **明确差距**: 陈述未知，不只是你将做什么
  3. **真正创新**: 具体，不是“创新方法”
  4. **独立目标**: 如果一个目标失败，项目生存
  5. **可行性证据**: 高风险元素的初步数据
  6. **功效计算**: 知道样本量和原因
  7. **陷阱承认**: 显示你预期了问题

  **常见陷阱:**
  - ❌ **钓鱼探险**: “我们将确定...”没有假设
  - ❌ **目标依赖**: 目标2没有目标1成功不可能
  - ❌ **范围爬行**: 对预算/时间太雄心勃勃
  - ❌ **缺少控制**: 实验没有适当比较
  - ❌ **模糊统计**: “数据将适当分析”
  - ❌ **没有替代方案**: 假设一切将工作

  ## 快速参考

  **关键资源:**
  - **[资源/方法论.md](资源/方法论.md)**: 资助机制、审计清单、评审者视角
  - **[资源/模板.md](资源/模板.md)**: 特定目标模板、方法每个目标结构
  - **[资源/评估者/rubric_grant_proposal.json](资源/评估者/rubric_grant_proposal.json)**: 质量评分

  **页限制:**
  | 机制 | 研究策略 | 特定目标 |
  |-----------|------------------|---------------|
  | R01 | 12页 | 1页 |
  | R21 | 6页 | 1页 |
  | R03 | 6页 | 1页 |
  | K系列 | 12页 (+职业) | 1页 |

  **NIH评分:**
  - 1-3: 卓越到优秀（资助）
  - 4-5: 非常好到好（可能资助）
  - 6-7: 满意到公平（不太可能）
  - 8-9: 边缘到差（不资助）

  **典型写作时间:**
  - 特定目标（抛光）: 3-5天
  - 完整R01初稿: 4-6周
  - R21初稿: 2-3周
  - 修订周期: 每轮1-2周

  **所需输入:**
  - 有初步数据的研究想法
  - 资助机制和截止日期
  - 可用机构资源

  **产生输出:**
  - 结构化资助部分
  - 优势/弱点评论
  - 评审者视角批判
