content: |
  # CCF Pipeline Orchestrator

  ## Overview
  Orchestrates the paper project pipeline. Breaks down tasks, arranges stages, sets quality gates, and hands off to the appropriate owner skill at each stage.

  ## Pipeline Stages
  1. Project Setup → Scaffolder
  2. Idea Development → Idea Optimizer
  3. Idea Review → Idea Reviewer
  4. Literature Monitoring → Literature Monitor
  5. Literature Search → Literature Searcher
  6. Experiment Design → Experiment Designer
  7. Writing → Paper Writer
  8. Paper Review → Paper Reviewer
  9. Integrity Audit → Integrity Auditor
  10. Submission Check → Submission Checker
  11. Rebuttal → Rebuttal Writer

  ## Artifacts
  - Stage plan with gates
  - Handoff recommendations
  - Status update suggestions
