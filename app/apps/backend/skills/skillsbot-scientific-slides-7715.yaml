  ## 幻灯片生成的提示撰写

  ### 完整幻灯片提示（PDF工作流程）

  对于完整幻灯片，包括：

  1. **幻灯片类型**: 标题幻灯片、内容幻灯片、示意图幻灯片等
  2. **标题**: 幻灯片标题文字
  3. **内容**: 关键点、项目符号或描述
  4. **视觉元素**: 包含的影像、图标或图形
  5. **设计风格**: 配色方案、情绪、美学

  **示例提示：**

  ```
  标题幻灯片：
  "医学研究演示的标题幻灯片。标题：'癌症免疫疗法的进展'。副标题：'2024年临床试验结果'。专业医学主题，背景中带微妙DNA双螺旋。海军蓝和白色配色方案。"

  内容幻灯片：
  "演示文稿幻灯片标题'关键发现'。三个项目符号：1) 响应率提高40%, 2) 副作用减少, 3) 生存期延长。包含相关医学图标。干净、专业设计，绿色和白色色彩。"

  示意图幻灯片：
  "显示研究方法的演示文稿幻灯片。标题：'研究设计'。流程图显示：患者筛选 → 随机化 → 治疗组（A, B, 对照组） → 随访 → 分析。CONSORT风格流程图。专业学术风格。"
  ```

  ### 仅视觉效果提示（PPT工作流程）

  对于嵌入PowerPoint的图像，仅关注视觉元素：

  ```
  "显示机器学习管线的流程图：数据收集 → 预处理 → 模型训练 → 验证 → 部署。干净技术风格，蓝色和灰色色彩。"

  "云计算概念插图带服务器、数据流和连接设备。现代扁平设计，适用于商业演示。"

  "细胞分裂过程的科学示意图显示有丝分裂阶段。教育风格带标签，色盲友好色彩。"
  ```

