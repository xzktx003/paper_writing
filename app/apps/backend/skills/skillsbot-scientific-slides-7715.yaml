  ## 快速入门指南

  ### 对于15分钟会议演讲（PDF工作流程 - 推荐）

  1. **研究和计划**（45分钟）：
     - **使用研究查找**查找8-12篇相关论文以进行引用
     - 构建参考文献列表（背景、比较研究）
     - 大纲内容（介绍 → 方法 → 2-3个关键结果 → 结论）
     - **为每张幻灯片创建详细计划**（标题、关键点、视觉元素）
     - 目标15-18张幻灯片

  2. **使用Nano Banana Pro生成幻灯片**（1-2小时）：

     **重要：使用一致格式化、附加前一张幻灯片并包含引用！**

     ```bash
     # 标题幻灯片（建立风格 - 默认作者：K-Dense）
     python scripts/generate_slide_image.py "标题幻灯片：'您的研究标题'。会议名称，K-Dense。格式化目标：[您的配色方案]，简约专业设计，无装饰元素，干净企业风格。" -o slides/01_title.png

     # 带引用的介绍幻灯片（附加前一张以确保一致性）
     python scripts/generate_slide_image.py "幻灯片标题'为什么这重要'。三个关键点带简单图标。引用：在底部包含：(Smith et al., 2023; Jones et al., 2024)。格式化目标：精确匹配附加幻灯片风格。" -o slides/02_intro.png --attach slides/01_title.png

     # 继续每张幻灯片（始终附加前一张，相关时包含引用）
     python scripts/generate_slide_image.py "幻灯片标题'方法'。关键方法学点。引用：(基于Chen et al., 2022)。格式化目标：精确匹配附加幻灯片风格。" -o slides/03_methods.png --attach slides/02_intro.png

     # 合并为PDF
     python scripts/slides_to_pdf.py slides/*.png -o presentation.pdf
     ```

  3. **审查和迭代**（30分钟）：
     - 打开PDF并审查每张幻灯片
     - 重新生成任何需要改进的幻灯片
     - 重新合并为PDF

  4. **练习**（2-3小时）：
     - 使用计时器练习3-5次
     - 目标13-14分钟（留缓冲）
     - 录制自己，观看回放
     - **准备问题**（使用研究查找预期）

  5. **最终确定**（30分钟）：
     - 如需要生成备份/附录幻灯片
     - 保存多个副本
     - 在演示计算机上测试

  总时间：约5-6小时以生成质量AI演示文稿

  ### 替代：PowerPoint工作流程

  如果您需要可编辑幻灯片（例如，用于公司模板）：

  1. **计划幻灯片**如上
  2. **使用`--visual-only`标志生成视觉效果**：
     ```bash
     python scripts/generate_slide_image.py "示意图描述" -o figures/fig1.png --visual-only
     ```
  3. **使用生成的图像构建PPTX**使用PPTX技能
  4. **使用PPTX工作流程单独添加文字**

  完整PowerPoint工作流程请参阅`document-skills/pptx/SKILL.md`。

  ## 总结：关键原则

  1. **视觉优先设计**: 每张幻灯片需要强视觉元素（图表、图像、示意图） - 避免仅文字幻灯片
  2. **研究支持**: 使用研究查找查找8-15篇论文，介绍中引用3-5篇，讨论中引用3-5篇
  3. **现代美学**: 选择匹配主题的当代调色板，非默认主题
  4. **最小化文字**: 3-4个项目符号，每个4-6词（24-28pt字体），让视觉讲故事
  5. **结构**: 遵循故事弧线，将40-50%时间花在结果上
  6. **高对比度**: 首选7:1以获得专业外观
  7. **多样布局**: 混合全图表、两列、视觉叠加（非全项目符号）
  8. **时间**: 练习3-5次，约每分钟1张幻灯片，从不跳过结论
  9. **验证**: 视觉审查工作流程以捕获溢出和重叠
  10. **空白空间**: 40-50%幻灯片为空以视觉呼吸空间

  **记住：**

  - **无聊 = 被遗忘**: 枯燥、文字密集的幻灯片未能传达您的科学
  - **视觉 + 研究 = 影响**: 结合引人入胜的视觉和研究支持背景
  - **您是演示文稿，幻灯片是视觉支持**: 它们应增强，而非替代您的演讲

