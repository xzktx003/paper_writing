  ## 核心能力

  ### 1. 演示文稿结构和组织

  为不同上下文构建具有清晰叙事流和适当结构的演示文稿。详细指导请参阅`references/presentation_structure.md`。

  **通用故事弧线：**

  1. **钩子**: 抓住注意力（30-60秒）
  2. **背景**: 建立重要性（占演讲的5-10%）
  3. **问题/差距**: 识别未知内容（占演讲的5-10%）
  4. **方法**: 解释您的解决方案（占演讲的15-25%）
  5. **结果**: 呈现关键发现（占演讲的40-50%）
  6. **意义**: 讨论含义（占演讲的15-20%）
  7. **结束**: 难忘结论（1-2分钟）

  **演讲特定结构：**

  - **会议演讲（15分钟）**: 专注于1-2个关键发现，最小化方法
  - **学术研讨会（45分钟）**: 全面覆盖，详细方法，多个研究
  - **论文答辩（60分钟）**: 完整学位论文概述，涵盖所有研究
  - **资助提案（15分钟）**: 强调意义、可行性和影响
  - **期刊俱乐部（30分钟）**: 对已发表工作的批判性分析

  ### 2. 幻灯片设计原则

  创建专业、可读且可访问的幻灯片以增强理解。完整设计指南请参阅`references/slide_design_principles.md`。

  **反模式：避免枯燥、文字密集的演示文稿**

  ❌ **使演示文稿枯燥和易忘的原因：**

  - 文字墙（每张幻灯片超过6个项目符号）
  - 小字体（正文文字<24pt）
  - 仅黑字白底（无视觉兴趣）
  - 无图像或图形（仅项目符号）
  - 通用模板无自定义
  - 密集、段落式项目符号
  - 缺失研究背景（无引用）
  - 所有幻灯片看起来相同（重复）

  ✅ **使演示文稿引人入胜和难忘的原因：**

  - 高质量视觉占主导（图表、照片、示意图、图标）
  - 大而清晰的文字作为点缀（非主要内容）
  - 现代、有目的的配色方案（非默认主题）
  - 充足空白空间（幻灯片呼吸）
  - 研究支持背景（来自研究查找的适当引用）
  - 幻灯片布局多样（非全项目符号列表）
  - 故事驱动流带视觉锚点
  - 专业、抛光外观

  **核心设计原则：**

  **视觉优先方法**（关键）：

  - 从视觉开始（图表、图像、示意图），添加文字作为支持
  - 每张幻灯片应有强视觉元素（图表、图表、照片、示意图）
  - 文字解释或补充视觉，而非替代它们
  - 思考："如何展示此内容，而非仅讲述？"
  - 目标：60-70%视觉内容，30-40%文字

  **简约与影响：**

  - 每张幻灯片一个主要想法
  - 最小化文字（首选3-4个项目符号，每个4-6词）
  - 充足空白空间（占幻灯片的40-50%）
  - 清晰视觉焦点
  - 大胆、自信的设计选择

  **排版以增强参与度：**

  - 无衬线字体（Arial, Calibri, Helvetica）
  - 大字体：正文文字24-28pt（非最小18pt）
  - 幻灯片标题36-44pt（加粗）
  - 高对比度（最小4.5:1，首选7:1）
  - 使用大小进行层次结构，而非仅重量

  **色彩以增强影响：**

  - 现代调色板（非默认蓝/灰）
  - 考虑您的主题：生物技术？鲜艳色彩。物理？时尚深色。健康？温暖色调。
  - 有限调色板（总共3-5种色彩）
  - 高对比度组合
  - 色盲安全（避免红绿组合）
  - 有目的地使用色彩（非装饰）

  **布局以增强视觉兴趣：**

  - 变化布局（非全项目符号列表）
  - 使用两列布局（文字+图表）
  - 全幻灯片图表用于关键结果
  - 不对称构图（比居中更有趣）
  - 焦点三分法则
  - 一致但非重复

  ### 3. 幻灯片的数据可视化

  为演示上下文调整科学图表。详细指导请参阅`references/data_visualization_slides.md`。

  **与期刊图表的关键差异：**

  - 简化，非复制
  - 更大字体（最小18-24pt）
  - 较少面板（跨幻灯片拆分）
  - 直接标签（非图例）
  - 通过色彩和大小强调
  - 复杂数据的渐进式揭示

  **可视化最佳实践：**

  - **条形图**: 比较离散类别
  - **线形图**: 趋势和轨迹
  - **散点图**: 关系和相关性
  - **热图**: 矩阵数据和模式
  - **网络图**: 关系和连接

  **避免的常见错误：**

  - 小字体（<18pt）
  - 一张幻灯片上过多面板
  - 复杂图例
  - 对比度不足
  - 杂乱布局

  ### 4. 演讲特定指导

  不同演示上下文需要不同方法。每种类型的全面指导请参阅`references/talk_types_guide.md`。

  **会议演讲**（10-20分钟）：

  - 结构：简要介绍 → 最小化方法 → 关键结果 → 快速结论
  - 重点：仅1-2个主要发现
  - 风格：引人入胜、快节奏、难忘
  - 目标：产生兴趣、建立网络、获得邀请

  **学术研讨会**（45-60分钟）：

  - 结构：全面覆盖带详细方法
  - 重点：多个发现、分析深度
  - 风格：学术性、互动性、讨论导向
  - 目标：展示专业知识、获得反馈、协作

  **论文答辩**（45-60分钟）：

  - 结构：完整学位论文概述，所有研究
  - 重点：展示掌握和独立思考
  - 风格：正式、全面、准备应对质询
  - 目标：通过答辩、辩护研究决策

  **资助提案**（10-20分钟）：

  - 结构：问题 → 意义 → 方法 → 可行性 → 影响
  - 重点：创新、初步数据、团队资格
  - 风格：说服性、专注于成果和影响
  - 目标：确保资金、展示可行性

  **期刊俱乐部**（20-45分钟）：

  - 结构：背景 → 方法 → 结果 → 批判性分析
  - 重点：理解和批评已发表工作
  - 风格：教育性、批判性、促进讨论
  - 目标：学习、批评、讨论意义

  ### 5. 实施选项

  #### Nano Banana Pro PDF（默认 - 推荐）

  **最适合**: 视觉震撼的幻灯片、快速创建、非技术观众

  **这是默认和推荐方法。** 使用AI将每张幻灯片生成为完整图像。

  **工作流程：**

  1. 计划每张幻灯片（标题、内容、视觉元素）
  2. 使用`generate_slide_image.py`生成每张幻灯片
  3. 使用`slides_to_pdf.py`合并为PDF

  ```bash
  # 生成幻灯片
  python scripts/generate_slide_image.py "标题：介绍..." -o slides/01.png
  python scripts/generate_slide_image.py "标题：方法..." -o slides/02.png

  # 合并为PDF
  python scripts/slides_to_pdf.py slides/*.png -o presentation.pdf
  ```

  **优势：**

  - 最视觉震撼的结果
  - 快速创建（描述和生成）
  - 无需设计技能
  - 一致、专业外观
  - 适合普通观众

  **最适合：**

  - 会议演讲
  - 商业演示
  - 一般科学演讲
  - 提案演示

  #### 通过PPTX技能的PowerPoint

  **最适合**: 可编辑幻灯片、自定义设计、基于模板的工作流程

  **参考**: 完整文档请参阅`document-skills/pptx/SKILL.md`

  使用Nano Banana Pro和`--visual-only`生成图像，然后使用文字构建PPTX。

  **关键资源：**

  - `assets/powerpoint_design_guide.md`: 完整PowerPoint设计指南
  - PPTX技能的`html2pptx.md`: 编程式创建工作流程
  - PPTX技能的脚本：`rearrange.py`, `inventory.py`, `replace.py`, `thumbnail.py`

  **工作流程：**

  1. 使用`generate_slide_image.py --visual-only`生成视觉效果
  2. 设计HTML幻灯片（用于编程式）或使用模板
  3. 使用html2pptx或模板编辑创建演示文稿
  4. 添加生成的图像和文字内容
  5. 为视觉验证生成缩略图
  6. 基于视觉检查进行迭代

  **优势：**

  - 可编辑幻灯片（可稍后修改文字）
  - 复杂动画和过渡
  - 交互元素
  - 公司模板兼容性

  #### LaTeX Beamer

  **最适合**: 数学内容、一致格式化、版本控制

  **参考**: 完整文档请参阅`references/beamer_guide.md`

  **可用模板：**

  - `assets/beamer_template_conference.tex`: 15分钟会议演讲
  - `assets/beamer_template_seminar.tex`: 45分钟学术研讨会
  - `assets/beamer_template_defense.tex`: 学位论文答辩

  **工作流程：**

  1. 选择适当模板
  2. 自定义主题和色彩
  3. 添加内容（LaTeX原生：方程、代码、算法）
  4. 编译为PDF
  5. 转换为图像以进行视觉验证

  **优势：**

  - 美丽数学和方程
  - 一致、专业外观
  - 版本控制友好（纯文本）
  - 适合算法和代码
  - 可重现和编程式

  ### 6. 视觉审查和迭代

  通过视觉检查实施迭代改进。完整工作流程请参阅`references/visual_review_workflow.md`。

  **视觉验证工作流程：**

  **步骤1：生成PDF**（如果尚未PDF）

  - PowerPoint：导出为PDF
  - Beamer：编译LaTeX源

  **步骤2：转换为图像**

  ```bash
  # 使用pdf_to_images脚本
  python scripts/pdf_to_images.py presentation.pdf review/slide --dpi 150

  # 或使用pptx技能的缩略图工具
  python ../document-skills/pptx/scripts/thumbnail.py presentation.pptx review/thumb
  ```

  **步骤3：系统检查**

  检查每张幻灯片：

  - **文字溢出**: 文字在边缘被切断
  - **元素重叠**: 文字与图像或其他文字重叠
  - **字体大小**: 文字太小（<18pt）
  - **对比度**: 文字和背景之间对比度不足
  - **布局问题**: 错位、间距不佳
  - **视觉质量**: 像素化图像、渲染差

  **步骤4：记录问题**

  创建问题日志：

  ```
  幻灯片号 | 问题类型 | 描述 | 优先级
  --------|-----------|-------------|----------
  3       | 文字溢出 | 项目符号4超出框 | 高
  7       | 重叠 | 图表与标题重叠 | 高
  12      | 字体大小 | 轴标签太小 | 中
  ```

  **步骤5：应用修复**

  对源文件进行更正：

  - PowerPoint：编辑文本框，调整元素大小
  - Beamer：调整LaTeX代码，重新编译

  **步骤6：重新验证**

  重复步骤1-5，直到无关键问题。

  **停止标准：**

  - 无文字溢出
  - 无不适当重叠
  - 所有文字可读（≥18pt等效）
  - 足够对比度（≥4.5:1）
  - 专业外观

  ### 7. 时间和节奏

  确保演示文稿适应分配时间。全面时间指导请参阅`assets/timing_guidelines.md`。

  **一分钟一幻灯片规则：**

  - 通用指南：约每分钟1张幻灯片
  - 调整复杂幻灯片（2-3分钟）
  - 调整简单幻灯片（15-30秒）

  **时间分配：**

  - 介绍：15-20%
  - 方法：15-20%
  - 结果：40-50%（最多时间）
  - 讨论：15-20%
  - 结论：5%

  **练习要求：**

  - 5分钟演讲：练习5-7次
  - 15分钟演讲：练习3-5次
  - 45分钟演讲：练习3-4次
  - 答辩：练习4-6次

  **时间检查点：**

  对于15分钟演讲：

  - 3-4分钟：完成介绍
  - 7-8分钟：结果过半
  - 12-13分钟：开始结论

  **紧急策略：**

  - 落后：跳过备份幻灯片（提前准备）
  - 超前：扩展示例，稍慢
  - 永不跳过结论

  ### 8. 验证和质量保证

  **自动化验证：**

  ```bash
  # 验证幻灯片计数、时间、文件大小
  python scripts/validate_presentation.py presentation.pdf --duration 15

  # 生成报告：
  # - 幻灯片计数与推荐范围
  # - 文件大小警告
  # - 幻灯片尺寸
  # - 字体大小问题（PowerPoint）
  # - 编译成功（Beamer）
  ```

  **手动验证清单：**

  - [ ] 幻灯片计数适合时长
  - [ ] 标题幻灯片完整（姓名、机构、日期）
  - [ ] 清晰叙事流
  - [ ] 每张幻灯片一个主要想法
  - [ ] 字体大小≥18pt（首选24pt+）
  - [ ] 高对比度色彩
  - [ ] 图表大且可读
  - [ ] 无文字溢出或元素重叠
  - [ ] 整个演示文稿设计一致
  - [ ] 存在幻灯片编号
  - [ ] 最终幻灯片联系信息
  - [ ] 准备备份幻灯片
  - [ ] 在投影仪上测试（如可能）

  ## 演示文稿开发工作流程

  ### 阶段1：规划（创建幻灯片之前）

  **定义上下文：**

  1. 什么类型演讲？（会议、研讨会、答辩等）
  2. 多长时间？（分钟数）
  3. 观众是谁？（专家、普通、混合）
  4. 场地是什么？（房间大小、A/V设置、虚拟/现场）
  5. 之后发生什么？（Q&A、讨论、网络）

  **研究和文献回顾**（使用研究查找技能）：

  1. **搜索背景文献**: 查找5-10篇建立背景的关键论文
  2. **识别知识差距**: 使用研究查找查找未知内容
  3. **定位比较研究**: 查找具有相似方法或结果的论文
  4. **收集支持引用**: 收集支持您解释的论文
  5. **构建参考文献列表**: 为幻灯片创建.bib文件或引用列表
  6. **记录要引用的关键发现**: 记录要引用的特定结果

  **开发内容大纲：**

  1. 识别1-3个核心消息
  2. 选择要呈现的关键发现
  3. 选择基本图表（通常15分钟演讲3-6个）
  4. 计划带适当引用的叙事弧线
  5. 按部分分配时间

  **15分钟演讲大纲示例：**

  ```
  1. 标题（30秒）
  2. 钩子：引人入胜的问题（60秒）[通过研究查找引用1-2篇论文]
  3. 背景（90秒）[引用3-4篇建立背景的关键论文]
  4. 研究问题（45秒）[引用显示差距的论文]
  5. 方法概述（2分钟）
  6-8. 主要结果1（3分钟，3张幻灯片）
  9-10. 主要结果2（2分钟，2张幻灯片）
  11-12. 结果3或验证（2分钟，2张幻灯片）
  13-14. 讨论和意义（2分钟）[与2-3篇先前研究比较]
  15. 结论（45秒）
  16. 致谢（15秒）

  注意：创建幻灯片之前，使用研究查找查找背景（幻灯片2-4）和讨论（幻灯片13-14）的论文。
  ```

  ### 阶段2：设计和创建

  **选择实施方法：**

  **选项A：PowerPoint（通过PPTX技能）**

  1. 阅读`assets/powerpoint_design_guide.md`
  2. 阅读`document-skills/pptx/SKILL.md`
  3. 选择方法（编程式或基于模板）
  4. 使用一致设计创建主幻灯片
  5. 按照大纲构建演示文稿

  **选项B：LaTeX Beamer**

  1. 阅读`references/beamer_guide.md`
  2. 从`assets/`选择适当模板
  3. 自定义主题和色彩
  4. 在LaTeX中编写内容
  5. 编译为PDF

  **设计考虑**（使其视觉吸引人）：

  - **选择现代调色板**: 匹配您的主题（生物技术=鲜艳、物理=时尚、健康=温暖）
    - 使用pptx技能的调色板示例（蓝绿色&珊瑚色、大胆红色、深紫色&翡翠色等）
    - 非仅默认蓝/灰主题
    - 3-5种高对比度色彩
  - **选择干净字体**: 无衬线、大尺寸（正文24pt+）
  - **计划视觉元素**: 每张幻灯片什么图像、示意图、图标？
  - **创建多样布局**: 混合全图表、两列、文字叠加（非全项目符号）
  - **设计部分分隔符**: 带醒目图形的视觉中断
  - **计划动画/构建**: 控制复杂幻灯片的信息流
  - **添加视觉兴趣**: 背景图像、色块、形状、图标

  ### 阶段3：内容开发

  **填充幻灯片**（视觉优先策略）：

  1. **从视觉开始**: 计划每个关键点的图表、图像、示意图
  2. **广泛使用研究查找**: 查找8-15篇论文以进行适当引用
  3. **首先创建视觉骨架**: 添加所有图表、图表、图像、示意图
  4. **添加最小化文字作为支持**: 项目符号补充视觉，而非替代
  5. **设计部分分隔符**: 带图像或图形的视觉中断（非仅文字）
  6. **抛光标题/结束**: 使其视觉醒目，包含联系信息
  7. **添加过渡/构建**: 控制信息流

  **视觉内容要求**（使幻灯片引人入胜）：

  - **图像**: 使用高质量照片、插图、概念图形
  - **图标**: 概念的可视表示（非装饰）
  - **示意图**: 流程图、示意图、过程图
  - **图表**: 带大标签（18-24pt）的简化研究图表
  - **图表**: 带清晰消息的干净数据可视化
  - **图形**: 视觉隐喻、概念插图
  - **色块**: 使用彩色形状视觉组织内容
  - 目标：每张幻灯片至少1-2个强视觉元素

  **科学内容**（研究支持）：

  - **引用**: 广泛使用研究查找查找相关论文
    - 介绍：引用3-5篇建立背景和差距的论文
    - 背景：视觉显示关键先前工作（非仅引用）
    - 讨论：引用3-5篇论文与您的结果比较
    - 使用作者-年格式（Smith et al., 2023）以提高可读性
    - 引用建立可信度和科学严谨性
  - **图表**: 从论文简化，大标签（最小18-24pt）
  - **方程**: 大、清晰、解释每个术语（谨慎使用）
  - **表格**: 最小化，突出关键比较（非数据堆砌）
  - **代码/算法**: 使用语法高亮，保持简短

  **文字指南**（少即是多）：

  - 项目符号，从不段落
  - 每张幻灯片3-4个项目符号（仅必要时最多6个）
  - 每个项目符号4-6词（短于6×6规则）
  - 关键术语加粗
  - 文字是支持角色，视觉是明星
  - 使用构建控制节奏

  ### 阶段4：视觉验证

  **生成图像：**

  ```bash
  # 将PDF转换为图像
  python scripts/pdf_to_images.py presentation.pdf review/slides

  # 或创建缩略图网格
  python ../document-skills/pptx/scripts/thumbnail.py presentation.pptx review/grid
  ```

  **系统审查：**

  1. 查看每张幻灯片图像
  2. 针对问题清单检查
  3. 记录带幻灯片号的问题
  4. 从距离测试可读性（以50%大小查看）

  **要修复的常见问题：**

  - 文字超出边界
  - 图表与文字重叠
  - 字体大小太小
  - 对比度差
  - 错位

  **迭代：**

  1. 修复源文件中识别的问题
  2. 重新生成PDF/演示文稿
  3. 再次转换为图像
  4. 重新检查
  5. 重复直到干净

  ### 阶段5：练习和优化

  **练习计划：**

  - 运行1：草稿（将超时）
  - 运行2：流畅过渡
  - 运行3：精确时间
  - 运行4：最终抛光
  - 运行5+：维护（前一天、当天早上）

  **要练习的内容：**

  - 带计时器的完整演讲
  - 困难解释
  - 部分之间的过渡
  - 开场和结束（直到完美）
  - 预期问题

  **基于练习的优化：**

  - 如果超时，减少幻灯片
  - 如果不清楚，扩展解释
  - 为清晰度调整措辞
  - 标记时间检查点
  - 准备备份幻灯片

  ### 阶段6：最终准备

  **技术检查：**

  - [ ] 保存多个副本（笔记本电脑、云、USB）
  - [ ] 在演示计算机上工作
  - [ ] 适配器/电缆可用
  - [ ] 备份PDF版本
  - [ ] 与投影仪测试（如可能）

  **内容最终：**

  - [ ] 无拼写错误或错误
  - [ ] 所有图表高质量
  - [ ] 幻灯片编号正确
  - [ ] 最终幻灯片联系信息
  - [ ] 备份幻灯片准备就绪

  **演讲准备：**

  - [ ] 准备笔记（如使用）
  - [ ] 计时器/手机准备
  - [ ] 水可用
  - [ ] 名片/讲义
  - [ ] 熟悉材料（3+次练习）

  ## 与其他技能的集成

  **研究查找**（科学演示文稿的关键）：

  - **背景开发**: 搜索文献以构建介绍背景
  - **引用收集**: 查找要在演讲中引用的关键论文
  - **差距识别**: 识别未知内容以激励研究
  - **先前工作比较**: 查找与您的结果比较的论文
  - **支持证据**: 定位支持您解释的文献
  - **问题准备**: 查找可能告知Q&A回答的论文
  - **开发任何科学演示文稿时始终使用研究查找**以确保适当背景和引用

  **科学写作：**

  - 将论文内容转换为演示格式
  - 提取关键发现并简化
  - 使用相同图表（但为幻灯片重新设计）
  - 保持一致术语

  **PPTX技能：**

  - 用于PowerPoint创建和编辑
  - 利用脚本进行模板工作流程
  - 使用缩略图生成进行验证
  - 参考html2pptx进行编程式创建

  **数据可视化：**

  - 创建适合演示的图表
  - 简化复杂可视化
  - 确保从距离可读性
  - 使用渐进式揭示

  ## 要避免的常见陷阱

  ### 内容错误

  **枯燥、无聊的演示文稿**（关键避免）：

  - 问题：文字密集幻灯片无视觉兴趣，缺失研究背景
  - 迹象：全项目符号、无图像、默认模板、无引用
  - 解决方案：
    - 使用研究查找查找8-15篇论文以获得可信背景
    - 为每张幻灯片添加高质量视觉（图表、照片、示意图、图标）
    - 选择反映您主题的现代调色板
    - 变化幻灯片布局（非全项目符号列表）
    - 用视觉讲故事，谨慎使用文字

  **太多内容：**

  - 问题：尝试包含论文中的所有内容
  - 解决方案：短演讲专注于1-2个关键发现，视觉展示

  **太多文字：**

  - 问题：幻灯片上完整段落、密集项目符号、逐字阅读
  - 解决方案：3-4个项目符号，每个4-6词，让视觉传递消息

  **缺失研究背景：**

  - 问题：无引用、无支持声明、不清楚定位
  - 解决方案：使用研究查找查找论文，介绍中引用3-5篇，讨论中引用3-5篇

  **差叙事：**

  - 问题：主题间跳跃、无清晰故事、无流
  - 解决方案：遵循故事弧线，使用视觉过渡，保持线索

  **匆忙通过结果：**

  - 问题：简要方法、简要结果、长讨论
  - 解决方案：将40-50%时间花在结果上，视觉展示数据

  ### 设计错误

  **通用、默认外观：**

  - 问题：使用默认PowerPoint/Beamer主题无自定义，看起来过时
  - 解决方案：选择现代调色板、自定义字体/布局、添加视觉个性

  **文字密集、视觉贫乏：**

  - 问题：全项目符号幻灯片、无图像或图形、看起来无聊
  - 解决方案：为每张幻灯片添加图表、照片、示意图、图标，使其视觉有趣

  **小字体：**

  - 问题：正文文字<18pt、从后面不可读、看起来不专业
  - 解决方案：正文24-28pt（非仅18pt最小），标题36-44pt

  **低对比度：**

  - 问题：浅色文字浅色背景、可见性差、难读
  - 解决方案：高对比度（首选7:1，非仅4.5:1最小），使用对比度检查器测试

  **杂乱幻灯片：**

  - 问题：太多元素、无空白空间、压倒性
  - 解决方案：每张幻灯片一个想法、40-50%空白空间、充足间距

  **不一致格式化：**

  - 问题：幻灯片间不同字体、色彩、布局、看起来业余
  - 解决方案：使用主幻灯片、维护设计系统、专业一致性

  **缺失视觉层次：**

  - 问题：所有内容相同大小和色彩、无强调、不清楚焦点
  - 解决方案：大小差异（标题大、正文中）、色彩强调、清晰焦点

  ### 时间错误

  **不练习：**

  - 问题：首次进行是在演示期间
  - 解决方案：使用计时器练习至少3次

  **无时间检查点：**

  - 问题：直到太晚才意识到落后
  - 解决方案：设置3-4个检查点，全程监控

  **超时：**

  - 问题：极不专业，削减Q&A
  - 解决方案：练习到精确时间，准备Plan B（跳过幻灯片）

  **跳过结论：**

  - 问题：时间不足，匆忙结束或跳过
  - 解决方案：从不跳过结论，削减早期内容

  ## 工具和脚本

  ### Nano Banana Pro脚本

  **generate_slide_image.py** - 使用AI生成幻灯片或视觉效果：

  ```bash
  # 完整幻灯片（用于PDF工作流程）
  python scripts/generate_slide_image.py "标题：介绍\n内容：关键点" -o slide.png

  # 仅视觉效果（用于PPT工作流程）
  python scripts/generate_slide_image.py "示意图描述" -o figure.png --visual-only

  # 选项：
  # -o, --output       输出文件路径（必需）
  # --visual-only      仅生成视觉，非完整幻灯片
  # --iterations N     最大优化迭代次数（默认：2）
  # -v, --verbose      详细输出
  ```

  **slides_to_pdf.py** - 将幻灯片图像合并为PDF：

  ```bash
  # 从通配符模式
  python scripts/slides_to_pdf.py slides/*.png -o presentation.pdf

  # 从目录（按文件名排序）
  python scripts/slides_to_pdf.py slides/ -o presentation.pdf

  # 选项：
  # -o, --output    输出PDF路径（必需）
  # --dpi N         PDF分辨率（默认：150）
  # -v, --verbose   详细输出
  ```

  ### 验证脚本

  **validate_presentation.py**：

  ```bash
  python scripts/validate_presentation.py presentation.pdf --duration 15

  # 检查：
  # - 幻灯片计数与推荐范围
  # - 文件大小警告
  # - 幻灯片尺寸
  # - 字体大小（PowerPoint）
  # - 编译（Beamer）
  ```

  **pdf_to_images.py**：

  ```bash
  python scripts/pdf_to_images.py presentation.pdf output/slide --dpi 150

  # 将PDF转换为图像以进行视觉检查
  # 支持：JPG, PNG
  # 可调整DPI
  # 页面范围选择
  ```

