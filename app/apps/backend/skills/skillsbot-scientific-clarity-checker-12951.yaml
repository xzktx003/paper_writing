  # 科学清晰度检查器

  ## 目录
  - [目的](#目的)
  - [何时使用](#何时使用)
  - [核心原则](#核心原则)
  - [工作流程](#工作流程)
  - [分析框架](#分析框架)
  - [常见问题](#常见问题)
  - [防护措施](#防护措施)
  - [快速参考](#快速参考)

  ## 目的

  此技能提供对任何文档类型的科学清晰度和逻辑严谨性的系统性审查。它侧重于假设与数据对齐、论证有效性、量化精确性和适当的修饰语。将其作为跨文档检查，补充特定文档技能。

  ## 何时使用

  在以下情况下使用此技能：

  - **需要逻辑检查**：独立于格式审查科学论证
  - **声明与证据**：验证结论是否基于所呈现的数据
  - **术语审计**：检查科学语言的一致性和精确性
  - **提交前检查**：发送任何文档前的最终清晰度审查
  - **协作审查**：向同事提供科学批评
  - **自我编辑**：检查自己工作中的盲点

  触发短语："检查科学清晰度"、"审查逻辑"、"声明是否匹配数据"、"科学严谨性检查"、"假设与数据对齐"、"这合理吗"

  **适用于所有文档类型：**
  - 手稿
  - 基金申请
  - 信件
  - 演示文稿
  - 摘要
  - 任何科学写作

  ## 核心原则

  **1. 声明必须匹配证据**：每个结论都需要明确支持

  **2. 精确性优于模糊性**：尽可能量化

  **3. 修饰语匹配确定性**：强声明需要强证据

  **4. 逻辑必须流畅**：论证应可逐步追溯

  **5. 术语必须一致**：同一概念使用同一词汇

  **6. 机制清晰度**：解释“如何”，而不仅仅是“什么”

  ## 工作流程

  复制此清单并跟踪进度：

  ```
  清晰度检查进度：
  - [ ] 步骤1：识别核心声明和假设
  - [ ] 步骤2：结构逻辑审查（论证流程）
  - [ ] 步骤3：声明-证据审计
  - [ ] 步骤4：量化精确性检查
  - [ ] 步骤5：术语一致性审计
  - [ ] 步骤6：修饰语校准
  - [ ] 步骤7：机制清晰度检查
  ```

  **步骤1：识别核心声明**

  列出文档中所有主要声明、结论和假设。这些是作者希望读者阅读后相信的内容。每个声明都需要评估。参见[资源/方法论.md](资源/方法论.md#声明识别)了解声明提取。

  **步骤2：结构逻辑审查**

  映射论证结构：哪些前提导致哪些结论？所有逻辑步骤是否明确？推理链中是否存在空白？参见[资源/方法论.md](资源/方法论.md#论证映射)了解逻辑映射。

  **步骤3：声明-证据审计**

  对每个声明：支持证据是什么？证据是否在本文档中呈现或仅引用？证据是否真正支持声明？标记过度声明。参见[资源/模板.md](资源/模板.md#声明-证据矩阵)了解审计格式。

  **步骤4：量化精确性检查**

  查找模糊量化词（"一些"、"许多"、"显著增加"）。检查缺失的统计、n值、置信区间。标记应量化的定性描述。参见[资源/模板.md](资源/模板.md#精确性清单)了解清单。

  **步骤5：术语一致性审计**

  检查术语在整个文档中是否一致使用。验证缩写词在使用前是否定义。确保技术术语适合受众。参见[资源/方法论.md](资源/方法论.md#术语审计)了解审计过程。

  **步骤6：修饰语校准**

  使修饰语强度匹配证据强度。"证明"需要强证据；"表明"允许较弱证据。标记过度声明（强词汇、弱证据）和不足声明（弱词汇、强证据）。参见[资源/方法论.md](资源/方法论.md#修饰语指南)了解校准。

  **步骤7：机制清晰度检查**

  在需要解释"如何"的地方，是否提供？机制是推测性的还是基于证据的？机制细节水平是否适当？使用[资源/评估器/清晰度评分表.json](资源/评估器/清晰度评分表.json)验证。**最低标准**：平均分 ≥ 3.5。

  ## 分析框架

  ### 声明-证据链

  对每个主要声明，追溯链：

  ```
  声明：[作者断言的内容]
      ↓
  证据类型：[数据/引用/逻辑/权威]
      ↓
  证据：[支持此声明的证据]
      ↓
  评估：[强/中等/弱/缺失]
      ↓
  问题：[如果有 - 过度声明、逻辑空白等]
  ```

  ### 逻辑流程评估

  映射论证结构：

  ```
  前提1：[起始假设或事实]
      +
  前提2：[额外假设或事实]
      ↓
  推理：[采取的步骤]
      ↓
  结论：[从推理中得出的内容]
      ↓
  有效性检查：[结论是否从前提中得出？]
  ```

  常见逻辑问题：
  - **空白**：结论所需的前提缺失
  - **跳跃**：结论不从前提中得出
  - **假设**：未陈述的可能不成立的前提
  - **循环**：结论在前提中假设

  ### 量化精确性矩阵

  | 类型 | 模糊（需修复） | 精确（良好） |
  |------|-------------|----------------|
  | 大小 | "大幅增加" | "3.5倍增加" |
  | 频率 | "经常发生" | "在75%的情况下发生" |
  | 比较 | "高于对照组" | "2.1倍高（p<0.01）" |
  | 样本 | "多个实验" | "n=6个生物学重复" |
  | 时间 | "延长时期" | "14天治疗" |
  | 浓度 | "高浓度" | "10 µM" |

  ### 修饰语校准量表

  | 证据水平 | 适当的修饰语词汇 |
  |----------------|------------------------|
  | 直接、重复、机制性的 | 证明、确立、证实 |
  | 强间接或相关性 | 显示、指示、揭示 |
  | 中等、单项研究 | 表明、支持、与一致 |
  | 有限或初步的 | 可能、或许、可以、似乎 |
  | 超出数据的推测 | 可设想地、潜在地、我们推测 |

  ## 常见问题

  ### 过度声明

  **模式**：强结论词汇与弱证据

  **示例**：
  - ❌ "这证明了X"（基于相关性）
  - ❌ "我们已经证明了Y"（单项实验，无机制）
  - ❌ "这确立了Z"（仅初步数据）

  **修复**：使修饰语强度匹配证据或添加限定语句

  ### 逻辑空白

  **模式**：结论需要未陈述的前提

  **示例**：
  - "蛋白质X在疾病Y中升高；因此，X导致Y"（缺失：相关性≠因果关系）
  - "我们的模型预测Z；因此，Z为真"（缺失：模型验证）

  **修复**：使隐含前提明确或承认局限性

  ### 模糊量化

  **模式**：存在数字时使用定性语言

  **示例**：
  - "表达显著增加"（什么p值？什么倍数变化？）
  - "大多数患者改善"（什么百分比？）
  - "治疗效果好"（依据什么指标？）

  **修复**：替换为具体数字

  ### 术语漂移

  **模式**：同一概念，不同词汇（或反之）

  **示例**：
  - 交替使用"受试者"、"参与者"、"患者"指代同一群体
  - 互换使用"表达"和"水平"
  - 缩写词在定义前使用

  **修复**：标准化术语；创建一致性表

  ### 缺失机制

  **模式**："什么"而没有"如何"

  **示例**：
  - "治疗X减少疾病Y"（如何工作？）
  - "突变Z导致表型W"（通过什么途径？）

  **修复**：添加机制解释或承认未知

  ## 防护措施

  **关键要求**：

  1. **不发明证据**：指出缺失，不伪造支持
  2. **保留作者意图**：标记问题，不重写意义
  3. **受众适当**：技术细节取决于目标读者
  4. **文档适当**：摘要与全文标准不同
  5. **建设性反馈**：识别问题并提供改进建议

  **此技能不做**：
  - ❌ 检查引用的准确性（无法验证论文）
  - ❌ 评估实验设计质量（需要方法学专业知识）
  - ❌ 验证统计分析（专业技能）
  - ❌ 判断科学重要性（主观）

  **重点领域**：
  - ✅ 内部逻辑和一致性
  - ✅ 声明与证据对齐
  - ✅ 语言清晰度和精确性
  - ✅ 适当修饰语
  - ✅ 术语一致性
  - ✅ 论证结构

  ## 快速参考

  **关键资源**：
  - **[资源/方法论.md](资源/方法论.md)**：声明识别、论证映射、术语审计、修饰语指南
  - **[资源/模板.md](资源/模板.md)**：声明-证据矩阵、精确性清单
  - **[资源/评估器/清晰度评分表.json](资源/评估器/清晰度评分表.json)**：质量评分

  **快速检查**：
  - [ ] 我能识别每个主要声明吗？
  - [ ] 每个声明是否有明确证据？
  - [ ] 论证中是否存在逻辑空白？
  - [ ] 是否使用数字而非模糊量化词？
  - [ ] 术语在整个文档中是否一致？
  - [ ] 修饰语强度是否匹配证据强度？
  - [ ] 在需要的地方是否解释机制？

  **需警惕的红旗**：
  - "这证明/证明/确立" + 弱证据
  - "显著"没有p值
  - 结论不从前提中得出
  - 同一概念使用多个名称
  - "如何"问题未解答

  **时间估计**：
  - 快速扫描（主要问题）：10-15分钟
  - 标准审查（完整清单）：30-45分钟
  - 深度分析（全面审计）：1-2小时

  **所需输入**：
  - 科学文档（任何类型）
  - 上下文（受众、目的）
  - 具体问题（如果有）

  **生成输出**：
  - 带有问题标记的注释文档
  - 按类别总结的清晰度问题
  - 改进建议
