  # SpinW 磁性模拟器

  ## 目的

  为磁性材料的SpinW自旋波计算提供专家指导，包括磁振子色散和中子散射截面分析。

  ## 功能

  - 磁性结构定义
  - 交换耦合参数化
  - 线性自旋波理论计算
  - 中子散射截面计算
  - 磁相图探索
  - 粉末平均

  ## 使用指南

  1. **结构定义**：定义磁性晶体结构
  2. **交换耦合**：参数化交换相互作用
  3. **自旋波理论**：计算磁振子色散
  4. **中子散射**：计算截面以与实验对比
  5. **相图**：探索磁相变

  ## 工具/库

  - SpinW (MATLAB)
  - magnopy
