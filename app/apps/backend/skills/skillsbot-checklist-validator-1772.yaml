  # 清单验证器技能

  ## 目的

  根据CONSORT、PRISMA、STROBE等报告清单验证研究手稿。

  ## 能力

  - 应用报告清单
  - 识别缺失要素
  - 提出改进建议
  - 跟踪合规性
  - 生成报告
  - 支持多种指南

  ## 使用指南

  1. 选择清单类型
  2. 加载手稿
  3. 评估每个项目
  4. 识别差距
  5. 生成报告
  6. 跟踪完成情况

  ## 流程集成

  在科学发现工作流程中用于：
  - 手稿审查
  - 提交准备
  - 质量保证
  - 合规性检查

  ## 配置

  - 清单库
  - 评估标准
  - 报告模板
  - 跟踪选项

  ## 输出成果

  - 合规性报告
  - 差距分析
  - 清单完成情况
  - 改进建议
