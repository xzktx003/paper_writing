  # 系统综述技能

  进行全面的文献检索、质量评估以及包括荟萃分析在内的证据综合。

  ## 概述

  系统综述技能遵循既定协议，能够进行全面的文献检索、质量评估、证据综合和荟萃分析，以支持严谨的循证研究和政策制定。

  ## 能力

  ### 检索策略
  - 数据库选择
  - 检索词制定
  - 布尔运算符
  - 引文追踪
  - 灰色文献纳入

  ### 研究筛选
  - 纳入/排除标准
  - 筛选程序
  - 双重评审流程
  - 分歧解决
  - PRISMA文档

  ### 质量评估
  - 偏倚风险工具
  - 质量检查清单
  - 证据分级
  - 研究评价
  - 偏倚识别

  ### 证据综合
  - 叙述性综合
  - 计数法
  - 框架综合
  - 主题综合
  - 现实主义综合

  ### 荟萃分析
  - 效应量计算
  - 异质性评估
  - 固定/随机效应
  - 发表偏倚
  - 敏感性分析

  ## 使用指南

  ### 何时使用
  - 综合证据
  - 为政策提供信息
  - 识别研究空白
  - 建立共识
  - 支持决策

  ### 最佳实践
  - 注册方案
  - 详细记录
  - 使用多名评审员
  - 评估偏倚
  - 定期更新

  ### 集成点
  - 定量方法技能
  - 定性分析技能
  - 政策沟通技能
  - 学术写作与发表技能

  ## 参考文献

  - 文献综述与综合流程
  - 政策影响评估流程
  - 政策研究分析师代理
  - 混合方法研究协调员代理
