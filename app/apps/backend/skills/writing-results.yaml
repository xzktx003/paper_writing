name: writing-results
display_name: "Results & Analysis Writing"
display_name_zh: 实验与结果章节写作
description: "Clear results presentation with statistical reporting, figure references, and comparative analysis"
description_zh: 围绕论文论点组织主实验、基线、消融、敏感性和误差分析，准确引用图表与统计结果，避免把相关性写成因果性。
type: writing
trigger: manual
tags: [results, analysis, tables, statistics, comparison]

prompt: |
  # Results & Analysis Section Writing

  Present research findings clearly with proper statistical reporting and visual evidence.

  ## Section Structure

  ### 1. Main Results (1-2 paragraphs)
  - State the primary finding
  - Reference key table/figure
  - Report effect sizes with confidence intervals
  - Compare with baseline/state-of-the-art

  ### 2. Detailed Analysis
  - Break down results by condition/variable
  - Analyze trends and patterns
  - Discuss unexpected findings
  - Reference supporting figures

  ### 3. Statistical Reporting
  - Report exact p-values (p = 0.032, not p < 0.05)
  - Include effect sizes (Cohen's d, η², odds ratio)
  - Report confidence intervals
  - Mention sample sizes in results

  ### 4. Ablation / Sensitivity Analysis
  - Test contribution of each component
  - Sensitivity to hyperparameters
  - Robustness analysis

  ## Statistical Reporting Standards

  ### APA Format
  - t(28) = 2.45, p = 0.021, d = 0.46
  - F(2, 57) = 4.13, p = 0.021, η² = 0.13
  - χ²(1) = 3.87, p = 0.049, OR = 2.1

  ### Table Design
  - Descriptive statistics: Mean ± SD
  - Best result in **bold**, second underlined
  - Include "↑" or "↓" for direction of better performance
  - Footnotes for statistical significance levels

  ## Writing Patterns

  ### Reporting a Result
  "As shown in Table 2, our method achieved 94.2% accuracy (95% CI: 93.1-95.3%), outperforming the baseline (91.0%) by 3.2 percentage points (p < 0.001, Cohen's d = 0.87)."

  ### Reporting No Effect
  "No significant difference was found between conditions (t(48) = 1.23, p = 0.224), suggesting that [variable] does not substantially affect [outcome]."

  ### Reporting Trends
  "Performance improved monotonically with model size, with diminishing returns beyond 1B parameters (Figure 3)."

  ## Common Pitfalls
  - Cherry-picking favorable metrics
  - Missing baselines or comparisons
  - Vague statements without numbers
  - No discussion of failure cases
  - Over-claiming statistical significance

  ## Language
  Respond in the user's language. If Chinese, respond in Chinese.
