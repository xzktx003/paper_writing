  # 科学假设生成

  ## 概述

  假设生成是开发可测试解释的系统过程。从观察中制定基于证据的假设，设计实验，探索竞争性解释，并开发预测。将此技能应用于跨领域的科学探究。

  ## 何时使用此技能

  此技能应在以下情况下使用：
  - 从观察或初步数据中开发假设
  - 设计实验以测试科学问题
  - 探索现象的竞争性解释
  - 为研究制定可测试的预测
  - 进行基于文献的假设生成
  - 规划跨科学领域的机制研究

  ## 使用科学示意图进行视觉增强

  **⚠️ 强制要求：每个假设生成报告必须包含至少1-2个使用科学示意图技能生成的AI生成图。**

  这不是可选的。没有视觉元素的假设报告是不完整的。在最终确定任何文档之前：
  1. 生成至少一个示意图或图表（例如，显示竞争性解释的假设框架）
  2. 对于综合报告，推荐2-3个图（机制路径、实验设计流程图、预测决策树）

  **如何生成图：**
  - 使用**科学示意图**技能生成AI驱动的出版质量图
  - 只需用自然语言描述所需图
  - Nano Banana Pro将自动生成、审查和优化示意图

  **如何生成示意图：**
  ```bash
  python scripts/generate_schematic.py "your diagram description" -o figures/output.png
  ```

  AI将自动：
  - 创建具有适当格式的出版质量图像
  - 通过多次迭代审查和优化
  - 确保可访问性（色盲友好、高对比度）
  - 将输出保存在figures/目录中

  **何时添加示意图：**
  - 显示竞争性解释的假设框架图
  - 实验设计流程图
  - 机制路径图
  - 预测决策树
  - 因果关系图
  - 理论模型可视化
  - 任何受益于可视化的复杂概念

  有关创建示意图的详细指导，请参考科学示意图技能文档。

  ---

  ## 工作流程

  遵循此系统过程生成稳健的科学假设：

  ### 1. 理解现象

  首先澄清需要解释的观察、问题或现象：

  - 识别需要解释的核心观察或模式
  - 定义现象的范围和边界
  - 注意任何约束或特定上下文
  - 澄清已知与不确定的内容
  - 识别相关科学领域

  ### 2. 进行综合文献搜索

  搜索现有科学文献，将假设基于当前证据。对于生物医学主题使用PubMed，对于更广泛的科学领域使用通用网络搜索：

  **对于生物医学主题：**
  - 使用WebFetch与PubMed URL访问相关文献
  - 搜索最近的综述、荟萃分析和原始研究
  - 寻找类似现象、相关机制或类比系统

  **对于所有科学领域：**
  - 使用WebSearch查找最近的论文、预印本和综述
  - 搜索已建立的理论、机制或框架
  - 识别当前理解中的空白

  **搜索策略：**
  - 从广泛搜索开始以了解景观
  - 缩小到特定机制、路径或理论
  - 寻找矛盾发现或未解决的辩论
  - 参考`references/literature_search_strategies.md`获取详细搜索技术

  ### 3. 合成现有证据

  分析和整合文献搜索的发现：

  - 总结对现象的当前理解
  - 识别可能适用的已建立机制或理论
  - 注意矛盾证据或替代观点
  - 识别空白、限制或未回答问题
  - 识别来自相关系统或领域的类比

  ### 4. 生成竞争性假设

  开发3-5个可以解释现象的不同假设。每个假设应：

  - 提供机制解释（不仅仅是描述）
  - 与其他假设可区分
  - 基于文献合成的证据
  - 考虑不同解释层次（分子、细胞、系统、群体等）

  **生成假设的策略：**
  - 应用来自类比系统的已知机制
  - 考虑多种因果路径
  - 探索不同解释尺度
  - 质疑现有解释中的假设
  - 以新颖方式组合机制

  ### 5. 评估假设质量

  根据`references/hypothesis_quality_criteria.md`中的质量标准评估每个假设：

  **可测试性：** 假设能否经验测试？
  **可证伪性：** 什么观察会证伪它？
  **简洁性：** 它是否是最符合证据的最简单解释？
  **解释力：** 它解释了现象的多少？
  **范围：** 它覆盖了什么范围的观察？
  **一致性：** 它是否与已建立原则一致？
  **新颖性：** 它是否提供了超出现有解释的新见解？

  明确记录每个假设的优缺点。

  ### 6. 设计实验测试

  对于每个可行的假设，提出具体实验或研究来测试它。参考`references/experimental_design_patterns.md`获取常见方法：

  **实验设计元素：**
  - 测量或观察什么？
  - 需要什么比较或控制？
  - 使用什么方法或技术？
  - 什么样本量或统计方法合适？
  - 潜在混杂因素是什么以及如何解决？

  **考虑多种方法：**
  - 实验室实验（体外、体内、计算）
  - 观察性研究（横断面、纵向、病例对照）
  - 临床试验（如果适用）
  - 自然实验或准实验设计

  ### 7. 制定可测试预测

  对于每个假设，生成具体、量化的预测：

  - 陈述如果假设正确应观察到的内容
  - 在可能时指定预期效应方向和大小
  - 识别预测应成立的条件
  - 区分竞争性假设之间的预测
  - 注意会证伪假设的预测

  ### 8. 呈现结构化输出

  使用`assets/hypothesis_report_template.tex`中的模板生成专业的LaTeX文档。报告应格式良好，使用彩色框进行视觉组织，并分为简洁主文本和全面附录。

  **文档结构：**

  **主文本（最多4页）：**
  1. **执行摘要** - 在摘要框中简要概述（0.5-1页）
  2. **竞争性假设** - 每个假设在自己的彩色框中，带简要机制解释和关键证据（3-5个假设2-2.5页）
     - **重要：** 使用`\newpage`在每个假设框之前以防止内容溢出
     - 每个框最大≤0.6页
  3. **可测试预测** - 关键预测在琥珀色框中（0.5-1页）
  4. **关键比较** - 优先比较框（0.5-1页）

  保持主文本高度简洁 - 仅最基本信息。所有细节放入附录。

  **分页策略：**
  - 总是在假设框之前使用`\newpage`以确保它们在新页面开始
  - 这防止内容溢出页面边界
  - LaTeX框（tcolorbox）不会自动跨页中断

  **附录（全面、详细）：**
  - **附录A：** 综合文献综述，带广泛引用
  - **附录B：** 详细实验设计，带完整协议
  - **附录C：** 质量评估表和详细评估
  - **附录D：** 补充证据和类比系统

  **彩色框使用：**

  使用`hypothesis_generation.sty`中的自定义框环境：

  - `hypothesisbox1`到`hypothesisbox5` - 用于每个竞争性假设（蓝色、绿色、紫色、青色、橙色）
  - `predictionbox` - 用于可测试预测（琥珀色）
  - `comparisonbox` - 用于关键比较（钢灰色）
  - `evidencebox` - 用于支持证据高亮（浅蓝色）
  - `summarybox` - 用于执行摘要（蓝色）

  **每个假设框应包含（为4页限制保持简洁）：**
  - **机制解释：** 1-2个简短段落（最多6-10句）解释如何和为什么
  - **关键支持证据：** 2-3个要点带引用（仅最重要证据）
  - **核心假设：** 1-2个关键假设

  所有详细解释、附加证据和全面讨论属于附录。

  **关键溢出预防：**
  - 在每个假设框之前插入`\newpage`以在新鲜页面开始
  - 保持每个完整假设框≤0.6页（约15-20行内容）
  - 如果内容超过此，移动附加细节到附录A
  - 永远不要让框溢出页面边界 - 这会创建不可读的PDF

  **引用要求：**

  目标广泛引用以支持所有主张：
  - **主文本：** 仅10-15个关键引用，为最重要证据（为4页限制保持简洁）
  - **附录A：** 40-70+个全面引用，覆盖所有相关文献
  - **总目标：** 参考文献中50+个引用

  主文本引用应有选择性 - 仅引用最关键论文。所有全面引用和详细文献讨论属于附录。使用`\citep{author2023}`进行括号引用。

  **LaTeX编译：**

  模板需要XeLaTeX或LuaLaTeX进行适当渲染：

  ```bash
  xelatex hypothesis_report.tex
  bibtex hypothesis_report
  xelatex hypothesis_report.tex
  xelatex hypothesis_report.tex
  ```

  **所需包：** `hypothesis_generation.sty`样式包必须在同一目录或LaTeX路径中。它需要：tcolorbox, xcolor, fontspec, fancyhdr, titlesec, enumitem, booktabs, natbib。

  **页面溢出预防：**

  为防止内容溢出页面，遵循这些关键指南：

  1. **监控框内容长度：** 每个假设框应舒适地适合单个页面。如果内容超过约0.7页，可能会溢出。

  2. **使用战略分页：** 在包含大量内容的框之前插入`\newpage`：
     ```latex
     \newpage
     \begin{hypothesisbox1}[假设1: 标题]
     % 长内容在这里
     \end{hypothesisbox1}
     ```

  3. **保持主文本框简洁：** 对于4页主文本限制：
     - 每个假设框：最大0.5-0.6页
     - 机制解释：仅1-2个简短段落（最多6-10句）
     - 关键证据：仅2-3个要点
     - 核心假设：仅1-2项
     - 如果内容更长，移动细节到附录

  4. **拆分长内容：** 如果一个假设需要广泛解释，拆分跨主文本和附录：
     - 主文本框：简要机制概述 + 2-3个关键证据点
     - 附录A：详细机制解释、全面证据、扩展讨论

  5. **测试页面边界：** 在每个新框之前，考虑剩余页面空间是否足够。如果少于0.6页，使用`\newpage`在新页面开始框。

  6. **附录页面管理：** 在附录中，使用`\newpage`在主要部分之间以避免溢出在详细内容区域。

  **快速参考：** 参见`assets/FORMATTING_GUIDE.md`获取所有框类型、颜色方案和常见格式模式的详细示例。

  ## 质量标准

  确保所有生成的假设满足这些标准：

  - **基于证据：** 基于现有文献带引用
  - **可测试：** 包括具体、可测量的预测
  - **机制性：** 解释如何/为什么，不仅仅是什么
  - **全面：** 考虑替代解释
  - **严格：** 包括测试预测的实验设计

