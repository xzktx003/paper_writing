  # LAMMPS MD 模拟器

  ## 目的

  提供关于LAMMPS分子动力学模拟的专家指导，包括输入脚本生成、力场选择和并行执行优化。

  ## 能力

  - 输入脚本生成与验证
  - 力场选择（EAM、Tersoff、ReaxFF）
  - 边界条件与系统系综配置
  - 热力学性质提取
  - 轨迹文件分析
  - 并行运行优化（MPI/GPU）

  ## 使用指南

  1. **输入脚本生成**：创建语法和结构正确的LAMMPS输入文件
  2. **力场选择**：为系统选择合适的原子间势函数
  3. **系统系综配置**：正确设置NVT、NPT或NVE系综
  4. **输出分析**：处理dump文件和热力学输出
  5. **性能优化**：为高性能计算环境配置并行执行

  ## 工具/库

  - LAMMPS
  - OVITO
  - MDAnalysis
