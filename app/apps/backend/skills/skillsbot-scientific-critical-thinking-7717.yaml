  ## 核心能力

  ### 1. 方法学批判

  评估研究方法学的严谨性、有效性和潜在缺陷。

  **适用于：**

  - 审查研究论文
  - 评估实验设计
  - 评估研究协议
  - 规划新研究

  **评估框架：**

  1. **研究设计评估**
     - 设计是否适合研究问题？
     - 设计能否支持所做的因果主张？
     - 比较组是否适当和充分？
     - 考虑实验、准实验或观察设计是否合理

  2. **有效性分析**
     - **内部有效性：** 能否信任因果推断？
       - 检查随机化质量
       - 评估混淆控制
       - 评估选择偏见
       - 审查流失/退出模式
     - **外部有效性：** 结果是否具有普遍性？
       - 评估样本代表性
       - 考虑设置的生态有效性
       - 评估条件是否匹配目标应用
     - **构念有效性：** 测量是否捕捉预期构念？
       - 审查测量验证
       - 检查操作定义
       - 评估测量是直接还是代理
     - **统计结论有效性：** 统计推断是否可靠？
       - 验证足够功效/样本量
       - 检查假设符合情况
       - 评估测试适当性

  3. **控制和盲法**
     - 随机化是否正确实施（序列生成、分配隐藏）？
     - 盲法是否可行且实施（参与者、提供者、评估者）？
     - 控制条件是否适当（安慰剂、主动控制、无治疗）？
     - 性能或检测偏见是否影响结果？

  4. **测量质量**
     - 工具是否已验证和可靠？
     - 测量是否尽可能客观，或主观但有公认限制？
     - 结果评估是否标准化？
     - 是否使用多种测量来三角验证发现？

  **参考：** 参见`references/scientific_method.md`了解详细原理，`references/experimental_design.md`了解全面设计清单。

  ### 2. 偏见检测

  识别和评估可能扭曲发现的潜在偏见来源。

  **适用于：**

  - 审查已发表研究
  - 设计新研究
  - 解释矛盾证据
  - 评估研究质量

  **系统偏见审查：**

  1. **认知偏见（研究者）**
     - **确认偏见：** 是否仅突出支持性发现？
     - **HARKing：** 假设是先验陈述还是基于结果后形成？
     - **发表偏见：** 文献中是否缺失负面结果？
     - **拣选：** 证据是否选择性报告？
     - 检查预注册和分析计划透明度

  2. **选择偏见**
     - **抽样偏见：** 样本是否代表目标人群？
     - **志愿者偏见：** 参与者是否以系统方式自选？
     - **流失偏见：** 组间退出是否不同？
     - **幸存者偏见：** 样本中是否仅见“幸存者”？
     - 检查参与者流程图和比较基线特征

  3. **测量偏见**
     - **观察者偏见：** 期望是否影响观察？
     - **回忆偏见：** 回顾性报告是否系统不准确？
     - **社会期望：** 回答是否偏向可接受性？
     - **工具偏见：** 测量工具是否系统错误？
     - 评估盲法、验证和测量客观性

  4. **分析偏见**
     - **P-hacking：** 是否进行多次分析直到出现显著性？
     - **结果切换：** 非显著结果是否被显著结果替换？
     - **选择性报告：** 所有计划分析是否报告？
     - **子组渔获：** 是否未校正地进行子组分析？
     - 检查研究注册并与发表结果比较

  5. **混淆**
     - 哪些变量可能同时影响暴露和结果？
     - 混淆因素是否测量和控制（统计或设计）？
     - 未测量混淆能否解释发现？
     - 是否存在合理的替代解释？

  **参考：** 参见`references/common_biases.md`了解全面偏见分类及检测和缓解策略。

  ### 3. 统计分析评估

  批判性评估统计方法、解释和报告。

  **适用于：**

  - 审查定量研究
  - 评估数据驱动主张
  - 评估临床试验结果
  - 审查荟萃分析

  **统计审查清单：**

  1. **样本量和功效**
     - 是否进行先验功效分析？
     - 样本是否足够检测有意义效应？
     - 研究是否功效不足（常见问题）？
     - 小样本的显著结果是否引起效应大小膨胀的警示？

  2. **统计检验**
     - 检验是否适合数据类型和分布？
     - 检验假设是否检查和满足？
     - 参数检验是否合理，或应使用非参数替代？
     - 分析是否匹配研究设计（如配对 vs. 独立）？

  3. **多重比较**
     - 是否测试多个假设？
     - 是否应用校正（Bonferroni、FDR等）？
     - 主要结果是否与次要/探索性区分？
     - 发现是否可能来自多重测试的假阳性？

  4. **P值解释**
     - P值是否正确解释（零假设为真时数据的概率）？
     - 非显著性是否错误解释为“无效应”？
     - 统计显著性是否与实用重要性混淆？
     - 是否报告精确P值，或仅“p < .05”？
     - 是否可疑地聚集在.05以下？

  5. **效应大小和置信区间**
     - 是否报告效应大小及显著性？
     - 是否提供置信区间以显示精度？
     - 效应大小在实用上是否有意义？
     - 标准化效应大小是否在领域特定背景下解释？

  6. **缺失数据**
     - 多少数据缺失？
     - 是否考虑缺失数据机制（MCAR、MAR、MNAR）？
     - 如何处理缺失数据（删除、插补、最大似然）？
     - 缺失数据是否可能偏见结果？

  7. **回归和建模**
     - 模型是否过拟合（太多预测因子，无交叉验证）？
     - 是否在数据范围外进行预测（外推）？
     - 是否解决多重共线性问题？
     - 是否检查模型假设？

  8. **常见陷阱**
     - 相关视为因果
     - 忽略回归均值
     - 基率忽视
     - 德州神枪手谬误（在噪声中找模式）
     - 辛普森悖论（子组混淆）

  **参考：** 参见`references/statistical_pitfalls.md`了解详细陷阱和正确实践。

  ### 4. 证据质量评估

  系统评估证据的强度和质。

  **适用于：**

  - 权衡证据以做决策
  - 进行文献综述
  - 比较矛盾发现
  - 确定结论的置信度

  **证据评估框架：**

  1. **研究设计层次**
     - 系统评价/荟萃分析（干预效应最高）
     - 随机对照试验
     - 队列研究
     - 病例对照研究
     - 横断面研究
     - 病例系列/报告
     - 专家意见（最低）

     **重要：** 高层设计并非总是更优质量。设计良好的观察性研究可能比执行差的RCT更强。

  2. **设计类型内的质量**
     - 风险偏差评估（使用适当工具：Cochrane ROB、Newcastle-Ottawa等）
     - 方法学严谨性
     - 透明度和报告完整性
     - 利益冲突

  3. **GRADE考虑（如适用）**
     - 从设计类型开始（RCT = 高，观察性 = 低）
     - **降级因素：**
       - 风险偏差
       - 研究间不一致
       - 间接性（错误人群/干预/结果）
       - 不精确性（宽置信区间，小样本）
       - 发表偏见
     - **升级因素：**
       - 大效应大小
       - 剂量-响应关系
       - 混淆因素会减少（非增加）效应

  4. **证据收敛性**
     - **更强时：**
       - 多个独立复制
       - 不同研究组和设置
       - 不同方法学收敛于相同结论
       - 机制和实证证据对齐
     - **较弱时：**
       - 单一研究或研究组
       - 文献中矛盾发现
       - 发表偏见明显
       - 无复制尝试

  5. **上下文因素**
     - 生物/理论合理性
     - 与既有知识一致性
     - 时序性（原因先于结果）
     - 关系特异性
     - 关联强度

  **参考：** 参见`references/evidence_hierarchy.md`了解详细层次、GRADE系统和质量评估工具。

  ### 5. 逻辑谬误识别

  检测并命名科学论点和主张中的逻辑错误。

  **适用于：**

  - 评估科学主张
  - 审查讨论/结论部分
  - 评估大众科学传播
  - 识别错误推理

  **科学中常见谬误：**

  1. **因果谬误**
     - **后此谬误：** “B跟随A，所以A导致B”
     - **相关 = 因果：** 混淆关联与因果关系
     - **逆向因果：** 误将原因视为结果
     - **单一原因谬误：** 将复杂结果归因于单一因素

  2. **概括谬误**
     - **草率概括：** 从小样本得出广泛结论
     - **轶事谬误：** 个人故事作为证明
     - **拣选：** 仅选择支持性证据
     - **生态谬误：** 将群体模式应用于个体

  3. **权威和来源谬误**
     - **诉诸权威：** “专家说过，所以是真的”（无证据）
     - **人身攻击：** 攻击人，非论点
     - **起源谬误：** 基于起源判断，非优点
     - **诉诸自然：** “自然 = 好/安全”

  4. **统计谬误**
     - **基率忽视：** 忽略先验概率
     - **德州神枪手：** 在随机数据中找模式
     - **多重比较：** 未校正多重测试
     - **检察官谬误：** 混淆P(E|H)与P(H|E)

  5. **结构谬误**
     - **虚假二分法：** “要么A要么B”，而更多选项存在
     - **移动目标：** 满足标准后改变证据标准
     - **循环论证：** 循环推理
     - **稻草人：** 歪曲论点以攻击之

  6. **科学特定谬误**
     - **伽利略陷阱：** “他们嘲笑伽利略，所以我的边缘观点正确”
     - **无知论证：** “未被证伪，所以为真”
     - **完美主义谬误：** 拒绝不完美解决方案
     - **不可证伪性：** 提出不可测试主张

  **识别谬误时：**

  - 命名具体谬误
  - 解释推理为何错误
  - 识别有效推断所需证据
  - 注意谬误推理并不证明结论错误—仅证明此论点不支持它

  **参考：** 参见`references/logical_fallacies.md`了解全面谬误目录及示例和检测策略。

  ### 6. 研究设计指导

  为规划严谨研究提供建设性指导。

  **适用于：**

  - 帮助设计新实验
  - 规划研究项目
  - 审查研究提案
  - 改进研究协议

  **设计过程：**

  1. **研究问题细化**
     - 确保问题具体、可回答且可证伪
     - 验证是否解决文献中的空白或矛盾
     - 确认可行性（资源、伦理、时间）
     - 操作定义变量

  2. **设计选择**
     - 匹配设计于问题（因果 → 实验；关联 → 观察）
     - 考虑可行性和伦理限制
     - 选择组间设计、组内设计或混合设计
     - 如测试多因素，规划因子设计

  3. **偏见最小化策略**
     - 可能时实施随机化
     - 规划所有可行级别的盲法（参与者、提供者、评估者）
     - 识别并计划控制混淆（随机化、匹配、分层、统计调整）
     - 标准化所有程序
     - 计划最小化流失

  4. **样本规划**
     - 进行先验功效分析（指定预期效应、期望功效、α）
     - 在样本量中考虑流失
     - 定义明确纳入/排除标准
     - 考虑招募策略和可行性
     - 规划样本代表性

  5. **测量策略**
     - 选择已验证、可靠的工具
     - 可能时使用客观测量
     - 规划关键构念的多种测量（三角验证）
     - 确保测量对预期变化敏感
     - 建立评估者间可靠性程序

  6. **分析规划**
     - 预先指定所有假设和分析
     - 明确指定主要结果
     - 规划统计检验及假设检查
     - 指定如何处理缺失数据
     - 计划报告效应大小和置信区间
     - 考虑多重比较校正

  7. **透明度和严谨性**
     - 预注册研究和分析计划
     - 使用报告指南（CONSORT、STROBE、PRISMA）
     - 计划报告所有结果，非仅显著者
     - 区分验证性分析与探索性分析
     - 承诺数据/代码共享

  **参考：** 参见`references/experimental_design.md`了解从问题到传播所有阶段的全面设计清单。

  ### 7. 主张评估

  系统评估科学主张的有效性和支持度。

  **适用于：**

  - 评估论文中的结论
  - 评估研究报告
  - 审查摘要或引言主张
  - 检查数据是否支持结论

  **主张评估过程：**

  1. **识别主张**
     - 具体主张是什么？
     - 是因果主张、关联主张还是描述性主张？
     - 主张强度如何（已证明、很可能、建议、可能）？

  2. **评估证据**
     - 提供什么证据？
     - 证据是直接还是间接？
     - 证据是否足够支持主张强度？
     - 替代解释是否排除？

  3. **检查逻辑连接**
     - 结论是否从数据推导？
     - 是否存在逻辑跳跃？
     - 是否使用相关数据支持因果主张？
     - 是否承认限制？

  4. **评估比例性**
     - 置信度是否与证据强度成比例？
     - 是否适当使用谨慎措辞？
     - 是否淡化限制？
     - 推测是否明确标记？

  5. **检查过度概括**
     - 主张是否超出研究样本？
     - 是否承认人群限制？
     - 是否认识到上下文依赖性？
     - 是否包括概括性警告？

  6. **红色标志**
     - 从相关研究的因果语言
     - “证明”或绝对确定性
     - 拣选引用
     - 忽略矛盾证据
     - 忽视限制
     - 超出数据的外推

  **提供具体反馈：**

  - 引用有问题的主张
  - 解释支持它所需的证据
  - 如适用，建议适当谨慎措辞
  - 区分数据（所发现）和解释（其意义）

  ## 应用指南

  ### 一般方法

  1. **建设性**
     - 识别优点和缺点
     - 建议改进，非仅批评
     - 区分致命缺陷和次要限制
     - 承认所有研究都有局限性

  2. **具体性**
     - 指向具体实例（如“表2显示...”或“在方法部分...”）
     - 引用有问题陈述
     - 提供具体问题示例
     - 引用违反的具体原则或标准

  3. **比例性**
     - 匹配批评严重性与问题重要性
     - 区分主要有效性威胁和次要关切
     - 考虑问题是否影响主要结论
     - 承认自身评估的不确定性

  4. **应用一致标准**
     - 对所有研究使用相同标准
     - 不对不喜好的发现应用更严格标准
     - 承认自身潜在偏见
     - 基于方法学，非结果进行判断

  5. **考虑上下文**
     - 承认实践和伦理限制
     - 考虑领域特定效应大小和方法规范
     - 识别探索性与验证性背景
     - 在评估研究时考虑资源限制

  ### 提供批判时

  **将反馈结构化：**

  1. **摘要：** 简要概述评估内容
  2. **优点：** 做得好的部分（对可信度和学习重要）
  3. **关切：** 按严重性组织问题
     - 关键问题（威胁主要结论有效性）
     - 重要问题（影响解释但非致命）
     - 次要问题（值得注意但不改变结论）
  4. **具体建议：** 可操作的改进建议
  5. **整体评估：** 关于证据质量和可得出结论的平衡结论

  **使用精确术语：**

  - 命名具体偏见、谬误和方法学问题
  - 引用既定标准和指南
  - 引用科学方法学原理
  - 准确使用技术术语

  ### 不确定时

  - **承认不确定性：** “这可能是X或Y；需要额外信息Z”
  - **询问澄清问题：** “是否做了[方法学细节]？这影响解释。”
  - **提供条件评估：** “如果做了X，则Y成立；如果没有，则Z是关切”
  - **注意哪些额外信息能解决不确定性**

  ## 参考材料

  此技能包括全面的参考材料，提供批判性评估的详细框架：

  - **`references/scientific_method.md`** - 科学方法核心原理、科学过程、批判性评估标准、科学主张中的红色标志、因果推断标准、同行评审和开放科学原则

  - **`references/common_biases.md`** - 认知、实验、方法学、统计和分析偏见的全面分类及检测和缓解策略

  - **`references/statistical_pitfalls.md`** - 常见统计错误和误解，包括P值误解、多重比较问题、样本量问题、效应大小错误、相关/因果混淆、回归陷阱和荟萃分析问题

  - **`references/evidence_hierarchy.md`** - 传统证据层次、GRADE系统、研究质量评估标准、领域特定考虑、证据合成原则和实用决策框架

  - **`references/logical_fallacies.md`** - 科学论述中常见逻辑谬误，按类型组织（因果、概括、权威、相关性、结构、统计），包括示例和检测策略

  - **`references/experimental_design.md`** - 全面的实验设计清单，涵盖研究问题、假设、研究设计选择、变量、抽样、盲法、随机化、控制组、程序、测量、偏见最小化、数据管理、统计规划、伦理考虑、有效性威胁和报告标准

  **何时参考：**

  - 需要详细框架时加载参考到上下文
  - 使用grep搜索参考中特定主题：`grep -r "模式" references/`
  - 参考提供深度；SKILL.md提供程序指导
  - 参考全面列表、详细标准和具体示例时参考

  ## 记住

  **科学批判性思维是关于：**

  - 使用既定原则进行系统评估
  - 改进科学的建设性批判
  - 置信度与证据强度成比例
  - 关于不确定性和限制的透明度
  - 标准的一致应用
  - 承认所有研究都有局限性
  - 怀疑论与对证据开放之间的平衡

  **始终区分：**

  - 数据（所观察）和解释（其意义）
  - 相关和因果
  - 统计显著性和实用重要性
  - 探索性和验证性发现
  - 已知和不确定
  - 反对主张的证据和零假设的证据

  **批判性思维目标：**

  1. 准确识别优点和缺点
  2. 确定支持哪些结论
  3. 认识限制和不确定性
  4. 为未来工作建议改进
  5. 推进科学理解

