  # 科学批判性思维

  ## 概述

  批判性思维是评估科学严谨性的系统过程。评估方法学、实验设计、统计有效性、偏见、混淆和证据质量，使用GRADE和Cochrane ROB框架。将此技能应用于科学主张的批判性分析。

  ## 何时使用此技能

  此技能应在以下情况下使用：

  - 评估研究方法和实验设计
  - 评估统计有效性和证据质量
  - 识别研究中的偏见和混淆因素
  - 审查科学主张和结论
  - 进行系统评价或荟萃分析
  - 应用GRADE或Cochrane风险偏差评估
  - 提供研究论文的批判性分析

  ## 科学示意图的视觉增强

  **使用此技能创建文档时，始终考虑添加科学图表和示意图以增强视觉传达。**

  如果您的文档尚未包含示意图或图表：

  - 使用**scientific-schematics**技能生成AI驱动的出版质量图表
