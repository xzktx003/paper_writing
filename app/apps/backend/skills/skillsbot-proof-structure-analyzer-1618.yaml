  # 证明结构分析器

  ## 目的

  提供对数学证明的分析和重构能力，以提高其清晰度、完整性和逻辑流程。

  ## 功能

  - 证明策略识别（归纳法、反证法等）
  - 依赖关系图构建
  - 推理链中的缺口检测
  - 证明大纲生成
  - 引理提取建议

  ## 使用指南

  1. **策略分析**：识别整体证明方法
  2. **依赖关系映射**：构建逻辑依赖关系图
  3. **缺口检测**：查找缺失步骤或未经证实的断言
  4. **重构**：建议更清晰的证明组织方式

  ## 工具/库

  - 自然语言解析
  - 形式逻辑表示
  - 图分析工具
