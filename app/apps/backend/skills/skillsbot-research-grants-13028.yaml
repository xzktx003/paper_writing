  ## 机构特定概述

  ### NSF（国家科学基金会）
  **使命**：促进科学进步，推动国家健康、繁荣和福利

  **关键特征**：
  - 智力价值 + 更广泛影响（同等权重）
  - 15页项目描述限制（大多数项目）
  - 强调教育、多样性和社会效益
  - 鼓励合作研究
  - 开放数据和开放科学强调
  - 由小组和特邀评审员进行的价值评审过程

  ### NIH（国家卫生研究院）
  **使命**：增强健康、延长寿命、减少疾病和残疾

  **关键特征**：
  - 具体目标（1页）+ 研究策略（R01为12页）
  - 意义、创新、方法作为核心评审标准
  - R01通常需要初步数据
  - 强调严谨性、可重复性和临床相关性
  - 大多数R01的模块化预算（25万美元递增）
  - 多次重新提交机会

  ### DOE（能源部）
  **使命**：通过能源、环境和核挑战确保美国的安全和繁荣

  **关键特征**：
  - 关注能源、气候、计算科学、基础能源科学
  - 通常需要成本分担或行业合作伙伴关系
  - 强调国家实验室合作
  - 计算和实验的强整合
  - 能源创新和商业化路径
  - 因办公室而异（ARPA-E、科学办公室、EERE等）

  ### DARPA（国防高级研究计划局）
  **使命**：为国家安全对突破性技术进行关键投资

  **关键特征**：
  - 高风险、高回报的变革性研究
  - 关注“DARPA-hard”问题（如果成真，谁在乎）
  - 强调原型、演示和过渡路径
  - 通常需要多个阶段（可行性、开发、演示）
  - 强大的项目管理和里程碑跟踪
  - 通常需要团队合作和协作
  - 因项目经理和BAA（广泛机构公告）而异

  ## 研究提案的核心组件

  ### 1. 执行摘要 / 项目摘要 / 摘要

  每个提案都需要一个简洁的概述，向技术评审员和项目官员传达研究的基本要素。

  **目的**：提供一个独立的摘要，捕捉研究愿景、意义和方法

  **长度**：
  - NSF：1页（项目摘要，包括单独的概述、智力价值、更广泛影响）
  - NIH：30行（项目摘要/摘要）
  - DOE：各异（通常1页）
  - DARPA：各异（通常1-2页）

  **基本要素**：
  - 问题或研究问题的清晰陈述
  - 为什么这个问题重要（意义、紧迫性、影响）
  - 新颖方法或创新
  - 预期成果和交付物
  - 团队资质
  - 更广泛影响或转化路径

  **写作策略**：
  - 以一个引人入胜的钩子开始，建立重要性
  - 使用易懂的语言（开头句子避免行话）
  - 陈述具体、可衡量的目标
  - 传达热情和信心
  - 确保每句话都有价值（无填充）
  - 以变革性愿景或影响陈述结束

  **常见错误避免**：
  - 过于技术性或详细（留给项目描述）
  - 未能阐明“为什么现在”或“为什么这个团队”
  - 模糊的目标或成果
  - 忽视更广泛影响或意义
  - 适用于任何提案的通用陈述

  ### 2. 项目描述 / 研究策略

  核心技术叙述，详细展示研究计划。

  **结构因机构而异：**

  **NSF项目描述**（通常15页）：
  - 介绍和背景
  - 研究目标和问题
  - 初步结果（如果适用）
  - 研究计划和方法论
  - 时间线和里程碑
  - 更广泛影响（贯穿或单独部分）
  - 先前的NSF支持（如果适用）

  **NIH研究策略**（R01为12页）：
  - 意义（为什么问题重要）
  - 创新（什么是新颖和变革性的）
  - 方法（详细研究计划）
    - 初步数据
    - 研究设计和方法
    - 预期成果
    - 潜在问题和替代方法

  **DOE项目叙述**（各异）：
  - 背景和意义
  - 技术方法和创新
  - 资质和经验
  - 设施和资源
  - 项目管理和时间线

  **DARPA技术卷**（各异）：
  - 技术挑战和创新
  - 方法和方法论
  - 时间表和里程碑
  - 交付物和指标
  - 团队资质
  - 风险评估和缓解

  有关详细机构特定指导，请参阅：
  - `references/nsf_guidelines.md`
  - `references/nih_guidelines.md`
  - `references/doe_guidelines.md`
  - `references/darpa_guidelines.md`

  ### 3. 具体目标（NIH）或目标（NSF/DOE/DARPA）

  清晰、可测试的目标，结构化研究计划。

  **NIH具体目标页**（1页）：
  - 开场段落：知识缺口和意义
  - 长期目标和即时目标
  - 中心假设或研究问题
  - 2-4个具体目标，带子目标
  - 预期成果和影响
  - 回报段落：为什么这重要

  **每个目标的结构：**
  - 目标陈述（1-2句，以动作动词开始）
  - 理由（为什么这个目标，初步数据支持）
  - 工作假设（可测试的预测）
  - 方法摘要（简要方法概述）
  - 预期成果和解释

  **写作策略：**
  - 使目标独立但互补
  - 确保每个目标在时间线和预算内可实现
  - 提供足够细节以判断可行性
  - 包括应急计划或替代方法
  - 跨目标使用平行结构
  - 明确说明每个目标将学到什么

  有关详细指导，请参阅`references/specific_aims_guide.md`。

  ### 4. 更广泛影响（NSF）/ 意义（NIH）

  阐明研究的社会、教育或转化价值。

  **NSF更广泛影响**（关键组件，与智力价值同等权重）：

  NSF明确评估更广泛影响。至少解决以下一个领域：
  1. **推进发现和理解，同时促进教学、培训和学习**
     - 研究与教育的整合
     - 学生和博士后的培训
     - 课程开发
     - 教育材料和资源

  2. **扩大 underrepresented 群体的参与**
     - 招聘和保留策略
     - 与 minority-serving 机构的合作伙伴关系
     - 向 underrepresented 社区的推广
     - 指导计划

  3. **增强研究和教育的基础设施**
     - 共享设施或仪器
     - 网络基础设施和数据资源
     - 社区范围的工具或数据库
     - 开源软件或方法

  4. **广泛传播以增强科学和技术理解**
     - 公共推广和科学传播
     - K-12 教育计划
     - 博物馆展览或媒体参与
     - 政策简报或利益相关者参与

  5. **对社会的好处**
     - 经济影响或商业化
     - 健康、环境或国家安全好处
     - 知情决策
     - 劳动力发展

  **写作策略：**
  - 具体说明具体活动，而非模糊陈述
  - 为更广泛影响活动提供时间线和里程碑
  - 解释如何衡量和评估影响
  - 连接到机构资源和现有计划
  - 通过初步努力或合作伙伴关系展示承诺
  - 与研究计划整合（非附加）

  **NIH意义：**
  - 解决重要问题或关键进展障碍
  - 改进科学知识、技术能力或临床实践
  - 可能导致更好结果、干预或理解
  - 领域先前研究的严谨性
  - 与NIH使命和研究所优先事项一致

  有关详细指导，请参阅`references/broader_impacts.md`。

  ### 5. 创新和变革潜力

  阐明研究的新颖性、创造性和范式转变。

  **要强调的创新元素：**
  - **概念创新**：新框架、模型或理论
  - **方法创新**：新技术、方法或技术
  - **整合创新**：以新方式结合学科或方法
  - **转化创新**：从发现到应用的新路径
  - **规模创新**：前所未有的范围或分辨率

  **写作策略：**
  - 明确陈述什么是创新的（不要假设显而易见）
  - 解释为什么当前方法不足
  - 描述您的创新如何克服限制
  - 提供创新可行的证据（初步数据、概念验证）
  - 区分渐进性和变革性进展
  - 平衡创新与可行性（不过于冒险）

  **常见错误：**
  - 声称新颖性而未展示对先前工作的了解
  - 混淆“对我新”与“对领域新”
  - 过度承诺而无支持证据
  - 过于渐进性（现有工作的微小变化）
  - 过于推测性（无成功路径）

  ### 6. 研究方法和手段

  详细描述研究将如何进行。

  **基本组件：**
  - 整体研究设计和框架
  - 每个目标/目标的详细方法
  - 样本大小、统计能力和分析计划
  - 时间线和活动顺序
  - 数据收集、管理和分析
  - 质量控制和验证方法
  - 潜在问题和替代策略
  - 严谨性和可重复性措施

  **写作策略：**
  - 提供足够细节以实现可重复性和可行性评估
  - 使用子标题和图表改进组织
  - 证明方法和途径的选择
  - 主动解决潜在限制
  - 包括展示可行性的初步数据
  - 显示您已经仔细思考了研究过程
  - 平衡细节与可读性（使用补充材料进行广泛细节）

  **对于实验研究：**
  - 描述实验设计（控制、重复、盲法）
  - 指定材料、试剂和设备
  - 详细数据收集协议
  - 解释统计分析计划
  - 解决严谨性和可重复性

  **对于计算研究：**
  - 描述算法、模型和软件
  - 指定数据集和验证方法
  - 解释所需的计算资源
  - 解决代码可用性和文档
  - 描述基准测试和性能指标

  **对于临床或转化研究：**
  - 描述研究人群和招募
  - 详细干预或治疗方案
  - 解释结果测量和评估
  - 解决监管批准（IRB、IND、IDE）
  - 描述临床试验设计和监测

  有关按学科详细方法论指导，请参阅`references/research_methods.md`。

  ### 7. 初步数据和可行性

  证明研究可实现，团队有能力。

  **目的：**
  - 证明建议的方法可行
  - 显示团队具有必要的专业知识
  - 展示对所需资源的访问
  - 减少评审员感知的风险
  - 为建议的工作提供基础

  **包括什么：**
  - 试点研究或概念验证结果
  - 方法开发或优化
  - 访问独特资源（样本、数据、合作者）
  - 团队的相关出版物
  - 初步模型或模拟
  - 可行性评估或功效计算

  **NIH要求：**
  - R01申请通常需要大量初步数据
  - R21申请可能要求较少
  - 新研究者可能初步数据较少
  - 初步数据应直接支持建议的目标

  **NSF方法：**
  - 初步数据不如NIH常见
  - 对高风险或新颖方法可能重要
  - 可加强竞争性项目的提案

  **写作策略：**
  - 展示最引人注目的支持您方法的数据
  - 清晰连接初步数据与建议目标
  - 承认限制，以及建议工作将如何解决
  - 有效使用图表和数据可视化
  - 避免过度解释或夸大初步发现
  - 展示您研究计划的轨迹

  ### 8. 时间线、里程碑和管理计划

  证明项目规划良好，在建议时间内可实现。

  **基本要素：**
  - 分阶段时间线，带清晰里程碑
  - 逻辑序列和依赖关系
  - 每个活动的现实时间框架
  - 决策点和继续/停止标准
  - 风险缓解策略
  - 跨时间的资源分配
  - 多机构团队的协调计划

  **呈现格式：**
  - 甘特图显示重叠活动
  - 按年细分活动
  - 季度里程碑和交付物
  - 目标/任务表，带时间线和人员

  **写作策略：**
  - 关于可实现内容要现实
  - 为意外延迟或挫折留出时间
  - 显示时间线与预算和人员一致
  - 展示对监管时间线的理解（IRB、IACUC）
  - 包括传播和更广泛影响的时间
  - 解决如何监控和评估进展

  **DARPA强调：**
  - 对DARPA提案特别重要
  - 清晰技术里程碑，带可衡量指标
  - 季度交付物和报告
  - 基于阶段的结构，带退出标准
  - 演示和过渡规划

  有关详细指导，请参阅`references/timeline_planning.md`。

  ### 9. 团队资质和合作

  证明团队具有专业知识、经验和资源以成功。

  **基本要素：**
  - PI资质和相关专业知识
  - 共同研究者和合作者角色及贡献
  - 研究领域的记录
  - 团队互补专业知识
  - 机构支持和资源
  - 先前合作历史（如果适用）
  - 指导和培训计划（针对学生/博士后）

  **写作策略：**
  - 突出最相关的出版物和成就
  - 清晰定义角色和责任
  - 显示团队构成是必要的（非仅方便）
  - 展示成功的先前合作
  - 解决团队将如何管理和协调
  - 解释机构承诺和支持

  **简历 / 履历：**
  - 遵循机构特定格式（NSF、NIH、DOE、DARPA不同）
  - 突出最相关的出版物和成就
  - 包括协同活动和合作
  - 展示轨迹和生产力
  - 解决任何职业缺口或中断

  **合作信：**
  - 具体承诺和贡献
  - 展示真正的伙伴关系
  - 包括资源共享或访问协议
  - 签名并带信头

  有关详细指导，请参阅`references/team_building.md`。

  ### 10. 预算和预算理由

  开发与现实工作和机构指南一致的预算。

  **预算类别**（典型）：
  - **人员**：PI、共同研究者、博士后、学生、员工的工资和福利
  - **设备**：物品 > $5,000（因机构而异）
  - **旅行**：会议、合作、实地工作
  - **材料和供应**：消耗品、试剂、软件
  - **其他直接成本**：出版成本、参与者激励、咨询
  - **间接成本（F&A）**：机构间接费用（费率各异）
  - **子合同**：合作机构的成本

  **机构特定考虑：**

  **NSF：**
  - 需要完整预算理由
  - 成本分担通常不需要（但可加强提案）
  - 教师最多2个月夏季工资
  - 鼓励研究生支持

  **NIH：**
  - 模块化预算，每年直接成本 ≤ $250K（R01）
  - 详细预算，用于 > $250K 或复杂奖项
  - 工资帽适用（2024年约 $221,900）
  - 大多数PI限制为1个月（8.33% FTE）

  **DOE：**
  - 通常需要成本分担（尤其是ARPA-E）
  - 详细预算，带季度细分
  - 需要机构承诺信
  - 国家实验室合作预算分开

  **DARPA：**
  - 按阶段和任务的详细预算
  - 需要大采购的支持成本数据
  - 通常需要成本加或固定价格结构
  - 项目会议旅行预算

  **预算理由写作：**
  - 根据研究计划证明每个项目
  - 解释人员的努力百分比
  - 描述特定设备及为什么必要
  - 证明旅行（会议、合作）
  - 解释咨询角色和费率
  - 显示预算如何与时间线一致

  有关详细预算指导，请参阅`references/budget_preparation.md`。

  ## 机构评审标准

  理解提案如何评估对撰写竞争性申请至关重要。

  ### NSF评审标准

  **智力价值**（主要）：
  - 建议活动推进知识的潜力如何？
  - 建议活动的构思和组织如何良好？
  - 是否有足够的资源访问？
  - 个人、团队或机构进行建议活动的资质如何？

  **更广泛影响**（同等重要）：
  - 建议活动对社会的潜在好处是什么？
  - 提案在多大程度上以有意义的方式解决更广泛影响？

  **额外考虑：**
  - 研究与教育的整合
  - 多样性和包容性
  - 先前NSF支持的结果（如果适用）

  ### NIH评审标准

  **评分标准**（1-9分，1 = 优秀，9 = 差）：

  1. **意义**
     - 解决重要问题或关键障碍
     - 改进科学知识、技术能力或临床实践
     - 与NIH使命一致

  2. **研究者**
     - 适合项目
     - 成就记录
     - 足够的培训和专业知识

  3. **创新**
     - 新颖概念、方法、方法论或干预
     - 挑战现有范式
     - 以创造方式解决重要问题

  4. **方法**
     - 理由充分和适当
     - 严谨和可重复
     - 充分解决潜在问题
     - 在时间线内可行

  5. **环境**
     - 机构支持和资源
     - 科学环境有助于成功概率

  **额外评审考虑**（未评分但讨论）：
  - 人类受试者保护
  - 包括妇女、少数民族和儿童
  - 脊椎动物动物福利
  - 生物危害
  - 重新提交响应（如果适用）
  - 预算和时间线适当性

  ### DOE评审标准

  因项目办公室而异，但通常包括：
  - 科学和/或技术价值
  - 建议方法或途径的适当性
  - 人员能力和设施充分性
  - 预算的合理性和适当性
  - 与DOE使命和项目目标的相关性

  ### DARPA评审标准

  **DARPA特定考虑：**
  - 整体科学和技术价值
  - 对DARPA使命的潜在贡献
  - 与陈述项目目标的相关性
  - 完成技术过渡的计划和能力
  - 建议团队的资质和经验
  - 建议成本的现实性和资金可用性

  **DARPA关键问题：**
  - **如果成功会怎样？**（研究成功的影响）
  - **如果正确会怎样？**（您假设的含义）
  - **谁在乎？**（为什么对国家安全重要）

  有关详细机构评审标准，请参阅`references/review_criteria.md`。

  ## 竞争性提案的写作原则

  ### 清晰度和可访问性

  **为多种受众写作：**
  - 您领域的技术评审员（将审查方法）
  - 相关但非相同领域的评审员（需要背景）
  - 项目官员（寻找与机构目标一致）
  - 阅读15+提案的小组成员（需要清晰组织）

  **策略：**
  - 使用清晰部分标题和子标题
  - 以概述段落开始部分
  - 定义技术术语和缩写
  - 使用图表、图解和表格澄清复杂想法
  - 尽可能避免行话；必要时解释
  - 使用主题句引导读者

  ### 说服性论证

  **构建引人入胜的叙述：**
  - 建立问题及其重要性
  - 展示当前知识或方法的缺口
  - 呈现您的解决方案为创新和可行
  - 证明您是合适的团队
  - 显示成功将具有显著影响

  **说服结构：**
  1. **钩子**：以意义吸引注意力
  2. **问题**：建立未知或无效的内容
  3. **解决方案**：呈现您的创新途径
  4. **证据**：用初步数据支持
  5. **影响**：显示变革潜力
  6. **团队**：展示交付能力

  **语言选择：**
  - 使用主动语态以求清晰和自信
  - 选择强动词（调查、阐明、发现 vs. 看、研究）
  - 自信但不傲慢（避免“显然”、“清晰”）
  - 适当承认不确定性
  - 使用精确语言（避免模糊术语如“几个”、“各种”）

  ### 视觉传达

  **有效使用图表：**
  - 概念图展示研究框架
  - 初步数据展示可行性
  - 时间线和甘特图
  - 工作流程图展示方法论
  - 预期结果或预测

  **设计原则：**
  - 使用完整说明使图表自解释
  - 使用一致颜色方案和字体
  - 确保可读性（字体足够大、清晰标签）
  - 整合图表与文本（引用特定图表）
  - 遵循机构特定格式要求

  ### 解决风险和可行性

  **平衡创新与风险：**
  - 承认潜在挑战
  - 提供替代方法
  - 展示降低风险的初步数据
  - 展示处理挑战的专业知识
  - 包括应急计划

  **常见担忧：**
  - 对时间线/预算过于雄心勃勃
  - 技术上不可行
  - 团队缺乏必要专业知识
  - 初步数据不足
  - 方法未充分描述
  - 缺乏创新或意义

  ### 整合和连贯性

  **确保所有部分一致：**
  - 预算支持项目描述中的活动
  - 时间线与目标和里程碑匹配
  - 团队构成匹配所需专业知识
  - 更广泛影响连接到研究计划
  - 支持信确认陈述的合作

  **避免矛盾：**
  - 初步数据 vs. 陈述缺口
  - 声称专业知识 vs. 出版物记录
  - 陈述目标 vs. 实际方法
  - 预算 vs. 陈述活动

  ## 常见提案类型

  ### NSF提案类型

  - **标准研究提案**：最常见，最多$500K和5年
  - **CAREER奖项**：早期职业教师，整合研究/教育，5年$400-500K
  - **合作研究**：多个机构，分开提交，共享研究计划
  - **RAPID**：紧急研究机会，最多$200K，无需初步数据
  - **EAGER**：高风险、高回报探索性研究，最多$300K
  - **早期概念探索研究资助（EAGER）**：早期阶段探索工作

  ### NIH奖项机制

  - **R01**：研究项目资助，每年$250K+，3-5年，最常见
  - **R21**：探索/发展研究，2年最多$275K，无需初步数据
  - **R03**：小资助计划，2年最多$100K
  - **R15**：学术研究增强奖（AREA），针对 primarily undergraduate 机构
  - **R35**：MIRA（最大化研究者研究奖），项目特定
  - **P01**：项目项目资助，多项目整合研究
  - **U01**：研究项目合作协议，NIH参与执行

  **奖学金机制：**
  - **F30**：预博士MD/PhD奖学金
  - **F31**：预博士奖学金
  - **F32**：博士后奖学金
  - **K99/R00**：独立路径奖
  - **K08**：指导临床科学家研究职业发展奖

  ### DOE项目

  - **科学办公室**：物理科学、生物科学、计算的基础研究
  - **ARPA-E**：变革性能源技术，需要成本分担
  - **EERE**：可再生能源和能源效率的应用研究
  - **国家实验室**：与DOE实验室的合作研究

  ### DARPA项目

  - **因办公室而异**：BTO、DSO、I2O、MTO、STO、TTO
  - **项目特定BAAs**：广泛机构公告针对特定方向
  - **年轻教师奖（YFA）**：早期职业研究者，最多$500K
  - **主任奖学金**：高风险、范式转变研究

  有关详细项目指导，请参阅`references/funding_mechanisms.md`。

  ## 重新提交策略

  ### NIH重新提交（A1）

  **重新提交介绍**（1页）：
  - 总结先前评审的主要批评
  - 描述响应所做的具体更改
  - 使用要点以求清晰
  - 尊重评审员意见
  - 突出实质性改进

  **策略：**
  - 解决每一个主要批评
  - 使更改可见（但最终不要使用跟踪更改）
  - 加强薄弱领域（初步数据、方法、意义）
  - 如果从根本上缺陷，考虑更改目标
  - 在重新提交前获得外部反馈
  - 如果需要新数据，使用完整的37个月窗口

  **何时不重新提交：**
  - 基本概念缺陷
  - 缺乏创新或意义
  - 缺少关键专业知识或资源
  - 需要广泛修订（考虑新提交）

  ### NSF重新提交

  **NSF允许修订后重新提交：**
  - 在修订提案中解决评审员关切
  - 无正式的“重新提交介绍”部分
  - 可能由相同或不同小组评审
  - 考虑项目官员反馈
  - 可能需要等待下一个提交周期

  有关详细重新提交指导，请参阅`references/resubmission_strategies.md`。

  ## 常见错误避免

  ### 概念错误

  1. **未能解决评审标准**：未明确讨论意义、创新、方法等
  2. **与机构使命不匹配**：建议研究与机构目标不一致
  3. **意义不清晰**：未能阐明为什么研究重要
  4. **创新不足**：渐进性工作呈现为变革性
  5. **模糊目标**：目标不具体或不可衡量

  ### 写作错误

  1. **组织差**：缺乏清晰结构和流程
  2. **行话过多**：对更广泛评审小组不可访问
  3. **冗长**：不必要复杂或冗长的写作
  4. **缺少上下文**：假设评审员深刻了解您的领域
  5. **术语不一致**：对相同概念使用不同术语

  ### 技术错误

  1. **方法不足**：细节不足以判断可行性
  2. **过于雄心勃勃**：对时间线/预算提出过多
  3. **无初步数据**：对于需要展示可行性的机制
  4. **时间线差**：不现实或理由不足的时间表
  5. **预算不匹配**：预算不支持建议活动

  ### 格式错误

  1. **超过页面限制**：自动拒绝
  2. **错误字体或边距**：不合规格式
  3. **缺少必需部分**：不完整申请
  4. **图表质量差**：难以辨认或不专业的图表
  5. **引用不一致**：参考文献格式错误

  ### 战略错误

  1. **错误项目或机制**：建议到不适当的机会
  2. **团队弱**：专业知识不足或缺少关键合作者
  3. **无更广泛影响**：对于NSF，未能充分解决
  4. **忽视项目优先事项**：未与当前重点领域一致
  5. **迟交**：技术问题或匆忙准备

  ## 基金开发工作流

  ### 阶段1：规划和准备（截止日期前2-6个月）

  **活动：**
  - 识别适当资金机会
  - 审查项目公告和要求
  - 咨询项目官员（如果适当）
  - 组建团队并确认合作
  - 开发初步数据（如果需要）
  - 概述研究计划和具体目标
  - 审查成功提案（如果可用）

  **输出：**
  - 选择的资金机会
  - 组建的团队，定义角色
  - 具体目标的初步大纲
  - 所需初步数据的缺口分析

  ### 阶段2：起草（截止日期前2-3个月）

  **活动：**
  - 撰写具体目标或目标（从这里开始！）
  - 开发项目描述/研究策略
  - 创建图表和数据可视化
  - 起草时间线和里程碑
  - 准备初步预算
  - 撰写更广泛影响或意义部分
  - 请求支持信/合作信

  **输出：**
  - 叙述部分的完整初稿
  - 带理由的初步预算
  - 时间线和管理计划
  - 来自合作者的请求信

  ### 阶段3：内部审查（截止日期前1-2个月）

  **活动：**
  - 将草稿分发给共同研究者
  - 寻求同事和导师的反馈
  - 请求机构审查（如果需要）
  - 模拟评审会议（如果可能）
  - 基于反馈修订
  - 精炼预算和预算理由

  **输出：**
  - 包含反馈的修订草稿
  - 与修订计划一致的精致预算
  - 识别的弱点和缓解策略

  ### 阶段4：最终确定（截止日期前2-4周）

  **活动：**
  - 叙述的最终修订
  - 准备所有必需表格和文档
  - 最终确定预算和预算理由
  - 编译简历、履历和当前 & 待定
  - 收集支持信
  - 准备数据管理计划（如果需要）
  - 撰写项目摘要/摘要
  - 校对所有材料

  **输出：**
  - 完整、精炼的提案
  - 所有必需补充文档
  - 根据机构要求格式化

  ### 阶段5：提交（截止日期前1周）

  **活动：**
  - 机构审查和批准
  - 上传到提交门户
  - 验证所有文档和格式
  - 截止日期前24-48小时提交
  - 确认成功提交
  - 接收确认和提案编号

  **输出：**
  - 提交的提案
  - 提交确认
  - 所有材料的存档副本

  **关键提示**：永远不要等到截止日期。门户崩溃、文件损坏，紧急情况发生。目标提前48小时。

