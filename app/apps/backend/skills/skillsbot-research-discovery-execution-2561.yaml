  ```
  标准搜索：
  - 日期范围：最近2年
  - 最大结果：每个来源100
  - 最小相关性：0.7

  快速搜索：
  - 日期范围：最近6个月
  - 最大结果：每个来源50
  - 最小相关性：0.8

  全面搜索：
  - 日期范围：最近5年
  - 最大结果：每个来源200
  - 最小相关性：0.6
  ```

