  ## 工作流程

  遵循此系统性过程以生成稳健的科学假设：

  ### 1. 理解现象

  首先澄清需要解释的观察、问题或现象：

  - 识别需要解释的核心观察或模式
  - 定义现象的范围和边界
  - 注意任何约束或特定上下文
  - 澄清已知与未知的内容
  - 识别相关科学领域

  ### 2. 进行全面的文献搜索

  搜索现有科学文献以将假设基于当前证据。使用 PubMed（用于生物医学主题）和一般网络搜索（用于更广泛的科学领域）：

  **对于生物医学主题：**

  - 使用 WebFetch 与 PubMed URL 访问相关文献
  - 搜索最近的综述、元分析和主要研究
  - 寻找类似现象、相关机制或类似系统

  **对于所有科学领域：**

  - 使用 WebSearch 查找最近的论文、预印本和综述
  - 搜索已建立的理论、机制或框架
  - 识别当前理解中的空白

  **搜索策略：**

  - 从广泛搜索开始以了解情况
  - 缩小到特定机制、路径或理论
  - 寻找矛盾发现或未解决的争议
  - 查阅 `references/literature_search_strategies.md` 获取详细搜索技术

  ### 3. 合成现有证据

  分析和整合文献搜索的发现：

  - 总结现象的当前理解
  - 识别可能适用的已建立机制或理论
  - 注意矛盾证据或替代观点
  - 认识空白、局限性或未回答问题
  - 识别来自相关系统或领域的类比

  ### 4. 生成竞争性假设

  开发 3-5 个可以解释现象的不同假设。每个假设应：

  - 提供机制解释（不仅仅是描述）
  - 与其他假设可区分
  - 基于文献合成的证据
  - 考虑不同层次的解释（分子、细胞、系统、群体等）

  **生成假设的策略：**

  - 应用来自类似系统的已知机制
  - 考虑多个因果路径
  - 探索不同规模的解释
  - 质疑现有解释中的假设
  - 以新颖方式组合机制

  ### 5. 评估假设质量

  根据 `references/hypothesis_quality_criteria.md` 中的质量标准评估每个假设：

  **可测试性：** 假设是否可以经验测试？
  **可证伪性：** 什么观察会证伪它？
  **简洁性：** 它是否是最简单的解释符合证据？
  **解释力：** 它解释了多少现象？
  **范围：** 它覆盖了哪些观察范围？
  **一致性：** 是否与已建立原则一致？
  **新颖性：** 是否提供了超越现有解释的新见解？

  明确注意每个假设的优缺点。

  ### 6. 设计实验测试

  对于每个可行的假设，提出具体实验或研究来测试它。查阅 `references/experimental_design_patterns.md` 获取常见方法：

  **实验设计元素：**

  - 将测量或观察什么？
  - 需要什么比较或控制？
  - 将使用什么方法或技术？
  - 什么样本大小或统计方法是合适的？
  - 潜在混淆因素是什么以及如何解决？

  **考虑多种方法：**

  - 实验室实验（体外、体内、计算）
  - 观察性研究（横断面、纵向、病例对照）
  - 临床试验（如果适用）
  - 自然实验或准实验设计

  ### 7. 制定可测试预测

  对于每个假设，生成具体、定量的预测：

  - 陈述如果假设正确应该观察到什么
  - 尽可能指定预期效应的方向和大小
  - 识别预测应成立的条件
  - 区分竞争性假设之间的预测
  - 注意会证伪假设的预测

  ### 8. 呈现结构化输出

  使用 `assets/hypothesis_report_template.tex` 中的模板生成专业的 LaTeX 文档。报告应格式良好，带有彩色框用于视觉组织，并分为简洁的主文本和全面的附录。

  **文档结构：**

  **主文本（最多 4 页）：**

  1. **执行摘要** - 摘要框中的简要概述（0.5-1 页）
  2. **竞争性假设** - 每个假设在自己的彩色框中，带有简要机制解释和关键证据（2-2.5 页用于 3-5 个假设）
     - **重要：** 在每个假设框前使用 `\newpage` 以防止内容溢出
     - 每个框应 ≤0.6 页最大
  3. **可测试预测** - 关键预测在琥珀色框中（0.5-1 页）
  4. **关键比较** - 优先比较框（0.5-1 页）

  保持主文本高度简洁 - 仅包含最基本的信息。所有细节都放入附录。

  **页面断点策略：**

  - 始终在假设框前使用 `\newpage` 以确保它们从新页面开始
  - 这防止内容溢出页面边界
  - LaTeX 框（tcolorbox）不会自动跨页面断行

  **附录（全面、详细）：**

  - **附录 A：** 全面文献综述，带有广泛引用
  - **附录 B：** 详细实验设计，带有完整协议
  - **附录 C：** 质量评估表和详细评估
  - **附录 D：** 补充证据和类似系统

  **彩色框使用：**

  使用 `hypothesis_generation.sty` 中的自定义框环境：

  - `hypothesisbox1` 到 `hypothesisbox5` - 用于每个竞争性假设（蓝色、绿色、紫色、青色、橙色）
  - `predictionbox` - 用于可测试预测（琥珀色）
  - `comparisonbox` - 用于关键比较（钢灰色）
  - `evidencebox` - 用于支持证据亮点（浅蓝色）
  - `summarybox` - 用于执行摘要（蓝色）

  **每个假设框应包含（保持简洁以符合 4 页限制）：**

  - **机制解释：** 1-2 简要段落（最多 6-10 句）解释如何和为什么
  - **关键支持证据：** 2-3 个要点带有引用（仅最重要证据）
  - **核心假设：** 1-2 个关键假设

  所有详细解释、额外证据和全面讨论都属于附录。

  **关键溢出预防：**

  - 在每个假设框前插入 `\newpage` 以从新页面开始
  - 保持每个完整假设框 ≤0.6 页（约 15-20 行内容）
  - 如果内容超过此限制，将额外细节移至附录 A
  - 绝不让框溢出页面边界 - 这会创建不可读的 PDF

  **引用要求：**

  目标广泛引用以支持所有声明：

  - **主文本：** 仅用于最重要证据的 10-15 个关键引用（保持简洁以符合 4 页限制）
  - **附录 A：** 40-70+ 全面引用覆盖所有相关文献
  - **总目标：** 参考文献中 50+ 引用

  主文本引用应具有选择性 - 仅引用最关键的论文。所有全面引用和详细文献讨论都属于附录。使用 `\citep{author2023}` 进行括号引用。

  **LaTeX 编译：**

  模板需要 XeLaTeX 或 LuaLaTeX 以正确渲染：

  ```bash
  xelatex hypothesis_report.tex
  bibtex hypothesis_report
  xelatex hypothesis_report.tex
  xelatex hypothesis_report.tex
  ```

  **所需包：** `hypothesis_generation.sty` 样式包必须在相同目录或 LaTeX 路径中。它需要：tcolorbox, xcolor, fontspec, fancyhdr, titlesec, enumitem, booktabs, natbib。

  **页面溢出预防：**

  为防止内容溢出页面，遵循这些关键指导：

  1. **监控框内容长度：** 每个假设框应舒适地适应单个页面。如果内容超过约 0.7 页，可能会溢出。

  2. **使用战略页面断点：** 在包含大量内容的框前插入 `\newpage`：

     ```latex
     \newpage
     \begin{hypothesisbox1}[假设 1: 标题]
     % 长内容在此
     \end{hypothesisbox1}
     ```

  3. **保持主文本框简洁：** 对于 4 页主文本限制：
     - 每个假设框：最大 0.5-0.6 页
     - 机制解释：仅 1-2 简要段落（最多 6-10 句）
     - 关键证据：仅 2-3 个要点
     - 核心假设：仅 1-2 项
     - 如果内容更长，将细节移至附录

  4. **分割长内容：** 如果一个假设需要广泛解释，分割到主文本和附录：
     - 主文本框：简要机制概述 + 2-3 个关键证据点
     - 附录 A：详细机制解释、全面证据、扩展讨论

  5. **测试页面边界：** 在每个新框前，考虑剩余页面空间是否足够。如果少于 0.6 页，使用 `\newpage` 从新页面开始框。

  6. **附录页面管理：** 在附录中，在主要部分之间使用 `\newpage` 以避免在详细内容区域溢出。

  **快速参考：** 参阅 `assets/FORMATTING_GUIDE.md` 获取所有框类型、颜色方案和常见格式化模式的详细示例。

  ## 质量标准

  确保所有生成的假设满足这些标准：

  - **基于证据：** 基于现有文献带有引用
  - **可测试：** 包括具体、可测量的预测
  - **机制性：** 解释如何/为什么，不仅仅是什么
  - **全面：** 考虑替代解释
  - **严谨：** 包括实验设计以测试预测

  ## 资源

  ### references/

  - `hypothesis_quality_criteria.md` - 评估假设质量的框架（可测试性、可证伪性、简洁性、解释力、范围、一致性）
  - `experimental_design_patterns.md` - 跨领域的常见实验方法（RCTs、观察性研究、实验室实验、计算模型）
  - `literature_search_strategies.md` - 用于 PubMed 和一般科学源的有效搜索技术

  ### assets/

  - `hypothesis_generation.sty` - LaTeX 样式包提供彩色框、专业格式和假设报告的自定义环境
  - `hypothesis_report_template.tex` - 完整 LaTeX 模板，带有主文本结构和全面附录部分
  - `FORMATTING_GUIDE.md` - 快速参考指南，带有所有框类型、颜色方案、引用实践和故障排除提示的示例

