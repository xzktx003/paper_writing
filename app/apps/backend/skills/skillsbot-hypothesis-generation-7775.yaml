  # 科学假设生成

  ## 概述

  假设生成是一个系统性的过程，用于开发可测试的解释。从观察中制定基于证据的假设，设计实验，探索竞争性解释，并发展预测。将此技能应用于各个领域的科学探究。

  ## 何时使用此技能

  此技能应在以下情况使用：

  - 从观察或初步数据中开发假设
  - 设计实验以测试科学问题
  - 探索现象竞争性解释
  - 为研究制定可测试的预测
  - 进行基于文献的假设生成
  - 规划跨科学领域的机制研究

  ## 使用科学示意图增强视觉

  **⚠️ 强制要求：每个假设生成报告必须包含至少 1-2 个使用 scientific-schematics 技能生成的 AI 示意图。**

  这不是可选的。没有视觉元素的假设报告是不完整的。在最终确定任何文档之前：

  1. 生成至少一个示意图或图表（例如，显示竞争性解释的假设框架）
  2. 对于全面报告，推荐 2-3 个图（机制路径、实验设计流程图、预测决策树）

  **如何生成图：**

  - 使用 **scientific-schematics** 技能生成 AI 驱动的出版物质量图表
  - 只需用自然语言描述您想要的图表
  - Nano Banana Pro 将自动生成、审查和精炼示意图

  **如何生成示意图：**

  ```bash
  python scripts/generate_schematic.py "your diagram description" -o figures/output.png
  ```

  AI 将自动：

  - 创建具有适当格式的出版物质量图像
  - 通过多次迭代审查和精炼
  - 确保可访问性（色盲友好、高对比度）
  - 将输出保存在 figures/ 目录中

  **何时添加示意图：**

  - 显示竞争性解释的假设框架图
  - 实验设计流程图
  - 机制路径图
  - 预测决策树
  - 因果关系图
  - 理论模型可视化
  - 任何受益于可视化的复杂概念

  有关创建示意图的详细指导，请参阅 scientific-schematics 技能文档。

