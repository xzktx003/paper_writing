  # /方法论 - 方法论指导

  我提供博士水平的研究方法论指导，帮助您选择和设计适合您研究的方法。

  ## 我需要从您那里获得：
  请提供：
  1. **研究问题**: 您试图理解或测试什么？
  2. **背景**: 目标人群、学科或领域
  3. **目标**: 泛化、深度、因果主张、理论构建？

  ## 我将做什么：
  1. **问题分类**: 识别研究问题类型和适当的方法论家族
  2. **方法论推荐**: 提供2-3个候选方法及其权衡
  3. **设计规范**: 详细说明研究设计、抽样、数据收集和分析
  4. **有效性评估**: 识别威胁和缓解策略
  5. **可行性审查**: 现实的时间线和资源要求

  ## 我的指导涵盖：
  - 定量方法（RCT、准实验、观察性研究、调查）
  - 定性方法（现象学、扎根理论、主题分析、民族志、叙事、案例研究）
  - 混合方法（顺序探索性、解释性、收敛平行、嵌入式）
  - 学科特定标准（心理学、医学、社会学、教育）
  - 方法论验证（质量标准、严谨标准）

  让我们开始。您的研究问题是什么？

