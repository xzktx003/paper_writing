  # 统计报告格式化技能

  ## 目的

  按照APA、期刊和学科特定的报告标准格式化统计结果以供发表。

  ## 能力

  - 格式化测试结果
  - 应用APA格式
  - 生成表格
  - 报告效应量
  - 包含置信区间
  - 检查完整性

  ## 使用指南

  1. 输入统计输出
  2. 选择报告标准
  3. 格式化结果
  4. 生成表格
  5. 审查完整性
  6. 导出格式化文本

  ## 流程整合

  在科学发现工作流程中用于：
  - 结果报告
  - 手稿准备
  - 表格生成
  - 合规性检查

  ## 配置

  - 报告标准
  - 小数精度
  - 表格格式
  - 输出样式

  ## 输出成果

  - 格式化统计信息
  - 发表用表格
  - 文内引用
  - 合规性报告
