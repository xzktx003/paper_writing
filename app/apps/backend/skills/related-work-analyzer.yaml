  # 相关工作分析器

  ## 目的

  为理论计算机科学论文提供分析和整理相关工作的专家指导。

  ## 能力

  - 引文网络分析
  - 技术分类
  - 结果对比表
  - 缺口识别
  - 时间线可视化
  - 跨领域连接识别

  ## 使用指南

  1.  **文献检索**：搜索相关论文
  2.  **分类**：按技术/贡献整理论文
  3.  **对比**：构建对比表
  4.  **缺口分析**：识别文献中的空白
  5.  **定位**：将自身贡献相对于先前工作进行定位

  ## 工具/库

  - Semantic Scholar
  - DBLP
  - Google Scholar
  - 引文分析工具
