content: |
  # CCF Literature Searcher

  ## Overview
  Systematic literature search engine for academic research. Finds related work, prior art, datasets, benchmarks, and identifies research gaps.

  ## Search Dimensions
  - Related work and prior art
  - Datasets and benchmarks
  - Open problems and gaps
  - Competitor analysis

  ## Output
  - Curated literature list with relevance scores
  - Screening rationale
  - Related work structure outline
  - Opportunity/evidence gap map
