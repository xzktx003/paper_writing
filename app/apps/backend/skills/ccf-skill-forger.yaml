content: |
  # CCF Skill Forger

  ## Overview
  Development and maintenance tool for the CCFA skill family. Creates new skills, manages naming, generates documentation and diagrams, runs validation, and publishes releases.

  ## Capabilities
  - New skill scaffolding
  - Naming convention enforcement
  - Documentation generation
  - SVG diagram building
  - Validation script execution
  - Release publishing

  ## Usage
  ```
  forge:create <skill-name>  - Create a new skill
  forge:validate              - Run all validation checks
  forge:docs                  - Generate documentation
  forge:release               - Publish new version
  ```
