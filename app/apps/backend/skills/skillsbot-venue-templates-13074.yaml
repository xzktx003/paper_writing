  ## 模板类别

  ### 按文档类型

  | 类别 | 模板数量 | 常见场馆 |
  |----------|---------------|---------------|
  | **期刊文章** | 30+ | Nature、Science、PLOS、IEEE、ACM、Cell Press |
  | **会议论文** | 20+ | NeurIPS、ICML、CVPR、CHI、ISMB |
  | **研究海报** | 10+ | A0、A1、36×48、各种包 |
  | **资助提案** | 15+ | NSF、NIH、DOE、DARPA、基金会 |

  ### 按学科

  | 学科 | 支持的场馆 |
  |------------|------------------|
  | **生命科学** | Nature、Cell Press、PLOS、ISMB、RECOMB |
  | **物理科学** | Science、Physical Review、ACS、APS |
  | **工程学** | IEEE、ASME、AIAA、ACM |
  | **计算机科学** | ACM、IEEE、NeurIPS、ICML、ICLR |
  | **医学** | NEJM、Lancet、JAMA、BMJ |
  | **跨学科** | PNAS、Nature Communications、Science Advances |

  ## 辅助脚本

  ### query_template.py

  按场馆名称、类型或关键词搜索和检索模板：

  ```bash
  # 查找特定期刊的模板
  python scripts/query_template.py --venue "Nature" --type "article"

  # 按关键词搜索
  python scripts/query_template.py --keyword "机器学习"

  # 列出所有可用模板
  python scripts/query_template.py --list-all

  # 获取场馆要求
  python scripts/query_template.py --venue "NeurIPS" --requirements
  ```

  ### customize_template.py

  用作者和项目信息自定义模板：

  ```bash
  # 基本自定义
  python scripts/customize_template.py \
    --template assets/journals/nature_article.tex \
    --output my_paper.tex

  # 带作者信息
  python scripts/customize_template.py \
    --template assets/journals/nature_article.tex \
    --title "蛋白质折叠的新方法" \
    --authors "Jane Doe、John Smith、Alice Johnson" \
    --affiliations "MIT、Stanford、Harvard" \
    --email "example@email.com" \
    --output my_paper.tex

  # 交互模式
  python scripts/customize_template.py --interactive
  ```

  ### validate_format.py

  检查文档符合场馆要求：

  ```bash
  # 验证已编译的PDF
  python scripts/validate_format.py \
    --file my_paper.pdf \
    --venue "Nature" \
    --check-all

  # 检查特定方面
  python scripts/validate_format.py \
    --file my_paper.pdf \
    --venue "NeurIPS" \
    --check page-count,margins,fonts

  # 生成验证报告
  python scripts/validate_format.py \
    --file my_paper.pdf \
    --venue "Science" \
    --report validation_report.txt
  ```

  ## 最佳实践

  ### 模板选择
  1. **验证时效性**：检查模板日期并与最新作者指南比较
  2. **检查官方来源**：许多期刊提供官方LaTeX类
  3. **测试编译**：在添加内容前编译模板
  4. **阅读注释**：模板包括有用的内联注释

  ### 自定义
  1. **保持结构**：不要删除必需的部分或包
  2. **遵循占位符**：系统地替换标记的占位符文本
  3. **保持格式**：不要覆盖场馆特定格式
  4. **保持备份**：在自定义前保存原始模板

  ### 合规性
  1. **检查页数限制**：在最终提交前验证
  2. **验证引用**：使用场馆的正确引用样式
  3. **测试图表**：确保图表满足分辨率要求
  4. **审查匿名化**：如果要求，删除识别信息

  ### 提交
  1. **遵循说明**：阅读完整的作者指南
  2. **包括所有文件**：LaTeX源、图表、参考文献
  3. **正确生成**：使用推荐的编译方法
  4. **检查输出**：验证PDF符合预期

  ## 常见格式要求

  ### 页数限制（典型）

  | 场馆类型 | 典型限制 | 备注 |
  |------------|---------------|-------|
  | **Nature文章** | 5页 | ~3000字，不包括引用 |
  | **Science报告** | 5页 | 图表计入限制 |
  | **PLOS ONE** | 无限制 | 无长度限制 |
  | **NeurIPS** | 8页 | + 无限引用/附录 |
  | **ICML** | 8页 | + 无限引用/附录 |
  | **NSF提案** | 15页 | 仅项目描述 |
  | **NIH R01** | 12页 | 研究策略 |

  ### 按场馆的引用样式

  | 场馆 | 引用样式 | 格式 |
  |-------|---------------|--------|
  | **Nature** | 编号（上标） | Nature样式 |
  | **Science** | 编号（上标） | Science样式 |
  | **PLOS** | 编号（括号） | Vancouver |
  | **Cell Press** | 作者-年份 | Cell样式 |
  | **ACM** | 编号 | ACM样式 |
  | **IEEE** | 编号（括号） | IEEE样式 |
  | **APA期刊** | 作者-年份 | APA 7th |

  ### 图表要求

  | 场馆 | 分辨率 | 格式 | 颜色 |
  |-------|-----------|--------|-------|
  | **Nature** | 300+ dpi | TIFF、EPS、PDF | RGB或CMYK |
  | **Science** | 300+ dpi | TIFF、PDF | RGB |
  | **PLOS** | 300-600 dpi | TIFF、EPS | RGB |
  | **IEEE** | 300+ dpi | EPS、PDF | RGB或灰度 |

  ## 写作风格指南

  除了格式外，此技能提供全面的**写作风格指南**，捕获不同场馆论文应如何*阅读*—不仅仅是它们应如何*看*。

  ### 为什么风格重要

  相同研究在Nature中写的与在NeurIPS中写的非常不同：
  - **Nature/Science**：非专家可访问，故事驱动，广泛重要性
  - **Cell Press**：机制深度，全面数据，需要图形摘要
  - **医学期刊**：以患者为中心，证据分级，结构化摘要
  - **ML会议**：贡献要点、消融研究、可重复性焦点
  - **CS会议**：领域特定惯例，不同评估标准

  ### 可用风格指南

  | 指南 | 覆盖 | 关键主题 |
  |-------|--------|------------|
  | `venue_writing_styles.md` | 主概述 | 风格谱系、快速参考 |
  | `nature_science_style.md` | Nature、Science、PNAS | 可访问性、故事讲述、广泛影响 |
  | `cell_press_style.md` | Cell、Neuron、Immunity | 图形摘要、eTOC、亮点 |
  | `medical_journal_styles.md` | NEJM、Lancet、JAMA、BMJ | 结构化摘要、证据语言 |
  | `ml_conference_style.md` | NeurIPS、ICML、ICLR、CVPR | 贡献要点、消融研究 |
  | `cs_conference_style.md` | ACL、EMNLP、CHI、SIGKDD | 领域特定惯例 |
  | `reviewer_expectations.md` | 所有场馆 | 评审员寻找什么、反驳技巧 |

  ### 写作示例

  具体示例可在`assets/examples/`中找到：
  - `nature_abstract_examples.md`：高影响力期刊的流动段落摘要示例
  - `neurips_introduction_example.md`：ML会议介绍示例，带有贡献要点
  - `cell_summary_example.md`：Cell Press摘要、亮点、eTOC格式示例
  - `medical_structured_abstract.md`：NEJM、Lancet、JAMA结构化格式示例

  ### 工作流程：适应场馆

  1. **确定目标场馆**并加载适当的风格指南
  2. **查看写作惯例**：语气、声音、摘要格式、结构
  3. **检查示例**以获取部分特定指导
  4. **查看期望**：该场馆评审员优先考虑什么？
  5. **应用格式**：使用来自`assets/`的LaTeX模板

