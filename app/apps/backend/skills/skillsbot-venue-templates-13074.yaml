  # 场馆模板

  ## 概述

  访问全面的LaTeX模板、格式要求和提交指南，适用于主要科学出版物场馆、学术会议、研究海报和资助提案。此技能提供即用模板和详细规范，用于跨学科成功学术提交。

  使用此技能于准备期刊提交的手稿、会议论文、研究海报或资助提案时，需要场馆特定的格式要求和模板。

  ## 使用时机

  此技能应用于：
  - 准备提交给特定期刊的手稿（Nature、Science、PLOS、IEEE等）
  - 编写具有特定格式要求的会议论文（NeurIPS、ICML、CHI等）
  - 为会议创建学术研究海报
  - 起草联邦机构（NSF、NIH、DOE、DARPA）或私人基金会的资助提案
  - 检查目标场馆的格式要求和页数限制
  - 用作者信息和项目详情自定义模板
  - 验证文档符合场馆规范

  ## 用科学图表增强视觉效果

  **使用此技能创建文档时，始终考虑添加科学图表和示意图以增强视觉沟通。**

  如果文档不包含示意图或图表：
  - 使用**科学示意图**技能生成AI驱动的出版物质量图表
  - 只需用自然语言描述所需图表
  - Nano Banana Pro将自动生成、审核和优化示意图

  **对于新文档：** 默认应生成科学示意图，以可视化表示文本中描述的关键概念、工作流程、架构或关系。

  **如何生成示意图：**
  ```bash
  python scripts/generate_schematic.py "您的图表描述" -o figures/output.png
  ```

  AI将自动：
  - 创建具有适当格式的出版物质量图像
  - 通过多次迭代审核和优化
  - 确保可访问性（色盲友好、高对比度）
  - 保存输出在figures/目录中

  **何时添加示意图：**
  - 论文的方法流程图
  - 概念框架图
  - 系统架构图示
  - 数据流程图
  - 实验设计可视化
  - 研究工作流程图
  - 任何从可视化中受益的复杂概念

  有关创建示意图的详细指导，请参考科学示意图技能文档。

  ---

  ## 核心能力

  ### 1. 期刊文章模板

  访问50+主要科学期刊的LaTeX模板和格式指南：

  **自然期刊组合：**
  - Nature、Nature Methods、Nature Biotechnology、Nature Machine Intelligence
  - Nature Communications、Nature Protocols
  - Scientific Reports

  **科学系列：**
  - Science、Science Advances、Science Translational Medicine
  - Science Immunology、Science Robotics

  **PLOS（公共科学图书馆）：**
  - PLOS ONE、PLOS Biology、PLOS Computational Biology
  - PLOS Medicine、PLOS Genetics

  **细胞出版社：**
  - Cell、Neuron、Immunity、Cell Reports
  - Molecular Cell、Developmental Cell

  **IEEE出版物：**
  - IEEE Transactions（各种学科）
  - IEEE Access、IEEE Journal模板

  **ACM出版物：**
  - ACM Transactions、Communications of the ACM
  - ACM会议论文集

  **其他主要出版商：**
  - Springer期刊（各种学科）
  - Elsevier期刊（自定义模板）
  - Wiley期刊
  - BMC期刊
  - Frontiers期刊

  ### 2. 会议论文模板

  会议特定模板，适用于主要学术会议的适当格式：

  **机器学习与AI：**
  - NeurIPS（神经信息处理系统）
  - ICML（国际机器学习会议）
  - ICLR（国际学习表示会议）
  - CVPR（计算机视觉与模式识别）
  - AAAI（人工智能促进协会）

  **计算机科学：**
  - ACM CHI（人机交互）
  - SIGKDD（知识发现与数据挖掘）
  - EMNLP（自然语言处理经验方法）
  - SIGIR（信息检索）
  - USENIX会议

  **生物学与生物信息学：**
  - ISMB（智能分子生物学系统）
  - RECOMB（计算分子生物学研究）
  - PSB（太平洋生物计算研讨会）

  **工程学：**
  - IEEE会议模板（各种学科）
  - ASME、AIAA会议

  ### 3. 研究海报模板

  学术海报模板，用于会议演示：

  **标准格式：**
  - A0（841 × 1189 mm / 33.1 × 46.8 英寸）
  - A1（594 × 841 mm / 23.4 × 33.1 英寸）
  - 36" × 48"（914 × 1219 mm）- 常见美国尺寸
  - 42" × 56"（1067 × 1422 mm）
  - 48" × 36"（横向方向）

  **模板包：**
  - **beamerposter**：经典学术海报模板
  - **tikzposter**：现代、多彩海报设计
  - **baposter**：结构化多列布局

  **设计特点：**
  - 远处可读性的最佳字体大小
  - 配色方案（色盲安全调色板）
  - 网格布局和列结构
  - 二维码集成用于补充材料

  ### 4. 资助提案模板

  主要资助机构的模板和格式要求：

  **NSF（国家科学基金会）：**
  - 完整提案模板（15页项目描述）
  - 项目摘要（1页：概述、智力价值、更广泛影响）
  - 预算和预算说明
  - 个人简介（3页限制）
  - 设施、设备和其他资源
  - 数据管理计划

  **NIH（国家卫生研究院）：**
  - R01研究资助（多年期）
  - R21探索性/发展性资助
  - K奖项（职业发展）
  - 具体目标页（1页，最关键部分）
  - 研究策略（重要性、创新性、方法）
  - 个人简介（5页限制）

  **DOE（能源部）：**
  - 科学办公室提案
  - ARPA-E模板
  - 技术准备水平（TRL）描述
  - 商业化和影响部分

  **DARPA（国防高级研究计划局）：**
  - BAA（广泛机构公告）响应
  - Heilmeier问答框架
  - 技术方法和里程碑
  - 过渡规划

  **私人基金会：**
  - 盖茨基金会
  - 韦尔科姆信托
  - 霍华德·休斯医学研究所（HHMI）
  - 陈-扎克伯格倡议（CZI）

  ## 工作流程：查找和使用模板

  ### 步骤1：确定目标场馆

  确定特定出版物场馆、会议或资助机构：

  ```
  示例查询：
  - "我需要提交给Nature"
  - "NeurIPS 2025的要求是什么？"
  - "显示NSF提案格式"
  - "我正在为ISMB创建海报"
  ```

  ### 步骤2：查询模板和要求

  访问场馆特定模板和格式指南：

  **对于期刊：**
  ```bash
  # 加载期刊格式要求
  参考：references/journals_formatting.md
  搜索："Nature"或特定期刊名称

  # 检索模板
  模板：assets/journals/nature_article.tex
  ```

  **对于会议：**
  ```bash
  # 加载会议格式
  参考：references/conferences_formatting.md
  搜索："NeurIPS"或特定会议

  # 检索模板
  模板：assets/journals/neurips_article.tex
  ```

  **对于海报：**
  ```bash
  # 加载海报指南
  参考：references/posters_guidelines.md

  # 检索模板
  模板：assets/posters/beamerposter_academic.tex
  ```

  **对于资助：**
  ```bash
  # 加载资助要求
  参考：references/grants_requirements.md
  搜索："NSF"或特定机构

  # 检索模板
  模板：assets/grants/nsf_proposal_template.tex
  ```

  ### 步骤3：查看格式要求

  在自定义前检查关键规范：

  **验证的关键要求：**
  - 页数限制（因场馆而异）
  - 字体大小和家族
  - 边距规范
  - 行间距
  - 引用样式（APA、Vancouver、Nature等）
  - 图/表要求
  - 文件格式（PDF、Word、LaTeX源）
  - 匿名化（用于双盲评审）
  - 补充材料限制

  ### 步骤4：自定义模板

  使用辅助脚本或手动自定义：

  **选项1：辅助脚本（推荐）：**
  ```bash
  python scripts/customize_template.py \
    --template assets/journals/nature_article.tex \
    --title "您的论文标题" \
    --authors "第一作者、第二作者" \
    --affiliations "大学名称" \
    --output my_nature_paper.tex
  ```

  **选项2：手动编辑：**
  - 打开模板文件
  - 替换占位符文本（用注释标记）
  - 填写标题、作者、单位、摘要
  - 将内容添加到每个部分

  ### 步骤5：验证格式

  检查符合场馆要求：

  ```bash
  python scripts/validate_format.py \
    --file my_paper.pdf \
    --venue "Nature" \
    --check-all
  ```

  **验证检查：**
  - 页数在限制内
  - 字体大小正确
  - 边距满足规范
  - 引用格式正确
  - 图满足分辨率要求

  ### 步骤6：编译和审查

  编译LaTeX并审查输出：

  ```bash
  # 编译LaTeX
  pdflatex my_paper.tex
  bibtex my_paper
  pdflatex my_paper.tex
  pdflatex my_paper.tex

  # 或使用latexmk进行自动编译
  latexmk -pdf my_paper.tex
  ```

  审查清单：
  - [ ] 所有部分存在且适当格式化
  - [ ] 引用正确渲染
  - [ ] 图出现并带有适当标题
  - [ ] 页数在限制内
  - [ ] 遵循作者指南
  - [ ] 补充材料已准备（如果需要）

