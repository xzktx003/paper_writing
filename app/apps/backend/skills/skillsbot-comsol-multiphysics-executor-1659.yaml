  # COMSOL Multiphysics 执行器

  ## 目的

  COMSOL Multiphysics 执行器技能为纳米材料和纳米器件建模提供连续尺度级别的仿真能力，支持传热、电磁学、流体动力学及耦合现象的多物理场分析。

  ## 能力

  - 传热建模
  - 电磁仿真
  - 纳米尺度流体动力学
  - 结构力学
  - 化学输运建模
  - 多物理场耦合

  ## 使用指南

  ### 多物理场建模

  1. **几何与网格划分**
     - 创建或导入几何模型
     - 定义物理感知网格
     - 处理多尺度特征

  2. **物理场设置**
     - 选择合适模块
     - 定义边界条件
     - 设置材料属性

  3. **求解与分析**
     - 选择求解器设置
     - 运行参数化研究
     - 后处理结果

  ## 流程集成

  - 多尺度建模集成
  - 纳米器件集成流程

  ## 输入模式

  ```json
  {
    "geometry_file": "string",
    "physics_modules": ["heat_transfer", "electromagnetics", "fluid_flow"],
    "materials": [{"domain": "number", "material": "string"}],
    "boundary_conditions": [{"boundary": "string", "type": "string", "value": "number"}],
    "study_type": "stationary|transient|frequency"
  }
  ```

