  # Pythia事件生成器

  ## 目的

  为高能物理中的Pythia事件生成提供专家指导，包括过程配置、强子化和喷注匹配。

  ## 能力

  - 过程选择和配置
  - 部分子分布函数管理
  - 强子化和衰变设置
  - 基础事件调优
  - HepMC输出生成
  - 喷注匹配（MLM、CKKW）

  ## 使用指南

  1. **过程配置**：选择用于事件生成的物理过程
  2. **PDFs**：配置部分子分布函数
  3. **强子化**：设置强子化和衰变参数
  4. **调优**：应用适当的基础事件调优
  5. **输出**：生成HepMC格式用于下游分析

  ## 工具/库

  - Pythia8
  - HepMC
  - LHAPDF
