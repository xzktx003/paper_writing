  # NTA 颗粒追踪器

  ## 目的

  NTA 颗粒追踪器技能提供用于纳米颗粒尺寸和浓度测量的单颗粒追踪分析，通过直接可视化实现逐个颗粒的表征。

  ## 功能

  - 单颗粒追踪
  - 尺寸-浓度分布图
  - 荧光 NTA 模式
  - 实时尺寸分布
  - 颗粒计数与浓度
  - 样品异质性评估

  ## 使用指南

  ### NTA 测量

  1. **样品制备**
     - 稀释至 10^7-10^9 颗粒/毫升
     - 避免气泡
     - 使用合适的缓冲液

  2. **采集**
     - 优化相机水平
     - 设置检测阈值
     - 录制多个视频

  3. **分析**
     - 追踪至少 1000 个颗粒
     - 设置最小轨迹长度
     - 生成尺寸-浓度图

  ## 流程整合

  - 统计颗粒尺寸分布分析
  - 纳米颗粒药物递送系统开发

  ## 输入模式

  ```json
  {
    "sample_id": "string",
    "mode": "scatter|fluorescence",
    "dilution_factor": "number",
    "capture_time": "number (seconds)",
    "number_of_captures": "number"
  }
  ```

  ## 输出模式

  ```json
  {
    "concentration": "number (particles/mL)",
    "mean_size": "number (nm)",
    "mode_size": "number (nm)",
    "d10": "number (nm)",
    "d50": "number (nm)",
    "d90": "number (nm)",
    "size_distribution": {"sizes": [], "counts": []},
    "particles_tracked": "number"
  }
  ```
