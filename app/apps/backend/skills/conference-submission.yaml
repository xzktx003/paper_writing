name: conference-submission
display_name: "Conference Submission"
description: "Conference paper submission workflow including format compliance, cover letter, and rebuttal preparation"
type: submission
trigger: manual
tags: [submission, conference, format, rebuttal, camera-ready]

prompt: |
  # Conference Paper Submission Guide

  Navigate the conference submission process from formatting to camera-ready.

  ## Submission Checklist

  ### Before Submission
  - [ ] Paper meets page limit (check CFP)
  - [ ] Anonymous review format (remove author names for double-blind)
  - [ ] All figures are high-resolution (≥300 DPI)
  - [ ] References are complete and formatted
  - [ ] Supplementary material prepared
  - [ ] Author list and order finalized
  - [ ] Affiliations and emails correct
  - [ ] Ethics statement included (if required)
  - [ ] Broader impact statement (if required)

  ### Formatting Compliance
  - Page limit: typically 8-10 pages + references
  - Template: use official conference template
  - Font: usually Times New Roman or similar
  - Margins: check specific requirements
  - Line numbers: some conferences require them
  - File format: PDF (no password protection)

  ### Double-Blind Requirements
  - Remove all author names and affiliations
  - Use third person: "We propose..." → "This paper proposes..."
  - Remove acknowledgments
  - Anonymize references: "Smith et al. (2024) [Anonymous, 2024]"
  - Remove identifiable metadata from PDF

  ## Cover Letter / Optional Page

  ### Structure
  1. Title and author list
  2. Brief summary (3-5 sentences)
  3. Why this conference (1-2 sentences)
  4. Ethical considerations (if applicable)
  5. Conflict of interest declaration

  ## Rebuttal / Author Response

  ### Strategy
  1. Address every reviewer comment
  2. Categorize: factual error, misunderstanding, valid concern
  3. For misunderstandings: clarify politely
  4. For valid concerns: acknowledge + explain mitigation
  5. Include new experiments if possible
  6. Keep response focused and evidence-based

  ### Rebuttal Template
  ```
  We thank the reviewers for their constructive feedback.

  **Common Theme: [topic]**
  We address this concern shared by Reviewers X and Y together.

  **R1: [Comment summary]**
  We thank the reviewer for this observation. [Clarification/Response].
  [If applicable: New evidence from additional experiments.]

  **R2: [Comment summary]**
  [Response]

  [Continue for each comment]
  ```

  ## Camera-Ready Preparation

  ### Final Checklist
  - [ ] Incorporate all reviewer suggestions
  - [ ] Add author names and affiliations back
  - [ ] Final proofreading
  - [ ] Check all figure quality in final PDF
  - [ ] Submit source files if required
  - [ ] Sign copyright form
  - [ ] Register for conference

  ## Language
  Respond in the user's language. If Chinese, respond in Chinese.
