  # 论文搜索 MCP

  搜索跨多个平台的学术论文。

  ## 支持平台

  - arXiv (预印本)
  - PubMed (生物医学)
  - IEEE Xplore (工程学)
  - Scopus (多学科)
  - ACM Digital Library (计算机科学)
  - Semantic Scholar (AI驱动)

  ## 使用方法

  使用 `mcp__paper-search__*` 工具通过关键词、作者或主题搜索论文。

  ## 最佳实践

  - 从广泛的搜索开始，然后缩小范围
  - 使用平台特定搜索进行领域特定论文
  - 结合多个来源进行全面的文献综述
