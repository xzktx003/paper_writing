  ## 法律和伦理框架

  ### 合理使用考虑（美国）

  ```markdown
  ## 合理使用因素（17 U.S.C. § 107）

  1. **使用的目的和性质**
     - 变革性使用（评论、批评）优先
     - 非商业/教育使用优先
     - 新闻报道通常受保护

  2. **版权作品的性质**
     - 事实作品（新闻、研究）- 更广泛合理使用
     - 创意作品（小说、艺术）- 更狭窄合理使用

  3. **使用部分相对于整体的数量**
     - 仅使用必要部分优先
     - 作品核心不优先

  4. **对市场的影响**
     - 不替代购买不优先
     - 无市场影响优先

  ## 新闻报道特权:
  新闻报道被明确列为合理使用目的。
  然而，整篇文章的完全复制仍然有问题。
  ```

  ### 研究人员最佳实践

  ```markdown
  ## 伦理内容访问指南

  ### 做:
  - 首先使用图书馆资源（支持生态系统）
  - 在规避前尝试开放获取工具
  - 直接联系作者（他们想要引用）
  - 无论访问方式如何，正确引用内容
  - 为常用来源预算订阅费用

  ### 不做:
  - 共享登录凭证
  - 系统性下载整个数据库
  - 使用规避内容用于商业目的
  - 重新分发付费墙内容
  - 仅依赖规避方法
  ```
