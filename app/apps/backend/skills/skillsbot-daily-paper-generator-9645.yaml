  # 每日论文生成器

  ## 概述

  自动化发现、评估和总结arXiv上近期关于EEG解码、脑机接口和神经基础模型研究论文的工作流程。

  **核心工作流程：**
  1. 使用Chrome浏览器搜索arXiv上的近期论文（在3个月内）
  2. 从arXiv页面检索论文元数据
  3. 使用结构化标准评估论文质量
  4. 选择前3篇论文
  5. 生成带有中英文评论的结构化摘要
  6. 将结果保存为Markdown文件到`daily paper/`目录

  ## 何时使用

  在以下情况使用此技能：
  - 用户要求“生成每日论文”或“查找近期EEG论文”
  - 用户希望发现关于EEG解码、从EEG进行语音解码或脑基础模型的研究
  - 用户需要带有中英文摘要的论文评论
  - 用户希望跟踪神经/AI交叉领域的近期arXiv出版物

  ## 输出格式

  每篇论文摘要遵循此结构（见`example/daily paper example.md`完整示例）：

  ### 1. 标题部分
  ```markdown
  # 论文标题

  ## 作者及单位
  作者列表
  机构

  ## arXiv 链接
  https://arxiv.org/abs/ARXIV_ID

  **发表日期**: YYYY-MM-DD
  **arXiv ID**: XXXX.XXXXX
  **分类**: cs.LG, q-bio.NC, eess.SP
  ```

  ### 2. 评论部分

  **中文评语** (~300 词):
  - 背景 (1-2 句): 研究背景和重要性
  - 挑战 (2-3 句): 现有方法的问题
  - 贡献 (1-2 句): 本工作的核心贡献
  - 方法 (2-3 句): 关键技术细节
  - 结果 (2-3 句): 主要发现和指标
  - 分析与局限性 (1-2 句): 意义和局限性

  **英文评论** (流畅的学术英语):
  - 遵循与中文评论相同的结构进行简明总结
  - 使用自然的学术散文（避免AI式模式）
  - 应用科学写作最佳实践

  ### 3. 主图部分
  ```markdown
  ## 主图
  [预留论文主图位置]
  ```

  ### 4. 元数据表
  ```markdown
  ## 论文元数据

  | 项目 | 内容 |
  |------|------|
  | **标题** | 论文标题 |
  | **第一作者** | 第一作者姓名 |
  | **作者列表** | 完整作者列表 |
  | **第一作者单位** | 机构 |
  | **发表日期** | YYYY-MM-DD |
  | **arXiv 链接** | https://arxiv.org/abs/ID |
  | **PDF 链接** | https://arxiv.org/pdf/ID |
  | **分类** | cs.LG, q-bio.NC, eess.SP |
  ```

  ### 5. 整合格式（用于发布）
  ```markdown
  ## 整合格式

  每日论文 MMDD

  论文标题

  https://arxiv.org/abs/ARXIV_ID

  [中文评论]

  [英文评论]
  ```

  ### 6. 附录
  ```markdown
  ## 附录

  **GitHub连接：** [可用/不可用]

  **补充说明**

  [关键见解、影响点]

  **来源：**
  - [arXiv摘要](URL)
  - [arXiv HTML](URL)
  - [Paperverse评论](URL) (如果可用)
  ```

  ## 快速参考

  | 任务 | 方法 |
  |------|--------|
  | 搜索arXiv | 使用Chrome MCP工具 (chrome-mcp-helper) |
  | 获取论文详情 | 导航到arXiv页面并提取元数据 |
  | 评估质量 | 使用`references/quality-criteria.md`中的标准 |
  | 编写中文评论 | 遵循`references/writing-style.md`中的风格 |
  | 编写英文评论 | 应用科学写作技能最佳实践 |
  | 创建输出 | 使用`example/daily paper example.md`中的模板 |

  ## 工作流程

  ### 步骤1：使用Chrome搜索arXiv

  **搜索关键词** (见`references/keywords.md`完整列表):
  - EEG解码: `EEG decoding`, `brain decoding`, `neural decoding`
  - 语音解码: `speech decoding from EEG`, `EEG speech reconstruction`
  - 基础模型: `EEG foundation model`, `large EEG model`, `brain foundation model`

  **方法：使用Chrome浏览器进行arXiv搜索**

  1. **导航到arXiv搜索**使用Chrome MCP工具:
     - URL: `https://arxiv.org/search/`
     - 添加搜索参数: `?searchtype=all&query=关键词&abstracts=show&order=-announced_date_first`

  2. **搜索URL模式**:
     ```
     https://arxiv.org/search/?searchtype=all&query=EEG+decoding&abstracts=show&order=-announced_date_first
     https://arxiv.org/search/?searchtype=all&query=EEG+foundation+model&abstracts=show&order=-announced_date_first
     ```

  3. **时间过滤**: 使用日期过滤器或按`announced_date_first`排序以获取近期论文

  4. **从搜索结果提取论文信息**:
     - 论文标题
     - 作者
     - arXiv ID
     - 摘要预览
     - 发表日期

  ### 步骤2：检索论文详情

  对于每篇候选论文，导航到其arXiv abs页面并提取：

  **URL模式**: `https://arxiv.org/abs/ARXIV_ID`

  **从页面提取**:
  - 标题（来自`<h1>`标签）
  - 作者（来自`.authors`元素）
  - 摘要（来自`blockquote.abstract`）
  - 提交日期（来自`.dateline`）
  - arXiv ID（来自URL或页面）
  - 分类（来自`.subjects`）
  - 评论（如果存在）
  - 第一作者机构（如果评论或作者附属信息中可用）

  ### 步骤3：评估论文质量

  使用`references/quality-criteria.md`中的5维度标准评估每篇论文：

  | 维度 | 权重 | 关键点 |
  |-----------|--------|------------|
  | 创新性 | 30% | 贡献的新颖性 |
  | 方法完整性 | 25% | 清晰度和可重复性 |
  | 实验全面性 | 25% | 验证深度 |
  | 写作质量 | 10% | 表达清晰度 |
  | 相关性与影响 | 10% | 领域重要性 |

  **评分:** 对每个维度评分1-5，计算加权总和。

  **过程:**
  1. 通过标题/摘要筛选相关性
  2. 导航到完整论文页面进行详细评估
  3. 对每个维度评分
  4. 按总分排名
  5. 选择前3名

  ### 步骤4：生成论文摘要

  对于每篇选定的论文，遵循`example/daily paper example.md`中的结构创建摘要：

  **必要部分:**
  1. 标题（H1标题）
  2. 作者及单位（作者和机构）
  3. arXiv 链接（带有元数据：日期、ID、分类）
  4. 中文评语（中文评论，约300词）
  5. 英文评论（流畅的学术英语）
  6. 主图（主图占位符）
  7. 论文元数据（元数据表）
  8. 整合格式（用于发布的整合格式）
  9. 附录（带有GitHub连接、补充说明、来源的附录）

  **编写中文评论** (见`references/writing-style.md`):
  - 背景: 研究背景和重要性
  - 挑战: 现有方法的不足
  - 贡献: 本工作的核心贡献
  - 方法: 关键技术细节
  - 结果: 主要发现和指标
  - 分析与局限性: 意义和局限性

  **编写英文评论**:
  - 应用科学写作技能最佳实践
  - 使用反AI写作原则（自然、多样的句子结构）
  - 保持简洁直接
  - 避免公式化过渡词（“furthermore”、“moreover”、“additionally”）

  ### 步骤5：保存输出

  在`daily paper/`目录中创建Markdown文件：

  ```
  daily paper/
  ├── 2025-01-26-1430-paper-1.md
  ├── 2025-01-26-1430-paper-2.md
  └── 2025-01-26-1430-paper-3.md
  ```

  **文件名格式:** `YYYY-MM-DD-HHMM-paper-N.md`

  **重要:** 使用时间戳（精确到分钟）避免覆盖之前生成的文件。

  ## 示例输出

  见`example/daily paper example.md`获取DeeperBrain论文摘要的完整示例，所有部分格式正确。

  ## 附加资源

  ### 参考文件

  - **`references/keywords.md`** - 完整搜索关键词列表和arXiv URL模式
  - **`references/quality-criteria.md`** - 详细的5维度评估标准与评分标准
  - **`references/writing-style.md`** - 中文评论结构、模板和示例分析

  ### 示例文件

  - **`example/daily paper example.md`** - 完整输出示例，包含所有部分
  - **`scripts/arxiv_search.py`** - 遗留Python脚本（已弃用，使用Chrome代替）

  ### Chrome MCP 工具

  使用Chrome MCP工具进行浏览器自动化：
  - **导航**: 打开arXiv搜索和论文页面
  - **截图**: 捕获页面进行分析
  - **标签页**: 管理多个arXiv页面
  - **内容提取**: 从HTML解析论文元数据

  ## 重要说明

  1. **时间范围:** 搜索专注于过去3个月的论文（检查提交日期）
  2. **链接格式:** 使用arXiv abs页面链接 (https://arxiv.org/abs/ID)，而非直接PDF链接
  3. **评论长度:** 中文评论应约为300词
  4. **质量重点:** 优先内容质量（创新性、方法、实验）而非量化指标
  5. **双语输出:** 每篇论文都需要中英文评论
  6. **Chrome必需:** 此工作流程使用Chrome浏览器自动化通过MCP工具
  7. **完整格式:** 确保每个摘要包含所有9个部分
  8. **一致命名:** 在整合部分使用每日论文MMDD格式
