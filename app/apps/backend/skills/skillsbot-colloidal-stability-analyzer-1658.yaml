  # 胶体稳定性分析器

  ## 目的

  胶体稳定性分析器技能提供对纳米颗粒分散稳定性的全面评估，通过DLVO理论和实验验证，能够预测聚集行为、估算保质期并优化稳定策略。

  ## 能力

  - Zeta电位分析
  - 基于DLVO理论的稳定性预测
  - 聚集动力学建模
  - pH和离子强度影响分析
  - 空间稳定化评估
  - 保质期预测算法

  ## 使用指南

  ### 稳定性评估

  1. **Zeta电位分析**
     - 在多个pH值下测量
     - 确定等电点
     - 评估稳定性窗口（|zeta| > 30 mV）

  2. **DLVO理论应用**
     - 计算范德华引力
     - 估算静电斥力
     - 确定能垒高度

  3. **保质期预测**
     - 随时间监测尺寸变化
     - 应用加速老化方案
     - 预测长期稳定性

  ## 流程集成

  - 纳米颗粒合成协议开发
  - 纳米材料表面功能化流程
  - 纳米颗粒药物递送系统开发

  ## 输入模式

  ```json
  {
    "nanoparticle_type": "string",
    "size": "number (nm)",
    "surface_chemistry": "string",
    "dispersion_medium": "string",
    "pH_range": {"min": "number", "max": "number"},
    "ionic_strength": "number (mM)"
  }
  ```

  ## 输出模式

  ```json
  {
    "zeta_potential": "number (mV)",
    "stability_classification": "stable|marginally_stable|unstable",
    "aggregation_rate": "number (nm/day)",
    "predicted_shelf_life": "number (days)",
    "optimization_recommendations": ["string"]
  }
  ```
