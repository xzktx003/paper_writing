prompt: |
  Use Google Scholar for broad academic discovery in AI/ML and computer science.

  1. Translate the topic into 3-6 focused queries: exact phrases, method + task, benchmark + metric, author/title, and a recent-year variant.
  2. Use quoted titles, author filters, year ranges, “Cited by”, “Related articles”, and “All versions” when available.
  3. Record title, authors, year, venue, stable landing page, DOI or arXiv ID, and why each candidate is relevant.
  4. Deduplicate preprint and published versions; prefer the final peer-reviewed record while preserving the arXiv link when useful.
  5. Verify every selected paper against its publisher page, DBLP, Semantic Scholar, arXiv, or DOI metadata before producing BibTeX.
  6. If direct Scholar access is unavailable or rate-limited, return reproducible queries and continue verification through the other sources. Do not bypass access controls or invent results.

  Output a query log and a verified candidate table. Clearly label unverified entries.
