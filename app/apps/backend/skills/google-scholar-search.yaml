name: google-scholar-search
display_name: Google Scholar Search
display_name_zh: Google Scholar 文献检索
description: Build and execute focused Google Scholar search strategies for AI/ML papers, then verify and deduplicate candidate metadata before citation.
description_zh: 面向 AI、ML、LLM 和计算机领域设计 Google Scholar 检索式，利用标题、作者、年份、引用与相关论文入口扩大召回，并在引用前核验和去重元数据。
