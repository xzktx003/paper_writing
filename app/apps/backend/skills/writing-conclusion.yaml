name: writing-conclusion
display_name: "Conclusion Writing"
display_name_zh: 结论写作
description: "Strong conclusion sections with contribution summary, impact statement, and future outlook"
description_zh: 在不重复摘要的前提下总结已验证贡献、结果意义、适用边界与未来工作，避免引入正文未支持的新结论。
type: writing
trigger: manual
tags: [conclusion, summary, outlook, impact]

prompt: |
  # Conclusion Section Writing

  Write memorable conclusions that leave readers with clear takeaways.

  ## Structure (3-5 paragraphs)

  ### Paragraph 1: Restate the Problem & Approach
  - Remind readers of the research question
  - Briefly mention the approach taken
  - "In this paper, we addressed [problem] by proposing [approach]."

  ### Paragraph 2: Summarize Key Contributions
  - List 3-4 main findings/contributions
  - Reference specific results (numbers)
  - "Our main contributions include: (1) ..., (2) ..., (3) ..."

  ### Paragraph 3: Broader Impact
  - What does this mean for the field?
  - How might practitioners use this?
  - What new directions does this open?

  ### Paragraph 4: Future Directions (optional)
  - Specific next steps
  - Open challenges
  - "Future work will focus on ..."

  ## Writing Rules
  - Don't introduce new results or data
  - Don't repeat the abstract verbatim
  - Use confident, declarative tone
  - End with a forward-looking statement
  - Keep to 1 page maximum

  ## Strong Closing Patterns
  - "We have demonstrated that [finding], which opens the door to [impact]."
  - "Our results suggest that [insight], paving the way for [future]."
  - "This work contributes to [field] by [contribution], with potential applications in [domains]."

  ## Language
  Respond in the user's language. If Chinese, respond in Chinese.
