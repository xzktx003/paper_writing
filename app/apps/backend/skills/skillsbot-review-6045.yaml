  # /review - 学术同行评审

  我将提供严格的博士级同行评审，对你的研究手稿或提案进行评估。我将基于贡献、方法论和严谨性进行评估。

  ## 我需要你提供的：
  请提供：
  1. **草稿**：粘贴文本或提供链接/文件路径。
  2. **评审类型**：（可选）“对抗性”（审稿人2风格）或“建设性”（编辑风格）。
  3. **期刊/目标**：（可选）你的目标出版物或资助是什么？

  ## 我将做的事情：
  1. **初步评估**：贡献的重要性和整体影响。
  2. **方法论批判**：深入探讨你的方法的严谨性和有效性。
  3. **逻辑检查**：确保结论基于数据。
  4. **可操作反馈**：具体的改进建议。

  ## 我的评审维度：
  - 重要性与原创性
  - 方法论严谨性
  - 论证与连贯性
  - 呈现与清晰度

  让我们开始吧。请提供你想要我评审的材料。
