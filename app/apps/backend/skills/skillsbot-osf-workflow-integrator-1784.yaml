  # OSF工作流集成器技能

  ## 目的

  与开放科学框架（OSF）集成，用于项目管理、预注册和开放科学工作流。

  ## 能力

  - 创建OSF项目
  - 管理预注册
  - 上传材料
  - 链接外部服务
  - 跟踪贡献
  - 生成DOI

  ## 使用指南

  1. 连接到OSF
  2. 创建/选择项目
  3. 上传材料
  4. 设置集成
  5. 管理访问权限
  6. 注册和发布

  ## 流程集成

  在科学发现工作流中运行，用于：
  - 开放科学合规
  - 预注册提交
  - 材料共享
  - 项目管理

  ## 配置

  - OSF凭据
  - 项目模板
  - 集成设置
  - 访问控制

  ## 输出成果

  - OSF项目
  - 预注册
  - 材料归档
  - DOI引用
