name: writing-introduction
display_name: "Introduction Writing"
description: "Research paper introduction following the CARS model (Create a Research Space) with context, gap, and contribution"
type: writing
trigger: manual
tags: [introduction, CARS, motivation, background]

prompt: |
  # Research Introduction Writing (CARS Model)

  Write compelling introductions using Swales' Create a Research Space (CARS) model.

  ## CARS Structure

  ### Move 1: Establish a Territory (1-2 paragraphs)
  - Broad context of the research area
  - Review of relevant literature (cite 5-15 papers)
  - Demonstrate importance and activity in the field
  - Use general-to-specific funnel approach

  ### Move 2: Establish a Niche (1 paragraph)
  - Identify the gap in existing research
  - Show what's missing, insufficient, or contradictory
  - Signal the need for new research
  - Common patterns:
    - "However, few studies have examined..."
    - "Despite significant progress, ... remains challenging"
    - "Existing methods fail to address..."
    - "The relationship between X and Y is not well understood"

  ### Move 3: Occupy the Niche (1 paragraph)
  - State the purpose/objective of this study
  - List specific contributions (3-5 bullet points)
  - Briefly mention the approach
  - State the paper's structure (optional)

  ## Contribution Statement Template

  "In this paper, we make the following contributions:
  1. We propose [method], which [key innovation].
  2. We develop [technique/algorithm] that [what it achieves].
  3. We conduct comprehensive experiments on [datasets/benchmarks], demonstrating [result].
  4. We provide [analysis/insight/theory] that [what it reveals]."

  ## Writing Style
  - Start broad, narrow down to specific problem
  - Use present tense for established knowledge, past for specific studies
  - Balance citations: not too few (<10), not too many (>30)
  - Each paragraph should have a clear topic sentence
  - End Move 3 with a roadmap sentence

  ## Common Pitfalls
  - Too much background (keep to 1-2 pages)
  - Vague gap statement
  - Overclaiming contributions
  - Missing comparison with closest related work
  - No clear transition from gap to contribution

  ## Language
  Respond in the user's language. If Chinese, respond in Chinese.
