  ---
  名称：文献综述
  描述：结构化文献搜索和综合，包括引用提取和差距识别
  禁用模型调用：true
  参数提示："[主题、论文标题或研究问题]"
  允许工具：["Read", "Grep", "Glob", "Write", "WebSearch", "WebFetch"]
  ---

  # 文献综述

  在给定主题上进行结构化文献搜索和综合。

  **输入:** `$ARGUMENTS` — 要调查的主题、论文标题、研究问题或现象。

  ---

  ## 步骤

  1. **解析主题** 从 `$ARGUMENTS` 中解析主题。如果指定了特定论文，将其作为锚点。

  2. **搜索相关工作** 使用可用工具：
     - 检查 `master_supporting_docs/supporting_papers/` 中的已上传论文
     - 使用 `WebSearch` 查找最近出版物（如可用）
     - 使用 `WebFetch` 访问工作论文库（如可用）
     - 阅读项目中任何现有的 `.bib` 文件中的论文

  3. **组织发现** 归入以下类别：
     - **理论贡献** — 模型、框架、机制
     - **实证发现** — 关键结果、效应大小、数据来源
     - **方法创新** — 新估计器、识别策略、推断方法
     - **开放辩论** — 文献中未解决的争议

  4. **识别差距和机会：**
     - 哪些问题尚未回答？
     - 哪些数据或方法可以解决它们？
     - 发现在哪里冲突？

  5. **提取引用** 以 BibTeX 格式提取所有讨论论文的引用。

  6. **保存报告** 到 `quality_reports/lit_review_[净化后的主题].md`

  ---

  ## 输出格式

  ```markdown
  # 文献综述: [主题]

  **日期:** [YYYY-MM-DD]
  **查询:** [用户的原始查询]

  ## 摘要

  [2-3段对文献状态的概述]

  ## 关键论文

  ### [作者 (年份)] — [短标题]
  - **主要贡献:** [1-2句]
  - **方法:** [识别策略 / 数据]
  - **关键发现:** [结果，如有效应大小则包含]
  - **相关性:** [为何对我们的研究重要]

  [重复5-15篇论文，按相关性排序]

  ## 主题组织

  ### 理论贡献
  [分组讨论]

  ### 实证发现
  [分组讨论，跨研究比较]

  ### 方法创新
  [与主题相关的方法]

  ## 差距和机会

  1. [差距1 — 缺少什么及其重要性]
  2. [差距2]
  3. [差距3]

  ## 建议的下一步

  - [具体行动：需阅读的论文、获取的数据、考虑的方法]

  ## BibTeX 条目

  ```bibtex
  @article{...}
  ```
  ```

  ---

  ## 重要事项

  - **诚实对待不确定性。** 如果无法验证引用，说明。
  - **优先处理最近工作**（过去5-10年），除非开创性论文更早。
  - **注意工作论文与已发表论文** — 工作论文可能变化。
  - **不要编造引用。** 如果不确定论文细节，标记让用户验证。
