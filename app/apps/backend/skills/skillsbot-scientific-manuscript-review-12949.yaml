  # 科研手稿审查

  ## 目录
  - [目的](#目的)
  - [何时使用](#何时使用)
  - [核心原则](#核心原则)
  - [工作流程](#工作流程)
  - [逐部分审查](#逐部分审查)
  - [语言指南](#语言指南)
  - [防护栏](#防护栏)
  - [快速参考](#快速参考)

  ## 目的

  本技能提供系统化的科研手稿（研究文章、综述、观点）审查和编辑，以提高清晰度、结构、科学严谨性和读者理解。它采用多轮方法覆盖结构、科学逻辑、语言和格式，将草稿转化为可发表文档。

  ## 何时使用

  在以下情况下使用此技能：

  - **起草手稿时**：研究文章、短篇通讯、综述论文、观点
  - **投稿前审查**：期刊投稿前的最终润色
  - **修订周期**：处理审稿人意见，基于反馈改进
  - **协作编辑**：审查合著者草稿，指导学生写作
  - **自我编辑**：系统审查自己的写作以发现盲点
  - **期刊转换**：适应不同期刊格式

  触发短语："手稿审查"、"论文草稿"、"期刊文章"、"研究写作"、"改进我的论文"、"审稿人反馈"、"投稿就绪"、"科学写作"

  **请勿用于：**
  - 资助提案（使用 `grant-proposal-assistant`）
  - 推荐信（使用 `academic-letter-architect`）
  - 一般电子邮件（使用 `scientific-email-polishing`）

  ## 核心原则

  指导手稿审查的七个基本信念：

  1. **清晰优于巧妙**：科学清晰度比风格优雅更重要
  2. **叙事塑造理解**：结构和故事弧决定读者理解
  3. **受众决定语气**：专家与普通受众需要不同的深度和框架
  4. **格式信号可信度**：专业格式反映科学严谨性
  5. **主张需要证据**：强烈断言需要强数据和适当限定
  6. **每个部分有职责**：引言销售问题，结果展示数据，讨论解释
  7. **约束塑造结构**：字数限制和期刊指南决定重点

  ## 工作流程

  复制此清单并跟踪进度：

  ```
  手稿审查进度：
  - [ ] 步骤1：识别手稿类型并提取核心信息
  - [ ] 步骤2：结构审查 - 映射和评估整体组织
  - [ ] 步骤3：引言审查 - 缺口陈述、重点、假设
  - [ ] 步骤4：结果审查 - 问题、方法、发现、解释
  - [ ] 步骤5：讨论审查 - 综合、背景、局限性
  - [ ] 步骤6：科学清晰度检查 - 主张、控制、限定
  - [ ] 步骤7：语言润色 - 术语、语态、行话
  - [ ] 步骤8：格式检查 - 期刊合规性
  ```

  **步骤1：识别手稿类型和核心信息**

  确定文档类型（研究文章、综述、观点、短篇通讯）。提取读者必须记住的一个发现或信息。问："如果读者只记住一件事，它应该是什么？" 参见 [resources/methodology.md](resources/methodology.md#核心信息提取) 获取提取技术。

  **步骤2：结构审查**

  根据标准IMRaD（引言、方法、结果、讨论）或综述结构映射整体组织。检查逻辑序列 - 每个部分是否流畅过渡到下一个？识别不清晰的过渡或缺失的背景。参见 [resources/methodology.md](resources/methodology.md#结构评估) 获取结构评估。

  **步骤3：引言审查**

  使用引言弧进行评估：广泛背景 → 狭窄焦点 → 知识缺口 → 假设/目标。检查缺口陈述是否明确和引人注目。验证以清晰假设或目标结束。参见 [resources/template.md](resources/template.md#引言弧) 获取模板。

  **步骤4：结果审查**

  对每个图表/实验：解决的问题？ → 使用的方法？ → 关键发现（带统计）？ → 解释（含义）？标记缺乏解释的数据转储写作。确保发现朝向核心信息构建。参见 [resources/template.md](resources/template.md#结果段落) 获取结果结构。

  **步骤5：讨论审查**

  验证结构：重温假设 → 在领域背景下解释发现 → 置于更广泛文献中 → 承认局限性 → 建议未来方向。检查过度声称（推测作为事实呈现）。确保数据解释与推测的清晰分离。参见 [resources/methodology.md](resources/methodology.md#讨论结构) 获取讨论框架。

  **步骤6：科学清晰度检查**

  运行清晰度清单：主张是否由数据支持？定量细节是否呈现（统计、n值）？控制是否充分描述？解释是否适当限定？需要机制解释吗？参见 [resources/template.md](resources/template.md#清晰度清单) 获取完整清单。

  **步骤7：语言润色**

  确保术语在整个手稿中一致。首次使用时删除或定义行话。当有助于清晰度时，优先使用主动语态。标准化缩写。检查限定语言（"表明" vs "证明"）。参见 [resources/methodology.md](resources/methodology.md#语言指南) 获取具体指导。

  **步骤8：格式检查**

  验证符合目标期刊指南（字数限制、参考文献格式、图表要求）。检查章节标题匹配期刊要求。确保摘要遵循结构化/非结构化要求。使用 [resources/evaluators/rubric_scientific_manualscript.json](resources/evaluators/rubric_scientific_manualscript.json) 进行验证。**最低标准**：平均分 ≥ 3.5。

  ## 逐部分审查

  ### 引言结构

  **目标：** 说服读者问题重要且您的方法可靠

  **漏斗结构：**
  ```
  [广泛背景 - 建立领域重要性，1-2句]
          ↓
  [狭窄到具体领域 - 已完成的工作]
          ↓
  [知识缺口 - 缺失什么，为什么重要]
          ↓
  [您的假设/目标 - 将解决的问题]
  ```

  **常见问题：**
  - 缺口陈述埋藏或隐含（使其明确："然而，X仍然未知"）
  - 开头太宽泛（读者不需要宇宙历史）
  - 结尾无清晰假设（读者不知道期望什么）
  - 文献综述过长（将细节移到讨论）

  ### 结果结构

  **目标：** 清晰呈现数据并解释，不只是数字

  **每段落/图表结构：**
  ```
  [此实验解决的问题]
  [使用的方法/方法]
  [关键发现 - 带量化]
  [简要解释 - 这意味着什么]
  ```

  **常见问题：**
  - 数据转储（列出结果无解释）
  - 缺少统计（p值、n值、置信区间）
  - 模糊描述（"我们发现差异" vs "我们发现3倍增加"）
  - 图表未按逻辑顺序引用
  - 关键发现埋藏在文本中（突出重要结果）

  ### 讨论结构

  **目标：** 解释发现并置于更广泛背景

  **标准流程：**
  ```
  [重述主要发现和假设状态]
          ↓
  [在领域背景下解释关键结果]
          ↓
  [与先前文献比较 - 一致/不一致]
          ↓
  [机制含义（如适用）]
          ↓
  [局限性 - 诚实的承认]
          ↓
  [未来方向 - 下一步]
          ↓
  [结论陈述 - 大局意义]
  ```

  **常见问题：**
  - 过度声称（数据不支持结论）
  - 重复结果部分（讨论，不重述）
  - 缺少局限性（审稿人无论如何会指出）
  - 推测未标记（清楚标注"我们推测..."）
  - 无与领域连接（孤立讨论）

  ## 语言指南

  **主动 vs. 被动语态：**
  - 使用主动以清晰："我们测量" 非 "测量被进行"
  - 使用被动当执行者明显或不重要："样品在37°C孵育"
  - 避免悬垂修饰：非 "分析了数据，结论是..." 但 "分析了数据，我们结论..."

  **限定语言：**
  - 强数据："证明"、"显示"、"确立"
  - 中等置信度："表明"、"指示"、"支持"
  - 推测："可能"、"或许"、"可以潜在"
  - 匹配限定强度与证据强度

  **行话管理：**
  - 首次使用时定义："聚合酶链反应 (PCR)"
  - 当普通语言有效时避免不必要行话
  - 领域标准术语无需定义（DNA、蛋白质、细胞）
  - 读者适当：对广泛受众期刊提供更多定义

  **术语一致性：**
  - 选择一个术语并坚持（不交替使用"受试者"、"参与者"、"患者"）
  - 为复杂手稿创建术语表
  - 检查缩写在使用前定义

  ## 防护栏

  **关键要求：**

  1. **保留作者声音**：编辑以提高清晰度，不重写。绝不发明主张或改变意义。当提出新内容时，清楚标记建议。

  2. **主张匹配数据**：每个结论必须由呈现结果支持。立即标记过度声称。推测必须标记。

  3. **定量严谨性**：比较需要统计。所有实验的n值。陈述显著性阈值。包括变异性度量。

  4. **逻辑流**：每个部分应自然流畅过渡到下个。过渡明确。结论从前提得出。

  5. **适当限定**：强烈主张需要强证据。使用与确定性成比例的限定语言。

  6. **一致术语**：相同概念 = 整个手稿中相同术语。缩写在使用前定义。

  **常见陷阱：**
  - ❌ **过度声称**："这证明X" 当数据仅表明
  - ❌ **缺少背景**：结果无解释
  - ❌ **埋藏要点**：重要发现隐藏在段落中
  - ❌ **不一致术语**：交替使用同义词
  - ❌ **密集段落**：无中断的文本墙
  - ❌ **模糊描述**："一些增加" 而非 "3倍增加"

  ## 快速参考

  **关键资源：**
  - **[resources/methodology.md](resources/methodology.md)**：详细审查方法、结构评估、语言指南
  - **[resources/template.md](resources/template.md)**：引言弧、结果段落、清晰度清单
  - **[resources/evaluators/rubric_scientific_manualscript.json](resources/evaluators/rubric_scientific_manualscript.json)**：质量评分标准

  **引言清单：**
  - [ ] 广泛背景建立重要性
  - [ ] 狭窄到具体问题
  - [ ] 缺口陈述明确（"然而，X仍然未知"）
  - [ ] 以清晰假设或目标结束

  **结果清单：**
  - [ ] 每个实验有问题、方法、发现、解释
  - [ ] 统计呈现（p值、n、置信区间）
  - [ ] 定量描述（数字，非"一些/许多"）
  - [ ] 图表按逻辑顺序引用
  - [ ] 关键发现突出

  **讨论清单：**
  - [ ] 以重温假设开头
  - [ ] 解释（不重复）结果
  - [ ] 置于文献背景
  - [ ] 承认局限性
  - [ ] 建议未来方向
  - [ ] 推测清楚标记

  **典型审查时间：**
  - 快速审查（结构 + 主要问题）：20-30分钟
  - 标准审查（完整清单）：45-60分钟
  - 深度修订（重写部分）：2-3小时

  **所需输入：**
  - 手稿草稿（任何阶段）
  - 目标期刊（如已知）
  - 作者具体关切（如有）

  **产出：**
  - 带追踪更改的编辑手稿
  - 主要结构/逻辑变化的评论
  - 关键改进的摘要
