  ---

  PdfLatex是一个将LaTeX源代码转换为PDF的工具。这对研究人员特别重要，因为他们用它来发表他们的发现。使用Linux终端可以非常容易地安装，尽管在Windows上似乎是个烦人的任务。安装命令如下。

  * 安装TexLive基础

  ```
  apt-get install texlive-latex-base
  ```

  * 同时安装推荐和额外的字体，以避免在使用pdflatex处理有更多字体的latex文件时遇到错误。

  ```
  apt-get install texlive-fonts-recommended
  apt-get install texlive-fonts-extra
  ```

  * 安装额外的包，

  ```
  apt-get install texlive-latex-extra
  ```

  一旦如上所述安装完成，您就可以使用PdfLatex从latex源文件创建PDF文件，如下所示。
  ```
  pdflatex latex_source_name.tex
  ```

  参考：http://kkpradeeban.blogspot.com/2014/04/installing-latexpdflatex-on-ubuntu.html
