  # 关联论文图谱探索器

  ## 功能定位

  提供引文图谱探索能力，通过可视化图谱遍历和时间分析来发现相关研究文献。

  ## 核心能力

  - 引文图谱生成
  - 开创性论文识别
  - 研究前沿检测
  - 时间引文分析
  - 领域桥梁识别
  - 导出至文献管理工具

  ## 使用指南

  1. **种子论文**：从领域内的关键论文开始
  2. **图谱探索**：导航引文关系网络
  3. **时间分析**：追踪领域随时间演变
  4. **桥梁检测**：发现跨学科连接

  ## 工具/库

  - Connected Papers API
  - NetworkX
  - pyvis
