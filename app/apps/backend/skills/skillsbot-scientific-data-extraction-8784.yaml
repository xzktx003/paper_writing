  # 科学数据提取技能

  ## 概述

  此技能提供从多种输入格式（PDF、HTML、图像、纯文本）的科学文献中提取结构化数据的全面指导。它自动检测科学领域，在适当时推荐专业工具（特别是化学和材料科学），并采用分层提取方法，通过多方法验证获得高置信度结果。

  ## 何时使用此技能

  使用此技能当您需要：

  - **提取数值数据** 从科学论文、报告或文档中
  - **数字化图表** 以恢复底层数据点
  - **解析表格** 从PDF或图像中为结构化格式（CSV、DataFrame、JSON）
  - **提取化学/材料数据** 包括性质、反应、化合物和结构
  - **转换非结构化文本** 为结构化JSON或表格格式
  - **验证提取数据** 通过多方法交叉检查
  - **处理文档批次** 使用一致的提取方法

  ## 输入格式检测

  第一步是识别输入格式并路由到适当工具：

  ### 纯文本 (.txt, .md)
  - 通过关键词分析进行领域检测
  - 基于NLP的实体提取（spaCy, Stanza）
  - 用于结构化数据的正则表达式模式（带单位的数字、化学式）
  - 基于LLM的结构化提取

  ### HTML (.html, 网页)
  - 使用BeautifulSoup + lxml进行HTML解析
  - 表格检测和提取
  - 带结构保存的文本内容提取
  - 文本提取后的领域特定处理

  ### PDF (.pdf)
  | 优先级 | 工具 | 速度 | 使用场景 |
  |----------|------|-------|----------|
  | 快速 | PyMuPDF4LLM | ~0.12s | 初始探索、大批量 |
  | 标准 | GROBID | 中 | 研究级、参考文献解析 |
  | 标准 | Docling | 中 | 布局感知、复杂文档 |
  | 表格 | Camelot | 快 | 边框表格 |
  | 表格 | Tabula | 快 | 通用表格 |
  | 表格 | pdfplumber | 中 | 复杂表格结构 |
  | 深层 | Marker-PDF | 慢 | 带OCR的扫描文档 |

  ### 图像 (.png, .jpg, .tiff)
  | 内容类型 | 推荐方法 |
  |--------------|---------------------|
  | 文档扫描 | OCR（Tesseract/Surya）然后文本管道 |
  | 图表/绘图 | WebPlotDigitizer工作流或LLM视觉 |
  | 表格图像 | Table Transformer或LLM视觉 |
  | 化学结构 | OSRA/MolVec用于SMILES转换 |

  ## 领域检测

  此技能自动检测科学领域以应用专业工具：

  ### 化学/材料指标
  - 化学式（H2O, NaCl, TiO2）
  - SMILES字符串、InChI标识符
  - 反应箭头（→, ⟶, ⇌）
  - 性质关键词：熔点、带隙、电导率、产率、纯度
  - 材料名称和IUPAC命名法
  - 光谱数据模式（NMR位移、IR峰）

  ### 当检测到化学/材料时
  应用专业工具：
  - **ChemDataExtractor v2**：性质提取、实体识别、表格解析
  - **OpenChemIE**：从文本、表格和图中提取反应
  - **领域特定NER**：化学命名实体识别

  ### 通用科学领域
  使用通用提取：
  - 标准NLP管道
  - 基于LLM的结构化提取
  - 基于模板的解析

  ## 提取方法层次结构

  基于需求按复杂度递增顺序应用方法：

  ### 级别1：快速提取（速度优先）
  **何时使用**：初始探索、大批量文档、简单结构化数据

  ```python
  # 使用PyMuPDF4LLM快速PDF到文本
  import pymupdf4llm
  text = pymupdf4llm.to_markdown("paper.pdf")

  # 快速HTML解析
  from bs4 import BeautifulSoup
  soup = BeautifulSoup(html_content, 'lxml')
  tables = soup.find_all('table')
  ```

  **预期置信度**：较低，适合筛查

  ### 级别2：标准提取（平衡）
  **何时使用**：研究级提取、需要结构保存

  ```python
  # 使用GROBID进行结构化PDF解析
  import scipdf_parser
  article = scipdf_parser.parse_pdf_to_dict("paper.pdf")

  # 使用Docling进行布局感知提取
  from docling.document_converter import DocumentConverter
  converter = DocumentConverter()
  result = converter.convert("paper.pdf")

  # 使用Camelot进行边框表格提取
  import camelot
  tables = camelot.read_pdf("paper.pdf", flavor='lattice')
  df = tables[0].df
  ```

  **预期置信度**：中高

  ### 级别3：深层提取（准确度优先）
  **何时使用**：出版质量数据、领域特定提取

  ```python
  # 使用ChemDataExtractor处理化学文档
  from chemdataextractor import Document
  doc = Document.from_file("paper.pdf")
  records = doc.records

  # 使用OpenChemIE进行反应提取
  from openchemie import OpenChemIE
  model = OpenChemIE()
  reactions = model.extract_reactions_from_text(text)

  # 使用Marker-PDF带OCR处理扫描文档
  from marker.converters.pdf import PdfConverter
  converter = PdfConverter()
  result = converter("scanned_paper.pdf")
  ```

  **预期置信度**：高

  ### 级别4：LLM增强提取
  **何时使用**：复杂图形、模糊数据、需要验证

  ```python
  # 基于LLM的结构化提取
  prompt = """
  从以下文本中提取所有数值数据为JSON：
  - 性质名称
  - 值（仅数字）
  - 单位
  - 上下文（什么材料/化合物）

  文本：{text}
  """

  # 用于图表解释的LLM视觉
  prompt = """
  分析此图表图像并提取：
  1. X轴标签和范围
  2. Y轴标签和范围
  3. 所有数据点作为(x, y)对
  4. 任何误差棒或不确定性指示器
  """
  ```

  **预期置信度**：最高当与验证结合时

  ## 多方法验证管道

  为高置信度结果，使用多种提取方法并验证：

  ### 步骤1：主要提取
  基于输入类型和领域选择方法，提取结构化数据。

  ### 步骤2：次要提取
  在同一源上运行替代方法，比较结果并标记差异。

  ### 步骤3：LLM验证查询
  提出针对性问题以验证提取数据：
  - "值X是否与上下文Y一致？"
  - "单位Z对于性质P是否有意义？"
  - "在预期范围内是否有任何缺失数据点？"

  ### 步骤4：置信度评分

  ```python
  confidence = {
      "score": 0.0,  # 0-1标度
      "level": "HIGH|MEDIUM|LOW|REVIEW",
      "methods_agreed": [],  # 产生相同结果的方法列表
      "discrepancies": [],   # 方法之间的任何分歧
      "verification_notes": ""  # LLM验证结果
  }

  # 评分规则：
  # - 单方法：最大0.7
  # - 两种方法一致：0.8
  # - 两种方法 + LLM验证：0.9
  # - 多种方法 + LLM + 数据库交叉引用：0.95+
  ```

  ### 步骤5：数据库交叉引用（可选）
  对于化学/材料，比较已知数据库：
  - Materials Project
  - AFLOW
  - PubChem
  - NIST数据库

  标记与预期范围的显著偏差。

