  ✅ 创建 Figure1_Efficacy.png
     尺寸：3000×6080 px 在 300 DPI
  ```

  输出文件将具有：

  - 专业面板标签（A、B、C）在左上角
  - 面板间一致的间距
  - 300 DPI分辨率适合发表
  - 白色背景，标签带黑色边框以获得最大可见性

