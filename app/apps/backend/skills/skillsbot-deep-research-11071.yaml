  # 深度研究技能

  ## 概述

  此技能提供了一种进行彻底网络研究的系统性方法。**在开始任何内容生成任务前加载此技能**，以确保您从多个角度、深度和来源收集足够的信息。

  ## 何时使用此技能

  **始终在以下情况加载此技能：**

  ### 研究问题
  - 用户询问“什么是X”、“解释X”、“研究X”、“调查X”
  - 用户想要深入理解一个概念、技术或主题
  - 问题需要当前、全面的信息，来自多个来源
  - 单一网络搜索不足以正确回答

  ### 内容生成（预研究）
  - 创建演示文稿（PPT/幻灯片）
  - 创建前端设计或UI原型
  - 撰写文章、报告或文档
  - 制作视频或多媒体内容
  - 任何需要现实世界信息、例子或当前数据的内容

  ## 核心原则

  **切勿仅基于一般知识生成内容。** 您的输出质量直接取决于事先进行的研究的质量和数量。单一搜索查询永远不够。

  ## 研究方法论

  ### 第一阶段：广泛探索

  从广泛搜索开始，以了解整体情况：

  1. **初步调查**：搜索主要主题以了解整体背景
  2. **识别维度**：从初步结果中，识别需要深入探索的关键子主题、主题、角度或方面
  3. **绘制领域图**：记录存在的不同观点、利益相关者或视角

  示例：
  ```
  主题：“医疗AI”
  初始搜索：
  - “AI医疗应用2024”
  - “人工智能医学诊断”
  - “医疗AI市场趋势”

  识别的维度：
  - 诊断AI（放射学、病理学）
  - 治疗推荐系统
  - 行政自动化
  - 患者监测
  - 监管环境
  - 伦理考虑
  ```

  ### 第二阶段：深入探究

  对于每个识别出的重要维度，进行针对性研究：

  1. **具体查询**：为每个子主题使用精确关键词搜索
  2. **多种措辞**：尝试不同的关键词组合和措辞
  3. **获取完整内容**：使用`web_fetch`读取重要来源的完整内容，而不仅仅是片段
  4. **跟踪参考文献**：当来源提到其他重要资源时，也搜索那些

  示例：
  ```
  维度：“放射学诊断AI”
  针对性搜索：
  - “AI放射学FDA批准系统”
  - “胸部X光AI检测准确率”
  - “放射学AI临床试验结果”

  然后获取并阅读：
  - 关键研究论文或摘要
  - 行业报告
  - 真实案例研究
  ```

  ### 第三阶段：多样性与验证

  通过寻求多样化的信息类型，确保全面覆盖：

  | 信息类型 | 目的 | 示例搜索 |
  |-----------------|---------|------------------|
  | **事实与数据** | 具体证据 | “统计数据”、“数据”、“数字”、“市场规模” |
  | **例子与案例** | 实际应用 | “案例研究”、“例子”、“实施” |
  | **专家意见** | 权威视角 | “专家分析”、“访谈”、“评论” |
  | **趋势与预测** | 未来方向 | “趋势2024”、“预测”、“...的未来” |
  | **比较** | 上下文和替代方案 | “vs”、“比较”、“替代品” |
  | **挑战与批评** | 平衡观点 | “挑战”、“限制”、“批评” |

  ### 第四阶段：综合检查

  在继续内容生成之前，验证：

  - [ ] 我是否从至少3-5个不同角度进行了搜索？
  - [ ] 我是否获取并阅读了最重要来源的完整内容？
  - [ ] 我是否有具体数据、例子和专家观点？
  - [ ] 我是否探索了积极方面和挑战/限制？
  - [ ] 我的信息是否来自权威来源并保持最新？

  **如果任何答案为否，在生成内容前继续研究。**

  ## 搜索策略提示

  ### 有效查询模式

  ```
  # 具体化上下文
  ❌ “AI趋势”
  ✅ “企业AI采用趋势2024”

  # 包含权威来源提示
  “[主题]研究论文”
  “[主题]麦肯锡报告”
  “[主题]行业分析”

  # 搜索特定内容类型
  “[主题]案例研究”
  “[主题]统计数据”
  “[主题]专家访谈”

  # 使用时间限定符
  “[主题]2024”
  “[主题]最新”
  “[主题]近期发展”
  ```

  ### 何时使用web_fetch

  在以下情况下使用`web_fetch`读取完整内容：
  - 搜索结果看起来高度相关且权威
  - 您需要片段之外的详细信息
  - 来源包含数据、案例研究或专家分析
  - 您想理解发现的完整背景

  ### 迭代精炼

  研究是迭代的。在初始搜索后：
  1. 回顾所学内容
  2. 识别理解中的空白
  3. 制定新的、更有针对性的查询
  4. 重复直到有全面覆盖

  ## 质量标准

  当您可以自信地回答时，您的研究足够：
  - 关键事实和数据点是什么？
  - 2-3个具体真实世界例子是什么？
  - 专家对这个主题说什么？
  - 当前趋势和未来方向是什么？
  - 挑战或限制是什么？
  - 这个主题现在为什么相关或重要？

  ## 常见错误避免

  - ❌ 在1-2次搜索后停止
  - ❌ 依赖搜索片段而不读取完整来源
  - ❌ 只搜索多面主题的一个方面
  - ❌ 忽略矛盾观点或挑战
  - ❌ 使用过时信息而当前数据存在
  - ❌ 在研究完成前开始内容生成

  ## 输出

  完成研究后，您应该拥有：
  1. 从多角度对主题的全面理解
  2. 具体事实、数据点和统计
  3. 真实世界例子和案例研究
  4. 专家观点和权威来源
  5. 当前趋势和相关上下文

  **只有那时才继续内容生成**，使用收集到的信息创建高质量、有充分依据的内容。
