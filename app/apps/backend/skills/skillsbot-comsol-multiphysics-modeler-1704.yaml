  # COMSOL多物理场建模技能

  ## 目的
  提供与COMSOL Multiphysics的集成，用于涵盖电磁学、热传递、流体动力学和耦合物理问题的有限元仿真。

  ## 能力
  - 几何导入和网格划分
  - 物理模块配置
  - 边界条件设置
  - 参数扫描自动化
  - 结果提取和后处理
  - LiveLink脚本编写（MATLAB/Python）

  ## 使用指南
  - 求解前验证网格质量
  - 为耦合问题使用合适的物理模块
  - 配置求解器设置以确保收敛
  - 记录模型假设和简化

  ## 依赖项
  - COMSOL Multiphysics
  - LiveLink for MATLAB

  ## 流程集成
  - 实验设计与规划
  - 数据采集系统开发
  - 光谱测量活动
