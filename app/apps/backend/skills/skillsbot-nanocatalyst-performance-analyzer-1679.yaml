  # 纳米催化剂性能分析器

  ## 目的

  纳米催化剂性能分析器技能提供对纳米材料催化剂性能的全面评估，能够系统性地评估催化应用中的活性、选择性和稳定性。

  ## 能力

  - 转换频率（TOF）计算
  - 选择性分析
  - 活化能测定
  - 稳定性和可回收性测试
  - 比表面积归一化（BET）
  - 反应机理研究

  ## 使用指南

  ### 催化剂评估

  1. **活性评估**
     - 测量转化率随时间变化
     - 计算TOF
     - 根据比表面积进行归一化

  2. **选择性分析**
     - 识别产物
     - 计算选择性
     - 绘制反应路径图

  3. **稳定性测试**
     - 进行可回收性测试
     - 监测失活情况
     - 表征使用后的催化剂

  ## 流程整合

  - 纳米催化剂开发与性能优化

  ## 输入模式

  ```json
  {
    "catalyst_id": "string",
    "reaction": "string",
    "reactants": [{"name": "string", "concentration": "number"}],
    "temperature": "number (C)",
    "pressure": "number (atm)",
    "catalyst_mass": "number (mg)"
  }
  ```

  ## 输出模式

  ```json
  {
    "activity": {
      "conversion": "number (%)",
      "tof": "number (1/s)",
      "specific_activity": "number (mol/g/s)"
    },
    "selectivity": [{
      "product": "string",
      "selectivity": "number (%)"
    }],
    "kinetics": {
      "activation_energy": "number (kJ/mol)",
      "rate_law": "string"
    },
    "stability": {
      "cycles_tested": "number",
      "activity_retention": "number (%)"
    }
  }
  ```
