  **引用管理**为**文献综述**提供技术基础设施：

  - **文献综述**：多数据库系统搜索和综合
  - **引用管理**：元数据提取和验证

  **组合工作流**：
  1. 使用literature-review进行系统搜索方法
  2. 使用citation-management提取和验证引用
  3. 使用literature-review综合发现
  4. 使用citation-management确保参考文献准确性

  ### 科学写作技能

  **引用管理**确保**科学写作**的准确引用：

  - 导出已验证的BibTeX用于LaTeX手稿
  - 验证引用符合出版标准
  - 根据期刊要求格式化参考文献

  ### 场所模板技能

  **引用管理**与**场所模板**配合用于提交就绪手稿：

  - 不同场所需要不同引用样式
  - 生成正确格式的参考文献
  - 验证引用满足场所要求

