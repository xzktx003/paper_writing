  # CAMB宇宙学计算器

  ## 目的

  提供关于CAMB宇宙学计算的专家指导，包括宇宙微波背景辐射功率谱、物质功率谱和参数估计。

  ## 能力

  - 宇宙微波背景辐射温度和偏振谱
  - 物质功率谱计算
  - 传递函数计算
  - 暗能量状态方程模型
  - 中微子质量效应
  - Python/Fortran接口

  ## 使用指南

  1. **参数设置**：定义宇宙学参数
  2. **宇宙微波背景辐射谱**：计算温度和偏振功率谱
  3. **物质功率**：计算物质功率谱和传递函数
  4. **暗能量**：用不同的状态方程建模暗能量
  5. **扩展**：包含中微子质量和其他物理效应

  ## 工具/库

  - CAMB
  - CLASS
  - CosmoMC
