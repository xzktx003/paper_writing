  # 元分析手稿汇编

  通过创建可出版的表格、图形和参考文献，完成系统综述和元分析手稿以提交期刊。

  ## 何时使用

  - 在分析完成后完成元分析手稿
  - 从元分析结果创建表格
  - 从森林图/漏斗图组装多面板图形
  - 为系统综述生成BibTeX参考文献
  - 为高影响因子期刊（如Lancet、JAMA、NEJM）格式化手稿

  ## 前提条件

  在使用此技能之前，确保您有：

  - 已完成元分析并具有结果表格（CSV格式）
  - 生成单个图形（PNG格式，300 DPI）
  - 手稿文本部分已写（摘要、引言、方法、结果、讨论）
  - 所有需要的引用列表

  ## 工作流程

  ### 阶段1: 表格创建

  从分析结果创建全面表格：

  #### 主文表格

  1. **表1: 试验特征**
     - 从extraction.csv或类似文件提取
     - 包括：NCT编号、第一作者、年份、设计、样本大小、干预细节、随访
     - 格式化为markdown，带有缩写部分

  2. **表2: 疗效结果摘要**
     - 组合所有元分析结果（pCR、生存结果）
     - 包括：效应估计、95%置信区间、p值、I²、绝对效益、NNT
     - 添加GRADE确定性评级

  3. **表3: 安全性结果摘要**
     - 来自安全性元分析结果
     - 包括：不良事件、发生率、RR/OR、NNH
     - 添加临床管理指导

  #### 补充表格

  4. **偏倚风险评估**
     - 使用RoB 2或ROBINS-I工具格式
     - 对每个试验进行域-by-域评估
     - 总体风险评级与理由

  5. **GRADE证据概况**
     - 总结发现表格式
     - 所有结果与确定性评级
     - 域特定理由（偏倚、不一致性、间接性、不精确性）

  6. **详细结果表格**
     - 个体试验结果
     - 亚组分析
     - 敏感性分析

  ### 阶段2: 图形组装

  创建多面板可出版图形：

  #### 工具: 使用PIL/Pillow的Python脚本

  ```python
  # 创建assemble_figures.py
  from PIL import Image, ImageDraw, ImageFont
  from pathlib import Path

  def add_panel_label(img, label, position='top-left', font_size=80, offset=(40, 40)):
      """添加A、B、C标签到面板"""
      draw = ImageDraw.Draw(img)

      # 尝试使用系统字体
      try:
          font = ImageFont.truetype("/System/Library/Fonts/Helvetica.ttc", font_size)
      except:
          font = ImageFont.load_default()

      x, y = offset

      # 为可见性绘制白色背景框
      bbox = draw.textbbox((x, y), label, font=font)
      padding = 10
      draw.rectangle(
          [bbox[0] - padding, bbox[1] - padding,
           bbox[2] + padding, bbox[3] + padding],
          fill='white',
          outline='black',
          width=2
      )

      draw.text((x, y), label, fill='black', font=font)
      return img

  def create_multi_panel_figure(images_list, output_path, labels=['A', 'B', 'C'], spacing=40):
      """垂直组合多个图像，带有标签"""
      # 添加标签到图像
      labeled_images = [add_panel_label(img, label) for img, label in zip(images_list, labels)]

      # 计算尺寸
      max_width = max(img.width for img in labeled_images)
      total_height = sum(img.height for img in labeled_images) + spacing * (len(labeled_images) - 1)

      # 创建组合图像
      combined = Image.new('RGB', (max_width, total_height), 'white')

      # 粘贴图像
      y_offset = 0
      for img in labeled_images:
          combined.paste(img, (0, y_offset))
          y_offset += img.height + spacing

      # 保存为300 DPI
      combined.save(output_path, dpi=(300, 300))
      return output_path
  ```

  #### 典型图形结构

  **主文：**

  - 图1: 多面板疗效（pCR、EFS、OS森林图）
  - 图2: 亚组分析（例如，按生物标志物状态）
  - 图3: 安全性 + 发表偏倚（SAE森林图、漏斗图）

  **补充：**

  - 补充图1: 敏感性分析（留一法图）
  - 补充图2: 发表偏倚（所有结果的漏斗图）

  ### 阶段3: 参考文献管理

  创建全面BibTeX文件：

  #### 步骤：

  1. **提取所有引用** 从手稿使用grep

     ```bash
     grep -E "¹|²|³|⁴|⁵|⁶|⁷|⁸|⁹|⁰|\\[\\d+\\]" manuscript_sections.md
     ```

  2. **为每个参考文献创建BibTeX条目**
     - 为所有条目包括DOI
     - 使用标准化期刊缩写（Index Medicus）
     - 正确格式化作者姓名

  3. **创建映射文档**
     - 映射上标（¹, ², ³）到BibTeX键
     - 记录手稿中的引用位置

  4. **创建使用指南**
     - Pandoc转换说明
     - Zotero导入说明
     - 手动格式化示例（Lancet、JAMA样式）

  ### 阶段4: 图形图例

  为所有图形编写全面图例：

  #### 图例结构：

  ```markdown
  **面板A. 结果名称**
  描述面板显示的内容。森林图显示[效应测量]对于[结果]
  跨越[N]个试验（[总参与者]）。[使用的统计方法]。[关键结果]。
  水平线表示95%置信区间；菱形表示合并效应。
  垂直线在[无效值]表示无治疗效应。

  **缩写**: 列出所有使用的缩写。
  ```

  包括：

  - 统计方法（随机效应、Hartung-Knapp调整）
  - 异质性测量（I²、Cochran's Q）
  - 临床解释
  - 缩写定义

  ### 阶段5: 质量保证

  在提交前，验证：

  #### 表格

  - [ ] 所有数据与分析结果完全匹配
  - [ ] 缩写已定义
  - [ ] 脚注解释所有符号
  - [ ] 列/行标题清晰
  - [ ] 统计符号一致

  #### 图形

  - [ ] 所有图形至少300 DPI
  - [ ] 面板标签（A, B, C）可见且不遮挡数据
  - [ ] 图例与图形完全匹配
  - [ ] 字体大小可读（最终打印大小≥8pt）
  - [ ] 色彩方案在灰度下工作

  #### 参考文献

  - [ ] 所有引用有对应的参考文献
  - [ ] 参考文献编号顺序
  - [ ] DOI正确且有效
  - [ ] 期刊缩写标准化
  - [ ] 作者姓名匹配原始出版物

  ## 输出结构

  ```
  07_manuscript/
  ├── tables/
  │   ├── Table1_Trial_Characteristics.md
  │   ├── Table2_Efficacy_Summary.md
  │   ├── Table3_Safety_Summary.md
  │   ├── SupplementaryTable1_RiskOfBias.md
  │   ├── SupplementaryTable2_GRADE_Profile.md
  │   └── ...
  ├── figures/
  │   ├── Figure1_Efficacy.png (300 DPI)
  │   ├── Figure2_Subgroup.png (300 DPI)
  │   ├── Figure3_Safety.png (300 DPI)
  │   ├── SupplementaryFigure1_Sensitivity.png
  │   └── ...
  ├── references.bib
  ├── FIGURE_LEGENDS.md
  ├── CITATION_MAPPING.md
  └── REFERENCES_USAGE_GUIDE.md
  ```

  ## 时间估计

  - 表格创建: 2-3小时
  - 图形组装: 1-2小时
  - 参考文献: 1-2小时
  - 图例: 1小时
  - 质量保证: 1小时
  - **总计: 6-9小时**

  ## 期刊特定格式化

  ### Lancet Oncology

  - 字数限制: 4000-5000字
  - 表格: 3-4个主文，无限制补充
  - 图形: 3-4个主文，无限制补充
  - 参考文献: Vancouver样式，通常30-40个
  - 分辨率: 至少300 DPI

  ### JAMA

  - 字数限制: 3500字
  - 表格: 最多4个
  - 图形: 最多4个
  - 参考文献: 最多40个
  - 分辨率: 300-600 DPI

  ### 新英格兰医学杂志

  - 字数限制: 3000字
  - 表格: 最多3个
  - 图形: 最多3个
  - 参考文献: 最多40个
  - 分辨率: 至少300 DPI

  ## 常见陷阱避免

  1. **表格**: 不要混合效应测量（RR vs OR vs HR）而不清晰标签
  2. **图形**: 不要压缩低于300 DPI
  3. **参考文献**: 不要使用自动生成引用而不验证
  4. **图例**: 不要省略统计方法或缩写
  5. **总体**: 不要提交而不独立验证所有数字

