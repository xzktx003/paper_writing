  # /bibliography - 引文管理

  我将帮助生成正确格式化的引文和书目。

  ## 支持的风格：

  | 风格 | 常见用途 |
  |-------|------------|
  | **APA 第7版** | 心理学、社会科学、教育 |
  | **MLA 第9版** | 人文学科、文学、艺术 |
  | **Chicago** | 历史、一些人文学科 |
  | **IEEE** | 工程、计算机科学 |
  | **Harvard** | 商业、一些科学 |
  | **Vancouver** | 医学、健康科学 |

  ## 我能做什么：

  ### 从URLs
  提供URLs，我将提取引文信息并格式化

  ### 从文本
  提供源详细信息，我将格式化引文

  ### 从研究
  如果我们一起做过研究，我将编译所有使用的源

  ### 注释
  添加简要注释描述每个源的贡献

  ## 我将捕获的引文组件：

  - 作者（全部，正确格式化）
  - 标题
  - 发布场所
  - 日期
  - 卷/期/页
  - DOI/URL
  - 访问日期（当需要时）

  ## 我需要什么：
  1. **源**：URLs、文本描述或“从我们的研究”
  2. **风格**：使用哪种引文风格
  3. **带注释？**：是否包含注释

  ## 输出选项：

  - 单独引文
  - 完整书目
  - 文内引文格式示例
  - 带注释的书目

  您希望我格式化哪些源，以及使用什么风格？
  项目：$ARGUMENTS
