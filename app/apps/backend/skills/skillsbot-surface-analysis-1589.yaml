    "analysis_type": "survey|depth_profile|imaging|force_spectroscopy|wettability",
    "parameters": {
      "scan_area": "number (um x um for AFM)",
      "sputter_depth": "number (nm for XPS)",
      "probe_liquids": ["string (for contact angle)"]
    }
  }
  ```

