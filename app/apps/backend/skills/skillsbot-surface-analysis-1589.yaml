  ## 最佳实践

  1. 分析前适当清洁样品（溶剂、等离子体）
  2. 对于XPS中的绝缘样品，使用电荷中和
  3. 将XPS结合能参考C 1s峰位于284.8 eV
  4. 使用台阶高度标准品校准AFM z轴尺度
  5. 使用新鲜的探针液体进行接触角测量
  6. 报告测量条件和不确定度

  ## 集成点

  - 与光谱分析连接，获取互补的化学信息
  - 为薄膜沉积提供过程监控数据
  - 支持失效分析中的表面污染识别
  - 与腐蚀评估集成，进行钝化层分析
