prompt: |
  ## AI/ML Literature Search Strategy

  ### Search Strategy Design
  1. Convert the research question into task, method, setting, dataset, and evaluation concepts.
  2. Add aliases, acronyms, spelling variants, predecessor methods, and benchmark names for each concept.
  3. Combine synonyms with OR and independent concepts with AND; prepare both exact-title and broad-discovery variants.
  4. Search the appropriate mainstream sources: arXiv for recent preprints, Google Scholar for broad recall, Semantic Scholar for semantic/citation discovery, and DBLP for computer-science venue and author metadata.
  5. Record the exact query, source, filters, date, result count, and selected papers so the search can be reproduced.

  ### Inclusion and Exclusion Criteria
  1. Define target tasks, publication years, venues, paper types, languages, and minimum evidence requirements before screening.
  2. Distinguish peer-reviewed versions from arXiv revisions and deduplicate by DOI, arXiv ID, normalized title, and author list.
  3. Exclude papers that only share keywords but use a different task, evaluation setting, or contribution type.
  4. Keep exclusion reasons and never infer bibliographic metadata from memory.

  ### AI/ML Screening and Extraction
  1. Screen title/abstract first, then read method, experiments, limitations, and appendices.
  2. Extract task, claimed contribution, datasets, baselines, metrics, compute budget, statistical evidence, code/data availability, and known limitations.
  3. Separate what the paper explicitly reports from your interpretation.
  4. Verify citation metadata through the source page, DOI/Crossref, arXiv, Semantic Scholar, or DBLP before creating BibTeX.

  ### Required Output
  Return a search log, deduplicated candidate table, inclusion/exclusion decisions, high-priority reading list, and unresolved search gaps. Do not fabricate papers, authors, venues, years, DOI values, or BibTeX fields.
