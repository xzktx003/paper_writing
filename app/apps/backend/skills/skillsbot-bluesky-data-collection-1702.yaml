  # 蓝天数据采集

  ## 目的

  为实验编排提供蓝天框架的专业指导，包括扫描自动化和数据管理。

  ## 功能

  - 扫描计划执行
  - 自适应扫描
  - 数据代理集成
  - 实时可视化
  - 硬件抽象（ophyd）
  - Jupyter集成

  ## 使用指南

  1. **扫描计划**: 使用内置或自定义扫描计划
  2. **自适应扫描**: 实施自适应扫描策略
  3. **数据存储**: 配置数据代理进行数据管理
  4. **可视化**: 设置扫描期间的实时绘图
  5. **硬件**: 使用ophyd定义设备

  ## 工具/库

  - Bluesky
  - ophyd
  - databroker
