  # TEM图像分析器

  ## 目的

  TEM图像分析器技能提供透射电子显微镜数据的全面分析，用于纳米材料表征，实现自动颗粒检测、尺寸分布分析和晶体结构确定。

  ## 功能

  - 自动颗粒检测与尺寸测量
  - 形貌分类
  - 晶格条纹分析
  - 选区电子衍射（SAED）标定
  - 高分辨透射电镜（HRTEM）分析
  - STEM-HAADF成像分析

  ## 使用指南

  ### 图像分析工作流程

  1. **颗粒检测**
     - 应用适当阈值处理
     - 使用分水岭算法处理接触颗粒
     - 统计至少200个颗粒以获得可靠数据

  2. **尺寸测量**
     - 根据比例尺校准像素尺寸
     - 测量费雷特直径或等效圆直径
     - 报告平均值、标准差和分布情况

  3. **晶体学分析**
     - 标定SAED图谱以确定物相
     - 从晶格条纹测量晶面间距
     - 从HRTEM图像确定晶带轴

  ## 流程集成

  - 多模态纳米材料表征流程
  - 统计颗粒尺寸分布分析
  - 原位表征实验设计

  ## 输入模式

  ```json
  {
    "图像路径": "字符串",
    "分析类型": "尺寸测量|形貌分析|晶体学分析",
    "比例尺": {"长度": "数值", "像素数": "数值"},
    "预期材料": "字符串（用于标定）"
  }
  ```

  ## 输出模式

  ```json
  {
    "颗粒统计": {
      "数量": "数值",
      "平均尺寸": "数值（纳米）",
      "标准差": "数值（纳米）",
      "尺寸分布": {"区间": [], "计数": []}
    },
    "形貌": {
      "形状": [{"类型": "字符串", "比例": "数值"}],
      "长宽比": "数值"
    },
    "晶体学": {
      "物相": "字符串",
      "晶面间距": ["数值（纳米）"],
      "晶带轴": "字符串"
    }
  }
  ```
