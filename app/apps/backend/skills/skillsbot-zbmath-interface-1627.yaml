  # zbMATH 接口

  ## 目的

  提供与zbMATH开放数据库的交互接口，用于开放获取数学文献的搜索与发现。

  ## 功能

  - 开放获取数学文献搜索
  - 软件参考文献链接
  - 分类浏览
  - 作者消歧
  - 全文链接

  ## 使用指南

  1. **开放获取**: 利用开放获取内容
  2. **软件链接**: 查找相关数学软件
  3. **分类**: 按数学主题分类(MSC)浏览
  4. **全文**: 链接至开放获取全文

  ## 工具/库

  - zbMATH 开放API
