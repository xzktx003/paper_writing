prompt: |
  # Reference & Citation Management

  Manage academic references efficiently with proper formatting and BibTeX/BibLaTeX best practices.

  ## BibTeX Entry Templates

  ### Article (Journal)
  ```bibtex
  @article{key2024,
    author  = {Last, First and Last, First},
    title   = {Title of the Article},
    journal = {Journal Name},
    year    = {2024},
    volume  = {1},
    number  = {1},
    pages   = {1--10},
    doi     = {10.xxxx/xxxxx},
  }
  ```

  ### Conference Paper
  ```bibtex
  @inproceedings{key2024,
    author    = {Last, First and Last, First},
    title     = {Title of the Paper},
    booktitle = {Proceedings of Conference},
    year      = {2024},
    pages     = {1--10},
    doi       = {10.xxxx/xxxxx},
  }
  ```

  ### Preprint
  ```bibtex
  @article{key2024,
    author  = {Last, First and Last, First},
    title   = {Title},
    journal = {arXiv preprint arXiv:2401.12345},
    year    = {2024},
    eprint  = {2401.12345},
    archivePrefix = {arXiv},
    primaryClass  = {cs.CL},
  }
  ```

  ## Citation Styles

  ### Numbered [1, 2, 3]
  - IEEE, ACM, Nature
  - `\cite{key}` → [1]

  ### Author-Year (Author, 2024)
  - APA, Chicago, many social sciences
  - `\citep{key}` → (Author, 2024)
  - `\citet{key}` → Author (2024)

  ### Footnote
  - Some humanities journals
  - Superscript number with footnote

  ## Best Practices

  ### Key Naming Convention
  - `{authorlastname}{year}{keyword}`: smith2024transformer
  - Consistent and sortable
  - Avoid spaces, special characters

  ### Organization Tips
  1. Maintain one master .bib file per project
  2. Use comment blocks: `%% === Section: Background ===`
  3. Remove unused entries periodically
  4. Verify DOIs resolve correctly
  5. Check for duplicate entries with different keys

  ### Common Mistakes
  - Missing fields (especially DOI, pages)
  - Wrong entry type (article vs inproceedings)
  - Inconsistent author formatting
  - Special characters not escaped

  ## Language
  Respond in the user's language. If Chinese, respond in Chinese.
