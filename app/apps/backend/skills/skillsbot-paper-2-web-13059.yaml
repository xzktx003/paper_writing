  ## 核心能力

  ### 1. Paper2Web：互动网站生成

  将论文转化为布局感知、互动的学术主页，超越简单的HTML转换。

  **关键特性**：
  - 响应式、多部分布局，适应论文内容
  - 互动图形、表格和引用
  - 移动友好设计，带导航
  - 自动徽标发现（使用Google搜索API）
  - 美学精炼和质量评估

  **最适合**：发表后推广、预印本增强、实验室网站、永久研究展示

  → **查看`references/paper2web.md`获取详细文档**

  ---

  ### 2. Paper2Video：演示视频生成

  生成带有幻灯片、旁白、光标移动和可选头像视频的专业演示视频。

  **关键特性**：
  - 从论文结构自动生成幻灯片
  - 自然声音的语音合成
  - 同步的光标移动和亮点
  - 可选使用Hallo2的头像视频（需要GPU）
  - 多语言支持

  **最适合**：视频摘要、会议演示、在线讲座、课程材料、YouTube推广

  → **查看`references/paper2video.md`获取详细文档**

  ---

  ### 3. Paper2Poster：会议海报生成

  创建具有专业布局和视觉设计的印刷就绪学术海报。

  **关键特性**：
  - 自定义海报尺寸（任意大小）
  - 专业设计模板
  - 机构品牌支持
  - QR代码生成用于链接
  - 高分辨率输出（300+ DPI）

  **最适合**：会议海报会议、研讨会、学术展览、虚拟会议

  → **查看`references/paper2poster.md`获取详细文档**

  ---

  ## 快速开始

  ### 前提条件

  1. **安装Paper2All**：
     ```bash
     git clone https://github.com/YuhangChen1/Paper2All.git
     cd Paper2All
     conda create -n paper2all python=3.11
     conda activate paper2all
     pip install -r requirements.txt
     ```

  2. **配置API密钥**（创建`.env`文件）：
     ```
     OPENAI_API_KEY=your_openai_api_key_here
     # 可选：GOOGLE_API_KEY和GOOGLE_CSE_ID用于徽标搜索
     ```

  3. **安装系统依赖**：
     - LibreOffice（文档转换）
     - Poppler实用程序（PDF处理）
     - NVIDIA GPU with 48GB（可选，用于头像视频）

  → **查看`references/installation.md`获取完整安装指南**

  ---

  ### 基本用法

  **生成所有组件**（网站+海报+视频）：
  ```bash
  python pipeline_all.py \
    --input-dir "path/to/paper" \
    --output-dir "path/to/output" \
    --model-choice 1
  ```

  **仅生成网站**：
  ```bash
  python pipeline_all.py \
    --input-dir "path/to/paper" \
    --output-dir "path/to/output" \
    --model-choice 1 \
    --generate-website
  ```

  **生成自定义尺寸的海报**：
  ```bash
  python pipeline_all.py \
    --input-dir "path/to/paper" \
    --output-dir "path/to/output" \
    --model-choice 1 \
    --generate-poster \
    --poster-width-inches 60 \
    --poster-height-inches 40
  ```

  **生成视频**（轻量级管道）：
  ```bash
  python pipeline_light.py \
    --model_name_t gpt-4.1 \
    --model_name_v gpt-4.1 \
    --result_dir "path/to/output" \
    --paper_latex_root "path/to/paper"
  ```

  → **查看`references/usage_examples.md`获取全面工作流示例**

  ---

  ## 工作流决策树

  使用此决策树确定生成哪些组件：

  ```
  用户需要论文的推广材料？
  │
  ├─ 需要永久在线存在？
  │  └─→ 生成Paper2Web（互动网站）
  │
  ├─ 需要物理会议材料？
  │  ├─→ 海报会议？ → 生成Paper2Poster
  │  └─→ 口头演示？ → 生成Paper2Video
  │
  ├─ 需要视频内容？
  │  ├─→ 期刊视频摘要？ → 生成Paper2Video（5-10分钟）
  │  ├─→ 会议讲座？ → 生成Paper2Video（15-20分钟）
  │  └─→ 社交媒体？ → 生成Paper2Video（1-3分钟）
  │
  └─ 需要完整包？
     └─→ 生成所有三个组件
  ```

  ## 输入要求

  ### 支持的输入格式

  **1. LaTeX源**（推荐）：
  ```
  paper_directory/
  ├── main.tex              # 主要论文文件
  ├── sections/             # 可选：分割部分
  ├── figures/              # 所有图形文件
  ├── tables/               # 表格文件
  └── bibliography.bib      # 参考文献
  ```

  **2. PDF**：
  - 高质量PDF，带嵌入字体
  - 可选文本（非扫描图像）
  - 高分辨率图形（首选300+ DPI）

  ### 输入组织

  **单篇论文**：
  ```bash
  input/
  └── paper_name/
      ├── main.tex（或paper.pdf）
      ├── figures/
      └── bibliography.bib
  ```

  **多篇论文**（批量处理）：
  ```bash
  input/
  ├── paper1/
  │   └── main.tex
  ├── paper2/
  │   └── main.tex
  └── paper3/
      └── main.tex
  ```

  ## 常见参数

  ### 模型选择
  - `--model-choice 1`：GPT-4（质量与成本的最佳平衡）
  - `--model-choice 2`：GPT-4.1（最新功能，更高成本）
  - `--model_name_t gpt-3.5-turbo`：更快，成本更低（可接受质量）

  ### 组件选择
  - `--generate-website`：启用网站生成
  - `--generate-poster`：启用海报生成
  - `--generate-video`：启用视频生成
  - `--enable-talking-head`：添加头像到视频（需要GPU）

  ### 自定义
  - `--poster-width-inches [width]`：自定义海报宽度
  - `--poster-height-inches [height]`：自定义海报高度
  - `--video-duration [seconds]`：目标视频长度
  - `--enable-logo-search`：自动机构徽标发现

  ## 输出结构

  生成的输出按论文和组件组织：
  ```
  output/
  └── paper_name/
      ├── website/
      │   ├── index.html
      │   ├── styles.css
      │   └── assets/
      ├── poster/
      │   ├── poster_final.pdf
      │   ├── poster_final.png
      │   └── poster_source/
      └── video/
          ├── final_video.mp4
          ├── slides/
          ├── audio/
          └── subtitles/
  ```

  ## 最佳实践

  ### 输入准备
  1. **尽可能使用LaTeX**：提供最佳内容提取和结构
  2. **正确组织文件**：将所有资产（图形、表格、参考文献）保存在论文目录中
  3. **高质量图形**：使用矢量格式（PDF、SVG）或高分辨率栅格（300+ DPI）
  4. **清洁LaTeX**：移除编译工件，确保源成功编译

  ### 模型选择策略
  - **GPT-4**：生产质量输出的最佳选择，会议、出版物
  - **GPT-4.1**：当需要最新功能或最佳可能质量时使用
  - **GPT-3.5-turbo**：用于快速草稿、测试或简单论文

  ### 组件优先级
  对于紧 deadline，按此顺序生成：
  1. **网站**（最快，最通用，~15-30分钟）
  2. **海报**（中等速度，用于打印 deadline，~10-20分钟）
  3. **视频**（最慢，可以稍后生成，~20-60分钟）

  ### 质量保证
  在最终确定输出前：
  1. **网站**：在多种设备上测试，验证所有链接工作，检查图形质量
  2. **海报**：打印测试页，验证从3-6英尺可读性，检查颜色
  3. **视频**：观看整个视频，验证音频同步，在不同设备上测试

  ## 资源要求

  ### 处理时间
  - **网站**：每篇论文15-30分钟
  - **海报**：每篇论文10-20分钟
  - **视频（无头像）**：每篇论文20-60分钟
  - **视频（有头像）**：每篇论文60-120分钟

  ### 计算要求
  - **CPU**：用于并行处理的多核处理器
  - **RAM**：最小16GB，推荐32GB用于大型论文
  - **GPU**：标准输出可选，头像视频需要（NVIDIA A6000 48GB）
  - **存储**：每篇论文1-5GB，取决于组件和质量设置

  ### API成本（近似）
  - **网站**：每篇论文$0.50-2.00（GPT-4）
  - **海报**：每篇论文$0.30-1.00（GPT-4）
  - **视频**：每篇论文$1.00-3.00（GPT-4）
  - **完整包**：每篇论文$2.00-6.00（GPT-4）

  ## 故障排除

  ### 常见问题
  **LaTeX解析错误**：
  - 确保LaTeX源成功编译：`pdflatex main.tex`
  - 检查所有引用的文件都存在
  - 验证没有自定义包阻止解析

  **图形质量差**：
  - 使用矢量格式（PDF、SVG、EPS）而非栅格
  - 确保栅格图像为300+ DPI
  - 检查图形在编译PDF中正确渲染

  **视频生成失败**：
  - 验证足够磁盘空间（推荐5GB+）
  - 检查所有依赖已安装（LibreOffice、Poppler）
  - 查看输出目录中的错误日志

  **海报布局问题**：
  - 验证海报尺寸合理（24"-72"范围）
  - 检查内容长度（非常长的论文可能需要手动策展）
  - 确保图形有适当分辨率用于海报大小

  **API错误**：
  - 验证`.env`文件中的API密钥
  - 检查API信用余额
  - 确保没有速率限制（等待并重试）

  ## 平台特定功能

  ### 社交媒体优化
  系统自动检测目标平台：
  **Twitter/X**（英语，数字文件夹名）：
  ```bash
  mkdir -p input/001_twitter/
  # 生成英语推广内容
  ```
  **Xiaohongshu/小红书**（中文，字母数字文件夹名）：
  ```bash
  mkdir -p input/xhs_paper/
  # 生成中文推广内容
  ```

  ### 会议特定格式
  指定会议要求：
  - 标准海报尺寸（4'×3', 5'×4', A0, A1）
  - 视频摘要长度限制（通常3-5分钟）
  - 机构品牌要求
  - 颜色方案偏好

  ## 集成和部署

  ### 网站部署
  将生成的网站部署到：
  - **GitHub Pages**：带自定义域名的免费托管
  - **学术托管**：大学网络服务器
  - **个人服务器**：AWS、DigitalOcean等
  - **Netlify/Vercel**：带CI/CD的现代托管

  ### 海报打印
  印刷就绪文件适用于：
  - 专业海报打印服务
  - 大学打印店
  - 在线服务（如Spoonflower、VistaPrint）
  - 大格式打印机（如果可用）

  ### 视频分发
  在以下平台分享视频：
  - **YouTube**：公开或未列出以最大化覆盖
  - **机构存储库**：大学视频平台
  - **会议平台**：虚拟会议系统
  - **社交媒体**：Twitter、LinkedIn、ResearchGate

  ## 高级用法

  ### 批量处理
  高效处理多篇论文：
  ```bash
  # 在批处理目录中组织论文
  for paper in paper1 paper2 paper3; do
      python pipeline_all.py \
        --input-dir input/$paper \
        --output-dir output/$paper \
        --model-choice 1 &
  done
  wait
  ```

  ### 自定义品牌
  应用机构或实验室品牌：
  - 在论文目录中提供徽标文件
  - 在配置中指定颜色方案
  - 使用自定义模板（高级）
  - 匹配会议主题要求

  ### 多语言支持
  生成不同语言的内容：
  - 在配置中指定目标语言
  - 系统适当翻译内容
  - 选择适当的语音用于视频旁白
  - 适应文化设计惯例

