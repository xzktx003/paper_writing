  # Paper2All：学术论文转化管道

  ## 概述

  该技能使用Paper2All自主管道将学术论文转化为多种推广和展示格式。系统将研究论文（LaTeX或PDF）转化为三个主要输出：

  1. **Paper2Web**：具有布局感知设计的互动、可探索的学术主页
  2. **Paper2Video**：带有旁白、幻灯片和可选头像的专业演示视频
  3. **Paper2Poster**：具有专业布局的印刷就绪会议海报

  管道使用LLM驱动的内容提取、设计生成和迭代精炼来创建高质量输出，适合会议、期刊、预印本库和学术推广。

  ## 何时使用此技能

  使用此技能当：

  - **创建会议材料**：学术会议的海报、演示视频和配套网站
  - **推广研究**：将已发表论文或预印本转化为可访问、吸引人的网页格式
  - **准备演示**：从论文内容生成视频摘要或完整演示视频
  - **传播发现**：为社交媒体、实验室网站或机构展示创建推广材料
  - **增强预印本**：向bioRxiv、arXiv或其他预印本提交添加互动主页
  - **批量处理**：同时为多篇论文生成推广材料

  **触发短语**：
  - “将此论文转换为网站”
  - “从我的LaTeX论文生成会议海报”
  - “从此研究创建视频演示”
  - “为我的论文制作互动主页”
  - “将我的论文转化为推广材料”
  - “为我的会议演讲生成海报和视频”

  ## 使用科学示意图增强视觉

  **使用此技能创建文档时，始终考虑添加科学图表和示意图以增强视觉传达。**

  如果您的文档不包含示意图或图表：
  - 使用**scientific-schematics**技能生成AI驱动的出版质量图表
  - 只需用自然语言描述您想要的图表
  - Nano Banana Pro将自动生成、审查和精炼示意图

  **对于新文档**：默认应生成科学示意图，以视觉表示文本中描述的关键概念、工作流、架构或关系。

  **如何生成示意图**：
  ```bash
  python scripts/generate_schematic.py "您的图表描述" -o figures/output.png
  ```

  AI将自动：
  - 创建具有适当格式的出版质量图像
  - 通过多次迭代审查和精炼
  - 确保可访问性（色盲友好、高对比度）
  - 将输出保存在figures/目录中

  **何时添加示意图**：
  - 论文转化管道图
  - 网站布局架构图
  - 视频制作工作流插图
  - 海报设计过程流程图
  - 内容提取图
  - 系统架构可视化
  - 任何受益于可视化的复杂概念

  有关创建示意图的详细指导，请参阅scientific-schematics技能文档。

