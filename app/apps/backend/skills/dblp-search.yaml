description: Search DBLP for computer-science papers, authors, venues, and publication records, with author disambiguation and BibTeX-ready metadata checks.
description_zh: 使用 DBLP 检索计算机领域论文、作者和会议期刊记录，处理同名作者与预印本/正式版本对应关系，并核对可用于 BibTeX 的出版元数据。
