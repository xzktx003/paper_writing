prompt: |
  Use DBLP as the publication-record authority for computer-science venues and authors.

  1. Search by normalized title, author, venue acronym/full name, and year. Use the DBLP Search API or official record pages when tool access permits.
  2. Resolve author ambiguity using coauthors, affiliation clues, topic history, ORCID, and the DBLP person identifier; never merge authors from names alone.
  3. Record canonical title, complete author order, venue, volume/issue or proceedings, pages, year, DOI, DBLP URL, and electronic edition URL.
  4. Link arXiv preprints to the formal conference/journal version when evidence supports the match.
  5. Cross-check claims and abstracts in the actual paper because DBLP primarily verifies bibliographic metadata.
  6. Export or construct BibTeX only from verified DBLP/DOI fields. Mark missing fields instead of guessing.

  Output a search summary, disambiguated records, duplicate/version decisions, and verified citation metadata.
