  # LaTeX研究海报

  ## 概述

  研究海报是会议、研讨会和学术活动中科学交流的关键媒介。本技能提供使用LaTeX包创建专业、视觉吸引人的研究海报的综合指南。生成具有适当布局、排版、颜色方案和视觉层次的出版质量海报。

  ## 何时使用此技能

  此技能应在以下情况下使用：
  - 为会议、研讨会或海报环节创建研究海报
  - 为大学活动或论文答辩设计学术海报
  - 为公众参与准备研究的视觉摘要
  - 将科学论文转换为海报格式
  - 为研究小组或部门创建模板海报
  - 设计符合特定会议尺寸要求的海报（A0、A1、36×48英寸等）
  - 构建具有复杂多列布局的海报
  - 在海报格式中集成图形、表格、方程和引用

  ## AI驱动的视觉元素生成

  **标准工作流：在创建LaTeX海报之前，使用AI生成所有主要视觉元素。**

  这是创建视觉吸引力海报的推荐方法：
  1. 规划所有需要的视觉元素（标题、介绍、方法、结果、结论）
  2. 使用scientific-schematics或Nano Banana Pro生成每个元素
  3. 在LaTeX模板中组装生成的图像
  4. 围绕视觉添加文本内容

  **目标：海报面积的60-70%应为AI生成的视觉，30-40%为文本。**

  ---

  ### 关键：海报尺寸字体要求

  **⚠️ AI生成的视觉化中的所有文本必须可海报阅读。**

  为海报生成图形时，必须在每个提示中包含字体大小规范。海报图形从4-6英尺外观看，因此文本必须大。

  **⚠️ 常见问题：内容溢出和密度**

  AI生成海报图形的第一大问题是**内容过多**。这导致：
  - 文本溢出边界
  - 不可读的小字体
  - 杂乱、压倒性的视觉
  - 空白使用不当

  **解决方案：生成具有最少内容的简单图形。**

  **海报图形所需的提示添加：**

  ```
  海报格式要求：
  - 每个图形最多3-5个元素（非10+）
  - 每个图形最多10-15个单词
  - 所有文本必须非常大且粗体（从6英尺外可读）
  - 标题文本：最小72pt等效，粗体
  - 关键指标/数字：最小60pt等效，粗体  
  - 标签和标题：最小36pt等效
  - 使用高对比度（深色文本在浅色背景上或反之）
  - 慷慨的空白（图形的40-50%应为空）
  - 大图标和粗线图形
  - 每个图形一个主要信息
  ```

  **每个图形类型的内容限制：**
  | 图形类型 | 最大元素 | 最大单词数 | 示例 |
  |----------|----------|------------|------|
  | 流程图 | 4-5个框 | 15个单词 | "数据 → 处理 → 模型 → 输出" |
  | 关键发现 | 3个项目 | 12个单词 | "95%准确率，2倍更快，临床就绪" |
  | 比较图表 | 3-4个条 | 10个单词 | "方法A: 70%，方法B: 85%，我们的: 95%" |
  | 图表 | 3-5个组件 | 15个单词 | 带标签部分的简单架构 |

  **示例 - 错误（内容过多，文本太小）：**
  ```bash
  # 错误 - 太复杂，太多元素，无大小规范
  python scripts/generate_schematic.py "信息图显示机器学习流程，包括数据收集、预处理、特征提取、模型训练、验证、超参数调优、测试、部署、监控和反馈循环。包括准确率指标、性能图、比较表和技术规格。" -o figures/pipeline.png
  # 结果：杂乱图形，文本小且不可读，溢出问题
  ```

  **示例 - 正确（简单，适合海报）：**
  ```bash
  # 正确 - 最少内容，明确大小要求，慷慨间距
  python scripts/generate_schematic.py "A0海报格式。简单流程图，仅4个框：数据 → 模型 → 预测 → 结果。每个框标签用巨大粗体文本（80pt+）。框间粗箭头。慷慨空白（50%空）。高对比度。每个框最多4个单词。从8英尺外可读。" -o figures/pipeline.png
  # 结果：干净、可读图形，大文本
  ```

  **示例 - 错误（关键发现太复杂）：**
  ```bash
  # 错误 - 太多项目，太多细节
  python scripts/generate_schematic.py "关键发现显示8个指标：准确率95%，精确率92%，召回率94%，F1 0.93，AUC 0.97，训练时间2.3小时，推理50毫秒，模型大小145MB，与5个基线方法比较" -o figures/findings.png
  # 结果：拥挤图形，小数字
  ```

  **示例 - 正确（关键发现简单）：**
  ```bash
  # 正确 - 仅3个关键项目，巨大数字
  python scripts/generate_schematic.py "A0海报格式。关键发现，仅3个大卡片。卡片1：'95%'用巨大文本（120pt）加'准确率'在下（48pt）。卡片2：'2X'用巨大文本加'更快'在下。卡片3：勾选图标加'已验证'用大文本。50%空白。高对比度颜色。无其他文本或细节。" -o figures/findings.png
  # 结果：粗体、可读的影响陈述
  ```

  **海报提示的字体大小参考：**
  | 元素 | 最小大小 | 提示关键词 |
  |------|----------|------------|
  | 主要数字/指标 | 72pt+ | "巨大"、"非常大"、"巨型"、"海报尺寸" |
  | 部分标题 | 60pt+ | "大粗体"、"突出" |
  | 标签/标题 | 36pt+ | "从6英尺外可读"、"清晰标签" |
  | 正文文本 | 24pt+ | "海报可读"、"大文本" |

  **始终在提示中包含：**
  - "海报格式"或"为A0海报"或"从6英尺外可读"
  - "非常大文本"或"巨大粗体字体"
  - 应出现的特定文本（以便嵌入图像）
  - "最少文本，最大影响"
  - "高对比度"以提高可读性

  ---

  ### 步骤1：规划您的海报元素

  在创建LaTeX海报之前，识别所有需要的视觉元素：

  1. **标题块** - 带机构品牌的设计标题（可选 - 可以是LaTeX文本）
  2. **介绍图形** - 概念概述或问题陈述视觉
  3. **方法图表** - 工作流、流程或实验设计
  4. **结果图形** - 数据可视化、图表、关键发现（2-4个图形）
  5. **结论图形** - 摘要视觉或核心信息
  6. **补充图标** - 部分图标、QR码、徽标

  ### 步骤2：生成每个元素

  对每种元素类型使用适当工具：

  **对于图表和图表（scientific-schematics）：**
  ```bash
  # 创建图形目录
  mkdir -p figures

  # 方法流程图 - 简单，仅4步
  python scripts/generate_schematic.py "A0海报格式。简单流程图，仅4个框：数据 → 处理 → 模型 → 结果。每个标签用巨大粗体文本（80pt+）。粗箭头。50%空白。无额外细节或子步骤。从8英尺外可读。" -o figures/methods_flowchart.png

  # 系统架构 - 简单，仅4个组件
  python scripts/generate_schematic.py "A0海报格式。简单架构图，仅4个组件：输入 → 网络 → 处理 → 输出。巨大标签（80pt+）。粗线。50%空白。无层细节。从8英尺外可读。" -o figures/architecture.png

  # 概念框架 - 简单，仅3个元素
  python scripts/generate_schematic.py "A0海报格式。简单图表，仅3个元素：A → B → C。每个标签用巨大粗体文本（80pt+）。粗箭头。50%空白。无额外文本。从8英尺外可读。" -o figures/concept_framework.png

  # 实验设计 - 简单，仅3组
  python scripts/generate_schematic.py "A0海报格式。简单设计图：对照 vs 处理，箭头指向结果。总共仅3个框。巨大标签（80pt+）。50%空白。无详细子组。从8英尺外可读。" -o figures/experimental_design.png
  ```

  **对于设计块和图形（Nano Banana Pro）：**
  ```bash
  # 标题块 - 简单
  python scripts/generate_schematic.py "A0海报格式。标题块：'药物发现的机器学习'用巨大粗体文本（120pt+）。深蓝背景。一个微妙图标。无其他文本。40%空白。从15英尺外可读。" -o figures/title_block.png

  # 介绍视觉 - 简单，仅3个元素
  python scripts/generate_schematic.py "A0海报格式。简单问题视觉，仅3个图标：药物图标、箭头、目标图标。每个图标一个标签（80pt+）。50%空白。无详细文本。从8英尺外可读。" -o figures/intro_visual.png

  # 结论/摘要 - 仅3个项目，巨大数字
  python scripts/generate_schematic.py "A0海报格式。关键发现，正好仅3个卡片。卡片1：'95%'（150pt字体）加'准确率'（60pt）。卡片2：'2X'（150pt）加'更快'（60pt）。卡片3：勾选图标加'就绪'（60pt）。50%空白。无其他文本。从10英尺外可读。" -o figures/conclusions_graphic.png

  # 背景视觉 - 简单，仅3个图标
  python scripts/generate_schematic.py "A0海报格式。简单视觉，仅3个大图标一行：问题图标 → 挑战图标 → 影响图标。每个一个单词标签（80pt+）。50%空白。无详细文本。从8英尺外可读。" -o figures/background_visual.png
  ```

  **对于数据可视化 - 简单，最多3个条：**
  ```bash
  # 简单图表，仅3个条，巨大标签
  python scripts/generate_schematic.py "A0海报格式。简单条形图，仅3个条：基线（70%）、现有（85%）、我们的（95%）。条上巨大百分比标签（100pt+）。无轴标签，无图例，无网格线。我们的条用不同颜色高亮。40%空白。从8英尺外可读。" -o figures/comparison_chart.png
  ```

  ### 步骤3：在LaTeX模板中组装

  在您的海报模板中包含所有生成的图形：

  **tikzposter示例：**
  ```latex
  \documentclass[25pt, a0paper, portrait]{tikzposter}

  \begin{document}

  \maketitle

  \begin{columns}
  \column{0.5}

  \block{介绍}{
    \centering
    \includegraphics[width=0.85\linewidth]{figures/intro_visual.png}
    
    \vspace{0.5em}
    简要上下文文本这里（最多2-3句）。
  }

  \block{方法}{
    \centering
    \includegraphics[width=0.9\linewidth]{figures/methods_flowchart.png}
  }

  \column{0.5}

  \block{结果}{
    \begin{minipage}{0.48\linewidth}
      \centering
      \includegraphics[width=\linewidth]{figures/result_1.png}
    \end{minipage}
    \hfill
    \begin{minipage}{0.48\linewidth}
      \centering
      \includegraphics[width=\linewidth]{figures/result_2.png}
    \end{minipage}
    
    \vspace{0.5em}
    关键发现，3-4个要点。
  }

  \block{结论}{
    \centering
    \includegraphics[width=0.8\linewidth]{figures/conclusions_graphic.png}
  }

  \end{columns}

  \end{document}
  ```

  **baposter示例：**
  ```latex
  \headerbox{方法}{name=methods,column=0,row=0}{
    \centering
    \includegraphics[width=0.95\linewidth]{figures/methods_flowchart.png}
  }

  \headerbox{结果}{name=results,column=1,row=0}{
    \includegraphics[width=\linewidth]{figures/comparison_chart.png}
    \vspace{0.3em}
    
    关键发现：我们的方法达到92%准确率。
  }
  ```

  ### 示例：完整海报生成工作流

  **记住：具有最少内容的简单图形。每个图形 = 一个信息。**

  ```bash
  # 1. 创建图形目录
  mkdir -p figures

  # 2. 生成简单视觉元素 - 每个图形最多5个元素

  # 问题陈述 - 仅3个图标
  python scripts/generate_schematic.py "A0海报格式。简单视觉，仅3个图标：患者图标 → 延迟图标 → 风险图标。每个一个单词标签（80pt+）。50%空白。从8英尺外可读。" -o figures/problem.png

  # 方法流程 - 仅4步
  python scripts/generate_schematic.py "A0海报格式。简单流程图，仅4个框：图像 → 处理 → 模型 → 诊断。巨大标签（100pt+）。粗箭头。50%空白。无子步骤。从8英尺外可读。" -o figures/methods.png

  # 架构图 - 仅4个组件  
  python scripts/generate_schematic.py "A0海报格式。简单架构，仅4个块：输入 → CNN → 密集 → 输出。巨大标签（80pt+）。粗线。50%空白。无层细节。从8英尺外可读。" -o figures/architecture.png

  # 结果 - 仅3个条
  python scripts/generate_schematic.py "A0海报格式。简单条形图，仅3个条：82%基线，88%现有，95%我们的（高亮）。条上巨大百分比（120pt+）。无轴，无图例。40%空白。从10英尺外可读。" -o figures/results.png

  # 关键发现 - 仅3个项目，巨大数字
  python scripts/generate_schematic.py "A0海报格式。正好仅3个卡片：'95%'（150pt）'准确率'（60pt），'2X'（150pt）'更快'（60pt），勾选'已验证'（60pt）。50%空白。无其他文本。从10英尺外可读。" -o figures/conclusions.png

  # 3. 用所有图形编译LaTeX海报
  pdflatex poster.tex
  ```

  **如果图形仍溢出或有小文本：**
  1. 进一步减少元素数量（尝试3而不是5）
  2. 在提示中添加"更简单"或"仅3个元素"
  3. 增加字体大小要求（尝试150pt+用于关键数字）
  4. 添加"60%空白"而不是50%

  ### 视觉元素指南

  **⚠️ 关键：每个图形应有一个主要信息和最少内容。**

  **内容限制 - 永不超出：**
  - **每个流程图最多5个框/元素**
  - **每个图表最多3-4个条**  
  - **每个信息图最多3个关键发现**
  - **每个图形最多15个单词**
  - **最少50%空白**

  **为每个海报部分，生成具有海报格式的简单视觉：**

  | 部分 | 最大元素 | 示例提示 |
  |------|----------|----------|
  | **介绍** | 3-4个图标 | "A0海报格式：简单问题视觉，3个大图标和3个单词标签。50%空白。" |
  | **方法** | 最多4-5个框 | "A0海报格式：简单流程图，仅4步：A → B → C → D。巨大标签（80pt+）。50%空白。" |
  | **结果** | 最多3-4个条 | "A0海报格式：简单条形图，仅3个条。巨大百分比（100pt+）。无图例，直接标签。" |
  | **结论** | 仅3个项目 | "A0海报格式：仅3个关键发现。巨大数字（120pt+）。一个单词标签。50%空白。" |

  **海报图形的强制提示元素：**
  1. **"A0海报格式"** - 尺寸指示器
  2. **"简单"**或**"仅X个元素"** - 内容限制
  3. **"巨大（80pt+）"**或**"巨型（100pt+）"** - 字体大小
  4. **"50%空白"** - 防止拥挤
  5. **"从6-8英尺外可读"** - 观看距离
  6. **确切文本**应出现（保持最少！）

  **避免的反模式：**
  - ❌ "显示方法论中的所有步骤" → 元素过多
  - ❌ "包括准确率、精确率、召回率、F1、AUC" → 指标过多
  - ❌ "6种不同方法的比较" → 比较过多
  - ❌ "具有所有层的详细架构" → 太复杂

  **正确模式：**
  - ✅ "仅4个主要步骤" → 有限元素
  - ✅ "仅前3个指标" → 专注内容
  - ✅ "仅比较我们的方法与基线" → 简单比较
  - ✅ "具有4个组件的高级架构" → 简化视图

