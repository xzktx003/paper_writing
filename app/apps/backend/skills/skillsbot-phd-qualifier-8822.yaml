  ## 最佳实践

  ### 当评估报告时

  1. **先完整阅读** - 在详细评估前获得整体印象
  2. **具体** - 指向确切位置，而非模糊批评
  3. **建设性** - 将批评框定为改进机会
  4. **平衡批评和表扬** - 承认做得好的地方
  5. **优先反馈** - 区分必须修复与可有可无
  6. **检查假设** - 什么适合一年级 vs 后期
  7. **公平** - 考虑学生的起点和可用时间

  ### 当评估演示时

  1. **考虑受众** - 应该对 ChE 教师可访问
  2. **检查时间** - 每幻灯片一分钟的经验法则
  3. **评估故事流** - 是否逻辑构建？
  4. **评估视觉** - 能从房间后部阅读吗？
  5. **思考问题** - 委员会会问什么？

  ### 当准备问题时

  1. **做背景研究** - 搜索最近文献
  2. **从广泛开始，深入** - 从一般到具体构建
  3. **混合难度水平** - 包括热身和挑战
  4. **测试理解** - 不只是记忆
  5. **公平但严格** - 期望博士水平思维
  6. **留出后续空间** - 并非所有都需要提前准备

  ## 要识别的常见陷阱

  ### 在报告中

  - 过度声称新颖性而没有足够文献综述
  - 方法部分无法重现
  - 挑选数据，忽略矛盾
  - 图表难读或设计差
  - 讨论只是重复结果
  - 未承认局限性
  - 不现实的未来计划

  ### 在演示中

  - 信息过载（幻灯片太多）
  - 文本密集幻灯片
  - 字体太小
  - 图表不清晰
  - 时间管理差
  - 无明确关键信息
  - 假设太多背景知识

  ### 在考试准备中

  - 问题太模糊
  - 只问记忆问题
  - 未检查最近文献
  - 缺少基本理解测试
  - 未探究报告中弱点区域

  ## 示例场景

  ### 强资格考试包

  **报告：**
  - 彻底 50+ 引用文献综述
  - 清晰、详细方法
  - 全面结果及正确分析
  - 有洞察力的讨论联系理论
  - 现实、深思熟虑的展望
  - 专业图表及适当误差分析
  - 整个文档清晰、撰写良好

  **演示：**
  - 引人注目的动机
  - 清晰、逻辑故事
  - 专业幻灯片及可读图表
  - 20 分钟的适当深度
  - 强结论和未来计划

  **推荐问题：**
  聚焦于：
  - 更深入的理论理解
  - 更广泛的应用
  - 未来研究方向
  - 发表计划

  ### 足够但需要改进

  **报告：**
  - 基本文献综述，缺少一些关键论文
  - 方法大部分清晰但一些歧义
  - 结果足够但分析可以更深
  - 讨论有些肤浅
  - 未来工作模糊
  - 一些图表质量问题

  **演示：**
  - 故事可理解但不引人注目
  - 一些幻灯片文本密集
  - 图表足够但可以更清晰
  - 时间稍微偏离

  **推荐问题：**
  聚焦于：
  - 文献差距（要询问的特定论文）
  - 方法选择和替代方案
  - 数据解释深度
  - 接下来的实验步骤

  ### 令人关注的包

  **报告：**
  - 单薄文献综述
  - 方法不清晰或不完整
  - 有限结果或分析差
  - 讨论弱
  - 无清晰前进路径
  - 图表质量差

  **演示：**
  - 故事不清晰
  - 文本密集幻灯片
  - 视觉设计差
  - 时间问题

  **推荐问题：**
  聚焦于：
  - 基本理解
  - 方法验证
  - 基本数据解释
  - 学生是否能识别问题

  ## 保持适当标准

  记住：

  **这是资格考试，而非答辩**
  - 应该展示潜力，而非完美
  - 一年级工作，非论文水平
  - 学习仍在进行中
  - 一些差距是预期的

  **但标准重要**
  - 必须展示博士水平思维
  - 应该显示研究技能正在发展
  - 需要看到独立工作能力
  - 文献知识应该正在发展

  **目标是发展性**
  - 识别学生知道得很好的地方
  - 找到需要解决的差距
  - 为下一步提供指导
  - 建立信心同时保持严谨
  - 帮助学生在博士项目中成功

  ## 资源和工具

  评估时，考虑使用：

  **文献搜索：**
  - Google Scholar 用于最近论文
  - Web of Science 用于引用分析
  - SciFinder 用于化学特定搜索
  - 综述文章用于领域概述

  **技术验证：**
  - 检查方程和计算
  - 验证单位和转换
  - 确认统计方法
  - 审查图表图例和标题

  **写作工具：**
  - 语法和清晰度
  - 引用格式
  - 图表编号
  - 参考文献完整性
