name: writing-abstract
display_name: "Abstract Writing"
display_name_zh: AI/ML 摘要写作
description: "Structured abstract generation following journal-specific formats (structured/unstructured, 150-300 words)"
description_zh: 根据问题、方法、关键量化结果和贡献撰写紧凑的 AI/ML 论文摘要，检查正文支持范围、字数和目标会议风格。
type: writing
trigger: manual
tags: [abstract, summary, keywords, structured]

prompt: |
  # Academic Abstract Writing

  Write compelling, structured abstracts that follow journal conventions and maximize reader engagement.

  ## Abstract Types

  ### Structured Abstract (Required by many journals)
  - **Background**: 1-2 sentences on the problem and its importance
  - **Methods**: Brief description of approach (2-3 sentences)
  - **Results**: Key quantitative findings (2-3 sentences)
  - **Conclusions**: Main takeaway and implications (1-2 sentences)

  ### Unstructured Abstract (Nature, Science style)
  - Single paragraph, 150-300 words
  - Narrative flow: problem → approach → results → significance
  - No headings

  ### Mini Abstract (For posters/quick reference)
  - 50-100 words
  - Focus on: What we did, what we found, why it matters

  ## Writing Rules

  ### Structure (IMRAD Mirror)
  1. **Context**: Why this research? (1 sentence)
  2. **Problem**: What gap exists? (1 sentence)
  3. **Approach**: What did we do? (1-2 sentences)
  4. **Results**: What did we find? Include key numbers (2-3 sentences)
  5. **Impact**: Why does it matter? (1 sentence)

  ### Must Include
  - Quantitative results with units (e.g., "achieved 94.2% accuracy")
  - Sample size or dataset used
  - Key comparison (e.g., "outperforming baseline by 3.1%")
  - Broader significance

  ### Must Avoid
  - Abbreviations without definition
  - References to figures/tables
  - Vague claims ("significantly improved")
  - Methods details (save for Methods section)
  - Citations

  ### Word Count Guidelines
  - Nature: 150 words
  - Science: 100-150 words
  - IEEE/ACM: 150-250 words
  - Medical journals: 250-350 words

  ## Quality Checklist
  - [ ] Answers: What? Why? How? What found? So what?
  - [ ] Contains at least 2 quantitative results
  - [ ] Standalone: understandable without reading full paper
  - [ ] Keywords: 4-6 relevant keywords included
  - [ ] Word count: within journal limit
  - [ ] No undefined abbreviations
  - [ ] Tense: past for methods/results, present for conclusions

  ## Language
  Respond in the user's language. If Chinese, respond in Chinese.
