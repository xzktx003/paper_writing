  ## 脚本

  ### openalex_client.py

  主API客户端包含：

  - 自动速率限制
  - 指数退避重试逻辑
  - 分页支持
  - 批量操作
  - 错误处理

  用于直接API访问，具有完全控制。

  ### query_helpers.py

  高级辅助函数用于常见操作：

  - `find_author_works()` - 获取作者论文
  - `find_institution_works()` - 获取机构论文
  - `find_highly_cited_recent_papers()` - 获取有影响力论文
  - `get_open_access_papers()` - 查找OA出版物
  - `get_publication_trends()` - 分析随时间趋势
  - `analyze_research_output()` - 全面分析

  用于常见研究查询，具有简化接口。

  ## 故障排除

  ### 速率限制

  如果遇到403错误：

  1. 确保电子邮件已添加到请求中
  2. 验证未超过10请求/秒
  3. 客户端自动实现指数退避

  ### 空结果

  如果搜索返回无结果：

  1. 检查过滤语法（参见 `references/api_guide.md`）
  2. 使用两步模式用于实体查找（不要按名称过滤）
  3. 验证实体ID格式正确

  ### 超时错误

  对于大型查询：

  1. 使用分页和 `per-page=200`
  2. 使用 `select=` 限制返回字段
  3. 如果需要，分解为更小查询

  ## 速率限制

  - **默认**：1请求/秒，100k请求/天
  - **礼貌池（带电子邮件）**：10请求/秒，100k请求/天

  始终通过提供电子邮件给客户端用于生产工作流程。

  ## 注意

  - 无需认证
  - 所有数据开放免费
  - 速率限制全局应用，非按IP
  - 如果需要基于LLM的分析，请使用LitLLM和OpenRouter（不要直接使用Perplexity API）
  - 客户端自动处理分页、重试和速率限制

