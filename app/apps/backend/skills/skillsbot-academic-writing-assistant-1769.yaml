  # 学术写作助手技能

  ## 目的

  协助学术与科学写作，包括结构、风格、清晰度以及遵循出版标准。

  ## 能力

  - 构建手稿结构
  - 提升清晰度
  - 检查风格一致性
  - 格式化参考文献
  - 提出改进建议
  - 审查语法

  ## 使用指南

  1. 输入草稿文本
  2. 分析结构
  3. 检查风格
  4. 提出改进建议
  5. 审查修改
  6. 最终定稿

  ## 流程整合

  在科学发现工作流中工作，适用于：
  - 手稿准备
  - 基金申请书撰写
  - 报告创建
  - 论文开发

  ## 配置

  - 风格指南
  - 期刊要求
  - 语言偏好
  - 审查深度

  ## 输出成果

  - 编辑后的手稿
  - 风格建议
  - 结构反馈
  - 改进报告
