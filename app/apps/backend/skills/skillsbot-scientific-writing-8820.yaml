prompt: |
  ---
  name: 科学写作
  description: |
    全面的科学写作指南，用于研究论文、资助提案和技术文档。
    涵盖论文结构（IMRAD）、方法写作、结果呈现、图表设计、引用格式、摘要写作和修订回复。适用于用户撰写科学论文、格式化手稿、回复审稿人、撰写资助提案或需要帮助科学沟通的任何方面。触发词包括“写论文”、“科学写作”、“格式化我的手稿”、“方法部分”、“回复审稿人”或任何研究写作任务。
  allowed-tools: "*"
  ---

  * 科学写作

  为撰写研究论文、资助提案和科学沟通提供系统性指导，强调清晰度、可重复性和遵循领域惯例。

  ** 科学写作工作流程

  *** 1. 确定文档类型和要求

  确定您要写什么：
  - 研究文章 → 包含新发现的完整论文
  - 综述文章 → 现有文献的综合
  - 资助提案 → 资金申请
  - 会议摘要 → 简要独立总结
  - 修订回复 → 回复同行审稿人
  - 技术报告 → 工作文档

  收集场地要求：
  - 目标期刊/会议/资助者名称
  - 各部分的字数/页数限制
  - 所需引用风格
  - 图表格式规范
  - 提交指南和模板

  *** 2. 选择结构和指导路线

  对于研究文章：
  - 使用IMRAD结构（见参考资料/论文结构.md）
  - 引言：参考资料/引言写作.md
  - 方法：参考资料/方法写作.md
  - 结果：参考资料/结果写作.md
  - 讨论：参考资料/讨论写作.md
  - 摘要：参考资料/摘要写作.md

  对于综述文章：
  - 见参考资料/综述写作.md以进行主题组织
  - 侧重于综合，而非按时间顺序列表
  - 对文献进行批判性评估

  对于资助提案：
  - 见参考资料/资助写作.md以获取资助者特定指导
  - 特定目标结构
  - 重要性、创新性、方法

  对于修订回复：
  - 见参考资料/修订回复.md以获取逐点格式
  - 使用外交语言并跟踪更改

  *** 3. 按部分撰写

  遵循部分特定指导：

  引言（参考资料/引言写作.md）
  - 漏斗结构：广泛 → 狭窄 → 空白 → 目标
  - 建立背景和重要性
  - 识别知识空白
  - 陈述清晰目标

  方法（参考资料/方法写作.md）
  - 可重复性至关重要
  - 包括所有基本细节：设备、试剂、软件、统计
  - 按时间顺序或子系统组织
  - 过去时态，适合领域的语态

  结果（参考资料/结果写作.md）
  - 客观报告观察
  - 无解释（留给讨论）
  - 整合图表
  - 包括统计细节
  - 过去时态

  讨论（参考资料/讨论写作.md）
  - 在背景下解释发现
  - 与文献比较
  - 诚实承认局限性
  - 讨论影响和未来工作
  - 混合现在（事实）和过去（您的结果）时态

  *** 4. 创建图表

  图表（参考资料/图表设计.md）
  - 根据数据类型匹配图表类型
  - 出版质量：300+ DPI、可读字体、尽可能矢量
  - 完整标题，包含所有基本信息
  - 色盲友好调色板

  表格（参考资料/表格设计.md）
  - 需要精确值时使用
  - 清晰表头带单位
  - 一致的小数位数
  - 描述性标题

  工具：
  #+begin_src bash
  # 生成出版质量图表
  python scripts/figure_generator.py data.csv config.yaml --output fig1.pdf

  # 为期刊格式化表格
  python scripts/table_formatter.py data.csv --format latex --journal nature
  #+end_src

  *** 5. 管理引用和参考文献

  引用格式（参考资料/引用管理.md）
  - 匹配期刊所需风格：
    - 编号：[1]、[2,3]、[1-5]
    - 作者-年份：(Smith, 2020; Jones, 2021)
    - 作者-编号：Smith (1)
  - 检查所有文本内引用都有参考文献
  - 检查所有参考文献都被引用
  - 整个文档格式一致

  工具：
  #+begin_src bash
  # 验证引用一致性
  python scripts/citation_checker.py manuscript.docx --style apa
  #+end_src

  *** 6. 提高清晰度和简洁性

  语言清晰度（参考资料/语言清晰度.md）
  - 首选主动语态（领域规范不同）
  - 简洁：删除填充词和冗余
  - 精确：避免模糊术语（“非常”、“相当”、“许多”）
  - 每个句子一个主要想法
  - 逻辑段落流程

  工具：
  #+begin_src bash
  # 分析可读性
  python scripts/readability_analyzer.py section.txt

  # 按部分计数单词
  python scripts/word_counter.py manuscript.docx
  #+end_src

  *** 7. 根据要求审查

  提交前检查清单：
  - [ ] 各部分字数限制符合
  - [ ] 所有图表在文本中被引用
  - [ ] 所有引用格式一致
  - [ ] 统计细节完整
  - [ ] 方法可重复
  - [ ] 局限性被讨论
  - [ ] 摘要在字数限制内
  - [ ] 关键词选择
  - [ ] 作者贡献声明
  - [ ] 利益冲突披露
  - [ ] 数据可用性声明
  - [ ] 伦理批准包括

  ** 文档类型路由

  *** 研究文章 → IMRAD结构

  结构概述（参考资料/论文结构.md）

  IMRAD部分：
  - /引/言：背景、空白、目标
  - /方/法：可重复的实验细节
  - /结/果：带数据的客观观察
  - /和
  - /讨/论：解释、影响、局限性

  内容归属：
  - 引言：为什么这项工作重要、未知内容、您将做什么
  - 方法：您如何做（足够细节以重复）
  - 结果：您发现了什么（观察，而非解释）
  - 讨论：它意味着什么、如何契合、下一步是什么

  常见错误避免：
  - ❌ 在结果部分解释
  - ❌ 在讨论部分引入新结果
  - ❌ 方法分散在结果中
  - ❌ 引言中缺失空白识别
  - ❌ 忽略局限性

  *** 综述文章 → 主题组织

  见参考资料/综述写作.md

  类型：
  - 叙述性综述：广泛概述
  - 系统性综述：结构化搜索（PRISMA）
  - 荟萃分析：定量综合

  关键原则：
  - 主题综合，非按时间顺序
  - 批判性评估，而非仅仅总结
  - 识别模式、空白、争议
  - 未来方向

  *** 资助提案 → 资助者特定结构

  见参考资料/资助写作.md

  常见元素：
  - 特定目标（1页）：清晰、可测试目标
  - 重要性：为什么重要、当前知识、影响
  - 创新性：方法的创新之处
  - 方法：方法、时间表、陷阱、替代方案
  - 初步数据：可行性证明

  审查标准对齐：
  - 明确满足所有标准
  - 使用匹配标准的标题
  - 让审稿人的工作变得容易

  *** 修订回复 → 逐点回复

  见参考资料/修订回复.md

  结构：
  - 感谢审稿人
  - 主要更改摘要
  - 带行号的逐点回复
  - 在手稿中跟踪更改

  回复策略：
  - 同意并遵守：描述所做更改
  - 同意但无法遵守：解释原因，提供替代方案
  - 不同意：以外交方式提供证据

  ** 部分特定指导

  *** 引言写作

  见参考资料/引言写作.md

  漏斗结构：
  1. 广泛背景（为什么一般主题重要）
  2. 狭窄到具体问题领域
  3. 识别知识空白
  4. 陈述本工作目标
  5. 简要方法概述（可选）

  长度：通常1-3页

  时态：现在时用于已确定事实，过去时用于先前研究

  *** 方法写作

  见参考资料/方法写作.md

  可重复性检查清单：
  - 设备：制造商、型号、规格
  - 试剂：来源、目录号、浓度
  - 软件：名称、版本、参数
  - 带校正的统计测试
  - 样本量理由
  - 伦理批准

  组织：
  - 按时间顺序（当顺序重要时）
  - 按子系统（复杂系统）
  - 按测量类型（多种检测）

  细节水平：
  - 标准程序：简要 + 引用
  - 新程序：完整细节
  - 修改程序：突出更改

  *** 结果写作

  见参考资料/结果写作.md

  客观性原则：
  - 报告观察，而非解释
  - “数据显示”而非“数据证明”
  - 诚实地呈现负面结果
  - 将解释留给讨论

  统计报告：
  - 检验统计量、自由度、精确p值
  - 效应大小和置信区间
  - 多重比较校正
  - 变异性度量（标准差、标准误、置信区间）

  图表整合：
  - 在文本中引用每个图表
  - 描述每个的关键发现
  - 不要只说“见图X”

  *** 讨论写作

  见参考资料/讨论写作.md

  结构：
  1. 重述主要发现（简要）
  2. 在文献背景下解释
  3. 与先前工作比较
  4. 解释意外发现
  5. 承认局限性
  6. 讨论影响
  7. 建议未来方向

  局限性：
  - 诚实但不过分贬低
  - 解释局限性的影响
  - 建议如何解决
  - 不要引入不相关局限性

  *** 摘要写作

  见参考资料/摘要写作.md

  基本元素：
  - 背景（1-2句）
  - 目标
  - 方法（简要方法）
  - 结果（带数据的关键发现）
  - 结论（重要性）

  字数限制策略：
  - 典型：150-300字
  - 优先结果和结论
  - 删除修饰语
  - 谨慎定义缩写
  - 无引用（通常）

  自包含要求：
  - 无需阅读论文即可理解
  - 包括实际数据，而不仅仅是“显著”

  ** 通用科学写作原则

  *** 1. 清晰度胜过复杂性

  - 当意义相同时，简单词汇优于复杂词汇
  - 偏好短句
  - 每个句子一个想法
  - 可能时使用主动语态（领域规范不同）
  - 定义专业术语

  *** 2. 语言精确性

  - 具体数字优于模糊术语
  - “大约50%”而非“许多”
  - 区分“显著”（统计）与“重要”
  - 明确因果与相关
  - 避免过度修饰（“相对地”、“相当地”、“非常”）

  *** 3. 报告客观性

  - 分离观察（结果）与解释（讨论）
  - 诚实地呈现负面结果
  - 承认矛盾证据
  - 不要夸大结论
  - 适当的确定性水平

  *** 4. 方法可重复性

  - 包括所需所有信息以重复
  - 设备规格
  - 确切浓度和条件
  - 统计方法完全描述
  - 软件版本和参数
  - 代码可用性（当适用时）

  *** 5. 论证逻辑流程

  - 每个部分建立在先前基础上
  - 想法间清晰过渡
  - 整个文档连贯叙事
  - 引言为讨论铺平道路
  - 讨论回答引言的问题

  *** 6. 适合受众的细节水平

  - 假设受众具有领域背景
  - 首次使用时定义专业术语
  - 在过多和过少细节间平衡
  - 不要解释基本概念
  - 解释新技术或应用

  ** 时态和语态使用指南

  *** 按部分时态

  引言：
  - 现在时：已确定事实（“DNA由...组成”）
  - 过去时：先前研究（“Smith等人显示...”）
  - 现在时：您的目标（“本研究调查...”）

  方法：
  - 过去时：您做了什么（“细胞被培养...”）
  - 过去时：（“我们培养了细胞...”）

  结果：
  - 过去时：您的发现（“表达增加...”）
  - 过去时：（“我们观察到表达增加...”）

  讨论：
  - 过去时：您的结果（“我们的数据显示...”）
  - 现在时：已确定事实（“这个基因调控...”）
  - 现在时：解释（“这些结果暗示...”）

  结论：
  - 现在时：一般结论（“这个方法提供...”）

  *** 按领域语态

  生物学/医学：
  - 方法中更多被动语态可接受
  - 其他部分主动或被动均可

  工程学/计算机科学：
  - 整个文档偏好主动语态
  - “我们设计了...”而非“设计被创建...”

  物理学/化学：
  - 因期刊和作者偏好而异
  - 如果一致，均可接受

  ** 快速参考 - 常见问题

  结果与讨论：将观察保留在结果中，解释在讨论中

  引用一致性：整个文档使用一种风格（编号[1]或作者-年份）

  图表引用：在文本中引用所有图表并描述发现，而不仅仅是“见图X”

  统计报告：包括检验统计量、自由度、精确p值、效应大小、变异性度量

  方法细节：包括制造商、目录号、浓度以实现可重复性

  局限性：诚实但不过分贬低；解释影响，建议解决方案

  见个别参考文件以获取详细示例和指导。

  ** 工具和实用程序

  *** 引用检查器

  #+begin_src bash
  python scripts/citation_checker.py manuscript.docx --style apa
  #+end_src

  验证文本内和参考文献列表之间的引用一致性。

  *** 图表生成器

  #+begin_src bash
  python scripts/figure_generator.py data.csv config.yaml --output fig1.pdf
  #+end_src

  从数据创建出版质量图表。

  *** 单词计数器

  #+begin_src bash
  python scripts/word_counter.py manuscript.docx
  #+end_src

  按部分计数单词以符合长度要求。

  *** 可读性分析器

  #+begin_src bash
  python scripts/readability_analyzer.py section.txt
  #+end_src

  分析文本复杂性并建议改进。

  *** 表格格式化器

  #+begin_src bash
  python scripts/table_formatter.py data.csv --format latex --journal nature
  #+end_src

  为特定期刊格式化表格。

