  # Geant4探测器模拟器

  ## 目的

  提供Geant4探测器模拟的专业指导，包括几何构造、物理列表配置和粒子输运建模。

  ## 能力

  - 几何构造（GDML、C++）
  - 物理列表选择与定制
  - 灵敏探测器实现
  - 命中收集与数字化
  - 可视化配置
  - 多线程优化

  ## 使用指南

  1. **几何建模**：使用GDML或C++代码定义探测器几何结构
  2. **物理列表**：为应用选择合适的物理列表
  3. **灵敏探测器**：在活动体积中实现命中收集
  4. **数字化**：将命中转换为探测器信号
  5. **优化**：启用多线程以提升性能

  ## 工具/库

  - Geant4
  - GDML
  - ROOT
