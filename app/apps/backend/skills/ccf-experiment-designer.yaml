content: |
  # CCF Experiment Designer

  ## Overview
  Designs comprehensive experimental protocols for CCF-A paper submissions. Covers baseline selection, metric definition, ablation study design, robustness testing, and result presentation.

  ## Capabilities
  - Baseline matrix design
  - Metric selection and definition
  - Ablation study protocols
  - Robustness and generalization tests
  - Result table templates
  - Result visualization

  ## Output
  - Experiment protocol document
  - Baseline matrix
  - Result table templates
  - Real result figures (not fabricated)
