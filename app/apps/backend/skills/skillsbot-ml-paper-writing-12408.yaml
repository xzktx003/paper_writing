  ## 审稿人评估标准

  审稿人在四个维度评估论文：

  | 标准 | 审稿人寻找什么 |
  |-----------|------------------------|
  | **质量** | 技术合理性，良好支持的声明 |
  | **清晰度** | 清晰写作，专家可复制 |
  | **重要性** | 社区影响，推进理解 |
  | **原创性** | 新见解（不需要新方法） |

  **评分（NeurIPS 6点量表）**：
  - 6: 强烈接受 - 开创性，无瑕疵
  - 5: 接受 - 技术扎实，高影响
  - 4: 边缘接受 - 扎实，有限评估
  - 3: 边缘拒绝 - 扎实但弱点超过
  - 2: 拒绝 - 技术缺陷
  - 1: 强烈拒绝 - 已知结果或伦理问题

  见[references/reviewer-guidelines.md](references/reviewer-guidelines.md)获取详细审稿人指令。

