  ## 常见问题和解决方案

  **问题：摘要太通用**

  如果第一句可以附加到任何ML论文，删除它。以您的具体贡献开始。

  **问题：引言超过1.5页**

  将背景拆分为相关工作。前置贡献要点。方法应在第2-3页开始。

  **问题：实验缺少明确声明**

  在每个实验前添加句子：“此实验测试是否[具体声明]...”

  **问题：审稿人发现论文难懂**

  - 添加明确路标：“在本节中，我们显示X”
  - 使用一致术语贯穿
  - 包括独立的图标题

  **问题：缺少统计显著性**

  始终包括：
  - 误差条（指定：标准差或标准误差）
  - 运行次数
  - 如果比较方法，统计测试

