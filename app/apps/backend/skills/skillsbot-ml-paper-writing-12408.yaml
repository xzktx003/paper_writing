  ## 会议要求快速参考

  | 会议 | 页面限制 | 最终提交额外 | 关键要求 |
  |------------|------------|------------------------|-----------------|
  | **NeurIPS 2025** | 9页 | +0 | 必需清单，接受后需通俗摘要 |
  | **ICML 2026** | 8页 | +1 | 需更广泛影响声明 |
  | **ICLR 2026** | 9页 | +1 | 需LLM披露，互审协议 |
  | **ACL 2025** | 8页（长） | 可变 | 必需局限性部分 |
  | **AAAI 2026** | 7页 | +1 | 严格样式文件遵守 |
  | **COLM 2025** | 9页 | +1 | 关注语言模型 |

  **通用要求**：
  - 双盲评审（匿名化提交）
  - 参考文献不计入页面限制
  - 附录无限制，但审稿人无需阅读
  - 所有会议需LaTeX

