  ## 会议重新提交和格式转换

  当论文从一个会议被拒或撤回并重新提交到另一个会议时，需要格式转换。这是ML研究中的常见工作流。

  ### 工作流3：在会议格式间转换

  ```
  格式转换清单：
  - [ ] 步骤1：识别源和目标模板差异
  - [ ] 步骤2：用目标模板创建新项目
  - [ ] 步骤3：复制内容部分（不是前导）
  - [ ] 步骤4：调整页面限制和内容
  - [ ] 步骤5：更新会议特定要求
  - [ ] 步骤6：验证编译和格式
  ```

  **步骤1：关键模板差异**

  | 从 → 到 | 页面变化 | 关键调整 |
  |-----------|-------------|-----------------|
  | NeurIPS → ICML | 9 → 8页 | 削减1页，如果缺少则添加更广泛影响 |
  | ICML → ICLR | 8 → 9页 | 可以扩展实验，添加LLM披露 |
  | NeurIPS → ACL | 9 → 8页 | 为NLP惯例重组，添加局限性 |
  | ICLR → AAAI | 9 → 7页 | 需要显著削减，严格样式遵守 |
  | 任何 → COLM | 可变 → 9 | 重构以关注语言模型 |

  **步骤2：内容迁移（不是模板合并）**

  **绝不复制LaTeX前导部分到模板之间。** 而是：

  ```bash
  # 1. 用目标模板新开始
  cp -r templates/icml2026/ new_submission/

  # 2. 仅从旧论文复制内容部分
  # - 摘要文本
  # - 部分内容（在\section{}命令之间）
  # - 图表
  # - 参考文献条目

  # 3. 粘贴到目标模板结构中
  ```

  **步骤3：调整页面限制**

  当削减页面时（例如，NeurIPS 9 → AAAI 7）：
  - 将详细证明移到附录
  - 压缩相关工作（引用调查而不是个别论文）
  - 将类似实验组合成统一表格
  - 使用较小图尺寸和子图
  - 收紧写作：消除冗余，使用主动语态

  当扩展时（例如，ICML 8 → ICLR 9）：
  - 添加审稿人请求的消融研究
  - 扩展局限性讨论
  - 包括额外基准
  - 添加定性示例

  **步骤4：会议特定调整**

  | 目标会议 | 必需添加 |
  |--------------|-------------------|
  | **ICML** | 更广泛影响声明（结论后） |
  | **ICLR** | LLM使用披露，互审协议 |
  | **ACL/EMNLP** | 局限性部分（强制），伦理声明 |
  | **AAAI** | 严格遵守样式文件（无修改） |
  | **NeurIPS** | 论文清单（附录），接受后通俗摘要 |

  **步骤5：更新参考文献**

  ```latex
  % 移除揭示身份的自我引用（用于盲审）
  % 更新任何“正在审阅”引用到已发表版本
  % 添加自上次提交以来发表的新相关工作
  ```

  **步骤6：解决先前审稿意见**

  被拒后重新提交时：
  - **做** 在新闻本中解决审稿人关注
  - **做** 添加审稿人请求的实验/澄清
  - **不做** 包括“从前次提交更改”部分（盲审）
  - **不做** 引用先前提交或审稿意见

  **常见转换陷阱**：
  - ❌ 复制`\usepackage`命令（导致冲突）
  - ❌ 保持旧会议头/尾命令
  - ❌ 忘记更新`\bibliography{}`路径
  - ❌ 缺少会议特定必需部分
  - ❌ 格式更改后超出页面限制

