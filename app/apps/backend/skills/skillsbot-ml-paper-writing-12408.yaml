  ## 表格和图

  ### 表格

  使用`booktabs` LaTeX包获取专业表格：

  ```latex
  \usepackage{booktabs}
  \begin{tabular}{lcc}
  \toprule
  方法 & 准确率 ↑ & 延迟 ↓ \\
  \midrule
  基准 & 85.2 & 45ms \\
  \textbf{我们的} & \textbf{92.1} & 38ms \\
  \bottomrule
  \end{tabular}
  ```

  **规则**：
  - 每个指标最佳值加粗
  - 包括方向符号（↑越高越好，↓越低越好）
  - 数值列右对齐
  - 一致小数精度

  ### 图

  - **矢量图形**（PDF, EPS）用于所有绘图和图表
  - **栅格**（PNG 600 DPI）仅用于照片
  - 使用**色盲安全调色板**（Okabe-Ito或Paul Tol）
  - 验证**灰度可读性**（8%的男性有色觉缺陷）
  - **无图内标题**——标题服务此功能
  - **独立标题**——读者应无需主文理解

