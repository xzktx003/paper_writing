  # 为顶级AI会议撰写ML论文

  针对NeurIPS、ICML、ICLR、ACL、AAAI和COLM等会议，提供撰写可用于发表论文的专家级指导。本技能结合了顶尖研究人员（如Nanda、Farquhar、Karpathy、Lipton、Steinhardt）的写作哲学和实用工具：LaTeX模板、引用验证API和会议清单。

  ## 核心理念：协作写作

  **论文写作是协作的，但Claude应主动提供草稿。**

  典型工作流始于包含代码、结果和实验工件的研究仓库。Claude的角色是：

  1. **理解项目**：通过探索仓库、结果和现有文档
  2. **提供完整初稿**：当对贡献有信心时
  3. **搜索文献**：使用网络搜索和API查找相关引用
  4. **通过反馈循环精炼**：当科学家提供输入时
  5. **请求澄清**：仅在对关键决策真正不确定时

  **关键原则**：主动。如果仓库和结果清晰，提供完整草稿。不要等待每个部分的反馈——科学家很忙。生成具体内容供他们反应，然后根据响应迭代。

  ---

  ## ⚠️ 关键：绝不伪造引用

  **这是AI辅助学术写作中最重要的规则。**

  ### 问题
  AI生成的引用有**约40%的错误率**。伪造引用——不存在的论文、错误作者、错误年份、虚构DOI——是严重的学术不端行为，可能导致直接拒稿或撤稿。

  ### 规则
  **绝不从内存生成BibTeX条目。始终通过程序获取。**

  | 行动 | ✅ 正确 | ❌ 错误 |
  |--------|-----------|----------|
  | 添加引用 | 搜索API → 验证 → 获取BibTeX | 从内存编写BibTeX |
  | 不确定某论文 | 标记为`[CITATION NEEDED]` | 猜测引用 |
  | 找不到确切论文 | 备注：“占位符 - 验证” | 发明听起来相似的论文 |

  ### 当无法验证引用时

  如果无法通过程序验证引用，必须：

  ```latex
  % 显式占位符 - 需要人工验证
  \cite{PLACEHOLDER_author2024_verify_this}  % TODO: 验证此引用存在
  ```

  **始终告知科学家**：“我已将[X]个引用标记为需要验证的占位符。我无法确认这些论文存在。”

  ### 推荐：安装Exa MCP用于论文搜索

  为了最佳论文搜索体验，安装**Exa MCP**以提供实时学术搜索：

  **Claude Code:**
  ```bash
  claude mcp add exa -- npx -y mcp-remote "https://mcp.exa.ai/mcp"
  ```

  **Cursor / VS Code**（添加到MCP设置）：
  ```json
  {
    "mcpServers": {
      "exa": {
        "type": "http",
        "url": "https://mcp.exa.ai/mcp"
      }
    }
  }
  ```

  Exa MCP支持搜索如：
  - “查找2023年后发表的关于语言模型RLHF的论文”
  - “搜索Vaswani的transformer架构论文”
  - “获取关于可解释性稀疏自编码器的最新工作”

  然后通过Semantic Scholar API验证结果，并通过DOI获取BibTeX。

  ---

  ## 工作流0：从研究仓库开始

  开始论文写作时，首先理解项目：

  ```
  项目理解：
  - [ ] 步骤1：探索仓库结构
  - [ ] 步骤2：阅读README、现有文档和关键结果
  - [ ] 步骤3：与科学家确认主要贡献
  - [ ] 步骤4：查找代码库中已引用的论文
  - [ ] 步骤5：搜索其他相关文献
  - [ ] 步骤6：共同概述论文结构
  - [ ] 步骤7：通过反馈迭代起草各部分
  ```

  **步骤1：探索仓库**

  ```bash
  # 理解项目结构
  ls -la
  find . -name "*.py" | head -20
  find . -name "*.md" -o -name "*.txt" | xargs grep -l -i "result\|conclusion\|finding"
  ```

  查找：
  - `README.md` - 项目概览和声明
  - `results/`、`outputs/`、`experiments/` - 关键发现
  - `configs/` - 实验设置
  - 现有`.bib`文件或引用参考
  - 任何草稿文档或笔记

  **步骤2：识别现有引用**

  检查代码库中已引用的论文：

  ```bash
  # 查找现有引用
  grep -r "arxiv\|doi\|cite" --include="*.md" --include="*.bib" --include="*.py"
  find . -name "*.bib"
  ```

  这些是“相关工作”的高信号起点——科学家已认为它们相关。

  **步骤3：澄清贡献**

  在写作前，明确与科学家确认：

  > “基于我对仓库的理解，主要贡献似乎是[X]。
  > 关键结果显示[Y]。这是您希望的论文框架吗？
  > 或者我们应该强调不同方面？”

  **绝不假设叙述——始终与人类验证。**

  **步骤4：搜索其他文献**

  使用网络搜索查找相关论文：

  ```
  尝试搜索查询：
  - "[主要技术] + [应用领域]"
  - "[基准方法] 比较"
  - "[问题名称] 最新技术"
  - 现有引用中的作者姓名
  ```

  然后使用以下引用工作流验证并检索BibTeX。

  **步骤5：提供初稿**

  **主动——提供完整草稿，而不是请求每个部分的许可。**

  如果仓库提供清晰结果且贡献明显：
  1. 从头到尾撰写完整初稿
  2. 呈现完整草稿供反馈
  3. 根据科学家响应迭代

  如果对框架或主要声明真正不确定：
  1. 起草您可以自信的部分
  2. 标记特定不确定性：“我将X框架为主要贡献——如果您希望强调Y，请告知”
  3. 继续起草，而不是阻塞

  **与草稿一起包含的问题**（不是之前）：
  - “我强调X为主要贡献——根据需要调整”
  - “我突出结果A、B、C——如果其他更重要，请告知”
  - “相关工作部分包括[论文]——添加我遗漏的任何”

  ---

  ## 何时使用此技能

  在以下情况使用此技能：
  - **从研究仓库开始**撰写论文
  - **起草或修订**特定部分
  - **查找和验证**相关工作的引用
  - **格式化**会议提交
  - **重新提交**到不同会议（格式转换）
  - **迭代**草稿与科学家反馈

  **始终记住**：初稿是讨论的起点，不是最终输出。

  ---

  ## 平衡主动性与协作

  **默认：主动。提供草稿，然后迭代。**

  | 置信度 | 行动 |
  |-----------------|--------|
  | **高**（清晰仓库，明显贡献） | 撰写完整草稿，提供，基于反馈迭代 |
  | **中**（有些模糊） | 起草草稿并标记不确定性，继续 |
  | **低**（主要未知） | 提出1-2个针对性问题，然后起草 |

  **先起草，与草稿一起提问**（不是之前）：

  | 部分 | 自主起草 | 与草稿一起标记 |
  |---------|-------------------|-----------------|
  | 摘要 | 是 | “框架贡献为X——根据需要调整” |
  | 引言 | 是 | “强调问题Y——如果错误请更正” |
  | 方法 | 是 | “包括细节A、B、C——添加缺失部分” |
  | 实验 | 是 | “突出结果1、2、3——如果需要重新排序” |
  | 相关工作 | 是 | “引用论文X、Y、Z——添加我遗漏的任何” |

  **仅在以下情况阻塞输入**：
  - 目标会议不清晰（影响页面限制、框架）
  - 多个矛盾框架似乎同样有效
  - 结果似乎不完整或不一致
  - 明确要求在继续前审查

  **不要阻塞**：
  - 词汇选择决策
  - 部分排序
  - 显示哪些具体结果（做出选择，标记它）
  - 引用完整性（用您找到的内容起草，注意差距）

  ---

  ## 叙述原则

  **最关键洞察**：您的论文不是实验集合——它是一个具有一个清晰贡献并由证据支持的故事。

  每个成功的ML论文都围绕Neel Nanda称为“叙述”的核心：一个简短、严谨、基于证据的技术故事，带有读者关心的要点。

  **三大支柱（必须在引言结束时清晰）**：

  | 支柱 | 描述 | 示例 |
  |--------|-------------|---------|
  | **是什么** | 1-3个具体新颖声明，在连贯主题内 | “我们证明X在条件Z下实现Y” |
  | **为什么** | 支持声明的严谨实证证据 | 强基准，区分假设的实验 |
  | **所以呢** | 为什么读者应该关心 | 与公认社区问题的联系 |

  **如果您无法用一句话陈述您的贡献，您还没有论文。**

  ---

  ## 论文结构工作流

  ### 工作流1：撰写完整论文（迭代）

  复制此清单并跟踪进度。**每个步骤涉及起草 → 反馈 → 修订**：

  ```
  论文写作进度：
  - [ ] 步骤1：定义一句话贡献（与科学家）
  - [ ] 步骤2：起草图1 → 获取反馈 → 修订
  - [ ] 步骤3：起草摘要 → 获取反馈 → 修订
  - [ ] 步骤4：起草引言 → 获取反馈 → 修订
  - [ ] 步骤5：起草方法 → 获取反馈 → 修订
  - [ ] 步骤6：起草实验 → 获取反馈 → 修订
  - [ ] 步骤7：起草相关工作 → 获取反馈 → 修订
  - [ ] 步骤8：起草局限性 → 获取反馈 → 修订
  - [ ] 步骤9：完成论文清单（必需）
  - [ ] 步骤10：最终审查周期和提交
  ```

  **步骤1：定义一句话贡献**

  **此步骤需要科学家明确确认。**

  在写作任何内容前，阐明并验证：
  - 您的论文贡献了什么？
  - 在您工作之前什么不明显或不存在？

  > “我建议将贡献框架为：‘[一句话]’。这捕获了
  > 您认为的主要要点吗？我们应该调整重点吗？”

  **步骤2：起草图1**

  图1值得特别关注——许多读者直接跳到它。
  - 传达核心想法、方法或最引人注目的结果
  - 使用矢量图形（用于绘图的PDF/EPS）
  - 编写无需主文即可独立的标题
  - 确保黑白可读性（8%的男性有色觉缺陷）

  **步骤3：撰写摘要（5句公式）**

  来自Sebastian Farquhar（DeepMind）：

  ```
  1. 您实现了什么：“我们介绍...”，“我们证明...”，“我们演示...”
  2. 为什么这很难且重要
  3. 您如何做（使用专业关键词以提高可发现性）
  4. 您有什么证据
  5. 您最显著的数字/结果
  ```

  **删除**通用开头如“大型语言模型取得了显著成功...”

  **步骤4：撰写引言（最多1-1.5页）**

  必须包括：
  - 2-4个贡献要点列表（在双栏格式中最多每点1-2行）
  - 清晰问题陈述
  - 简要方法概览
  - 方法应在第2-3页开始

  **步骤5：方法部分**

  支持重新实现：
  - 概念概述或伪代码
  - 列出所有超参数
  - 架构细节足以复制
  - 呈现最终设计决策；消融实验放在实验中

  **步骤6：实验部分**

  对于每个实验，明确说明：
  - 它支持什么声明
  - 如何连接到主要贡献
  - 实验设置（详细信息在附录）
  - 观察什么：“蓝线显示X，这证明Y”

  要求：
  - 误差条与方法论（标准差与标准误差）
  - 超参数搜索范围
  - 计算基础设施（GPU类型，总小时数）
  - 种子设置方法

  **步骤7：相关工作**

  按方法论组织，而不是逐篇论文：

  **好**：“一条工作线使用Floogledoodle的假设[引用]，而我们使用Doobersnoddle的假设，因为...”

  **差**：“Snap等人介绍了X，而Crackle等人介绍了Y。”

  慷慨引用——审稿人可能撰写了相关论文。

  **步骤8：局限性部分（必需）**

  所有主要会议都要求此部分。反直觉地，诚实有帮助：
  - 审稿人被指示不因诚实承认局限性而惩罚
  - 通过首先识别弱点来先发制人批评
  - 解释为什么局限性不削弱核心声明

  **步骤9：论文清单**

  NeurIPS、ICML和ICLR都要求论文清单。见[references/checklists.md](references/checklists.md)。

  ---

  ## 顶级ML会议的写作哲学

  **本节提炼了领先ML研究人员最重要的写作原则。** 这些不是可选的风格建议——它们是区分接受论文和拒稿论文的关键。

  > “论文是一个简短、严谨、基于证据的技术故事，带有读者关心的要点。” — Neel Nanda

  ### 此指导背后的来源

  本技能综合了在顶级会议广泛发表的研究人员的写作哲学：

  | 来源 | 关键贡献 | 链接 |
  |--------|-----------------|------|
  | **Neel Nanda**（Google DeepMind） | 叙述原则，什么/为什么/所以呢框架 | [如何撰写ML论文](https://www.alignmentforum.org/posts/eJGptPbbFPZGLpjsp/highly-opinionated-advice-on-how-to-write-ml-papers) |
  | **Sebastian Farquhar**（DeepMind） | 5句摘要公式 | [如何撰写ML论文](https://sebastianfarquhar.com/on-research/2024/11/04/how_to_write_ml_papers/) |
  | **Gopen & Swan** | 读者期望的7原则 | [科学写作的科学](https://cseweb.ucsd.edu/~swanson/papers/science-of-writing.pdf) |
  | **Zachary Lipton** | 词汇选择，消除模糊 | [科学写作启发式](https://www.approximatelycorrect.com/2018/01/29/heuristics-technical-scientific-writing-machine-learning-perspective/) |
  | **Jacob Steinhardt**（UC Berkeley） | 精确性，一致术语 | [写作技巧](https://bounded-regret.ghost.io/) |
  | **Ethan Perez**（Anthropic） | 微观清晰度技巧 | [简单论文写作技巧](https://ethanperez.net/easy-paper-writing-tips/) |
  | **Andrej Karpathy** | 单一贡献焦点 | 各种讲座 |

  **要深入了解任何这些，见：**
  - [references/writing-guide.md](references/writing-guide.md) - 带示例的完整解释
  - [references/sources.md](references/sources.md) - 完整参考文献

  ### 时间分配（来自Neel Nanda）

  在以下各项上花费**大致相等的时间**：
  1. 摘要
  2. 引言
  3. 图表
  4. 其他所有内容总和

  **为什么？** 大多数审稿人在到达您的方法之前就形成判断。读者遇到您的论文的顺序为：**标题 → 摘要 → 引言 → 图表 → 可能其余部分。**

  ### 写作风格指南

  #### 句子级清晰度（Gopen & Swan的7原则）

  这些原则基于读者实际处理散文的方式。违反它们迫使读者在结构而不是内容上花费认知努力。

  | 原则 | 规则 | 示例 |
  |-----------|------|---------|
  | **主语-动词接近** | 保持主语和动词接近 | ❌ “The model, which was trained on..., achieves” → ✅ “The model achieves... after training on...” |
  | **强调位置** | 将重点放在句子末尾 | ❌ “Accuracy improves by 15% when using attention” → ✅ “When using attention, accuracy improves by **15%**” |
  | **主题位置** | 首先放置上下文，新信息之后 | ✅ “Given these constraints, we propose...” |
  | **旧信息在新信息前** | 熟悉信息 → 不熟悉信息 | 链接向后，然后引入新 |
  | **一个单位，一个功能** | 每个段落提出一个点 | 分割多点段落 |
  | **动作在动词中** | 使用动词，而不是名词化 | ❌ “We performed an analysis” → ✅ “We analyzed” |
  | **上下文在新信息前** | 在呈现前设置舞台 | 在显示方程前解释 |

  **带详细示例的完整7原则：** 见[references/writing-guide.md](references/writing-guide.md#the-7-principles-of-reader-expectations)

  #### 微观技巧（Ethan Perez）

  这些小改变累积成显著更清晰的散文：

  - **最小化代词**： ❌ “This shows...” → ✅ “This result shows...”
  - **动词早**： 将动词置于句子开头附近
  - **展开撇号**： ❌ “X's Y” → ✅ “The Y of X”（当尴尬时）
  - **删除填充词**： “actually,” “a bit,” “very,” “really,” “basically,” “quite,” “essentially”

  **带示例的完整微观技巧：** 见[references/writing-guide.md](references/writing-guide.md#micro-level-writing-tips)

  #### 词汇选择（Zachary Lipton）

  - **具体**： ❌ “performance” → ✅ “accuracy” 或 “latency”（说您意思的）
  - **消除模糊**： 除非真正不确定，否则删除“may”和“can”
  - **避免增量词汇**： ❌ “combine,” “modify,” “expand” → ✅ “develop,” “propose,” “introduce”
  - **删除强化词**： ❌ “provides *very* tight approximation” → ✅ “provides tight approximation”

  #### 精确性优先于简洁性（Jacob Steinhardt）

  - **一致术语**： 相同概念的不同术语造成混淆。选择一个并坚持使用。
  - **正式陈述假设**： 在定理之前，明确列出所有假设
  - **直觉 + 严谨**： 提供直观解释以及形式证明

  ### 审稿人实际阅读什么

  理解审稿人行为有助于优先努力：

  | 论文部分 | 阅读的审稿人 % | 含义 |
  |---------------|---------------------|-------------|
  | 摘要 | 100% | 必须完美 |
  | 引言 | 90%+（略读） | 前置贡献 |
  | 图表 | 在方法前检查 | 图1关键 |
  | 方法 | 仅当感兴趣时 | 不要埋没要点 |
  | 附录 | 很少 | 仅放置补充细节 |

  **底线**：如果您的摘要和引言没有吸引审稿人，他们可能永远不会阅读您精彩的方法部分。

