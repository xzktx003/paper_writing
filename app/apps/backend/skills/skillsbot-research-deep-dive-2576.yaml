  **研究日期**：[date]
  **分析论文**：[count]
  **来源**：ArXiv, Semantic Scholar, 库藏

  ## 研究问题

  [清晰，具体的问题]

  ## 方法论

  - **搜索策略**：[关键词，来源]
  - **选择标准**：[使用的过滤器]
  - **审查论文**：[count和选择逻辑]

  ## 执行摘要

  [2-3段落的发现概述]

  ## 关键发现

  ### 发现1：[标题]
  [描述，支持论文]

