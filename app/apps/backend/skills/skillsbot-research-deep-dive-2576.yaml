  ## 总结：代理的心理模型

  **核心工作流程：**
  1. 从宽泛开始，细化到具体研究问题
  2. 计划多源策略（发现+库藏+网络）
  3. 撒大网，然后按相关性过滤
  4. 下载&排队论文（并行处理）
  5. 系统性地阅读一切
  6. 按主题/方法综合（而不是按论文）
  7. 检查差距，如有需要进行迭代
  8. 创建全面的Markdown报告

  **关键原则：**
  - **迭代细化**：从宽泛→狭窄→专注
  - **多源**：不要依赖单一来源
  - **质量优于数量**：5篇好论文>20篇平庸论文
  - **系统性分析**：从每个来源提取关键信息
  - **主题基础综合**：按概念分组，而不是按论文
  - **差距意识**：知道何时搜索更多
  - **可操作输出**：报告包括建议

  **成功指标**：用户对研究主题有全面的理解，并有详细的报告可以参考/分享。
