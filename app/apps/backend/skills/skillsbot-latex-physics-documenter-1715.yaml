  # LaTeX 物理文档助手

  ## 目的

  为物理学论文准备提供专业的LaTeX指导，包括公式渲染和期刊特定格式排版。

  ## 能力

  - REVTeX/APS格式排版
  - 公式和图表处理
  - BibTeX参考文献管理
  - Tikz/PGF图表生成
  - arXiv投稿准备
  - 补充材料打包

  ## 使用指南

  1. **文档设置**: 为目标期刊配置REVTeX
  2. **公式**: 正确格式化复杂方程
  3. **图表**: 包含和格式化出版质量的图表
  4. **参考文献**: 使用BibTeX管理文献
  5. **投稿**: 准备arXiv和期刊投稿

  ## 工具/库

  - LaTeX
  - REVTeX
  - TikZ
  - BibTeX
