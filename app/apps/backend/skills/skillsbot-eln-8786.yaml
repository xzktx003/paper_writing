  # 电子实验笔记本（ELN）技能

  该技能提供使用org-mode维护专业电子实验笔记本的专家指导，遵循科学文档、可重复性和研究完整性的最佳实践。

  ## 何时使用此技能

  在以下情况使用此技能：
  - 创建或更新实验笔记本条目
  - 记录实验、计算或分析
  - 记录假设和实验设计
  - 记录计算工作流
  - 总结结果并得出结论
  - 按时间顺序组织研究笔记
  - 在相关工作间创建交叉引用
  - 为出版物或报告准备文档
  - 确保科学工作的可重复性
  - 维护专业研究记录

  ## 科学文档的核心原则

  ### 1. 按时间顺序组织
  条目按日期以分层结构组织：
  ```
  notebook/
  ├── 2025/
  │   ├── 01-一月/
  │   │   ├── 2025-01-15.org
  │   │   └── 2025-01-20.org
  │   └── 02-二月/
  │       └── 2025-02-03.org
  ```

  ### 2. 完整文档
  每个条目应包含：
  - **做了什么**：工作的详细描述
  - **为什么做**：假设、动机、推理
  - **如何做**：方法、程序、参数
  - **观察到什么**：结果、数据、观察
  - **意味着什么**：分析、解释、结论
  - **下一步**：后续工作、提出的问题

  ### 3. 可重复性
  文档应使任何人（包括未来的自己）能够：
  - 理解决策背后的推理
  - 精确重复工作
  - 访问所有使用的数据和代码
  - 遵循逻辑链

  ### 4. 专业标准
  - 清晰和专业地写作
  - 诚实地对待失败和意外结果
  - 日期和时间戳所有条目
  - 永不删除或修改过去的条目（用新条目更正）
  - 包含足够细节以供独立重复

  ## Org-Mode ELN 结构

  ### 文件组织

  #### 基于日期的文件
  每天的工作放在一个日期文件中：
  ```
  2025-01-15.org    # 单日工作
  ```

  #### 目录结构
  ```
  research-notebook/
  ├── 2025/
  │   ├── 01-一月/
  │   │   ├── 2025-01-15.org
  │   │   ├── 2025-01-16.org
  │   │   └── data/
  │   │       └── 2025-01-15/
  │   │           ├── experiment_results.csv
  │   │           └── analysis.png
  │   └── 02-二月/
  ├── templates/
  │   ├── experiment-template.org
  │   └── calculation-template.org
  ├── index.org          # 主索引
  └── README.org         # 项目概述
  ```

  ### 条目模板结构

  ```org
  #+TITLE: 实验笔记本 - 2025-01-15
  #+AUTHOR: 您的姓名
  #+DATE: [2025-01-15 星期三]
  #+FILETAGS: :experiment:catalyst:
  #+STARTUP: overview

  * 每日总结
  今天完成的工作简要概述。

  * 条目1：假设测试 - Pt上的CO吸附
  :PROPERTIES:
  :ID: 2025-01-15-001
  :PROJECT: Catalyst_Screening
  :STATUS: In_Progress
  :RELATED: [[file:2025-01-10.org::*Previous Results]]
  :END:

  ** 目标
  您试图完成什么以及为什么？

  ** 假设
  您期望什么的清晰陈述和推理。

  ** 背景/上下文
  - 为什么这很重要？
  - 什么先前工作导致了这个？
  - 关键问题是什么？

  ** 方法
  *** 计算设置
  如何执行工作的详细描述。

  #+BEGIN_SRC python
  # 包含实际使用的代码
  from ase.build import fcc111
  slab = fcc111('Pt', size=(4,4,4), vacuum=10.0)
  #+END_SRC

  *** 参数
  - DFT 泛函：PBE
  - 能量截断：400 eV
  - k-points：4×4×1
  - 收敛：0.05 eV/Å

  ** 结果
  *** 观察
  实际发生了什么？包括数据、图表、输出。

  #+BEGIN_SRC python :results file
  # 分析代码
  import matplotlib.pyplot as plt
  # ... 绘图代码 ...
  plt.savefig('data/2025-01-15/adsorption_energy.png')
  return 'data/2025-01-15/adsorption_energy.png'
  #+END_SRC

  #+RESULTS:
  [[file:data/2025-01-15/adsorption_energy.png]]

  *** 数据
  | 金属 | E_ads (eV) | 位点 |
  |-------+------------+-------|
  | Pt    |     -1.82  | fcc   |
  | Cu    |     -0.95  | hcp   |
  | Au    |     -0.45  | ontop |

  ** 分析
  *** 解释
  这些结果意味着什么？

  *** 与文献比较
  结果与预期值如何比较？

  *** 意外发现
  任何令人惊讶或异常的地方？

  ** 结论
  - 关键发现
  - 假设支持/拒绝
  - 结果置信水平

  ** 问题/困难
  记录遇到的任何问题以及如何解决。

  ** 下一步
  - [ ] 用不同泛函验证
  - [ ] 测试更大表面模型
  - [ ] 计算反应势垒

  ** 参考文献
  - 先前工作：[[file:2025-01-10.org::*Initial Screening]]
  - 文献：Smith et al. (2024) DOI:10.1021/xxxxx
  - 代码：[[file:~/projects/catalyst-screening/run_calculations.py]]

  * 条目2：另一个任务
  ...
  ```

  ## ELN 的基本 Org-Mode 功能

  ### 1. 属性抽屉
  ```org
  :PROPERTIES:
  :ID: unique-identifier
  :PROJECT: Project_Name
  :STATUS: Planning|In_Progress|Complete|On_Hold
  :STARTED: [2025-01-15 Wed]
  :COMPLETED: [2025-01-15 Wed]
  :RELATED: [[link-to-related-entry]]
  :DATA: [[file:./data/2025-01-15/results.csv]]
  :END:
  ```

  ### 2. 标签
  使用标签进行分类和过滤：
  ```org
  #+FILETAGS: :experiment:simulation:catalyst:DFT:
  * 条目标题                                              :important:urgent:
  ```

  常见标签类别：
  - **类型**: :experiment:, :simulation:, :analysis:, :literature:, :meeting:
  - **主题**: :catalyst:, :materials:, :synthesis:, :characterization:
  - **状态**: :todo:, :in_progress:, :done:, :failed:
  - **优先级**: :urgent:, :important:, :routine:

  ### 3. 链接
  ```org
  # 内部链接
  [[file:2025-01-10.org::*Previous Results]]
