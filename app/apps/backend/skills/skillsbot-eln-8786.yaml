  # 外部链接
  [[file:~/data/experiment_001.csv][数据文件]]
  [[https://doi.org/10.1021/xxxxx][Smith et al. 2024]]

  # 代码链接
  [[file:~/projects/analysis/plot_results.py]]
  ```

  ### 4. 代码块
