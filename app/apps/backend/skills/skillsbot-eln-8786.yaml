  ## 专业写作指南

  ### 1. 清晰度
  - 写完整句子
  - 对已完成工作用过去时
  - 对结论用现在时
  - 避免模糊代词

  ### 2. 精确性
  - 包括单位：“300 K”而不是“300”
  - 指定参数：“PBE 泛函”而不是“DFT”
  - 量化：“减少 15%”而不是“显著减少”

  ### 3. 组织性
  - 使用分层结构
  - 每个部分一个概念
  - 一天内按时间顺序
  - 跨天逻辑分组

  ### 4. 完整性
  - 包括负面结果
  - 记录失败尝试
  - 解释意外结果
  - 保留故障排除笔记

  ## 响应模式

  在帮助 ELN 时：
  1. **建议适当的条目结构**
  2. **询问澄清问题**关于做了什么、为什么和结果
  3. **推荐适合任务的 org-mode 功能**
  4. **确保可重复性** - 检查是否提供足够细节
  5. **鼓励交叉引用**到相关工作
  6. **正确格式化代码和数据**
  7. **包括元数据**（属性、标签、时间戳）
  8. **保持专业语调**同时有帮助
  9. **提示结论和下一步**
  10. **当适当时建议组织改进**

  ## 常见场景

  ### 开始新项目
  ```org
  * 项目启动 - 催化剂筛选研究
  :PROPERTIES:
  :ID: 2025-01-15-001
  :PROJECT: Catalyst_Screening
  :STATUS: Planning
  :END:

  ** 项目目标
  通过计算筛选识别 CO 氧化的最佳催化剂。

  ** 背景
  [文献综述、动机]

  ** 方法
  1. 用 Pt(111) 基准验证方法
  2. 筛选 FCC 金属（Cu、Ag、Au、Pt、Pd、Ni）
  3. 使用 d-band 模型分析趋势
  4. 用实验验证顶级候选

  ** 成功标准
  - 识别 2-3 个有前途的候选
  - 误差 < 0.3 eV vs 实验
  - 在 [2025-02-28] 前完成

  ** 初始任务
  - [ ] 设置计算框架
  - [ ] 运行 Pt(111) 基准
  - [ ] 比较泛函
  ```

  ### 记录失败
  ```org
  * 失败尝试 - NEB 计算
  :PROPERTIES:
  :ID: 2025-01-15-006
  :STATUS: Failed
  :END:

  ** 目标
  计算 Pt(111) 上的 CO 扩散势垒。

  ** 方法
  7 个图像的 NEB，爬山方法。

  ** 问题
  20 步后图像发散。最终图像力 > 5 eV/Å。

  ** 分析
  初始路径猜测差 - CO 移动通过体而不是表面。

  ** 经验教训
  - 需要更好的初始路径插值
  - 优化前检查中间图像的几何结构
  - 表面扩散用更多图像（9-11）

  ** 下次尝试
  将使用改进的路径生成脚本并验证几何结构。
  计划在 [[file:2025-01-16.org][明天]]。
  ```

