  # PySCF 接口

  ## 目的

  为生成量子计算应用所需的分子数据，提供关于PySCF量子化学计算的专家指导。

  ## 能力

  - 哈特里-福克计算
  - 耦合簇计算
  - 活性空间选择
  - 分子轨道可视化
  - 积分计算
  - 基组管理
  - 几何结构优化
  - 性质计算

  ## 使用指南

  1. **分子定义**：指定分子几何结构以及电荷/多重度
  2. **基组选择**：根据精度要求选择合适的基组
  3. **方法执行**：运行HF、CCSD或其他方法以获取参考能量
  4. **积分导出**：提取单电子和双电子积分用于量子算法
  5. **活性空间**：识别化学相关的轨道以进行简化计算

  ## 工具/库

  - PySCF
  - OpenFermion-PySCF
  - Qiskit Nature
  - ASE
  - RDKit
