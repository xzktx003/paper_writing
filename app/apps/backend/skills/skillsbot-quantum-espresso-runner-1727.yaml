  # Quantum ESPRESSO 运行器

  ## 目的

  提供关于 Quantum ESPRESSO DFT 计算的专家指导，包括输入文件管理、赝势选择和高级性质计算。

  ## 能力

  - 输入文件生成 (pw.x, ph.x, pp.x)
  - 赝势库管理
  - 收敛性测试自动化
  - Wannier90 接口用于紧束缚模型
  - 输运性质计算
  - 自旋轨道耦合处理

  ## 使用指南

  1. **输入生成**：为 pw.x, ph.x, pp.x 创建正确的 QE 输入文件
  2. **赝势**：从库中选择合适的赝势
  3. **收敛性**：系统地测试截断能和 k 点收敛性
  4. **Wannier 函数**：与 Wannier90 接口用于紧束缚模型
  5. **输运**：使用 BoltzTraP 或 EPW 计算输运性质

  ## 工具/库

  - Quantum ESPRESSO
  - Wannier90
  - EPW
