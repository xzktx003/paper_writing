  ## 机构特定概述

  ### NSF（国家科学基金会）
  **使命**：促进科学进步，提升国民健康、繁荣和福利

  **关键特征**：
  - 智力价值 + 更广泛影响（同等权重）
  - 15页项目描述限制（大多数项目）
  - 强调教育、多样性和社会效益
  - 鼓励协作研究
  - 开放数据和开放科学重点
  - 带面板和特约审稿人的功绩审查过程

  ### NIH（国家卫生研究院）
  **使命**：增强健康、延长寿命、减少疾病和残疾

  **关键特征**：
  - 具体目标（1页）+ 研究策略（R01为12页）
  - 意义、创新、方法作为核心审查标准
  - 初步数据通常为R01所需
  - 强调严谨性、可重复性和临床相关性
  - 大多数R01的模块化预算（25万美元增量）
  - 多次重新提交机会

  ### DOE（能源部）
  **使命**：通过能源、环境和核挑战确保美国的安全和繁荣

  **关键特征**：
  - 关注能源、气候、计算科学、基础能源科学
  - 通常需要成本分担或行业伙伴关系
  - 强调国家实验室协作
  - 强计算和实验整合
  - 能源创新和商业化路径
  - 因办公室而异（ARPA-E、科学办公室、EERE等）

  ### DARPA（国防高级研究计划局）
  **使命**：为国家安全在突破性技术中进行关键投资

  **关键特征**：
  - 高风险、高回报的变革性研究
  - 关注“DARPA-hard”问题（如果成立，谁关心）
  - 强调原型、演示和过渡路径
  - 通常需要多个阶段（可行性、开发、演示）
  - 强项目管理和里程碑跟踪
  - 通常需要团队和协作
  - 因项目经理和BAA（广泛机构公告）而异

  ## 研究提案的核心组件

  ### 1. 执行摘要 / 项目摘要 / 摘要

  每个提案都需要一个简洁的概述，将研究的基本要素传达给技术审稿人和项目官员。

  **目的**：提供一个独立的摘要，捕捉研究愿景、意义和方法

  **长度**： 
  - NSF：1页（项目摘要，分开概述、智力价值、更广泛影响）
  - NIH：30行（项目摘要/摘要）
  - DOE：各异（通常1页）
  - DARPA：各异（通常1-2页）

  **基本要素**：
  - 问题或研究问题的清晰陈述
  - 为什么这个问题重要（意义、紧迫性、影响）
  - 新颖方法或创新
  - 预期结果和交付成果
  - 团队资格
  - 更广泛影响或转化路径

  **写作策略**：
  - 以建立重要性的引人注目的钩子开头
  - 使用可访问的语言（避免在开头句子中使用行话）
  - 陈述具体、可衡量的目标
  - 传达热情和信心
  - 确保每个句子都增加价值（无填充物）
  - 以变革性愿景或影响陈述结尾

  **避免的常见错误**：
  - 过于技术性或详细（留待项目描述）
  - 未能阐述“为什么现在”或“为什么这个团队”
  - 模糊的目标或结果
  - 忽视更广泛影响或意义
  - 可适用于任何提案的通用陈述

  ### 2. 项目描述 / 研究策略

  核心技术叙事，详细呈现研究计划。

  **结构因机构而异**：

  **NSF项目描述**（通常15页）：
  - 介绍和背景
  - 研究目标和问题
  - 初步结果（如果适用）
  - 研究计划和方法论
  - 时间线和里程碑
  - 更广泛影响（贯穿始终或单独部分）
  - 先前NSF支持（如果适用）

  **NIH研究策略**（R01为12页）：
  - 意义（为什么问题重要）
  - 创新（什么是新颖和变革性的）
  - 方法（详细研究计划）
    - 初步数据
    - 研究设计和方法
    - 预期结果
    - 潜在问题和替代方法

  **DOE项目叙事**（各异）：
  - 背景和意义
  - 技术方法和创新
  - 资格和经验
  - 设施和资源
  - 项目管理和时间线

  **DARPA技术卷**（各异）：
  - 技术挑战和创新
  - 方法和方法论
  - 进度和里程碑
  - 交付成果和指标
  - 团队资格
  - 风险评估和缓解

  有关详细机构特定指南，请参考：
  - `references/nsf_guidelines.md`
  - `references/nih_guidelines.md`
  - `references/doe_guidelines.md`
  - `references/darpa_guidelines.md`

  ### 3. 具体目标（NIH）或目标（NSF/DOE/DARPA）

  清晰、可测试的目标，构建研究计划。

  **NIH具体目标页面**（1页）：
  - 开头段落：知识差距和意义
  - 长期目标和即时目标
  - 中心假设或研究问题
  - 2-4个具体目标，带子目标
  - 预期结果和影响
  - 回报段落：为什么这重要

  **每个目标的结构**：
  - 目标陈述（1-2句子，以动作动词开头）
  - 理由（为什么这个目标，初步数据支持）
  - 工作假设（可测试预测）
  - 方法摘要（简要方法概述）
  - 预期结果和解释

  **写作策略**：
  - 使目标独立但互补
  - 确保每个目标在时间线和预算内可实现
  - 提供足够细节以判断可行性
  - 包括应急计划或替代方法
  - 在目标间使用平行结构
  - 明确说明从每个目标中学到什么

  有关详细指南，请参考`references/specific_aims_guide.md`。

  ### 4. 更广泛影响（NSF）/ 意义（NIH）

  阐述研究的社会、教育或转化价值。

  **NSF更广泛影响**（关键组件，与智力价值同等权重）：

  NSF明确评估更广泛影响。至少解决以下一个领域：
  1. **促进发现和理解，同时促进教学、培训和学**习
     - 研究与教育的整合
     - 学生和博士后培训
     - 课程开发
     - 教育材料和资源

  2. **扩大代表性不足群体的参与**
     - 招聘和保留策略
     - 与少数群体服务机构的伙伴关系
     - 对代表性不足社区的拓展
     - 指导计划

  3. **增强研究和教育的基础设施**
     - 共享设施或仪器
     - 网络基础设施和数据资源
     - 社区范围的工具或数据库
     - 开源软件或方法

  4. **广泛传播以增强科学和技术理解**
     - 公共拓展和科学传播
     - K-12教育计划
     - 博物馆展览或媒体参与
     - 政策简报或利益相关者参与

  5. **社会效益**
     - 经济影响或商业化
     - 健康、环境或国家安全效益
     - 知情决策
     - 劳动力发展

  **NSF更广泛影响的写作策略**：
  - 具体化，有具体活动，非模糊陈述
  - 为更广泛影响活动提供时间线和里程碑
  - 解释如何衡量和评估影响
  - 连接到机构资源和现有计划
  - 通过初步努力或伙伴关系展示承诺
  - 与研究计划整合（不附加）

  **NIH意义**：
  - 解决重要问题或进展的关键障碍
  - 改善科学知识、技术能力或临床实践
  - 可能导致更好结果、干预或理解
  - 领域先前研究的严谨性
  - 与NIH使命和研究所优先事项对齐

  有关详细指南，请参考`references/broader_impacts.md`。

  ### 5. 创新和变革潜力

  阐述研究的新颖、创造性和范式转变方面。

  **要突出的创新要素**：
  - **概念创新**：新框架、模型或理论
  - **方法论创新**：新技术、方法或技术
  - **整合创新**：以新方式结合学科或方法
  - **转化创新**：从发现到应用的新路径
  - **规模创新**：前所未有的范围或分辨率

  **写作策略**：
  - 明确说明什么是创新的（不要假设显而易见）
  - 解释为什么当前方法不足
  - 描述您的创新如何克服限制
  - 提供创新可行的证据（初步数据、概念验证）
  - 区分增量性和变革性进展
  - 平衡创新与可行性（不要太冒险）

  **常见错误**：
  - 声称新颖性而不展示对先前工作的了解
  - 混淆“对我来说新”与“对领域新”
  - 过度承诺而无支持证据
  - 过于增量（现有工作的微小变化）
  - 过于推测（无成功路径）

  ### 6. 研究方法和手段

  详细描述研究将如何进行。

  **基本组件**：
  - 整体研究设计和框架
  - 每个目标/目标的详细方法
  - 样本大小、统计能力和分析计划
  - 时间线和活动序列
  - 数据收集、管理和分析
  - 质量控制和验证方法
  - 潜在问题和替代策略
  - 严谨性和可重复性措施

  **写作策略**：
  - 提供足够细节以实现可重复性和可行性评估
  - 使用子标题和图形改进组织
  - 证明方法和选择的合理性
  - 主动解决潜在限制
  - 包括展示可行性的初步数据
  - 展示您已经思考过研究过程
  - 平衡细节与可读性（使用补充材料处理广泛细节）

  **对于实验研究**：
  - 描述实验设计（控制、重复、盲法）
  - 指定材料、试剂和设备
  - 详细数据收集协议
  - 解释统计分析计划
  - 解决严谨性和可重复性

  **对于计算研究**：
  - 描述算法、模型和软件
  - 指定数据集和验证方法
  - 解释所需计算资源
  - 解决代码可用性和文档
  - 描述基准测试和性能指标

  **对于临床或转化研究**：
  - 描述研究人群和招聘
  - 详细干预或治疗方案
  - 解释结果测量和评估
  - 解决监管批准（IRB、IND、IDE）
  - 描述临床试验设计和监控

  有关按学科划分的详细方法论指南，请参考`references/research_methods.md`。

  ### 7. 初步数据和可行性

  证明研究是可实现的，团队是有能力的。

  **目的**：
  - 证明提议方法可行
  - 展示团队具有必要专业知识
  - 证明访问所需资源
  - 减少审稿人感知风险
  - 为提议工作提供基础

  **要包括的内容**：
  - 试点研究或概念验证结果
  - 方法开发或优化
  - 访问独特资源（样本、数据、合作者）
  - 您团队的相关出版物
  - 初步模型或模拟
  - 可行性评估或功效计算

  **NIH要求**：
  - R01申请通常需要大量初步数据
  - R21申请可能有较宽松要求
  - 新研究者可能初步数据较少
  - 初步数据应直接支持提议目标

  **NSF方法**：
  - 初步数据通常比NIH少见
  - 对于高风险或新颖方法可能重要
  - 对于竞争性计划可以加强提案

  **写作策略**：
  - 呈现最支持您方法的引人注目数据
  - 明确连接初步数据到提议目标
  - 承认限制以及提议工作将如何解决
  - 有效使用图形和数据可视化
  - 避免过度解释或夸大初步发现
  - 展示您研究计划的轨迹

  ### 8. 时间线、里程碑和管理计划

  证明项目计划良好，在提议时间范围内可实现。

  **基本要素**：
  - 分阶段时间线，带清晰里程碑
  - 逻辑序列和依赖性
  - 每个活动的现实时间框架
  - 决策点和进行/不进行标准
  - 风险缓解策略
  - 跨时间资源分配
  - 多机构团队的协调计划

  **呈现格式**：
  - 显示重叠活动的甘特图
  - 逐年活动分解
  - 季度里程碑和交付成果
  - 带时间线和人员的目标/任务表

  **写作策略**：
  - 对可实现内容现实
  - 为意外延迟或挫折预留时间
  - 展示时间线与预算和人员对齐
  - 展示对监管时间线（IRB、IACUC）的理解
  - 包括传播和更广泛影响的时间
  - 解决如何监控和评估进展

  **DARPA重点**：
  - 对于DARPA提案特别重要
  - 带可测量指标的清晰技术里程碑
  - 季度交付成果和报告
  - 基于阶段的结构，带退出标准
  - 演示和过渡规划

  有关详细指南，请参考`references/timeline_planning.md`。

  ### 9. 团队资格和协作

  证明团队具有成功所需的专业知识、经验和资源。

  **基本要素**：
  - 主要研究者资格和相关专业知识
  - 合作研究者角色和贡献
  - 研究领域的记录
  - 团队的互补专业知识
  - 机构支持和资源
  - 先前协作历史（如果适用）
  - 指导和培训计划（对于学生/博士后）

  **写作策略**：
  - 突出最相关出版物和成就
  - 明确定义角色和责任
  - 展示团队组成是必要的（不仅仅是方便）
  - 展示成功的先前协作
  - 解决团队将如何管理和协调
  - 解释机构承诺和支持

  **生物素描 / 简历**：
  - 遵循机构特定格式（NSF、NIH、DOE、DARPA不同）
  - 突出最相关出版物和成就
  - 包括协同活动和协作
  - 展示轨迹和生产力
  - 解决任何职业差距或中断

  **合作信**：
  - 具体承诺和贡献
  - 展示真正伙伴关系
  - 包括资源共享或访问协议
  - 签名并在信头上

  有关详细指南，请参考`references/team_building.md`。

  ### 10. 预算和预算理由

  开发现实的预算，与提议工作和机构指南对齐。

  **预算类别**（典型）：
  - **人员**：主要研究者、合作研究者、博士后、学生、员工的工资和福利
  - **设备**：大于$5,000的项目（因机构而异）
  - **差旅**：会议、协作、实地工作
  - **材料和供应**：消耗品、试剂、软件
  - **其他直接成本**：出版成本、参与者激励、咨询
  - **间接成本（F&A）**：机构管理费用（费率各异）
  - **子奖项**：合作机构的成本

  **机构特定考虑**：

  **NSF**：
  - 需要完整预算理由
  - 成本分担通常不需要（但可能加强提案）
  - 最多2个月夏季工资给教职员工
  - 鼓励研究生支持

  **NIH**：
  - 每年直接成本≤$250K的模块化预算（R01）
  - 超过$250K或复杂奖项的详细预算
  - 适用工资上限（2024年约$221,900）
  - 大多数主要研究者限制为1个月（8.33% FTE）

  **DOE**：
  - 通常需要成本分担（特别是ARPA-E）
  - 带季度分解的详细预算
  - 需要机构承诺信
  - 国家实验室协作预算分开

  **DARPA**：
  - 按阶段和任务的详细预算
  - 需要大型采购的支持成本数据
  - 通常需要成本加成或固定价格结构
  - 项目会议的差旅预算

  **预算理由写作**：
  - 根据研究计划证明每个行项目
  - 解释人员的工作百分比
  - 描述特定设备及为什么必要
  - 证明差旅（会议、协作）
  - 解释咨询角色和费率
  - 展示预算如何与时间线对齐

  有关详细预算指南，请参考`references/budget_preparation.md`。

  ## 机构审查标准

  理解提案如何评估对于撰写竞争性申请至关重要。

  ### NSF审查标准

  **智力价值**（主要）：
  - 提议活动推进知识的潜力是什么？
  - 提议活动的构思和组织如何？
  - 是否有足够资源访问？
  - 个人、团队或机构进行提议活动的资格如何？

  **更广泛影响**（同等重要）：
  - 提议活动对社会的潜在效益是什么？
  - 提案在多大程度上以有意义的方式解决更广泛影响？

  **额外考虑**：
  - 研究与教育的整合
  - 多样性和包容性
  - 先前NSF支持的结果（如果适用）

  ### NIH审查标准

  **评分标准**（1-9分，1=优秀，9=差）：

  1. **意义**
     - 解决重要问题或关键障碍
     - 改善科学知识、技术能力或临床实践
     - 与NIH使命对齐

  2. **研究者(s)**
     - 适合项目
     - 成就记录
     - 充分培训和专业知识

  3. **创新**
     - 新颖概念、方法、方法论或干预
     - 挑战现有范式
     - 以创造性方式解决重要问题

  4. **方法**
     - 合理和适当
     - 严谨和可重复
     - 充分说明潜在问题
     - 时间线内可行

  5. **环境**
     - 机构支持和资源
     - 科学环境有助于成功概率

  **额外审查考虑**（未评分但讨论）：
  - 人类受试者保护
  - 妇女、少数民族和儿童的包容
  - 脊椎动物动物福利
  - 生物危害
  - 重新提交响应（如果适用）
  - 预算和时间线适当性

  ### DOE审查标准

  因计划办公室而异，但通常包括：
  - 科学和/或技术价值
  - 提议方法或方法的适当性
  - 人员能力和设施充分性
  - 预算的合理性和适当性
  - 与DOE使命和计划目标的相关性

  ### DARPA审查标准

  **DARPA特定考虑**：
  - 整体科学和技术价值
  - 对DARPA使命的潜在贡献
  - 与陈述计划目标的相关性
  - 实现技术过渡的计划和能力
  - 提议团队的资格和经验
  - 提议成本的现实性和资金可用性

  **DARPA问的关键问题**：
  - **如果您成功怎么办？**（如果研究成功的影響）
  - **如果您是对的怎么办？**（您的假设的含義）
  - **谁关心？**（为什么对国家安全重要）

  有关按机构划分的详细审查标准，请参考`references/review_criteria.md`。

  ## 竞争性提案的写作原则

  ### 清晰性和可访问性

  **为多受众写作**：
  - 您领域的技术审稿人（将仔细审查方法）
  - 相关但不同领域的审稿人（需要上下文）
  - 项目官员（寻找与机构目标对齐）
  - 阅读15+以上提案的小组成员（需要清晰组织）

  **策略**：
  - 使用清晰的节标题和子标题
  - 以概述段落开始节
  - 定义技术术语和缩写
  - 使用图形、图表和表格澄清复杂想法
  - 尽可能避免行话；必要时解释
  - 使用主题句子引导读者

  ### 说服性论证

  **构建引人注目的叙事**：
  - 建立问题及其重要性
  - 展示当前知识或方法的差距
  - 呈现您的解决方案为创新和可行
  - 证明您是合适的团队
  - 展示成功将有重大影响

  **说服结构**：
  1. **钩子**：以意义捕捉注意力
  2. **问题**：建立未知或无效的内容
  3. **解决方案**：呈现您的创新方法
  4. **证据**：以初步数据支持
  5. **影响**：展示变革潜力
  6. **团队**：证明交付能力

  **语言选择**：
  - 使用主动语态以清晰和自信
  - 选择强动词（调查、阐明、发现 vs. 看、研究）
  - 自信但不傲慢（避免“显然”、“清晰”）
  - 适当承认不确定性
  - 使用精确语言（避免模糊术语如“几个”、“各种”）

  ### 视觉沟通

  **有效使用图形**：
  - 显示研究框架的概念图
  - 展示可行性的初步数据
  - 时间线和甘特图
  - 显示方法论的工作流程图
  - 预期结果或预测

  **设计原则**：
  - 使图形自解释，带完整标题
  - 使用一致的颜色方案和字体
  - 确保可读性（足够大的字体、清晰标签）
  - 将图形与文本整合（引用特定图形）
  - 遵循机构特定格式要求

  ### 解决风险和可行性

  **平衡创新和风险**：
  - 承认潜在挑战
  - 提供替代方法
  - 展示减少风险的初步数据
  - 证明处理挑战的专业知识
  - 包括应急计划

  **常见担忧**：
  - 时间线/预算过于雄心勃勃
  - 技术上不可行
  - 团队缺乏必要专业知识
  - 初步数据不足
  - 方法未充分描述
  - 缺乏创新或意义

  ### 整合和一致性

  **确保所有部分对齐**：
  - 预算支持项目描述中的活动
  - 时间线匹配目标和里程碑
  - 团队组成匹配所需专业知识
  - 更广泛影响连接到研究计划
  - 支持信确认陈述的协作

  **避免矛盾**：
  - 初步数据 vs. 陈述的差距
  - 声称的专业知识 vs. 出版记录
  - 陈述的目标 vs. 实际方法
  - 预算 vs. 陈述的活动

  ## 常见提案类型

  ### NSF提案类型

  - **标准研究提案**：最常见，高达$500K和5年
  - **CAREER奖项**：早期职业教职员工，整合研究/教育，5年$400-500K
  - **协作研究**：多个机构，分开提交，共享研究计划
  - **RAPID**：紧急研究机会，高达$200K，不需要初步数据
  - **EAGER**：高风险、高回报探索性研究，高达$300K
  - **早期概念探索性研究拨款（EAGER）**：早期阶段探索性工作

  ### NIH奖项机制

  - **R01**：研究项目拨款，每年$250K+，3-5年，最常见
  - **R21**：探索性/发展性研究，高达$275K超过2年，无初步数据
  - **R03**：小拨款计划，高达$100K超过2年
  - **R15**：学术研究增强奖项（AREA），主要用于本科机构
  - **R35**：MIRA（最大化研究者研究奖项），计划特定
  - **P01**：计划项目拨款，多项目整合研究
  - **U01**：研究项目合作协议，NIH参与实施

  **奖学金机制**：
  - **F30**：医学博士/哲学博士预科奖学金
  - **F31**：预科奖学金
  - **F32**：博士后奖学金
  - **K99/R00**：独立路径奖项
  - **K08**：指导临床科学家研究职业发展奖项

  ### DOE计划

  - **科学办公室**：物理科学、生物科学、计算的基础研究
  - **ARPA-E**：变革性能源技术，需要成本分担
  - **EERE**：可再生能源和能源效率的应用研究
  - **国家实验室**：与DOE实验室的协作研究

  ### DARPA计划

  - **因办公室而异**：BTO、DSO、I2O、MTO、STO、TTO
  - **计划特定BAAs**：特定方向的广泛机构公告
  - **青年教职员工奖项（YFA）**：早期职业研究者，高达$500K
  - **主任奖学金**：高风险、范式转变研究

  有关详细计划指南，请参考`references/funding_mechanisms.md`。

  ## 重新提交策略

  ### NIH重新提交（A1）

  **重新提交介绍**（1页）：
  - 总结先前审查的主要批评
  - 描述响应所做的具体更改
  - 使用要点以清晰
  - 尊重审稿人的评论
  - 突出实质性改进

  **策略**：
  - 解决每个主要批评
  - 使更改可见（但不要在最终中使用跟踪更改）
  - 加强薄弱区域（初步数据、方法、意义）
  - 如果根本有缺陷，考虑更改目标
  - 在重新提交前获取外部反馈
  - 如果需要新数据，使用完整的37个月窗口

  **何时不重新提交**：
  - 根本概念缺陷
  - 缺乏创新或意义
  - 缺少关键专业知识或资源
  - 需要广泛修订（考虑新提交）

  ### NSF重新提交

  **NSF允许修订后重新提交**：
  - 在修订提案中解决审稿人关切
  - 无正式“重新提交介绍”节
  - 可能由相同或不同面板审查
  - 考虑项目官员反馈
  - 可能需要等待下一个提交周期

  有关详细重新提交指南，请参考`references/resubmission_strategies.md`。

  ## 避免的常见错误

  ### 概念错误

  1. **未能解决审查标准**：未明确讨论意义、创新、方法等。
  2. **与机构使命不匹配**：提议研究不与机构目标对齐
  3. **不清晰的意义**：未能阐述为什么研究重要
  4. **不足的创新**：增量性工作呈现为变革性
  5. **模糊目标**：不具体或不可衡量的目标

  ### 写作错误

  1. **差组织**：缺乏清晰结构和流程
  2. **过度行话**：对广泛审查小组不可访问
  3. **冗长**：不必要复杂或冗长的写作
  4. **缺少上下文**：假设审稿人深深了解您的领域
  5. **不一致术语**：对同一概念使用不同术语

  ### 技术错误

  1. **不足方法**：判断可行性细节不足
  2. **过于雄心勃勃**：时间线/预算提议过多
  3. **无初步数据**：对于需要演示可行性的机制
  4. **差时间线**：不现实或证明不足的进度
  5. **不对齐预算**：预算不支持提议活动

  ### 格式错误

  1. **超过页限制**：自动拒绝
  2. **错误字体或边距**：不符合格式
  3. **缺少必需部分**：不完整申请
  4. **差图形质量**：不可读或不专业图形
  5. **不一致引用**：参考文献中的格式错误

  ### 战略错误

  1. **错误计划或机制**：提议给不适当的机会
  2. **弱团队**：不足专业知识或缺少关键合作者
  3. **无更广泛影响**：对于NSF，未能充分解决
  4. **忽略计划优先事项**：不与当前重点区域对齐
  5. **迟提交**：技术问题或匆忙准备

  ## 基金发展的工作流程

  ### 阶段1：规划和准备（截止日期前2-6个月）

  **活动**：
  - 识别适当的资金机会
  - 审查计划公告和要求
  - 咨询项目官员（如果适当）
  - 组建团队并确认协作
  - 开发初步数据（如果需要）
  - 概述研究计划和具体目标
  - 审查成功提案（如果可用）

  **输出**：
  - 选择的资金机会
  - 组建的团队，带定义角色
  - 具体目标的初步大纲
  - 所需初步数据的差距分析

  ### 阶段2：起草（截止日期前2-3个月）

  **活动**：
  - 撰写具体目标或目标（从这里开始！）
  - 开发项目描述/研究策略
  - 创建图形和数据可视化
  - 起草时间线和里程碑
  - 准备初步预算
  - 撰写更广泛影响或意义部分
  - 请求支持信/协作信

  **输出**：
  - 叙事部分的完整第一稿
  - 带理由的初步预算
  - 时间线和管理计划
  - 来自合作者的请求信

  ### 阶段3：内部审查（截止日期前1-2个月）

  **活动**：
  - 将草案分发给合作研究者
  - 从同事和导师寻求反馈
  - 请求机构审查（如果需要）
  - 模拟审查会话（如果可能）
  - 基于反馈修订
  - 精化预算和预算理由

  **输出**：
  - 合并反馈的修订草案
  - 与修订计划对齐的精化预算
  - 识别的弱点和缓解策略

  ### 阶段4：最终确定（截止日期前2-4周）

  **活动**：
  - 对叙事的最终修订
  - 准备所有必需表格和文档
  - 最终化预算和预算理由
  - 编译生物素描、简历和当前及待处理
  - 收集支持信
  - 准备数据管理计划（如果需要）
  - 撰写项目摘要/摘要
  - 校对所有材料

  **输出**：
  - 完成、抛光的提案
  - 所有必需补充文档
  - 根据机构要求格式化

  ### 阶段5：提交（截止日期前1周）

  **活动**：
  - 机构审查和批准
  - 上传到提交门户
  - 验证所有文档和格式
  - 在截止日期前24-48小时提交
  - 确认成功提交
  - 接收确认和提案编号

  **输出**：
  - 提交的提案
  - 提交确认
  - 所有材料的存档副本

  **关键提示**：永远不要等到截止日期。门户崩溃、文件损坏、紧急情况发生。目标是提前48小时。

  ## 与其他技能的整合

  此技能与以下技能有效工作：
  - **科学写作**：用于清晰、引人注目的散文
