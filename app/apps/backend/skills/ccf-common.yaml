content: |
  # CCF Common Governance

  ## Overview
  Shared governance layer that coordinates all CCFA runtime skills. Provides routing rules, privacy/evidence policies, source registries, artifact contracts, and validation.

  ## Responsibilities
  - Maintain routing tables for skill selection
  - Define privacy and evidence policies
  - Manage source registry for citation verification
  - Enforce artifact contracts between skills
  - Run validation scripts

  ## Artifact Contract
  Ensures that each skill's output is properly formatted and can be consumed by the next skill in the pipeline without conflicts.
