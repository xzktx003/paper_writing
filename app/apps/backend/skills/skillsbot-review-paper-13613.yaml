  # 手稿审查

  生成全面、建设性的学术手稿审查报告 — 类似顶级期刊审稿人会写的报告。

  **输入:** `$ARGUMENTS` — 论文路径（.tex、.pdf 或 .qmd），或 `master_supporting_docs/` 中的文件名。

  ---

  ## 步骤

  1. **定位并阅读手稿。** 检查：
     - 直接从 `$ARGUMENTS` 的路径
     - `master_supporting_docs/supporting_papers/$ARGUMENTS`
     - 通过Glob进行部分匹配

  2. **完整阅读论文** 从头到尾。对于长PDF，分块阅读（每次5页）。

  3. **评估6个维度**（见下）。

  4. **生成3-5个“审稿人反对意见”** — 顶级审稿人可能会问的难题。

  5. **生成审查报告。**

  6. **保存到** `quality_reports/paper_review_[sanitized_name].md`

  ---

  ## 审查维度

  ### 1. 论证结构
  - 研究问题是否清晰陈述？
  - 引言是否有效激发了问题？
  - 逻辑流程是否合理（问题 → 方法 → 结果 → 结论）？
  - 结论是否得到证据支持？
  - 是否承认了局限性？

  ### 2. 识别策略
  - 因果声称是否可信？
  - 关键识别假设是什么？是否明确陈述？
  - 是否存在识别威胁（遗漏变量、反向因果关系、测量误差）？
  - 稳健性检查是否充足？
  - 估计器是否适合研究设计？

  ### 3. 计量经济规范
  - 标准误差是否正确（聚类？稳健？自助法？）？
  - 函数形式是否适当？
  - 样本选择问题？
  - 多重测试问题？
  - 点估计是否具有经济意义（不仅仅是统计显著）？

  ### 4. 文献定位
  - 是否引用了关键论文？
  - 先前工作是否准确描述？
  - 贡献是否与现有工作明确区分？
  - 是否有审稿人会标记的缺失引用？

  ### 5. 写作质量
  - 清晰和简洁
  - 学术语气
  - 整个文档中符号一致
  - 摘要有效总结论文
  - 表格和图表自包含（清晰标签、注释、来源）

  ### 6. 展示
  - 表格和图表是否设计良好？
  - 整个文档中符号是否一致？
  - 是否有错别字、语法错误或格式问题？
  - 论文长度是否适合贡献？

  ---

  ## 输出格式

  ```markdown
  # 手稿审查: [论文标题]

  **日期:** [YYYY-MM-DD]
  **审查者:** review-paper 技能
  **文件:** [手稿路径]

  ## 总结评估

  **总体推荐:** [强烈接受 / 接受 / 修改并重新提交 / 拒绝]

  [2-3段总结: 主要贡献、优点和关键担忧]

  ## 优点

  1. [优点 1]
  2. [优点 2]
  3. [优点 3]

  ## 主要担忧

  ### MC1: [标题]
  - **维度:** [识别 / 计量经济 / 论证 / 文献 / 写作 / 展示]
  - **问题:** [具体描述]
  - **建议:** [如何解决]
  - **位置:** [如有适用，部分/页/表]

  [重复每个主要担忧]

  ## 次要担忧

  ### mc1: [标题]
  - **问题:** [描述]
  - **建议:** [修复]

  [重复]

  ## 审稿人反对意见

  这些是顶级审稿人可能会提出的难题：

  ### RO1: [问题]
  **为什么重要:** [为什么这可能致命]
  **如何解决:** [建议响应或额外分析]

  [重复3-5个反对意见]

  ## 具体评论

  [如有，逐行或逐节评论]

  ## 总结统计

  | 维度 | 评级 (1-5) |
  |-----------|-------------|
  | 论证结构 | [N] |
  | 识别 | [N] |
  | 计量经济 | [N] |
  | 文献 | [N] |
  | 写作 | [N] |
  | 展示 | [N] |
  | **总体** | **[N]** |
  ```

  ---

  ## 原则

  - **建设性。** 每个批评都应附带建议。
  - **具体。** 引用确切部分、方程、表格。
  - **像顶级5期刊的审稿人一样思考。** 什么会让他们拒绝？
  - **区分致命缺陷和次要问题。** 并非所有问题同等重要。
  - **承认做得好的地方。** 好的研究值得认可。
  - **不要编造细节。** 如果不能清晰阅读部分，请说明。
