  # 学术评估

  ## 概述

  应用ScholarEval框架系统评估学术和研究工作。该技能提供基于同行评审研究评估标准的结构化评估方法，支持对学术论文、研究提案、文献综述和学术写作在多个质量维度上的全面分析。

  ## 何时使用此技能

  在以下情况下使用此技能：

  - 评估研究论文的质量和严谨性
  - 评估文献综述的全面性和质量
  - 评审研究设计方法
  - 评分数据分析方法
  - 评估学术写作和展示
  - 提供学术工作的结构化反馈
  - 根据既定标准对标研究质量
  - 评估目标出版场所的发表准备情况
  - 提供定量评估以补充定性同行评审

  ## 通过科学图表增强视觉呈现

  **使用此技能创建文档时，务必考虑添加科学图表以增强视觉传达。**

  如果您的文档尚未包含图表：

  - 使用**scientific-schematics**技能生成AI驱动的出版质量图表
  - 只需用自然语言描述所需图表
  - Nano Banana Pro将自动生成、评审并优化示意图

  **对于新文档：** 默认应生成科学图表，以可视化文本中描述的关键概念、工作流程、架构或关系。

  **如何生成图表：**

  ```bash
  python scripts/generate_schematic.py "您的图表描述" -o figures/output.png
  ```

  AI将自动：

  - 创建具有适当格式的出版质量图像
  - 通过多次迭代评审和优化
  - 确保可访问性（色盲友好、高对比度）
  - 将输出保存在figures/目录中

  **何时添加图表：**

  - 评估框架图
  - 质量评估标准决策树
  - 学术工作流程可视化
  - 评估方法流程图
  - 评分标准可视化
  - 评估过程图
  - 任何从可视化中受益的复杂概念

  有关创建图表的详细指南，请参考scientific-schematics技能文档。

