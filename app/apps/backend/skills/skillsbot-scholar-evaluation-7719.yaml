  ## 评估工作流程

  ### 步骤1：初步评估与范围定义

  首先确定所评估学术工作的类型和评估范围：

  **工作类型：**

  - 完整研究论文（实证、理论或综述）
  - 研究提案或协议
  - 文献综述（系统、叙述或范围界定）
  - 学位论文章节
  - 会议摘要或短文

  **评估范围：**

  - 全面（所有维度）
  - 针对性（特定方面如方法学或写作）
  - 比较性（与其他工作对标）

  如果范围模糊，请向用户澄清。

  ### 步骤2：基于维度的评估

  系统评估工作在ScholarEval维度上的质量。对于每个适用维度，评估质量、识别优缺点，并在适当时提供分数。

  参考`references/evaluation_framework.md`获取每个维度的详细标准和评分标准。

  **核心评估维度：**

  1. **问题表述与研究问题**
     - 研究问题的清晰度和特异性
     - 理论或实践意义
     - 可行性和范围适当性
     - 新颖性和贡献潜力

  2. **文献综述**
     - 覆盖的全面性
     - 批判性综合与单纯总结
     - 研究差距识别
     - 资料来源的时效性和相关性
     - 适当背景化

  3. **方法学与研究设计**
     - 与研究问题的适当性
     - 严谨性和效度
     - 可重复性和透明度
     - 伦理考虑
     - 局限性承认

  4. **数据收集与来源**
     - 数据的质量和适当性
     - 样本大小和代表性
     - 数据收集程序
     - 来源可信度和可靠性

  5. **分析与解释**
     - 分析方法的适当性
     - 分析的严谨性
     - 逻辑连贯性
     - 考虑替代解释
     - 结果与主张对齐

  6. **结果与发现**
     - 呈现的清晰度
     - 统计或定性严谨性
     - 可视化质量
     - 解释准确性
     - 影响讨论

  7. **学术写作与展示**
     - 清晰度和组织性
     - 学术语气和风格
     - 语法和机制
     - 逻辑流程
     - 对目标受众的可访问性

  8. **引用与参考文献**
     - 引用完整性
     - 来源质量和适当性
     - 引用准确性
     - 观点平衡
     - 遵守引用标准

  ### 步骤3：评分与评级

  对于每个评估维度，提供：

  **定性评估：**

  - 关键优势（2-3个具体点）
  - 改进领域（2-3个具体点）
  - 关键问题（如有）

  **定量评分（可选）：**
  使用5分制（如适用）：

  - 5：优秀 - 典范质量，可在顶级场所发表
  - 4：良好 - 高质量，需轻微改进
  - 3：足够 - 可接受质量，有明显改进领域
  - 2：需要改进 - 需重大修订
  - 1：差 - 需根本性修订的基本问题

  要程序化计算综合分数，请使用`scripts/calculate_scores.py`。

  ### 步骤4：综合整体评估

  提供集成评估总结：

  1. **整体质量评估** - 对工作学术价值的整体判断
  2. **主要优势** - 跨维度的3-5个关键优势
  3. **关键弱点** - 需关注的3-5个主要领域
  4. **优先级建议** - 按影响排名的改进列表
  5. **发表准备情况**（如适用） - 对目标场所适宜性的评估

  ### 步骤5：提供可操作反馈

  将评估发现转化为建设性、可操作的反馈：

  **反馈结构：**

  - **具体** - 引用确切章节、段落或页码
  - **可操作** - 提供具体改进建议
  - **优先级** - 按重要性和可行性排名建议
  - **平衡** - 在解决弱点的同时承认优势
  - **基于证据** - 基于评估标准提供反馈

  **反馈格式选项：**

  - 带维度分析的结构化报告
  - 映射到特定文档部分的注释评论
  - 带关键发现和建议的执行摘要
  - 对标标准的比较分析

  ### 步骤6：上下文考虑

  根据以下因素调整评估方法：

  **开发阶段：**

  - 早期草稿：关注概念和结构问题
  - 高级草稿：关注细化和完善
  - 最终提交：全面质量检查

  **目的和场所：**

  - 期刊文章：严谨性和贡献的高标准
  - 会议论文：平衡新颖性与呈现清晰度
  - 学生工作：带发展重点的教育反馈
  - 资助提案：强调可行性和影响

  **学科特定规范：**

  - STEM领域：强调可重复性和统计严谨性
  - 社会科学：平衡定量和定性标准
  - 人文学科：关注论证和学术解释

  ## 资源

  ### references/evaluation_framework.md

  每个ScholarEval维度的详细评估标准、评分标准和质量指标。进行评估时加载此参考，以访问具体评估指南和评分标准。

  快速访问搜索模式：

  - “问题表述标准”
  - “文献综述评分标准”
  - “方法学评估”
  - “数据质量指标”
  - “分析严谨性标准”
  - “写作质量检查表”

  ### scripts/calculate_scores.py

  Python脚本，用于从维度级别评分计算综合评估分数。支持加权平均、阈值分析和分数可视化。

  用法：

  ```bash
  python scripts/calculate_scores.py --scores <dimension_scores.json> --output <report.txt>
  ```

  ## 最佳实践

  1. **保持客观性** - 基于既定标准而非个人偏好进行评估
  2. **全面性** - 系统评估所有适用维度
  3. **提供证据** - 用工作中的具体示例支持评估
  4. **保持建设性** - 将弱点视为改进机会
  5. **考虑上下文** - 根据工作阶段和目的调整期望
  6. **记录理由** - 解释评估和评分背后的推理
  7. **鼓励优势** - 明确承认工作的优点
  8. **优先级反馈** - 首先关注高影响改进

  ## 示例评估工作流程

  **用户请求：** “评估这篇关于机器学习用于药物发现的研究论文”

  **响应过程：**

  1. 确定工作类型（实证研究论文）和范围（全面评估）
  2. 加载`references/evaluation_framework.md`获取详细标准
  3. 系统评估每个维度：
     - 问题表述：清晰的关于ML模型性能的研究问题
     - 文献综述：全面覆盖近期ML和药物发现工作
     - 方法学：适当的深度学习架构和验证程序
     - [继续所有维度...]
  4. 计算维度分数和整体评估
  5. 将发现综合为结构化报告，突出：
     - 强方法学和可重复代码
     - 需更多样化数据集评估
     - 写作可在结果部分提高清晰度
  6. 提供带具体建议的优先级建议

  ## 与科学作家集成

  此技能与科学作家工作流程无缝集成：

  **生成论文后：**

  - 使用学术评估作为同行评审的替代或补充
  - 生成`SCHOLAR_EVALUATION.md`和`PEER_REVIEW.md`
  - 提供定量分数以跟踪跨版本的改进

  **修订期间：**

  - 在解决反馈后重新评估特定维度
  - 跨多个版本跟踪分数改进
  - 识别需关注的持续弱点

  **发表准备：**

  - 评估目标期刊/会议的准备情况
  - 在提交前识别差距
  - 对标发表标准

  ## 备注

  - 评估严谨性应匹配工作的目的和阶段
  - 某些维度可能不适用于所有工作类型（例如，纯理论论文的数据收集）
  - 应考虑学术规范的文化和学科差异
  - 此框架补充而非替代领域特定专业知识
  - 与同行评审技能结合使用以进行综合评估

  ## 引用

  此技能基于ScholarEval框架，在以下文献中介绍：

  **Moussa, H. N., Da Silva, P. Q., Adu-Ampratwum, D., East, A., Lu, Z., Puccetti, N., Xue, M., Sun, H., Majumder, B. P., & Kumar, S. (2025).** _ScholarEval: Research Idea Evaluation Grounded in Literature_. arXiv preprint arXiv:2510.16234. [https://arxiv.org/abs/2510.16234](https://arxiv.org/abs/2510.16234)

  **摘要：** ScholarEval是一个检索增强评估框架，基于两个基本标准评估研究想法：稳健性（基于现有文献的提议方法的经验有效性）和贡献（想法相对于先前研究在不同维度上的推进程度）。该框架显著覆盖专家注释评估点，并在评估可操作性、深度和证据支持方面始终优于基线系统。

