  # Kwant量子输运

  ## 目的

  为介观系统的Kwant量子输运计算提供专家指导，包括散射矩阵计算和纳米结构建模。

  ## 能力

  - 任意几何结构的系统构建器
  - 散射矩阵计算
  - 朗道尔-布蒂克形式主义
  - 紧束缚哈密顿量构建
  - 能带结构可视化
  - 并行输运计算

  ## 使用指南

  1. **系统定义**：构建包含引线和散射区域的系统
  2. **哈密顿量**：定义紧束缚哈密顿量
  3. **散射计算**：计算散射矩阵和电导
  4. **能带结构**：计算并可视化能带结构
  5. **并行化**：对大型系统使用并行计算

  ## 工具/库

  - Kwant
  - NumPy
  - SciPy
