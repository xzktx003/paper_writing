content: |
  # CCF Idea Optimizer

  ## Overview
  Takes rough, fuzzy, or stuck research ideas and develops them into well-structured research plans. Uses the PGIME (Problem-Gap-Insight-Method-Evidence) framework.

  ## PGIME Framework
  - **Problem**: What problem are you solving?
  - **Gap**: What's missing in existing work?
  - **Insight**: What's your key insight?
  - **Method**: How do you realize it?
  - **Evidence**: How do you validate it?

  ## Artifacts
  - Idea brief document
  - Rescue routes for stuck ideas
  - Minimum viable problem formulation
