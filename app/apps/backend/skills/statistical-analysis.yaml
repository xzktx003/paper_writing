prompt: |
  # Statistical Analysis Guide

  Perform rigorous statistical analysis with proper test selection, assumption validation, and APA-formatted reporting.

  ## Test Selection Decision Tree

  ### Comparing Groups
  | Data Type | Groups | Normal? | Use |
  |-----------|--------|---------|-----|
  | Continuous | 2 | Yes | Independent t-test |
  | Continuous | 2 | No | Mann-Whitney U |
  | Continuous | 2 paired | Yes | Paired t-test |
  | Continuous | 2 paired | No | Wilcoxon signed-rank |
  | Continuous | 3+ | Yes | One-way ANOVA |
  | Continuous | 3+ | No | Kruskal-Wallis |
  | Continuous | 3+ repeated | Yes | Repeated measures ANOVA |
  | Continuous | 3+ repeated | No | Friedman test |
  | Categorical | 2 | - | Chi-square / Fisher's exact |
  | Categorical | 3+ | - | Chi-square |

  ### Relationships
  | Goal | Data Type | Use |
  |------|-----------|-----|
  | Association | Continuous + Continuous | Pearson's r |
  | Association | Ordinal + Ordinal | Spearman's ρ |
  | Association | Categorical + Categorical | Cramér's V |
  | Prediction | Continuous ~ Continuous | Linear regression |
  | Prediction | Categorical ~ Continuous | Logistic regression |
  | Prediction | Multiple predictors | Multiple regression / GLM |

  ## Assumption Checking

  ### Normality Tests
  - Shapiro-Wilk (n < 50)
  - Kolmogorov-Smirnov (n ≥ 50)
  - Q-Q plot (visual inspection)
  - Rule of thumb: skewness < |2|, kurtosis < |7|

  ### Homogeneity of Variance
  - Levene's test (most common)
  - Bartlett's test (if normal)
  - Brown-Forsythe test (robust)

  ### Independence
  - Durbin-Watson test (regression)
  - Study design (not testable statistically)

  ## Effect Sizes

  | Test | Effect Size | Small | Medium | Large |
  |------|-------------|-------|--------|-------|
  | t-test | Cohen's d | 0.2 | 0.5 | 0.8 |
  | ANOVA | η² | 0.01 | 0.06 | 0.14 |
  | Correlation | r | 0.1 | 0.3 | 0.5 |
  | Regression | R² | 0.02 | 0.13 | 0.26 |
  | Chi-square | Cramér's V | 0.1 | 0.3 | 0.5 |

  ## Reporting Format (APA 7th)

  ### t-test
  "An independent-samples t-test revealed that Group A (M = 45.2, SD = 8.3) scored significantly higher than Group B (M = 38.7, SD = 7.1), t(58) = 3.42, p = 0.001, Cohen's d = 0.84."

  ### ANOVA
  "A one-way ANOVA showed a significant effect of condition on performance, F(2, 87) = 5.13, p = 0.008, η² = 0.11. Post-hoc Tukey tests indicated..."

  ### Correlation
  "There was a strong positive correlation between X and Y, r(48) = 0.67, p < 0.001."

  ### Regression
  "The model significantly predicted Y, R² = 0.34, F(3, 96) = 16.4, p < 0.001. Each unit increase in X was associated with a 2.3-unit increase in Y (β = 0.45, p = 0.003)."

  ## Power Analysis
  - Minimum sample size: use G*Power or pwr package
  - Target power: 0.80 (minimum), 0.90 (preferred)
  - Report achieved power post-hoc

  ## Multiple Comparisons Correction
  - Bonferroni: conservative, p_adj = p × n_tests
  - Holm-Bonferroni: step-down, less conservative
  - Benjamini-Hochberg: controls FDR
  - Tukey HSD: for all pairwise comparisons

  ## Language
  Respond in the user's language. If Chinese, respond in Chinese.
