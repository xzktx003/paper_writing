  # 引用与学术规范工具

  准确遵循芝加哥、MLA及学科特定格式指南，格式化引用、脚注和参考文献。

  ## 概述

  本技能支持专业的学术引用与文献著录。它涵盖引用格式编排、脚注构建以及遵循相应学科格式指南的参考文献汇编。

  ## 能力范围

  ### 引用格式
  - 芝加哥格式手册
  - MLA手册
  - APA格式
  - 学科变体
  - 数字资源引用

  ### 脚注构建
  - 注释格式
  - 后续引用
  - Ibid/op. cit. 用法
  - 解释性注释
  - 内容注释

  ### 参考文献汇编
  - 条目格式
  - 字母顺序排列
  - 注释撰写
  - 类别组织
  - 来源验证

  ### 参考文献管理
  - 参考文献软件使用
  - 数据库维护
  - 导出格式
  - 样式切换
  - 批量处理

  ## 使用指南

  ### 引用流程
  1. 识别来源类型
  2. 收集必要元素
  3. 根据格式指南编排
  4. 验证准确性
  5. 保持一致性
  6. 按需更新
  7. 检查最终版本

  ### 格式选择
  - 遵循出版要求
  - 匹配学科惯例
  - 保持一致性
  - 记录变体
  - 为新版本更新

  ### 质量标准
  - 信息完整
  - 格式准确
  - 应用一致
  - 来源已验证
  - 呈现清晰

