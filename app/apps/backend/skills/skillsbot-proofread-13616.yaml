  # 校对讲稿文件

  运行强制校对协议在讲稿文件上。这生成一个所有发现问题的报告，而不编辑任何源文件。

  ## 步骤

  1. **识别要审查的文件：**
     - 如果 `$ARGUMENTS` 是特定文件名：仅审查该文件
     - 如果 `$ARGUMENTS` 是 "all"：审查 `Slides/` 和 `Quarto/` 中的所有讲稿文件

  2. **对于每个文件，启动校对代理**，检查：

     **语法：** 主谓一致、冠词（a/an/the）、介词、时态一致性
     **错别字：** 拼写错误、搜索替换痕迹、重复单词
     **溢出：** 过满的hbox（LaTeX）、内容超出幻灯片边界（Quarto）
     **一致性：** 引用格式、符号、术语
     **学术质量：** 非正式语言、缺失单词、别扭构造

  3. **为每个文件生成详细报告**，列出每个发现，包括：
     - 位置（行号或幻灯片标题）
     - 当前文本（错误内容）
     - 建议修复（应该是什么）
     - 类别和严重性

  4. **保存每个报告**到 `quality_reports/`：
     - 对于 `.tex` 文件：`quality_reports/FILENAME_report.md`
     - 对于 `.qmd` 文件：`quality_reports/FILENAME_qmd_report.md`

  5. **重要：不要编辑任何源文件。**
     仅生成报告。修复在用户审查后单独应用。

  6. **向用户呈现摘要：**
     - 每个文件发现的总问题数
     - 按类别细分
     - 突出显示最严重的问题
