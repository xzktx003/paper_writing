content: |
  # CCF Paper Reviewer

  ## Overview
  Professional paper review service for CCF-A submissions. Provides scientific review, writing quality assessment, scoring, AC/meta-review simulation, and submission risk diagnosis.

  ## Review Types
  - **Scientific Review**: Novelty, correctness, significance, experimental soundness
  - **Writing Review**: Clarity, structure, argument flow, claim-evidence alignment
  - **Risk Diagnosis**: Acceptance probability, weak points, revision priorities

  ## Output
  - Scientific review with detailed comments
  - Writing review with line-level feedback
  - Risk table with scores and priorities
  - Modification recommendations

  ## Principles
  - Do not rewrite the paper content
  - Focus on evaluation, not generation
  - Every critique must be actionable
