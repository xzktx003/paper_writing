  ```json
  {
    "factors": [{
      "name": "字符串",
      "low": "数字",
      "high": "数字",
      "type": "连续|分类"
    }],
    "responses": ["字符串"],
    "design_type": "因子|部分因子|响应曲面|田口",
    "constraints": {
      "max_runs": "数字",
      "blocking": "布尔值"
    }
  }
  ```

