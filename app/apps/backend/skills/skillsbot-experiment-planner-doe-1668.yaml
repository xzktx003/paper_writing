  # 实验规划器 DOE

  ## 目的

  实验规划器 DOE 技能为纳米材料合成与加工优化提供系统的实验设计，支持高效探索参数空间和稳健的工艺开发。

  ## 能力

  - 因子设计生成
  - 响应曲面方法
  - 田口方法实施
  - 方差分析
  - 优化预测
  - 稳健性测试

  ## 使用指南

  ### DOE 工作流程

  1. **设计选择**
     - 识别因子与水平
     - 选择合适的设计
     - 计算所需实验次数

  2. **执行规划**
     - 随机化实验顺序
     - 包含重复实验
     - 必要时规划区组

  3. **分析**
     - 执行方差分析
     - 构建响应模型
     - 优化参数

  ## 流程集成

  - 纳米颗粒合成协议开发
  - 薄膜沉积工艺优化
  - 纳米光刻工艺开发

