  # 研究方案构建器技能

  ## 目的

  遵循可重复性、清晰性和完整性的最佳实践，构建标准化的研究方案。

  ## 能力

  - 生成方案模板
  - 结构化方法学部分
  - 包含必需元素
  - 格式化为注册要求
  - 支持多领域
  - 以标准格式导出

  ## 使用指南

  1. 选择方案类型
  2. 定义研究参数
  3. 结构化方法学
  4. 包含所有元素
  5. 审查完整性
  6. 导出用于注册

  ## 流程集成

  在科学发现工作流中用于：
  - 研究注册
  - 资助申请
  - 伦理提交
  - 方案发表

  ## 配置

  - 方案模板
  - 必需章节
  - 格式标准
  - 导出选项

  ## 输出成果

  - 研究方案
  - 注册文件
  - 方法学章节
  - 方案摘要
