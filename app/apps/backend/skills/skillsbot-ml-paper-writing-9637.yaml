  ## 评审评估标准

  评审在四个维度评估论文：

  | 标准 | 评审查找什么 |
  |-----------|------------------------|
  | **质量** | 技术正确性，良好支持的声明 |
  | **清晰性** | 清晰写作，专家可复现 |
  | **显著性** | 社区影响，推进理解 |
  | **原创性** | 新见解（不需要新方法） |

  **评分（NeurIPS 6点尺度）：**
  - 6: 强接受 - 开创性，无瑕
  - 5: 接受 - 技术坚实，高影响
  - 4: 边缘接受 - 坚实，有限评估
  - 3: 边缘拒绝 - 坚实但弱点超过
  - 2: 拒绝 - 技术缺陷
  - 1: 强拒绝 - 已知结果或伦理问题

  见[references/reviewer-guidelines.md](references/reviewer-guidelines.md)获取详细评审指令。

