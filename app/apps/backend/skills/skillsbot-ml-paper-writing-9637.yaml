  # 顶级AI会议ML论文写作

  针对**NeurIPS、ICML、ICLR、ACL、AAAI和COLM**撰写可发表论文的专家级指导。此技能结合了顶级研究人员（Nanda、Farquhar、Karpathy、Lipton、Steinhardt）的写作哲学与实用工具：LaTeX模板、引用验证API和会议清单。

  ## 核心理念：协作式写作

  **论文写作是协作的，但Claude应主动交付草稿。**

  典型工作流从包含代码、结果和实验产物的研究仓库开始。Claude的角色是：

  1. **理解项目**：通过探索仓库、结果和现有文档
  2. **交付完整初稿**：当对贡献有信心时
  3. **文献检索**：使用网络搜索和API查找相关引用
  4. **基于反馈循环优化**：当科学家提供输入时
  5. **请求澄清**：仅当对关键决策真正不确定时

  **关键原则**：主动。如果仓库和结果清晰，交付完整草稿。不要等待每个部分的反馈——科学家很忙。提供具体内容供他们反应，然后基于响应迭代。

  ---

  ## ⚠️ 关键：绝不捏造引用

  **这是学术写作中使用AI辅助的最重要规则。**

  ### 问题
  AI生成的引用有**约40%的错误率**。捏造的引用——不存在的论文、错误作者、不正确年份、伪造DOI——是严重的学术不端行为，可能导致桌面拒绝或撤回。

  ### 规则
  **绝不从记忆生成BibTeX条目。始终通过编程获取。**

  | 操作 | ✅ 正确 | ❌ 错误 |
  |--------|-----------|----------|
  | 添加引用 | 搜索API → 验证 → 获取BibTeX | 从记忆写BibTeX |
  | 不确定论文 | 标记为`[CITATION NEEDED]` | 猜测引用 |
  | 找不到确切论文 | 注释："占位符 - 验证" | 发明听起来相似的论文 |

  ### 当无法验证引用时

  如果无法通过编程验证引用，必须：

  ```latex
  % 显式占位符 - 需要人工验证
  \cite{PLACEHOLDER_author2024_verify_this}  % TODO: 验证此引用存在
  ```

  **始终告知科学家**："我已标记[X]个引用为需要验证的占位符。我无法确认这些论文存在。"

  ### 推荐：安装Exa MCP用于论文搜索

  为最佳论文搜索体验，安装**Exa MCP**，提供实时学术搜索：

  **Claude Code:**
  ```bash
  claude mcp add exa -- npx -y mcp-remote "https://mcp.exa.ai/mcp"
  ```

  **Cursor / VS Code** (添加到MCP设置):
  ```json
  {
    "mcpServers": {
      "exa": {
        "type": "http",
        "url": "https://mcp.exa.ai/mcp"
      }
    }
  }
  ```

  Exa MCP支持搜索如：
  - "查找2023年后发表的关于语言模型RLHF的论文"
  - "搜索Vaswani的Transformer架构论文"
  - "获取可解释性稀疏自编码器的最新工作"

  然后通过Semantic Scholar API验证结果并通过DOI获取BibTeX。

  ---

  ## 工作流0：从研究仓库开始

  开始论文写作时，首先理解项目：

  ```
  项目理解：
  - [ ] 步骤1：探索仓库结构
  - [ ] 步骤2：阅读README、现有文档和关键结果
  - [ ] 步骤3：与科学家确定主要贡献
  - [ ] 步骤4：查找代码库中已引用的论文
  - [ ] 步骤5：搜索额外相关文献
  - [ ] 步骤6：一起概述论文结构
  - [ ] 步骤7：基于反馈迭代起草章节
  ```

  **步骤1：探索仓库**

  ```bash
  # 理解项目结构
  ls -la
  find . -name "*.py" | head -20
  find . -name "*.md" -o -name "*.txt" | xargs grep -l -i "结果\|结论\|发现"
  ```

  查找：
  - `README.md` - 项目概述和声明
  - `results/`、`outputs/`、`experiments/` - 关键发现
  - `configs/` - 实验设置
  - 现有`.bib`文件或引用参考
  - 任何草稿文档或笔记

  **步骤2：识别现有引用**

  检查代码库中已引用的论文：

  ```bash
  # 查找现有引用
  grep -r "arxiv\|doi\|cite" --include="*.md" --include="*.bib" --include="*.py"
  find . -name "*.bib"
  ```

  这些是相关工作的信号起点——科学家已认为它们相关。

  **步骤3：澄清贡献**

  写作前，与科学家明确确认：

  > "基于我对仓库的理解，主要贡献似乎是[X]。
  > 关键结果显示[Y]。这是您希望论文的框架吗，
  > 或者我们应该强调不同方面？"

  **绝不假设叙事——始终与人类验证。**

  **步骤4：搜索额外文献**

  使用网络搜索查找相关论文：

  ```
  尝试搜索查询：
  - "[主要技术] + [应用领域]"
  - "[基线方法] 比较"
  - "[问题名称] 最先进"
  - 现有引用中的作者名
  ```

  然后使用以下引用工作流验证和检索BibTeX。

  **步骤5：交付初稿**

  **主动——交付完整草稿而非请求每个部分的许可。**

  如果仓库提供清晰结果且贡献明显：
  1. 端到端撰写完整初稿
  2. 呈现完整草稿供反馈
  3. 基于科学家响应迭代

  如果对框架或主要声明真正不确定：
  1. 起草您有信心的部分
  2. 标记特定不确定性："我将X框架为主要贡献——如果您更愿强调Y，请告知"
  3. 继续草稿而非阻塞

  **与草稿一起包含的问题**（非之前）：
  - "我将X强调为主要贡献——如需调整"
  - "我突出结果A、B、C——告知是否其他更重要"
  - "相关工作部分包括[论文]——添加我遗漏的任何"

  ---

  ## 何时使用此技能

  使用此技能当：
  - **从研究仓库开始**撰写论文
  - **起草或修订**特定章节
  - **进行文献综述**和查找相关工作
  - **在您的研究领域发现近期论文**
  - **查找和验证引用**用于相关工作
  - **格式化**会议提交
  - **重新提交**到不同场所（格式转换）
  - **迭代**草稿基于科学家反馈

  **始终记住**：初稿是讨论的起点，非最终输出。

  ---

  ## 工作流：文献研究与论文发现

  进行文献综述、查找相关工作或发现近期论文时，使用此工作流系统性搜索、评估和选择ML论文。

  ### 工作流5：查找与评估论文

  ```
  文献研究流程：
  - [ ] 步骤1：定义搜索范围和关键词
  - [ ] 步骤2：搜索arXiv和学术数据库
  - [ ] 步骤3：通过标题/摘要筛选论文
  - [ ] 步骤4：评估论文质量（5个维度）
  - [ ] 步骤5：选择顶级论文并提取引用
  - [ ] 步骤6：通过编程验证引用
  ```

  **步骤1：定义搜索范围**

  识别特定研究领域、方法或应用：
  - **技术聚焦**：`transformer架构`、`图神经网络`、`自监督学习`
  - **应用聚焦**：`医学图像分析`、`机器人强化学习`、`语言模型对齐`
  - **问题聚焦**：`分布外泛化`、`持续学习`、`ML公平性`

  **步骤2：搜索arXiv**

  使用带目标关键词的arXiv搜索：
  ```
  URL模式：
  https://arxiv.org/search/?searchtype=all&query=关键词&abstracts=show&order=-announced_date_first

  示例搜索：
  - https://arxiv.org/search/?searchtype=all&query=graph+neural+networks&abstracts=show&order=-announced_date_first
  - https://arxiv.org/search/?cat:cs.LG+AND+all:transformer&abstracts=show&order=-announced_date_first
  ```

  **提示：**
  - 组合关键词用`+`表示AND
  - 按类别过滤：`cs.LG`、`cs.AI`、`cs.CV`、`cs.CL`
  - 按`announced_date_first`排序获取近期论文
  - 可用时使用Chrome MCP工具自动化

  **步骤3：筛选论文**

  通过标题和摘要快速筛选：
  - 与研究主题相关性
  - 贡献新颖性
  - 场所/作者声誉
  - 代码可用性（检查GitHub链接）

  **步骤4：评估质量**

  使用5维度质量标准：

  | 维度 | 权重 | 评估焦点 |
  |-----------|--------|------------------|
  | **创新** | 30% | 新颖性和原创性 |
  | **方法完整性** | 25% | 清晰性和可复现性 |
  | **实验全面性** | 25% | 验证深度 |
  | **写作质量** | 10% | 呈现清晰度 |
  | **相关性&影响** | 10% | 领域重要性 |

  **评分**：每个维度评分1-5，计算加权总分

  **步骤5：选择与提取**

  - 按总分排名论文
  - 选择顶级论文进行详细审查
  - 提取元数据：标题、作者、arXiv ID、摘要
  - 记下代码仓库链接

  **步骤6：验证引用**

  对于选定论文，使用Semantic Scholar API验证引用：
  - 通过DOI编程获取BibTeX
  - 标记未验证引用为`[CITATION NEEDED]`
  - 以验证状态存储在参考文献中

  ### 何时使用文献研究

  使用此工作流当：
  - **开始新项目**：查找相关工作和基线
  - **撰写相关工作部分**：发现您领域的近期论文
  - **保持更新**：跟踪您领域的最新出版物
  - **查找基线**：识别最先进方法进行比较
  - **文献综述**：研究领域的全面调查

  ### 质量阈值

  - **优秀**：4.0+（肯定包括）
  - **良好**：3.5-3.9（如果相关包括）
  - **一般**：3.0-3.4（如果高度相关包括）
  - **差**：<3.0（排除除非必要）

  ### 参考文件

  详细文献研究指南：
  - **`references/literature-research/arxiv-search-guide.md`** - arXiv搜索策略和URL模式
  - **`references/literature-research/paper-quality-criteria.md`** - 详细5维度评估标准

  ---

  ## 知识库：ML论文写作模式

  此技能维护从成功ML会议论文提取的写作模式、技术和要求的策划知识库。知识库随您分析更多论文而增长。

  ### 知识组织

  知识库在`references/knowledge/`下组织为4类：

  | 类别 | 文件 | 内容 |
  |----------|------|----------|
  | **结构** | `structure.md` | 论文组织、IMRaD模式、过渡、章节流 |
  | **写作技巧** | `writing-techniques.md` | 句子模式、过渡短语、清晰技术 |
  | **提交指南** | `submission-guides.md` | 场所要求（NeurIPS、ICML、ICLR、ACL、AAAI、COLM） |
  | **评审响应** | `review-response.md` | 反驳策略、处理评审评论 |

  ### 知识库如何维护

  **paper-miner代理**自动从您提供的论文提取和分类写作知识：

  ```
  您："从这篇NeurIPS论文学习写作技巧：路径/to/paper.pdf"
  ↓
  paper-miner分析论文
  ↓
  提取模式 → 分类为4类 → 更新知识文件
  ↓
  知识随每篇分析论文增长
  ```

  **提取内容：**
  - **结构模式**：成功论文如何组织章节、主题间过渡
  - **写作技巧**：句子模板、过渡短语、清晰方法
  - **场所要求**：页限、必要章节、格式化规则
  - **反驳策略**：如何响应特定评审关切

  ### 何时使用知识库

  **用于写作模式：**
  - 困于如何措辞过渡？检查`writing-techniques.md`
  - 需要结构灵感？浏览`structure.md`
  - 撰写反驳？咨询`review-response.md`

  **用于场所要求：**
  - 提交到NeurIPS？见`submission-guides.md`清单
  - 场所间转换？比较页限和要求
  - 不确定必要章节？每个场所有特定要求

  ### 贡献到知识库

  您分析的每篇论文使知识库更丰富未来使用：

  ```bash
  # 从任何上下文触发paper-miner
  "从这篇论文提取写作模式：路径/to/paper.pdf"
  "分析https://arxiv.org/abs/2301.xxxxx的结构"
  "这篇ICLR论文使用什么写作技巧？"
  ```

  paper-miner代理：
  1. 提取论文内容（PDF、DOCX或arXiv链接）
  2. 分析IMRaD结构和写作模式
  3. 识别场所特定要求
  4. 用新模式更新适当知识文件
  5. 报告添加内容带来源归属

  ### 知识库原则

  **仅可操作模式**：每个条目提供带示例的可重用技术。

  **来源归属**：每个模式引用其来源论文以可追溯性。

  **无重复**：添加新模式前检查现有内容。

  **质量胜于数量**：专注于有效技术，非全面列表。

  见`references/knowledge/README.md`获取完整知识库文档。

