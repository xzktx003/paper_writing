  ## 表与图

  ### 表

  使用`booktabs` LaTeX包专业表：

  ```latex
  \usepackage{booktabs}
  \begin{tabular}{lcc}
  \toprule
  方法 & 准确度 ↑ & 延迟 ↓ \\
  \midrule
  基线 & 85.2 & 45ms \\
  \textbf{我们的} & \textbf{92.1} & 38ms \\
  \bottomrule
  \end{tabular}
  ```

  **规则：**
  - 加粗每度量最佳值
  - 包括方向符号（↑更高更好，↓更低更好）
  - 右对齐数值列
  - 一致小数精度

  ### 图

  - **矢量图形**（PDF、EPS）所有绘图和图表
  - **光栅**（PNG 600 DPI）仅用于照片
  - 使用**色盲安全调色板**（Okabe-Ito或Paul Tol）
  - 验证**灰度可读性**（8%男性有色觉缺陷）
  - **无图中标题**—标题服务此功能
  - **独立标题**—读者应无需主文理解

