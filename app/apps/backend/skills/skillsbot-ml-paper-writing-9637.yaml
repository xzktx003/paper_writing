  ## 平衡主动性与协作

  **默认：主动。交付草稿，然后迭代。**

  | 置信水平 | 操作 |
  |-----------------|--------|
  | **高**（清晰仓库，明显贡献） | 撰写完整草稿，交付，基于反馈迭代 |
  | **中**（一些模糊性） | 起草带标记不确定性的草稿，继续 |
  | **低**（主要未知） | 问1-2个目标问题，然后起草 |

  **先起草，随草稿提问**（非之前）：

  | 章节 | 自主起草 | 随草稿标记 |
  |---------|-------------------|-----------------|
  | 摘要 | 是 | "框架贡献为X——如需调整" |
  | 引言 | 是 | "强调问题Y——如果错误纠正" |
  | 方法 | 是 | "包含细节A、B、C——添加缺失部分" |
  | 实验 | 是 | "突出结果1、2、3——如需重新排序" |
  | 相关工作 | 是 | "引用论文X、Y、Z——添加我遗漏的任何" |

  **仅在以下情况阻塞输入：**
  - 目标场所不清晰（影响页限、框架）
  - 多个矛盾框架似乎同样有效
  - 结果似乎不完整或不一致
  - 明确请求在继续前审查

  **不阻塞：**
  - 词汇选择决策
  - 章节排序
  - 显示哪些具体结果（做选择，标记它）
  - 引用完整性（用您找到的起草，记下空白）

  ---

  ## 叙事原则

  **最关键的见解**：您的论文不是实验集合——它是一个有清晰贡献由证据支持的故事。

  每篇成功ML论文围绕Neel Nanda称为"叙事"的东西：一个简短、严谨、基于证据的技术故事，有读者关心的要点。

  **三大支柱（必须在引言结尾前清晰）：**

  | 支柱 | 描述 | 示例 |
  |--------|-------------|---------|
  | **什么** | 1-3个具体新颖声明在连贯主题内 | "我们证明在条件Z下X实现Y" |
  | **为什么** | 支持声明的严谨经验证据 | 强基线，区分假设的实验 |
  | **所以什么** | 为什么读者应该关心 | 连接已识别社区问题 |

  **如果您无法用一句话陈述您的贡献，您还没有论文。**

  ---

  ## 论文结构工作流

  ### 工作流1：撰写完整论文（迭代）

  复制此清单并跟踪进度。**每步涉及起草 → 反馈 → 修订：**

  ```
  论文写作进度：
  - [ ] 步骤1：定义一句贡献（与科学家）
  - [ ] 步骤2：起草图1 → 获取反馈 → 修订
  - [ ] 步骤3：起草摘要 → 获取反馈 → 修订
  - [ ] 步骤4：起草引言 → 获取反馈 → 修订
  - [ ] 步骤5：起草方法 → 获取反馈 → 修订
  - [ ] 步骤6：起草实验 → 获取反馈 → 修订
  - [ ] 步骤7：起草相关工作 → 获取反馈 → 修订
  - [ ] 步骤8：起草限制 → 获取反馈 → 修订
  - [ ] 步骤9：完成论文清单（必需）
  - [ ] 步骤10：最终审查周期和提交
  ```

  **步骤1：定义一句贡献**

  **此步需要科学家明确确认。**

  撰写任何内容前，阐明并验证：
  - 您的论文贡献的单件事是什么？
  - 在您工作前不明显或不存在的是什么？

  > "我建议框架贡献为：'[一句]'。这捕捉
  > 您看到的主要要点吗？我们应该调整重点吗？"

  **步骤2：起草图1**

  图1值得特别关注——许多读者直接跳到它。
  - 传达核心理念、方法或最引人注目的结果
  - 使用矢量图形（绘图用PDF/EPS）
  - 撰写无需主文可独立的标题
  - 确保黑白可读性（8%男性有色觉缺陷）

  **步骤3：写摘要（5句公式）**

  来自Sebastian Farquhar（DeepMind）：

  ```
  1. 您实现了什么："我们介绍..."、"我们证明..."、"我们展示..."
  2. 为什么这难且重要
  3. 您如何做（用专业关键词可发现性）
  4. 您有什么证据
  5. 您最显著数字/结果
  ```

  **删除**通用开头如"大型语言模型已取得显著成功..."

  **步骤4：写引言（最大1-1.5页）**

  必须包括：
  - 2-4个子弹贡献列表（双栏格式每行最大1-2行）
  - 清晰问题陈述
  - 简要方法概述
  - 方法应最大在页2-3开始

  **步骤5：方法章节**

  启用重新实现：
  - 概念概述或伪代码
  - 列出所有超参数
  - 架构细节足够复现
  - 呈现最终设计决策；消融实验在实验部分

  **步骤6：实验章节**

  对每个实验，明确陈述：
  - 它支持什么声明
  - 如何连接到主要贡献
  - 实验设置（细节在附录）
  - 观察什么："蓝线显示X，展示Y"

  要求：
  - 带方法论的误差条（标准差 vs 标准误差）
  - 超参数搜索范围
  - 计算基础设施（GPU类型、总小时）
  - 种子设置方法

  **步骤7：相关工作**

  方法论组织，非逐篇论文：

  **好：** "一行工作使用Floogledoodle的假设[引用]而我们使用Doobersnoddle的假设因为..."

  **差：** "Snap等人介绍了X而Crackle等人介绍了Y。"

  慷慨引用——评审可能相关论文作者。

  **步骤8：限制章节（必需）**

  所有主要会议要求此。反直觉地，诚实帮助：
  - 评审被指示不惩罚诚实限制承认
  - 通过首先识别弱点预批评
  - 解释为什么限制不削弱核心声明

  **步骤9：论文清单**

  NeurIPS、ICML和ICLR都要求论文清单。见[references/checklists.md](references/checklists.md)。

