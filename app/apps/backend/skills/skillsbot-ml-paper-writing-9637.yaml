  ## 常见问题与解决方案

  **问题：摘要太通用**

  删除第一句如果它可前置到任何ML论文。以您的具体贡献开始。

  **问题：引言超过1.5页**

  拆分背景到相关工作。前载贡献子弹。方法应最大在页2-3开始。

  **问题：实验缺乏明确声明**

  在每个实验前添加句子："此实验测试是否[具体声明]..."

  **问题：评审发现论文难跟随**

  - 添加明确路标："在此章节，我们展示X"
  - 贯穿使用一致术语
  - 包括可独立的图标题

  **问题：缺失统计显著性**

  始终包括：
  - 误差条（指定：标准差或标准误差）
  - 运行数量
  - 统计测试如果比较方法

