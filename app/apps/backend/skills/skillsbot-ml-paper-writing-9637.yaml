  ## 会议要求快速参考

  | 会议 | 页限 | 最终提交额外 | 关键要求 |
  |------------|------------|------------------------|-----------------|
  | **NeurIPS 2025** | 9页 | +0 | 强制清单，接受后摘要 |
  | **ICML 2026** | 8页 | +1 | 要求更广泛影响声明 |
  | **ICLR 2026** | 9页 | +1 | 要求LLM披露，互惠评审 |
  | **ACL 2025** | 8页（长） | 变化 | 强制限制章节 |
  | **AAAI 2026** | 7页 | +1 | 严格样式文件遵守 |
  | **COLM 2025** | 9页 | +1 | 专注于语言模型 |

  **通用要求：**
  - 双盲评审（匿名化提交）
  - 引用不计入页限
  - 附录无限但评审不需读
  - LaTeX所有场所必需

  **LaTeX模板：** 见[templates/](templates/)目录所有会议模板。

