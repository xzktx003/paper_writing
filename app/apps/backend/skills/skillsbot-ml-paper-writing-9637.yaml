  ## 会议重新提交 & 格式转换

  当论文从一个场所被拒绝或撤回并重新提交到另一个时，需要格式转换。这在ML研究中是常见工作流。

  ### 工作流3：在会议格式间转换

  ```
  格式转换清单：
  - [ ] 步骤1：识别源和目标模板差异
  - [ ] 步骤2：创建带目标模板的新项目
  - [ ] 步骤3：复制内容章节（非前导）
  - [ ] 步骤4：调整页限和内容
  - [ ] 步骤5：更新会议特定要求
  - [ ] 步骤6：验证编译和格式化
  ```

  **步骤1：关键模板差异**

  | 从 → 到 | 页变化 | 关键调整 |
  |-----------|-------------|-----------------|
  | NeurIPS → ICML | 9 → 8页 | 切1页，添加更广泛影响如果缺失 |
  | ICML → ICLR | 8 → 9页 | 可扩展实验，添加LLM披露 |
  | NeurIPS → ACL | 9 → 8页 | 为NLP惯例重构，添加限制 |
  | ICLR → AAAI | 9 → 7页 | 需要显著削减，严格样式遵守 |
  | 任何 → COLM | 变化 → 9 | 为语言模型重点重构 |

  **步骤2：内容迁移（非模板合并）**

  **绝不复制LaTeX前导在模板间**。反而：

  ```bash
  # 1. 以目标模板新鲜开始
  cp -r templates/icml2026/ new_submission/

  # 2. 复制仅内容章节从旧论文
  # - 摘要文本
  # - 章节内容（在\section{}命令间）
  # - 图和表
  # - 参考文献条目

  # 3. 粘贴到目标模板结构
  ```

  **步骤3：调整页限**

  当削减页（例如，NeurIPS 9 → AAAI 7）：
  - 移动详细证明到附录
  - 压缩相关工作（引用综述而非个别论文）
  - 合并类似实验到统一表
  - 使用较小图尺寸带子图
  - 收紧写作：消除冗余，使用主动语态

  当扩展（例如，ICML 8 → ICLR 9）：
  - 添加评审请求的消融研究
  - 扩展限制讨论
  - 包括额外基线
  - 添加定性示例

  **步骤4：会议特定调整**

  | 目标场所 | 必需添加 |
  |--------------|-------------------|
  | **ICML** | 更广泛影响声明（结论后） |
  | **ICLR** | LLM使用披露，互惠评审协议 |
  | **ACL/EMNLP** | 限制章节（强制），道德声明 |
  | **AAAI** | 严格遵守样式文件（无修改） |
  | **NeurIPS** | 论文清单（附录），接受后摘要 |

  **步骤5：更新参考文献**

  ```latex
  % 移除揭示身份的自引用（为盲评审）
  % 更新任何"评审中"引用到发表版本
  % 添加上次提交后发表的新的相关工作
  ```

  **步骤6：处理先前评审**

  当拒绝后重新提交：
  - **做** 在新版本中解决评审关切
  - **做** 添加评审请求的实验/澄清
  - **不做** 包括"先前提交变更"章节（盲评审）
  - **不做** 引用先前提交或评审

  **常见转换陷阱：**
  - ❌ 复制`\usepackage`命令（导致冲突）
  - ❌ 保留旧会议页眉/页脚命令
  - ❌ 忘记更新`\bibliography{}`路径
  - ❌ 缺失会议特定必需章节
  - ❌ 格式更改后超出页限

