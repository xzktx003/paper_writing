  ## 正确使用LaTeX模板

  ### 工作流4：从模板开始新论文

  **始终首先复制整个模板目录，然后在其中编写。**

  ```
  模板设置清单：
  - [ ] 步骤1：复制整个模板目录到新项目
  - [ ] 步骤2：验证模板原样编译（在任何更改前）
  - [ ] 步骤3：阅读模板的示例内容理解结构
  - [ ] 步骤4：按章节替换示例内容
  - [ ] 步骤5：保持模板注释/示例作为参考直到完成
  - [ ] 步骤6：仅在结束时清理模板工件
  ```

  **步骤1：复制完整模板**

  ```bash
  # 用完整模板创建您的论文目录
  cp -r templates/neurips2025/ ~/papers/my-new-paper/
  cd ~/papers/my-new-paper/

  # 验证结构完整
  ls -la
  # 应该看到：main.tex、neurips.sty、Makefile等
  ```

  **⚠️ 重要：** 复制整个目录，非仅`main.tex`。模板包括：
  - 样式文件（`.sty`） - 编译必需
  - 参考文献样式（`.bst`） - 引用必需
  - 示例内容 - 有用作为参考
  - Makefiles - 用于简易编译

  **步骤2：首先验证模板编译**

  在做出任何更改前，原样编译模板：

  ```bash
  # 使用latexmk（推荐）
  latexmk -pdf main.tex

  # 或手动编译
  pdflatex main.tex
  bibtex main
  pdflatex main.tex
  pdflatex main.tex
  ```

  如果未修改模板不编译，先修复。常见问题：
  - 缺失TeX包 → 通过`tlmgr install <package>`安装
  - 错误TeX分布 → 使用TeX Live（推荐）

  **步骤3：保持模板内容作为参考**

  不要立即删除所有示例内容。反而：

  ```latex
  % 保持模板示例注释掉当您编写
  % 这显示您期望格式

  % 模板示例（保持作为参考）：
  % \begin{figure}[t]
  %   \centering
  %   \includegraphics[width=0.8\linewidth]{example-image}
  %   \caption{模板显示标题样式}
  % \end{figure}

  % 您的实际图：
  \begin{figure}[t]
    \centering
    \includegraphics[width=0.8\linewidth]{your-figure.pdf}
    \caption{您的标题遵循相同样式。}
  \end{figure}
  ```

  **步骤4：按章节替换内容**

  系统性地工作通过论文：

  ```
  替换顺序：
  1. 标题和作者（为提交匿名化）
  2. 摘要
  3. 引言
  4. 方法
  5. 实验
  6. 相关工作
  7. 结论
  8. 参考文献（您的.bib文件）
  9. 附录
  ```

  对每章节：
  1. 阅读模板的示例内容
  2. 注意任何特殊格式化或使用的宏
  3. 替换为您的遵循相同模式的内容
  4. 频繁编译及早捕获错误

  **步骤5：使用模板宏**

  模板常定义有用宏。检查前导：

  ```latex
  % 常用模板宏使用：
  \newcommand{\method}{您的MethodName}  % 一致方法命名
  \newcommand{\eg}{e.g.,\xspace}        % 适当缩写
  \newcommand{\ie}{i.e.,\xspace}
  \newcommand{\etal}{\textit{et al.}\xspace}
  ```

  **步骤6：仅在结束时清理**

  仅当论文接近完成时移除模板工件：

  ```latex
  % 提交前 - 移除这些：
  % - 注释掉的模板示例
  % - 未使用的包
  % - 模板的示例图/表
  % - Lorem ipsum或占位符文本

  % 保持这些：
  % - 所有样式文件（.sty）
  % - 参考文献样式（.bst）
  % - 模板所需包
  % - 您使用的任何自定义宏
  ```

  ### 模板陷阱避免

  | 陷阱 | 问题 | 解决方案 |
  |---------|---------|----------|
  | 仅复制`main.tex` | 缺失`.sty`，不编译 | 复制整个目录 |
  | 修改`.sty`文件 | 破坏会议格式化 | 绝不编辑样式文件 |
  | 添加随机包 | 冲突，破坏模板 | 仅添加如果必要 |
  | 太早删除模板内容 | 失去格式化参考 | 保持为注释直到完成 |
  | 不频繁编译 | 错误累积 | 每章节后编译 |

  ### 快速模板参考

  | 会议 | 主文件 | 关键样式文件 | 备注 |
  |------------|-----------|----------------|-------|
  | NeurIPS 2025 | `main.tex` | `neurips.sty` | 有Makefile |
  | ICML 2026 | `example_paper.tex` | `icml2026.sty` | 包括算法包 |
  | ICLR 2026 | `iclr2026_conference.tex` | `iclr2026_conference.sty` | 有math_commands.tex |
  | ACL | `acl_latex.tex` | `acl.sty` | 严格格式化 |
  | AAAI 2026 | `aaai2026-unified-template.tex` | `aaai2026.sty` | 非常严格遵守 |
  | COLM 2025 | `colm2025_conference.tex` | `colm2025_conference.sty` | 类似ICLR |

