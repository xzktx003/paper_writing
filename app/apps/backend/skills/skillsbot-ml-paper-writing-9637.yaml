  ## 顶级ML会议写作哲学

  **此节提炼来自领先ML研究人员的最重要写作原则**。这些不是可选风格建议——它们区分接受与被拒绝论文。

  > "论文是一个简短、严谨、基于证据的技术故事，有读者关心的要点。" — Neel Nanda

  ### 此指导背后的来源

  此技能综合了在顶级场所广泛发表的研究人员的写作哲学：

  | 来源 | 关键贡献 | 链接 |
  |--------|-----------------|------|
  | **Neel Nanda** (Google DeepMind) | 叙事原则，什么/为什么/所以什么框架 | [如何写ML论文](https://www.alignmentforum.org/posts/eJGptPbbFPZGLpjsp/highly-opinionated-advice-on-how-to-write-ml-papers) |
  | **Sebastian Farquhar** (DeepMind) | 5句摘要公式 | [如何写ML论文](https://sebastianfarquhar.com/on-research/2024/11/04/how_to_write_ml_papers/) |
  | **Gopen & Swan** | 7个读者期望原则 | [科学写作科学](https://cseweb.ucsd.edu/~swanson/papers/science-of-writing.pdf) |
  | **Zachary Lipton** | 词汇选择，消除犹豫 | [科学写作启发式](https://www.approximatelycorrect.com/2018/01/29/heuristics-technical-scientific-writing-machine-learning-perspective/) |
  | **Jacob Steinhardt** (UC Berkeley) | 精确性，一致术语 | [写作提示](https://bounded-regret.ghost.io/) |
  | **Ethan Perez** (Anthropic) | 微观清晰提示 | [简易论文写作提示](https://ethanperez.net/easy-paper-writing-tips/) |
  | **Andrej Karpathy** | 单贡献焦点 | 各种讲座 |

  **深入任何这些，见：**
  - [references/writing-guide.md](references/writing-guide.md) - 带示例的完整解释
  - [references/sources.md](references/sources.md) - 完整参考文献

  ### 时间分配（来自Neel Nanda）

  大约花**相等时间**在每项：
  1. 摘要
  2. 引言
  3. 图
  4. 其他一切组合

  **为什么？** 大多数评审在到达您的方法前形成判断。读者遇到您的论文为：**标题 → 摘要 → 引言 → 图 → 可能其余。**

  ### 写作风格指南

  #### 句子级清晰（Gopen & Swan的7原则）

  这些原则基于读者实际如何处理散文。违反它们迫使读者花认知努力在结构而非内容上。

  | 原则 | 规则 | 示例 |
  |-----------|------|---------|
  | **主语-动词邻近** | 保持主语和动词接近 | ❌ "模型，训练在...上，实现" → ✅ "模型实现...在训练在...上后" |
  | **强调位置** | 将强调放在句子末尾 | ❌ "当使用注意力时准确度提高15%" → ✅ "当使用注意力时，准确度提高**15%**" |
  | **主题位置** | 放语境第一，新信息后 | ✅ "给定这些约束，我们提出..." |
  | **旧前新** | 熟悉信息 → 不熟悉信息 | 链接向后，然后引入新 |
  | **一单元一功能** | 每段落做一个点 | 分割多点段落 |
  | **动词中行动** | 用动词，非名词化 | ❌ "我们进行了分析" → ✅ "我们分析了" |
  | **新前语境** | 在呈现前设置舞台 | 展示方程前解释 |

  **完整7原则带详细示例：** 见[references/writing-guide.md](references/writing-guide.md#the-7-principles-of-reader-expectations)

  #### 微观提示（Ethan Perez）

  这些小变化积累成显著更清晰的散文：

  - **最小化代词**： ❌ "这显示..." → ✅ "此结果显示..."
  - **动词早**： 位置动词在句子开始附近
  - **展开撇号**： ❌ "X的Y" → ✅ "X的Y"（当尴尬时）
  - **删除填充词**： "实际上"、"有点"、"非常"、"真的"、"基本上"、"相当"、"本质上"

  **完整微观提示带示例：** 见[references/writing-guide.md](references/writing-guide.md#micro-level-writing-tips)

  #### 词汇选择（Zachary Lipton）

  - **具体**： ❌ "性能" → ✅ "准确度"或"延迟"（说您的意思）
  - **消除犹豫**： 删除"可能"和"可以"除非真正不确定
  - **避免增量词汇**： ❌ "结合"、"修改"、"扩展" → ✅ "开发"、"提出"、"介绍"
  - **删除强化词**： ❌ "提供*非常*紧密近似" → ✅ "提供紧密近似"

  #### 精确性胜于简洁（Jacob Steinhardt）

  - **一致术语**： 同一概念不同术语造成混乱。选一个并坚持。
  - **形式陈述假设**： 定理前，明确列出所有假设
  - **直觉 + 严谨**： 提供直观解释伴随形式证明

  ### 评审实际阅读什么

  理解评审行为帮助优先努力：

  | 论文章节 | % 阅读的评审 | 影响 |
  |---------------|---------------------|-------------|
  | 摘要 | 100% | 必须完美 |
  | 引言 | 90%+（略读） | 前载贡献 |
  | 图 | 在方法前检查 | 图1关键 |
  | 方法 | 仅如果感兴趣 | 不埋导语 |
  | 附录 | 很少 | 仅放补充细节 |

  **底线**：如果您的摘要和引言不吸引评审，他们可能永远不会读您的出色方法章节。

