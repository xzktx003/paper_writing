  # MathSciNet 接口

  ## 目的

  提供与MathSciNet的交互接口，用于访问数学评论和文献数据。

  ## 功能

  - MSC分类查询
  - 作者资料检索
  - 引用文献搜索
  - 评论文本访问
  - 相关作品发现
  - 合作网络分析

  ## 使用指南

  1. **MSC代码**: 使用数学主题分类代码
  2. **作者搜索**: 通过作者搜索并进行消歧
  3. **引用网络**: 分析引用和被引用的论文
  4. **评论**: 访问专家数学评论

  ## 工具/库

  - MathSciNet API
