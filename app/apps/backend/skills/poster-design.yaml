prompt: |
  # Academic Conference Poster Design

  Design effective conference posters that attract attention and communicate clearly from 2 meters away.

  ## Poster Specifications

  ### Standard Sizes
  - **A0 portrait**: 841 × 1189 mm (33.1 × 46.8 in)
  - **A0 landscape**: 1189 × 841 mm
  - **US letter portrait**: 36 × 48 in
  - Always check conference-specific requirements

  ### Typography Rules
  - **Title**: 72-120pt, bold, readable from 4+ meters
  - **Authors & affiliations**: 36-48pt
  - **Section headers**: 36-48pt, bold
  - **Body text**: 24-32pt (min 20pt)
  - **References/captions**: 18-20pt
  - Font: Arial, Helvetica, or similar sans-serif

  ## Layout Design

  ### Visual Flow (Z-pattern or Column-based)
  ```
  ┌─────────────────────────────────────────────────────┐
  │                    TITLE                            │
  │           Authors · Affiliations · Logos            │
  ├─────────────┬─────────────────┬─────────────────────┤
  │             │                 │                     │
  │  Background │    Method       │    Results          │
  │  & Motiv.   │    (main       │    (key figure      │
  │  (intro     │     diagram)    │     + table)        │
  │   funnel)   │                 │                     │
  │             │                 │                     │
  ├─────────────┼─────────────────┼─────────────────────┤
  │             │                 │                     │
  │  Related    │   Experiments   │  Conclusions        │
  │  Work       │   & Setup       │  & Future Work      │
  │  (3-5 refs) │                 │                     │
  │             │                 │                     │
  ├─────────────┴─────────────────┴─────────────────────┤
  │  References (5-10) │ QR Code │ Contact │ Acknowledg.│
  └─────────────────────────────────────────────────────┘
  ```

  ### Information Density
  - Max 800 words total
  - Max 8-10 figures/tables
  - 40% white space minimum
  - Lead with the most impressive result
  - One key message per column

  ## Content Guidelines

  ### Title
  - 8-12 words maximum
  - No abbreviations in title
  - Include the key contribution

  ### Abstract (Top-left or below title)
  - 100-150 words
  - Background (1 sentence) → Problem (1 sentence) → Method (2 sentences) → Results (2 sentences) → Impact (1 sentence)

  ### Figures
  - Reuse paper figures, but enlarge and simplify
  - Add annotations pointing to key features
  - Minimum font size: 18pt in figures
  - High contrast, colorblind-safe

  ### References
  - 5-10 most relevant papers
  - Use abbreviated format: Author et al. (Year)
  - Number in order of appearance

  ## Print & Digital

  ### Print Preparation
  - Export as PDF at 300 DPI
  - Use CMYK color mode
  - Include 3mm bleed on all sides
  - Test print at 25% scale first

  ### Digital Version
  - Interactive PDF with clickable links
  - Include QR code → paper/arXiv page
  - Optimize file size (<20MB)

  ## Language
  Respond in the user's language. If Chinese, respond in Chinese.
