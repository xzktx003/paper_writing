content: |
  # Research Paper Writing Pipeline

  End-to-end pipeline for producing publication-ready ML/AI research papers targeting NeurIPS, ICML, ICLR, ACL, AAAI, and COLM. This skill covers the full research lifecycle.

  This is NOT a linear pipeline — it is an iterative loop. Results trigger new experiments. Reviews trigger new analysis.

  ## Core Philosophy

  1. **Be proactive.** Deliver complete drafts, not questions.
  2. **Never hallucinate citations.** AI-generated citations have ~40% error rate. Always fetch programmatically.
  3. **Paper is a story, not a collection of experiments.** Every paper needs one clear contribution stated in a single sentence.
  4. **Experiments serve claims.** Every experiment must explicitly state which claim it supports.
  5. **Commit early, commit often.** Every completed experiment batch gets committed with descriptive messages.

  ## Phase 0: Project Setup

  ### Step 0.1: Explore the Repository
  - Look for README.md, results/, configs/, .bib files
  - Find existing findings and draft documents

  ### Step 0.2: Organize the Workspace
  ```
  workspace/
    paper/           # LaTeX source, figures, compiled PDFs
    experiments/     # Experiment runner scripts
    code/            # Core method implementation
    results/         # Raw experiment results
    tasks/           # Task/benchmark definitions
  ```

  ### Step 0.3: Set Up Version Control
  - Use git with descriptive commit messages
  - Commit after each experiment batch

  ### Step 0.4: Identify the Contribution
  Before writing anything, articulate:
  - **The What**: What is the single thing this paper contributes?
  - **The Why**: What evidence supports it?
  - **The So What**: Why should readers care?

  ### Step 0.5: Create a TODO List
  ```
  Research Paper TODO:
  - [ ] Define one-sentence contribution
  - [ ] Literature review
  - [ ] Design core experiments
  - [ ] Run experiments
  - [ ] Analyze results
  - [ ] Write first draft
  - [ ] Self-review
  - [ ] Revise
  - [ ] Submission prep
  ```

  ## Phase 1: Literature Review

  **Goal**: Find related work, identify baselines, gather citations.

  ### Step 1.1: Identify Seed Papers
  Start from papers already referenced in the codebase.

  ### Step 1.2: Search for Related Work
  Use web_search and web_extract for paper discovery. Try queries like:
  - "[main technique] + [application domain]"
  - "[baseline method] comparison"
  - "[problem name] state-of-the-art"

  ### Step 1.3: Verify Every Citation
  **NEVER generate BibTeX from memory. ALWAYS fetch programmatically.**

  Citation Verification (MANDATORY per citation):
  1. SEARCH → Query with specific keywords
  2. VERIFY → Confirm paper exists
  3. RETRIEVE → Get BibTeX via DOI
  4. VALIDATE → Confirm the claim you're citing
  5. ADD → Add to bibliography

  If any step fails → mark as [CITATION NEEDED].

  ### Step 1.4: Organize Related Work
  Group papers by methodology, not paper-by-paper.

  ## Phase 2: Experiment Design

  **Goal**: Design experiments that directly support paper claims.

  ### Step 2.1: Map Claims to Experiments
  Create an explicit mapping:
  | Claim | Experiment | Expected Evidence |
  |-------|-----------|-------------------|
  | "Our method outperforms baselines" | Main comparison | Win rate, significance |

  **Rule**: If an experiment doesn't map to a claim, don't run it.

  ### Step 2.2: Design Baselines
  - **Naive baseline**: Simplest possible approach
  - **Strong baseline**: Best known existing method
  - **Ablation baselines**: Your method minus one component
  - **Compute-matched baselines**: Same compute budget

  ### Step 2.3: Define Evaluation Protocol
  - **Metrics**: What you're measuring, direction symbols
  - **Aggregation**: How results are combined
  - **Statistical tests**: What establishes significance
  - **Sample sizes**: How many runs/tasks

  ## Phase 3: Experiment Execution & Monitoring

  ### Step 3.1: Launch Experiments
  Run systematically with proper logging.

  ### Step 3.2: Set Up Monitoring
  Track progress and detect failures early.

  ### Step 3.3: Handle Failures
  | Failure | Detection | Recovery |
  |---------|-----------|----------|
  | API rate limit | 402/429 errors | Wait, then re-run |
  | Process crash | PID gone | Re-run from checkpoint |
  | Timeout | No log progress | Kill and skip |

  ### Step 3.4: Commit Completed Results
  ```bash
  git add -A
  git commit -m "Add <experiment>: <key finding>"
  ```

  ## Phase 4: Result Analysis

  **Goal**: Extract findings, compute statistics, identify the story.

  ### Step 4.1: Aggregate Results
  Write analysis scripts that load result files and compute metrics.

  ### Step 4.2: Statistical Significance
  Always report error bars and statistical tests.

  ### Step 4.3: Identify the Story
  After analysis, explicitly answer:
  1. **What is the main finding?** One sentence.
  2. **What surprised you?**
  3. **What failed?**
  4. **What follow-up experiments are needed?**

  ### Step 4.4: Create Figures and Tables
  - **Figures**: Use vector graphics (PDF), colorblind-safe palettes
  - **Tables**: Use booktabs, bold best value, include direction symbols

  ### Step 4.5: Decide: More Experiments or Write?
  | Situation | Action |
  |-----------|--------|
  | Core claims supported | Move to Phase 5 |
  | Results inconclusive | Back to Phase 2 |
  | Missing ablation | Run it, then Phase 5 |

  ### Step 4.6: Write the Experiment Log
  Create `experiment_log.md` bridging results to prose.

  ## Phase 5: Paper Drafting

  **Goal**: Write a complete, publication-ready paper.

  ### Time Allocation
  Spend approximately **equal time** on:
  1. The abstract
  2. The introduction
  3. The figures
  4. Everything else combined

  ### Writing Workflow
  1. Define the one-sentence contribution
  2. Draft Figure 1 (core idea or most compelling result)
  3. Draft abstract (5-sentence formula)
  4. Draft introduction (1-1.5 pages max)
  5. Draft methods
  6. Draft experiments & results
  7. Draft related work
  8. Draft conclusion
  9. Draft limitations (REQUIRED)
  10. Plan appendix

  ### The Narrative Principle
  Your paper is NOT a collection of experiments — it's a story with one clear contribution supported by evidence.

  **Three Pillars:**
  | Pillar | Description |
  |--------|-------------|
  | **The What** | 1-3 specific novel claims |
  | **The Why** | Rigorous empirical evidence |
  | **The So What** | Why readers should care |

  ### Step 5.1: Abstract (5-Sentence Formula)
  1. What you achieved: "We introduce..."
  2. Why this is hard and important
  3. How you do it (with specialist keywords)
  4. What evidence you have
  5. Your most remarkable number/result

  ### Step 5.3: Introduction (1-1.5 pages max)
  Must include:
  - Clear problem statement
  - Brief approach overview
  - 2-4 bullet contribution list
  - Methods should start by page 2-3

  ### Step 5.4: Methods
  Enable reimplementation:
  - Conceptual outline or pseudocode
  - All hyperparameters listed
  - Architectural details sufficient for reproduction

  ### Step 5.5: Experiments & Results
  For each experiment, explicitly state:
  - **What claim it supports**
  - What to observe

  ### Step 5.7: Limitations (REQUIRED)
  All major conferences require this. Honesty helps.

  ### Writing Style (Gopen & Swan's 7 Principles)
  | Principle | Rule |
  |-----------|------|
  | Subject-verb proximity | Keep subject and verb close |
  | Stress position | Place emphasis at sentence ends |
  | Topic position | Put context first, new info after |
  | One unit, one function | Each paragraph makes one point |
  | Action in verb | Use verbs, not nominalizations |

  ### Word Choice (Lipton, Steinhardt)
  - Be specific: "accuracy" not "performance"
  - Eliminate hedging: drop "may" unless genuinely uncertain
  - Consistent terminology throughout

  ## Phase 6: Self-Review & Revision

  **Goal**: Simulate the review process before submission.

  ### Step 6.1: Self-Review
  Act as a reviewer and evaluate:
  1. Quality (technical soundness)
  2. Clarity (could an expert reproduce it?)
  3. Significance (does this matter?)
  4. Originality (new insights?)

  ### Step 6.2: Prioritize Feedback
  | Priority | Action |
  |----------|--------|
  | **Critical** | Must fix, may need new experiments |
  | **High** | Should fix in this revision |
  | **Medium** | Fix if time allows |
  | **Low** | Note for future work |

  ### Step 6.4: Rebuttal Writing
  Format: Point-by-point. Address every concern. Lead with strongest responses.

  ## Phase 7: Submission Preparation

  ### Step 7.1: Conference Checklist
  Complete venue-specific checklists carefully.

  ### Step 7.2: Anonymization Checklist
  - No author names or affiliations
  - No acknowledgments section
  - Self-citations in third person
  - No GitHub URLs pointing to personal repos

  ### Step 7.3: Formatting Verification
  - Page limit respected
  - All figures are vector (PDF)
  - All tables use booktabs
  - References compile correctly

  ### Step 7.5: Final Compilation
  ```bash
  rm -f *.aux *.bbl *.blg *.log *.out *.pdf
  latexmk -pdf main.tex
  ```

  ### Step 7.6: Conference-Specific Requirements
  | Venue | Special Requirements |
  |-------|---------------------|
  | NeurIPS | Paper checklist in appendix |
  | ICML | Broader Impact Statement |
  | ICLR | LLM disclosure required |
  | ACL | Mandatory Limitations section |

  ### Step 7.9: arXiv Strategy
  - v1: Initial submission
  - v2: Post-acceptance with corrections

  ### Step 7.10: Research Code Packaging
  - README with setup and reproduction instructions
  - requirements.txt or environment.yml
  - LICENSE file (MIT or Apache 2.0)
  - One script per main result

  ## Reviewer Evaluation Criteria

  | Criterion | What They Check |
  |-----------|----------------|
  | **Quality** | Technical soundness, well-supported claims |
  | **Clarity** | Clear writing, reproducible by experts |
  | **Significance** | Community impact |
  | **Originality** | New insights |

  **NeurIPS 6-point scale:**
  - 6: Strong Accept — groundbreaking, flawless
  - 5: Accept — technically solid, high impact
  - 4: Borderline Accept — solid, limited evaluation
  - 3: Borderline Reject — weaknesses outweigh
  - 2: Reject — technical flaws
  - 1: Strong Reject — known results or ethics issues