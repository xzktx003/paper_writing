  # 赠款提案撰写者

  通过吸引人的提案确保资金。

  ## 赠款格局

  ### 资助者类型

  | 类型 | 例子 | 特点 |
  |------|----------|-----------------|
  | 联邦 | NSF、NIH、NEA、NEH | 大额奖项、严格流程、公共利益 |
  | 基金会 | 福特、梅隆、麦克阿瑟 | 使命对齐、基于关系 |
  | 企业 | 谷歌、Adobe、微软 | 产品/品牌对齐、较短时间线 |
  | 机构 | 内部赠款、种子基金 | 较低金额、较快决策 |
  | 众筹 | Kickstarter、Experiment | 面向公众、基于势头 |

  ### 契合度评估

  写作前评估对齐：

  | 因素 | 问题 | 权重 |
  |--------|----------|--------|
  | 使命 | 您的工作是否服务于他们的目标？ | 关键 |
  | 范围 | 您的预算是否在其范围内？ | 关键 |
  | 资格 | 您是否满足要求？ | 关键 |
  | 过往记录 | 他们是否资助过类似工作？ | 重要 |
  | 时机 | 您的时间线是否匹配？ | 重要 |
  | 竞争 | 资助率是多少？ | 考虑 |

  ---

  ## 提案结构（标准）

  ### 1. 项目摘要/摘要

  ```
  最多一页。必须独立成立。

  结构：
  - 问题/机会（2-3句）
  - 提议方法（2-3句）
  - 预期成果（2-3句）
  - 更广泛影响（1-2句）
  ```

  ### 2. 需求陈述

  确立问题：

  ```
  问题是什么？
  ↓
  谁受影响？
  ↓
  当前方法是什么？
  ↓
  剩余差距是什么？
  ↓
  为什么现在？
  ```

  **有效模式**：
  - 人性化规模的统计数据
  - 说明的具体例子
  - 验证的专家声音
  - 引人注目的逻辑论证

  ### 3. 目标和具体目标

  | 元素 | 定义 | 例子 |
  |---------|------------|---------|
  | **目标** | 广泛的预期影响 | “提高老年人的数字素养” |
  | **具体目标** | 具体、可衡量的成果 | “到2025年12月培训200名老年人掌握基本计算机技能” |
  | **活动** | 您将做什么 | “在社区中心举办20次研讨会” |

  **SMART具体目标**：
  - **S**pecific：清晰明确
  - **M**easurable：可量化
  - **A**chievable：现实可行
  - **R**elevant：与目标对齐
  - **T**ime-bound：有截止日期

  ### 4. 方法/途径

  描述如何实现具体目标：

  ```
  针对每个具体目标：
  1. 计划活动
  2. 时间线/顺序
  3. 负责人
  4. 所需资源
  5. 方法的理由
  ```

  **方法可信度**：
  - 引用先例或文献
  - 解释为什么选择此方法
  - 应对潜在挑战
  - 展示对替代方案的意识

  ### 5. 评估计划

  | 类型 | 问题 | 方法 |
  |------|----------|---------|
  | **过程** | 我们是否按计划执行？ | 活动日志、出席记录 |
  | **成果** | 是否有效？ | 前/后测试、调查 |
  | **影响** | 发生了什么变化？ | 长期跟进、指标 |

  **评估组成部分**：
  - 将测量什么
  - 如何收集数据
  - 何时进行测量
  - 谁将分析
  - 如何利用结果

  ### 6. 时间线

  ```
  第1年
  Q1：[活动]
  Q2：[活动]
  Q3：[活动]
  Q4：[活动]

  第2年
  Q1：[活动]
  ...

  里程碑：
  - 第6个月：[里程碑]
  - 第12个月：[里程碑]
  - 第18个月：[里程碑]
  ```

  ### 7. 预算和论证

  参见预算部分。

  ### 8. 人员/资格

  针对每个关键人员：
  ```
  [姓名]，[头衔]
  角色：[具体职责]
  资格：[为什么适合]
  时间投入：[% FTE或小时数]
  ```

  ### 9. 组织能力

  展示执行能力：
  - 相关过往项目
  - 基础设施/设施
  - 合作伙伴关系
  - 财务稳定性

  ### 10. 可持续性/未来计划

  ```
  资金结束后工作如何继续？
  - 收入来源
  - 制度化
  - 合作伙伴关系
  - 扩展方法
  ```

  ---

  ## 预算制定

  ### 预算类别

  | 类别 | 包括 |
  |----------|----------|
  | **人员** | 工资、福利、顾问费 |
  | **设备** | 通常 >$5K的物品 |
  | **物资** | 消耗品、材料 |
  | **差旅** | 会议、实地考察 |
  | **合同** | 分包、服务 |
  | **其他直接成本** | 参与者支持、出版物 |
  | **间接成本** | 间接费用（因机构而异） |

  ### 预算模板

  ```
  人员
  PI姓名，2个月夏季工资         $XX,XXX
  研究生，12个月             $XX,XXX
  附加福利（XX%）                   $X,XXX
                             小计：   $XX,XXX

  设备
  [物品描述]                      $X,XXX
                             小计：   $X,XXX

  物资
  研究物资                       $X,XXX
  计算费用                               $X,XXX
                             小计：   $X,XXX

  差旅
  国内（X次旅行）                      $X,XXX
  国际（X次旅行）                 $X,XXX
                             小计：   $X,XXX

  其他直接成本
  参与者津贴                    $X,XXX
  出版成本                       $X,XXX
                             小计：   $X,XXX

  总直接成本                      $XXX,XXX
  间接成本（XX%）                    $XX,XXX
  总项目成本                     $XXX,XXX
  ```

  ### 预算论证

  针对每个项目：
  ```
  [项目]：$X,XXX
  [为什么需要]：此[项目]对于[具体项目活动]是必要的，因为[理由]。金额基于[计算/报价/费率]。
  ```

  ---

  ## 写作策略

  ### 针对评审人

  记住：
  - 评审人很忙
  - 他们可能不是您领域的专家
  - 他们在寻找资助和拒绝的理由
  - 清晰写作表示清晰思维

  ### 结构信号

  使用标题、空白、加粗：
  ```
  **问题**：清晰陈述问题。

  **方法**：我们如何解决它。

  **成果**：将产生什么。
  ```

  ### 强与弱的写作

  | 弱 | 强 |
  |------|--------|
  | “我们希望...” | “我们将...” |
  | “这可能导致...” | “这将产生...” |
  | “人们相信...” | “研究表明...” |
  | “各种方法...” | “三种具体方法：A、B、C...” |
  | “显著影响...” | “减少40%的...” |

  ### “那又如何”测试

  每个主张都应回答：
  - 为什么这很重要？
  - 对谁很重要？
  - 如果成功，什么会改变？

  ---

  ## 评审标准（典型）

  ### NSF优点评审

  1. **智力优点**
     - 提议活动的重要性
     - 合格团队
     - 健全的方法论
     - 充足资源
     
  2. **更广泛影响**
     - 对社会的好处
     - STEM劳动力发展
     - 拓宽参与
     - 公众参与

  ### NEH标准

  1. **重要性**：项目的重要性
  2. **质量**：设计的健全性
  3. **影响**：潜在效果
  4. **可行性**：完成的可能性

  ### 基金会标准（各异）

  共同主题：
  - 使命对齐
  - 潜在影响
  - 组织能力
  - 可持续性
  - 创新性

  ---

  ## 特定赠款类型

  ### 研究赠款

  关键元素：
  - 显示差距的文献综述
  - 研究问题/假设
  - 严谨的方法论
  - 如有初步数据
  - 传播计划

  ### 创意/艺术赠款

  关键元素：
  - 艺术陈述/愿景
  - 作品样本（关键）
  - 项目描述
  - 社区影响
  - 艺术家传记

  ### 奖学金申请

  关键元素：
  - 个人陈述
  - 研究/项目提案
  - 推荐信
  - 简历
  - 写作样本（常见）

  ---

  ## 常见错误

  | 错误 | 修复方法 |
  |---------|-----|
  | 不遵循指南 | 阅读指南3次以上 |
  | 模糊的具体目标 | 使用SMART |
  | 与资助者不对齐 | 彻底研究 |
  | 预算与叙述不匹配 | 交叉检查 |
  | 缺少必需元素 | 使用检查表 |
  | 术语过多 | 定义术语、简化 |
  | 无初步工作 | 展示可行性 |
  | 弱评估 | 具体且现实 |
  | 最后一分钟提交 | 预留缓冲时间 |

  ---

  ## 写作时间线

  ### 8周时间线

  | 周 | 活动 |
  |------|------------|
  | 1 | 阅读指南、评估契合度、大纲 |
  | 2 | 起草需求陈述、目标 |
  | 3 | 起草方法、时间线 |
  | 4 | 起草评估、可持续性 |
  | 5 | 制定预算和论证 |
  | 6 | 完成第一稿 |
  | 7 | 内部评审、修订 |
  | 8 | 最终润色、提前提交 |

