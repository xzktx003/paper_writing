  # 学术写作与研究方法论

  系统化的学术写作、研究设计和学术交流方法。

  ## 研究设计基础

  ### 研究问题开发

  ```markdown
  ## 制定研究问题

  ### FINER标准
  - **可行性**: 你能否实际进行这项研究？
  - **兴趣性**: 它对领域重要吗？
  - **新颖性**: 它是否增加新知识？
  - **伦理性**: 能否以伦理方式进行？
  - **相关性**: 它是否解决实际问题？

  ### 问题类型
  | 类型 | 目的 | 示例 |
  |------|---------|---------|
  | 描述性 | 记录现象 | "X的特征是什么？" |
  | 比较性 | 比较组别/条件 | "X在组间如何不同？" |
  | 相关性 | 检查关系 | "X和Y之间有关系吗？" |
  | 因果性 | 建立因果关系 | "X是否导致Y？" |
  | 探索性 | 生成假设 | "什么因素可能解释X？" |

  ### 精炼问题
  从宽泛开始 → 逐步缩小

  草案1: "社交媒体如何影响政治？"
  草案2: "Twitter使用如何影响政治极化？"
  草案3: "接触党派Twitter账户如何影响美国成年人的政治态度极化？"
  草案4: "增加接触意识形态同质的Twitter信息流是否增加政治活跃的美国18-35岁成年人的情感极化？"
  ```

  ### 文献综述策略

  ```markdown
  ## 系统文献搜索

  ### 按领域选择数据库
  - **多学科**: Web of Science, Scopus, Google Scholar
  - **社会科学**: JSTOR, ProQuest, SSRN
  - **传播学**: Communication Abstracts, ComAbstracts
  - **健康**: PubMed, MEDLINE, CINAHL
  - **教育**: ERIC
  - **商业**: Business Source Complete

  ### 搜索策略模板
  1. **识别关键概念**从研究问题
  2. **生成同义词**每个概念
  3. **使用布尔运算符组合**

  示例: "社交媒体政治极化"

  概念1: 社交媒体
  - 或: Twitter, Facebook, Instagram, "社交网站", "在线平台", "数字媒体"

  概念2: 政治
  - 或: 党派, 意识形态, 选举, 公民

  概念3: 极化
  - 或: 分裂, 极端主义, "态度改变", 激进化

  组合搜索:
  (Twitter OR Facebook OR "社交媒体" OR "社交网络")
  AND (政治 OR 党派 OR 意识形态)
  AND (极化 OR 分裂 OR 极端主义)

  ### 纳入/排除标准
  记录标准:
  - 出版日期范围: [X至今]
  - 语言: [仅英语/多种]
  - 出版类型: [仅同行评审/包括预印本]
  - 地理范围: [全球/特定国家]
  - 方法论: [所有/特定方法]

  ### 管理搜索
  - 保存搜索以便重新运行
  - 导出结果到参考文献管理器
  - 跟踪每个阶段的结果数量
  - 记录每次搜索日期
  ```

  ### 引用管理

  ```python
  # Zotero/参考文献管理器集成模式

  # 自动引用工作流
  引用风格 = {
      'apa7': '美国心理学会第7版',
      'mla9': '现代语言协会第9版',
      'chicago': '芝加哥手册第17版',
      'harvard': '哈佛引用格式',
      'ieee': 'IEEE',
      'vancouver': '温哥华格式（医学）',
  }

  # BibTeX条目模板
  BIBTEX文章 = """
  @article{{{引用键}},
      author = {{{作者}}},
      title = {{{标题}}},
      journal = {{{期刊}}},
      year = {{{年份}}},
      volume = {{{卷}}},
      number = {{{期}}},
      pages = {{{页码}}},
      doi = {{{doi}}}
  }}
  """

  # 常见引用模式按上下文
  引用上下文 = {
      '引入概念': "根据作者（年份），...",
      '支持主张': "研究表明X（作者，年份；作者，年份）。",
      '对比': "虽然作者（年份）主张X，作者（年份）主张Y。",
      '方法论参考': "遵循作者（年份）开发的方法，...",
      '直接引用': '作者（年份）指出“确切引用”（页X）。',
  }
  ```

  ## 论文结构与写作

  ### IMRaD结构（科学论文）

  ```markdown
  ## 标准研究论文部分

  ### 摘要（通常150-300字）
  - 背景（1-2句）
  - 目的/目标（1句）
  - 方法（2-3句）
  - 结果（2-3句）
  - 结论（1-2句）

  ### 引言
  **漏斗结构:**
  1. 广泛背景 - 主题为何重要？
  2. 狭窄焦点 - 具体问题是什么？
  3. 缺口识别 - 我们不知道什么？
  4. 研究问题/假设 - 你将调查什么？
  5. 贡献预览 - 研究为何重要？

  ### 文献综述
  **按主题组织，非按时间:**
  1. 主题1: 关键发现、辩论、缺口
  2. 主题2: 关键发现、辩论、缺口
  3. 主题3: 关键发现、辩论、缺口
  4. 综合: 主题如何连接你的研究

  ### 方法
  **可重复性测试:** 其他研究人员能仅从本节复制你的研究吗？

  包括:
  - 参与者/样本（谁、如何选择、数量）
  - 材料/测量（什么工具、其有效性）
  - 程序（逐步发生了什么）
  - 分析方法（统计测试、定性方法）
  - 伦理考虑（IRB、同意）

  ### 结果
  **报告，非解释:**
  - 系统呈现发现
  - 使用表格/图形处理复杂数据
  - 报告效应大小，非仅p值
  - 解决每个研究问题/假设

  ### 讨论
  **反向漏斗结构:**
  1. 关键发现总结
  2. 在文献背景下的解释
  3. 理论意义
  4. 实际意义
  5. 局限性
  6. 未来研究方向
  7. 结论
  ```

  ### 学术写作风格

  ```markdown
  ## 写作惯例

  ### 语态和时态
  | 部分 | 时态 | 示例 |
  |---------|-------|---------|
  | 摘要 | 过去（方法/结果）、现在（结论） | "我们发现... 这表明..." |
  | 引言 | 现在（已建立知识） | "研究表明..." |
  | 方法 | 过去 | "参与者完成..." |
  | 结果 | 过去 | "分析揭示..." |
  | 讨论 | 现在 + 过去 | "这些发现表明... 我们发现..." |

  ### 谨慎语言
  适当谨慎（避免过度主张）:
  - "这表明..."（非"这证明..."）
  - "可能与...相关"（非"导致"）
  - "结果指示..."（非"结果明确展示..."）
  - "一种可能的解释..."（非"解释..."）

  ### 过渡词按功能
  **添加:** 此外，而且，另外，除此之外
  **对比:** 然而，尽管如此，相反地，相比之下
  **因果:** 因此，结果，因此，于是
  **示例:** 例如，具体来说，为了说明
  **顺序:** 首先，随后，最后，同时
  **总结:** 总结，总体而言，总之

  ### 段落
  每个段落应:
  1. 以主题句开始
  2. 包含一个主要想法
  3. 包括支持证据
  4. 连接相邻段落
  5. 平均100-200字（按领域变化）
  ```

  ### 常见写作问题

  ```markdown
  ## 避免的问题

  ### 冗长
  ❌ "重要的是要注意结果展示..."
  ✅ "结果展示..."

  ❌ "为了调查..."
  ✅ "调查..."

  ❌ "总共50名参与者..."
  ✅ "50名参与者..."

  ### 弱动词
  ❌ "研究由研究人员进行"
  ✅ "研究人员进行研究"

  ❌ "发现了一个显著差异"
  ✅ "我们发现一个显著差异"

  ### 模糊语言
  ❌ "几项研究表明..."
  ✅ "三项研究（作者，年份；作者，年份；作者，年份）显示..."

  ❌ "结果显著"
  ✅ "结果统计显著（p < .05, d = 0.45）"

  ### 不必要术语
  - 首次使用定义技术术语
  - 在同样精确时使用更简单词
  - 考虑受众专业水平

  ### 引用问题
  ❌ 引用次级来源而未标注
  ✅ "（作者，年份，转引自作者，年份）"

  ❌ 成串引用而无综合
  ✅ 分组做相同点的引用；区分不同点的
  ```

  ## 同行评审与修订

  ### 回应审稿人

  ```markdown
  ## 回应信模板

  亲爱的编辑和审稿人,

  感谢您对我们题为"[标题]"的手稿（手稿ID: [编号]）的深思熟虑反馈。我们已仔细考虑所有评论并相应修订手稿。以下，我们提供对每条评论的点对点回应。

  ---

  ## 审稿人1

  ### 评论1.1
  [引用或转述审稿人评论]

  **回应:**
  [解释你所做的]

  **做出的更改:**
  [引用具体更改带页/行号]
  "新文本这里..."（页X，行XX-XX）

  ### 评论1.2
  [继续每条评论]

  ---

  ## 审稿人2
  [相同格式]

  ---

  我们相信这些修订已大幅加强手稿，并希望您发现其适合在[期刊名称]发表。

  诚挚地,
  [作者]
  ```

  ### 处理批评

  ```markdown
  ## 审稿人反馈类型

  ### 必须解决
  - 方法论担忧
  - 缺少文献
  - 不清楚写作
  - 逻辑漏洞
  - 统计错误

  ### 谨慎协商
  - 请求额外分析
  - 建议重组
  - 解释分歧

  ### 适当反驳
  - 范围外请求
  - 误解你的论点
  - 审稿人矛盾建议

  ### 回应策略
  **同意:** "我们感谢审稿人的建议。我们已[行动]。"
  **部分同意:** "我们欣赏这一点。虽然[承认有效性]，我们[解释你的方法]。然而，我们已[部分容纳]。"
  **尊重不同意:** "我们感谢审稿人提出此问题。我们已仔细考虑；然而，[解释]。我们希望审稿人认为此推理有说服力。"
  ```

  ## 资助提案

  ### 提案结构（NSF/NIH风格）

  ```markdown
  ## 标准资助组件

  ### 具体目标（1页）
  **开场段落:** 问题是什么？为何重要？
  **缺口陈述:** 当前理解缺少什么？
  **长期目标:** 你的研究计划愿景
  **目标:** 这个特定项目将完成什么
  **中心假设:** 你的可测试预测
  **目标:** 2-4个具体、可实现目标
  **影响陈述:** 为何资助重要

  ### 重要性（2-3页）
  - 问题重要性
  - 当前知识缺口
  - 你的工作如何推进领域
  - 成功潜在影响

  ### 创新性（1页）
  - 你的方法新在哪里？
  - 概念创新
  - 方法论创新
  - 技术创新

  ### 方法（6-12页）
  对每个目标:
  - 理由
  - 初步数据（如果有）
  - 研究设计
  - 方法
  - 预期结果
  - 潜在问题和替代方案
  - 时间线

  ### 广泛影响
  - 培训机会
  - 传播计划
  - 社会利益
  - 多样性和包容性
  ```

  ### 预算理由

  ```markdown
  ## 预算类别

  ### 人员
  - PI工资和努力（%时间）
  - 共同调查员
  - 博士后（工资 + 福利）
  - 研究生（津贴 + 学费 + 福利）
  - 本科生研究员
  - 技术员工

  ### 设备
  - 超过$5,000项目（检查赞助商阈值）
  - 证明项目必要性

  ### 供应品
  - 实验室消耗品
  - 软件许可证
  - 参与者付款

  ### 旅行
  - 会议演示
  - 数据收集地点
  - 合作者访问

  ### 其他直接成本
  - 出版成本
  - 参与者激励
  - 转录服务
  - 设备维护

  ### 间接成本（F&A）
  - 与机构协商费率
  - 通常直接成本50-60%
  ```

  ## 出版策略

  ### 期刊选择

  ```markdown
  ## 评估期刊

  ### 质量指标
  - 影响因子（谨慎使用）
  - 接受率
  - 评审时间
  - 出版时间
  - 领域声誉
  - 索引（Web of Science, Scopus）

  ### 适合指标
  - 范围对齐
  - 受众匹配
  - 开放获取选项
  - 文章类型（实证、理论、综述）

  ### 红旗（掠夺性期刊）
  - 积极邮件招揽
  - 快速"同行评审"（天）
  - 不清楚编辑委员会
  - 未在主要数据库索引
  - "付费发表"无明确OA模型
  - 网站质量差

  ### 资源
  - Beall's List（存档版本）
  - Think. Check. Submit.（thinkchecksubmit.org）
  - DOAJ（开放获取期刊目录）
  - Journal Citation Reports
  ```

