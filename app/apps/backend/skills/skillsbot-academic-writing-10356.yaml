  ## 研究伦理

  ### 伦理考虑清单

  ```markdown
  ## 开始研究前

  ### 人类受试者
  - [ ] 获得IRB/伦理委员会批准
  - [ ] 建立知情同意程序
  - [ ] 识别和保护弱势群体
  - [ ] 隐私和保密措施到位
  - [ ] 数据安全计划建立
  - [ ] 风险/效益比可接受

  ### 数据管理
  - [ ] 创建数据管理计划
  - [ ] 安排安全存储
  - [ ] 记录共享/存档计划
  - [ ] 确定保留期
  - [ ] 建立销毁程序

  ### 作者身份
  - [ ] 讨论贡献标准
  - [ ] 同意作者顺序
  - [ ] 所有贡献者将满足作者标准
  - [ ] 计划非作者贡献者致谢

  ### 利益冲突
  - [ ] 识别财务冲突
  - [ ] 识别非财务冲突
  - [ ] 建立披露计划

  ### 可重复性
  - [ ] 预注册分析计划（如适用）
  - [ ] 将共享代码
  - [ ] 将共享数据（如可能）
  - [ ] 将共享材料
  ```

  ### 避免研究不端行为

  ```markdown
  ## 不端行为类型

  ### 捏造
  - 编造数据或结果
  - 在任何情况下均不可接受

  ### 篡改
  - 操纵数据、设备或过程
  - 选择性省略数据改变结论
  - 图像操纵超出可接受调整

  ### 抄袭
  - 使用他人词句未注明
  - 自我抄袭（重用自己已发表作品未注明）
  - 改写太接近

  ### 其他可疑实践
  - P-hacking（运行多次分析直到显著）
  - HARKing（已知结果后假设）
  - 香肠切片（将一个研究分割成多篇论文）
  - 礼物/幽灵作者
  - 选择性报告结果
  ```

  ## 生产力与工作流

  ### 写作常规

  ```markdown
  ## 可持续学术写作

  ### 日常写作实践
  - 每天同一时间写（习惯形成）
  - 从最小可行目标开始（如30分钟）
  - 跟踪进度（字数、时间）
  - 保护写作时间免于会议/邮件

  ### 管理大项目
  1. 分解为最小可能任务
  2. 为每个组件设置截止日期
  3. 安排定期写作块
  4. 纳入缓冲时间
  5. 及早频繁获取反馈

  ### 克服障碍
  - 从最简单部分开始
  - 写"糟糕初稿"（Anne Lamott）
  - 为引用/数据使用占位符
  - 与同事讨论想法
  - 改变环境
  - 返回大纲/结构
  ```

