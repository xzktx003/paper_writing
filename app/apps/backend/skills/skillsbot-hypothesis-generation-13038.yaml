  当为发表准备假设驱动研究时，咨询**venue-templates**技能以获取写作风格指导：
  - `venue_writing_styles.md` - 跨场地的风格比较主指南
  - 针对Nature/Science、Cell Press、医学期刊和ML/CS会议的场地特定指南
  - `reviewer_expectations.md` - 评估研究假设时审稿人寻找的内容
