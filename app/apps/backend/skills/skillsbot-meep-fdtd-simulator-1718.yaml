  # MEEP FDTD 仿真器

  ## 目的

  提供关于MEEP FDTD仿真在光子器件方面的专家指导，包括几何定义、源配置和场提取。

  ## 能力

  - 使用材料库定义几何结构
  - 源配置（偶极子、高斯、平面波）
  - 吸收边界条件（PML）
  - 通量和场提取
  - 参数扫描和优化
  - 并行域分解

  ## 使用指南

  1. **几何结构**：使用适当的材料定义器件几何结构
  2. **源**：配置适当的源类型
  3. **边界**：设置PML吸收边界
  4. **监视器**：放置通量监视器和场探头
  5. **并行化**：对大型仿真使用域分解

  ## 工具/库

  - MEEP
  - MPB
  - h5py
