  ## 核心能力

  ### 1. LaTeX 海报包

  支持三个主要的LaTeX海报包，每个都有独特优势。详细比较和包特定指导，请参考`references/latex_poster_packages.md`。

  **beamerposter：**
  - Beamer演示类的扩展
  - 对Beamer用户熟悉的语法
  - 出色的主题支持和定制
  - 最适合：传统学术海报、机构品牌

  **tikzposter：**
  - 现代、灵活的设计，集成TikZ
  - 内置颜色主题和布局模板
  - 通过TikZ命令广泛定制
  - 最适合：彩色现代设计、自定义图形

  **baposter：**
  - 基于盒子的布局系统
  - 自动间距和定位
  - 专业外观的默认样式
  - 最适合：多列布局、一致间距

  ### 2. 海报布局和结构

  创建遵循视觉传播原则的有效海报布局。综合布局指导，请参考`references/poster_layout_design.md`。

  **常见海报部分：**
  - **头部/标题：** 标题、作者、隶属机构、徽标
  - **引言/背景：** 研究背景和动机
  - **方法/方法：** 方法论和实验设计
  - **结果：** 关键发现与图形和数据可视化
  - **结论：** 主要收获和影响
  - **参考文献：** 关键引用（通常缩写）
  - **致谢：** 资金、合作者、机构

  **布局策略：**
  - **基于列的布局：** 2列、3列或4列网格
  - **基于块的布局：** 内容块的灵活排列
  - **Z型流程：** 逻辑引导读者浏览内容
  - **视觉层次：** 使用大小、颜色和间距强调关键点

  ### 3. 研究海报设计原则

  应用基于证据的设计原则以实现最大影响。详细设计指导，请参考`references/poster_design_principles.md`。

  **排版：**
  - 标题：72-120点以确保远距离可见性
  - 部分标题：48-72点
  - 正文文本：最小24-36点以确保4-6英尺距离的可读性
  - 使用无衬线字体（Arial、Helvetica、Calibri）以提高清晰度
  - 最多限制在2-3个字体家族

  **颜色和对比度：**
  - 使用高对比度颜色方案以提高可读性
  - 机构颜色调色板用于品牌
  - 色盲友好调色板（避免红绿组合）
  - 留白是活动空间——不要过于拥挤

  **视觉元素：**
  - 高分辨率图形（打印最小300 DPI）
  - 所有图形上清晰的大标签
  - 整个海报一致的图形样式
  - 战略使用图标和图形
  - 平衡文本与视觉内容（推荐40-50%视觉内容）

  **内容指南：**
  - **少即是多：** 推荐总共300-800字
  - 使用要点而非段落以提高可扫描性
  - 清晰、简洁的消息传递
  - 自解释图形，最少文本说明
  - 用于补充材料或在线资源的QR码

  ### 4. 标准海报尺寸

  支持国际和会议特定海报尺寸：

  **国际标准：**
  - A0（841 × 1189 毫米 / 33.1 × 46.8 英寸） - 最常见的欧洲标准
  - A1（594 × 841 毫米 / 23.4 × 33.1 英寸） - 较小格式
  - A2（420 × 594 毫米 / 16.5 × 23.4 英寸） - 紧凑海报

  **北美标准：**
  - 36 × 48 英寸（914 × 1219 毫米） - 常见美国会议尺寸
  - 42 × 56 英寸（1067 × 1422 毫米） - 大格式
  - 48 × 72 英寸（1219 × 1829 毫米） - 超大

  **方向：**
  - 纵向（垂直） - 最常见、传统
  - 横向（水平） - 更适合宽内容、时间线

  ### 5. 包特定模板

  为每个主要包提供即用模板。模板可在`assets/`目录中获得。

  **beamerposter 模板：**
  - `beamerposter_classic.tex` - 传统学术风格
  - `beamerposter_modern.tex` - 干净、极简设计
  - `beamerposter_colorful.tex` - 带有块的鲜艳主题

  **tikzposter 模板：**
  - `tikzposter_default.tex` - 标准tikzposter布局
  - `tikzposter_rays.tex` - 带有射线主题的现代设计
  - `tikzposter_wave.tex` - 专业波浪风格主题

  **baposter 模板：**
  - `baposter_portrait.tex` - 经典纵向布局
  - `baposter_landscape.tex` - 横向多列
  - `baposter_minimal.tex` - 极简主义设计

  ### 6. 图形和图像集成

  优化海报演示的视觉内容：

  **最佳实践：**
  - 尽可能使用矢量图形（PDF、SVG）以实现可扩展性
  - 栅格图像：最终打印尺寸下最小300 DPI
  - 一致的图像样式（边框、标题、大小）
  - 将相关图形分组
  - 用于比较的子图形

  **LaTeX 图形命令：**
  ```latex
  % 包含图形包
  \usepackage{graphicx}

  % 简单图形
  \includegraphics[width=0.8\linewidth]{figure.pdf}

  % 在tikzposter中带有标题的图形
  \block{结果}{
    \begin{tikzfigure}
      \includegraphics[width=0.9\linewidth]{results.png}
    \end{tikzfigure}
  }

  % 多个子图形
  \usepackage{subcaption}
  \begin{figure}
    \begin{subfigure}{0.48\linewidth}
      \includegraphics[width=\linewidth]{fig1.pdf}
      \caption{条件A}
    \end{subfigure}
    \begin{subfigure}{0.48\linewidth}
      \includegraphics[width=\linewidth]{fig2.pdf}
      \caption{条件B}
    \end{subfigure}
  \end{figure}
  ```

  ### 7. 颜色方案和主题

  为各种上下文提供专业颜色调色板：

  **学术机构颜色：**
  - 匹配大学或部门品牌
  - 使用官方颜色代码（RGB、CMYK或LaTeX颜色定义）

  **科学颜色调色板（色盲友好）：**
  - Viridis：从紫色到黄色的专业渐变
  - ColorBrewer：用于数据可视化的研究测试调色板
  - IBM 色盲安全：可访问的企业调色板

  **包特定主题选择：**

  **beamerposter：**
  ```latex
  \usetheme{Berlin}
  \usecolortheme{beaver}
  ```

  **tikzposter：**
  ```latex
  \usetheme{Rays}
  \usecolorstyle{Denmark}
  ```

  **baposter：**
  ```latex
  \begin{poster}{
    background=plain,
    bgColorOne=white,
    headerColorOne=blue!70,
    textborder=rounded
  }
  ```

  ### 8. 排版和文本格式化

  确保可读性和视觉吸引力：

  **字体选择：**
  ```latex
  % 推荐用于海报的无衬线字体
  \usepackage{helvet}      % Helvetica
  \usepackage{avant}       % Avant Garde
  \usepackage{sfmath}      % 无衬线数学字体

  % 设置默认字体为无衬线
  \renewcommand{\familydefault}{\sfdefault}
  ```

  **文本大小调整：**
  ```latex
  % 调整文本大小以确保可见性
  \setbeamerfont{title}{size=\VeryHuge}
  \setbeamerfont{author}{size=\Large}
  \setbeamerfont{institute}{size=\normalsize}
  ```

  **强调和突出显示：**
  - 对关键术语使用粗体：`\textbf{重要}`
  - 有节制地使用颜色高亮：`\textcolor{blue}{高亮}`
  - 关键信息的方框
  - 避免斜体（从远处更难阅读）

  ### 9. QR码和交互元素

  增强现代会议的互动性：

  **QR码集成：**
  ```latex
  \usepackage{qrcode}

  % 链接到论文、代码仓库或补充材料
  \qrcode[height=2cm]{https://github.com/username/project}

  % 带有标题的QR码
  \begin{center}
    \qrcode[height=3cm]{https://doi.org/10.1234/paper}\\
    \small 扫描获取全文
  \end{center}
  ```

  **数字增强：**
  - 链接到代码的GitHub仓库
  - 链接到视频演示或演示
  - 链接到交互式Web可视化
  - 链接到补充数据或附录

  ### 10. 编译和输出

  生成高质量PDF输出以供打印或数字显示：

  **编译命令：**
  ```bash
  # 基本编译
  pdflatex poster.tex

  # 带有参考文献
  pdflatex poster.tex
  bibtex poster
  pdflatex poster.tex
  pdflatex poster.tex

  # 用于基于Beamer的海报
  lualatex poster.tex  # 更好的字体支持
  xelatex poster.tex   # Unicode和现代字体
  ```

  **确保全页覆盖：**

  海报应使用整个页面，无过多边距。正确配置包：

  **beamerposter - 全页设置：**
  ```latex
  \documentclass[final,t]{beamer}
  \usepackage[size=a0,scale=1.4,orientation=portrait]{beamerposter}

  % 移除默认Beamer边距
  \setbeamersize{text margin left=0mm, text margin right=0mm}

  % 使用geometry进行精确控制
  \usepackage[margin=10mm]{geometry}  % 周围10毫米边距

  % 移除导航符号
  \setbeamertemplate{navigation symbols}{}

  % 如果不需要，移除页脚和页眉
  \setbeamertemplate{footline}{}
  \setbeamertemplate{headline}{}
  ```

  **tikzposter - 全页设置：**
  ```latex
  \documentclass[
    25pt,                      % 字体缩放
    a0paper,                   % 纸张尺寸
    portrait,                  % 方向
    margin=10mm,               % 外边距（最小）
    innermargin=15mm,          % 块内空间
    blockverticalspace=15mm,   % 块间空间
    colspace=15mm,             % 列间空间
    subcolspace=8mm            % 子列间空间
  ]{tikzposter}

  % 这确保内容填满页面
  ```

  **baposter - 全页设置：**
  ```latex
  \documentclass[a0paper,portrait,fontscale=0.285]{baposter}

  \begin{poster}{
    grid=false,
    columns=3,
    colspacing=1.5em,          % 列间空间
    eyecatcher=true,
    background=plain,
    bgColorOne=white,
    borderColor=blue!50,
    headerheight=0.12\textheight,  % 12%用于页眉
    textborder=roundedleft,
    headerborder=closed,
    boxheaderheight=2em        % 一致的盒子页眉高度
  }
  % 内容在此
  \end{poster}
  ```

  **常见问题和修复：**

  **问题：** 海报周围有大白边距
  ```latex
  % 修复beamerposter
  \setbeamersize{text margin left=5mm, text margin right=5mm}

  % 修复tikzposter
  \documentclass[..., margin=5mm, innermargin=10mm]{tikzposter}

  % 修复baposter - 在文档类中调整
  \documentclass[a0paper, margin=5mm]{baposter}
  ```

  **问题：** 内容未填满垂直空间
  ```latex
  % 使用\vfill在部分之间分配空间
  \block{引言}{...}
  \vfill
  \block{方法}{...}
  \vfill
  \block{结果}{...}

  % 或手动调整块间距
  \vspace{1cm}  % 在特定块之间添加空间
  ```

  **问题：** 海报超出页面边界
  ```latex
  % 检查总宽度计算
  % 对于带有间距的3列：
  % 总计 = 3×列宽 + 2×列空间 + 2×边距
  % 确保这等于\paperwidth

  % 通过添加可见页面边界调试
  \usepackage{eso-pic}
  \AddToShipoutPictureBG{
    \AtPageLowerLeft{
      \put(0,0){\framebox(\LenToUnit{\paperwidth},\LenToUnit{\paperheight}){}}
    }
  }
  ```

  **打印准备：**
  - 为专业打印生成PDF/X-1a
  - 嵌入所有字体
  - 如果需要，将颜色转换为CMYK
  - 检查所有图像的分辨率（最小300 DPI）
  - 如果打印机要求，添加出血区域（通常3-5毫米）
  - 验证页面尺寸完全匹配要求

  **数字显示：**
  - 屏幕显示的RGB颜色空间
  - 为电子邮件/Web优化文件大小
  - 在不同屏幕上测试可读性

  ### 11. PDF审查和质量控制

  **关键：** 在打印或演示之前始终审查生成的PDF。使用此系统检查表：

  **步骤1：页面尺寸验证**
  ```bash
  # 检查PDF尺寸（应完全匹配海报尺寸）
  pdfinfo poster.pdf | grep "Page size"

  # 预期输出：
  # A0: 2384 x 3370 点（841 x 1189 毫米）
  # 36x48": 2592 x 3456 点
  # A1: 1684 x 2384 点（594 x 841 毫米）
  ```

  **步骤2：视觉检查清单**

  以100%缩放打开PDF并检查：

  **布局和间距：**
  - [ ] 内容填满整个页面（无大白边距）
  - [ ] 列间间距一致
  - [ ] 块/部分间间距一致
  - [ ] 所有元素正确对齐（使用标尺工具）
  - [ ] 无重叠文本或图形
  - [ ] 留白均匀分布

  **排版：**
  - [ ] 标题清晰可见且大（72点+）
  - [ ] 部分标题可读（48-72点）
  - [ ] 正文文本在100%缩放下可读（最小24-36点）
  - [ ] 无文本截断或超出边缘
  - [ ] 整个海报一致的字体使用
  - [ ] 所有特殊字符正确渲染（符号、希腊字母）

  **视觉元素：**
  - [ ] 所有图形正确显示
  - [ ] 无像素化或模糊图像
  - [ ] 图形标题存在且可读
  - [ ] 颜色按预期渲染（不褪色或太暗）
  - [ ] 徽标清晰显示
  - [ ] QR码可见且可扫描

  **内容完整性：**
  - [ ] 标题和作者完整
  - [ ] 所有部分存在（引言、方法、结果、结论）
  - [ ] 参考文献包含
  - [ ] 联系信息可见
  - [ ] 致谢（如适用）
  - [ ] 无占位符文本剩余（Lorem ipsum、TODO等）

  **技术质量：**
  - [ ] LaTeX编译警告在重要区域无
  - [ ] 所有引用已解决（无[?]标记）
  - [ ] 所有交叉引用工作正常
  - [ ] 页面边界正确（无内容被切断）

  **步骤3：缩小比例打印测试**

  **基本打印前测试：**
  ```bash
  # 创建缩小尺寸测试打印（最终尺寸的25%）
  # 这模拟从约8-10英尺查看完整海报

  # 对于A0海报，在A4纸上打印（24.7%比例）
  # 对于36x48"海报，在信纸上打印（约25%比例）
  ```

  **打印测试清单：**
  - [ ] 标题在6英尺距离可读
  - [ ] 部分标题在4英尺距离可读
  - [ ] 正文文本在2英尺距离可读
  - [ ] 图形清晰且可理解
  - [ ] 颜色准确打印
  - [ ] 无明显设计缺陷

  **步骤4：数字质量检查**

  **字体嵌入验证：**
  ```bash
  # 检查所有字体是否已嵌入（打印所需）
  pdffonts poster.pdf

  # 所有字体应在"emb"列显示"是"
  # 如果任何显示"否"，使用以下命令重新编译：
  pdflatex -dEmbedAllFonts=true poster.tex
  ```

  **图像分辨率检查：**
  ```bash
  # 提取图像信息
  pdfimages -list poster.pdf

  # 检查所有图像至少300 DPI
  # 公式：DPI = 像素 /（海报英寸数）
  # 对于A0宽度（33.1"）：300 DPI = 最小9930像素
  ```

  **文件大小优化：**
  ```bash
  # 对于电子邮件/Web，如果需要（>50MB），压缩
  # 使用gs命令压缩PDF
  ```

  **步骤5：可访问性检查**

  **颜色对比度验证：**
  - [ ] 文本-背景对比度比 ≥ 4.5:1（WCAG AA）
  - [ ] 重要元素对比度比 ≥ 7:1（WCAG AAA）
  - 在线测试：https://webaim.org/resources/contrastchecker/

  **色盲模拟：**
  - [ ] 通过色盲模拟器查看PDF
  - [ ] 信息在红绿模拟中未丢失
  - 使用Coblis（color-blindness.com）或类似工具

  **步骤6：内容校对**

  **系统审查：**
  - [ ] 拼写检查所有文本
  - [ ] 验证所有作者姓名和隶属机构
  - [ ] 检查所有数字和统计数据的准确性
  - [ ] 确认所有引用正确
  - [ ] 审查图形标签和标题
  - [ ] 检查标题和标题中的拼写错误

  **同行评审：**
  - [ ] 请同事审查海报
  - [ ] 30秒测试：他们能否识别主要消息？
  - [ ] 5分钟审查：他们是否理解结论？
  - [ ] 记录任何混淆元素

  **步骤7：技术验证**

  **LaTeX编译日志审查：**
  ```bash
  # 检查.log文件中的警告
  grep -i "warning\|error\|overfull\|underfull" poster.log

  # 修复的常见问题：
  # - 溢出框：文本超出边距
  # - 不足框：过度间距
  # - 缺失引用：引用未解决
  # - 缺失图形：图像文件未找到
  ```

  **修复常见警告：**
  ```latex
  % 溢出框（文本太宽）
  \usepackage{microtype}  % 更好间距
  \sloppy  % 允许稍宽松间距
  \hyphenation{长词}  % 手动断字

  % 缺失字体
  \usepackage[T1]{fontenc}  % 更好字体编码

  % 图像未找到
  % 确保路径正确且文件存在
  \graphicspath{{./figures/}{./images/}}
  ```

  **步骤8：最终打印前清单**

  **发送到打印机前：**
  - [ ] PDF尺寸完全匹配要求（用pdfinfo检查）
  - [ ] 所有字体已嵌入（用pdffonts检查）
  - [ ] 颜色模式正确（屏幕为RGB，打印如果需要为CMYK）
  - [ ] 如果要求，添加出血区域（通常3-5毫米）
  - [ ] 如果需要，裁切标记可见
  - [ ] 测试打印已完成并审查
  - [ ] 文件命名清晰：[LastName]_[Conference]_Poster.pdf
  - [ ] 备份副本已保存

  **确认的打印规格：**
  - [ ] 纸张类型（哑光 vs 光泽）
  - [ ] 打印方法（喷墨、大格式、织物）
  - [ ] 颜色配置文件（如果需要，提供给打印机）
  - [ ] 交付截止日期和运输地址
  - [ ] 卷装或平装偏好

  **数字演示清单：**
  - [ ] PDF大小已优化（电子邮件<10MB）
  - [ ] 在多个PDF查看器上测试（Adobe、Preview等）
  - [ ] 在不同屏幕上正确显示
  - [ ] QR码已测试且功能正常
  - [ ] 备选格式已准备（社交媒体PNG）

  **审查脚本**（可在`scripts/review_poster.sh`中获得）：
  ```bash
  #!/bin/bash
  # 自动海报PDF审查脚本
  ```

  **常见PDF问题和解决方案表：**

  | 问题 | 原因 | 解决方案 |
  |-------|-------|----------|
  | 大白边距 | 不正确边距设置 | 减少文档类中的边距 |
  | 内容被切断 | 超出页面边界 | 检查总宽度/高度计算 |
  | 模糊图像 | 低分辨率（<300 DPI） | 替换为更高分辨率图像 |
  | 缺失字体 | 字体未嵌入 | 使用-dEmbedAllFonts=true编译 |
  | 错误页面尺寸 | 不正确纸张尺寸设置 | 验证文档类纸张尺寸 |
  | 颜色看起来错误 | RGB vs CMYK不匹配 | 为打印转换颜色空间 |
  | 文件太大（>50MB） | 未压缩图像 | 优化图像或压缩PDF |
  | QR码不工作 | 太小或低分辨率 | 最小2×2厘米，高对比度 |

  ### 12. 常见海报内容模式

  针对不同研究类型的有效内容组织：

  **实验研究海报：**
  1. 标题和作者
  2. 引言：问题和假设
  3. 方法：实验设计（带图表）
  4. 结果：关键发现（2-4个主要图形）
  5. 结论：主要收获（3-5个要点）
  6. 未来工作（可选）
  7. 参考文献和致谢

  **计算/建模海报：**
  1. 标题和作者
  2. 动机：问题陈述
  3. 方法：算法或模型（带流程图）
  4. 实现：技术细节
  5. 结果：性能指标和比较
  6. 应用：用例
  7. 代码可用性（链接到GitHub的QR码）
  8. 参考文献

  **综述/调查海报：**
  1. 标题和作者
  2. 范围：主题概述
  3. 方法：文献搜索策略
  4. 关键发现：主要主题（按类别组织）
  5. 趋势：出版模式可视化
  6. 差距：已识别的研究需求
  7. 结论：总结和影响
  8. 参考文献

  ### 13. 可访问性和包容性设计

  设计适用于多样受众的海报：

  **色盲考虑：**
  - 避免红绿组合（最常见的色盲）
  - 除颜色外，使用图案或形状
  - 用色盲模拟器测试
  - 提供高对比度（WCAG AA标准：最小4.5:1）

  **视觉障碍适应：**
  - 大、清晰的字体（最小24点正文文本）
  - 高对比度文本和背景
  - 清晰的视觉层次
  - 避免背景中的复杂纹理或图案

  **语言和内容：**
  - 清晰、简洁的语言
  - 定义首字母缩写词和专业术语
  - 国际受众考虑
  - 考虑全球会议的多语言QR码选项

  ### 14. 海报演示最佳实践

  超越LaTeX的有效海报会话指导：

  **内容策略：**
  - 讲述故事，而非仅列出事实
  - 专注于1-3个主要消息
  - 使用视觉摘要或图形总结
  - 留出对话空间（不要过度解释）

  **物理演示技巧：**
  - 携带带有QR码的打印讲义或名片
  - 准备30秒、2分钟和5分钟口头总结
  - 站在侧面，不阻挡海报
  - 用开放式问题吸引观众

  **数字备份：**
  - 将海报保存为PDF在移动设备上
  - 准备电子邮件共享的数字版本
  - 创建社交媒体友好图像版本
  - 有备用打印副本或数字显示选项

  ## 海报创建工作流程

  ### 阶段1：规划和内容开发

  1. **确定海报要求：**
     - 会议尺寸规格（A0、36×48英寸等）
     - 方向（纵向 vs 横向）
     - 提交截止日期和格式要求

  2. **开发内容大纲：**
     - 识别1-3个核心消息
     - 选择关键图形（通常3-6个主要视觉）
     - 为每个部分起草简洁文本（优选要点）
     - 目标总共300-800字

  3. **选择LaTeX包：**
     - beamerposter：如果熟悉Beamer，需要机构主题
     - tikzposter：用于现代、彩色设计和灵活性
     - baposter：用于结构化、专业多列布局

  ### 阶段2：设计和布局

  1. **选择或创建模板：**
     - 从`assets/`中提供的模板开始
     - 自定义颜色方案以匹配品牌
     - 配置页面尺寸和方向

  2. **设计布局结构：**
     - 计划列结构（2、3或4列）
     - 映射内容流程（通常从左到右、从上到下）
     - 分配标题空间（10-15%）、内容空间（70-80%）、页脚空间（5-10%）

  3. **设置排版：**
     - 为不同层次级别配置字体大小
     - 确保最小24点正文文本
     - 测试4-6英尺距离的可读性

  ### 阶段3：内容集成

  1. **创建海报头部：**
     - 标题（简洁、描述性、10-15字）
     - 作者和隶属机构
     - 机构徽标（高分辨率）
     - 会议徽标（如要求）

  2. **填充内容部分：**
     - 保持文本最小且可扫描
     - 使用要点，而非段落
     - 用主动语态书写
     - 集成图形，带清晰标题

  3. **添加视觉元素：**
     - 高分辨率图形（最小300 DPI）
     - 所有图形一致的样式
     - 强调的颜色编码元素
     - 补充材料的QR码

  4. **包含参考文献：**
     - 仅引用关键论文（通常5-10篇参考文献）
     - 使用缩写引用风格
     - 考虑QR码链接到完整参考文献

  ### 阶段4：细化和测试

  1. **审查和迭代：**
     - 检查拼写错误和错误
     - 验证所有图形为高分辨率
     - 确保一致格式化
     - 确认颜色方案配合良好

  2. **测试可读性：**
     - 在2-3英尺距离打印25%比例并阅读（模拟8-12英尺的海报）
     - 在不同监视器上检查颜色
     - 验证QR码功能正确
     - 请同事审查

  3. **优化打印：**
     - 在PDF中嵌入所有字体
     - 验证图像分辨率
     - 检查PDF尺寸要求
     - 如果要求，包括出血区域

  ### 阶段5：编译和交付

  1. **编译最终PDF：**
     ```bash
     pdflatex poster.tex
     # 或为更好字体支持：
     lualatex poster.tex
     ```

  2. **验证输出质量：**
     - 检查所有元素可见且正确位置
     - 缩放到100%并检查图形质量
     - 验证颜色匹配期望
     - 确认PDF在不同查看器上正确打开

  3. **准备打印：**
     - 如果需要，导出为PDF/X-1a
     - 保存备份副本
     - 首先在普通纸上进行测试打印
     - 在截止日期前2-3天订购专业打印

  4. **创建补充材料：**
     - 保存PNG/JPG版本用于社交媒体
     - 创建讲义版本（8.5×11英寸总结）
     - 准备电子邮件共享的数字版本

  ## 与其他技能的集成

  这个技能有效工作与：
  - **科学写作：** 用于从论文开发海报内容
  - **图形创建：** 用于生成高质量可视化
  - **文献综述：** 用于情境化研究
  - **数据分析：** 用于创建结果图形和图表

  ## 常见陷阱避免

  **设计错误：**
  - ❌ 过多文本（超过1000字）
  - ❌ 字体大小太小（小于24点正文文本）
  - ❌ 低对比度颜色组合
  - ❌ 无留白的杂乱布局
  - ❌ 跨部分不一致的样式
  - ❌ 质量差或像素化的图像

  **内容错误：**
  - ❌ 无清晰叙事或消息
  - ❌ 过多研究问题或目标
  - ❌ 过度使用专业术语而无定义
  - ❌ 结果无上下文或解释
  - ❌ 缺失作者联系信息

  **技术错误：**
  - ❌ 错误的海报尺寸用于会议要求
  - ❌ RGB颜色发送到CMYK打印机（颜色偏移）
  - ❌ 字体未嵌入PDF
  - ❌ 文件太大用于提交门户
  - ❌ QR码太小或未测试

  **最佳实践：**
  - ✅ 完全遵循会议尺寸规格
  - ✅ 在最终打印前进行缩小比例测试打印
  - ✅ 使用高对比度、可访问的颜色方案
  - ✅ 保持文本最小且高度可扫描
  - ✅ 包括清晰的联系信息和QR码
  - ✅ 平衡文本与视觉内容（40-50%视觉内容）
  - ✅ 仔细校对（海报上的错误会被放大！）

  ## 包安装

  确保安装所需LaTeX包：

  ```bash
  # 对于 TeX Live（Linux/Mac）
  tlmgr install beamerposter tikzposter baposter

  # 对于 MiKTeX（Windows）
  # 包通常首次使用时自动安装

  # 附加推荐包
  tlmgr install qrcode graphics xcolor tcolorbox subcaption
  ```

  ## 脚本和自动化

  `scripts/`目录中的辅助脚本：

  - `compile_poster.sh`：带错误处理的自动编译
  - `generate_template.py`：交互式模板生成器
  - `resize_images.py`：用于海报的批量图像优化
  - `poster_checklist.py`：提交前验证工具

  ## 参考文献

  详细指导的综合参考文件：

  - `references/latex_poster_packages.md`：beamerposter、tikzposter和baposter的详细比较，带示例
  - `references/poster_layout_design.md`：布局原则、网格系统和视觉流程
  - `references/poster_design_principles.md`：排版、颜色理论、视觉层次和可访问性
  - `references/poster_content_guide.md`：内容组织、写作风格和部分特定指导

  ## 模板

  `assets/`目录中的即用海报模板：

  - beamerposter模板（经典、现代、彩色）
  - tikzposter模板（默认、射线、波浪、信封）
  - baposter模板（纵向、横向、极简）
  - 来自各科学学科的示例海报
  - 颜色方案定义和机构模板

  加载这些模板并根据您的特定研究和会议要求进行定制。
