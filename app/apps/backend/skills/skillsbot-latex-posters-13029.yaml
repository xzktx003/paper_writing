  # LaTeX 研究海报

  ## 概述

  研究海报是会议、研讨会和学术活动中科学传播的关键媒介。这个技能提供使用LaTeX包创建专业、视觉吸引人的研究海报的全面指导。生成具有适当布局、排版、颜色方案和视觉层次的出版质量海报。

  ## 使用时机

  这个技能应在以下情况使用：
  - 为会议、研讨会或海报会话创建研究海报
  - 为大学活动或论文答辩设计学术海报
  - 准备研究视觉摘要以供公众参与
  - 将科学论文转换为海报格式
  - 为研究小组或部门创建模板海报
  - 设计符合特定会议尺寸要求的海报（A0、A1、36×48英寸等）
  - 构建具有复杂多列布局的海报
  - 在海报格式中集成图形、表格、方程和引用

  ## 使用科学示意图增强视觉效果

  **⚠️ 强制要求：每个研究海报必须至少包含2-3个使用科学示意图技能生成的AI生成图形。**

  这不是可选的。海报主要是视觉媒体——文字过多的海报无法有效沟通。在最终确定任何海报之前：
  1. 至少生成两张示意图或图表
  2. 目标为3-4张图形用于综合海报（方法流程图、关键结果可视化、概念框架）
  3. 图形应占据海报面积的40-50%

  **如何生成图形：**
  - 使用**科学示意图**技能生成AI驱动的出版质量图表
  - 只需用自然语言描述您想要的图表
  - Nano Banana Pro将自动生成、审查和优化示意图

  **如何生成示意图：**
  ```bash
  python scripts/generate_schematic.py "您的图表描述" -o figures/output.png
  ```

  AI将自动：
  - 创建具有适当格式的出版质量图像
  - 通过多次迭代审查和优化
  - 确保可访问性（色盲友好、高对比度）
  - 将输出保存在figures/目录中

  **何时添加示意图：**
  - 用于海报内容的研究方法流程图
  - 概念框架图表
  - 实验设计可视化
  - 数据分析流程图
  - 系统架构图
  - 生物通路插图
  - 任何受益于可视化的复杂概念

  有关创建示意图的详细指导，请参考科学示意图技能文档。

