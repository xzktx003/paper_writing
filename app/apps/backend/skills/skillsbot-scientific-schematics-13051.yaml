  ## 快速参考清单

  提交图表前，验证：

  ### 视觉质量
  - [ ] 高质量图像格式（AI生成的PNG）
  - [ ] 无重叠元素（AI自动处理）
  - [ ] 所有组件间适当间距（AI优化）
  - [ ] 清洁、专业对齐
  - [ ] 所有箭头正确连接到预期目标

  ### 可访问性
  - [ ] 使用色盲安全调色板（Okabe-Ito）
  - [ ] 灰度下工作（用可访问性检查器测试）
  - [ ] 元素间足够对比度（已验证）
  - [ ] 适当冗余编码（形状 + 颜色）
  - [ ] 色盲模拟通过所有检查

  ### 排版和可读性
  - [ ] 文本最终尺寸最小7-8点
  - [ ] 所有元素清晰完整标记
  - [ ] 一致字体家族和大小
  - [ ] 无文本重叠或截断
  - [ ] 适用时包含单位

  ### 出版物标准
  - [ ] 与手稿中其他图形一致样式
  - [ ] 完整标题，定义所有缩写
  - [ ] 在手稿文本中适当引用
  - [ ] 满足期刊特定尺寸要求
  - [ ] 导出为期刊所需格式（PDF/EPS/TIFF）

  ### 质量验证（必需）
  - [ ] 运行`run_quality_checks()`并获得PASS状态
  - [ ] 审查重叠检测报告（零高严重性重叠）
  - [ ] 通过可访问性验证（灰度和色盲）
  - [ ] 在目标DPI（打印300+）验证分辨率
  - [ ] 生成并审查视觉质量报告
  - [ ] 所有质量报告与图形文件一起保存

  ### 文档和版本控制
  - [ ] 源文件（.tex, .py）保存以供未来修订
  - [ ] 质量报告存档在`quality_reports/`目录中
  - [ ] 配置参数文档化（颜色、间距、大小）
  - [ ] Git提交包括源、输出和质量报告
  - [ ] README或注释解释如何重新生成图形

  ### 最终集成检查
  - [ ] 图形在编译手稿中正确显示
  - [ ] 交叉引用工作（`\ref{}`指向正确图形）
  - [ ] 图形编号匹配文本引用
  - [ ] 标题相对于图形出现在正确页面
  - [ ] 无与图形相关的编译警告或错误

