content: |
  # CCF Submission Checker

  ## Overview
  Pre-submission quality gate for CCF-A conferences. Checks page count, anonymity, PDF metadata, LaTeX build, artifact packaging, and camera-ready readiness.

  ## Check Items
  - **Page Count**: Within venue limit?
  - **Anonymity**: No identifying information?
  - **PDF Metadata**: Author/created-by cleaned?
  - **LaTeX Build**: Clean compilation with no errors?
  - **Artifact Checklist**: Supplementary material complete?
  - **Camera-Ready**: Final version ready?

  ## Output
  - Submission checklist with pass/fail status
  - LaTeX/PDF build results
  - Anonymity verification report
  - Artifact completeness check
