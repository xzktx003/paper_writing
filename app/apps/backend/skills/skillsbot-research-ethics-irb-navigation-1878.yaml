  # 科研伦理与IRB流程导航

  准备伦理申请材料，制定知情同意方案，并协助完成涉及人类受试者的研究机构审查流程。

  ## 概述

  本技能旨在确保涉及人类受试者的研究符合伦理标准与法规要求。其涵盖伦理申请准备、知情同意方案制定以及机构审查委员会（IRB）流程导航。

  ## 核心能力

  ### 伦理申请
  - 研究方案制定
  - 风险评估
  - 效益论证
  - 受试群体保护
  - 方法学描述

  ### 知情同意
  - 同意书起草
  - 通俗语言撰写
  - 理解度验证
  - 特殊人群考量
  - 持续同意流程

  ### IRB流程导航
  - 提交要求
  - 审查类别
  - 条件回复
  - 修正程序
  - 续期流程

  ### 持续合规
  - 不良事件报告
  - 方案修改
  - 年度审查
  - 审计准备
  - 记录维护

  ## 使用指南

  ### 申请流程
  1. 审查IRB要求
  2. 制定研究方案
  3. 评估风险与效益
  4. 起草同意文件
  5. 填写申请表格
  6. 提交审查
  7. 回复审查意见

  ### 知情同意最佳实践
  - 使用通俗语言
  - 包含所有必要要素
  - 说明自愿参与原则
  - 清晰描述风险
  - 提供联系信息

  ### 合规维护
  - 遵循批准方案
  - 及时报告变更
  - 记录同意过程
  - 维护档案记录
  - 按时提交续期

  ## 集成关联

  ### 相关流程
  - 民族志田野调查规划
  - 科研伦理审查
  - 口述历史采集方案

  ### 协作技能
  - 口述历史访谈技巧
  - 民族志编码与主题分析
  - 科研基金申请书撰写

