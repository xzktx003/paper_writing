  # VASP DFT 执行器

  ## 目的

  VASP DFT 执行器技能利用VASP提供密度泛函理论计算能力，用于纳米材料的性质预测，支持电子结构分析、几何优化和材料性质计算。

  ## 能力

  - 输入文件生成（INCAR、POSCAR、KPOINTS、POTCAR）
  - 几何优化
  - 电子能带结构计算
  - 态密度分析
  - 形成能计算
  - 光学性质预测

  ## 使用指南

  ### DFT计算工作流

  1. **输入准备**
     - 生成结构文件
     - 选择合适的赝势
     - 设置收敛参数

  2. **计算执行**
     - 监控收敛情况
     - 检查错误
     - 管理计算资源

  3. **结果分析**
     - 提取电子性质
     - 分析能带结构
     - 计算衍生性质

  ## 流程集成

  - 纳米材料DFT计算流水线
  - 多尺度建模集成
  - 机器学习材料发现流水线

  ## 输入模式

  ```json
  {
    "structure_file": "string (POSCAR/CIF)",
    "calculation_type": "relax|static|band|dos|optical",
    "functional": "PBE|HSE06|SCAN",
    "kpoint_density": "number",
    "encut": "number (eV)"
  }
  ```

  ## 输出模式

  ```json
  {
    "total_energy": "number (eV)",
    "bandgap": "number (eV)",
    "formation_energy": "number (eV/atom)",
    "optimized_structure": "string (CONTCAR)",
    "electronic_properties": {
      "dos_file": "string",
      "band_file": "string"
    },
    "convergence": {
      "energy_converged": "boolean",
      "force_converged": "boolean"
    }
  }
  ```
