  # 学术文献综合技能

  调研、分析和综合哲学文献，以识别立场、追踪辩论并定位学术空白。

  ## 概述

  学术文献综合技能能够系统性地调研、分析和综合特定主题的哲学文献，识别主要立场及其支持者，追踪学术辩论的发展脉络，并定位当前学术讨论中的空白，为研究贡献提供方向。

  ## 能力

  ### 文献调研
  - 进行全面的文献检索
  - 识别关键著作和作者
  - 追踪引用网络
  - 访问相关数据库
  - 保持内容时效性

  ### 立场分析
  - 识别主要学术立场
  - 分析支持性论据
  - 比较竞争性观点
  - 评估优缺点
  - 理解历史发展脉络

  ### 辩论追踪
  - 绘制学术对话图谱
  - 识别争议焦点
  - 追踪论证发展过程
  - 理解立场演变
  - 定位当前前沿

  ### 空白识别
  - 发现研究不足的领域
  - 识别缺失的视角
  - 发现方法论空白
  - 注意实证研究缺口
  - 提出研究方向建议

  ### 综合写作
  - 有条理地组织文献
  - 呈现平衡的总结
  - 连接不同著作
  - 构建叙事结构
  - 支持原创性贡献

  ## 使用指南

  ### 适用场景
  - 启动研究项目
  - 撰写文献综述
  - 准备学位论文
  - 期刊审稿工作
  - 研究生教学

  ### 最佳实践
  - 全面检索文献
  - 系统化组织材料
  - 批判性阅读
  - 注重综合而非简单总结
  - 定期更新知识

  ### 集成关联
  - 哲学写作与论证技能
  - 论证映射与重构技能
  - 诠释学解释技能
  - 比较宗教分析技能

