content: |
  # CCF Idea Reviewer

  ## Overview
  Scores and ranks research ideas with rigorous criteria. Provides novelty assessment, risk analysis, and stage-aware development potential.

  ## Review Criteria
  - Novelty & Significance
  - Feasibility
  - Clarity of Problem Formulation
  - Potential Impact
  - Competition Landscape

  ## Output
  - Scores with detailed rationale
  - Risk assessment
  - Stage-specific development recommendations
