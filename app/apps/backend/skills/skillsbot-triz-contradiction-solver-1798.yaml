  # TRIZ矛盾解决器技能

  ## 目的

  应用TRIZ（发明问题解决理论）方法论进行系统性创新和解决技术矛盾。

  ## 能力

  - 识别技术矛盾
  - 应用发明原理
  - 使用矛盾矩阵
  - 生成解决方案概念
  - 评估解决方案
  - 记录创新过程

  ## 使用指南

  1. 定义问题
  2. 识别矛盾
  3. 应用TRIZ原理
  4. 生成解决方案
  5. 评估可行性
  6. 记录成果

  ## 流程集成

  在科学发现工作流程中适用于：
  - 创新挑战
  - 技术问题解决
  - 设计优化
  - 创造性解决方案

  ## 配置

  - 矛盾参数
  - 原理选择
  - 评估标准
  - 输出格式

  ## 输出成果

  - 矛盾分析
  - 解决方案概念
  - 原理应用
  - 创新报告
