  # 科学写作

  ## 概述

  科学写作是一个以精确和清晰的方式交流研究的过程。使用IMRAD结构、引用（APA/AMA/Vancouver）、图表和报告指南（CONSORT/STROBE/PRISMA）撰写手稿。将此技能应用于研究论文和期刊提交。

  ## 何时使用此技能

  此技能应在以下情况下使用：
  - 撰写或修改科学手稿的任何部分（摘要、引言、方法、结果、讨论）
  - 使用IMRAD或其他标准格式构建研究论文
  - 格式化特定风格的引用和参考文献（APA、AMA、Vancouver、Chicago、IEEE）
  - 创建、格式化或改进图表和数据可视化
  - 应用研究特定的报告指南（CONSORT用于试验、STROBE用于观察性研究、PRISMA用于综述）
  - 起草符合期刊要求的摘要（结构化或非结构化）
  - 准备提交给特定期刊的手稿
  - 提高写作的清晰度、简洁性和精确性
  - 确保正确使用领域特定的术语和命名法
  - 处理审稿人意见和修订手稿

  ## 核心能力

  ### 1. 手稿结构和组织

  **IMRAD格式**：指导论文通过大多数科学学科使用的标准引言、方法、结果和讨论结构。这包括：
  - **引言**：建立研究背景、识别空白、陈述目标
  - **方法**：详细说明研究设计、人群、程序和分析方法
  - **结果**：客观呈现发现，不加解释
  - **讨论**：解释结果、承认局限性、提出未来方向

  有关IMRAD结构的详细指导，请参考`references/imrad_structure.md`。

  **替代结构**：支持学科特定的格式，包括：
  - 综述文章（叙事性、系统性、范围性）
  - 病例报告和病例系列
  - 荟萃分析和汇总分析
  - 理论/建模论文
  - 方法论文和方案

  ### 2. 部分特定写作指导

  **摘要撰写**：制作简洁、独立的摘要（100-250字），捕捉论文的目的、方法、结果和结论。支持结构化摘要（带标签部分）和非结构化单段落格式。

  **引言开发**：构建引人入胜的引言，包括：
  - 确立研究问题的重要性
  - 系统回顾相关文献
  - 识别知识空白或争议
  - 陈述明确的研究问题或假设
  - 解释研究的新颖性和意义

  **方法文档**：通过以下方式确保可重复性：
  - 详细的参与者/样本描述
  - 清晰的程序文档
  - 带有理由的统计方法
  - 设备和材料规格
  - 伦理批准和同意声明

  **结果呈现**：呈现发现，包括：
  - 从主要结果到次要结果的逻辑流
  - 与图表整合
  - 统计显著性和效应量
  - 客观报告，不加解释

  **讨论构建**：通过以下方式综合发现：
  - 将结果与研究问题关联
  - 与现有文献比较
  - 诚实地承认局限性
  - 提出机制性解释
  - 建议实际含义和未来研究

  ### 3. 引用和参考文献管理

  跨学科正确应用引用风格。有关全面风格指南，请参考`references/citation_styles.md`。

  **主要引用风格：**
  - **AMA（美国医学协会）**：上标编号引用，常用于医学
  - **Vancouver**：方括号编号引用，生物医学标准
  - **APA（美国心理学会）**：文中作者-日期引用，常用于社会科学
  - **Chicago**：注释-参考书目或作者-日期，人文学科和科学
  - **IEEE**：方括号编号引用，工程和计算机科学

  **最佳实践：**
  - 尽可能引用原始来源
  - 包括近期文献（活跃领域近5-10年）
  - 平衡引言和讨论中的引用分布
  - 验证所有引用对照原始来源
  - 使用参考文献管理软件（Zotero、Mendeley、EndNote）

  ### 4. 图表

  创建增强理解的有效数据可视化。有关详细最佳实践，请参考`references/figures_tables.md`。

  **何时使用表格与图表：**
  - **表格**：精确数值数据、复杂数据集、需要精确值的多个变量
  - **图表**：趋势、模式、关系、通过视觉最佳理解的比较

  **设计原则：**
  - 使每个图表自解释，包含完整标题
  - 使用一致的格式和术语跨所有展示项目
  - 用单位标记所有轴、列和行
  - 包括样本量（n）和统计注释
  - 遵循“每1000字一个图表”指南
  - 避免在文本、表格和图表之间重复信息

  **常见图表类型：**
  - 条形图：比较离散类别
  - 折线图：显示时间趋势
  - 散点图：展示相关性
  - 箱线图：显示分布和异常值
  - 热图：可视化矩阵和模式

  ### 5. 按研究类型的报告指南

  通过遵循既定报告标准确保完整性和透明度。有关详细指南信息，请参考`references/reporting_guidelines.md`。

  **关键指南：**
  - **CONSORT**：随机对照试验
  - **STROBE**：观察性研究（队列、病例对照、横断面）
  - **PRISMA**：系统综述和荟萃分析
  - **STARD**：诊断准确性研究
  - **TRIPOD**：预测模型研究
  - **ARRIVE**：动物研究
  - **CARE**：病例报告
  - **SQUIRE**：质量改进研究
  - **SPIRIT**：临床试验方案
  - **CHEERS**：经济评估

  每个指南提供检查清单，确保报告所有关键方法学元素。

  ### 6. 写作原则和风格

  应用基础科学写作原则。有关详细指导，请参考`references/writing_principles.md`。

  **清晰性：**
  - 使用精确、无歧义的语言
  - 在首次使用时定义技术术语和缩写
  - 保持段落内和段落间的逻辑流
  - 在适当情况下使用主动语态以增强清晰性

  **简洁性：**
  - 消除冗余词语和短语
  - 偏好较短的句子（平均15-20字）
  - 去除不必要的限定词
  - 严格遵守字数限制

  **准确性：**
  - 以适当精度报告精确值
  - 使用一致的术语贯穿始终
  - 区分观察和解释
  - 适当承认不确定性

  **客观性：**
  - 无偏见地呈现结果
  - 避免夸大发现或含义
  - 承认冲突证据
  - 保持专业、中立语调

  ### 7. 期刊特定格式化

  适应手稿至期刊要求：
  - 遵循作者指南的结构、长度和格式
  - 应用期刊特定的引用风格
  - 满足图表规范（分辨率、文件格式、尺寸）
  - 包括必要声明（资助、利益冲突、数据可用性、伦理批准）
  - 遵守每个部分的字数限制
  - 根据模板要求格式化（如果提供）

  ### 8. 领域特定语言和术语

  调整语言、术语和惯例以匹配特定科学学科。每个领域有既定词汇、偏好表达和领域特定惯例，以表明专业知识并确保目标受众清晰度。

  **识别领域特定语言惯例：**
  - 回顾目标期刊中近期高影响力论文使用的术语
  - 注意领域特定的缩写、单位和符号系统
  - 识别偏好术语（例如，“参与者” vs. “受试者”、“化合物” vs. “药物”、“标本” vs. “样本”）
  - 观察方法、生物或技术如何典型描述

  **生物医学和临床科学：**
  - 使用精确的解剖和临床术语（例如，正式写作中用“心肌梗死”而非“心脏病发作”）
  - 遵循标准化疾病命名法（ICD、DSM、SNOMED-CT）
  - 用通用名指定药物名称，必要时品牌名放在括号内
  - 临床研究用“患者”，基于社区的研究用“参与者”
  - 遵循人类基因组变异协会（HGVS）命名法处理遗传变异
  - 以标准单位报告实验室值（大多数国际期刊用SI单位）

  **分子生物学和遗传学：**
  - 基因符号用斜体（例如，*TP53*），蛋白质用常规字体（例如，p53）
  - 遵循物种特定基因命名法（人类大写：*BRCA1*；小鼠句子大小写：*Brca1*）
  - 首次提及物种全名，然后用接受缩写（例如，*Escherichia coli*，然后用*E. coli*）
  - 使用标准遗传符号（例如，+/+、+/-、-/- 用于基因型）
  - 采用既定术语用于分子技术（例如，“定量PCR”或“qPCR”，非“实时PCR”）

  **化学和药物科学：**
  - 遵循IUPAC命名法用于化学化合物
  - 新化合物用系统名，常见物质用通用名
  - 使用标准符号指定化学结构（例如，用于数据库的SMILES、InChI）
  - 以适当单位报告浓度（mM、μM、nM或% w/v、v/v）
  - 使用接受的反应命名法描述合成路线
  - 与领域定义一致地使用“生物利用度”、“药代动力学”、“IC50”等术语

  **生态学和环境科学：**
  - 物种用双名法（斜体：*Homo sapiens*）
  - 相关时首次提及物种指定分类权威
  - 采用标准化的栖息地和生态系统分类
  - 使用一致的术语用于生态指标（例如，“物种丰富度”、“香农多样性指数”）
  - 用领域标准术语描述采样方法（例如，“样带”、“样方”、“标记-重捕”）

  **物理学和工程学：**
  - 除非领域惯例指定，否则一致遵循SI单位
  - 使用标准符号用于物理量（标量 vs. 向量、张量）
  - 采用既定术语用于现象（例如，“量子纠缠”、“层流”）
  - 相关时用型号和制造商指定设备
  - 使用与领域标准一致的数学符号（例如，ℏ用于约化普朗克常数）

  **神经科学：**
  - 使用标准化的脑区命名法（例如，参考Allen脑图谱）
  - 用既定立体定位系统指定脑区坐标
  - 遵循神经术语惯例（例如，正式写作中用“动作电位”非“尖峰”）
  - 基于测量方法适当使用“神经活动”、“神经元放电”、“脑激活”
  - 以适当特异性描述记录技术（例如，“全细胞膜片钳”、“细胞外记录”）

  **社会和行文科学：**
  - 适当时使用以人为本的语言（例如，“精神分裂症患者”非“精神分裂症患者”）
  - 采用标准化的心理学构念和验证评估名称
  - 遵循APA指南减少语言偏见
  - 使用既定术语指定理论框架
  - 人类研究用“参与者”而非“受试者”

  **通用原则：**

  **匹配受众专业知识：**
  - 针对专业期刊：自由使用领域特定术语，仅定义高度专业化或新颖术语
  - 针对广泛影响期刊（例如，*Nature*、*Science*）：定义更多技术术语，为专门概念提供背景
  - 针对跨学科受众：在精确性和可及性间平衡，首次使用时定义术语

  **策略性定义技术术语：**
  - 首次使用时定义缩写：“信使RNA（mRNA）”
  - 为更广泛受众写作时，提供专门技术的简要解释
  - 避免过度定义目标受众熟知的术语（表明不熟悉领域）
  - 如果不可避免有许多专门术语，创建词汇表

  **保持一致性：**
  - 同一概念始终使用相同术语（不要在“药物”、“药物”和“药品”间交替）
  - 遵循一致的缩写系统（首次定义后决定用“PCR”或“聚合酶链反应”）
  - 应用相同的命名法系统贯穿始终（特别是基因、物种、化学物质）

  **避免领域混合错误：**
  - 不要将临床术语用于基础科学（例如，不要称小鼠为“患者”）
  - 避免用过于通用的术语替代精确领域术语
  - 不要从相邻领域引入术语而不确保正确使用

  **验证术语使用：**
  - 咨询领域特定风格指南和命名资源
  - 检查目标期刊中近期论文如何使用术语
  - 使用领域特定数据库和本体（例如，基因本体、MeSH术语）
  - 不确定时，引用建立术语的关键参考文献

  ### 9. 常见陷阱避免

  **主要拒绝原因：**
  1. 不适当、不完整或描述不足的统计
  2. 过度解释结果或未支持的结论
  3. 描述不充分的方法影响可重复性
  4. 小、有偏或不适当的样本
  5. 写作质量差或难以理解的文本
  6. 文献回顾或背景不足
  7. 图表不清晰或设计差
  8. 未遵循报告指南

  **写作质量问题：**
  - 不适当时混合时态（方法/结果用过去时，既定事实用现在时）
  - 过多行话或未定义缩略语
  - 段落中断破坏逻辑流
  - 章节间缺少过渡
  - 不一致的符号或术语

  ## 手稿开发工作流

  **阶段1：规划**
  1. 确定目标期刊并回顾作者指南
  2. 确定适用的报告指南（CONSORT、STROBE等）
  3. 概述手稿结构（通常IMRAD）
  4. 计划图表作为论文骨架

  **阶段2：起草**
  1. 从图表开始（核心数据故事）
  2. 撰写方法（通常最先起草）
  3. 起草结果（客观描述图表）
  4. 撰写讨论（解释发现）
  5. 写引言（建立研究问题）
  6. 制作摘要（综合完整故事）
  7. 创建标题（简洁描述性）

  **阶段3：修订**
  1. 检查整个逻辑流和“红线”
  2. 验证术语和符号的一致性
  3. 确保图表自解释
  4. 确认遵循报告指南
  5. 验证所有引用准确且格式正确
  6. 检查每个部分的字数
  7. 校对语法、拼写和清晰性

  **阶段4：最终准备**
  1. 根据期刊要求格式化
  2. 准备补充材料
  3. 撰写强调重要性的投稿信
  4. 完成提交检查清单
  5. 收集所有必要声明和表格

  ## 与其他科学技能整合

  此技能与以下技能有效协作：
  - **数据分析技能**：用于生成报告的结果
  - **统计分析**：用于确定适当的统计展示
  - **文献回顾技能**：用于上下文研究
  - **图表创建工具**：用于开发出版物质量的可视化

  ## 参考文献

  此技能包括全面参考文件，涵盖科学写作的特定方面：

  - `references/imrad_structure.md`：IMRAD格式和部分特定内容的详细指南
  - `references/citation_styles.md`：完整引用风格指南（APA、AMA、Vancouver、Chicago、IEEE）
  - `references/figures_tables.md`：创建有效数据可视化的最佳实践
  - `references/reporting_guidelines.md`：研究特定报告标准和检查清单
  - `references/writing_principles.md`：有效科学交流的核心原则

  处理科学写作的特定方面时，根据需要加载这些参考。
