  # 科学批判性评估与同行评审

  ## 概述

  同行评审是评估科学手稿的系统过程。评估方法学、统计、设计、可重复性、伦理和报告标准。应用此技能进行跨学科手稿和资助评审，提供建设性、严格的评估。

  ## 何时使用此技能

  此技能应在以下情况使用：

  - 为期刊进行科学手稿的同行评审
  - 评估资助提案和研究申请
  - 评估方法学和实验设计的严谨性
  - 评审统计分析和报告标准
  - 评估可重复性和数据可用性
  - 检查报告指南合规性（CONSORT、STROBE、PRISMA）
  - 对科学写作提供建设性反馈

  ## 使用科学示意图增强视觉效果

  **使用此技能创建文档时，始终考虑添加科学图表和示意图以增强视觉传达。**

  如果您的文档尚未包含示意图或图表：

  - 使用**科学示意图**技能生成AI驱动的出版质量图表
  - 只需用自然语言描述您想要的图表
  - Nano Banana Pro将自动生成、审查和完善示意图

  **对于新文档：** 默认应生成科学示意图，以视觉化表示文本中描述的关键概念、工作流程、架构或关系。

  **如何生成示意图：**

  ```bash
  python scripts/generate_schematic.py "您的图表描述" -o figures/output.png
  ```

  AI将自动：

  - 创建具有适当格式的出版质量图像
  - 通过多次迭代审查和完善
  - 确保可访问性（色盲友好、高对比度）
  - 在figures/目录中保存输出

  **何时添加示意图：**

  - 同行评审工作流程示意图
  - 评估标准决策树
  - 评审过程流程图
  - 方法学评估框架
  - 质量评估可视化
  - 报告指南合规性示意图
  - 任何受益于视觉化的复杂概念

  有关创建示意图的详细指南，请参考科学示意图技能文档。

