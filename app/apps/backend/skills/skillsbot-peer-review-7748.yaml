  同行评审中遇到的方法学和统计常见问题目录，提供识别和解决指导。

  ## 最终清单

  在最终确定评审前，验证：

  - [ ] 总结声明清晰传达整体评估
  - [ ] 主要关注点明确识别和理由
  - [ ] 建议修订具体且可操作
  - [ ] 次要问题已记录但正确分类
  - [ ] 已评估统计方法
  - [ ] 已评估可重复性和数据可用性
  - [ ] 已验证伦理考量
  - [ ] 已评估图和表的质
  量和完整性
  - [ ] 已评估写作质量
  - [ ] 整个评审过程中语气建设性且专业
  - [ ] 评审彻底但适合手稿范围
  - [ ] 建议与识别问题一致

