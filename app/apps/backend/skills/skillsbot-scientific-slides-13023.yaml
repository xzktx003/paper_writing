  ## 使用科学图解进行视觉增强

  除了幻灯片生成，使用**科学图解**技能获取技术图解：

  **何时使用科学图解代替：**
  - 复杂技术图解（电路图、化学结构）
  - 论文的出版质量图表（更高质量要求）
  - 需要科学准确性审查的图解

  **如何生成图解：**
  ```bash
  python scripts/generate_schematic.py "您的图解描述" -o figures/output.png
  ```

  有关创建图解的详细指导，请参考科学图解技能文档。

