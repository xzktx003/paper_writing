  # 科学幻灯片

  ## 概述

  科学演示是交流研究、分享发现并与学术和专业受众互动的关键媒介。本技能提供创建有效科学演示的全面指导，从结构和内容发展到视觉设计和交付准备。

  **关键重点**: 会议、研讨会、答辩和专业演讲的口头演示。

  **关键设计理念**: 科学演示应具有视觉吸引力和研究支持。避免枯燥、文字密集的幻灯片。优秀的科学演示结合：
  - **引人注目的视觉元素**: 高质量的图表、图像、图解（不仅仅是项目符号）
  - **研究背景**: 通过研究查找建立可信度的适当引用
  - **最小化文字**: 项目符号作为提示，您口头提供解释
  - **专业设计**: 现代配色方案、强烈的视觉层次、充足的白边
  - **故事驱动**: 清晰的叙事弧线，不仅仅是数据堆砌

  **记住**: 枯燥的演示 = 被遗忘的科学。使幻灯片视觉上令人难忘，同时通过适当引用保持科学严谨性。

  ## 何时使用此技能

  此技能应在以下情况下使用：
  - 准备会议演示（5-20分钟）
  - 开发学术研讨会（45-60分钟）
  - 创建论文或学位答辩演示
  - 设计资助提案演示
  - 准备期刊俱乐部演示
  - 在机构或公司进行研究演讲
  - 关于科学主题的教学或教程演示

  ## 使用Nano Banana Pro生成幻灯片

  **此技能使用Nano Banana Pro AI自动生成令人惊叹的演示幻灯片。**

  ### 工作流程：PDF幻灯片

  使用Nano Banana Pro将每张幻灯片生成为完整图像，然后合并成PDF。这产生最视觉震撼的结果。

  **工作原理：**
  1. **规划幻灯片集**: 为每张幻灯片创建详细计划（标题、关键点、视觉元素）
  2. **生成幻灯片**: 调用Nano Banana Pro为每张幻灯片创建完整幻灯片图像
  3. **合并为PDF**: 将幻灯片图像组装成单个PDF演示文稿

  **步骤1：规划每张幻灯片**

  在生成之前，为演示创建详细计划：

  ```markdown
  # 演示计划：机器学习简介

  ## 幻灯片1：标题幻灯片
  - 标题："机器学习：从理论到实践"
  - 副标题："AI会议2025"
  - 演讲者：Jane Smith博士，XYZ大学
  - 视觉：现代抽象神经网络背景

  ## 幻灯片2：介绍
  - 标题："为什么机器学习重要"
  - 关键点：行业采用、突破性应用、未来潜力
  - 视觉：显示不同ML应用的图标（医疗保健、金融、机器人）

  ## 幻灯片3：核心概念
  - 标题："三种学习类型"
  - 内容：监督学习、无监督学习、强化学习
  - 视觉：显示每种类型及示例的三部分图解

  ...（为所有幻灯片继续）
  ```

  **步骤2：生成每张幻灯片**

  使用`generate_slide_image.py`脚本创建每张幻灯片。

  **关键：格式化一致性协议**

  为确保演示文稿中所有幻灯片的统一格式化：

  1. **定义格式化目标**在演示开始时，并在每个提示中包含：
     - 配色方案（例如："深蓝色背景、白色文字、金色点缀"）
     - 排版风格（例如："粗体无衬线标题、清晰正文文字"）
     - 视觉风格（例如："简约、专业、企业美学"）
     - 布局方法（例如："充足白边、左对齐内容"）

  2. **生成后续幻灯片时始终附加前一张幻灯片**使用`--attach`：
     - 这允许Nano Banana Pro查看并匹配现有样式
     - 创建整个幻灯片集的视觉连续性
     - 确保一致的色彩、字体和设计语言

  3. **默认作者为"K-Dense"**除非指定其他名称

  4. **在提示中直接包含引用**用于参考研究的幻灯片：
     - 在提示文本中添加引用，使其出现在生成的幻灯片上
     - 使用格式："包含引用：(作者等，年份)"或"显示参考文献：作者等，年份"
     - 对于多个引用，在提示中列出所有
     - 引用应出现在幻灯片底部的小文字中或相关内容附近

  5. **附加现有图表/数据用于结果幻灯片**（数据驱动演示的关键）：
     - 创建关于结果的幻灯片时，始终检查现有图表：
       - 工作目录（例如：`figures/`、`results/`、`plots/`、`images/`）
       - 用户提供的输入文件或目录
       - 任何与演示相关的数据可视化、图表或图形
     - 使用`--attach`包含这些图表，以便Nano Banana Pro可以整合它们：
       - 附加实际数据图表用于结果幻灯片
       - 附加相关图解用于方法论幻灯片
       - 附加徽标或机构图像用于标题幻灯片
     - 附加数据图表时，在提示中描述您想要的内容：
       - "创建一张幻灯片呈现附加的结果图表，突出关键发现"
       - "围绕此附加图表构建幻灯片，添加标题和项目符号解释数据"
       - "将附加图形整合到结果幻灯片中并附解释"
     - **生成结果幻灯片前**: 列出工作目录中的文件以找到相关图表
     - 可以附加多个图表：`--attach fig1.png --attach fig2.png`

  **示例：格式化一致性、引用和图表附件：**

  ```bash
  # 标题幻灯片（第一张幻灯片 - 建立样式）
  python scripts/generate_slide_image.py "演示标题幻灯片：'机器学习：从理论到实践'。副标题：'AI会议2025'。演讲者：K-Dense。格式化目标：深蓝色背景(#1a237e)、白色文字、金色点缀(#ffc107)、简约设计、无衬线字体、充足边距、无装饰元素。" -o slides/01_title.png

  # 内容幻灯片带引用（附加前一张幻灯片以保持一致性）
  python scripts/generate_slide_image.py "演示幻灯片标题'为什么机器学习重要'。三个关键点带简单图标：1) 行业采用，2) 突破性应用，3) 未来潜力。引用：在底部以小文字包含：(LeCun等，2015; Goodfellow等，2016)。格式化目标：匹配附加幻灯片样式 - 深蓝色背景、白色文字、金色点缀、简约专业设计、无视觉杂乱。" -o slides/02_intro.png --attach slides/01_title.png

  # 背景幻灯片带多个引用
  python scripts/generate_slide_image.py "演示幻灯片标题'深度学习革命'。关键里程碑：ImageNet突破(2012)、Transformer架构(2017)、GPT模型(2018-至今)。引用：在底部显示参考文献：(Krizhevsky等，2012; Vaswani等，2017; Brown等，2020)。格式化目标：精确匹配附加幻灯片样式 - 相同色彩、字体、简约设计。" -o slides/03_background.png --attach slides/02_intro.png

  # 结果幻灯片 - 从工作目录附加实际数据图表
  # 首先，检查存在哪些图表：ls figures/ 或 ls results/
  python scripts/generate_slide_image.py "演示幻灯片标题'模型性能结果'。创建一张幻灯片呈现附加的准确率图表。要突出的关键发现：1) 达到95%准确率，2) 比基线高12%，3) 在测试集上一致。引用：在底部包含：(我们的结果，2025)。格式化目标：精确匹配附加幻灯片样式。" -o slides/04_results.png --attach slides/03_background.png --attach figures/accuracy_chart.png

  # 结果幻灯片 - 多图表比较
  python scripts/generate_slide_image.py "演示幻灯片标题'前后对比'。使用两张附加图表构建并排比较幻灯片。左：基线结果，右：我们的改进结果。添加简要标签解释改进。格式化目标：精确匹配附加幻灯片样式。" -o slides/05_comparison.png --attach slides/04_results.png --attach figures/baseline.png --attach figures/improved.png

  # 方法论幻灯片 - 附加现有图解
  python scripts/generate_slide_image.py "演示幻灯片标题'系统架构'。呈现附加的架构图解并附简要解释项目符号：1) 输入处理，2) 模型推理，3) 输出生成。格式化目标：精确匹配附加幻灯片样式。" -o slides/06_architecture.png --attach slides/05_comparison.png --attach diagrams/system_architecture.png
  ```

  **重要：创建结果幻灯片前，始终：**
  1. 列出工作目录文件：`ls -la figures/` 或 `ls -la results/`
  2. 检查用户提供的目录以找到相关图表
  3. 附加所有应出现在幻灯片上的相关图表
  4. 描述Nano Banana Pro应如何整合附加图表

  **提示模板：**

  在每个提示中包含这些元素（根据需要自定义）：
  ```
  [幻灯片内容描述]
  引用：在底部包含：(作者1等，年份; 作者2等，年份)
  格式化目标：[背景颜色]、[文字颜色]、[点缀颜色]、简约专业设计、无装饰元素、与附加幻灯片样式一致。
  ```

  **步骤3：合并为PDF**

  ```bash
  # 将所有幻灯片合并成PDF演示文稿
  python scripts/slides_to_pdf.py slides/*.png -o presentation.pdf
  ```

