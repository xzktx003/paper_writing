  ## 核心能力

  ### 1. 演示结构和组织

  构建具有清晰叙事流和适当结构的演示，适用于不同上下文。详细指导请参考`references/presentation_structure.md`。

  **通用故事弧线：**
  1. **钩子**: 吸引注意力（30-60秒）
  2. **背景**: 建立重要性（演讲的5-10%）
  3. **问题/差距**: 确定未知内容（演讲的5-10%）
  4. **方法**: 解释您的解决方案（演讲的15-25%）
  5. **结果**: 呈现关键发现（演讲的40-50%）
  6. **意义**: 讨论含义（演讲的15-20%）
  7. **结尾**: 令人难忘的结论（1-2分钟）

  **演讲特定结构：**
  - **会议演讲（15分钟）**: 专注于1-2个关键发现，最小化方法
  - **学术研讨会（45分钟）**: 全面覆盖，详细方法，多项研究
  - **论文答辩（60分钟）**: 完整论文概述，涵盖所有研究
  - **资助提案（15分钟）**: 强调重要性、可行性和影响
  - **期刊俱乐部（30分钟）**: 对发表作品的批判性分析

  ### 2. 幻灯片设计原则

  创建专业、可读且易于访问的幻灯片，增强理解。完整设计指南请参考`references/slide_design_principles.md`。

  **反模式：避免枯燥、文字密集的演示**

  ❌ **使演示枯燥且易被遗忘的因素：**
  - 文字墙（每张幻灯片超过6个项目符号）
  - 小字体（<24点正文文字）
  - 仅黑字白底（无视觉兴趣）
  - 无图像或图形（仅项目符号）
  - 无自定义的通用模板
  - 密集、段落式的项目符号
  - 缺少研究背景（无引用）
  - 所有幻灯片看起来相同（重复）

  ✅ **使演示引人注目且令人难忘的因素：**
  - 高质量视觉元素主导（图表、照片、图解、图标）
  - 大而清晰的文字作为点缀（非主要内容）
  - 现代、有目的的配色方案（非默认主题）
  - 充足白边（幻灯片呼吸）
  - 研究支持背景（通过研究查找的适当引用）
  - 幻灯片布局多样（非全是项目符号列表）
  - 故事驱动的流与视觉锚点
  - 专业、精致的外观

  **核心设计原则：**

  **视觉优先方法**（关键）：
  - 从视觉开始（图表、图像、图解），添加文字作为支持
  - 每张幻灯片应具有强烈的视觉元素（图表、图表、照片、图解）
  - 文字解释或补充视觉，而非替代
  - 思考："如何展示此内容，而非仅讲述？"
  - 目标：60-70%视觉内容，30-40%文字

  **简洁而有影响：**
  - 每张幻灯片一个主要想法
  - 最小化文字（3-4个项目符号，每个4-6字为佳）
  - 充足白边（占幻灯片的40-50%）
  - 清晰的视觉焦点
  - 大胆、自信的设计选择

  **排版以增强参与度：**
  - 无衬线字体（Arial、Calibri、Helvetica）
  - 大字体：正文文字24-28点（非最小18点）
  - 幻灯片标题36-44点（加粗）
  - 高对比度（最小4.5:1，推荐7:1）
  - 使用大小建立层次，不仅重量

  **色彩以增强影响：**
  - 现代调色板（非默认蓝/灰）
  - 考虑您的主题：生物技术？鲜艳色彩。物理？时尚深色。健康？温暖色调。
  - 有限调色板（总共3-5种颜色）
  - 高对比度组合
  - 色盲安全（避免红绿组合）
  - 有目的地使用色彩（非装饰）

  **布局以增强视觉兴趣：**
  - 变化布局（非全是项目符号列表）
  - 使用两列布局（文字 + 图表）
  - 关键结果的全幻灯片图表
  - 不对称构图（比居中更有趣）
  - 焦点点的三分法则
  - 一致但不重复

  ### 3. 幻灯片的数据可视化

  为演示上下文调整科学图表。详细指导请参考`references/data_visualization_slides.md`。

  **与期刊图表的主要区别：**
  - 简化，非复制
  - 更大字体（最小18-24点）
  - 较少面板（跨幻灯片分割）
  - 直接标签（非图例）
  - 通过色彩和大小强调
  - 复杂数据的渐进披露

  **可视化最佳实践：**
  - **条形图**: 比较离散类别
  - **线图**: 趋势和轨迹
  - **散点图**: 关系和相关性
  - **热力图**: 矩阵数据和模式
  - **网络图**: 关系和连接

  **常见错误避免：**
  - 小字体（<18点）
  - 一张幻灯片上过多面板
  - 复杂图例
  - 对比度不足
  - 杂乱布局

  ### 4. 演讲特定指导

  不同的演示上下文需要不同方法。每种类型的全面指导请参考`references/talk_types_guide.md`。

  **会议演讲**（10-20分钟）：
  - 结构：简短介绍 → 最小方法 → 关键结果 → 快速结论
  - 重点：仅1-2个主要发现
  - 风格：引人注目、快节奏、令人难忘
  - 目标：产生兴趣、建立联系、获得邀请

  **学术研讨会**（45-60分钟）：
  - 结构：全面覆盖，详细方法
  - 重点：多项发现、分析深度
  - 风格：学术、互动、讨论导向
  - 目标：展示专业知识、获得反馈、合作

  **论文答辩**（45-60分钟）：
  - 结构：完整论文概述，所有研究
  - 重点：展示掌握和独立思考
  - 风格：正式、全面、准备接受质询
  - 目标：通过审查、辩护研究决策

  **资助提案**（10-20分钟）：
  - 结构：问题 → 重要性 → 方法 → 可行性 → 影响
  - 重点：创新、初步数据、团队资格
  - 风格：有说服力、专注于结果和影响
  - 目标：确保资金、展示可行性

  **期刊俱乐部**（20-45分钟）：
  - 结构：背景 → 方法 → 结果 → 批判性分析
  - 重点：理解和批评发表作品
  - 风格：教育性、批判性、促进讨论
  - 目标：学习、批评、讨论含义

  ### 5. 视觉审查和迭代

  通过视觉检查实施迭代改进。完整工作流程请参考`references/visual_review_workflow.md`。

  **视觉验证工作流程：**

  **步骤1：PDF转换为图像**
  ```bash
  # 使用pdf_to_images脚本
  python scripts/pdf_to_images.py presentation.pdf review/slide --dpi 150
  ```

  **步骤2：系统检查**

  检查每张幻灯片：
  - **文字溢出**: 文字在边缘被截断
  - **元素重叠**: 文字与图像或其他文字重叠
  - **字体大小**: 文字太小（<18点）
  - **对比度**: 文字与背景之间对比度不足
  - **布局问题**: 不对齐、间距差
  - **视觉质量**: 像素化图像、渲染差

  **步骤3：记录问题**

  创建问题日志：
  ```
  幻灯片号 | 问题类型 | 描述 | 优先级
  --------|-----------|-------------|----------
  3       | 文字溢出 | 项目符号4超出框 | 高
  7       | 重叠 | 图表与标题重叠 | 高
  12      | 字体大小 | 轴标签太小 | 中
  ```

  **步骤4：重新生成问题幻灯片**

  使用改进的提示重新生成有问题的幻灯片，然后重新合并为PDF。

  **步骤5：重新验证**

  重复步骤1-4，直到无关键问题。

  **停止标准：**
  - 无文字溢出
  - 无不适当重叠
  - 所有文字可读（≥18点等效）
  - 足够对比度（≥4.5:1）
  - 专业外观

  ### 6. 计时和节奏

  确保演示适合分配时间。全面计时指导请参考`assets/timing_guidelines.md`。

  **一分钟一张幻灯片规则：**
  - 通用指南：约1张幻灯片每分钟
  - 复杂幻灯片调整（2-3分钟）
  - 简单幻灯片调整（15-30秒）

  **时间分配：**
  - 介绍：15-20%
  - 方法：15-20%
  - 结果：40-50%（最多时间）
  - 讨论：15-20%
  - 结论：5%

  **练习要求：**
  - 5分钟演讲：练习5-7次
  - 15分钟演讲：练习3-5次
  - 45分钟演讲：练习3-4次
  - 答辩：练习4-6次

  **计时检查点：**

  对于15分钟演讲：
  - 3-4分钟：完成介绍
  - 7-8分钟：完成一半结果
  - 12-13分钟：开始结论

  **紧急策略：**
  - 落后：跳过备用幻灯片（提前准备）
  - 超前：扩展示例、稍慢
  - 绝不跳过结论

  ### 7. 验证和质量保证

  **自动验证：**
  ```bash
  # 验证幻灯片计数、计时、文件大小
  python scripts/validate_presentation.py presentation.pdf --duration 15

  # 生成报告：
  # - 幻灯片计数与推荐范围
  # - 文件大小警告
  # - 幻灯片尺寸
  ```

  **手动验证清单：**
  - [ ] 幻灯片计数适合时长
  - [ ] 标题幻灯片完整（姓名、机构、日期）
  - [ ] 清晰叙事流
  - [ ] 每张幻灯片一个主要想法
  - [ ] 字体大小≥18点（推荐24点+）
  - [ ] 高对比度色彩
  - [ ] 图表大且可读
  - [ ] 无文字溢出或元素重叠
  - [ ] 整个设计一致
  - [ ] 幻灯片编号存在
  - [ ] 最终幻灯片联系信息
  - [ ] 备用幻灯片准备
  - [ ] 在投影仪上测试（如可能）

  ## 演示开发工作流程

  ### 阶段1：规划（创建幻灯片前）

  **定义背景：**
  1. 何种演讲类型？（会议、研讨会、答辩等）
  2. 时长？（分钟）
  3. 受众是谁？（专家、一般、混合）
  4. 场地？（房间大小、A/V设置、虚拟/现场）
  5. 之后发生什么？（问答、讨论、建立联系）

  **研究和文献回顾**（使用研究查找技能）：
  1. **搜索背景文献**: 找到5-10篇建立背景的关键论文
  2. **识别知识差距**: 使用研究查找找到未知内容
  3. **定位比较研究**: 找到具有类似方法或结果的论文
  4. **收集支持引用**: 收集支持您解释的论文
  5. **构建参考文献列表**: 为幻灯片创建.bib文件或引用列表
  6. **记录要引用的关键发现**: 记录要参考的具体结果

  **开发内容大纲：**
  1. 确定1-3个核心信息
  2. 选择要呈现的关键发现
  3. 选择基本图表（通常15分钟演讲3-6个）
  4. 计划带适当引用的叙事弧线
  5. 按部分分配时间

  **15分钟演讲大纲示例：**
  ```
  1. 标题（30秒）
  2. 钩子：引人注目的问题（60秒）[通过研究查找引用1-2篇论文]
  3. 背景（90秒）[引用3-4篇建立背景的关键论文]
  4. 研究问题（45秒）[引用显示差距的论文]
  5. 方法概述（2分钟）
  6-8. 主要结果1（3分钟，3张幻灯片）
  9-10. 主要结果2（2分钟，2张幻灯片）
  11-12. 结果3或验证（2分钟，2张幻灯片）
  13-14. 讨论和含义（2分钟）[与2-3篇先前研究比较]
  15. 结论（45秒）
  16. 致谢（15秒）

  注意：创建幻灯片前，使用研究查找找到背景（幻灯片2-4）和讨论（幻灯片13-14）的论文。
  ```

  ### 阶段2：设计和创建

  **设计考虑**（使其视觉吸引）：
  - **选择现代调色板**: 匹配您的主题（生物技术=鲜艳、物理=时尚深色、健康=温暖色调）
    - 非默认蓝/灰主题
    - 3-5种高对比度色彩
  - **选择清洁字体**: 无衬线、大字体（正文24点+）
  - **规划视觉元素**: 每张幻灯片使用何种图像、图解、图标？
  - **创建多样布局**: 混合全图表、两列、文字覆盖（非全是项目符号）
  - **设计部分分隔符**: 带醒目图形的视觉中断
  - **添加视觉兴趣**: 背景图像、色彩块、形状、图标
  - **定义格式化目标**: 在每个提示中包含一致样式（色彩、字体、风格）

  ### 阶段3：内容开发

  **填充幻灯片**（视觉优先策略）：
  1. **从视觉开始**: 计划每个关键点使用哪些图表、图像、图解
  2. **广泛使用研究查找**: 找到8-15篇论文以适当引用
  3. **首先创建视觉骨干**: 添加所有图表、图表、图像、图解
  4. **添加最小化文字作为支持**: 项目符号补充视觉，而非替代
  5. **设计部分分隔符**: 带图像或图形的视觉中断（非仅文字）
  6. **润色标题/结尾**: 使其视觉醒目，包括联系信息
  7. **添加过渡/构建**: 控制信息流

  **视觉内容要求**（使幻灯片引人注目）：
  - **图像**: 使用高质量照片、插图、概念图形
  - **图标**: 概念的视觉表示（非装饰）
  - **图解**: 流程图、示意图、过程图
  - **图表**: 带大标签（18-24点）的简化研究图表
  - **图表**: 清洁数据可视化，带清晰信息
  - **图形**: 视觉隐喻、概念插图
  - **色彩块**: 使用有色形状以视觉组织内容
  - 目标：每张幻灯片最小1-2个强烈视觉元素

  **科学内容**（研究支持）：
  - **引用**: 广泛使用研究查找找到相关论文
    - 介绍：引用3-5篇建立背景和差距的论文
    - 背景：视觉显示关键先前工作（非仅引用）
    - 讨论：引用3-5篇论文与您的结果比较
    - 使用作者-年份格式（Smith等，2023）以提高可读性
    - 引用建立可信度和科学严谨性
  - **图表**: 从论文简化，大标签（最小18-24点）
  - **方程**: 大、清晰、解释每个术语（谨慎使用）
  - **表格**: 最小、突出关键比较（非数据堆砌）
  - **代码/算法**: 使用语法高亮，保持简洁

  **文字指南**（少即是多）：
  - 项目符号，绝无段落
  - 每张幻灯片3-4个项目符号（最多6个仅当必要）
  - 每个项目符号4-6字（短于6×6规则）
  - 关键词加粗
  - 文字是支持角色，视觉是明星
  - 使用构建以控制节奏

  ### 阶段4：视觉验证

  **生成图像：**
  ```bash
  # PDF转换为图像
  python scripts/pdf_to_images.py presentation.pdf review/slides
  ```

  **系统审查：**
  1. 查看每张幻灯片图像
  2. 对照问题清单检查
  3. 用幻灯片号记录问题
  4. 测试距离可读性（以50%大小查看）

  **要修复的常见问题：**
  - 文字超出边界
  - 图表与文字重叠
  - 字体大小太小
  - 对比度差
  - 不对齐

  **迭代：**
  1. 识别生成幻灯片中的问题
  2. 使用改进提示重新生成问题幻灯片
  3. 重新合并为PDF
  4. 重新检查
  5. 重复直到清洁

  ### 阶段5：练习和精炼

  **练习时间表：**
  - 运行1：草稿（会超时）
  - 运行2：平滑过渡
  - 运行3：精确计时
  - 运行4：最终润色
  - 运行5+：维护（前一天、当天早上）

  **练习内容：**
  - 带计时器的完整演讲
  - 困难解释
  - 部分间过渡
  - 开场和结尾（直到完美）
  - 预期问题

  **基于练习的精炼：**
  - 如果超时，减少幻灯片
  - 如果不清楚，扩展解释
  - 调整措辞以提高清晰度
  - 标记计时检查点
  - 准备备用幻灯片

  ### 阶段6：最终准备

  **技术检查：**
  - [ ] 多个副本保存（笔记本电脑、云、USB）
  - [ ] 在演示计算机上工作
  - [ ] 适配器/电缆可用
  - [ ] 备份PDF版本
  - [ ] 用投影仪测试（如可能）

  **内容最终：**
  - [ ] 无拼写错误或错误
  - [ ] 所有图表高质量
  - [ ] 幻灯片编号正确
  - [ ] 最终幻灯片联系信息
  - [ ] 备用幻灯片准备

  **交付准备：**
  - [ ] 笔记准备（如使用）
  - [ ] 计时器/电话就绪
  - [ ] 水可用
  - [ ] 名片/讲义
  - [ ] 熟悉材料（练习3次以上）

  ## 与其他技能集成

  **研究查找**（科学演示的关键）：
  - **背景开发**: 搜索文献以构建介绍背景
  - **引用收集**: 找到要在演讲中引用的关键论文
  - **差距识别**: 识别未知内容以激励研究
  - **先前工作比较**: 找到论文与您的结果比较
  - **支持证据**: 定位支持您解释的文献
  - **问题准备**: 找到可能告知问答回复的论文
  - **开发任何科学演示时始终使用研究查找**以确保适当背景和引用

  **科学写作：**
  - 将论文内容转换为演示格式
  - 提取关键发现并简化
  - 使用相同图表（但为幻灯片重新设计）
  - 保持一致术语

  **数据可视化：**
  - 创建适合演示的图表
  - 简化复杂可视化
  - 确保距离可读性
  - 使用渐进披露

  ## 常见陷阱避免

  ### 内容错误

  **枯燥、无聊的演示**（关键避免）：
  - 问题：文字密集幻灯片无视觉兴趣，缺少研究背景
  - 迹象：全是项目符号、无图像、默认模板、无引用
  - 解决方案：
    - 使用研究查找找到8-15篇论文以获得可信背景
    - 为每张幻灯片添加高质量视觉元素（图表、照片、图解、图标）
    - 选择反映您主题的现代调色板
    - 变化幻灯片布局（非全是项目符号列表）
    - 用视觉讲故事，谨慎使用文字

  **内容过多：**
  - 问题：尝试包括论文中的所有内容
  - 解决方案：短演讲专注于1-2个关键发现，视觉展示

  **文字过多：**
  - 问题：幻灯片上完整段落、密集项目符号、逐字朗读
  - 解决方案：3-4个项目符号，每个4-6字，让视觉传递信息

  **缺少研究背景：**
  - 问题：无引用、无支持的声称、定位不清晰
  - 解决方案：使用研究查找找到论文，介绍中引用3-5篇，讨论中引用3-5篇

  **叙事差：**
  - 问题：主题间跳跃、无清晰故事、无流动
  - 解决方案：遵循故事弧线，使用视觉过渡，保持线索

  **匆忙通过结果：**
  - 问题：简要方法、简要结果、长讨论
  - 解决方案：花费40-50%时间在结果上，视觉展示数据

  ### 设计错误

  **通用、默认外观：**
  - 问题：使用无自定义的通用样式，显得过时
  - 解决方案：在提示中选择现代调色板，指定字体/布局，添加视觉个性

  **文字密集、视觉贫乏：**
  - 问题：全是项目符号幻灯片，无图像或图形，看起来无聊
  - 解决方案：为每张幻灯片添加图表、照片、图解、图标，使其视觉有趣

  **小字体：**
  - 问题：正文文字<18点，后面不可读，显得不专业
  - 解决方案：正文24-28点（非仅18点最小），标题36-44点

  **低对比度：**
  - 问题：浅色文字浅背景、可见性差、难以阅读
  - 解决方案：高对比度（推荐7:1，非仅4.5:1最小），用对比度检查器测试

  **杂乱幻灯片：**
  - 问题：太多元素、无白边、压倒性
  - 解决方案：每张幻灯片一个想法、40-50%白边、充足间距

  **不一致格式化：**
  - 问题：幻灯片间不同字体、色彩、布局，显得业余
  - 解决方案：使用主幻灯片，维护设计系统，专业一致

  **缺少视觉层次：**
  - 问题：所有相同大小和色彩、无强调、焦点不清晰
  - 解决方案：大小差异（标题大、正文中）、色彩强调、清晰焦点

  ### 计时错误

  **不练习：**
  - 问题：第一次是在演示期间
  - 解决方案：用计时器至少练习3次

  **无计时检查点：**
  - 问题：直到太晚才意识到落后
  - 解决方案：设置3-4个检查点，全程监控

  **超时：**
  - 问题：极不专业，削减问答时间
  - 解决方案：练习到精确时间，准备计划B（跳过幻灯片）

  **跳过结论：**
  - 问题：时间耗尽，匆忙结束或跳过结尾
  - 解决方案：绝不跳过结论，反而削减早期内容

  ## 工具和脚本

  ### Nano Banana Pro脚本

  **generate_slide_image.py** - 用AI生成幻灯片：
  ```bash
  # 生成完整幻灯片
  python scripts/generate_slide_image.py "标题：介绍\n内容：关键点" -o slide.png

  # 选项：
  # -o, --output       输出文件路径（必需）
  # --attach IMAGE     附加参考图像作为上下文
  # --iterations N     最大细化迭代次数（默认：2）
  # -v, --verbose      详细输出
  ```

  **slides_to_pdf.py** - 将幻灯片图像合并为PDF：
  ```bash
  # 从通配符模式
  python scripts/slides_to_pdf.py slides/*.png -o presentation.pdf

  # 从目录（按文件名排序）
  python scripts/slides_to_pdf.py slides/ -o presentation.pdf

  # 选项：
  # -o, --output    输出PDF路径（必需）
  # --dpi N         PDF分辨率（默认：150）
  # -v, --verbose   详细输出
  ```

  ### 验证脚本

  **validate_presentation.py**：
  ```bash
  python scripts/validate_presentation.py presentation.pdf --duration 15

  # 检查：
  # - 幻灯片计数与推荐范围
  # - 文件大小警告
  # - 幻灯片尺寸
  ```

  **pdf_to_images.py**：
  ```bash
  python scripts/pdf_to_images.py presentation.pdf output/slide --dpi 150

  # 将PDF转换为图像以进行视觉检查
  # 支持：JPG、PNG
  # 可调DPI
  # 页面范围选择
  ```

