  # NanoHUB 模拟器接口

  ## 目的

  NanoHUB 模拟器接口技能提供对 NanoHUB 在线纳米科学模拟工具的访问，能够快速进行计算并探索纳米尺度现象。

  ## 能力

  - 量子点模拟 (NEMO)
  - 碳纳米管 (CNT) 属性计算器
  - 纳米线输运建模
  - 能带结构可视化
  - 交互式模拟执行
  - 结果提取与分析

  ## 使用指南

  ### NanoHUB 集成

  1. **工具选择**
     - 识别合适的模拟器
     - 理解输入要求
     - 检查计算限制

  2. **模拟执行**
     - 通过 API 提交任务
     - 监控进度
     - 检索结果

  3. **分析**
     - 解析输出文件
     - 提取关键参数
     - 可视化结果

  ## 流程集成

  - 多尺度建模集成
  - 用于纳米材料的 DFT 计算流程

  ## 输入模式

  ```json
  {
    "tool_name": "string",
    "input_parameters": {},
    "execution_mode": "batch|interactive"
  }
  ```

  ## 输出模式

  ```json
  {
    "job_id": "string",
    "status": "completed|running|failed",
    "results": {},
    "output_files": ["string"],
    "execution_time": "number (seconds)"
  }
  ```
