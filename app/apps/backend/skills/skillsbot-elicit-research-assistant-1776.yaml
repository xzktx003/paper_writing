  # Elicit研究助手

  ## 目的

  提供AI辅助的文献综述能力，支持对研究论文进行问答、主张提取和证据综合。

  ## 功能

  - 对研究论文进行问答
  - 主张提取与验证
  - 证据强度评估
  - 方法论比较
  - 跨论文发现综合
  - 研究缺口识别

  ## 使用指南

  1. **问题表述**：提出具体、可回答的问题
  2. **主张提取**：识别关键主张及其支持依据
  3. **证据评估**：评估证据强度
  4. **综合**：汇总多篇论文的发现

  ## 工具/库

  - Elicit API
  - LangChain
  - 向量数据库
