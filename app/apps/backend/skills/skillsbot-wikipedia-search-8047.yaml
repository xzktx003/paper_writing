  name: wikipedia-search
  description: 维基百科文章搜索和检索
  ---

  # 维基百科

  ## 可用工具

  - **wikipedia_search(query)**: 搜索维基百科中匹配查询的文章。
    - `query`（字符串，必需）：搜索查询

  - **wikipedia_get_article(title, summary_only?)**: 通过准确标题获取维基百科文章内容。
    - `title`（字符串，必需）：文章标题（区分大小写，使用搜索结果的准确标题）
    - `summary_only`（布尔值，可选，默认：false）：仅返回摘要而不是全文

  ## 使用指南

  - 首先使用 `wikipedia_search` 找到正确的文章标题，然后使用 `wikipedia_get_article` 获取完整内容。
  - 文章标题区分大小写 — 使用搜索结果的准确标题。
  - 当不需要完整文章内容时，使用 `summary_only=true` 进行快速事实查找。
  - 维基百科内容最适合背景信息、定义和历史背景。

  ## 引用格式

  当呈现来自维基百科的信息时，将每个具体声明包装在 `<cite>` 标签中：

  ```
  <cite source="Wikipedia: ARTICLE_TITLE" url="https://en.wikipedia.org/wiki/ARTICLE_TITLE">claim text</cite>
  ```

  **规则：**
  - 引用事实声明、统计数据、日期和文章中的具体信息。
  - `source` 属性应包含文章标题（例如，`"Wikipedia: Quantum Computing"`）。
  - `url` 属性应包含维基百科文章的URL。
  - 不要引用自己的推理或一般知识。
  - 使用必要的最少引用数量来支持声明。
