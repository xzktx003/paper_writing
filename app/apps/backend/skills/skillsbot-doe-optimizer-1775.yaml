  # DOE优化器技能

  ## 目的

  使用实验设计（DOE）原理优化实验设计，以实现高效的因素筛选和响应优化。

  ## 能力

  - 创建析因设计
  - 生成部分析因设计
  - 构建响应曲面设计
  - 优化因素水平
  - 分析设计属性
  - 生成实验运行顺序

  ## 使用指南

  1. 定义因素和水平
  2. 选择设计类型
  3. 生成设计矩阵
  4. 分析属性
  5. 按需优化
  6. 规划执行顺序

  ## 流程集成

  在科学发现工作流程中用于：
  - 工艺优化
  - 因素筛选
  - 响应建模
  - 高效实验

  ## 配置

  - 设计类型选择
  - 因素规格
  - 分辨率要求
  - 优化标准

  ## 输出成果

  - 设计矩阵
  - 运行顺序列表
  - 属性分析
  - 优化结果
