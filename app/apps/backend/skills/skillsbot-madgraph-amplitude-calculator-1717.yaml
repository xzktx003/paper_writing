  # MadGraph振幅计算器

  ## 目的

  为BSM物理的MadGraph矩阵元计算提供专家指导，包括UFO模型导入、NLO计算和级联匹配。

  ## 能力

  - UFO模型导入与验证
  - 过程生成与优化
  - NLO计算设置
  - 部分子级事件生成
  - 与Pythia/Herwig的级联匹配
  - 带不确定性的截面提取

  ## 使用指南

  1. **模型导入**：导入用于BSM物理的UFO模型
  2. **过程生成**：为所需过程生成矩阵元
  3. **NLO修正**：需要时配置NLO计算
  4. **匹配**：设置用于强子化的级联匹配
  5. **不确定性**：评估标度和PDF不确定性

  ## 工具/库

  - MadGraph5_aMC@NLO
  - UFO模型
  - FeynRules
