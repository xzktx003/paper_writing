  # 同行评审模拟器技能

  ## 目的

  模拟稿件的同行评审反馈，以识别潜在问题并在提交前提高质量。

  ## 能力

  - 分析稿件质量
  - 识别方法论问题
  - 检查统计有效性
  - 评估表述清晰度
  - 生成评审意见
  - 优先级排序改进项

  ## 使用指南

  1. 加载稿件
  2. 分析结构
  3. 评审方法论
  4. 检查统计
  5. 生成反馈
  6. 优先级排序问题

  ## 流程集成

  在科学发现工作流程中用于：
  - 提交前评审
  - 质量改进
  - 稿件精炼
  - 作者准备

  ## 配置

  - 评审标准
  - 严格程度
  - 重点领域
  - 输出格式

  ## 输出成果

  - 评审报告
  - 意见摘要
  - 问题优先级排序
  - 改进建议
