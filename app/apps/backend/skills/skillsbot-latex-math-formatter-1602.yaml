  # LaTeX数学公式格式化工具

  ## 目的

  为出版级文档提供高质量的LaTeX数学排版能力。

  ## 功能

  - 公式格式化和对齐
  - 定理环境生成
  - 证明环境结构化
  - AMS-LaTeX包使用
  - 交叉引用管理
  - 参考文献生成（BibTeX）

  ## 使用指南

  1. **环境选择**: 使用合适的定理/证明环境
  2. **公式对齐**: 对多行公式应用对齐环境
  3. **编号**: 保持定理和公式编号的一致性
  4. **参考文献**: 正确的BibTeX引用格式

  ## 工具/库

  - LaTeX
  - AMS包
  - Overleaf API
