  # PyMeasure自动化

  ## 目的

  提供关于PyMeasure实验室自动化的专家指导，包括仪器控制和自动化测量程序。

  ## 能力

  - 仪器驱动程序库
  - 自动化测量程序
  - 实时数据记录
  - GUI生成
  - 错误处理与恢复
  - 多仪器协调

  ## 使用指南

  1. **仪器**: 使用内置或创建自定义驱动程序
  2. **程序**: 定义自动化测量程序
  3. **记录**: 在实验期间设置数据记录
  4. **GUI**: 为实验生成图形界面
  5. **错误处理**: 实现稳健的错误恢复机制

  ## 工具/库

  - PyMeasure
  - PyVISA
  - Qt
