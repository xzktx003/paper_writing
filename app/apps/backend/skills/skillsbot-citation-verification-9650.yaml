  # 引用验证参考指南

  学术论文写作中引用验证的参考指南，提供验证原则和最佳实践。

  **核心原则**：在写作过程中使用 WebSearch 和 Google Scholar 主动验证每个引用。

  ## 核心问题

  学术论文中的引用问题严重影响研究完整性：

  1. **虚假引用** – 引用不存在的论文（AI 生成引用的常见问题）
  2. **信息错误** – 作者、标题、年份等不匹配
  3. **格式不一致** – 混合的引用格式
  4. **缺失引用** – 被引用但未引用的工作

  这些问题可能导致：
  - 论文被拒或撤回
  - 学术声誉受损
  - 审稿人质疑研究严谨性

  **AI 辅助写作的特殊风险**：AI 生成的引用错误率约为 40%；每个引用必须通过 WebSearch 验证。

  ## 验证原则

  这个技能提供基于 WebSearch 和 Google Scholar 的验证原则：

  ### 1. 主动验证（在写作过程中验证）

  **核心思想**：在添加引用时立即验证，而不是在写作完成后检查。

  - 每次需要引用时，通过 WebSearch 搜索论文
  - 在 Google Scholar 上确认论文存在
  - 仅在验证通过后添加到参考文献

  ### 2. Google Scholar 验证

  **为什么使用 Google Scholar**：
  - 最全面的学术文献覆盖
  - 提供引用计数（可信度指标）
  - 直接提供 BibTeX 格式
  - 免费且无需 API

  **验证步骤**：
  1. WebSearch 查询：`"site:scholar.google.com [论文标题] [第一作者]"`
  2. 确认论文出现在结果中
  3. 检查引用计数（异常低的计数可能表示问题）
  4. 点击“Cite”获取 BibTeX

  ### 3. 信息匹配验证

  **必须匹配的信息**：
  - 标题（允许轻微差异，如大小写）
  - 作者（至少第一作者必须匹配）
  - 年份（允许 ±1 年差异，考虑预印本）
  - 发表场所（会议/期刊名称）

  ### 4. 声明验证

  **关键原则**：当引用特定声明时，必须确认该声明实际出现在论文中。

  - 使用 WebSearch 访问论文 PDF
  - 搜索相关关键词
  - 确认声明的准确性
  - 记录声明出现的部分/页码

  ## 验证工作流程

  ### 集成到写作过程中

  ```
  写作过程中需要引用
      ↓
  WebSearch 查找论文
      ↓
  Google Scholar 验证存在性
      ↓
  确认论文详情
      ↓
  获取 BibTeX
      ↓
  （如果引用特定声明）验证声明
      ↓
  添加到参考文献
  ```

  **关键点**：验证是写作过程的一部分，而不是单独的后处理步骤。

  ## 使用指南

  ### 与 ml-paper-writing 一起使用

  这个技能的验证原则已集成到 `ml-paper-writing` 技能的引用工作流程中。

  **自动触发**：在使用 ml-paper-writing 技能撰写论文时，会自动执行引用验证。

  **手动参考**：当需要详细的验证原则时，请参考此技能。

  ### 验证步骤示例

  **场景**：需要引用 Transformer 论文

  ```
  步骤 1：WebSearch 查找
  查询："Attention is All You Need Vaswani 2017"
  结果：找到论文的多个来源

  步骤 2：Google Scholar 验证
  查询："site:scholar.google.com Attention is All You Need Vaswani"
  结果：✅ 论文存在，50,000+ 引用，NeurIPS 2017

  步骤 3：确认详情
  - 标题："Attention is All You Need"
  - 作者：Vaswani, Ashish; Shazeer, Noam; Parmar, Niki; ...
  - 年份：2017
  - 场所：NeurIPS (NIPS)

  步骤 4：获取 BibTeX
  - 在 Google Scholar 上点击“Cite”
  - 选择 BibTeX 格式
  - 复制 BibTeX 条目

  步骤 5：添加到参考文献
  - 粘贴到 .bib 文件
  - 在论文中使用 \cite{vaswani2017attention}
  ```

  ### 处理验证失败

  **如果在 Google Scholar 上找不到论文**：

  1. **检查拼写** – 标题或作者名称是否正确？
  2. **尝试不同查询** – 使用不同的关键词组合
  3. **查找替代来源** – 尝试 arXiv、DOI
  4. **标记为待处理** – 使用 `[CITATION NEEDED]` 标记
  5. **通知用户** – 明确说明引用无法验证

  **如果信息不匹配**：

  1. **确认来源** – 您是否找到了正确的论文？
  2. **检查版本** – 预印本与发表版本
  3. **更新信息** – 使用最准确的版本
  4. **记录差异** – 注明差异的原因

  ## 最佳实践

  ### 防止虚假引用

  1. **切勿从记忆生成引用** – AI 生成的引用有 40% 错误率
  2. **使用 WebSearch 查找** – 通过 WebSearch 验证每个引用
  3. **在 Google Scholar 上确认** – 在 Google Scholar 上验证论文存在性
  4. **及时验证** – 在添加引用时验证，不要等到完成

  ### 处理验证失败

  1. **不要猜测** – 如果找不到论文，不要编造信息
  2. **清晰标记** – 使用 `[CITATION NEEDED]` 明确标记
  3. **通知用户** – 明确说明哪些引用无法验证
  4. **提供原因** – 解释验证失败的原因（未找到、信息不匹配等）

  ### 提高验证准确性

  1. **完整查询** – 包括标题、作者、年份
  2. **检查引用计数** – Google Scholar 上的引用计数是可信度指标
  3. **确认场所** – 验证会议/期刊名称是否正确
  4. **验证声明** – 当引用特定声明时，确认它们存在于论文中

  ### 常见陷阱

  ❌ **错误方法**：
  - 从记忆生成 BibTeX
  - 跳过 Google Scholar 验证
  - 假设论文存在
  - 不标记无法验证的引用

  ✅ **正确方法**：
  - 使用 WebSearch 搜索每个引用
  - 在 Google Scholar 上确认
  - 从 Google Scholar 复制 BibTeX
  - 清晰标记无法验证的引用

  ## 总结

  **核心原则**：在写作过程中使用 WebSearch 和 Google Scholar 主动验证每个引用。

  **关键步骤**：
  1. WebSearch 查找论文
  2. Google Scholar 验证存在性
  3. 确认详情
  4. 获取 BibTeX
  5. 验证声明（如果需要）
  6. 添加到参考文献

  **失败处理**：当验证失败时，标记为 `[CITATION NEEDED]` 并明确通知用户。

  **集成**：此技能的原则已集成到 ml-paper-writing 技能中，用于自动验证。
