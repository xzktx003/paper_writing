  # 随机化生成器技能

  ## 目的

  为实验设计生成随机化方案，包括简单随机化、分层随机化和适应性随机化等方法。

  ## 能力

  - 生成随机分配
  - 创建分层随机化
  - 实现区组随机化
  - 支持适应性设计
  - 确保分配隐藏
  - 记录随机化过程

  ## 使用指南

  1. 定义设计要求
  2. 选择随机化方法
  3. 配置参数
  4. 生成分配方案
  5. 验证平衡性
  6. 记录方案

  ## 流程集成

  适用于科学发现工作流中的：
  - 临床试验设计
  - 实验室实验
  - 实地研究
  - A/B测试

  ## 配置

  - 随机化方法
  - 分层因素
  - 区组大小
  - 种子管理

  ## 输出成果

  - 随机化列表
  - 分配序列
  - 平衡性检查
  - 方案文档
