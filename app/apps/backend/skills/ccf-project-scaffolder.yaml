content: |
  # CCF Project Scaffolder

  ## Overview
  Creates a complete paper project directory with the correct LaTeX template for the target CCF venue, initializes the shared ccfa.yaml state file, and sets up the directory structure.

  ## Artifacts
  - Project directory with LaTeX template
  - `ccfa.yaml` initialized with venue, stage, and artifact state
  - Standard directory structure (sections, figures, tables, bib)

  ## Output
  A ready-to-write paper project with the correct venue template.
