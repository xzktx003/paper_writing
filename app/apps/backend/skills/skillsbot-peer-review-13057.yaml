  ## 同行评审工作流程

  通过以下阶段系统性进行同行评审，根据手稿类型和学科调整深度和重点。

  ### 阶段1: 初步评估

  从高层次评估开始，确定手稿的范围、新颖性和整体质量。

  **关键问题：**
  - 核心研究问题或假设是什么？
  - 主要发现和结论是什么？
  - 工作是否科学合理且重要？
  - 工作是否适合目标场合？
  - 是否有任何立即的主要缺陷会妨碍发表？

  **输出：** 简要摘要（2-3句话），捕捉手稿的本质和初步印象。

  ### 阶段2: 详细的逐节评审

  对手稿的每个部分进行彻底评估，记录具体问题和优势。

  #### 摘要和标题
  - **准确性：** 摘要是否准确反映研究内容和结论？
  - **清晰度：** 标题是否具体、准确且信息丰富？
  - **完整性：** 关键发现和方法是否适当总结？
  - **可访问性：** 摘要是否对广泛的科学受众可理解？

  #### 引言
  - **背景：** 背景信息是否充分且最新？
  - **合理性：** 研究问题是否明确有动机和理由？
  - **新颖性：** 工作的原创性和重要性是否清晰表述？
  - **文献：** 相关先前研究是否适当引用？
  - **目标：** 研究目的/假设是否明确陈述？

  #### 方法
  - **可重复性：** 其他研究人员能否根据提供的描述复制研究？
  - **严谨性：** 方法是否适合解决研究问题？
  - **细节：** 协议、试剂、设备和参数是否充分描述？
  - **伦理：** 伦理批准、同意和数据处理是否适当记录？
  - **统计：** 统计方法是否适当、清晰描述和理由？
  - **验证：** 控制、重复和验证方法是否充分？

  **需要验证的关键元素：**
  - 样本大小和功率计算
  - 随机化和盲法程序
  - 纳入/排除标准
  - 数据收集协议
  - 计算方法和软件版本
  - 统计检验和多重比较校正

  #### 结果
  - **呈现：** 结果是否逻辑清晰地呈现？
  - **图表/表格：** 可视化是否适当、清晰且正确标注？
  - **统计：** 统计结果是否适当报告（效应大小、置信区间、p值）？
  - **客观性：** 结果是否未过度解读地呈现？
  - **完整性：** 是否包含所有相关结果，包括阴性结果？
  - **可重复性：** 是否提供原始数据或汇总统计？

  **常见问题识别：**
  - 选择性报告结果
  - 不适当的统计检验
  - 缺失误差条或变异性测量
  - 过度拟合或循环分析
  - 批次效应或混淆变量
  - 缺失控制或验证实验

  #### 讨论
  - **解读：** 结论是否得到数据支持？
  - **局限性：** 研究局限性是否承认和讨论？
  - **背景：** 发现是否适当置于现有文献中？
  - **推测：** 推测是否与数据支持的结论明确区分？
  - **重要性：** 影响和重要性是否清晰表述？
  - **未来方向：** 是否讨论下一步或未解问题？

  **红旗警告：**
  - 夸大结论
  - 忽略矛盾证据
  - 从相关性数据做出因果声称
  - 局限性讨论不足
  - 没有机制证据的机制声称

  #### 参考文献
  - **完整性：** 是否引用关键相关论文？
  - **时效性：** 是否包括近期重要研究？
  - **平衡性：** 是否适当引用对立观点？
  - **准确性：** 引用是否准确和适当？
  - **自引用：** 是否有过多或不适当的自引用？

  ### 阶段3: 方法论和统计严谨性

  评估研究的技术质量和严谨性，特别关注常见陷阱。

  **统计评估：**
  - 统计假设是否满足（正态性、独立性、同方差性）？
  - 是否报告效应大小以及p值？
  - 多重检验校正是否适当应用？
  - 是否提供置信区间？
  - 样本大小是否通过功率分析证明合理？
  - 参数与非参数检验是否适当选择？
  - 缺失数据是否正确处理？
  - 探索性与验证性分析是否区分？

  **实验设计：**
  - 控制是否适当且充分？
  - 重复是否足够（生物和技术）？
  - 潜在混淆因素是否识别和控制？
  - 随机化是否适当实施？
  - 盲法程序是否充分？
  - 实验设计是否针对研究问题最优？

  **计算/生物信息学：**
  - 计算方法是否清晰描述和理由？
  - 软件版本和参数是否记录？
  - 是否提供代码以确保可重复性？
  - 算法和模型是否适当验证？
  - 计算方法假设是否满足？
  - 批次校正是否适当应用？

  ### 阶段4: 可重复性和透明度

  评估研究是否满足现代可重复性和开放科学标准。

  **数据可用性：**
  - 原始数据是否存入适当存储库？
  - 是否提供公共数据库的访问号？
  - 数据共享限制是否合理（如患者隐私）？
  - 数据格式是否标准且可访问？

  **代码和材料：**
  - 分析代码是否可用（GitHub、Zenodo等）？
  - 独特材料是否可用或足够详细描述以重建？
  - 协议是否足够详细？

  **报告标准：**
  - 手稿是否遵循学科特定报告指南（CONSORT、PRISMA、ARRIVE、MIAME、MINSEQE等）？
  - 查看 `references/reporting_standards.md` 了解常见指南
  - 是否解决适当清单的所有元素？

  ### 阶段5: 图表和数据呈现

  评估数据可视化的质量、清晰度和完整性。

  **质量检查：**
  - 图表是否高分辨率且清晰标注？
  - 坐标轴是否正确标注单位？
  - 误差条是否定义（SD、SEM、CI）？
  - 统计显著性指标是否解释？
  - 配色方案是否适当且可访问（色盲友好）？
  - 图像是否包含比例尺？
  - 数据可视化是否适合数据类型？

  **完整性检查：**
  - 是否有图像处理迹象（重复、拼接）？
  - Western blots和凝胶是否适当呈现？
  - 代表性图像是否真正代表？
  - 是否显示所有条件（无选择性呈现）？

  **清晰度：**
  - 图表是否可独立存在于图例？
  - 每个图表的信息是否立即清晰？
  - 是否有冗余图表或面板？
  - 数据是否更适合以表格或图表呈现？

  ### 阶段6: 伦理考虑

  验证研究是否满足伦理标准和指南。

  **人类受试者：**
  - IRB/伦理批准是否记录？
  - 是否描述知情同意？
  - 弱势群体是否适当保护？
  - 患者隐私是否充分保护？
  - 潜在利益冲突是否披露？

  **动物研究：**
  - IACUC或等效批准是否记录？
  - 程序是否人道且合理？
  - 是否考虑3R原则（替代、减少、优化）？
  - 安乐死方法是否适当？

  **研究完整性：**
  - 是否有数据捏造或篡改的担忧？
  - 作者署名是否适当且合理？
  - 竞争利益是否披露？
  - 资金来源是否披露？
  - 是否有抄袭或重复发表的担忧？

  ### 阶段7: 写作质量和清晰度

  评估手稿的清晰度、组织和可访问性。

  **结构和组织：**
  - 手稿是否逻辑组织？
  - 部分是否连贯流动？
  - 想法之间的过渡是否清晰？
  - 叙事是否引人入胜且清晰？

  **写作质量：**
  - 语言是否清晰、精确且简洁？
  - 术语和缩写是否最小化并定义？
  - 语法和拼写是否正确？
  - 句子是否不必要地复杂？
  - 被动语态是否过度使用？

  **可访问性：**
  - 非专家是否能理解主要发现？
  - 技术术语是否解释？
  - 重要性是否对广泛受众清晰？

  ## 构建同行评审报告

  组织反馈为分层结构，优先处理问题并提供可操作指导。

  ### 总结陈述

  提供简洁的整体评估（1-2段）：
  - 研究简要概述
  - 整体推荐（接受、小修、大修、拒绝）
  - 关键优势（2-3个要点）
  - 关键弱点（2-3个要点）
  - 对重要性和合理性的底线评估

  ### 主要评论

  列出显著影响手稿有效性、可解释性或重要性的关键问题。按顺序编号以便参考。

  **主要评论通常包括：**
  - 基本方法论缺陷
  - 不适当的统计分析
  - 未支持或夸大的结论
  - 缺失关键控制或实验
  - 严重可重复性问题
  - 文献覆盖的主要空白
  - 伦理担忧

  **对于每个主要评论：**
  1. 明确陈述问题
  2. 解释为何有问题
  3. 建议具体解决方案或额外实验
  4. 指示解决是否对发表关键

  ### 次要评论

  列出不那么关键的问题，以改善清晰度、完整性或呈现。按顺序编号。

  **次要评论通常包括：**
  - 不清楚的图表标签或图例
  - 缺失的方法论细节
  - 排版或语法错误
  - 改善数据呈现的建议
  - 次要统计报告问题
  - 加强结论的补充分析
  - 澄清请求

  **对于每个次要评论：**
  1. 识别特定位置（部分、段落、图表）
  2. 明确陈述问题
  3. 建议如何解决

  ### 具体的逐行评论（可选）

  对于需要详细反馈的手稿，提供部分特定或逐行评论：
  - 引用特定页/行号或部分
  - 注意事实错误、不清楚陈述或缺失引用
  - 建议清晰度的具体编辑

  ### 作者问题

  列出需要澄清的具体问题：
  - 不清楚的方法论细节
  - 看似矛盾的结果
  - 需要评估工作的缺失信息
  - 额外数据或分析的请求

  ## 语气和方法

  在整个评审中保持建设性、专业和协作的语气。

  **最佳实践：**
  - **建设性：** 将批评作为改进机会框架
  - **具体：** 提供具体示例和可操作建议
  - **平衡：** 承认优势和弱点
  - **尊重：** 记住作者投入了显著努力
  - **客观：** 关注科学，而非科学家
  - **彻底：** 不忽视问题，但适当优先
  - **清晰：** 避免模糊或含糊批评

  **避免：**
  - 个人攻击或轻蔑语言
  - 讽刺或居高临下
  - 无具体示例的模糊批评
  - 请求超出范围的不必要实验
  - 要求遵守个人偏好而非最佳实践
  - 在双盲评审中透露身份

  ## 不同手稿类型的特殊考虑

  ### 原始研究文章
  - 强调严谨性、可重复性和新颖性
  - 评估重要性和影响
  - 验证结论是否数据驱动
  - 检查完整方法和适当控制

  ### 综述和荟萃分析
  - 评估文献覆盖的全面性
  - 评估搜索策略和纳入/排除标准
  - 验证系统方法且无偏倚
  - 检查批判性分析而非仅总结
  - 对于荟萃分析，评估统计方法和异质性

  ### 方法论文
  - 强调验证和与现有方法的比较
  - 评估可重复性和协议/代码可用性
  - 评估对现有方法的改进
  - 检查实施足够的细节

  ### 简短报告/信件
  - 适应简洁性的期望
  - 确保核心发现仍然严谨和重要
  - 验证格式是否适合发现

  ### 预印本
  - 认识到这些尚未经过正式同行评审
  - 可能不如期刊提交精致
  - 仍应用科学有效性的严格标准
  - 考虑在期刊提交前提供建设性反馈以帮助作者改进

  ### 演示文稿和幻灯片

  **⚠️ 关键：** 对于演示文稿，**永远不要直接阅读PDF**。**始终先转换为图像**。

  评审科学演示文稿（PowerPoint、Beamer、幻灯片）：

  #### 强制基于图像的评审工作流程

  **永远不要尝试直接阅读演示文稿PDF** - 这会导致缓冲区溢出错误，且不显示视觉格式问题。

  **必需过程：**
  1. 使用Python将PDF转换为图像：
     ```bash
     python skills/scientific-slides/scripts/pdf_to_images.py presentation.pdf review/slide --dpi 150
     # 创建：review/slide-001.jpg、review/slide-002.jpg 等
     ```
  2. 顺序阅读和检查每个幻灯片图像文件
  3. 记录特定幻灯片编号的问题
  4. 提供视觉格式和内容的反馈

  **开始评审时打印：**
  ```
  [HH:MM:SS] 同行评审：检测到演示文稿 - 转换为图像进行评审
  [HH:MM:SS] PDF 评审：永不直接读取PDF - 使用基于图像的检查
  ```

  #### 演示文稿特定评估标准

  **视觉设计和可读性：**
  - [ ] 文本足够大（最小18点，理想24点+用于正文文本）
  - [ ] 文本和背景之间的高对比度（最小4.5:1，首选7:1）
  - [ ] 配色方案专业且色盲可访问
  - [ ] 所有幻灯片一致的视觉设计
  - [ ] 空白空间充足（不拥挤）
  - [ ] 字体清晰且专业

  **布局和格式（检查每个幻灯片图像）：**
  - [ ] 无文本溢出或幻灯片边缘截断
  - [ ] 无元素重叠（文本覆盖图像、重叠形状）
  - [ ] 标题一致定位
  - [ ] 内容适当对齐
  - [ ] 项目符号和文本未被切断
  - [ ] 图表适合幻灯片边界
  - [ ] 标题和标签可见且可读

  **内容质量：**
  - [ ] 每幻灯片一个主要想法（不过载）
  - [ ] 最小文本（每幻灯片最大3-6个项目符号）
  - [ ] 项目符号简洁（每个5-7个单词）
  - [ ] 图表简化且清晰（不从论文复制粘贴）
  - [ ] 数据可视化有大、可读的标签
  - [ ] 引用存在且正确格式化
  - [ ] 结果/数据幻灯片主导演示（占内容的40-50%）

  **结构和流程：**
  - [ ] 清晰的叙事弧（引言 → 方法 → 结果 → 讨论）
  - [ ] 幻灯片之间的逻辑进展
  - [ ] 幻灯片数量适合讲话时长（约每幻灯片1分钟）
  - [ ] 标题幻灯片包括作者、所属机构、日期
  - [ ] 引言引用相关背景文献（3-5篇论文）
  - [ ] 讨论引用比较论文（3-5篇论文）
  - [ ] 结论幻灯片总结关键发现
  - [ ] 末尾的致谢/资助幻灯片

  **科学内容：**
  - [ ] 研究问题明确陈述
  - [ ] 方法充分总结（不细节过多）
  - [ ] 结果逻辑呈现且视觉清晰
  - [ ] 统计显著性适当指示
  - [ ] 结论得到显示数据支持
  - [ ] 局限性在适当时承认
  - [ ] 未来方向或更广影响讨论

  **常见演示文稿问题标记：**

  **关键问题（必须修复）：**
  - 文本溢出使内容不可读
  - 字体太小（<18点）
  - 元素重叠掩盖数据
  - 对比度不足（文本难以阅读）
  - 图表太复杂或不可读
  - 无引用（完全无支持的声称）
  - 幻灯片数量与时长严重不匹配

  **主要问题（应该修复）：**
  - 幻灯片之间设计不一致
  - 文本太多（文字墙，无项目符号）
  - 图表简化不良（轴标签太小）
  - 布局拥挤，空白空间不足
  - 缺少关键结构元素（无结论幻灯片）
  - 颜色选择差（非色盲安全）
  - 结果内容最少（<30%幻灯片）

  **次要问题（改进建议）：**
  - 可使用更多视觉/图表
  - 某些幻灯片略文本重
  - 轻微对齐不一致
  - 可从更多空白空间受益
  - 额外引用会加强声称
  - 配色方案可更现代

  #### 演示文稿评审报告格式

  **总结陈述：**
  - 演示文稿质量的整体印象
  - 适合目标受众和时长的适当性
  - 关键优势（视觉设计、内容、清晰度）
  - 关键弱点（格式问题、内容空白）
  - 推荐（可呈现、小修、大修）

  **布局和格式问题（按幻灯片编号）：**
  ```
  幻灯片 3：文本溢出 - 项目符号4超出右边缘
  幻灯片 7：元素重叠 - 图表与标题文本重叠
  幻灯片 12：字体大小 - 轴标签太小，无法从远处阅读
  幻灯片 18：对齐 - 标题未居中
  ```

  **内容和结构反馈：**
  - 背景上下文和引用的充分性
  - 研究问题和目标的清晰度
  - 方法摘要的质量
  - 结果呈现的有效性
  - 结论和影响的强度

  **设计和可访问性：**
  - 整体视觉吸引力和专业性
  - 颜色对比度和可读性
  - 色盲可访问性
  - 幻灯片之间一致性

  **时机和范围：**
  - 幻灯片数量是否匹配预期时长
  - 适合讲话类型的细节水平
  - 部分之间的平衡

  #### 基于图像评审过程示例

  ```
  [14:30:00] 同行评审：开始评审演示文稿
  [14:30:05] 同行评审：检测到演示文稿 - 转换为图像
  [14:30:10] PDF 评审：在 presentation.pdf 上运行 pdf_to_images.py
  [14:30:15] PDF 评审：转换25个幻灯片为图像到 review/ 目录
  [14:30:20] PDF 评审：检查幻灯片 1/25 - 标题幻灯片
  [14:30:25] PDF 评审：检查幻灯片 2/25 - 引言
  ...
  [14:35:40] PDF 评审：检查幻灯片 25/25 - 致谢
  [14:35:45] PDF 评审：完成基于图像的评审
  [14:35:50] 同行评审：发现8个布局问题，3个内容问题
  [14:35:55] 同行评审：按幻灯片编号生成结构化反馈
  ```

  **记住：** 对于演示文稿，基于图像的视觉检查是**强制性的**。永远不要尝试将演示文稿PDF作为文本阅读 - 将失败并错过所有视觉格式问题。

