  同行评审中常见方法论和统计问题目录，带有识别和解决的指南。

  ## 最终清单

  在最终确定评审前，验证：

  - [ ] 总结陈述清晰传达整体评估
  - [ ] 主要担忧明确识别和理由
  - [ ] 建议修订具体且可操作
  - [ ] 次要问题注意但正确分类
  - [ ] 统计方法已评估
  - [ ] 可重复性和数据可用性评估
  - [ ] 伦理考虑验证
  - [ ] 图表和表格质量及完整性评估
  - [ ] 写作质量评估
  - [ ] 整个过程中语气建设性和专业
  - [ ] 评审彻底但比例适适合于手稿范围
  - [ ] 推荐与识别问题一致
