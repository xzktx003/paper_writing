  # 科学批判性评估与同行评审

  ## 概述

  同行评审是评估科学手稿的系统性过程。评估方法论、统计、设计、可重复性、伦理和报告标准。将此技能应用于跨学科的手稿和资助评审，进行建设性、严格的评估。

  ## 何时使用此技能

  此技能应在以下情况使用：
  - 为期刊进行科学手稿的同行评审
  - 评估资助提案和研究申请
  - 评估方法论和实验设计严谨性
  - 评审统计分析和报告标准
  - 评估可重复性和数据可用性
  - 检查是否符合报告指南（CONSORT、STROBE、PRISMA等）
  - 对科学写作提供建设性反馈

  **相关资源：** **venue-templates** 技能提供 `reviewer_expectations.md`，包含不同场合（Nature/Science、Cell Press、医学期刊、ML会议）的详细评审指南。使用此资源来校准您的评审标准以适应目标场合。

  ## 通过科学示意图增强视觉效果

  **使用此技能创建文档时，始终考虑添加科学图表和示意图以增强视觉传达。**

  如果您的文档尚未包含示意图或图表：
  - 使用 **scientific-schematics** 技能生成AI驱动的出版质量图表
  - 只需用自然语言描述您想要的图表
  - Nano Banana Pro 将自动生成、评审和完善示意图

  **对于新文档：** 应默认生成科学示意图，以可视化表示文本中描述的关键概念、工作流程、架构或关系。

  **如何生成示意图：**
  ```bash
  python scripts/generate_schematic.py "您的图表描述" -o figures/output.png
  ```

  AI将自动：
  - 创建具有适当格式的出版质量图像
  - 通过多次迭代评审和完善
  - 确保可访问性（色盲友好、高对比度）
  - 在 figures/ 目录中保存输出

  **何时添加示意图：**
  - 同行评审工作流程图
  - 评估标准决策树
  - 评审过程流程图
  - 方法论评估框架
  - 质量评估可视化
  - 报告指南符合性图表
  - 任何受益于可视化的复杂概念

  有关创建示意图的详细指南，请参考 scientific-schematics 技能文档。

