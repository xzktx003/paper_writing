  # LaTeX文档编译器技能

  ## 目的

  编译和管理LaTeX文档，包括处理参考文献、图表和期刊专用模板。

  ## 能力

  - 编译LaTeX文档
  - 管理参考文献
  - 处理交叉引用
  - 应用期刊模板
  - 调试编译错误
  - 生成输出文件

  ## 使用指南

  1. 设置文档
  2. 包含依赖项
  3. 配置编译选项
  4. 运行编译器
  5. 调试（如有需要）
  6. 生成输出

  ## 流程集成

  在科学发现工作流程中用于：
  - 手稿准备
  - 论文格式排版
  - 报告生成
  - 演示文稿创建

  ## 配置

  - 编译器选择
  - 模板管理
  - 参考文献样式
  - 输出格式

  ## 输出成果

  - 编译后的PDF文件
  - 辅助文件
  - 错误日志
  - 输出包
