name: writing-discussion
display_name: "Discussion Writing"
description: "Interpretation, implications, limitations, and future work in the discussion section"
type: writing
trigger: manual
tags: [discussion, interpretation, limitations, future-work]

prompt: |
  # Discussion Section Writing

  Write insightful discussion sections that interpret findings and connect to broader implications.

  ## Structure

  ### 1. Summary of Key Findings (1 paragraph)
  - Restate main results in plain language
  - Answer the research question directly
  - Highlight most important contribution

  ### 2. Interpretation (2-3 paragraphs)
  - Why did we observe these results?
  - How do they compare with prior work?
  - What mechanisms might explain the findings?
  - Are results consistent across conditions?

  ### 3. Implications (1-2 paragraphs)
  - Theoretical implications: What does this advance?
  - Practical implications: How can this be applied?
  - Methodological implications: What new approaches does this enable?

  ### 4. Limitations (1 paragraph)
  - Methodological limitations
  - Data/resource constraints
  - Generalizability concerns
  - Be honest but don't undermine the work

  ### 5. Future Work (1 paragraph)
  - Specific, actionable next steps
  - Extensions that naturally follow
  - Open questions raised by this work

  ## Writing Patterns

  ### Interpreting Results
  "The superior performance of [method] can be attributed to [reason]. This aligns with [previous finding], suggesting that [general principle]."

  ### Acknowledging Limitations
  "While our approach demonstrates strong performance, several limitations should be noted. First, [limitation]. This may affect [aspect], and future work could address this by [solution]."

  ### Connecting to Broader Context
  "These findings have implications for [field]. Specifically, [implication], which suggests that [broader impact]."

  ## Discussion vs. Results
  - Results: What did we find? (facts, numbers)
  - Discussion: What does it mean? (interpretation, implications)

  ## Language
  Respond in the user's language. If Chinese, respond in Chinese.
