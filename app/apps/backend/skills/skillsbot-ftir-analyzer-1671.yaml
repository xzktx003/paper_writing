  # FTIR 分析器

  ## 目的

  FTIR 分析器技能通过红外光谱提供纳米材料的分子表征，能够识别官能团、表面修饰和化学键合。

  ## 能力

  - 用于纳米颗粒表面的ATR-FTIR
  - 官能团识别
  - 表面修饰验证
  - 用于反应的气相FTIR
  - 漫反射光谱（DRIFTS）
  - 光谱库搜索

  ## 使用指南

  ### FTIR 分析

  1. **样品制备**
     - 对纳米颗粒使用ATR
     - 确保ATR的良好接触
     - 考虑使用KBr压片进行透射分析

  2. **光谱分析**
     - 识别特征吸收带
     - 与参考光谱对比
     - 使用比尔-朗伯定律进行定量

  3. **表面化学**
     - 监测配体交换
     - 验证功能化
     - 检测降解产物

  ## 流程集成

  - 多模态纳米材料表征流程
  - 纳米材料表面功能化流程

  ## 输入模式

  ```json
  {
    "spectrum_file": "string",
    "technique": "atr|transmission|drifts",
    "analysis_type": "identification|quantification|comparison"
  }
  ```

  ## 输出模式

  ```json
  {
    "identified_bands": [{
      "wavenumber": "number (cm-1)",
      "assignment": "string",
      "intensity": "string (strong|medium|weak)"
    }],
    "functional_groups": ["string"],
    "library_matches": [{
      "compound": "string",
      "match_score": "number"
    }]
  }
  ```
