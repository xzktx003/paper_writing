  # 学术论文撰写助手

  ## 概述

  本技能指导创建符合IEEE和ACM会议/期刊出版标准的正式学术研究论文。它确保适当的论文结构、格式、学术写作风格以及对研究主题的全面覆盖。

  ## 工作流程

  ### 1. 理解研究主题

  当被要求撰写研究论文时：

  1. **与用户明确主题和范围**：
     - 主要研究问题或贡献是什么？
     - 目标受众是谁（会议、期刊、一般学术界）？
     - 期望的长度是多少（页数或字数）？
     - 是否有特定的章节要求？
     - 使用哪种格式标准（IEEE还是ACM）？

  2. **如有需要，收集背景信息**：
     - 审阅任何提供的研究材料、数据或参考文献
     - 理解领域和技术背景
     - 识别关键的相关工作或现有研究以供引用

  ### 2. 论文结构

  遵循以下标准的学术论文结构：

  ```
  1. 标题和摘要
     - 反映主要贡献的简洁标题
     - 摘要：150-250字，总结目的、方法、结果、结论

  2. 引言
     - 动机和问题陈述
     - 研究空白和意义
     - 主要贡献（通常为3-5个要点）
     - 论文组织段落

  3. 相关工作 / 背景
     - 相关研究的文献综述
     - 与现有方法的比较
     - 当前工作的定位

  4. 方法论 / 方法 / 系统设计
     - 所提方法/系统的详细描述
     - 架构图（如适用）
     - 算法或流程
     - 设计决策和理由

  5. 实现（如适用）
     - 技术细节
     - 使用的工具和技术
     - 挑战和解决方案

  6. 评估 / 实验 / 结果
     - 实验设置
     - 数据集或测试场景
     - 性能指标
     - 结果呈现（表格、图表）
     - 分析和解释

  7. 讨论
     - 结果的意义
     - 局限性和有效性威胁
     - 经验教训

  8. 结论和未来工作
     - 贡献总结
     - 影响和意义
     - 未来研究方向

  9. 参考文献
     - 采用适当引用格式的完整参考文献列表
  ```

  ### 3. 学术写作风格

  应用以下来自学术研究的写作惯例：

  **语气和语态**：
  - 正式、客观、精确的语言
  - 第三人称视角（除非描述具体贡献，否则避免使用“我”或“我们”）
  - 陈述事实用现在时，描述特定研究用过去时
  - 清晰、直接的陈述，避免不必要的复杂性

  **技术精确性**：
  - 首次使用时定义所有缩写：“上下文感知系统（C-AS）”
  - 正确且一致地使用领域特定术语
  - 用具体指标或证据量化主张
  - 避免在没有数据的情况下使用模糊术语，如“非常”、“许多”、“显著”

  **论证**：
  - 清晰陈述主张，然后用证据支持
  - 使用逻辑递进：动机 → 问题 → 解决方案 → 验证
  - 明确比较和对比相关工作
  - 讨论局限性和反对意见

  **特定章节指南**：

  *摘要*：
  - 第一句：广泛的背景和动机
  - 第二/三句：具体问题和空白
  - 中间部分：方法和途径
  - 结尾：关键结果和贡献
  - 自成一体（无需阅读全文即可理解）

  *引言*：
  - 以现实世界的动机或引人注目的问题开始
  - 从一般到具体（倒金字塔结构）
  - 以清晰的贡献列表和论文路线图结束
  - 使用示例说明问题

  *相关工作*：
  - 按主题或方法对相关工作进行分组
  - 明确比较：“与关注Y的[X]不同，我们的方法...”
  - 识别空白：“然而，这些方法没有解决...”
  - 清晰定位你的工作

  *结果*：
  - 在表格/图表中清晰呈现数据
  - 客观描述趋势和模式
  - 与基线进行定量比较
  - 承认意外或负面结果

  ### 4. 格式指南

  **IEEE格式（默认）**：
  - 页面尺寸：A4（210mm × 297mm）
  - 页边距：上19mm，下43mm，左/右14.32mm
  - 两栏布局，栏间距4.22mm
  - 字体：全文使用Times New Roman
    - 标题：24磅，粗体
    - 作者姓名：11磅
    - 章节标题：10磅，粗体，编号（1.， 1.1， 1.1.1）
    - 正文：10磅
    - 图/表标题：8磅
  - 行距：单倍行距
  - 段落：无缩进，段落间距3磅
  - 图：居中，标题在下
  - 表：居中，标题在上

  **ACM格式（替代）**：
  - 标准ACM会议论文集格式
  - 摘要单栏，正文双栏
  - 摘要后包含CCS概念和关键词部分
  - 引用使用ACM参考文献格式

  ### 5. 引用和参考文献

  **文内引用**：
  - 使用编号引用：“最近的工作[1, 2]表明...”
  - 多个引用按时间顺序排列：[3, 7, 12]
  - 引用特定章节：“如[5, 第3节]所示...”

  **参考文献格式（IEEE风格）**：
  ```
  [1] A. Author, B. Author, and C. Author, "Title of paper," in Proc. Conference Name, Year, pp. 123-456.
  [2] D. Author, "Title of journal article," Journal Name, vol. X, no. Y, pp. 123-456, Month Year.
  [3] E. Author, Book Title, Edition. City: Publisher, Year.
  ```

  **参考文献列表要求**：
  - 按第一作者姓氏字母顺序排列（或按引用顺序编号）
  - 可用时包含DOI或URL
  - 完整论文至少15-20篇参考文献
  - 混合近期（过去5年）和基础性工作

  ### 6. 内容生成过程

  **分步方法**：

  1. **创建大纲**
     - 制定详细的逐章节大纲
     - 定义每个章节的关键点
     - 确定需要图/表的位置

  2. **迭代起草章节**
     - 从方法论（核心贡献）开始
     - 然后是引言（此时贡献已明确）
     - 相关工作（定位贡献）
     - 结果和评估
     - 讨论和结论
     - 摘要最后（完整论文的总结）

  3. **添加引用**
     - 全文引用相关工作
     - 用文献证据支持主张
     - 创建完整的参考文献列表

  4. **审阅和优化**
     - 检查章节间的逻辑流程
     - 确保术语一致性
     - 验证所有图/表在文中都有引用
     - 确认摘要与内容匹配
     - 验证引用的完整性

  ## 示例

  **示例1：用户要求撰写综述论文**
  ```
  用户：“撰写一篇关于上下文感知系统最新进展的综述研究论文”

  回复：
  1. 明确范围：“我将创建一篇关于上下文感知系统的综述论文。有几个问题：
     - 我应该关注特定方面吗（例如，需求工程、实现技术）？
     - ‘最新’的时间范围是多少（过去5年、10年）？
     - 目标长度：10-15页，还是20-30页的综合综述？
     - IEEE还是ACM格式？”

  2. 明确后，创建大纲显示：
     - 上下文感知系统的分类法
     - 综述方法
     - 分类方案
     - 不同方面的逐章节覆盖
     - 趋势和未来方向

  3. 遵循综述结构起草论文，包含广泛的相关工作覆盖
  ```

  **示例2：用户要求撰写实验性论文**
  ```
  用户：“撰写一篇关于我用于检测视觉语言模型幻觉的新算法的论文”

  回复：
  1. 收集有关以下内容的详细信息：
     - 算法方法和新颖性
     - 实验设置和使用的数据集
     - 结果和指标
     - 比较基线

  2. 构建为实验性论文：
     - 引言：幻觉检测的动机
     - 相关工作：现有检测方法
     - 所提方法：详细的算法描述
     - 实验：数据集、指标、设置
     - 结果：与基线的定量比较
     - 分析：消融研究、错误分析
     - 结论：贡献和未来工作

  3. 强调可重复性和实证验证
  ```

