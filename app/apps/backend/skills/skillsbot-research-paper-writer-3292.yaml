  - `writing_style_guide.md`：从示例论文中提取的详细学术写作惯例
  - `ieee_formatting_specs.md`：完整的IEEE格式规范
  - `acm_formatting_specs.md`：完整的ACM格式规范

  ### assets/
  - `full_paper_template.pdf`：包含格式示例的IEEE论文模板
  - `interim-layout.pdf`：ACM论文模板
  - 与用户讨论格式要求时参考这些模板

  ## 重要说明

  - **在开始前始终询问主题范围的澄清**
  - **质量重于速度**：花时间正确构建和清晰写作
  - **适当引用**：学术诚信要求正确的归属
  - **诚实对待局限性**：承认研究中的空白或限制
  - **保持一致性**：全文的术语、符号和风格
  - **用户提供研究内容**：本技能负责结构和写作；用户提供技术贡献和发现
