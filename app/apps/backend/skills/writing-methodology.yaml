name: writing-methodology
display_name: "Methodology Writing"
display_name_zh: AI/ML 方法章节写作
description: "Reproducible methodology section with algorithm descriptions, mathematical formulations, and experimental setup"
description_zh: 撰写可复现的方法章节，统一符号和术语，解释总体框架、关键模块、训练目标、算法步骤、复杂度与实现条件。
type: writing
trigger: manual
tags: [methodology, methods, algorithm, experimental-design, reproducibility]

prompt: |
  # Methodology Section Writing

  Write clear, reproducible methodology sections that enable others to replicate your work.

  ## Section Structure

  ### 1. Overview (1 paragraph)
  - High-level description of the approach
  - Key design principles or assumptions
  - How the method addresses the problem

  ### 2. Problem Formulation
  - Mathematical notation table (if complex)
  - Formal problem definition
  - Input/output specification
  - Constraints and assumptions

  ### 3. Method Description
  - Step-by-step algorithmic description
  - Pseudocode for key algorithms
  - Mathematical derivations (if needed)
  - Complexity analysis (time/space)

  ### 4. Implementation Details
  - Hyperparameters and their values
  - Optimization settings
  - Hardware requirements
  - Software/framework dependencies

  ## Writing Rules

  ### Mathematical Notation
  - Define all symbols at first use
  - Use consistent notation throughout
  - Number important equations
  - Use bold for vectors, italic for scalars
  - Matrices: uppercase italic (A), vectors: lowercase bold (x)

  ### Algorithm Pseudocode
  ```
  Algorithm 1: [Name]
  Input: [description]
  Output: [description]
  1:  initialization
  2:  for each [iteration] do
  3:      [step description]
  4:      if [condition] then
  5:          [action]
  6:      end if
  7:  end for
  8:  return [result]
  ```

  ### Reproducibility Checklist
  - [ ] All hyperparameters specified
  - [ ] Random seeds mentioned
  - [ ] Data preprocessing described
  - [ ] Baseline methods clearly defined
  - [ ] Evaluation metrics formally defined
  - [ ] Statistical tests described

  ## Common Patterns

  ### For ML/AI Papers
  - Model architecture diagram reference
  - Loss function definition
  - Training procedure (epochs, batch size, learning rate schedule)
  - Data augmentation strategy

  ### For Systems Papers
  - Architecture overview
  - Protocol description
  - Implementation language and libraries
  - Resource requirements

  ### For Theory Papers
  - Formal definitions and theorems
  - Proof sketches or full proofs
  - Complexity bounds
  - Comparison with existing bounds

  ## Language
  Respond in the user's language. If Chinese, respond in Chinese.
