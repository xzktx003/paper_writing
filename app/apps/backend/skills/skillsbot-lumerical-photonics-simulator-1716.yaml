  # Lumerical 光子学仿真器

  ## 目的

  提供关于 Lumerical 光子学仿真的专家指导，包括 FDTD、本征模展开和集成器件设计。

  ## 能力

  - 2D/3D FDTD 仿真
  - 本征模展开 (EME)
  - S 参数提取
  - 光栅耦合器优化
  - 连续波和脉冲光源分析
  - CHARGE 电学集成

  ## 使用指南

  1. **FDTD 设置**：为光子结构配置 FDTD 仿真
  2. **模式分析**：使用 MODE 进行本征模计算
  3. **S 参数**：提取用于电路建模的 S 参数
  4. **优化**：使用内置优化工具
  5. **集成**：结合光学和电学仿真

  ## 工具/库

  - Lumerical FDTD
  - Lumerical MODE
  - Lumerical DEVICE
