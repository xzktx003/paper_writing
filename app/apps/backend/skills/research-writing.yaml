content: |
  # Research Writing Skill - 科研论文写作助手

  本技能提供30个论文写作场景的Prompt模板，覆盖**文献调研→大纲撰写→初稿写作→润色修改→图表制作→投稿回复→基金申请**全流程。

  ## 快速索引

  | 阶段 | Prompt | 用途 |
  |------|--------|------|
  | 🔧 翻译润色 | #1-2 | 中译英、英译中 |
  | 🔧 润色优化 | #3-7 | 中文润色、英文缩写/扩写/润色 |
  | 🔧 去AI味 | #8-10 | 中英文去AI味、逻辑检查 |
  | 📊 图表制作 | #11-14 | 架构图、实验图推荐、图片/表格标题 |
  | 📈 结果分析 | #15 | 实验结果写作 |
  | 🔍 审稿模拟 | #16-17 | 模拟审稿人、逻辑检查 |
  | 📚 文献调研 | #18-20 | 文献总结、对比分析、找研究空白 |
  | 📝 大纲撰写 | #21-22 | 论文大纲、章节扩展 |
  | ✍️ 初稿写作 | #23-25 | 摘要、引言、方法写作 |
  | 📬 投稿回复 | #26-27 | 回复审稿人、cover letter |
  | 💰 基金申请 | #28-30 | 基金申请书、研究计划、学术演讲PPT |

  ## Prompt模板库

  ### 1. 中译英

  **角色**: 高水平学术论文写作专家，精通学术表达规范、逻辑严谨性与地道英文表达。

  **核心规则**:
  1. 准确性优先：确保专业术语、数据、公式、实验方法等核心信息与原文完全一致
  2. 术语统一性：对同一专业术语采用固定的英文译法
  3. 表达流畅性：使用符合英文科技论文规范的表达
  4. 格式保留：保留原文的标题层级、段落结构、图表编号
  5. 逻辑完整性：完整传达原文的论证逻辑
  6. 视觉与排版规范：
     - 不使用加粗、斜体或引号
     - 不改动公式结构与引用格式
     - 特殊字符需正确转义：95% → 95\%，model_v1 → model\_v1
  7. 语言与逻辑要求：
     - 避免使用分号，优先采用从句或同位语结构
     - 不使用列表形式，需转化为连贯的段落式表达
     - 消除翻译腔与AI生成痕迹
  8. 时态使用：统一采用一般现在时，描述具体实验过程使用过去时

  ### 2. 英译中

  **核心规则**:
  1. 术语精准性：优先采用规范译名，无规范译名时结合学科背景选择通用译法
  2. 逻辑完整性：完整保留原文的论证逻辑、实验数据、公式符号与引用标注
  3. 歧义处理：若原文存在歧义，需在译文后用 [注：] 补充解释
  4. 保持句式结构，中文的语序应尽量与英文原句保持一致

  **输出格式**:
  - 按原文结构分段输出，每模块用<模块名>标签包裹
  - 术语首次出现时标注原文
  - 公式用$公式内容$包裹

  ### 3. 中文润色

  **润色标准**:
  1. 准确性：确保专业术语使用正确，数据和逻辑表述无误
  2. 流畅性与简洁性：优化句子结构，使表达更自然、连贯
  3. 专业性与一致性：符合目标学术领域的写作风格
  4. 逻辑性：识别并修复逻辑断层，将列表转换为流畅的叙述

  **输出格式**:
  - 输出纯文本，不使用Markdown加粗、斜体、引号等符号
  - 标点符号严格使用中文全角标点

  ### 4. 英文缩写

  **核心规则**:
  1. 保留所有核心学术信息
  2. 避免使用冗余表达和重复内容
  3. 优化句子结构，合并短句或拆分长句
  4. 去除冗余：删除不必要的填充词

  ### 5. 英文扩写（重点逻辑性）

  **核心规则**:
  1. 当文本存在论证断层时，需补充逻辑连接词（如"Furthermore""Conversely"）
  2. 对论点与论据的匹配性进行校验
  3. 保留原文专业术语与核心数据
  4. 字数限制：优化后文本字数控制在原文的±10%以内

  ### 6. 英文润色

  **润色标准**:
  1. 学术语言精准性：修正语法错误、拼写错误
  2. 逻辑连贯性：梳理段落间的逻辑衔接
  3. 专业术语规范性：统一专业术语的拼写与用法
  4. 格式合规性：匹配期刊要求的格式规范
  5. 表达简洁性：删除冗余表述

  **注意事项**:
  - 正式语体：严禁使用缩写形式
  - 词汇选择：使用简洁、清晰、通用词汇
  - 避免所有格结构：使用of结构而非's所有格

  ### 7. 中文去AI味

  **操作准则**:
  1. 不改变原文的研究假设、实验数据、核心结论
  2. 禁止使用非专业词汇或口语化表达
  3. 移除机械的连接词，删除生硬的过渡词
  4. 减少不必要的括号

  ### 8. 英文去AI味

  **操作准则**:
  1. 不改变原文的核心学术内容
  2. 避免使用过度AI化的词汇（如"leverage"、"delve into"）
  3. 移除机械连接词
  4. 减少不必要的分号和括号

  ### 9. 逻辑检查（挑刺王）

  **审查维度**:
  - 前提假设是否明确且合理
  - 论据与论点是否存在因果断裂
  - 推理过程是否存在偷换概念、以偏概全或循环论证
  - 数据/案例是否能有效支撑结论
  - 结论是否超出论据的支持范围

  ### 10. 缩写检查

  确保：
  1. 首次出现的缩写在括号中给出全称
  2. 同一术语全文缩写一致
  3. 避免过度使用缩写

  ### 11. 绘制架构图

  **视觉约束**:
  1. 风格要求：扁平化矢量插画风格，线条清晰
  2. 色彩系统：使用低饱和度的莫兰迪色系
  3. 内容表现：将抽象的方法流程转化为可视化的模块、箭头和连接
  4. 文字规范：图像中的所有文字必须使用英文

  ### 12. 实验图推荐

  **标准学术图表类型**:
  - 数值对比：分组柱状图、折线对比图、雷达图
  - 训练过程：学习曲线图、收敛曲线图
  - 模型评估：ROC曲线、Precision-Recall曲线
  - 数据关系：热力图、散点图、气泡图
  - 统计分布：小提琴图、箱线图

  ### 13. 图片标题说明

  **格式规范**:
  - 如果是短语或名词性结构：使用Title Case格式
  - 如果是完整的句子：使用Sentence case格式
  - 简洁原则：去除冗余开头，直接描述图片内容

  ### 14. 表格标题说明

  **格式规范**:
  - 使用Title Case格式
  - 使用正式表达：Comparison with, Ablation study on, Results on

  ### 15. 实验结果分析

  **核心规则**:
  1. 数据真实性：严禁编造数据、夸大结果
  2. 分析深度：重点在于对比和趋势分析
  3. 排版规范：推荐使用\section{结论性标题} + 段落文本格式

  ### 16. 模拟审稿人视角

  **评审维度**:
  1. 创新性：该工作的贡献是实质性的突破还是边缘性改进
  2. 严谨性：实验设计是否公平？Baseline是否全面？
  3. 一致性：所声称的贡献是否在实验部分得到了充分验证？

  **输出格式**:
  - Summary: 一句话总结核心贡献
  - Strengths: 主要亮点
  - Weaknesses (Critical): 关键问题
  - Rating: 预估分数

  ### 17. 模型选择推荐

  根据研究任务和需求推荐最适合的AI模型。

  ### 18. 文献总结与笔记

  **输出格式**:
  - 基本信息：标题、作者/机构、发表venue、引用数
  - 核心贡献：1-2句话总结
  - 研究问题：清晰说明要解决的具体问题
  - 关键方法：3-5个要点总结
  - 实验结果：主要性能指标和对比数据
  - 启发与局限

  ### 19. 文献对比分析

  **输出格式**:
  - 对比表格：研究问题、方法、数据集、主要结果、局限性
  - 研究脉络分析：共同问题、方法演进、技术路线
  - 研究机会：潜在的研究机会

  ### 20. 找到研究空白

  **分析维度**:
  1. 方法层面：现有方法的共同假设是否总是成立？
  2. 数据/实验层面：有哪些场景未被覆盖？
  3. 理论层面：有哪些现象缺乏理论解释？
  4. 应用层面：有哪些实际应用场景未被探索？

  ### 21. 论文大纲生成

  **输出格式**:
  - Abstract: 研究背景和动机、核心方法、主要结果、结论
  - Introduction: 背景、问题、局限、贡献、论文结构
  - Related Work: 相关工作
  - Method: 问题定义、方法概述、核心模块
  - Experiments: 实验设置、主实验结果、实验分析
  - Conclusion: 工作总结、局限性、未来方向

  ### 22. 章节内容扩展

  将简要的要点扩展为完整的论文章节。

  **约束**:
  - 学术风格：正式、客观
  - 逻辑连贯：段落之间有清晰的逻辑连接
  - 引用提示：在需要引用的地方标注[CITATION NEEDED]

  ### 23. 摘要写作 (Abstract)

  **Abstract结构 (4-5句话)**:
  1. 背景/动机：为什么这个问题重要？
  2. 问题/挑战：现有方法有什么局限？
  3. 方法/贡献：本文提出了什么方法？
  4. 结果：实验结果如何？(包含关键数据)
  5. 意义：这项工作的意义是什么？

  **约束**:
  - 字数：150-250词
  - 时态：一般现在时为主
  - 语态：主动语态优先
  - 避免：缩写、引用、模糊表述

  ### 24. 引言写作 (Introduction)

  **Introduction结构 (漏斗式)**:
  1. 大背景：研究领域的重要性
  2. 具体问题：聚焦到具体研究问题
  3. 现有局限：现有方法的不足之处
  4. 本文贡献：核心贡献(3点)
  5. 论文结构：后续章节安排

  **约束**:
  - 长度：1.5-2页(双栏)
  - 贡献点：3-4点，具体、可验证
  - 语气：自信但不过度宣传

  ### 25. 方法章节写作 (Method)

  **Method结构**:
  1. 问题定义：形式化定义问题
  2. 方法概述：整体框架、核心思想
  3. 核心模块：详细技术细节
  4. 理论分析：复杂度、收敛性等

  **约束**:
  - 清晰度：使用图表辅助说明
  - 完整性：包含足够的实现细节
  - 可复现：伪代码、公式、参数设置

  ### 26. 回复审稿人意见 (Rebuttal)

  **Rebuttal原则**:
  1. 态度专业：感谢审稿人，保持礼貌
  2. 逐条回复：每个意见都要回应
  3. 证据支撑：用实验数据、引用支撑论点
  4. 明确修改：说明在论文中做了哪些修改
  5. 求同存异：对于不同意见，礼貌解释

  ### 27. Cover Letter写作

  **输出格式**:
  - 研究亮点：说明核心贡献和重要性
  - 适合理由：说明工作如何符合期刊范围
  - 声明事项：原创性、作者同意、无利益冲突

  ### 28. 基金申请书写作

  **输出格式**:
  - 立项依据：研究意义、国内外研究现状
  - 研究目标：总体目标、具体目标
  - 研究内容：详细描述
  - 拟解决的关键科学问题
  - 研究方案：技术路线、可行性分析
  - 特色与创新之处
  - 研究基础：前期工作、相关成果

  ### 29. 研究计划 (Research Proposal)

  **输出格式**:
  - Abstract: 200-300词摘要
  - Background and Motivation
  - Research Questions
  - Research Objectives
  - Methodology
  - Timeline
  - Expected Outcomes

  ### 30. 学术演讲/PPT大纲

  **输出格式**:
  - Slide 1: Title (标题、作者、单位、会议/日期)
  - Slide 2: Outline
  - Slide 3-4: Background & Motivation
  - Slide 5: Problem Statement
  - Slide 6-9: Proposed Method
  - Slide 10-13: Experiments
  - Slide 14: Conclusion
  - Slide 15: Q&A

  **演讲建议**:
  - 时间分配
  - 重点强调
  - 可能问题

  ## 最佳实践

  1. **组合使用**: 多个Prompt可以串联使用，如先用#21生成大纲，再用#22-25扩展各章节
  2. **迭代优化**: 对AI生成的内容，可用#3-10进行多轮润色和优化
  3. **保持批判**: 使用#16模拟审稿人视角，提前发现论文问题
  4. **数据真实**: 所有实验数据和结论必须基于真实研究