name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate skill structure
        run: python tools/validate_skills.py
      - name: Byte-compile Python tools
        run: python -m compileall -q skills tools
