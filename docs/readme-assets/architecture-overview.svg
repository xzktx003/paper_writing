<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="760" rx="32" fill="#F5F1E8"/>
  <rect x="40" y="40" width="1120" height="680" rx="28" fill="#FFFDF8" stroke="#D9D0C3" stroke-width="2"/>
  <text x="80" y="110" fill="#1F2937" font-size="42" font-family="Arial, sans-serif" font-weight="700">Coding Kanban 架构总览</text>
  <text x="80" y="148" fill="#6B7280" font-size="20" font-family="Arial, sans-serif">浏览器里的统一看板，后端负责 PTY、SSH、tmux、文件系统与 VS Code Web 编排。</text>

  <rect x="80" y="210" width="250" height="280" rx="24" fill="#D8F0E3" stroke="#6BB38A" stroke-width="2"/>
  <text x="110" y="260" fill="#12442A" font-size="30" font-family="Arial, sans-serif" font-weight="700">Web 前端</text>
  <text x="110" y="300" fill="#12442A" font-size="20" font-family="Arial, sans-serif">React 19 + Vite + xterm.js</text>
  <text x="110" y="344" fill="#12442A" font-size="18" font-family="Arial, sans-serif">• 宫格看板</text>
  <text x="110" y="378" fill="#12442A" font-size="18" font-family="Arial, sans-serif">• 聚焦终端</text>
  <text x="110" y="412" fill="#12442A" font-size="18" font-family="Arial, sans-serif">• 文件浏览器</text>
  <text x="110" y="446" fill="#12442A" font-size="18" font-family="Arial, sans-serif">• VS Code Web 面板</text>

  <rect x="475" y="160" width="280" height="390" rx="24" fill="#FFF1CC" stroke="#D2A93A" stroke-width="2"/>
  <text x="510" y="215" fill="#6A4A00" font-size="32" font-family="Arial, sans-serif" font-weight="700">Fastify 后端</text>
  <text x="510" y="255" fill="#6A4A00" font-size="20" font-family="Arial, sans-serif">apps/server</text>
  <text x="510" y="305" fill="#6A4A00" font-size="18" font-family="Arial, sans-serif">• AgentSessionRegistry</text>
  <text x="510" y="339" fill="#6A4A00" font-size="18" font-family="Arial, sans-serif">• PtyRuntimeManager</text>
  <text x="510" y="373" fill="#6A4A00" font-size="18" font-family="Arial, sans-serif">• SshRuntimeManager</text>
  <text x="510" y="407" fill="#6A4A00" font-size="18" font-family="Arial, sans-serif">• LocalTmuxAdapter</text>
  <text x="510" y="441" fill="#6A4A00" font-size="18" font-family="Arial, sans-serif">• LocalFsService / SftpService</text>
  <text x="510" y="475" fill="#6A4A00" font-size="18" font-family="Arial, sans-serif">• VsCodeWebManager</text>

