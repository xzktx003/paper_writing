<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 410" width="900" height="410">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,4 L0,8 Z" fill="#555"/>
    </marker>
    <style>
      text { font-family: Arial, sans-serif; }
      .title { font-size: 20px; font-weight: 700; fill: #111; text-anchor: middle; }
      .stage-title { font-size: 18px; font-weight: 700; fill: #333; text-anchor: middle; }
      .stage-line { font-size: 13.5px; fill: #555; text-anchor: middle; }
      .section-title { font-size: 16px; font-weight: 700; fill: #333; }
      .template { font-size: 13px; fill: #444; }
      .note { font-size: 12.5px; fill: #666; text-anchor: middle; }
      .arrow { stroke: #555; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
      .loop { stroke: #777; stroke-width: 1.6; fill: none; stroke-dasharray: 6,4; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="900" height="410" fill="#fff"/>
  <text x="450" y="30" class="title">Pipeline 2.0 Typed Stage System</text>

  <rect x="30" y="62" width="142" height="92" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.6" rx="8"/>
  <text x="101" y="91" class="stage-title">AI Stage</text>
  <text x="101" y="116" class="stage-line">Generate</text>
  <text x="101" y="136" class="stage-line">Polish / Review</text>

  <rect x="205" y="62" width="142" height="92" fill="#fff8e1" stroke="#f57c00" stroke-width="1.6" rx="8"/>
  <text x="276" y="91" class="stage-title">Human Gate</text>
  <text x="276" y="116" class="stage-line">Accept / Edit</text>
  <text x="276" y="136" class="stage-line">Reject / Skip</text>

  <rect x="380" y="62" width="142" height="92" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.6" rx="8"/>
  <text x="451" y="91" class="stage-title">Citation</text>
  <text x="451" y="116" class="stage-line">DOI checks</text>
  <text x="451" y="136" class="stage-line">Title matching</text>

  <rect x="555" y="62" width="142" height="92" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.6" rx="8"/>
  <text x="626" y="91" class="stage-title">Compile</text>
  <text x="626" y="116" class="stage-line">LaTeX build</text>
  <text x="626" y="136" class="stage-line">Log parsing</text>

  <rect x="730" y="62" width="142" height="92" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.6" rx="8"/>
  <text x="801" y="91" class="stage-title" fill="#2e7d32">Artifact</text>
  <text x="801" y="116" class="stage-line">PDF output</text>
  <text x="801" y="136" class="stage-line">Audit record</text>

  <path d="M172 108 L205 108" class="arrow"/>
  <path d="M347 108 L380 108" class="arrow"/>
  <path d="M522 108 L555 108" class="arrow"/>
  <path d="M697 108 L730 108" class="arrow"/>

  <path d="M276 154 L276 205 L101 205 L101 155" class="loop"/>
  <text x="190" y="194" class="note">rejection loop</text>

  <text x="30" y="255" class="section-title">Preset Pipeline Templates</text>
  <text x="30" y="282" class="template">Writing Flow: Outline - Draft - Polish - Review</text>
  <text x="30" y="305" class="template">Paper Pipeline: Polish - Review - Revise - Cite - Compile</text>
  <text x="30" y="328" class="template">Quick Review: Review - Revise</text>
  <text x="30" y="351" class="template">Citation Pipeline: Verify - Deduplicate - Discover</text>
  <text x="30" y="374" class="template">Executable Paper: Run Code - Generate Figures - Compile</text>

  <rect x="460" y="265" width="410" height="82" fill="#f7f7f7" stroke="#bbb" rx="6"/>
  <text x="665" y="290" class="note">Each stage has a typed executor,</text>
  <text x="665" y="312" class="note">bounded inputs, captured outputs,</text>
  <text x="665" y="334" class="note">and resumable pipeline state.</text>
</svg>
