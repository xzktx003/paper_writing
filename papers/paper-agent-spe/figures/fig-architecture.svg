<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 640" width="900" height="640">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,4 L0,8 Z" fill="#555"/>
    </marker>
    <style>
      text { font-family: Arial, sans-serif; }
      .title { font-size: 20px; font-weight: 700; fill: #111; text-anchor: middle; }
      .layer-title { font-size: 15px; font-weight: 700; fill: #333; }
      .box-title { font-size: 13.5px; font-weight: 700; fill: #333; text-anchor: middle; }
      .box-line { font-size: 11.5px; fill: #555; text-anchor: middle; }
      .legend { font-size: 11px; fill: #555; }
      .link { stroke: #555; stroke-width: 1.6; fill: none; marker-end: url(#arrow); }
      .link-dashed { stroke: #777; stroke-width: 1.5; fill: none; stroke-dasharray: 6,4; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="900" height="640" fill="#fff"/>
  <text x="450" y="28" class="title">System Architecture</text>

  <text x="30" y="58" class="layer-title">Presentation Layer</text>
  <rect x="30" y="68" width="840" height="92" fill="#f2f5ff" stroke="#c8ced8" rx="6" stroke-dasharray="5,3"/>
  <rect x="50" y="82" width="260" height="64" fill="#e8f0fe" stroke="#1967d2" stroke-width="1.7" rx="7"/>
  <text x="180" y="106" class="box-title">React/Vite Frontend</text>
  <text x="180" y="125" class="box-line">File tree / editor / preview</text>
  <text x="180" y="140" class="box-line">CodeMirror 6 / KaTeX / native PDF viewer</text>
  <rect x="540" y="82" width="280" height="64" fill="#e8f0fe" stroke="#1967d2" stroke-width="1.7" rx="7"/>
  <text x="680" y="106" class="box-title">Browser Workspace</text>
  <text x="680" y="125" class="box-line">AI chat, skills, review panel</text>
  <text x="680" y="140" class="box-line">Pipeline controls</text>

  <text x="30" y="188" class="layer-title">Application Layer</text>
  <rect x="30" y="198" width="840" height="96" fill="#f2f5ff" stroke="#c8ced8" rx="6" stroke-dasharray="5,3"/>
  <rect x="230" y="214" width="440" height="64" fill="#e8f0fe" stroke="#1967d2" stroke-width="1.7" rx="7"/>
  <text x="450" y="238" class="box-title">Fastify / Node.js HTTP Server</text>
  <text x="450" y="257" class="box-line">REST API / SSE streams / MCP JSON-RPC</text>
  <text x="450" y="272" class="box-line">Project API, AI sessions, tmux terminal manager</text>

  <text x="30" y="322" class="layer-title">Service Layer</text>
  <rect x="30" y="332" width="840" height="132" fill="#f2f5ff" stroke="#c8ced8" rx="6" stroke-dasharray="5,3"/>
  <rect x="50" y="350" width="190" height="58" fill="#fce8e6" stroke="#d93025" stroke-width="1.6" rx="7"/>
  <text x="145" y="374" class="box-title">LLM Gateway</text>
  <text x="145" y="393" class="box-line">OpenAI / Anthropic / Ollama</text>
  <rect x="275" y="350" width="190" height="58" fill="#fce8e6" stroke="#d93025" stroke-width="1.6" rx="7"/>
  <text x="370" y="374" class="box-title">Citation Service</text>
  <text x="370" y="393" class="box-line">CrossRef / OpenAlex / S2</text>
  <rect x="500" y="350" width="190" height="58" fill="#fce8e6" stroke="#d93025" stroke-width="1.6" rx="7"/>
  <text x="595" y="374" class="box-title">LaTeX Compiler</text>
  <text x="595" y="393" class="box-line">pdflatex / xelatex / tectonic</text>
  <rect x="715" y="350" width="135" height="58" fill="#e8f0fe" stroke="#1967d2" stroke-width="1.6" rx="7"/>
  <text x="782" y="374" class="box-title">Pipeline</text>
  <text x="782" y="393" class="box-line">Typed stages</text>
  <rect x="280" y="424" width="340" height="40" fill="#e8f0fe" stroke="#1967d2" stroke-width="1.6" rx="7"/>
  <text x="450" y="449" class="box-title">Shared project services and audit logging</text>

  <text x="30" y="494" class="layer-title">Storage Layer</text>
  <rect x="30" y="504" width="840" height="72" fill="#f2f5ff" stroke="#c8ced8" rx="6" stroke-dasharray="5,3"/>
  <rect x="50" y="520" width="220" height="42" fill="#fff8e1" stroke="#f57c00" stroke-width="1.6" rx="7"/>
  <text x="160" y="546" class="box-title">papers/ filesystem</text>
  <rect x="330" y="520" width="220" height="42" fill="#fff8e1" stroke="#f57c00" stroke-width="1.6" rx="7"/>
  <text x="440" y="546" class="box-title">.env configuration</text>
  <rect x="610" y="520" width="220" height="42" fill="#fff8e1" stroke="#f57c00" stroke-width="1.6" rx="7"/>
  <text x="720" y="546" class="box-title">project.json metadata</text>

  <text x="30" y="608" class="layer-title">External Integration (MCP)</text>
  <rect x="210" y="588" width="270" height="42" fill="#fce8e6" stroke="#d93025" stroke-width="1.6" rx="7"/>
  <text x="345" y="614" class="box-title">Claude Desktop / Cursor clients</text>

  <path d="M310 114 C380 114 470 114 540 114" class="link"/>
  <text x="450" y="104" class="legend" text-anchor="middle">workspace UI</text>
  <path d="M450 160 L450 214" class="link"/>
  <text x="470" y="188" class="legend">REST + SSE</text>
  <path d="M450 278 L145 350" class="link"/>
  <path d="M450 278 L370 350" class="link"/>
  <path d="M450 278 L595 350" class="link"/>
  <path d="M450 278 L782 350" class="link"/>
  <path d="M450 464 L160 520" class="link"/>
  <path d="M450 464 L440 520" class="link"/>
  <path d="M450 464 L720 520" class="link"/>
  <path d="M480 609 L855 609 L855 246 L670 246" class="link-dashed"/>
  <text x="760" y="318" class="legend">MCP tool calls</text>

  <rect x="565" y="618" width="12" height="12" fill="#e8f0fe" stroke="#1967d2"/>
  <text x="584" y="628" class="legend">Internal</text>
  <rect x="655" y="618" width="12" height="12" fill="#fce8e6" stroke="#d93025"/>
  <text x="674" y="628" class="legend">External/API</text>
  <rect x="770" y="618" width="12" height="12" fill="#fff8e1" stroke="#f57c00"/>
  <text x="789" y="628" class="legend">Storage</text>
</svg>
