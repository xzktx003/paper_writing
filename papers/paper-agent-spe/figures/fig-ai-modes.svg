<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,4 L0,8 Z" fill="#555"/>
    </marker>
    <style>
      text { font-family: Arial, sans-serif; }
      .page-title { font-size: 20px; font-weight: 700; fill: #111; text-anchor: middle; }
      .node-title { font-size: 23px; font-weight: 700; text-anchor: middle; }
      .node-line { font-size: 15px; fill: #444; text-anchor: middle; }
      .small-title { font-size: 15px; font-weight: 700; fill: #333; text-anchor: middle; }
      .small-line { font-size: 13px; fill: #555; text-anchor: middle; }
      .result { font-size: 18px; font-weight: 700; fill: #333; text-anchor: middle; }
      .link { stroke: #555; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="900" height="500" fill="#fff"/>
  <text x="450" y="30" class="page-title">Permission-Aware AI Interaction Modes</text>

  <rect x="355" y="55" width="190" height="44" fill="#f7f7f7" stroke="#888" stroke-width="1.5" rx="20"/>
  <text x="450" y="82" class="small-title">User Prompt</text>
  <path d="M450 100 L450 128" class="link"/>

  <rect x="300" y="132" width="300" height="48" fill="#fafafa" stroke="#888" stroke-width="1.4" rx="6"/>
  <text x="450" y="162" class="small-title">Mode Selection</text>

  <path d="M450 180 L150 205 L150 222" class="link"/>
  <path d="M450 180 L450 222" class="link"/>
  <path d="M450 180 L750 205 L750 222" class="link"/>

  <rect x="40" y="225" width="240" height="118" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.6" rx="8"/>
  <text x="160" y="258" class="node-title" fill="#2e7d32">Chat</text>
  <text x="160" y="285" class="node-line">Read-only discussion</text>
  <text x="160" y="306" class="node-line">No tools</text>
  <text x="160" y="327" class="node-line">No file changes</text>

  <rect x="330" y="225" width="240" height="118" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.6" rx="8"/>
  <text x="450" y="258" class="node-title" fill="#1565c0">Agent</text>
  <text x="450" y="285" class="node-line">Proposes diffs</text>
  <text x="450" y="306" class="node-line">User accepts edits</text>
  <text x="450" y="327" class="node-line">Review before apply</text>

  <rect x="620" y="225" width="240" height="118" fill="#ffebee" stroke="#c62828" stroke-width="1.6" rx="8"/>
  <text x="740" y="258" class="node-title" fill="#c62828">Tools</text>
  <text x="740" y="285" class="node-line">Runs tool steps</text>
  <text x="740" y="306" class="node-line">Project-scoped access</text>
  <text x="740" y="327" class="node-line">Auditable log</text>

  <path d="M160 344 L160 370" class="link"/>
  <path d="M450 344 L450 370" class="link"/>
  <path d="M740 344 L740 370" class="link"/>

  <rect x="48" y="374" width="224" height="44" fill="#c8e6c9" rx="5"/>
  <text x="160" y="402" class="result">Brainstorm safely</text>

  <rect x="338" y="374" width="224" height="44" fill="#bbdefb" rx="5"/>
  <text x="450" y="402" class="result">Review proposals</text>

  <rect x="628" y="374" width="224" height="44" fill="#ffcdd2" rx="5"/>
  <text x="740" y="402" class="result">Control execution</text>

  <rect x="115" y="445" width="670" height="34" fill="#fff8e1" stroke="#e65100" stroke-width="1.2" rx="7" stroke-dasharray="6,4"/>
  <text x="450" y="466" class="small-line">Escalating permissions make AI assistance explicit, reviewable, and auditable.</text>
</svg>
