<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" width="900" height="460">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,4 L0,8 Z" fill="#555"/>
    </marker>
    <style>
      text { font-family: Arial, sans-serif; }
      .title { font-size: 20px; font-weight: 700; fill: #111; text-anchor: middle; }
      .box-title { font-size: 16.5px; font-weight: 700; fill: #333; text-anchor: middle; }
      .box-line { font-size: 13px; fill: #555; text-anchor: middle; }
      .tiny { font-size: 11.5px; fill: #555; text-anchor: middle; }
      .branch { font-size: 12px; font-weight: 700; }
      .arrow { stroke: #555; stroke-width: 1.6; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="900" height="460" fill="#fff"/>
  <text x="450" y="30" class="title">Citation Verification Strategy</text>

  <rect x="340" y="52" width="220" height="52" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.6" rx="7"/>
  <text x="450" y="73" class="box-title">BibTeX Entry</text>
  <text x="450" y="92" class="box-line">from .bib or cite key</text>

  <path d="M450 104 L450 126" class="arrow"/>
  <rect x="345" y="128" width="210" height="46" fill="#fff8e1" stroke="#e65100" stroke-width="1.6" rx="7"/>
  <text x="450" y="157" class="box-title">Has DOI?</text>

  <path d="M345 153 L220 190" class="arrow"/>
  <text x="255" y="174" class="branch" fill="#e65100">No</text>
  <path d="M555 153 L680 190" class="arrow"/>
  <text x="625" y="174" class="branch" fill="#1565c0">Yes</text>

  <rect x="90" y="192" width="260" height="72" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.6" rx="8"/>
  <text x="220" y="220" class="box-title">Title Fuzzy Match</text>
  <text x="220" y="242" class="box-line">CrossRef + OpenAlex</text>

  <rect x="550" y="192" width="260" height="72" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.6" rx="8"/>
  <text x="680" y="220" class="box-title">DOI Verification</text>
  <text x="680" y="242" class="box-line">CrossRef + Semantic Scholar</text>

  <path d="M350 250 L415 292" class="arrow"/>
  <path d="M550 250 L485 292" class="arrow"/>

  <rect x="310" y="292" width="280" height="72" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.6" rx="8"/>
  <text x="450" y="319" class="box-title">Confidence Assessment</text>
  <text x="450" y="341" class="box-line">Compare API agreement</text>

  <path d="M450 364 L450 386" class="arrow"/>
  <path d="M450 386 L170 386 L170 398" class="arrow"/>
  <path d="M450 386 L450 398" class="arrow"/>
  <path d="M450 386 L730 386 L730 398" class="arrow"/>

  <rect x="70" y="398" width="200" height="46" fill="#c8e6c9" stroke="#2e7d32" stroke-width="1.5" rx="6"/>
  <text x="170" y="420" class="box-title" fill="#2e7d32">High / Medium</text>
  <text x="170" y="436" class="tiny">confirmed by APIs</text>

  <rect x="350" y="398" width="200" height="46" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" rx="6"/>
  <text x="450" y="420" class="box-title" fill="#e65100">Low</text>
  <text x="450" y="436" class="tiny">manual review</text>

  <rect x="630" y="398" width="200" height="46" fill="#ffcdd2" stroke="#c62828" stroke-width="1.5" rx="6"/>
  <text x="730" y="420" class="box-title" fill="#c62828">None</text>
  <text x="730" y="436" class="tiny">flag as unverifiable</text>

  <rect x="92" y="278" width="190" height="38" fill="#f7f7f7" stroke="#bbb" rx="5"/>
  <text x="187" y="302" class="tiny">fallback when DOI is absent</text>

  <rect x="618" y="278" width="190" height="38" fill="#f7f7f7" stroke="#bbb" rx="5"/>
  <text x="713" y="302" class="tiny">metadata is cross-checked</text>
</svg>
